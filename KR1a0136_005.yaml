body:
  text: 大易通解卷五江常鎮道魏荔彤撰兌下坤上臨臨觀二卦相綜而成皆二陽四隂之卦根於坤而繼屯蒙者也水雷屯厚民生之事也山水蒙正眀徳之事也屯繼臨者經綸草昧之後容保民無疆也觀繼蒙者開啟童蒙之後觀民設教也繼卦之義如此而卦象可證之焉水雷屯地澤臨以屯之五陽下居臨之二爻以臨之二隂上居屯之五爻故臨之為卦以二陽上臨四隂蓋因屯五爻之陽下居二爻所以遂有咸臨之辭也山水蒙風地觀以蒙之二陽上居觀之五爻以觀之五隂下居蒙之二爻觀之為卦以二陽下觀四隂蓋因蒙二爻之陽上居五爻所以有觀民之𫝊也易以陽為主况四隂二陽尤以陽為貴在下則臨上在上則觀下猶之乎在屯則以下卦震初爻為主上卦坎五爻為主在蒙則以下卦坎二爻為主上卦艮上爻為主也此臨觀繼屯蒙之象本乎卦畫之自然者也何謂根於坤乎四隂二陽以陽為貴為主而謂之根坤者二卦上下卦皆隂卦以坤為體者也臨以坤臨乎兌是母臨乎少女也觀以巽觀乎坤是長女觀乎母也毋臨乎少女養而兼教象傳之所謂教思無窮即寓於容保民無疆之内也長女觀乎母長女無事言養亦不必言語為教矣以觀為教所謂母儀也故象傳言省方觀民設教天子省方觀諸侯即諸侯觀於天子也所省之民所設之教皆平日諸侯自省自教者天子豈徒以言語號令為乎二卦之象傳示之詳矣特人不能融會貫通耳此所以坤為體而二卦謂之根於坤也其貴陽者用陽也體隂而用陽二卦之義也屯蒙二卦中男長男合為屯少男中男合為蒙既根於乾矣臨以母臨少女觀以長女觀母不根於坤取何義乎學者不執平日所聞庶乎於愚說稍一寓目焉四隂二陽之卦自屯䝉至此方序臨觀二卦屯蒙根乾臨觀根坤嗣後頥坎二卦而上經終矣另於頥坎卦首詳之雜卦傳云臨觀之義或與或求本義云臨與觀求也又謂二卦互有與求之說何者為確乎愚謂與求二卦各卦皆有與有求不盡分言與求亦不盡互言與求也臨卦之以母臨少女少女求養而母與以養也而教附之觀卦之以長女觀母長女求教而母與以教也而養不必言矣此所謂或與或求二卦各具焉臨元亨利貞至于八月有凶彖辭云元亨利貞與乾同用陽故元亨而必以利貞為戒在乾則無不利本自貞在隨臨則以陽用為元亨而利於貞也此言卦之體用若占者之利貞亦利在於貞耳此利貞應分為三等㸔方理眀義盡也至於八月有凶猶之否泰反𩔖之義臨四隂二陽陽用為吉至於反乎此而用隂則凶在遯卦而為八月之卦矣然亦不必定至八月在本卦不用陽而用隂即八月也彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也象傳釋卦名義曰臨剛浸而長以陽臨隂貴於陽長氣盛以臨之也說而順則四隂俱聴其臨由於卦徳也蓋臨隂者能以其悅而順臨隂隂自悅而順以應乎二陽爻也二陽爻猶以剛中之二為主所謂用陽在此剛中而應衆隂應乎剛中也衆隂應乎剛中此剛中之二即乾之元所以致亨者也所以繫之以大亨也大亨而以正同於乾徳辭所以繫元亨利貞也合乎乾元之道即合乎大道也此本卦以陽為主為用之義也而隂體根坤自與用陽而得天道兩不相悖者也至於八月有凶言消不久何也消字合浸長長字為言剛浸長而為臨則消亦不久將為遯也此固垂戒之言然亦天之道也消長天之道所以為正所以元亨隂陽消長天地視之皆正也皆元亨也而人事應其治辭聖人用其功能皆是以正為元亨之道也賢人君子修之省之維之持之希聖以是希天亦以是也然則八月之凶在臨者安知言二月之凶不在遯乎眀乎此為天道則可以讀易矣象曰澤上有地臨君子以教思无窮容保民无疆象傳言臨象主乎體坤之義者也曰澤上於地澤亦大矣澤在地上猶水行地中師象傳所言地中足以容乎地上之水也澤之大而地容之中庸云振河海而不洩河水也海非澤之極大者乎此所以象地容澤而為臨也師衆也即民也臨之民即師之衆也師之水容於地即臨之澤容於地也故象傳於師言容民畜衆於本卦言教思無窮容保民無疆可見愚體坤根坤之說有悟於聖人之象傳而非臆說矣屯似厚遂民生之事臨卦繼屯何以言教哉屯則純是經綸草昧開闢水土之象臨則象其繼世為君者地已平天已成安居粒食已裕矣為之上者不過臨蒞之而已然豈無守成之經綸乎教思無窮者於屯得養後徐加以教而不能一時盡著於政化其思則無窮矣得養後申教焉所謂王者必世後仁也養欲給求者凡有可行盡為民謀正徳復性者不能使知且使之由此容保民於無疆之道俱自教思無窮之心所生也不然則教之遽期其從迫之急求其喻是督責之令也豈無窮之教思乎後世有民因上之教不能安其室家遂其耕鑿者矣故必教思無窮而後容保民無疆也欲使之養極其優裕而無所擾家習於徳化而輕從善何一不自屯之經綸以為本以臨之教養兼施知所緩急而調劑之以為繼乎其為容保民於無疆誠廣大矣乎若論虞廷諸臣導水焚山眀農教稼治厯授時為前此經綸則三代之君皆守其成法者耳教思容保湯文之徳化者方足當之勿謂臨為易而屯為難焉初九咸臨貞吉象曰咸臨貞吉志行正也初九變師之初六在師初以隂變陽為臨臨民亦率衆也戒出律否臧凶為初進率師者致謹焉在本爻變陽為隂為師率衆以臨民無事則民有事則師也初以陽剛為二之副以臨乎四隂咸臨之繫也然必貞吉亦為初進臨民者勉也象傳釋貞吉曰志行正也猶彖傳所言大亨者以正也行正本於志正率氣者志耳九二咸臨吉无不利象曰咸臨吉无不利未順命也九二變復之六二在復二以隂變陽為臨近於復之初陽而二為助休以為復可以休息待其漸復復不自二主之也在本爻以陽變隂為復雖有初陽非本卦之主爻以九二為主所以亦繫之咸臨不言貞而言吉咸臨者本於二之陽剛中正也不須言貞而吉可知矣又云無不利者何也爻為一卦之主即初九亦在所臨不止臨乎四隂爻也上下應之故云無不利象傳何以言未順命乎順命者衆矣而猶有未順命者亦無害其為咸臨之吉而無不利也即如比五之王用三驅失前禽而不誡也臨者自臨順命者自順命不順命者未順命也久而徳洽化行自順命矣𫝊恐咸臨者間有阻格教化之方或窮荒逺險之國有未順命將必求為我臨焉則近於功名樂於有事非容保之道容保者合順命不順命而容保之也以大事小樂天而保天下非容何以為保乎此孔聖思深慮逺為後世示戒也此意㕘觀三爻之甘臨更明六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也六三變泰之九三在泰三變陽為隂為臨繫之以無平不陂無往不復者天地隂陽之際必艱貞而方无咎正為變臨悦體有取悦於人之義也勿恤其孚而自𫉬食福則不為甘臨豈為苟交乎在本爻變隂為陽為泰恃泰而臨於人甘臨也甘臨則有樂於為君之心者也此所以無攸利也為君難如知為君之難則既憂之无咎内樂於為君外苟悦以為臨俱因兊體取象變乾為泰乾三惕厲所以能憂也象傳言三位不當以其兊當極隣於外三隂恐其有私於臨故曰位不當也然既憂之咎何能長乎亦因變泰平陂之交際而致慎也凡言位不當多主卦體象言耳以上内卦三爻兊恱之體徳在兊以上爻為主應主内卦然合内外卦主象取義則主二陽爻猶以二爻為主通卦也初雖咸臨附二以為臨也二之咸臨臨之主也三爻變乾愓厲則无咎所以慎苟恱於外以為甘臨也六四至臨无咎象曰至臨无咎位當也六四變歸妹之九四在歸妹之四以陽變隂為臨四近五似不愆期乃愆期者四陽體而得守貞不字之道遲歸有時即十年乃字亦無咎悔也在本爻以隂變陽為歸妹位近於内卦兼歸妹之義所以為臨之先至者臨至而即歸之民與臣皆婦道也况四又位髙先歸於咸臨之陽何咎之有象傳言其位當正謂四於咸臨為主之二爻而兼歸妹之義歸二為義象耳六五知臨大君之宜吉象曰大君之宜行中之謂也六五變節之九五在節五以陽變隂為臨節甘所以吉而有尚也陽而變隂能體隂而用陽雖節為隂為甘則陽也吉而有尚何如在本爻以隂變陽為節何以繫知臨乎且二以咸臨之陽為一卦之主又奚取於五為主而象以大君之宜乎此有說焉亦自屯而來也蓋屯五之陽下居於二所以為臨也此五之位仍屯五之位也其君仍屯之君也屯之君經綸於前開闢創建非聰眀睿知何足以濟屯乎前王之貽謀必臧而後人之率由舊章斯有成憲可遵五所謂知臨大君之宜者言其為君之創業垂統為可繼之法守也至於本卦之君當位臨民則二陽居下卦之中者也六五君位象前王也下卦咸臨之象象繼世之君也或為有道之曽孫或為異代之損益必皆確守先王之法神眀先王之意有其足臨之知於己以行大君之宜於民而後可以咸臨不致隕越也不然五爻知臨君也二爻咸臨亦君也豈以君臨民之道乎一卦無二君如天無二日民無二王也此等處豈宜含混乎中庸云聰眀睿知足以有臨也亦是言為君之宜也不必定實指為何人統言君臨天下宜有此知方足臨耳故臨卦五爻不必言現在臨民之君推原其法度制作建徳立功者如此見二之咸臨原有髙曽之矩矱及聖帝眀王之道法而已象傳言大君之宜行中之謂也之謂正指宜字可見非言其人而言其徳制言其道法矣意謂大君之宜不過行中則凡為大君而咸臨者可不知所法乎得𫝊而愚說更有本矣上六敦臨吉无咎象曰敦臨之吉志在内也上六變損之上九在損上變陽為隂為臨能損上以為臨益下以為容保所以无咎而有攸往得臣至於无家為國而無家上損而下亦不敢自求益也本爻變隂為陽為損損上益下所以敦厚為臨也損下益上似乎自豐而不知百姓不足君孰與足乎損上益下似乎薄待於己不知百姓足君孰與不足敦臨者蔵富於民民聚而財散者也所以吉而无咎象傳言其志在内何也亦因内卦二陽為咸臨之主也上非君也上爻言敦臨者臨之道宜如是也至於用此道之志則在咸臨者一心主之損上益下而吉无咎或損下益下而凶悔决於咸臨者之志而已咸臨者臨天下而主於一心言志在内可以主乎君心言不必定謂為内卦也蓋五上兩爻皆言臨五則先王之成法上則為君終始之本心也俱不指五爻上爻復有二君也再者上以敦厚為臨為臨之終言也志在内即謂之臨於内卦二陽而向往之亦可蓋臨至上已疎而能知臨如一且加厚焉逺人之心能不内向乎上作逺人說亦通以上外卦三爻坤體四以切近内卦繫以至臨五上二爻則虚言其理理出於坤之順也順而後恱非順何以恱乎非順之恱在君則甘臨矣在臣民則必不能恱矣此坤之體立乎内卦兊恱之本者也至於用陽固以九二為主矣吉無不利而有未順命者咸臨之合順不順以為臨自始至終敦厚其臨之道亦大順之道也順而悦為剛中而應之騐苟非剛中何以能臨而致恱乎是陽未嘗不為隂體體用亦無定學者識之五知臨上敦臨俱作下卦二陽爻以知臨敦臨之道臨之立解其義更順五如五服之内可以知臨上如五服外之逺人亦惟敦厚知臨之道以為臨而已如此則得臨民為君之宜合用中之謂而逺外之人心俱向於内矣與卦象以二陽臨四隂方恰當也初二皆繫咸臨則初為臣二為君矣然初傳言志正二傳言命令兩爻以體用分言亦可如大有五上兩爻合言為君徳行功效也坤下巽上觀臨觀二卦之義臨外而觀内臨顯而觀微也同根於坤隂在上則淺而顯隂在下則沉而微矣隂之氣象本如此而義理亦如此臨者臨民也觀則兼乎鬼神矣臨之教仍近於條教號令之政跡也觀之教則為聲律身度端型觀化之心志矣然亦主於用陽者何也徳不可見而功業有可窺徳不可名而威儀有可仰也用陽者在上之功業文章言動起居皆必表著於外也下觀上者用觀亦必用其心思於耳目也非陽為用乎而其體則隂蓋上下相觀皆存於一心之精思及相觀而孚而化亦惟一誠之感通而已格鬼神者亦以此此聖人以神道設教也神道以誠感觀我觀民亦以誠孚以誠為主事神教民修已治人之通義也此觀之所以較臨其言更精深乎觀之體隂而用陽同於臨根於坤而繼乎蒙於臨卦已言卦爻之變矣長女隨母女觀於母儀為學為求母亦觀乎女貞以為教為與此所以卦之六爻皆觀俱不外為求為與而已觀盥而不薦有孚顒若彖辭繫以祭祀之觀一念之誠為與為求皆以此為觀焉盥而不薦有孚顒若主祭者觀乎所祭之鬼神也而壇廟有事之衆又皆觀乎主祭者有孚之心顒若之容以各效其誠於各執之事也誰謂卦本四隂長而為八月之卦不取隂盛另取他義扶陽抑隂也耶謂祭祀以春秋為重而禴祭薄祭也烝祭厚祭也言祭未嘗不取於八月隂盛萬寳告成天地鬼神無不於此時致報禮焉易原無耑主扶抑之說固屢眀之矣不眀綜卦則諸卦皆一偏之辭試思祭祀之事非隂徳之極盛者乎若抑之則壇廟俱不可立矣觀卦辭不言吉凶者誠孚則吉不誠孚則凶矣彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣彖傳釋卦名義曰二陽在上為衆所觀大陽也四隂之衆觀乎二陽故云在上而臣民之觀於君於此取義象矣此觀之所以立名也其卦徳外巽而内順本有誠孚在内而敬謹之容著於周旋進退之際也且靜順為體而以巽為下觀型上觀化之用非巽而漸進何能遽觀而有得乎此觀人之法也即以自觀而言内順乎理外巽於道順以為徳而巽進焉可自觀矣然必貴於中正者則觀之本也有徳位者以此觀天下之從違非外求也正以驗徳考業耳觀天下亦所以自觀矣中正觀天下正以自觀其中正而已釋卦辭曰觀盥而不薦有孚顒若上之觀神下之觀上俱在此時昭其觀焉即下觀而能化亦由上事神之誠格幽斯感於眀也誠孚斯感於下也更為推廣觀之道以上觀乎天之神道神道即天道也不言天而言神有宰乎天者也程子所謂以言乎其宰則帝也所以宰乎天之氣化運行不可以為淪於虚亦不可謂滯於實者也可見者天之氣化運行不可見者天之神道也故就四時之行不忒可觀天之神道靜有常而動不括也此厯萬古而常新有至不變者以主乎至變者也指實言之則理以御氣耳聖人觀之推誠以通天耳故聖人以天之神道設教天之神道天命也聖人則天合乎性以為道也至於神道設教即修道以為教也不出中庸所言之㫖也然聖人除盡性之外無合天之學亦無盡人性物性之學聖人一盡性而無餘功矣是以觀之為徳一誠孚而無他義矣誠即性之所以為性合天人而一之合命道而盡之也修之為教推暨之而已天下之服一日克復而天下歸仁乃性量之固有也然何必言天下服乎觀乎天下以驗性量非天下服而盡倫盡物之能或有憾乎必考之天下者正以内考其誠孚此觀之體立用行之義也非聖人何克當之象曰風行地上觀先王以省方觀民設教象傳則另申一義風行地上就二卦之體象言觀也觀之徳既已立體以是行用如風行地上之象矣先王省方觀民設教如風之無逺不届也必省方以觀民設教者就其地所宜俗所尚民所習而設教焉一道徳同風俗何異同如是乎蓋大同者以道徳同風俗不同者以風俗别教化教化雖有異而期於風俗仁厚則一也風俗既一於仁厚矣即上之道徳所以致一也修道之教不同求道之一則同也天下之性近而習逺也齊一變至魯魯一變至道正是省方觀民設教不同也及至道則不二由於性無二命本一也㕘觀乎蒙之果行育徳乃肇端之教矣至觀則合天下性習之異同以成教化於漸摩美風俗於久逺俱為徳盛化神之極致也觀繼乎蒙而言教於二卦之大象傳可以得其說矣初六童觀小人无咎君子吝象曰初六童觀小人道也初六變為益之初九在益初以陽變隂為觀動變為順當益之時觀於上之損上益下所以必利用大作以報上也故元吉無咎在本爻以隂變陽為益何以繫童觀而為君子吝乎蓋初在觀之下童子之象變震又有妄動之象童子固好妄動者若小人雖為成人然無知識有童心焉无咎者不足咎之也君子而童觀羞吝何如乎象傳眀童觀者小人之道非君子所宜也此小人君子兼徳位而言非指為惡之小人不過庸愚之人如童獃而已或童或愚在下觀上無足重輕故无咎君子效之方足羞吝已六二闚觀利女貞象曰闚觀女貞亦可醜也六二變為渙之九二在渙二以陽變隂為觀險變為順水斯流行故繫以渙奔其机渙奔流水也有机斯有所倚而不渙矣水之流行渙也有主乎水者水方川流不息則機也所以合渙也本爻變隂為陽為渙順而變險觀不在公眀之處而在幽黯之所是闚觀也以闚為觀者女子之所為而貞女且不為之故云利女貞亦兼渙奔其机有所觀闚而思倚託之義也如士之以術要君也象傳眀其可醜觀非出於貞正女固可羞士亦可恥耳六三觀我生進退象曰觀我生進退未失道也六三變為漸之九三在漸三以陽變隂為觀三止體之主爻也漸原以止為進也變順以順乎止則鴻漸於陸失乎以止為巽進之象故夫征不復婦孕不育止而不進反得凶也然利於禦急難則免凶矣本爻以隂變陽為漸順體而變止矣在漸固重止貴止以為巽進也在觀亦有取於止何也止於順也觀我生貴乎止而順乎道以為觀也以止為自觀之法則可觀我生之為徳為業矣且可以觀人之徳業以為我之從違矣進退者兼乎人我而言與求也三位在兩卦之間故其辭繫之如是象傳眀其未失道以止為觀道將因觀而得眀以為行之本矣何致失道乎内觀已貴止外觀人何嘗不貴止中有定見而後觀人觀已有定則矣定見者何理也義也所以觀有定而不失道者誠也誠木靜以立體故貴止也以上内卦二爻坤順之體以下觀上柔順者正道也然初為童觀以象愚民二以闚觀以象黠者三以觀我為觀為進退下之觀上有此三種故以三爻之象義示之内卦主二爻闚觀雖未足主卦而利貞乃中道足主内卦矣六四觀國之光利用賓于王象曰觀國之光尚賓也六四變否之九四在否四以陽變隂為觀繫以有命无咎疇離祉四位近五休否之君可以觀其命而佐之休否故无咎且合三隂之疇以離祉也在本爻以隂變陽為否何有觀國之光利用賓於王之辭乎亦以近君承命而可以觀國之光利用賓於王家以佐上觀下也蓋以四觀乎五為最近切也故可以觀上且可以助上觀下而象傳言尚賓即尚賢也五之觀四為尚賢上觀乎下也四之用賓為觀光下觀乎上也上下互觀君擇臣臣亦擇君君為臣表率臣亦為君紏䋲彼此互觀互為與求眀良㑹而交警之義切矣即師友之道亦教學相長之要者也四為外卦主爻故其辭如此九五觀我生君子无咎象曰觀我生觀民也九五變為剥之六五在剥五以隂變陽為觀象以貫魚以宫人寵變觀乃合羣隂以觀上也不言剝陽而言承寵兼觀卦下觀之義也故无不利在本爻以陽變隂為剥剥而内求故言觀我生也五以陽爻為卦之主變隂無乃失其主用乎不知隂變以自觀觀之體也觀我生所以内考其誠即為觀人之本也仍是本卦體隂而用陽也所以君子无咎蓋合乎君子内省不疚之道也象傳眀其即為觀民兼本末而言之矣觀民之化不化以驗我徳之修不修觀民祗以觀我而已何謂觀我生乎性命之具於我者我之生也全而畀我者也觀我生者觀乎我生之理克全與否而已即四體五官有物必有則形之踐也皆視乎性之盡與否也我生者兼形氣與性理而言更見必内外交修形神俱全方為盡道耳五爻以一陽為一卦之主用陽者剛健中正而後能觀我生也然反已靜觀則以隂為體矣至於反觀毋自欺必自慊以歸於誠又必用陽以矢其健决其幾矣易為寡過之書其言陽隂體用於學者切哉上九觀其生君子无咎象曰觀其生志未平也上九變為比之上六在比上以隂變陽為觀繫之以比之无首者比以五隂比一陽上變巽而不比之衆比而上不同故云无首亦後夫之凶也兼觀望之義故比致後矣在本爻以陽變隂為比繫以觀其生君子无咎者觀五為觀卦之主上雖陽亦附於五如臨之初九附於九二以為臨也非一卦之主爻也既非主爻則亦觀於主爻而已矣觀其生觀五也觀五以為自觀取善於人而用之自已也此君子不自滿假而藉力他山之道也何咎之有在五必以上為君子相觀互為與求亦切磋琢磨之義矣更无咎焉觀其生兼此二義亦皆觀人觀已之法也象傳言志未平程𫝊謂為不安寧之義朱子本義謂為不忘戒懼或者上為五之師保者乎觀其生是指五爻師保之觀君徳必匡扶救正使歸于君子方無咎乎至於志未平亦言匡救其君之志不敢安寧耳在臨之初爻亦繫咸臨乃在二爻之下佐二以為臨之相臣也觀之上九在五爻之上所以擬之師嚴道尊王者敬事之人也或取於此象而以觀君徳即同乎上之自觀矣以上外卦三爻巽體論爻以四隂為外卦之主然合内外卦立象取義則以五爻為主以上為輔也四爻固近五觀上且助上以觀下亦足以主乎外卦五則以觀我為觀民之本正是主觀之徳位兼隆者上以觀五者觀已成就君徳之義象也故以師保之位擬之震下離上噬嗑噬嗑賁二卦皆三陽三陰之卦相綜而成根於乾坤繼乎泰否隨蠱而終上經焉上經三陽三隂均平之卦八乾坤首列泰否為乾坤交不交隨蠱分繼之噬嗑賁又分繼之隨繼泰以隨為正既隨又恐隨而無定見故繼之以噬嗑蠱繼否以蠱為極又恐蠱而無能飾也故繼之以賁噬嗑者決也賁者飾也二卦皆取象於人事近取諸身為噬嗑逺取諸物為賁也是噬嗑為陽卦而賁為隂卦噬嗑用陽而賁用隂也至二卦之象以隨上爻與本卦五爻交易成噬嗑以蠱之初爻與賁二爻交易而成賁二卦分繼隨蠱又何疑焉隨主震初爻噬嗑猶是也而外卦兊變離外恱而為隨外眀而為噬嗑以決也蠱成於艮上爻賁猶是也而内卦巽變離内漸進而幹蠱内文眀以賁為飾也象變如此而義亦可思矣至於其用則決斷主乎陽修飾主乎隂噬嗑根乾繼泰隨賁根坤繼否蠱亦自然之序卦也本義謂自益卦六四之柔上行以至於五亦因未眀卦之根繼而言卦變則無根柢耳噬嗑繼隨泰而根乾噬嗑用陽方能噬嗑如隨之用陽以保泰為隨泰以成乾坤之交也三畫隂陽均平之卦在上經皆分歸於坎離噬嗑主陽之卦歸於坎坎之中爻之陽乾元也有天地先有水火故上經首乾坤終坎離中置泰否以天地交為定位也然後下經首咸恒山澤通氣風雷相薄終既未濟水火不相射畢矣噬嗑亨利用獄彖辭但言亨決斷則亨矣故繫之以利用獄用刑乃聖人不得已所以助禮教之不逮也臨觀而後序以噬嗑亦有此義不言貞者恐貞而固以決獄流於殘忍寡㤙以啟輕忍用刑之心也聖人之意微矣彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而眀雷電合而章柔得中而上行雖不當位利用獄也彖傳釋卦名義以象頤中有物指上卦之下爻言物也上下二爻象唇五三二三爻象齒四爻之陽象物在口内齒間噬之而齒與口合矣亨者噬嗑以為亨也三陽三隂均平故為剛柔分此卦體也下震動而上離眀雷電合而章又以卦徳釋卦象也雷電相合方得章明亦振威眀法之義也柔得中而上行即卦變也本義謂自益卦六四之柔上行至五愚疑經眀言柔得中矣似非指四爻也以隨之上爻下行於五以五爻上行於上方是柔得中而上行也隨之隂爻下行而陽爻上行陽五變為隂五有不當位之義然用獄貴於眀不貴於悦用眀以斷獄所以不同於用悦以為隨似與經文合非愚敢立異以傳言柔得中而上行自皆指五不指四也惟言本卦之五則得中耳或謂本卦之五得中未嘗上行也不知傳言卦變自隨來其言柔得中指本卦言其言上行者指隨之五陽上行於上爻故柔因之得位變兑悦為離眀所以利用獄也而字轉語噬嗑為悔而隨卦為貞也於柔得中三字知指本卦之五遵𫝊也象曰雷電噬嗑先王以眀罰勅法象傳以雷電取象雷電者天之威令彰明使人恐懼修省也故象之以噬嗑之決斷先王明罰勅法即利用獄而申言非嗜殺人以為用獄也眀乎罰之應罰使人不敢輕犯勅乎法之合宜使人不輕犯法令用之者不敢枉人耳孔聖因卦辭惟恐後人不知利用獄之微㫖而濫獄重法豈文王所謂利乎聖人言利以義為利也於刑罰亦然正合彖傳言雷電合而章章彰眀也非凖乎情合乎理之罰法何以象彰明於雷電乎細繹眀勅二字祇是既眀且慎未有眀於中謹於外而好用刑罰者罰凖乎法而法歸於眀勅之心也眀罰勅法是修眀刑教使人不輕犯禁刑官勿濫用也尚在用刑罰之前立言初九屨校滅趾无咎象曰屨校滅趾不行也初九變晉之初六在晉初以隂變陽為噬嗑震動而變坤靜故晉雖摧如而以貞得吉雖罔孚以初晉也裕於後斯无咎在本爻以陽變隂為晉變坤順為震動又居初下輕進􅏥動所以屨校而得滅趾之刑也何謂无咎繫𫝊固言小人不恥不仁不畏不義矣象傳釋之以不行為輕進躁動者開自新之路也故繫𫝊又曰小懲而大戒小人之福也六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也六二變為睽之九二在睽二以陽變隂為噬嗑暌乖而噬嗑合也故有遇主於巷之辭睽以合為美故无咎本爻以隂變陽為睽合而離矣所噬者微而所滅者大噬膚而滅鼻矣鼻即劓也何以无咎或亦初之无咎之義乎象傳以為乘剛近於初陽隨之妄動致罹於法然則无咎同於初可眀矣六三噬腊肉遇毒小吝无咎象曰遇毒位不當也六三變為離之九三在離三以陽變隂為噬嗑離眀變動乃離之中日將昃也不知憂而妄動所以鼔缶而歌大耋之凶所謂老冉冉而將至也可嗟孰甚焉然無所謂凶也不知老之將至而頺放日甚徳不加修此所以凶也在本爻以隂變陽為離離麗也有合之義繫以噬腊肉遇毒二爻近於頤中之物四陽剛而難噬斷不易斷故為遇毒而小吝也无咎者遇毒不足恤以斷而合為无咎也象傳言遇毒為位不當三位近於所噬之物不得不噬以斷之位雖應斷而隂柔少力則值乎此位者不當耳以上内卦三爻震體噬嗑象義下動上離也宜以初爻主内卦初以震動變柔順則不能動故有滅趾之刑二隨初而動變睽則有滅鼻之刑三亦隨初而動變離小吝皆非吉占者不合乎卦體也再繹内卦三爻象傳與爻辭皆有另為申眀之義初之不行謂失動徳行以陽徳則无咎可知二曰乘剛亦掩陽之義又即震卦二爻來厲䘮貝之義也不然能隨陽而動亦可无咎三曰遇毒位不當三值内卦上爻與外卦四陽爻隣噬之所以遇毒然動而方噬何咎之有以此釋之與繫辭所引初爻无咎之義不同可見擬議以成變化之十九爻皆不必盡同於本卦本爻眀矣九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也九四變為頤之六四在頤四以隂變陽為噬嗑頤以求物為養今變噬嗑決絶以為頤也四以眀變止既眀於求養雖顛頤仍吉也然其求頤也如虎之猛暴所以有虎視耽耽其欲逐逐之象又言无咎者頤本求養太急未足為咎也在本爻變陽為隂為頤頤中之物本陽剛固難以噬物致養矣故有噬乾胏之象得金矢者亦剛決之物也故利於艱貞以為斷則吉本義謂聴訟得金矢然噬乾胏為兼頤象義言得金矢即利艱貞之象也古之聴訟者有金矢之罰四離體眀而能斷金矢所以得而必利艱貞則吉不貴於嗜殺受賞耳象傳不言乾胏金矢但釋艱貞曰利艱貞未光也離眀變艮眀有虧矣艱貞為利眀方得光也艮有光明終不及離眀艱貞方得光亦如離也六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也六五變无妄之九五在无妄以隂變陽為噬嗑乾健而變離眀无妄之忽得疾者以陽變隂傷其无妄之體也然无妄之疾治之以无妄故勿藥而有喜焉在本爻以隂變陽為无妄離眀而得乾健正用獄之可主者也繫以噬乾肉得黄金噬乾肉亦難噬也得黄金者決獄之利變乾為金中位黄色也貞厲者決獄之事雖正亦危刑與兵同用也而終无咎乾健離眀乃利用獄之本也何咎乎故象言其得當就健眀二卦之徳言得位有當耳玩兩爻噬肉胏得矢金是一串之辭四噬胏而得金夫五噬肉且得黄金肉胏乾者則難噬故一貴艱貞一云貞厲如聴訟者始難于決斷繼得其情斯得金耳上九何校滅耳凶象曰何校滅耳聰不眀也上九變震之上六在震上爻以隂變陽為噬嗑動而變眀震索索而視矍矍雷微而日眀也此不能以隂和陽故陽亢而雷收雲散所以征凶征者進也進屬陽故凶于是震不于躬于其隣為此散彼聚之象故又云无咎婚媾有言眀雷于他處則為聚而𤼵聲也本爻以陽變隂為震失其離眀而為震動其凶更甚于初蓋當髙位極時而妄動則取禍尤烈矣至于何校滅耳自由妄動失眀取凶耳象傳謂聰不眀因妄聞而即妄動不能寔見物理之是非貴耳賤目之人多以妄聞任耳而目不能眀察真偽取重禍者比比也此聖人為道聴塗說者致戒而修徳之士已警之于處事應物之際矣耳之聰豈不如目之眀乎非也聰必眀而後收聰眀之用耳聞言易信而用目以眀察其寔為難非用目也用心也擇善固執拳拳服膺而弗失之所以為用明也有眀方能斷也聖人示之於離之上爻用眀者於身世之間必立誠察寔為要決獄其一耳以上外卦三爻以離眀為體眀所以為斷之本四與初應為噬物故象以噬胏得金矢利艱貞吉五爻主外卦以隂柔中正變乾噬肉得金雖貞厲而无咎上則變震妄動而凶矣噬嗑根乾用陽初二上三爻為受斷者三四五三爻為主斷者外卦五爻原為離之中爻且變乾而剛健兼文明原可主通卦六爻以初上兩爻為受罰之象亦由隨來隨以初爻之動上爻之恱為内外卦之主蓋震原主初兌原主上也噬嗑繼隨隨之久而向晦入宴息必至於委靡佚樂罰不行法不立矣故仍歸罪於初上兩爻離下艮上賁賁與噬嗑相綜繼乎隨蠱賁亦隂陽畫均平之卦主隂歸於離以結上經諸隂卦焉以噬嗑繼隨下卦震不動上卦以隨之兌變噬嗑之離用眀而不用兊也其卦變彖傳云柔得中而上行愚已釋之或謂柔下行而非上行然照本義說五得中而四未嘗得中也再繹上行之義蓋指上爻言耳柔得中亦未嘗言下行故上爻亦祗言上行上即上爻也言柔下行而得中上上行而不當位矣觀下文𦂳接雖不當位利用獄之𫝊可知矣見此陽爻雖去五正位而上行居上爻然恱變為眀則利用獄矣五不言下行上不言上行省文也如必曰上上行不成文矣聖人曰辭達而已矣省文而義已達則從省文庶幾可乎賁亨小利有攸往彖辭曰賁亨小利有攸往賁繼蠱上卦艮不動下卦以蠱之巽變為離亦用離不用巽也其卦變彖傳云柔來而文剛分剛上而文柔本義謂自損來者柔自三來文二剛自二上而文三自既濟來者柔自上來而文五剛自五上而文上究無所據無當於聖人之義也且中間一分字何置之不論乎況彖傳以上句釋亨下句釋小往有攸往正為分字不同别卦言卦變籠統合一卦而釋之也損既濟來何以見分釋之義又何以見分剛之義乎愚謂仍自蠱來耳賁者飾也飾即飭也飭謹飭也飾修飾也修飾亦謹飭之意必飭為主而修飾方可外見矣則蠱壞之處皆可修飾且加以文彩矣賁之繼蠱如此而謂卦變不自蠱來乎何以言之蠱之所以蠱者上止而下虚也今巽風之虚變為離火之眀以眀飾虚則凡致蠱之處皆得眀斯皆修之而不蠱矣蠱因修飾而不蠱故其卦變以蠱下卦巽初爻之隂虚上行以賁下卦離初爻之陽實下濟所以填虚風以塞蠱之根基也故彖傳曰柔來而文剛自蠱來所以言柔柔初隂也來文剛文乎本卦二爻下居於初虚者實而蠱者修此所以為亨也彖傳又言分剛上而文柔果何所指乎指否也分剛者分乾三陽之剛爻以文乎坤三爻之柔也外坤内乾為泰乾坤交之正體象也内坤外乾為否反否不成泰所以成蠱也今仍修飾之使不蠱將以反否而隨乎泰且保泰以正乾坤之體象耳既柔來文剛而剛居初矣内外巽變為離復自否言卦變者否卦三陽爻在外分一剛爻仍在上爻分二剛爻以文柔爻而成艮以三陽爻分用之下卦得一上卦得一所謂分剛上而文柔也上而文柔即是上爻在上文柔不着上行字上原未動耳小利有攸往者漸由飾蠱而後綜隨綜隨後能隨泰以正乾坤體象之交泰豈驟可致哉此小利有攸往言其浸長之道也前云柔來文剛後云分剛上而文柔蓋文者交也柔交剛於始蠱漸修飾之事剛交柔於終賁漸完成之事故以兩言兩釋為彖傳中另例正因卦變有兩層象義也亨又何不可往乃言小利不同利有攸往者雖剛柔互交而否傾蠱修豈堪逞意肆志乎此賁言飾則不可鹵莽滅裂矣彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文眀以止人文也觀乎天文以察時變觀乎人文以化成天下彖傳首四句分釋彖辭已眀傳言天文本義引先儒加剛柔交錯四字交可言也何謂錯乎錯者剛柔正對卦無一相對也指何卦與何卦錯乎反覆求之不得姑置之可耳然則就二句柔來文剛剛又分之上而文柔從交中即可得天文之說何必錯乎且交原從泰來交方為泰不交則否否之久而蠱蠱之飾而賁一串珠也就交言文剛柔自交而文乃本乎天者也不加四字甚簡切此亦遵傳也就天文以言人文愈知天文之義矣文眀以止卦徳也剛柔自交出於天之氣化而取象畫卦立義名徳則出於聖人非人文乎人文因仰觀俯察眀剛柔相交而成自然之文所以有易所以天下有文章凡文辭章彩威儀制度皆人文也何一不本之天文乎文眀而何以兼止言人文止者文之章也文眀散而止聚之文眀經而止緯之文眀無盡窮而止有節度文眀兼止所以為聖人之文而天下遵之也聖人之文性成學者之文習得也於賁言之賁飾物也取諸一物所以通乎萬物也而又推之在天垂象之文觀於七政星辰垣宿纒度天文照然燦列矣氣化之行於地上人間者應之此聖人就天文以察時變之學也非謂占天文以考禨祥乃觀天文而眀四時也即堯典之作玉衡齊七政命官治厯以眀時也至於四時忒與不忒修人事以應天時則為觀天察時中必有之義矣然後方言人文人文者上而禮樂法度文辭威儀下而風俗歌謠婚䘮賓祭皆是也聖人觀之裁抑其過補其不及賢智使之俯就愚不肖使之仰企皆化成天下之道也化成者以教化成就之也所謂道徳一風俗同也然非一道徳何以同風俗乎以人文化成於天下必由於主極之心徳也此非乾元剛健中正者為之體何以致化成天下之用乎以此為賁蠱必修而否反為泰以應乎乾合乎坤成交泰之世也無難矣象曰山下有火賁君子以眀庶政无敢折獄象傳申眀賁之義曰山下有火賁君子以眀庶政無敢折獄富哉聖言乎在噬嗑言決獄用眀為主也在賁言眀庶政亦用眀為主也動而用眀則利用獄而眀罰勅法申眀法令使不敢犯也止而用眀修文教而不重刑罰所謂道之以政齊之以刑民免而無恥道之以徳齊之以禮有恥且格也眀庶政則是非眀好惡正矣於是舉直錯枉知也能使枉者直知而仁也知之用在仁體中所以不用眀於獄而用明於庶政以刑期於無刑也就山下有火之象言之者山髙而火下恐人君居髙位而不眀乎下情也今山下有火庶政之情無不燭照則小民之𨼆曲蔀屋之私𠂻無不洞然於九重之上矣此所以遂生復性之謀必周勸善懲惡之意共白而於政令教化之中無不寓眀罰勅法之意矣何必定折獄而後彰癉之權著邪正之途分乎象傳言此正以賁綜噬嗑不用折獄以眀文教為心也富哉其言惟子夏識之樊遲以下且不能知之矣止其眀有人文在不用動而眀也止其眀則用眀不恃眀所謂如得其情則哀矜勿喜猶未也必自知眀勅非易故刑罰不輕用眀而本於仁心則刑罰皆文徳也此義非聖人不能言初九賁其趾舎車而徒象曰舎車而徒義弗乘也初九變為艮之初六在艮初以隂變陽為賁眀其應止而止艮其趾无咎而永貞艮初之正道也在本爻以陽變隂為艮以止為眀修飾其趾也修飾其趾雖舎車而徒貴於駟馬髙車矣象傳眀之義弗乘也義當徒則徒為貴而車為賤矣貞悔二卦對爻㕘觀更切此爻可見修飾非尚儀文舎車而徒合於義則飾蠱也至矣六二賁其須象曰賁其須與上興也六二變為大畜之九二在大畜之二以陽變隂為賁有輿說輹之象乾健變離中實者虚故為輿說輹也在本爻以隂變陽為大畜象以賁其須須在靣上賁須修容也離變乾兼眀健以為賁也象傳曰與上興何也此爻乃柔上而文剛之爻須隂柔之物屬腎腎在下而須應之正是柔上興之象與者外與内應貌與徳應也男子生須為美觀非柔文剛乎以見修徳於心而萃於靣也故柔之文與徳之剛同上興耳不言靣言須則就柔文剛言須取象耳九三賁如濡如永貞吉象曰永貞之吉終莫之陵也九三變為頤之六三在頤三以隂變陽為賁頤本以下動為用變離附麗於隂而不動拂乎經常之頤理矣故雖貞亦凶而十年不用无攸往也在本爻變陽為隂為頤眀而變動其質有濡如之象義也濡者濕也賁而需濕因震動而賁不堅固如今之丹漆彩色濕濡則不堅固反多損汚也故貴永貞則堅固而成賁為吉矣象傳曰永貞之吉終莫之陵凌犯也亦損汚之謂且賁已成而無可加焉矣繪事後素賁後則無色可加慎之也以上内卦三爻離眀之體為飾蠱用眀也初變止體指所安在義舍車而徒合義即所以為飾也蠱二為内卦主爻變乾健性盡而形踐上興者徳成而義吉也三變震動方飾而動則濡如永貞斯吉皆貴於善其飾耳二為文明内卦之主爻初三兩爻附之變止附隂則吉變動不附則貴永貞以為固也六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无尤也六四變為離之九四在離四以陽變隂為賁兼眀變止何以突如其來離之隂所麗者陽今四變隂則不足收斂乎隂突來者火也所以有焚如死如棄如之凶也在本爻變隂為陽為離止體而眀用非妄用眀者賁如皤如老成之人也白馬翰如朴素之用也匪冦知非妄用眀矣婚媾止而變眀與下卦同體亦婚媾之義也六四與初正應固為婚媾之義也且止而與離相麗亦婚媾之義也象傳謂當位而疑當位者止體也疑者不眀也止而用眀適當位欲察理破疑也皤如翰如以素心相照則無疑耳明貴於誠而不尚乎狐疑也匪冦婚媾疑釋而信合何尤乎此爻象兼貞悔二卦而明其徳以取其象也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也六五變為家人之五在家人之五爻以陽變隂為賁繫以王假有家止於位而巽於徳假於有家重乎賢卿大夫而以心相假如假於廟之假也勿恤吉者不必以巽乎臣下為恤自吉也所謂忘分下交尊賢並重於貴貴也在本爻以隂變陽為家人尚賢之象猶家人也賁於丘園束帛戔戔致其敬盡其禮以求賢而佐乎賁也言吝而終吉者不能使賢自來歸必卑禮重幣求之可羞吝矣然終吉者卑已下賢未有不吉者也象傳言有喜就其中心樂善忘勢言乎上九白賁无咎象曰白賁无咎上得志也上九變眀夷之上六在眀夷上六變隂為陽為賁然取義於山變為地明之極而晦矣山之髙而為地之下矣故有先登天後入地之象本爻以陽變隂為眀夷又取乎賁之極而止乎賁則反乎素矣此白賁所以無咎也賁飾而反於白歸於本心之質如雜卦言賁无色也傳言上得志者賁之極而反乎素文之極而反於質質本素所以為天地文眀之先也故質者文之對而又主乎文者也志在於素則雖盛飾亦素耳故言志得則無行不修而無蠱不飾也賁之所以根坤於此見之不然坤黄色也艮變坤何白賁也言白賁謂止於坤之至静以御乎至動也至於飾之一字本義固言之飾無指定之物凡物皆可飾必求一物則曲禮云飾羔雁者以繢註飾覆也畫布為雲氣覆之以相見也外卦三爻艮止之體以上爻為外卦主爻白賁者反其初也故與二之賁須分主内外卦一云徳所以飾貌一云白則更無可飾也四爻五爻一為老成之人一為尚賢之君應内卦也四應初之擇義而安五應二之潜徳升聞所以上下交孚為泰者反否以飾蠱也四變離上下同眀五變巽巽以尚賢以此為飾何蠱不飾也乎故初三兩爻附二而四五兩爻附上重主爻也然白賁者賁之本也又以上爻主通卦可矣上且為分剛上而文柔來自乾者以陽為體體隂為用賁之所以為賁乎噬嗑根乾用陽賁根坤用隂矣飾似陽為用何也不知飭以飭其外美者其中也美其中則含章也用在隂也如噬嗑之用在陽而頤中有物噬而嗑之若似乎隂然用噬乃嗑即用陽矣坤下艮上剥復相綜實為一卦以一陽往反為象義也以剥繼豫以復繼謙俱主陽之卦俱根乾也剥剝繼豫者和樂之久躭於怠荒小人用事君子被剥此古今人事之通義也以天時言之陽氣盛極而隂生又漸盛而馴至於剥其理数俱自然必至者也故剥繼豫重陽以存碩果不待進至坤純隂方見復也在剥以隂盛宜主坤然剥而復之機已兆於碩果可不謂之以陽為主而根乾乎此處言扶陽抑隂斯為得矣故天地之氣無無陽之時剥夬同復姤俱無疾以為出入也主陽者隂盛主陽正以均平之也亦非扶抑也剥復二卦五隂一陽之卦亦相綜而成也上經五陽一隂五隂一陽之卦以互變交錯見象義而皆根於乾坤師比二卦五隂一陽以陽為用根於乾錯為大有同人五陽一隂以隂為用根於坤小畜履二卦五陽一隂以隂為用根於坤錯為謙豫五隂一陽以陽為用根於乾至剥復俱五隂一陽則皆根於乾矣上經之卦未終而坤極於剥乾生於復坤終乾始者以無終始為終始也是剥復者由小畜履錯謙豫言乾坤之變由師比錯同人大有言乾坤之化以泰否言乾坤之交不交以剥復言坤之終而乾之始以為無終始也乾坤者易之門也隂陽俱由之出入終始而根繼之說固絲絲入扣者也精細如此而未嘗不大眀可見易理雖易簡而至難窮焉雜卦𫝊剥爛也復反也眀乾坤之終始也復姤相對錯者眀隂陽之生也剥夬相對錯者眀隂陽之極也彖曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也彖傳釋卦名義曰剥剥也柔變剛也謙豫二卦五隂乃錯乎小畜履者也至剥而更變為五隂剥陽逐陽於極外將不􅮉有陽矣所以不利有攸往為君子謀也言小人之勢更甚於否矣何又言順而止之乎順者順乎氣化之天時而止者止於樂天安命儉徳避難乃觀卦象而用易之學也君子知消長盈虚皆氣化之自然人生所值則為吉凶禍福天行不可强也小人得志亦有運會君子安命尚乎天行當隂盛之際不與小人争競取咎唯有全生逺害明哲保身而已此君子順而止之以處剥之道也殆剥而復焉君子必更觀象而尚復之天行其消息盈虚無時停歇君子自强亦與不息所以孔子為時中之聖有易時止時行動靜不失其時之學也唯君子尚之所以君子無入而不自得焉象曰山附于地剥上以厚下安宅象傳曰山附於地為剥山髙而剥落為平地也地之大容乎山謙也山之髙附於地剥也處剥之君子順而止之者觀隂盛剥陽之象也處剥之時為上者厚下安宅觀山髙附地之象也彖象二傳固各有所取義矣然則厚下安宅皆仁心也厚下仁之用也安宅仁之體也安土敦仁安宅也仁厚為人之安宅也仁裕於心而推暨之於下厚民之生厚民之徳皆厚下之道也此為上者體乎卦剥隂極而陽生明隂陽之終始矣乾坤為六陽六隂而不言極者乾六奇一奇也坤六耦一耦也乃隂陽之本原不可謂極也蓋乾坤即隂陽兩儀耳豈極可言乎唯剥與夬乃極也剥與夬有一隂一陽在而謂之極者天地無無隂獨陽無陽獨隂之時之事之物也五陽五隂即隂陽之極矣上一陽一隂未剥未夬而下一陽一隂已生矣非剥盡方復夬盡方姤也眀隂陽者固知之言之衆矣不待愚說之贅也於剥復夬姤綜而成卦此義為尤著耳何謂剥復繼謙豫耶謙豫二卦五隂一陽隂多陽少以陽為貴為用上繼乎小畜履而錯乎小畜履之五陽一隂隂少陽多以隂為貴者也至於剥復則因乎謙豫之五隂以為隂盛成剥矣謙豫用陽以為禮樂之本禮樂貴中和也禮勝則離樂勝則流離流皆盛於隂而剥乎陽之義也必又起而為一代損益以制禮作樂矣陽又復於隂之義也以卦變言之可見地山謙陽在三爻雷地豫陽在四爻移坤於艮之下反震於坤之上則剥復也主乎禮樂者眀其體用則象傳所言柔剛之義大著矣剥不利有攸往彖辭曰剥不利有攸往見羣隂剥陽陽主進隂主退易凡言不利攸往皆言不可用陽道冒進也謙而柔變剛則虚偽而無誠實豫而柔變剛則淫佚而多宴樂象數變而義理亦如之此剥之所以繼謙豫而根於乾乎象而以仁心為修己治人之本也於是知剥不能盡剥剥未盡而即有復矣蓋人心之仁復之根源也天命之謂性者又仁心之根源而即乾元之統天者也此元存於天為天心卑之人為人心復卦言復其見天地之心乎愚謂於剥已早見天地之心矣試思厚下安宅一心之仁已流布於天下邵子所謂三十六宫都是春也剥之天行雖隂盛陽微而天心則萬古常存矣宰乎天命于人豈羣隂所能剥乎彖為處剥之君子言在下位而無權不得不順而止之也象為當剥世之上位言得時得位一念之存仁覆天下矣況我欲仁斯仁至矣即復也皆以一心為復而天地隨之矣由是論之氣化何常亦在人心之主持耳初六剥牀以足蔑貞凶象曰剥牀以足以滅下也初六變頤之初九在頤初以陽變隂為剥失其震動之用變坤靜而不能噬物自頤故有舎靈龜觀朶頤之凶在本爻以隂變陽為頤因初而象以剥床以足然蔑貞則凶得貞則無凶也象傳以為滅在下也就初位而言致剥之根蓋隂生而陽已漸消矣滅下者剥自下起已有漸深之戒如坤之初履霜而知堅冰之至也六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也六二變蒙之九二在蒙一以陽變隂為剥繫以包蒙吉納婦吉子克家者以二一陽主二隂為内卦克家之主也在本爻取象漸剥而上以辨比於足浸盛矣亦蔑貞方凶貞則弗凶也象傳言未有與者衆隂剥陽無有與陽者矣雖未及於身其害尚淺亦當凜戒耳爻象俱為君子謀各義而可合為一義六三剥之无咎象曰剥之无咎失上下也六三變為艮之九三在艮三以陽變隂為剥繫以艮其限亦指内卦外卦分限言列其夤則下卦切下體矣厲而薫心兼剥而言也薫心者下體危而漸薰於心眀其害切也在本爻以隂變陽為艮反云剥之无咎何也亦取兼艮之義矣艮三之陽變為剥三之隂言无咎者止於内卦之限弗剥也留碩果不食之陽於艮上故無大咎也象傳言失上下者正指剥去此爻則無限於内外上下皆隂用事矣失乎上下之羣而獨留一碩果咎免焉矣隂盛當防不言而喻矣以上内卦三爻坤順之體故由初及二漸剥而上至三則為内外卦限剥若止於此否卦耳尚可反泰而无咎初二兩爻皆言蔑貞凶貞即陽也隂中之陽皆剥中之碩果也何待上爻方言乎内卦以二爻為主然剥以内外五隂合象義故不必定論内外卦主總以上一陽主通卦可矣六四剥牀以膚凶象曰剥牀以膚切近災也六四變晉之九四在晉四以陽變隂為剥有鼫䑕之象小人而晉於髙位以剥陽為得意雖貞亦厲矣在本爻隂變陽為晉亦兼晉言惟晉而用剥駸駸日逼故有剥牀以膚之象焉凶者在陽乎不知剥陽之隂豈能獨吉龍戰而血𤣥黄小人亦凶可知矣象傳言切近災也隂陽相迫剥膚之災彼此分受為君子謀兼為小人謀至矣六五貫魚以宫人寵无不利象曰以宫人寵終无尤也六五變觀之九五在觀五以陽變隂為剥繫以觀我生者以巽變艮止而為觀則觀我觀民俱有定識而得觀矣就觀卦五位而言觀也本爻以隂變陽為觀以五隂剥陽至五極矣而羣隂從五又有親近於陽尊奉乎陽之象亦天地自然之理氣也周公繫爻於此舎剥言貫魚以宫人寵貴陽賤隂於隂盛極之時誠扶抑之心而實眀天地自然之理氣也魚為隂物行必貫串有此象義如宫人承寵次進羣隂奉陽何不利之有此以賢后妃之相夫理國太姜太姒足以當之關雎所以為風化之始也象曰以宫人寵終無尤也亦謂閨壺之内無尤則家國天下皆理耳爻與觀義亦相通以宫人寵家齊也而觀我生身修也身修而後以之觀民則家齊國治天下平也且刑于寡妻妻者觀型於夫至近也夫者端型於妻其始也二卦之貞悔爻相通何其切哉上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也上九變為坤之上六在坤之上六以隂變陽為剥有一陽在隂中與戰之象故繫以龍戰於野隂陽戰則兩傷故其血𤣥黄互見也在本爻以陽變隂為坤繫以碩果不食果内之仁生意存焉此不盡之陽也種而復生剥即復也於卦象傳已明其理氣矣愚嘗謂不待於復見復於剥即見復有合聖人繫易之心也聖心即天心也見聖心而天心見焉聖人之心純乎天理即仁也果内之仁無知無識而存生意聖人之心具衆理應萬事亦存天地之生意耳如此觀碩果即食之而在自在小人雖害盡君子而君子之道自在天地豈小人所能剥乎剥者人也不能剥者心也理也道也即氣化也即君子夬小人亦然故易不貴乎剥並不尚乎夬也泰之内君子外小人乃天地隂陽交而成者也法泰則無事於夬況剥乎又繫以君子得與小人剥廬者何也言由碩果之不食而留仁為種者為復則君子有得輿小人有剥廬之日也七日來復何速哉此聖人為小人戒固矣而天地氣化自然之反復來往亦必至之氣必至之理耳君子眀乎此時止時行小人眀乎此亦可以少息其害正之念矣象傳言君子得輿民所載也載者載其道也民之心各有一仁以合乎君子之心之仁君子之仁心為民心所同志合道者有不共載之乎小人剥廬終不可用亦為失其仁心與民心之仁相違暫乘隂盛之時肆害逞志豈能久乎天地之所以為天地者乾元之統也乾元之陽為天地萬物所託命其中以人為貴而民與君子共得其理氣君子又得其清而厚者也剥盡君子此理氣自在天地中自在民心中此乾元之所以統天也小人之智力能剥乾元乎故剥即為復剥不極復不速小人能知彼害之易肆而志之得逞者實速禍也則庶幾知適自剥厥廬耳以上外卦三爻艮體以上爻一陽止羣隂故為通卦主爻隂雖欲剥之而不能也故四則剥膚有凶而五則反率宫人以承寵矣至上之碩果無能食者非不能食果無能食盡陽氣也即無能食盡人心天理也此剥之以上爻為復之本也故以之主通卦焉震下坤上復與剥綜復反自剥碩果剥爛而核中之仁種之又生即復也稱名小取物大一物可該天地故為根乾主陽之卦復所謂復繼謙者謙隂徳也然卑以為髙退以為進以陽主乎隂柔而體於剛也故謙不可㕘偽謙不宜足恭皆誠以主之敬以持之是陽為隂之體謙其隂之用乎天地氣化因剥而復人事理義因謙而尊皆隂陽屈伸之為也蓋震下之一陽即艮上之一陽無非乾元所寄唯其能虚乎山之中所以能處乎地之下艮之止止於坤之順乃能反而為震起而振天道之元陽自然生於純隂中而無能剥之也此君子體謙繼復之道以處乎剥之世而隂害弗及之義象也剥復二卦極隂之盛而陽主之會歸於坎以終上經諸陽之卦合於義象眀矣復者剥之綜而反乎剥之卦也復下一陽即剥上一陽又即乾之三陽又即一奇也其主乎陽而為體為用者亦在此根於乾無疑義焉故愚說五隂一陽二卦以剥復為乾坤之終始即彖傳所謂復其見天地之心之義也復亨出入无疾朋來无咎反復其道七日來復利有攸往卦辭曰復亨得乾元而自亨也言出入無疾朋來无咎者指隂陽消長乃自然之氣化即言剥言夬藉此眀人事耳而隂陽之出入何嘗陽疾於剥隂疾於夬乎天地無心自為運行隂陽無疾自為出入不可以人事君子小人進退吉凶為隂陽之疾戾也眀矣知此則董子天地不用隂用陽用陽多用隂少之說俱不本於易即以扶抑為說而不知聖人貴陽貴隂同歸於自然者亦可以反矣隂陽之變化如此則雖朋來而盛亦非氣化之可咎者也不過反復其道而已一隂一陽之謂道反復即一隂一陽互為出入之謂也至七日而必復由姤至復七數由復至姤亦七數日者藉以記數耳或謂日者名陽月者名隂亦無據不過言七數而以日記之其實七月乃復隂陽俱如是卦辭眀言反復其道在復已兼姤言矣俱從出入無疾平論隂陽無有二義非専言陽而不言隂亦非言陽而隂在其中也若以月言詩言一之日二之日亦指月也亦可謂之以日名陽乎臨彖辭八月有凶亦非主隂言月也蓋因臨以知觀亦是於相綜二卦明反復之道臨必為觀觀必為臨如復之七日為姤姤之七日為復隂陽自反復出入無疾也君子體之當用陽當用隂而人事分應之矣何嘗定貴陽而賤隂乎然則當復之時君子得此占而利有攸往乃聖人示天下用易之學耳言氣化則隂陽均平言人事則君子小人有進退此聖人作易眀天道合人事之本義也彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎彖傳釋卦名義曰復亨由於剛反也剛反者反乎綜於剥之柔變剛也柔浸盛而變剛為剥至是七日乃復剛又以漸能變柔隂陽自然之運行本如是不足異焉其在剥之順而止者亦變為動而順行順者地道也以順為正也從乎陽為動止者也在艮則順而止在震則順而動矣從陽非從艮震也從乾元也艮之上爻之陽震之下爻之陽皆乾元之寓也動而順行則隂陽反復其道衰亦不以為疾盛亦不以為咎矣故曰出入无疾不以衰為疾朋來无咎不以盛為咎也不過動以順行而天地之氣化自然為反為復者盡於順行之中矣然則彖辭所謂反復其道七日來復乃天行也在剥則動而止之以示觀象之君子在復則動而順行但就天行言不言觀象者有利有攸往之辭原為君子觀復象立言也示之以復之天行而姤可知剥與夬皆可知焉又為君子觀天象識天行統會言之也所以先言天行而後言占者之利往也剥先言觀象後言天行令君子獨就剥觀象以眀天行而不必有怨尤之心九此於占辭眀剛長見剛由反而漸長漸長為夬至姤又反其道矣反復之復為復言亦為姤言耳復卦名也反復者出入之名也卦名藉反復以名之非専言陽復也知此則知孔子彖傳言剛長所以為君子戒非為君子幸矣末云復其見天地之心乎則専言陽貴乾元統天非隂可剥也請試論之天地無心天地何有心哉有宰乎天地者天地之心也天地者氣也宰乎天地者理也理何有心哉理無心而具於人心者天心也具於人心者人心耳何謂天地之心哉具於人心者命之自天天命人以性天地之所以為心也然於何寓而可見之乎亦寓之於氣而已矣氣以成形而理亦賦焉人物如是天地亦如是有有形之氣化則無形之心理即寓於是不於氣化見心何從見心乎惟於天地氣化見天地之心則一陽為天地人物托命之始理氣俱眀矣即乾元之資始者也乾元資始坤元順承天而資生此天地之心即天心也天心即乾元也復之一陽愚所謂即乾三陽又即一奇也伏羲畫卦以天之圓形徑一圍三者畫一奇以代之此天地之心初形於畫者也若夫復所謂天地之心則雖有理有氣而仍無形可見焉讀易者欲見天地之心盍自伏羲之一奇畫先求可見乎一部易經自此一言始萬古天地亦自此一言立也大哉聖人之言乎象曰雷在地中復先王以至日閉關商旅不行后不省方象傳曰雷在地中復雷出地而帝出乎震雷在地中勞乎坎也隂陽之氣皆起於地中此則在陽言復也先王至日閉關商旅不行后不省方本義云安靜以養微陽陽不養於動而養於靜靜者動之本也陽生於隂可見矣剥之何疾於陽哉而先王必養陽者則人事之修為以應天行以合天者則天也天地自無心成化隂陽均平聖人有心法天冬至養陽夏至養隂人事盡而天行轉應之此又天人感格之道矣初九不逺復无祗悔元吉象曰不逺之復以修身也初九變為坤在坤初以純隂變一陽為復純隂中自有復之初陽即象之所謂雷在地中也坤初以隂變陽為復仍有履霜堅冰至之戒就純隂之正義象指其初隂為示也在本爻變陽為隂為坤乃言不逺復又就純隂中示有陽之義象也在人事則為改過不吝不逺復无祗悔所以元吉也元吉又有以元為吉之義如元亨矣象傳曰以修身也固為人心言心者身之本抑知人心即天心乎修乎此而裁成輔相之功亦在於是此本卦主爻復之所以為復即全易之所以為易者而學易寡過之君子亦舍此無别義矣孟子曰學問之道無他求其放心而已矣放心來復不違仁也賢聖心𫝊俱在是耳六二休復吉象曰休復之吉以下仁也六二變為臨之九二在臨二變陽為隂為復繫以咸臨二為臨之主爻即初亦附於二連陽以臨隂也故曰咸臨在本爻變隂為陽為臨繫以休復初已復而二休養之亦連初爻為復也臨初言利貞而二不言利貞初已得正不須言貞矣復初言元吉二言吉者初之元吉即二之吉也復以初為主二附之臨以二為主初附之也象傳眀指下仁不言下陽而言下仁可見仁即陽也在天為天心在人為人心在天為元陽在人心為仁孔聖言仁實本於易於此可見矣此爻貞悔相應如此六三頻復厲无咎象曰頻復之厲義无咎也六三變眀夷之九三在明夷之三以陽變隂為復震動而變離眀南狩者動而向眀為治也得其大首不可疾貞兼復義言陽之復有漸不可以疾為貞也如眀夷之南狩既得大首新民之功亦非可遽期也在本爻以隂變陽為眀夷動而變眀兼明夷言明傷則疑也故頻復者進退遲疑之象然終歸於復而已故雖厲而无咎象曰義无咎以復為義復則不失義而无咎也以上内卦三爻震動之體以初陽主乎本卦者也不逺即復何悔之有不止出入无疾在氣化為無悔也二三兩爻不過隨初陽而動二休復養復也三頻復亦歸於復也故一吉一无咎皆為主於初陽而已六四中行獨復象曰中行獨復以從道也六四變震之九四在震四以陽變隂為復四為震外卦之主剛動變為柔順震而反為滯泥者也在本爻以隂變陽為震内外皆成震即皆成復之象矣繫之以中行獨復不止初復於下四於外卦之中亦能於羣隂中獨行成復四初本正應言獨者不必言應四於隂中變陽自成其中行獨復也象傳曰以從道也道即反復其道之道也隂陽自然之道也在四獨復則以人心合乎天行之道於復之時也與之之辭也此爻貞悔相應亦甚眀切下經解卦四爻當與此爻㕘玩六五敦復无悔象曰敦復无悔中以自考也六五變屯之九五在屯五以陽變隂為復陽變於坎中爻不能成雲以施雨矣故為屯膏小貞吉者用隂以濟陽也大貞凶者陽亢則終屯膏矣故凶本爻以隂變陽為屯在坤中爻敦厚其復敦之至復之至也无悔者敦厚為復非復之淺者何悔之有各就坎坤中爻明象眀義亦相應也象傳曰中以自考也歸重於中坤之中有柔順中正之徳者也以之自考其心仁復與否敦復與否存仁之道也安土敦乎仁正存仁之象義也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也上六變頤之上九在頤上爻以陽變隂為復以止變順順乎初陽下動上順所以致頤故謂之由頤下動上止為頤由頤也下動上順亦由頤頤象人口下動上止共成頤也然上順乎下之動方能噬物致頤故變止為順亦頤之所以為頤也厲吉者處頤之極故厲而由頤未有不吉者也利涉大川則貴於得養而有所作矣在本爻以隂變陽為頤繫以迷復凶何取乎變頤上止則失復陽浸長之道所以為迷復而凶也有災眚者復不能終復也用行師亦利涉大川之義用師之武以遂其復於終也然終有大敗者復極於陽而姤又復陽必敗於隂矣至於國君俱敗則陽之全勢俱衰也言出入無疾又言凶為人事言也至於十年不克征陽既敗則當養陽以靜不宜輕動如卦象傳所言安靜以養微陽養之久而又復以敗隂耳此就人事之反復以眀天行於復之終為君子戒復方微不可恃焉象傳謂反君道也君道者陽道也天道也至復之終而反君道將以反復為姤也故凶雖言天道而於人事之修救豈廢而聴之天乎不迷於復不反乎君道則陽浸盛矣亦保泰之義也縱天行反復為道而人心之仁則無時可迷也豈止為君者為然乎作君作師俱惟仁是以而已矣以上外卦三爻坤順之體徳皆以附陽成吉占四與初應且變震同初故為中行獨復言在外卦而變震亦能居卦中成復也五為外卦主爻敦復者用隂以培陽隂之厚陽之充也以其變坎中之陽故云上爻變艮方復而變止所以迷復必久而方復也外卦雖坤隂而在復則用以附陽成復孰謂聖人於隂陽有異視哉然則敦復之繫以為陽生之充者五爻洵外坤之主乎醫家且言土厚水深而火方充實也火虚物必土厚水壯方盛理洵微哉大易通解卷五
