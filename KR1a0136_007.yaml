body:
  text: 大易通解卷七江常鎮道魏荔彤撰艮下兑上咸上經首乾坤天地定位也父母之位已定矣繼以屯蒙長中少三男相際成卦為上經諸陽卦綱領也然雷山已肇于屯蒙風澤繼見於小畜履雷山從乎水風澤從乎天中以需訟師比水天天水地水水地四卦間之不外天地與水初立義象交以泰否而後以同人大有天火相綜天地水火四正之卦位已定矣是天地水火為上經之主卦而山澤風雷為下經之主卦也故下經首咸恆澤山雷風二卦相綜而先天四隅之卦位亦定焉所謂山澤通氣雷風相薄也俱由先天八卦推衍而敘上下經之卦文王之易本於伏羲此尤明著耳山澤通氣以氣為通即以氣相為感應也山之地氣通于天雲膚寸而生不崇朝而雨遍矣是山通於澤也澤之天氣通於地而水出髙源即澤通于山也山澤之相通即天地之氣相通也然天地一氣耳謂之相通分為兩儀矣而究之合一則無一不二無二不歸于一氣如是理亦如是焉是以兑為少女艮為少男相合為咸震為長男巽為長女相合為恆上經三男相繼於父母之後成卦者今且相配成卦于下經矣倫常日用乃易之至理也故曰易簡為易咸以山津通氣取象立義命卦名者兑在先天八卦之東南艮在先天八卦之西北澤歸于東南山髙于西北其通氣乃合六合之大以通氣一山一澤之通氣在合天地山澤以通氣之內矣西北天陽氣盛山陽在上東南地隂氣盛澤隂在上然山之下二隂即兑之隂地氣也兑之下二陽即艮之陽天氣也故曰山澤通氣即天地通氣而已咸通氣氣陽也根乾咸之為卦主學言則以艮之內虛為量而以兑之外悅為古今嘉言懿行可以悅心研慮者受盡天下之亹亹不倦也主德言則以艮之止為知所止而止於至善以兑之悅為安于止而不遷悅之深樂之至也以應事接物言則以艮止為感主乎靜以御動以兑悅為應感以靜止立誠應著為悅孚明信也為感為應皆以誠信正其感應與咸之道合也咸亨利貞取女吉彖辭首繫以亨者相通則亨也不言元氣即元也元即氣之相通者也利貞者戒示占者相通之道貴于貞也澤山出于氣化之自然而人心之相通亦貴於無心皆以天理為通不尚乎私意參之矣又云取女吉因卦象而前民宜于男下乎女娶柔悅貞靜之女斯吉耳先言亨者卦之理氣自然得亨也繼言利貞者為占者示戒也後言取女吉者取象于卦之體德為用易之君子審所宜從也取女之義總以用隂靜以為感貞以為應也彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣彖傳釋卦名義曰咸感也咸之字義莊子所謂咸周偏三者異名而同義然有心以為咸則彼此相感之道也感固非可有心于私而天理之在中者亦以心相通理相孚方成感耳兑體之柔而在上卦地隂氣上行也艮體之剛而在下卦天陽氣下濟也天氣下濟矣因上感于兑兑應之而雨露降地氣上行矣因下感于艮艮應之而水泉出此兑艮互為感應而以隂陽之氣相與也此天地隂陽自然之感應而無心成化也若夫卦德以艮之止為陽求隂之專以兑之悅為隂從陽之豫故艮少男下兑少女而咸感焉此人事有心之感應而無私以正倫也在天地無心在人雖有心而無私仍同于無心之天地感應矣是以咸無心而成感得亨尚乎利貞以取象義於取女則吉也推之天地隂陽寧止山澤為二氣感應相與乎乾父坤母之二氣相與為交也乾資始而坤資生乾知大始而坤作成物萬物何一不化生于天地二氣相感之中哉聖人用易亦不止于男下女而正倫于內也將以此誠求于好逑者之心誠求乎天下人心以一心之誠為感而天下人心之誠無不相應人已彼此一心相與以誠而天下之人心俱和平矣就男女言者男女大欲人所盡知故先以此啓發其端耳蓋誠者中也中立于內發而自得至和一人之心中和而天下人之心和平不外一理以相通而氣亦從帥矣和平兼理氣而言合知賢愚不肖而一之也于是觀天下人心之和平而知聖人之所以感人者至約而所該者至廣大也天地雖大萬物雖衆而其情則不外中和耳聖人以中立體以和致用致中和而天地位萬物育矣莫不由人心之中和者為感天下人心和平之本而天下人心之中皆來相應是人已俱和矣此即天地萬物之情也傳曰天地萬物之情可見一心推暨之外奚容有他道也乎天地萬物中無論有知無知皆有性有性則有情有知之性情以誠通之而自得其和無知之性情以誠主之而各得其所得和得所乃太和也一誠立于心而天地萬物之性情以一貫之矣此聖人之功能也賢人君子未能以誠為貫先必存忠行恕亦是因一心而推及于天地萬物久之義精仁熟忠恕與一貫何異乎此感應相與之道俱兼理氣而言方是易之天德王道精粗本末全學也象曰山上有澤咸君子以虗受人象傳曰山上有澤咸就山氣下通于上而為泉之始達明象義也君子體之以虛受人虛者隂也受人者受人之益以實之主乎隂以為德而資乎陽以為善也兑澤之隂在上泉之所以上出也艮山之陽在下氣之所以上升也君子虛其內以為受之量悅于外以為受之方而人之以感為應者皆其集益于君子者也受善之方甚𢎞而容善之量愈擴者隂德也以兑悅著于外樂取于人為善也以艮止主于內執其兩端用其中于民也惟舜之德足以當之君子則希聖而勉企焉可乎初六咸其拇象曰咸其拇志在外也初六變為革之初九在革之初以陽變隂為咸革之初而用黃牛之革以鞏固之因變艮為止之義而不即從革黃牛隂物變隂故象之焉在本爻隂變為陽為革為咸之初以拇象之拇之動也以變艮為離也感自外來心動而足之拇先動矣象傳言志在外亦就心感而動言拇也在外指外卦兑為少女也貞悔二爻以變卦艮離取義初爻咸拇不言凶吉在咸初動而感動于吉凶不可知故不繫焉六二咸其腓凶居吉象曰雖凶居吉順不害也六二變為大過之九二在大過之二以陽變隂為咸兼咸義而有士夫女妻之象濟乎初隂而不為過也故象亦言相與即咸之相與咸之相與不過隂陽交而已矣在本爻以隂變陽為大過繫以咸其腓凶居則吉者二之動動于九三腓隨股而動是附于九三也咸以澤山通氣感應相與二原附于三為止體也今變巽進則股動腓應是以凶而不妄動以居貞則吉應矣卦辭謂咸亨必利貞貞則居貞吉也象傳曰雖凶居吉順不害也順者順乎止也變陽則為巽氣行而散不順乎咸之澤山相感矣必順而無害于通氣成澤方得吉耳腓本不動之物不動則吉順其體象之謂順也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也九三變為萃之六三在萃之三以隂變陽為咸變順為止萃而致嗟無攸往矣然往而應陽可無咎也特非正感應故小吝在本爻以陽變隂為萃變止為順股動而全體皆動故有執其隨之象山澤通氣變坤而不能通雖往亦吝也言隨者謂本卦下二隂爻股動而拇腓俱隨之是三之執而強其隨也可見不能上感兑而為應何也用強則人心不和平也是以雖往而為感亦有吝也象傳曰咸其股亦不處也三在艮之上爻與澤為鄰原有動而感澤之象義故象以股股非不動之物不必定止矣故曰亦不處也然內卦為感而志在隨人在艮非止德在男亦不宜蓋艮以止為感也志在隨人失其志而所執斯下矣傳意又以執志為執然執志為隨已之志既在隨必強人為隨矣爻象亦無異義爻就艮全體言象則言三之志變陽而失其本也此爻貞悔以附陽爻為義相應九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九四變為蹇之六四在蹇四以隂變陽為咸往應五而蹇來連內三爻而可濟蹇矣亦感應之道也在本爻以陽變隂為蹇兑體隂道應人之感貴于貞吉而悔亡矣若不貞則心無定悅憧憧然為往來思將朋從矣朋衆也謂衆念紛至皆由爾之心思不能主一無適也象傳曰貞吉悔亡未嘗因感而害正應之道也惟其憧憧往來中不明于正應之宜則感應涉于私而不為光明正大之道矣此貞悔二爻俱以審慎而求正應為義貞吉悔亡似害于感不知無害于感且有益于感也何也貞女乃人所樂求求而得之必有益也九五咸其脢無悔象曰咸其脢志末也九五變為小過之六五在小過之五以隂變陽為咸震體變兌雷之升而成雲欲致雨也密雲不雨自我西郊同于小畜之卦辭者亦貴畜隂以成雨也又云公弋取彼在穴六五公象取物在穴用弋取彼髙外之陽入藏于穴以成小過陽主于內之象義也有陽主內則小過而不為過且遇之矣在本爻以陽變隂為小過兑變震恐其動于私感人或苟悅為應矣故象以咸其脢背肉不動同于艮其背守貞而不輕為感應也惟不輕動乃可以無悔也象傳曰志末也與初爻傳言志在外同下艮所以感兑上兑所以應艮也五之咸脢不應志在應下卦也必感而後應故不輕應也此以內外卦為感應而與五必應二初必應四之義不同貞悔二爻小過以變陽應用隂為義本爻以變隂以成兑而不應為義俱以變象立辭上六咸其輔頰舌象曰咸其輔頰舌膝口説也上六變為遁之上九在遁之上爻以陽變隂為咸繫以肥遁無不利乾變兑而悅于遁也在本爻以隂變陽為遁繫以咸其輔頰舌悅在輔頰口舌而不在心無誠意以為應矣變乾何以無誠乎以兑之上爻為口變乾則健于口而鈍于誠矣象傳曰滕口説明言者雖心之聲然不由𠂻之談則不可聽以害感應之正也此爻貞悔以得悅心而遁為合義以不根心而口舌求悅人為非義俱本乎心以為通也本卦山澤通氣相與而為感應無取乎變動蓋感應者心之誠也心誠則一何取于變動乎變動則渝其誠矣故六爻俱以變致戒以不動變為守貞而吉也男女大欲不惟女道當貞男道亦當貞也惟男道求而下之者得則女道應而來者亦必正所謂刑于寡妻乃正身所以齊家也咸之主卦其在艮而兑乃附之成卦者乎內卦三爻為感然艮止也自然之感不貴有心而動于私意也初爻咸拇必動吉凶不可知但感必先動傳言志外亦有不能靜止為感之意矣二爻艮腓隨三爻股動腓不動隨陽而動則凶居于靜而不動則吉三爻艮股陽臨于外卦性動而物來交誘必動如股且強拇腓俱動是以往吝在感則必動亦不以處而不動為貴惟隨人而動則所執下矣初二兩隂爻隨三爻成艮何謂隨人蓋隨乎外卦之兑悅而動則不能以靜感失止之義矣在內卦艮主感以靜止為感妄動則非義如此外卦三爻為應卦四爻戒以勿亂應必從一貞吉悔乃亡若憧憧往來之應朋從爾思失守一之道矣象傳言貞吉悔亡原不為感害不輕應而自有感者至也何必憧憧往來以致不光大乎五爻咸脢竟無心應感而亦悔亡象傳言志末也言雖脢為背肉無心之體而不應中自有定志在于感來方應不役役于感應也上爻以輔頰舌為應應于面貌言辭者耳亦不言吉凶象傳曰滕口説也以巧言令色應人何足為應乎咎吝不待言矣外卦三爻言應以正應不苟悅為義此卦感必艮德以靜止而自生感應必兑悅內堅其志不尚憧憧之思不事巧言令色心感而自為應俱用隂而體陽也與恆分根于乾坤而合天地自然感應之德恆久之道所以立為下經之首以正四隅經卦澤山風雷之位此卦上下卦相與以成感應三上兩爻雖分主兩卦然俱以申戒之辭主之艮之感非志隨人兑之應非滕口説則得乎正道而足以主兩卦矣巽下震上恆咸卦山澤通氣也根于乾以艮陽通澤故主陽也恆卦風雷相薄也根于坤以巽隂薄雷故主隂也各有體用焉咸兑下二陽與艮上一陽相比成乾恆震下一陽與巽上二陽相比亦成乾咸中三陽在兑二在艮一恆中三陽在震一在巽二俱中貫乎坤而一主乾一主坤者咸中三陽居卦之中應乎心中之陽則主性體也恆中三陽居卦之中應乎心中之隂則主道用也性隂而為體立誠則主陽道陽而為用主利則主隂所以咸根乾而恆根坤焉山澤風雷四隅經卦無所繼根乾坤即繼乾坤耳恆風雷相薄也隂在內陽來散之為風隂在上陽起而沖之為雷故曰相薄然皆陽薄隂也何謂相薄蓋天地間本一氣雖分隂陽兩儀相對其實陽為主而隂附之隂氣聚者在內陽氣自外來則為風隂氣聚者在上陽氣自下起而為雷雖云薄之而陽為倡隂為和也復之所謂出入無疾也不可謂薄為擊摶之義乃屈伸往來也惟相薄而後隂氣聚于內者陽散之而隂氣平矣聚于上者陽沖之而隂氣和矣于是聚乎風之陽者為雲而散乎雷之陽者為雨風雲雷雨和平應濟故風不嗚條雨不破塊雷不擊摶雲不空密雨晹時若萬物樂育也此亘古不忒之氣化恆之所以立卦取象明義也雷風合而為卦乃以長男配長女與咸之少男少女相綜而繼乎乾坤父母成家繼業者也少男少女配重在感得其正長男長女配重在久于其道也道者一隂一陽之謂天地父母隂陽男女萬事萬物不能外者也久于其道以為恆易之所謂易簡得而天下之理備矣歸其任于長男長女者繼父母而任道者也此風雷為恆與咸相綜以合乎山澤通氣風雷相薄為下經三十四卦之宗故首乎下經也恆亨無咎利貞利有攸往象辭恆亨恆無不亨之理氣也先言無咎而後言利貞者能恆則無咎而所以能恆則利于貞也利貞則利有攸往矣恆原以貞為恆即無所往亦亨而無咎此恆之體也但有體斯有用貞則往而利可知矣卦以雷風相薄而成象雷之陽在先天八卦之東北巽之隂在先天八卦之西南一陽生于震一隂生于巽由震而乾而巽由巽而坤而又震循環無窮此所以為恆蓋就先天八卦而取象立義繫辭也咸以無心而成感恆以有心而能久二字皆從心是咸之無心乃無私心而恆之有心乃有恆心也彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣象傳釋卦名義曰恆久也其所以為久之義在天地則自然之氣化無始無終在人則書所謂隂隲下民厥有恆性也此天時人事之所以能久也就卦體言之震之陽上升剛即在上卦巽之隂下入柔即在下卦如天之在上地之在下一定不移之位象乎恆也然天地之位自上下其氣則無時不通無處不通特不可見耳可見者在于雷風雷自地起而上于天風自天來而下于地就雷風相與而天地之氣相通可識矣既云相薄何云相與薄者鼓蕩之義也雷以鼓風風以蕩雷雷鼓風而隂中之陽氣宣風蕩雷而陽內之隂氣和所以謂之相與也在咸亦言相與山澤之相與以靜而咸卦以感而動為相與風雷之相與以動而恆卦以歸于靜為相與故山澤之氣無所見聞而潛通風雷之氣衆聞衆見而明薄此又卦德之止而説巽而動之不同理在而氣即隨為動靜矣是咸以靜體相感應其感應即動也恆以動體為恆久其恆久即靜也此所以二卦象傳咸言二氣感應以相與先言靜而後言動也恆言雷風相與剛柔皆應始言動而終歸于靜也聖人之傳非細心究研其精義俱不明也若但以二卦之六爻相應為剛柔皆應則亦明而易見者矣二卦氣化如此論于恆卦則人事之體會不可不久于其道矣道在天地一隂一陽道在聖人率性為道道在賢人君子日用經常之間須臾不可離者是也能久于此道即亨而無咎然必貴乎利貞方合乎天地之道恆久而不已也惟至誠自然不息聖人體天之學也君子則自強不息而已又言利有攸往者亦本于天地之道即始起于震而終于艮又始于震之道也此亦奚往而不利乎再推言恆之為道于日月四時日月亦隂陽之氣成象于天耳得天地恆久不已之道則能久照也四時亦天地隂陽之氣化流行者耳雖其變化神速莫測然自有至恆久而有成者一之也故四時極其變化終不外久成之道以主宰之斯能久成也聖人觀于日月四時以立天地人三才之極亦惟久於其道天下自化成矣聖人備德于一心著德于一身家國天下無不以齊以治以平此合盡人盡物之性以全乎自盡其性之道也性為恆性道亦為恆道成已成物無二性即無二道此聖人體易用恆之實學也故觀于恆之為義而天地萬物之情不亦昭然可見乎在咸言見天地萬物之情以心與心通理與理合人之氣自與氣相和也在恆言天地萬物之情則心常具此心理常存此理氣常和此氣恆久之道自恆久于無終始矣天地萬物無窮盡聖人雖有窮盡而自有無窮盡者道也此所以為天地萬物待以成能而位育之也以此言聖人之情其情亦昭然矣象曰雷風恆君子以立不易方象傳曰雷風恆君子以立不易方似以君子之不易者立雷風至變易之體矣雷風至變無常所以為雷風者恆久而不已也君子體之以立不易方方地道也君子崇效天之圓而動者以建德體乾健以自強不息也卑法地之方而靜者以制行體坤順以直方大不習而無不利也立不易方即直以為方而至大也不易者本其直方大之道以為自強不息也象傳何取於恆而云方乎亦就先天八卦方位而起義上經四正之卦既立矣下經首咸恆而山澤風雷四隅之卦繼立四正四隅俱立而地之方象成矣君子立不易方兼取象于洛書也不然恆無坤之體德在卦何所取乎初六浚恆貞凶無攸利象曰浚恆之凶始求深也初六變為大壯之初九在大壯之初以陽變隂為恆兼取恆下卦巽進之象而為壯于趾在初則言趾也以壯而征凶之道也又言有孚者有成心于壯也在本爻以隂變陽為大壯兼大壯義繫以浚恆巽進變剛健深求于恆之道不在日用行習之常而為索隱行怪之人也故貞固而凶也是以無所往而利恆則亨而利有攸往偏僻非恆則何往利哉象傳曰浚恆之凶始求深也方恆之始即求過深之道以為恆常凶可知矣九二悔亡象曰九二悔亡能久中也九二變為小過之六二在小過之二以隂變陽為恆止而變巽是進而小者過矣然小過以中陽為主二變陽而附之不為過矣故有過其祖遇其妣不及其君遇其臣之辭過而得遇可無咎焉在本爻以陽變隂為小過巽變為止恆之道動宜反乎靜止正所以為恆也雖小過于靜止亦不為過也故係之以悔亡吉凶悔吝生于動止而不動守恆也何悔之有象傳曰能久中也九二之中所以為久而能久止于中止于至善而不遷也悔之亡也固宜九三不恆其德或承之羞貞吝象曰不恆其德無所容也九三變為解之六三在解之三以隂變陽為恆變巽為險巽柔道也故遜而負險剛道也故驕而乘致冦至必矣在本爻以陽變隂為解變險為巽忘于守而貪于進矣所以係之不恆其德也德不恆而或承之羞雖貞固而亦吝也恆以風雷相與而變坎不相與所以為不恆其德至于貞吝向來不過言雖貞亦吝愚謂三之貞吝祇是不貞蓋貞乃貞而正也又有貞而固也貞而正者無此辭貞而固者未必中也三之貞吝非此二者其所謂不恆其德而羞承之者有貞而自變為吝之義也即他卦爻有如此體象者貞吝貞凶之義亦宜細玩而求得所以繫之之意不可但以雖貞亦吝雖貞亦凶了之也象傳曰不恆其德無所容也亦就卦體象以言恆之為德巽而動也進德之心與造德之功合內外而交勉也今巽變險故不恆其德且進德虛心也不巽而恃險中有所恃何能容乎咸之虗受以象山下之虗也恆之進德以象巽之下虗也虗者不盈盈者不容此象傳之所示也恆內卦三爻初乃索隱行怪者三乃半途而廢者惟二之悔亡庶幾恆道象傳曰以中能久其遵道而行不能自已之謂乎九四田無禽象曰久非其位安得禽也九四變為升之六四在升四以隂變陽為恆以坤順變震動象以升岐山而享帝以盡其誠意誠者升之本也在本爻以陽變隂為震動變坤順則巽動相與之義象俱失矣四為外卦之主變隂而求禽于田斯不得矣田有禽恆道也變則無禽失恆道耳象傳曰久非其位安得禽也動而變順似乎得地之靜正矣然四主外卦雷風相與乃為恆也若但靜順不動以為久雖久而非恆之正道則為非其位又安從得禽乎禽陽物也田地類也守靜順以為恆失震動相與之義則田而無禽何以為恆乎此爻是怠廢之人自以為恆而非恆矣震卦以四爻一陽為主不動變順何以與風相與乎六五恆其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也六五變為大過之九五在大過之五以陽變隂為恆兑悅變為震動動求濟隂于上爻故有士夫得老婦之象老婦不能濟隂而大者之過不能返無咎無譽而已在本爻以隂變陽為大過震動變兑悅不動而悅乎恆亦不能合雷風相與之義也所以恆其德雖貴于貞然若婦人之貞貞而固則吉若夫夫子則以動為恆不以悅恆不動為恆也動而合巽巽進其心振動其功此所以能久而得常道若夫執固不回以為恆者自悅其恆而不動以隨時雖為恆德而貞亦非時措咸宜之恆也象傳曰婦人貞為恆而吉者從一以終之義也夫子則制義者隨時隨事各有義在無適無莫義之與比可也若從婦道之固執于一則不合于義亦不合于恆矣凶何疑乎觀此爻象知貞之為義有二説貞而固不為盡善貞而中乃盡善也此爻乃固執執一之人亦不足以言恆上六振恆凶象曰振恆在上大無功也上六變為鼎之上九在鼎上以陽變隂為恆得玉鉉之象吉無不利之占玉者陽體而隂用合于以陽變隂之義故吉無不利是居上位而剛柔相濟者也在本爻以隂變陽為鼎何繫云振恆凶乎恆之相與原有往來上下之道惟上隂足乃能畜陽致雨今隂變為陽振而散之雷變為日何能與風相與乎小畜之五屯膏大貞凶亦惟隂不足不能畜陽故膏不下逮大貞愈凶本卦上爻亦畜隂致雨者變陽而振作失恆所以凶也與鼎上爻言隂陽得濟之義相反正相通也象傳曰大無功正謂不能致雨則空雷無雨大旱之兆也何有及物之功乎此爻似妄動失恆之人恆卦六爻象六種人惟二以靜守中道為悔亡而得久于恆初則索隱行怪之異端三為半途而廢之惰士四乃耽于安佚為恆者五乃誤以執固為恆者上乃妄動而不能守恆者明示其得失使學易者知所宗焉恆卦內巽三爻以初爻主卦外震三爻以四爻主卦亦俱不得吉占者同于咸之示戒以主之也九二原以附初剛柔相濟而能久中九三則鄰于外震之動陽爻隨之易動亦因不附初隂而不恆其德也六五恆德而夫子凶者正因宜附四陽而動不動則非恆必凶矣上六振恆不附四陽乃變離明恃明妄動非動之正故大無功然則恆之初四兩爻仍主內外卦者也但咸恆二卦原以上下兩卦相與取象明義故卦之德體重而爻之為主不必專言之矣又與别卦稍異同也艮下乾上遁遁卦謂繼乎上經尾卦之離者天山俱陽惟有隂柔文明之德乃能于陽未衰之時隂氣潛伏駸盛審機察變預知當遁而早遁也皆藉乎離明用柔麗剛方能識剛柔消長之道諳進退機宜也故以之繼離以用明審遁焉遁大壯二卦相綜而成皆四陽二隂之卦也遁以二隂生于下為六月之卦大壯以四陽進而上為二月之卦一以隂浸長將致否而當遁一以陽大盛將成夬而戒壯聖人為君子謀時在彼則避之時在我亦當謙讓未遑焉甚不貴乎尚氣節標名譽黨同伐異與小人爭小而一身被禍大而君國同敝也此遁壯二卦一嘉肥遁一示用罔也二卦皆以隂少貴隂故示君子以用隂也然既以初二兩爻為隂盛將致否矣何復用隂乎二隂盛而遁者運會以成時世也隂少用隂者易卦象義君子學易以寡過之道也易如此者多矣在人體會所謂神而明之存乎其人也二卦隂少用隂固然矣序卦序于咸恆之後者天有隂陽人有邪正君子知天知人無非感應也感應之道即恆久之道氣雖消長理有一定君子明理御氣而守此恆也大壯用隂易知遁亦用隂小利貞者隂道也遁亨小利貞象辭曰遁亨小利貞當遁而即遁以遁而得亨也小利貞宜善體會君子當遁之世必不得志行道明矣其潔身而退雖以貞為利亦道之小者耳非人已兼成之大道也小利貞之義也然又必有坦坦幽人之懷而無悻悻小人之態如孔子之以微罪行孟子之三宿後去不欲使君相被逐賢之名而以守道全義得正此以利貞之道隱其用于小者亦小利貞之義也彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉否屬世運故示以小人不利君子之貞遁主于已故示君子不當顯大其貞惟利乎隱約其貞此二卦微異處彖傳釋卦名義曰遁亨遁而後亨君子之道隨時為進退行止皆亨也何以遁之時宜遁而亨乎剛強之主當位而與六二之隂柔小人應所謂武人為于大君之時也在履用剛而慮嘻人則不遁必凶明矣况小人之結君方固有執用黃牛之革莫之勝説之象豈君子在位預政之時乎所以與時之氣運同其升降以為汙隆君子之行也以時行也或謂卦之二五兩爻隂陽正應何作此解請以傳證之傳言剛不言中何也外卦即剛健中正之乾五也獨言剛當位而應則遁卦之九五雖乾五至此時隂柔小人同氣運而盛不可執乾五之體德以取遁五之象義矣此象傳之一證也再傳言與時行也正見是君是臣為應正為應遁之時君子非好行也與時行而不得不遁矣若是剛健中正為君而應二柔順中正之臣何以取與時行之義乎此又一證也不必言文王名卦繫辭何意求彖傳而可知也小利貞者又言浸而長也言小人乘隂氣而浸長君子之貞將如否之不利矣否以小人忌君子之貞故示君子以不利貞正欲君子以小亷曲謹示其貞而大道自晦盛名不居耳豈君子可不貞乎與此隂氣小人浸長示君子以小利貞同一義但辭微有不同耳蓋君子之貞雖以小者遵養時晦而全身者正以全道也不致身亡道廢或可徐俟陽有復時運有泰時尚可以此身此道匡君定國使天下得拯其難被其澤也則遁之時義豈不大矣哉况隂陽消長天道反復至常之道君子不以一身與天地爭勝時止時行不失其時乃君子先天弗違後天奉若之大道也非精義入神以致用豈能隨時合義如此乎遁之時義大者正君子之道大也乎象曰天下有山遁君子以逺小人不惡而嚴象傳曰天下有山遁之所也固然聖人取象寧止是乎天下有山天之陽氣入貫乎地者遁藏于山矣正合君子退藏其身于山林幽僻之象也君子必體此不待否而儉德避難不榮以祿也先已逺于小人矣逺之有漸則形迹不存而已超然俗表此即待小人不惡而嚴也此句為偽君子藉口便私者多矣不知不惡而嚴之義全在逺字若與小人共朝事主同時為政而曰逺小人果可得而逺乎縱逺之而彼必來親近容其親近則非逺也非嚴也峻拒之何以為不惡乎于是進退失據且有同與小人之利祿而自立君子之髙名者亦有不亡君子之朋而遐遺小人不録者小人從此窺其微矣乘隙肆害未有不一網打盡豈遁之為義如是哉故必遁而逺去且不待否之時早已鴻飛冥冥矣善會逺字則不惡而嚴嚴在自已克治也不惡在待小人與之出處各途何自惡來加哉小人雖天資刻薄曽未聞過求局外之君子能以逺為不惡則其律身之嚴亦小人所樂服也不然朝夕共事志在不惡未有不同流合汙矣方自謂曰此君子之不惡也寧知所謂嚴者將不可自問矣初六遁尾厲勿用有攸往象曰遁尾之厲不往何災也初六變同人之初九在同人之初以陽變隂為遁繫以同人于門初能出門而觀望應同與否非徑情直行可知正兼同人與遁而決去否也故無咎在本爻以隂變陽為同人繫以遁尾厲者遁在下而隨人為遁可也君子皆遁則亦遁也雖遁遲則危矣然在初遁而尾也則可也若不遁而往則斷不可勿用有攸往之時何往乎遁而尾于人亦兼同人為義矣象傳曰不往何災雖遁不必先而往則正宜慎耳初爻隂柔隨六二為近小人之象也故變同人為君子則尾之可以遁矣不然亦不可隨小人而往繫辭象傳皆明乎貞悔卦爻之體象方以為示也六二執之用黃牛之革莫之勝説象曰執用黃牛固志也六二變為姤之九二在姤二以陽變隂為遁繫以包有魚隂類雖微然方長則已可謂富有矣守此隂道于姤之時亦何咎惟不利及賔賔者客也進而干陽如兵之道以客犯主則不利也戒隂不可浸長于隂生時也在本爻變隂為陽為姤乃遁卦之二隂盛長而成象所以致遁者也况以隂變陽為姤得中位獲嘉遇乃小人足才智又得時居位者其用術以固結其君心如執用黃牛之革維繫之堅定莫之勝説也隂變陽必外用經術內實嶮巇又復固執不通極似王安石之于神宗焉此時此人用事君子不遁有吕惠卿章惇繼之為紹述之説否宋朝而害黨人觀宋史自神宗至徽欽亡北宋如前車焉象傳曰執用黃牛固志也固君之志而先自固其志用黃牛之革以固結君臣之交即以固結要君之志也小人讀書如四海之外有英雄非福也明矣此爻象舊作尋常君臣遇合如照别卦五二正應五陽剛中正二柔順中正其交又如此堅固則君子何為而遁聖人何故名遁俱不深思依樣畫葫蘆何不取象傳所謂剛當位而應與時行也之義與相證耶九三係遁有疾厲畜臣妾吉象曰係遁之厲有疾憊也畜臣妾吉不可大事也九三變為否之六三在否三以隂變陽為遁因遁陽變為隂君子而忽從小人包羞如何且在否而不能上從君子為羣小所狎昵亦包衆羞以為已羞之義此爻正由遁成否之主爻故否之三爻在正邪之間持兩可之見此里克之中立後人之言調停者也在本爻變隂為陽為否反否為遁雖非小人亦未能用君子而遁也何也以在內卦近于二隂不如外卦之陽言遁即可遁也所以繫之以係遁似有疾之人不能遁所以危厲也然能善撫同類之人使之不害君子則此爻為一陽止二隂如臣妾然豈不在小人中為君子之干城吉之道也此其心先亦同于君子矣三爻艮體變順恐其順于隂而成否故姑許之以一陽止二隂也止于艮而不令二隂得肆其志如臣妾之隂道聽命于三之一陽未嘗君子小人不共蒙是人之福也吉何如也象傳曰係遁之厲如有疾之人力憊而不能行以其止于內卦而不能遁乎朋黨也畜臣妾吉者僅能使不害君子豈能反遁否為臨泰乎傳所以謂之不可大事也不可大事又小利貞之一義也君子之遁固貞之小者小人不害君子亦利貞之小道也一言小利貞而全卦之義該之矣以上內卦三爻艮體以三爻主內卦初尾遁已厲二則致君子之遁為小人之得時者三以一陽止二隂如畜臣妾雖係遁疾厲而亦吉也內卦二隂下起而君子遁故成遁卦三能以一陽止二隂是以仍以此一陽為內卦主爻也九四好遁君子吉小人否象曰君子好遁小人否也九四變為漸之六四在漸四以隂變陽為遁以漸而遁故雖漸于木而得桷兼漸言遁則必有所安處焉往而不得貧賤乎在本爻以陽變隂為漸係以好遁漸而遁不至彰名露迹心誠好遁而識髙智逺矣君子取象好遁則吉若再不去小人必進而成否矣然小人固安于成否豈肯遁乎兼二義亦不妨象傳曰君子好遁小人否也似與後説相合然小人必繼此而成否其説亦通九五嘉遁貞吉象曰嘉遁貞吉以正志也九五變旅之六五在旅五以隂變陽為遁乾變離而取雉象也一矢亡者兼遁意謂雉得而矢亡貨利去而賢人來也終以譽命則奬進善類惟其明能燭之健能斷之耳在本爻以陽變隂為遁乃剛以當位而受小人所錮蔽者惟欠明也變離而明斯可以辨賢姦矣故係以嘉遁嘉彼遁者以風有位所以進賢逺姦必有奬譽之後命矣故戒之以貞吉如此之大貞何不吉乎象傳曰嘉遁貞吉以正志也正對六二之固志言六二之隂柔結其君之心志至此君能嘉遁則邪正既明且可正二之邪志矣君能自得其貞而中正者則邪忒之志自消彼小人之術何從入而相恭乎故正君心為人君之要而格君心為大臣所難也上九肥遁無不利象曰肥遁無不利無所疑也上九變為咸之上六咸之上爻隂變陽為遁繫以咸其輔頰舌恐其悅體而尚口以口舌感人也示占者貴于心感而不重巧令也在本爻以陽變隂為咸繫以肥遁無不利恐其乾體健于行而未必悅于心也明肥遁者以德潤身心廣體胖則不為山澤之癯也心悅身遁樂以忘憂此所以無不利也孤雲野鶴何天不可飛乎象傳曰無所疑也無疑則信理之至知命之真而樂天之樂大矣陶靖節歸去來辭曰復奚疑得于易遁上之象傳乎坤之利貞利牝馬之貞凡小貞吉小利貞即坤卦利牝馬之貞也全部易皆自乾坤出故根坤之卦爻每示之以上外卦三爻健體君子之類當遁異于小人之遁也故四好遁變巽而用柔以遁逺小人不惡而嚴也上六肥遁變兑而樂天知命也五當君位不可言遁變離明健之德能嘉奬君子之遁則不為小人所惑可知故繫之貞而得吉此五所以主外卦而為遁卦之主爻也合內外言之五天也君也一念嘉遁得正而遁不成遁故五又為通卦主爻焉乾下震上大壯大壯與遁相綜四陽盛長二月之卦聖人于隂陽之浸盛皆有以調劑之使歸于中和或以抑隂或以退陽無毫髮之偏倚也知此可以學易大壯愚謂根于坤隂少貴隂當濟隂為和平故根坤焉同遁皆繼乎上經尾卦之離者雷天俱陽非有隂柔文明之智以維之則壯往而不可止矣况雷之迅烈天之髙逺非火在地則雷不升非日在天則天不明故繼離而為大壯所以用隂以濟陽陽不壯則天陽不亢而澤時降雷陽不震而隂氣無傷也此皆繼離之義象也故大壯之時守必以靜者隂道也守天下國家者不外守一身一心而已用壯用罔方寸主之隂陽于此和平天地萬物無不調劑于君子矣大壯利貞彖辭曰利貞大壯陽壯壯則不中不中則非正利貞者示必中而正之道于陽德也且利貞二德在乾文言首明之以該六十四卦矣元亨陽而利貞隂也但言利貞而不擊以元亨大壯用壯其道不患于不大亨而患于不中不正也故顯示以隂德而隱和其陽德焉豈不貴元亨乎利貞而得元亨則用罔之利貞乃大壯之元亨耳彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣彖傳釋卦名義曰大壯大者壯也壯之為義近于過之為義大者壯即大者過也以其陽盛故曰壯以其隂不及故曰過蓋大壯者剛以動也乾健為體震動為用陽氣壯盛何諱言壯不知天地之氣化人心之德性原以無過不及為本然之體以本然之體制自然之用在天地則氣化平和在人心則德性中正所以為天道聖心之凖也如大者壯則所謂乾剛之體為亢陽震動之用為妄動矣所以聖人名卦為大壯壯者陽盛而壯則用易之君子必思有以濟之矣大壯而言利貞何也大者不取于壯而貴于正也正即中也惟中正而陽之德常為主隂之德常為輔天地定位天包乎地仁義成性仁兼乎義君子小人並生君子在內佐君國小人在外效奔走如是則大得其正而小亦不廢陽得其伸隂亦未嘗屈此非調停之説也乃和平氣化調劑德性恆久不易之理數也傳故又云正大而天地之情可見矣非中正以為大則大者必壯天地之間有陽無隂而天地久已息矣情者天地之心也天地無心何有于情惟于氣化運行無過不及出于本然而行于自然者體之則知主宰者其心性而發見者其情也惟其一隂一陽之謂道所以隂陽兩儀固不可偏廢亦無容扶抑自有大中至正之道在焉此天地之情所以可見也亦見于聖人作易之心而已象曰雷在天上大壯君子以非禮弗履象傳曰雷在天上大壯專言其時也二月雷出于地矣是故謂之雷在天上蓋雷在地中先王則養陽之微雷在天上君子則守隂之約禮者隂為體者也履所以行乎禮者也履著于地地方而履亦方俱地道也若履非禮則為躁妄之動非取象于雷之動止有時即非取象于天之動根于靜矣惟非禮弗履斯合乎禮之體以正乎履之用此君子用隂德豫陽壯所以維乎陽不致佻達輕率外喪儀而內喪德也象傳言非禮弗履正從君子立不易方來如恆用隂之説也雷天雖陽而有隂以維持之謂之根于坤亦確將乾坤隂陽要看成兩個又要看成一個又要看成一個內有兩個方于易之言體言用言互為體用成活潑潑底物事矣初九壯于趾征凶有孚象曰壯于趾其孚窮也初九變為恆之初六在恆初以隂變陽為大壯恆兼大壯恃陽而浚恆為索隱行怪之事所以凶也在本爻以陽變隂為恆大壯而以為恆則壯于趾初征而凶已可卜矣何以又言有孚以其心執大壯以為恆不能濟隂而為變通也象曰壯于趾其孚窮也如誠心有孚奚窮乎惟成心有孚則用壯之壯心耳在初已窮况進而征哉凶不須言矣誠心與成心異若莊子之所謂成心則另一意乃誠也九二貞吉象曰九二貞吉以中也九二變為豐之六二在豐二以隂變陽為大壯陽壯而明反不明陽天也天明則日月不明故豐二係以豐其蔀日中見斗用壯以往則得疑疾自以為明而實不明徒生疑耳必有孚發若去其蔽也乾健變離明何蔽乎蔽于自明之一念即用壯也此兼大壯言也本爻陽變為隂為豐用壯之時能變隂以豐蔀者蔽其明正得以隂濟陽之道文明濟剛健矣如卦辭所係貞吉也故卦言利貞爻亦言貞吉能利乎貞而吉可知矣象傳曰九二貞吉以中也彖辭言正曰大者正也愚即申言以正為中之義敢自用乎從傳也從二爻之貞吉推彖辭之正必正而中也于是更推二爻之貞吉而得彖辭之所謂利貞者正為大而中正即利貞也不偏于陽亦謂之利貞非必戒偏于隂而後云利貞也此傳之所以歸貞于中也九三小人用壯君子用罔貞厲羝羊觸籓羸其角象曰小人用壯君子罔也九三變為歸妹之六三在歸妹之三以隂變陽為大壯繫以歸妹以須原宜待隂盛而歸也乃反先歸其娣者賤者先貴所以使少隂以維陽故不妨先歸其娣也在本爻以陽變隂為歸妹繫以小人用壯君子用罔小人用壯亢陽不知用也君子用罔得中而能貞正也此貞也似厲也然不貞不中而用壯則如羝羊之用壯必觸藩而羸其角矣用罔似厲危而以貞為安不致如羊之用壯同于小人則大壯之利貞得全于義矣象傳曰小人在大壯之時方用壯君子知隂陽消長之恆明隂陽體用之宜豈肯用壯乎用罔以為壯也必也然罔之生也聖人言幸而免矣易何為示用罔乎此各有義于大壯言罔非罔而不直也罔于其用未嘗罔乎其體也大壯之時言罔又非遁之時逺小人不惡而嚴否之時儉德避難也君子之道方行已有知辱知殆之計四時之序將成已有成功必退之見聖人不為己甚所該者廣矣大矣故明乎用罔之道則一言一行無處不存一陽盛將衰道長必消之念矣即欲用壯而不能矣以翼翼小心持于衷自以兢兢不克卒業慮于事此君子之用罔也此即全乎人之生也直之理也人生稟乎天地之氣有始即有終有窮即有達得時行道毫無矜情躁氣失時道不行惟有樂天知命何非生也直之理何非用罔之心乎故論語與易宜相恭看罔之生是罔其生人之理與用罔大不同內卦三爻乾體以二爻為主故貞吉二中而復貞正則隂陽均平矣于初爻言壯趾凶期其孚在隂陽交也于三爻明用罔者內卦之陽盛至二而極非用罔無以濟陽用隂也三又為內外卦交際故示之如此蓋以為二主爻初三兩爻附之則得中而吉否則凶焉九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也九四變為泰之六四在泰四以隂變陽為大壯繫以翩翩不富以其鄰不戒以孚隂在外而變陽內合三陽以保泰也故云翩翩不以三隂為富而惟其鄰之陽是以也此所以貴于不戒而孚誠心助陽為保泰之吉也在本爻以陽變隂為泰合乎戒大者過壯之義能貞吉而不用壯變隂成泰乃用罔也所以悔亡所以藩決不羸且壯于大輿之輹中雖用罔而其行之以堅健迅速可知矣又見用罔正神于用壯也象曰藩決不羸則其往也必尚矣用壯而羸角何往乎用罔而藩決不羸壯在輿輹尚往何疑乎皆貞吉之德主之孚于卦辭也是以利貞不言元亨而尚往即大亨也坤為輿壯在輿輹即是含美而用罔陽在隂下輹也六五喪羊于易無悔象曰喪羊于易位不當也六五變夬之九五在夬五以陽變隂為大壯繫以莧陸夬夬中行無咎謂其變隂恐隂不易夬示以如莧陸之徐徐而夬又必中行不過于夬斯無咎也亦寓隂陽平和之義矣在本爻以隂變陽為夬大者壯而仍變陽必致于躁妄而亡羊于易忽之一念也喪羊而何以無悔羊陽物也喪其羊而得牛則悔亡同于四爻之貞吉三爻之君子用罔矣豈復有悔哉象傳曰位不當也位在六五中位也柔順中正何云不當位乎蓋位在六五下有四陽以隂道君主之非用隂以和衆陽則進而成夬成剝以剝陽成夬以夬隂皆聖人不許也惟主以隂道使大不過壯方盡平和調劑之至善也然五在君位適值四陽盛長之時恐隂柔不能不隨陽為夬故云位不當也蓋因變動為陽成夬而言之也愚用牛之説本于離之用牝牛也羊之性陽而多觸喪羊于大壯悔所以亡也非同于旅之喪牛也因本卦繼離故云傳言位不當多類此上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也上六變為大有之上九在大有上爻以陽變隂為大壯當大有而變隂則能富有以成大且大有而不以為有也是以繫之以自天祐之吉無不利或曰大有五爻一陰為貴故以陰主通卦而上爻變陰以助之如天之助五也上位在五上故以天象之亦通在本爻以陰變陽為大有陽盛于卦之終而復變陽則用壯以為終必如羊之觸藩不能退不能遂即欲用罔至此極時亦無救矣所以無所往而利然能艱守陰道則仍吉也艱亦利貞而已象傳曰不能退不能遂不詳也變離明而陽盛則不明所以不能詳審乎用壯用罔之道也艱則吉用壯而反于用罔一轉瞬一反念之問咎何長乎聖人于大壯終始以利貞為教利貞即用罔也故以艱則吉終卦焉本卦六爻貞悔對看俱相應總歸于陰陽和平而天地之道聖人之學盡之矣至于離之德本明以過明不明老子及黃帝皆言天明則日月不明易于離德之豐卦極擬議矣象傳于此曰不詳也貴于體會之自得以上外卦三爻震動之德體以四爻主外卦亦必貞方吉同于內卦二爻之主內卦以中正和平為道也六五變兊而喪羊正欲其喪羊之陽方無悔上六變離明而兼動用壯于壯之極所以無攸利必用罔而利艱貞陰道也乃吉皆大壯用陰濟陽之義象也五上二陰本隨四陽而動至大壯則皆貴用陰又以通卦之大義象為主也合內外卦以論大壯二之文明剛健貞吉合乎卦辭洵通卦之主爻乎坤下離上晉晉明夷相綜皆四陰二陽之卦以陽少貴陽根于乾晉治世明君也明夷衰世暗君也二卦火地地火合之成卦地者臣道又三隂庶民之象故離亦陰卦定以離明為君離日也明出地上之象取向明而治之義也離卦屬陰其明在中爻何以貴陽在離體用陰然火陰而配于天之陽方明也故晉明夷言用陽又有陽少貴陽之義非可執一以論也離體以虛為明陽少之卦以陽為貴各不相涉而相通焉上經臨觀皆四陰二陽之卦本義謂晉卦變自觀來四之柔進而上行于五是變觀而為晉矣愚因以綜卦明夷之三爻為自臨來亦柔進而上行也謂臨變成明夷亦可臨觀在上經貴陽之卦也以是論變亦通晉明夷二卦陽少貴陽根乾而以上經尾坎卦為繼俱以主陽用陽為象義也二卦主乎離明離陰在中爻乃以主陽所以能明者麗乎天謂卦之上下二陽也陰麗陽中如日之麗于天在天陽之氣中而懸空運行為照耳故二卦雖主離而用陽又以天之陽為日之主也晉所以繼坎者坎中之陽即乾陽也居二居五如聖君賢臣相求相應成日照中天之世故賢才君子皆思晉用而必用貞正之道以為遇合其用陽主陽愈明矣明出地上為晉日當晝而照天下也此時正君子賢人晉爵賞功之候也故曰晉正對綜卦之明夷明入地中有日而不能照如日之入地為長夜也晉之為義固兼初筮仕進用者言然大意則在名成勳著位髙望重之臣為公侯言也試觀卦辭可見與升卦之義稍不同晉康侯用錫馬蕃庶晝日三接彖辭曰晉康侯用錫馬蕃庶晝日三接如同人于郊履虎尾連卦名而繫辭晉有德有功者康侯之爵而錫馬以蕃庶之多也惟君明故功過不淆賞罰得當不惜髙爵厚賜以富貴寵榮功德用風有位而勸來者也但外加爵祿之虛文內無交警之實意亦無以成泰交之休而獲明良一德之益乃更晝日三接志同道合意聨情洽然後分不隔于堂亷心相通于忠禮天下方共仰其明矣不係元吉大亨者君眀如此可無疑于亨吉矣彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也彖傳釋卦名義曰晉進也晉異等之爵即晉其賢良之身而用之也惟君之明如日之明出于大地之上以普其照也以坤之柔順應日麗天為大明方合于以坤元為離明而得坤之元為中也在日如是在明君象日而體其德亦如是所以能同日以為大明焉有君在上如此而三陰之柔臣道也有不羣進上行以乘時利見拜爵加恩共慰觀光之志乎象曰明出地上晉君子以自昭明德象傳曰明出地上晉君子以自昭明德為晉爵者明此義以答君寵所謂不患無位患所以立也必自昭其明德而後無愧于髙名懋賞耳即當晉世而一命未膺有志登進者亦必出于昭德之途然後可顯親揚名得時行道也初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也初六變為噬嗑之初九在噬嗑初九以陽變陰為晉有屨校滅趾之象者以動體變順而不能噬嗑如有罪者屨校滅趾不能動也在本爻以陰變陽為噬嗑初居下位順變動體所謂順而動也但初動則必多阻晉如摧如之象也惟以貞得吉即或他人見摧者蓋以逺而罔孚也若裕其心未有久而不孚者又何咎乎象傳明摧如不必有阻抑之者也獨行正于下位初未必能共信久而裕裕而無咎則名德升聞矣未裕之時志不可分也言寡尤行寡悔祿在其中矣于未受君命之前孚之裕而又裕期于無咎而已如此而君命自至也六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也六二變為未濟之九二在未濟之二以陽變陰為晉繫以曵其輪不進也以不進為進以貞而致吉也在本爻變陰為陽為未濟係以晉如愁如憂其進也此所謂不患無位患所以立也亦以貞而得吉也以是而受福于王母王母指本卦君位六五乃陰爻也象曰受大福以中正也三陰聨晉乃不輕進而守貞必進之道也其愁如者斯之未能信耳人臣未仕存心中正可知大福加矣六三衆允悔亡象曰衆允之志上行也六三變為旅之九三在旅以陽變陰為晉止體變順旅方進而焚其次喪其僕雖貞亦厲焉在三止體得止則安止若妄進即貞亦厲矣在本爻以陰變陽為旅當晉而止是衆信其操而髙其詣矣悔何自而有乎象曰衆允之志上行也三雖志在恬退而衆已共明其志之可以上行矣惟志在守已斯能上行事君國與民同重有賴矣爻明守已之心象嘉其可行之德晉內卦三陰俱當晉世而宜進者也初戒其裕孚二許其愁晉三衆允其志可以上行皆進也然皆不以輕進為晉慎于進為晉也此聖人為當盛世明君進而仕者示也晉尚以不輕為尚况明夷乎即象傳之自昭明德也德明而進與不進皆當有其具而無其遇君相之責耳內卦三爻坤體以順為晉得乎臣道之宜也二爻之愁晉受寵若驚得中道也故主內卦初附之而裕其孚三附之而衆共信皆合乎坤順以應離明之象義也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也九四變為剝之六四在剝四以陰變陽為晉有剝膚之凶率羣陰進而剝陽為凶大矣在本爻變陽為陰為剝晉以非道事君者也繫以晉如鼫鼠小人貪進之象也雖貞亦厲小人何有于貞乎執固以為傾邪者耳象曰位不當也如鼫鼠之人而處近君之位所以德不當其位也以四爻論則初之摧如必此爻摧抑之矣媢疾之人在于應爻近君之側所以下賢不能上達也六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也六五變為否之九五在否五以陽變陰為晉晉而休否之君也大人君子之吉也况否五之德原為乾五之利見之大人乎其亡其亡繫于苞桑則以健變明明而愈知敬畏也在本爻以陰變陽為否能以健為明則明常如日有何可悔且如日之照物未嘗有恤乎不能遍照之日也惟明吾體而用吾健則往自吉無不利何恤得失乎一有恤之私而明蔽矣象傳曰得失勿恤大有慶也勿者禁之之辭有慶即休否而為泰也此爻為晉卦主爻惟文明而兼剛健之得中正則明同日之在天以天之健為日之明也象辭所謂麗即謂麗于天如離卦之義象也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也上九變為豫之上六在豫上以陰變陽為晉係以冥豫豫極變明但明乎豫樂而冥焉反不明也故不與其成而與其渝方無咎也在本爻以陽變陰為豫豫于晉而極矣故有晉其角之象角者首上之物居乎極也然觸邪之用惟用伐邑庶乎可也當晉極而不知退猶用角焉厲哉然建功于國以酬上位答異寵康侯之所以保其富貴也故厲而吉且無咎雖然伐邑之後大功不易居大名不易更晉也若以此為貞亦吝道也吝者惜其功名能取而不能棄也縱君明而厚待功勳故舊亦可羞吝也象傳言其道未光不知退以為晉則變動而失其明也晉外卦三爻四則晉不以正者六則進不知止者賴君明而晉不以正者其姦不能逞進不知止者其功猶可保也皆以外卦離體為明乃晉所以明卦也四變陰而為蔽賢六變陰而不知退獨五以陰變陽明體兼健用日麗于天大明普照為主外卦之中爻即為晉卦主爻也猶戒以勿恤得失者蓋明非剛健中正易涉于私察察之明久而明斯夷矣升天者入地可不慎乎離下坤上明夷明夷綜晉亦用陽根乾然明入地中乃大明陵夷之義象也猶貴振陽返日以成晉為泰否之反類也繼乎坎亦有取于坎中之陽即乾元之陽以天之陽助日之明斯升天者不入地長保日中而明不夷矣故卦雖用離明而必以天之陽為日之麗者以主之焉明夷與晉相綜晉之日麗于天者至明夷而日入于地大明之明夷矣夷本義云傷也然初升天而後入地似陵夷之謂也然則夷平也明夷同晉根于乾陽少貴陽變自臨者因本義釋晉象辭柔進而上行自觀來四爻之柔進于五為一卦之主爻故愚推其綜卦亦自觀綜卦之臨卦來二爻之剛進于三三爻之柔下居于二為明夷一卦之主爻也臨觀晉明夷俱四陰二陽之卦故謂之變來耳至于日之明宜麗于天不宜入于地君象日日不明如君之不明而天下皆晦矣賢人君子此時自必以遵養時晦為義亦時措之宜也如隱居求志之人當此時則惟韜光斂采暗然自修而已如位髙望重或世家舊德無所逃于天地則非辭榮避祿可以明哲保身矣與不事王侯髙尚其事者時位逈不同不能效其遐舉髙蹈也惟有如卦辭所係利艱貞雖貞而正猶必艱難困苦而後可以免禍全身焉明夷之卦不同于否遁者處否處遁之君子有可以避難可以肥遁之道而處明夷之君子親臣世臣無可避可遁之義也晉之晉爵賞勳與初筮仕者得位不同如明夷之世臣髙爵與百職羣寮可以進退由已者亦不同也讀易者須于卦之體象細玩而繹之自得明夷利艱貞象辭繫以利艱貞貞而正正而又甚艱難有不容正臣之暗君自有不容正類之邪臣于是不貞不可貞亦不利君子之貞進不能匡君退亦無處可免處明夷之君子艱以為貞亦聽命于天而已至于禍之不及者天也亦非君子敢預期也艱守在我之貞死生禍福聽之于命此君子于明夷之艱貞也如謂定當轉禍為福則此念即非貞矣所以卦辭無他語一言以蔽之彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之彖傳釋卦象義曰明入地中明而夷矣此指明夷之象義其時之君有此昏德然後有此名象也此時之臣民同處幽晦其有德有位之大臣更遭忌而多難將何以自處乎如文王當日事紂正此卦之象義也惟文王能用易以事君保身以內卦之文明存為文德之畜以外卦之柔順著于服事之誠或可以感君而免禍矣然究蒙大難幾致喪身亡國而文王文明之內畜柔順之外著者終始如道令昏暴之紂久而自發一隙之明釋囚而封是文王處明夷用易已彰其效者也然文王當日亦惟自守一艱貞而已何為文明應晦也何為柔順宜著也俱無心以為布置也盡其忠誠守其分義貞也而憂患不違生死不移則可謂艱矣貞易而艱則難為良臣易而為忠臣難為明夷之忠臣更難矣此文王之利艱貞也晦其明即內文明而外柔順之道也此文王之所以也至于箕子亦同文王其處明夷之世者何以乎箕子紂同姓之卿其蒙難乃內難也內難之作由昧君而箕子內自正其志不阿諛取容亦不致殺身無補佯狂囚辱亦用此之道也不激不隨非內文明外柔順者亦不能焉此箕子之所以也惟其地近而誼親不同于文王地逺而誼疏箕子食邑在國輔政在朝又無可忌之勢能正其志亦必有犯顔爭諌之處但不如比干之諌死耳若文王者異姓逺侯遭疑觸忌不能不純乎柔順矣故利艱貞在文王與箕子同而內文明外柔順與內正其志不能不同中有異也此固聖賢之時位不一而其德量亦可分觀矣象曰明入地中明夷君子以蒞衆用晦而明象傳曰明入地中明夷文王箕子各有所以如此後之學易君子何以乎惟有蒞衆用晦而明而已既不同于否之君子可以儉德避難不榮以祿又不同于遁之君子逺小人不惡而嚴上有不得不事之暗君同列有不得不共事之僉壬下有不得不蒞之民衆為有國有家者前用也惟于蒞衆之道以晦為用而用晦之內立體則明以合乎內文明外柔順之卦德庶幾可以當明夷而弗及矣春秋之世其世臣名卿倘遇昏暴將蒙大難多至于君弒國亂與文王逈不同者亦惟內無文明之德不知冠履定分外不安柔順之命以致犯上作亂求蒞衆用晦而明者何人乎初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也初九變為謙之初六在謙初以陰變陽為明夷謙在初爻止體變明君子能明乎謙之道謙而又謙者也涉大川得吉何疑乎本爻以陽變陰為謙正合乎謙而用晦為明也飛則垂翼行則不食逺于昏暴之君不食于不義之朝有攸往者位在下而非親非故可以全身逺害也主人者所之他邦之君也有言者或嘉其節義多所咨訪乎象傳曰明其義不食非羞位卑祿薄也義不可食而弗食亦不可榮以祿之義耳此在明夷為疏逺之臣者當以之也六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二變為泰之九二在泰二以陽變陰為明夷以剛健而濟文明仍勉其包荒全卦陰陽用憑河之力以包之不遐遺于陰朋亡于陽方得尚于中行恐其變陰有私于君子同類也在本爻以陰變陽為泰文明變剛健何以夷于左股乎蓋六二為明體之主爻上應六五之暗君以明應暗自不相應遂致傷左股也用以拯救馬壯則吉亦速行之義二與五為正應亦言行者二在外卦雖正應亦以義合者耳合留否去固臣道之常也象曰六二之吉順以則也二在臣道本中正也傷于左股而去順乎臣之正則所以雖傷而得拯以成其吉焉九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也九三變為復之六三在復三以陰變陽為明夷繫以頻復震變離而失動德夷其明而不決致猶豫其復也故厲然終歸于復何咎乎在本爻以陽變陰為復則變自臨之二爻來有咸臨之德而貞吉者也以動變明用明而動明夷之世如南狩則可以得其昏暴之大首也雖然仍不可以疾速為貞必以艱貞為貞方有合于明夷之義也本義謂此爻有湯文之象愚謂此湯之征葛文王之戡黎耳不可疾貞則文王能以之而湯不克以焉聖人亦有遭遇之幸不幸文王德純而時亦成之湯自謂有慚德而時迫之天時之于聖人如孟子所論聖人之于天道也乎象傳謂南狩之志乃大得也似為釋囚命伯得專征伐言之大得志非以南巢牧野為得志也明矣湯武之革命聖人之不幸也何得志之有發揚蹈厲形之于樂有遺憾于盡美焉故曰聖人不幸初非素有大志如趙宋之禪周也以上內卦三爻離明之體德以二爻主內卦雖夷于左股而變陽用馬壯以拯則吉火入地中明夷變乾健所以拯明之夷也不止于自潔其身而已初變止反有攸往三變巽而進得大首皆明進出地之義象也明之升也不可以疾為貞方可大得志也明夷上爻為昏主五為明夷之大臣故二爻主乎內卦為文明之得中者事暗君而傷左股速去之為吉然身去道存所以主乎內卦為初三兩爻所附從也初附之而有攸往三附之且行南狩之志以弔伐為事矣皆附于離明文明得中為正義象焉二爻可以太公望擬議之六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也六四變為豐之九四在豐四以陽變陰為明夷有豐其蔀日見斗之象則不明甚矣蓋因四爻震體也近于內離故如此蒙蔽也遇夷主則吉者遇初陰則陰陽相濟象雷遇日可以息聲而雲雨之蔽皆可斂散矣故吉在本爻以陰變陽為豐是陰柔小人髙位近君而蒙蔽其主如飛亷惡來之人也以其近五所以入于明夷之左腹而獲乎暗主之心言聽計從逢長任意然後以其君之惡心出示于門庭有善則歸已過則歸君之意也不言吉凶暫得君心似吉將有欺君之罪凶何待言象曰入于左腹獲心意也明四之入腹獲心先得乎昏暴之意而逢之迎之將之順之于是其意得愈肆而其惡愈熾聖人以人之惡出于心而心之性本善其惡念出于私意而已小人導君私意久而莫能自知其惡亦不能自制小人亦無如何矣心之所重在意故爻辭獲心而象傳云獲心意也蓋為學易者明誠意之學先貴乎盡好惡之實于善惡分途之初也此爻貞悔對看更為明加或謂四爻如比干剖心照五爻皆君子立説然與象傳似無著有謂文王雖蒙難而盡忠得紂心返于岐者亦通六五箕子之明夷利貞象曰箕子之貞明不可息也六五變為既濟之九五在既濟之五以陽變陰為明夷繫以東鄰殺牛不如西鄰之禴祭實受其福見誠意能否昭格不在儀物之厚薄也蓋兼明夷義為臣事暗主者言也東鄰指昏主如紂西鄰明主或指文武乎在本爻以陰變陽為既濟外卦之順變為險矣為臣之忠誠雖志自正而險阻之難終不能脫箕子當日以此而囚乃箕子所遇之世正合乎此爻之在明夷也亦惟利貞以自正其志禍福利害聽之于命寧可私心計之乎象又别申一義謂存箕子之志即至于囚辱亦明之不可息者也見人臣即殺身而不悟昏暴其臣志之明久而自著焉蓋暗主無開悟之日而天下後世以是君為前車之覆以是臣為盡忠之鑑其明固皎皎千古矣孔聖為明夷言明終不可夷其義亦逺大矣哉五爻公係以箕子則五不可盡謂之君位明矣上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也上六變賁之上九在賁上以陽變陰為明夷兼明夷義繫以白賁賁極而存素之本正明夷用晦其體本明之道也本爻以陰變陽為賁則專取乎明夷之象象上為昏暴之君處明夷之極所以晉之麗天大明者至此而大晦矣初登于天者後入于地矣晝變為夜皆因一身一心失其明而天下國家受其害也象傳曰初登于天照四國也昏暴之本心何嘗無明德乎後入于地者氣拘物蔽邪臣之惡入于腹心而縱私意損明德失其制意之防立心之正也初不過一念之私起于微渺遂虧明德之則成昏暗之世使彼早有提覺何至如是乎甚矣明之不可蔽而惺惺貴于常存也自天子以至于庶人一是皆以修身為本修身之本則明明德而已以上外卦三爻坤順之體德以五爻主卦箕子以之者至順之體臣道之極變坎居險而能出險又不失貞所以主明夷外卦四則成明夷之小人上則成明夷之昏主也以三陰蔽明而五獨中正變坎為得乾之中陽者也五以君位而箕子以之重德不重位故主卦者在德不在位也但明夷以明入地為象義二之文明其主通卦者乎大易通解卷七
