body:
  text: 大易通解卷三江常鎮道魏荔彤撰坤下坎上比與師相綜陽少貴陽主陽根乾之卦其義𧰼於師已明之矣直根乾而無繼者也師比俱五隂一陽之卦師之後受之以比者衆必有比師坎險在內而坤順在外內有危險之慮而外循大順之道師之所以貞吉也內已孚大順之心而外仍有險阻之處比之所以建國親侯也以師二之剛中在下而主乎師帥衆以正功成業定即為比五之升庸在位而正君位行君道也堯舜之揖讓湯武之征誅皆先在下位而後上位也摯之為君不終而堯方正位行道即守成亦然開創不待言矣即揖讓亦然征誅不待言矣此師之後所以受之以比也且水行地中地上有水仍是水土相成之義𧰼也水行地中土足制水因取義於容畜地上有水地外之水即地所容畜不盡者亦未嘗不比於地以不制為制此建國親侯之取義也地中之水如江淮河漢是也地上之水如四海之外是也五服五等猶有量焉六合之外國不可建侯不可親矣而舟車所至人力所通天之所覆地之所載日月所照霜露所墜凡有血氣莫不尊親配天之功業又不止於師之一陽剛中而五隂為應矣比之次師大哉逺哉非五之剛中居天位行天道不足以當之矣比吉原筮元永貞無咎不寧方來後夫凶彖辭曰比吉比未有不吉者也人生天地與人為徒未有絶物孤立不凶比輔羣類不吉者故言比即吉然非推原乎筮者之本意則比之吉凶猶須審詳焉蓋筮者之初念亦惟元永貞而後以無咎為吉也原者始也筮者欲求知比者之本心也果自始至終皆永守乎貞之義而後其比為吉而無咎也豈盡比皆可以為吉乎如為比於人言也比於君子比於小人固異矣即比於君子而比於有道比於不如己亦有德之進退業之損益之别也元永貞則比於君子而復比於君子中之有道也士希賢賢希聖聖希天之比也吉而無咎可知矣如比於小人必逺於君子而凶咎其常矣如好於比其所狎近即非小人亦不能無咎也原筮者原其德之義也再者凡君公而筮臣民之比與凡臣民而筮比於君公亦必推原筮者之居何位欲何比也如在上位而筮比果有剛中之德臣民自來應之是修德以來逺仍是師之貞吉也彼不得安寧者方來比而求撫綏鎮定之矣何以筮為如在下位而筮比果見有剛中之德者首出庶物必應速往比輔後至則違衆失時凶何疑乎此又原筮者原其位之義也原筮二字必兼此二義以言而比之理方明本義雖謂原筮為再占但朱子注易固言有此德者有此占無此德者無此占矣正見愚說與本義實不相悖也彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也彖傳釋卦名義曰比吉也本義謂衍文若以愚說質之亦非衍也即釋彖辭言比即為吉之㫖也所以吉者比輔於人不論上下左右皆吉但須分貞不貞永不永而已又須分人來比已已往比人而已故下文方釋比之為比輔乎人也但在比以五隂比一陽陽在上位則専以下比於上為正彖傳所以釋以下順從也蓋明乎輔之義也其釋原筮元永貞無咎則曰以剛中者似専指五爻不知剛中之義如居下位以筮比乃比乎剛中之五也如在上位而言剛中則在上者果有剛中之德可以為下順從否亦貴乎五之自筮也即凡筮上下左右之比俱以剛中為貴比無定而剛中有定何非以剛中為原筮之的乎如必指五而凡比於上下左右者但筮得此卦無預焉易無此拘泥之道也一言剛中而凡比皆以之此所謂交易變易而不易之謂易易何可為典要乎至於不寧方來後夫凶二句分屬在上位筮下比在下位筮上比此則遵乎聖𫝊矣𫝊明言不寧方來上下應也為一陽爻言是以上筮下也後夫凶其道窮為五隂爻言是以下筮上也𫝊亦已分言即本義専言下筮比上遵經以繹𫝊遵𫝊以繹本義可也象曰地上有水比先王以建萬國親諸侯象傳曰地上有水比先王以建萬國親諸侯禹之治水使水行於地中今水仍在地上禹所治者九州之水中國之地也如河之源禹即未嘗能治之也况至於東海至於南海水之在地上者雖聖人亦有所不能焉如是則地之外為水環之矣古今論皆如是而近聞西洋厯家者其言水與地則固無地外之水矣凡四海之廣逺皆地上之水也地外無水皆天矣天者何氣而已矣地懸天中大氣舉之軒岐之論也故地之外即無水水皆氣矣此所以有弱水不能浮物之說也以其漸近於天氣而未全化為水雖已成水故較水尚弱也必有地處方能有水上水二物相附而成乃成其為水無土即無水矣此論大與天一地六相合成水之理相符非輕中國傳聞而信異域竒說亦證之於河圖之言水知為中華之正傳不必執中外之見自隘其知聞也試思大氣舉地如軒岐之說則可信而大氣舉水自古亦難言之何也氣虛物而無質者也水亦虛物無質者也氣雖能舉地而必不能舉水何也氣不能使水無㵼漏也氣舉地而地載水虛實相承隂陽互為體用之理也如以氣舉水無體用無隂陽何以成物哉學者不必拗執師承不必分别彝夏歸其理之是也斯可矣以是喻地上之水則𤾉谷而東昧谷而西南交而南朔方而北其地無限其水無窮先王何以處此地此水乎然則建國親侯不能免矣至於萬國不能統者分田制祿所比者寧有幾所不來比者廣矣衆矣於是既頒以公侯伯子男之爵復定王畿綏甸要荒之界為方伯連帥以紀綱之伯叔甥舅以聨絡之先親其本支以及百世次親其夾輔以及屏藩巡狩則有慶罰述職則有黜陟親有功有德者數侯而諸侯無不親矣是親諸侯乃建萬國之要而建萬國乃萬邦協和黎民於變時雍之極致也蓋九州地中之水治而四海之外地上之水不治而皆治矣先王以一身一心修德凝道此剛中之德立極也由此家國天下推及聲靈教化所不能逮皆可以來其比而恐後焉然先王未嘗有求比之思也所守者約而所施者博博厚配地髙明配天悠久無疆不外一至誠之無息耳無息之誠非元永貞乎以此言比大矣哉愚謂比之元即乾之元也比五之剛中即乾之剛健中正也比之下順從即乾之首出庶物萬國咸寧也以此言比故凡屬地中之水在中國地上之水在四海皆來比焉如乾元之統天也然即有不來比者亦不害其統天何也天下歸仁祇言其理而已聖人在春秋弟子不過三千其間如子西武叔之類衆矣而無妨於下順從於天下百世也堯舜之時封域不及漢唐以後若相較而論來比之廣狹多寡則聖君不及英主矣比之為比豈以形勢計乎甚矣比之剛中為尚也故九五為一卦之主而用三驅失前禽不誡焉其義更大明矣初六有孚比之無咎有孚盈缶終來有他吉𧰼曰比之初六有他吉也初六變為屯之初九在屯初以陽變隂為比繫以磐桓居貞利在陽升者知其引隂成雲和而致雨也亦有比輔之義矣然必利居貞者非貞無以開屯也利建侯者為屯卦主爻辭同兩卦也在本爻變隂為陽為屯於陽之剛中陽德相孚以為比奚咎乎孚者中心之誠意也何以盈缶坤者缶也土器之𧰼坤體變震震之初陽為震之主即乾之元陽也坤得之而順承焉盈缶之誠所以終來有他吉也終來似後來後夫凶何以言他吉初逺於五來至初而極逺者俱來矣故繫之以有他之吉有他者逺而不可測之辭凡比皆為吉初愈逺而吉愈可必矣然逺在異域非但淺薄之有孚必有孚盈缶方能來比故初來乃來之終也言無有不來者也𧰼傳曰比之初六有他吉也正謂初誠之至來之逺孚之盛也六二比之自內貞吉象曰比之自內不自失也六二變為坎二在坎二陽變為隂為比以重險而求外比故戒以有險求小得者亦因得中有孚方求比於人感而必應也在本爻以隂變陽為坤則以順變險乃順以濟險以為比也以順而正者自內而求比於剛中之五所謂險者審慎顧慮而不輕比之心也此所以繫之貞吉而象傳以為不自失也二以隂變陽坤順之貞吉即坤二之直方大也不自失其柔順中正以比乎剛中之德其吉乃貞之必致者此亦原筮之義故先自考其得失而後可比於外以驗其吉凶也又元永貞之申言也六三比之匪人𧰼曰比之匪人不亦傷乎六三變蹇之九三在蹇以陽變隂為比本應往而求比於外以濟蹇乃反求二隂以為得乎艮止此觀望之二心存也故辭無吉凶而𧰼斥之為內喜以誅其心焉本爻以隂變陽為蹇宜進而開蹇比五然以順而變止遂致失時不就有德有位之大人而比附於衆隂本義謂承乘應皆隂故謂之比之匪人也所以𧰼傳言失其所比不將致後夫之凶乎以上內卦三爻坤順之體在比皆宜比於一陽初逺比得吉二比於外而本於自內內貞必吉三比匪而不比陽故凶坤順也以順為正在比之義𧰼如此乃以二爻為主內卦而初三兩爻皆附二以比五者初變震而悅從得吉三變艮止而不比得凶則𧰼義可大明矣六四外比之貞吉𧰼曰外比於賢以從上也六四變萃之九四在萃四以陽變隂為萃引羣賢萃處以人事君乃有一個臣之德者元吉無咎可知在本爻以隂變陽為萃外比三隂近悅逺來共服王化此所以亦繫之以吉而必言貞者恐以隂私招誘近於引進羣小或逢其君上營心荒逺也必由於比之正道忘險變悅衆悅剛中之德大順而來比則四之外比以為比者方合𧰼傳所言比於賢以從上之義也比於賢以從上兼萃四所以元吉之義亦不過盡大臣職分之當為並非可以邀功釣名使其進爵公朝拜恩私室也聖人為大臣選賢任能分猷效職者垂戒至矣即至於重譯來賔逺方向化曰此天子之德教也豈敢自以為勳勞乎此大臣外比以為比之貞也九五顯比王用三驅失前禽邑人不誡吉𧰼曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五變坤五在坤五以隂變陽為比有黃裳元吉之德𧰼也得中為黃裳者自下觀之垂裳而天下治也隂柔中正而復變坎陽中位故云在本爻以剛中之德居九五之位為一卦之主爻繫以顯比見龍如大人而為天下之利見者也既云合於坤五又云合乾五何也言坤五者就以陽變隂而言其用也言乾五者就本爻陽剛中正而言其德也五有聖德居正位顯然首出於天下之上有不合萬國以尊親乎即有後夫其凶自在於後不必王心有招致之計也比者自比不比者德加修政加飭養加厚教加謹而已雖萬邦咸寧無一夫一婦不得其所而不妨舜有三苗堯有巢由此所以從網為喻王用三驅網開一面前禽之失邑人不誡聽其從違不以威迫不以利誘此正卦辭所言原筮者之德位雖為人比而其心必元永貞然後德盛而化自神即有後夫而不寧者亦方來未艾矣此比之所以為元吉也𧰼傳曰顯比之吉位正中也歸於位正中而德之剛中亦寓焉舍逆取順正是化逆取順盡其在已而不役心於物也雖失前禽而並不以疏虞為邑人誡不竭山澤於羅網斯乃上以剛中之德使乎下欲下各盡其盈缶之孚自來歸仁而後合不偏不倚蕩蕩平平之聖德王猷也使中者在上而下必以中來應使事相孚任心而不任術尚德而不尚力風行草偃逺至邇安乃顯比之大人篤恭而天下自平之效也古之搜狩原以講武所用之衆即國邑之民人也若謂不誡邑人是不驚擾其民三驅之士卒除民之外又為何人乎上六比之無首凶𧰼曰比之無首無所終也上六變觀之上九在觀上以陽變隂為比立乎九五之上是師傅之尊也故必觀其生觀乎五爻如五為君子也則於已亦無咎何也所比者君之德以成而其責方盡也本爻以隂變陽為觀位居顯比之上非賢臣非逺人乃跋扈之臣頑梗之民矣恃其居險之逺變巽之散或不來而為後夫或變陽而致亢悔此所以有比之無首之凶也然則其變觀者有觀望覬覦之險計矣五即失前禽不誡而臥榻之間豈能容此乎𧰼傳以為無終比至於極初已終來而仍恃險自固則終亦不比矣無終有凶𧰼所以再申之三以比於羣隂而失正不比上以孤立無與而又不甘革心此二爻皆不得元永貞之道者凶而無吉何尤乎外卦三爻險體以五爻剛健中正為乾元所寓之陽為一卦之主故以顯比嘉之而即戒之恐其有心致比也四則變兌而下引三隂來比故戒以貞上則變巽不內比五而居極求進所以得無首之凶蓋凡陽為隂首在比猶宜比陽也在內卦三隂尚來比豈上可以别圖哉凶可知矣比卦辭首以一吉盡之而後分别比於人者為人比者此原乎筮者之位也又分别比而貞者比而不貞者此原乎求比而筮者之德也又分别比而速比而遲者此原乎求比而筮者之時也又分别為人比者元永貞而人自比耶抑不能元永貞而欲要致人來比耶此原乎受比筮者之德也卦𧰼如此於六爻又各就其位其時其𧰼其體而申明比必元永貞之義莫非原乎筮比者之時位及心德而已原筮二字在比有必詳盡者焉故概言比為吉而以原筮元永貞繼之原筮者變易交易之易也元永貞者不易之易也本義釋原為再即再筮亦筮乎位時心德耳愚說亦與無悖焉乾下巽上小畜風天小畜與天澤履五陽一隂相綜於叙五隂一陽卦後次之五陽一隂二卦隂少貴隂主隂根坤固然然亦自乾坤之門首出無所繼也承接乎師比序卦𫝊序之愚說申明其𧰼義兼雜卦之綜又一𧰼義也隂在陽中不能如師比主乎隂惟以隂畜陽方得和濟之用故六四一爻主乎一卦為一隂畜衆陽之義如文王之在紂時用柔順之道以事君宜民而終有天命人心之歸皆因畜德之隂體以致陽之大用也在序卦𫝊比必有所畜從五隂比一陽起義五隂比一陽承接之以一隂五陽比之久而隂盡變陽陽盛矣當畜隂以畜之陽大隂小所以受之以小畜是陽充隂弱之𧰼也如叔季之世君日益驕政日益虐刑罰益濫和惠益鮮看來恰是商衰紂虐之時因而天恆暘若民皆望澤有大旱望雲霓之心而深是日何喪之怨也比者興王之治化所來者衆小畜者昏暴之失道所畜者寡矣然此而失畜則必另有得畜者起矣為湯武驅民者桀與紂也亢旱之久必有密雲之興雲行雨施品物咸亨四方豫悅來王恐後向之為人比者漸失道而不能畜畜者已竭矣因而又有能畜者為人心所歸天命所集漸以一成一旅以集四海九州蓋始於小而漸致乎大所以萃渙合離而無不為所懷保也此比之後所以受之以畜焉以事物之微言來比者多所畜必盛畜物既盛其心更宜柔而善下亦小畜之義失之於盈滿則畜者散矣此與風行天上易散難聚之象深合試思貨利勳名何者可以多有所畜畜之何一不本於翼翼小心乎此小畜之道也以上二義俱序卦比必有畜之說至於本卦則以所畜尚小為正義小畜亨密雲不雨自我西郊彖辭曰小畜亨有可亨之道而未亨也如雲雖密而不能成雨以隂氣淺薄雖上升興雲而不能引陽氣下降以施雨澤也猶當安處於隂晦之地以養其幽𨼆之德始自我之西郊遵養時晦遂為霖於天下利物成功此正周文之將興商紂之虐甚時也然則文王繫此無乃有二心乎非也文王之服事以終武王之弔伐以始皆順天道也小畜與革各有其時豈相謀乎設文王殁而紂亦死另繼賢君武王焉能以臣伐君而必勝乎在文王時言文王不必定謂西郊之密雲必及四海為霖雨正值亢旱人心望澤則密雲不雨必宜濟隂以救陽耳而隂之濟也非强致也一有私心雲雨解散矣何也雲雨天地之和氣也私心恭焉戾氣至矣即或雲集雨降恐非濟物之澤或恆𤾉若而為恆雨若亢旱變為霪雨洵為以暴易暴矣知此則知文王之心雖繫辭時明識此理數終俟天命之自然時㑹之自至也詩云穆穆文王於緝熙敬止祇是順天時盡人事無不敬而安所止也觀於四爻之有孚血去惕出不過期於上之合志則文王純一之心可大白矣彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也彖傳釋卦名義曰小畜柔得位而上下應之曰小畜已將一隂居四爻畜乎上下五陽一語破的矣四乃大臣之位一變而為乾四或躍在淵非近君得民之大臣憂疑危險之𧰼何如此則無亨之義矣然其為德必內以剛健為心外以柔巽為用又必精白其衷竭誠於剛中之五使君臣之間無詐無虞上下一德同心共濟然後其致君澤民之志乃得行焉所謂不獲乎上民不可得而治猶後也君心見疑德髙功盛徒成震主之名不賞之勳志何以能行又何以得亨耶此彖傳所以必先明臣心之一以勵忠節又必孚君心之誠以釋猜嫌乃於文王繫小畜之志恰相契合殆為天下後世亂臣隂謀絶其根本又為事猜忌之主者凜其戒懼使之逺於凶悔而趨於亨吉焉然則卦辭密雲不雨惟當尚往以厚其畜之之德量耳自我西郊雨澤未行惟當化其方隅之見推其胞與之仁耳即至於無不畜而施大行亦不過本乎健而巽者以附於剛中之君以期於明良志孚耳豈陳文子之厚施於齊馮暖之市義於薛哉孔聖稱泰伯曰三以天下讓民無得而稱焉由季及昌王天下之德業已成矣武王不過繼志述事而已然文王三分有二以服事殷終始不渝孔聖必深知文王之心方於小畜之彖傳發其義也武王周公之達孝在繼述亦要善看非曹操之自託文王司馬昭之心路人知之也𧰼曰風行天上小畜君子以懿文德懿美也文德兼文章德性進修使美也文又兼威儀文辭說𧰼傳曰風行天上小畜君子以懿文德風者隂在內而陽自外來以開散之也風行天上則雲之密者必散何有於雨此正𧰼隂微陽盛一隂不足以為畜也君子於此何以用易亦唯懿其文德耳德修於隂久而自厚暗然一室深藏於密皆以隂為體也畜德畜學皆本如此非為章著於外信從於人也惟小畜以致大故必深必固焉方為善於體易論語云逺人不服則修文德以來之文德者固是言內治不言外章亦是言文化不言武略也文王有隂行善之說正是懿文德懿即懿德之懿君子修而美之則民亦有秉彝必好是懿德伯夷太公慕養老而至芮虞二國讓公田而返所畜者亦漸大矣孔聖繫此亦推原當日自我西郊敦德𢎞化之實也乎易之理數原不指一物一事言凡人欲所畜者大皆當懿文德固矣然在卦本有文王自况之辭指一物一事言易亦非舉一廢百也初九復自道何其咎吉象曰復自道其義吉也初九變巽之初六在巽初以隂變陽為小畜巽進既變健體所以為進不决故勉以武人之貞在本爻以陽變隂為巽健而變巽固小畜之所取以濟隂為義也所以繫之為復自道何其咎而且得吉也道者本健而變巽陽剛隂和乃足以仰事乎剛中而志行𧰼傳所以明其義為吉使畜其德者知乎剛柔必兼濟之義也初在乾體中乃復卦之初爻也今變巽亦可謂之復何也陽復隂姤反復出入皆可謂復也故陽盛而變隂復得其道矣所以無咎初與四正應四在小畜即巽之下爻也初變巽以應之復道而出乎相應於義也故辭𫝊交與之吉焉每爻隂陽動變俱要如此活看九二牽復吉𧰼曰牽復在中亦不自失也九二變家人之六二在家人之二以隂變陽為小畜故戒以無攸自遂而主乎中饋則貞而獲吉為家人之主內政者明女德可主一家者也在本爻以陽變隂為家人繫以牽連為復亦得吉者牽復牽一家而共復於道父子兄弟無不復於道則非剛健而變文明之體必不能齊家以治國資於事父以事君也此其所以合上志而得志也𧰼傳言牽復而云在中九二之位本在中又變為離中皆為主爻是一家之主也能牽復焉亦不過不自失其剛健文明之志而已蓋牽之為義似乎循人而在中之道則專主於已故𧰼明乎不自失也不失家齊於身之義畜乃德之本為一家內外立端型之教者也所謂牽者豈非自復於道而家無不復道若一牽之使然也此亦不自失之訓也想文王當日王季為父武王周公為子太任為母太姒為妃邑姜為婦一家之德皆能自畜其德而何非文王之德畜之此關雎之教化起於閨門武周之達孝昭於百世於二之牽復言吉吉洵莫大焉九三輿說輻夫妻反目𧰼曰夫妻反目不能正室也九三變中孚之六三在中孚之三以隂變陽為小畜繫以得敵或哭或歌乃變悅為健足以克去中心之私以成中孚者三為克己四為復禮共成中孚與本卦三爻不為四畜則有夫妻反目之𧰼義亦相通焉在本爻以陽變隂為中孚內外皆隂欲相孚合蓋四為小畜之主爻也而三獨不肯為四畜故其𧰼為輿說輻不能進也又云夫妻反目不能和也三陽剛居內卦之極妄動撓阻之心以致退進失據也不言凶咎可知其非吉矣𧰼傳専以反目言謂不能正室也健變悅不能同六四剛柔相濟所以謂之不能正室也以上內卦乾三爻俱以畜於外卦四爻一隂為𧰼義初與四正應故陽變隂而復道二得中變離剛健濟以文明亦同初牽復是復俱為復隂也故得吉三則位界內外之間變兌有不能正室之𧰼雖三四非正應不可為家室然中孚以是兩爻主中孚故小畜之三自中孚來以三陽配四隂正為夫婦變兌則隂與隂不合故亦有不能正室之義易不可為典要如此總見諸陽皆應濟隂以為畜耳三陽皆當附二故曰牽復初變巽同四故又取與卦相應繫吉三則變兌悅慕於外不附二且不為四所畜中處兩失有輿說輻之𧰼義二主內卦亦可謂之夫妻反目正合中孚貞悔相𠫭之𧰼義也六四有孚血去惕出無咎𧰼曰有孚惕出上合志也六四變乾之九四在乾陽變隂為小畜故繫之以或躍在淵正是文王為西伯欲躍而未躍尚在淵而將在天之𧰼在小畜則以畜為道而必以有孚為主四有孚而至血出赤誠外著也而猶惕出以為人臣止於敬也然終出於羑里命為西伯以輔殷室得専征伐非紂深信之無疑釋其幽囚足矣何至寵錫如斯乎此傳所以謂五為剛中然一念之善亦剛中也紂尚可動其剛中而應之况中主賢君哉至誠可格豚魚此又四之所以無咎也惕者敬也出者彰也敬存內而發外乃立誠達信也奚咎乎九五有孚攣如富以其鄰𧰼曰有孚攣如不獨富也九五變大畜之六五在大畜之五陽變隂為小畜繫以豶豕之牙取其幼弱易制剛柔互用故得吉辭在小畜變大畜所畜之文德已厚有孚攣如矣已之孚先畜於中在外之物自富於畜也然非私其所有以為畜也乃合其鄰之有以為畜則凡人之所有皆其有所以謂五之富不獨富也乃以其鄰為富耳言財利則藏富於民言德行則取人為善其畜洵不謂小而馴至於一無所畜而愈見畜之無窮也此等德業非聖人得位不能兼之文王為西伯德畜既厚而化行者終未大武王繼之末年受命方居其位行其道是雖武王身當其時㑹能成大畜之德量功猷然皆自文王畜其本以茂其支畜其源以暢其流也此爻雖不必指文王亦惟文王方足以當之又見為君者當小畜之世若有志於大畜必不可以掊克聚斂為心任已獨用為能也必富與民共善與人同而後小畜可以漸大若不以鄰而欲専利私善自富焉則於健巽之德不孚而所畜之小者又將終如天上風行之易散矣財聚則民散豫聖則賢逺可不再三致謹於小畜之義哉四五兩爻俱以周文為擬議正是易不可為典要上九既雨既處尚德載婦貞厲月幾望君子征凶𧰼曰既雨既處德積載也君子征凶有所疑也爻辭惟以首二句明隂和更當尚德培陽後三句戒隂盛君子知幾分釋為是上九變需之上六在需之上爻以隂變陽為小畜險極變巽故妄進而入穴然以巽致乎下卦三陽不速之客來敬之則吉主敬於內隂也而孚陽於外矣在本爻小畜以陽變隂為需巽極變險惟恐畜之久隂之盛而成邪謀隂計矣故戒之以既雨既處則隂陽已和矣此固小畜之君子所以懿文德自始至終期於以厚德載物以隂柔濟剛亢施惠布德於天下也非有隂險詭詐之衷也幸而亢陽既息其虐隂德已丕顯其功則凡畜德畜物修德廣業者無一不當絶其私曲開其公誠矣若以婦道之柔貞固而用之雖正亦厲矣必如月之幾望隂已盛而不盈乃得均平之道也蓋小畜以隂畜陽故應濟以柔道婦道也臣道也復其道者此道也如小畜之終既雨既處厚德載者已衆矣需之上入於穴而猶望其來陽以匡救小畜之上寧不垂戒其終將隂柔流為譎詐而有傷陽害正之凶咎乎君子征凶又為上居小畜之極示之也又為凡占者遇隂盛之時示之也在身操隂陽進退之權者必以厚德之載為君子之自强不息矣何征凶哉在身際隂陽進退之世者必審兼需之義為君子飲食宴樂以待時之清耳如冒進而與隂爭則征而凶必也為不見幾而不知作者示也此小畜之終聖人雖用隂而明示天下以進退和濟之大者也載之義又作始作始其義更𢎞長蓋既雨既處乃尚德之始也君子之懿文德非崇德乎但懿文德在暗修於一心而尚德則鼓舞一世矣率天下之人俱以德為尚乃在雲行雨施之後品物咸亨之時利澤普而德化行用隂道以修德成已用陽道以尚德成物也小畜之終至於九五變大畜而無所不畜然後隂已濟陽陽又正隂此誠聖人衡兩儀於無過不及而歸於一元統天之剛健中正純粹以精之道也以此言尚德載大矣哉下三句為反是終用隂道者言愈為明切𧰼傳曰既雨既處德積載也隂和陽濟惟有積德使日厚而無不載耳本卦大𧰼傳云懿文德需大𧰼傳曰飲食宴樂其義悉相通矣以載為始亦通又曰君子征凶有所疑也則分釋爻辭後三句隂盛陽退之義而已既然有疑豈可冒進乎外卦巽三爻以四爻為主而又主乎通卦血去惕出無咎畜陽之隂危疑如是而終吉用隂道也五六兩爻附乎四五以大畜變小畜即是以鄰為富之義君道而附於四用賢臣之道亦得隂道所以濟小畜之隂以成大畜也上九變險恐隂極而險有傷陽德故申戒之於終焉兑下乾上履履卦綜小畜亦根坤固然履所以無繼而直根坤者有天地後有人人為萬物之靈秀其德合天地之隂體其行合天地之陽用皆由德以制行也於是在小畜為畜德在履為循禮德固隂也禮亦用之隂也合諸樂之陽所以𧰼德之中和也故禮乃日用倫常與人生俱為終始者矣以是定卦名履以象禮而無所繼以根於坤也謂之自乾三變來自是論卦變為另一義序卦傳云物畜然後有禮以履為禮也是序卦之一義耳至於小畜之綜為履雜卦傳言之矣小畜寡也履不處也愚謂風天小畜以一隂在外卦畜五陽隂小以畜陽大故謂之寡天澤履以一隂在內卦夾五陽以隂悅隨陽健故謂之不處不處者正謂隂寡陽衆陽亢隂弱隨陽之隂多不能自守輕舉妄動失乎履道故以不處釋之原與寡同有陽盛濟隂之象義但云行進恐難明矣夫履固進也而履之於禮周旋中規折旋中矩即聖人之足縮縮如有循也即國君行禮視視如節也蓋敬謹慎重之為尚而無取乎輕浮躁妄矣靜為隂而動為陽履卦隂寡故於履之動必根於靜內靜其妄動之心外靜其躁動之行也如斯則靜固靜動亦靜也斯合乎濟隂以隨陽用隂之用以和乎禮嚴正之體所謂禮之用和為貴先王之道斯為美而小大無不由之也是以行進之間亦本於以隂濟陽以靜為動之道而後合乎聖人綜小畜而名卦之義也且不處之處以處為尚太甲居桐處仁遷義者仁陽用而隂體故安土敦仁方謂之處仁義者隂用而陽體故文言云利者義之和惟知仁體必宜處則義之用為行進方明耳此履之所以綜小畜而不離五陽一隂隂弱陽强之㫖也聖人濟隂正欲和陽亦未嘗與扶陽抑隂之心相反也履虎尾不嘻人亨履彖辭繫以履虎尾不嘻人亨虎而不嘻人和之至也然履其尾而不致於為虎所嘻亦敬謹之至非以和悅之德內存以柔順之義外向不足以致亨也小畜之密雲不雨當養隂於漸盛而後能雲行雨施履之履虎不嘻當濟隂於至和而後仁化異類蓋至於百獸率舞而後禮盛樂和德隆化神亦即履虎尾不嘻人之推暨焉彼政行一郡而虎渡河禪證一心而虎守溪亦惟此太和能格人心物性而已在易固非為虎言不過取虎之𧰼以喻值剛暴之時事橫虐之人共凶險之務者耳然即為真虎莊言虎性雖凶怒亦知媚養己者順道以和之且可以犬豕畜矣豢馬拊之不時至於毁首碎胸傷人亦惟和與不和辨異同也然則以履虎懼嘻者為中心之主謹於始焉以視履考祥者為步趨之的持其終焉是以隂兑之和為用有濟於以乾陽剛健之體也固亦無往而不臧者也彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也彖傳釋卦名義曰履柔履剛也固以兌悅履乾剛釋履矣以此言𧰼即雜卦不處之義也以柔履剛有必動之𧰼名之曰履履動物也雖欲不進亦不得也以一隂夾於五陽之中羣陽好動一隂焉得不動乎至於兌悅之為德以悅為主矣悅而應乎乾上健而下悅恐其所以為悅將致乎冒進躁動専以詭隨為悅名為應乾而乾必久而不應矣以致乾剛變為凶暴如虎之嚙人亦𧰼與義之曉然者惟悅而不失其和和非曲從以為悅乃貞順以為悅正合乎禮之用和為貴而又非知和而和所以雖凶暴為虎亦能格能化而不嘻人此釋致亨之卦辭出於悅中正之德而非小人違道干譽巧媚取容之為也何也以乾剛健中正之德原不可以私相干所謂君子易事而難悅也悅之不以道必不悅也况九五以剛健中正為德者必能得禮用和而體本嚴之義所以能履帝位而不疚也如以下之苟且致悅則自失乎剛健中正之據其疚大矣故傳又言光明也光明之義以九五健德變為離明光明照下必能審知下之悅上為公為私而嘻與不嘻賞罰功罪不能欺蔽矣此傳所以言履五不疚本於光明非兼卦爻變𧰼為言又何以有光明之釋乎在履內卦之悅非知和而和在履外卦之剛以剛必兼明則上下使事之道俱盡而推之於左右前後大學所言潔矩者亦俱得矣矩者至方地之道也隂之道也履之本也方為體而其用至圓如禮之以和為貴焉此履之所以大亨也文言曰禮者嘉之㑹也嘉㑹𧰼五陽經禮三百曲禮三千也歸於至和象一隂也乃乾四德之亨也元為陽之陽亨為陽之隂正是以隂濟陽合乎乾之亨德此履之所以得亨之義乎象曰上天下澤履君子以辨上下定民志𧰼傳曰上天下澤履君子以辨上下定民志有取天澤之象而謂之履所以履乎禮也禮以别上下明貴賤昭等威也尊卑冠履之義明則民志定而不亂安而不僭矣此從先王制禮之本意說履廣大矣哉然禮儀三百威儀三千其文也待其人而後行則君子之實心也制禮之先王有德有位守禮之君子有德而不必有位如孔子以聖人之德定禮辨上下也定禮而復正樂中與和兼濟也然後作春秋使亂臣賊子懼則民之志自定矣即道之以德齊之以禮也聖人功能必看到此方知世無聖人萬古長夜矣然猶有義焉蓋亦不外乎以隂濟陽之前說也民志隂也乃動而不靜者以失其隂而凌陽也隂欲凌陽必僭必亂以下而犯上以小而加大以賤而凌貴矣惟安乎隂而常處乎靜靜則必動動而隨陽雖動而非失靜之志斯臣守臣節民安民分而上方能正位行道以御衆常尊焉是處靜正所以定志而處靜不越於履禮甚明切矣故禮為隂德而足以統衆志亦為隂體而可以制動何非履之以一隂為守而能範圍天下人心無使隕越之義乎所謂俯而就企而及以合乎中正之禮而得其準者也此大象所以以禮明履乎凡人跬步之間一舉足而不可離乎禮所謂坐如尸立如齊皆禮之見於履昭然者由一身而家國天下皆以一舉足視之視履於終云元吉者即大亨也履禮也事君盡禮禮者下以事上似専為臣下言然剛中正履帝位而不疚君之使臣可不由於禮乎故論語云君使臣以禮此彖傳所以標出九五君道方合𧰼曰辨上下之義上之於下下之於上俱由於禮以為履即推之潔矩矩方規圓根於天地故曰履禮也初九素履往無咎𧰼曰素履之往獨行願也初九變為訟之初六在訟初以隂變陽為履險變為悅德故不克終訟以兌為口而小有言然已不克終訟矣雖有言不礙終吉也亦因變履有禮以制訟耳本爻以陽變隂為訟履初變訟悅德變險何云往無咎乎悅而險知險而悅非設險也正見履卦陽强隂弱陽而濟隂素履以往也初在履始率其靜素之心而行得禮之和以此而往至於履終而吉亦可知矣𧰼傳釋之以獨行其願即素履之本也存心潔白動必有則如有率循於舊章然素位而行亦惟本其志願安其分位以為行耳蓋隂者素也靜之體也所以制履之動孟子曰大行不加窮居不損分定故也是即獨行願之義也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也九二變無妄之六二在無妄之二以隂變陽為履以無妄者為體而得履道之坦坦繫以不耕穫不菑畬為其先難而不冀乎後獲也所以利於攸往在本爻以陽變隂為無咎亦因隂可濟陽而動能主靜故繫之以履道坦坦幽人貞吉坦坦者無妄以為動也自得乎坦平之履道也幽人隂德暗修守貞得吉非有所為而為也𧰼傳言其中不自亂正因悅而變動隨陽而進恐其志亂則失其履道之貞吉矣非隂持其志何以率其氣乎此志即大象傳定民志之志凡履道之主於中正者是也故初之願二之志皆自定志來也六三眇能視跛能履履虎尾嘻人凶武人為于大君𧰼曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也六三變乾之九三在乾三以陽變隂為履繫以終日乾乾夕惕若厲無咎以乾體剛德變隂恐其涉於隂和於乾道有失故凜戒之如彼在本爻以隂變陽為乾當悅體之終變陽輕動以隨乎外而失其內故又深戒之於此蓋隂陽相濟相成中正之道也或偏或倚則失其和濟而凶咎立見矣眇能視跛能履隂柔欲動陽剛之為遂至有履尾嘻人之凶以柔隨剛不嘻人者以剛隨剛未有不嘻人者也如人臣事君遇凶暴而易取禍故又明示以武人為大君如桀紂之主遇比干龍逢之正言直諫不能容也值此時箕子為奴微子去殷是以柔濟剛明哲保身之道也如干逢者雖云被禍未可為凶求仁得仁又何怨然其君之履帝位而有疚不能光明可鑑矣凡為人臣人君者皆不可不明易也𧰼傳以為不足明不足行先知後行知所以為行重乎履也嘻人者乃位在兌口而冒進外隨强暴而取凶也所以謂之不當也武人為君其志本剛而不能濟柔三復以柔變剛而隨之兩志皆剛虎必嘻人此志亦即大象傳所言之志也內卦兑三爻以三爻為主且為通卦之主然卦辭不嘻人變嘻人者變剛也知剛不可用而用柔仍不嘻人而亨矣故內三爻皆以隂為主而用以濟動履之陽初之獨行願二之中不亂皆以志率氣得吉也三為卦主戒之正所以主之耳主以用和而為禮所貴也九四履虎尾訴訴終吉𧰼曰訴訴終吉志行也九四變中孚之六四在中孚之四以隂變陽為履隂在內而私意起以象月之幾望私起而能克以𧰼馬之匹亡為中孚三四兩爻主中孚之中明義象也故無咎蓋中之能孚亦即履之定志也三四兩爻在中志之剛柔進退尤為衆體百行之宰焉本爻以陽變隂為中孚中得孚而履之為禮無往不臧矣志之既定自成其德復能感孚於人由盡人而盡物此履虎尾訴訴畏懼一念致謹始終皆吉也愚謂此爻亦𧰼文王事紂之事在小畜血去惕出無咎即訴訴終吉也二卦五陽一隂四為近五之位惟文王之文德足以當之以隂濟陽柔順中正即是剛健中正一中正而柔順剛健合而為一矣是以在小畜四隂文在履四陽爻俱如一而已於此尤見二綜卦相合之理數焉象傳言志行志行者履由於道進於德由於志之素立也每爻𫝊必言志志洵為行之本哉九五夬履貞厲象曰夬履貞厲位正當也九五變睽之六五在睽五以隂變陽為履睽分而得履和故悔亡雖有骨肉之宗睽而不合然推一心以親愛之皆如噬膚而知痛仁愛之至暌者皆合故往而無咎在本爻以陽變隂履合而暌分其志剛決明斷似乎上位所宜然非所論於履履之為道志在柔順而剛不貴決以其乾健之體變為離明何事不明何事不可決而必用柔順以濟之庶明不察察决必凜凜此古人君旒以蔽明纊以掩聰之道也故繫之以雖貞亦厲所以戒之亦在志必存隂而後履可率陽也象傳言夬履貞厲謂之位正當者陽剛而居尊位欲夬便夬得時𫝑以行威權何不可之有惟如此武人為於大君所以深戒也必剛中正得以隂濟陽之道以履帝位是非可否應夬而又慎之重之如不得已而後致夬焉方為不疚方見離明之德反是而作威作福豈履道乎於三於五尤見五陽一隂隂必濟陽之義歸重於志而不以位之正當為尊所謂匹夫不可奪志也况君子大行不加窮居不損彼昏暴之主焉得以其一以慢其二乎孟子曰貴貴尊賢其義一也以易履觀之君無禮以為使疚而不光明其貽害固重其取凶亦大一讀易而無衆寡無小大無敢慢矣虎不嘻人虎而仁矣虎豈以嘻人為足貴乎其嘻人也亦凶暴獸類之常耳况狐假者猶不屑論本義釋履五𧰼傳曰傷於所恃釋兌九五𧰼傳曰位正當也謂同於履五兑五孚剝亦恃當位所以同於履五皆謂其居君位而恃之耳然五爻繫辭不美者亦多何以俱不言位正當乎固有逞暴遂非之意然必另有義於兌五爻𫝊下明之上九視履考祥其旋元吉𧰼曰元吉在上大有慶也上九變兊之上六在兌上以隂變陽為履以隂變陽易引同類為悅者也不言吉凶以其居兌之終變履而所引之邪正未可知故難定吉凶也在本爻以陽變隂為兌健而成悅是能以隂濟陽終歸於上下皆悅則上下之分明而民之志定矣履至於謹終慎始何非由於內志之兢兢以致外履之坦坦蓋履本乎視視本乎志一步趨而耳目心思俱屬之焉敬慎之極也因以考驗其祥而為周旋之主元吉可知矣此其內考之祥即外旋之吉也內考為志外旋為氣耳履之終言視言考內省不疚無惡於志君子之所不可及者其惟人之不見乎此隂道也此以隂濟陽之道也以中和為致之極德也象傳釋之曰元吉在上大有慶也慶禮之成於終也而其慎始之素履方全乎至行不致以一失而莫償以百得也慶禮之成於土也而其定民之志方孚於臣民不致以有疚而失明德也𫝊意重履之終又重履於上終所以成始上所以率下亦猶志所以帥氣也外卦三爻乾體亦俱以變動濟隂為主四以訴訴用隂而終吉五以夬履用陽而貞厲上以變說用隂而元吉也四仍言志五則言位上則言效外卦就用言故四仍言志而五上言用也然視與考何非內志之既定乎即五之夬履亦夬於志之稍剛耳則六爻無非言志以為動履之本已外卦以五為主亦示以戒辭變則恐其恃明用健有傷隂道也四變巽而訴訴用柔終吉上變兑而視考為志元吉皆附於五必陽剛中正為本然後能成其用隂德為履之道此又坤元順承乾元之義也乾下坤上泰泰否相綜乃乾坤之交也交則為泰不交則否為上經卦之中交也泰陽在內方長貴陽根乾之卦也自乾坤後至泰否凡十二卦而後有三竒三偶之卦見隂陽平和天時人事之難得者也且方泰即綜之為否泰之難如是聖人序卦已有深意矣故雜卦傳云否泰反其類也其為天地隂陽消長之機進退存亡之道大哉所以隂陽期得平和而又必分內外兩儀固不可偏廢而知所崇尚者貴矣序卦傳云履而泰然後安受之以泰然則泰者安也是世道人心之為泰者安而已矣所以隂陽平和而復內外得其體用方為安泰天下國家之政治教化人身之容貌德性皆取此𧰼必叶其占然後安泰也至於通之為義通者交也亦從安來能安而後能通有體而後有用安為體而通為用也然泰之道取敦其體於永固無庸侈其用於至𢎞故安泰一變而為奢泰奢泰即否也內陽而外隂隂之用收斂之謂非侈肆之謂也如反是而陽為用則否矣何也陽為用而其體必多隂柔失剛健篤實之宜矣內失其守外方有盛滿氣𧰼體用相為表裏內存外著非可矯勉內聖外王學問俱於此察識敬勝怠怠勝敬之機焉可忽乎哉故一家一國以及天下皆一心之泰否所推暨也君子之所守修其身而天下平修身又在於正心然則一心為保泰防否之主也誠為所守者至約也而所及者大矣隂地道也是以配天若純陽無隂不成天地不生人物將何以成天道人事故陽必配隂而後成泰非重隂也恐人皆謂聖人扶陽抑隂忘乎和陽濟隂之道也於是小畜履後繼之以泰為治道為人事示訓也綜之而即得否者此亦天地自然之道人心自然之理隂固要濟陽然不可為體祇可為用此又為明道正心者示訓也論陽原生於隂隂原為陽之體然自有易以後即是有天地人物以後也於有天地人物以後言治道人事之體用則以陽為體以隂為用矣雖隂陽原互為體用而陽為之主隂為之輔全易之理數俱如是此讀易者虛實大小內外體用不可不辨者也知此則於泰否反類之中有大經濟斡旋其間而非任運化之自致無聖人之成能矣况日用飲食之微造次顛沛之際何處無隂陽何事無體用必治國平天下而後言否泰之反類哉此又學者君子小人存心制行之分勿謂調元贊化之功不於一身一心之際造始也故否泰人皆言天行氣數而聖人作易全言人心道學識此方可言否泰泰小往大來吉亨泰卦辭小往大來吉亨非冀其往而幸其來也亦非小往而不復來大來而常不往也亦非乘其小往大來而苟且自全於一時也未泰有致泰之道既泰有保泰之道而正當泰時則明乎天時人事天理人心使往者常在外來者常在內在外以為用動而不離乎靜方合隂之用在內以為體靜而足以制動方合乎陽為體正心修身者以此而後推之於行政用人亦不過本於體陽用隂內陽外隂保泰而獲吉也安而後亨亨通之義則吉也隂陽一氣也一時一事皆不能外何以小必往而大必來然則往來者自往來無一時一事不往來而安乎泰者體陽以用隂之心則常小往而大來也聖德王功以心為本俱以和隂陽一體用而成豈曰彼隂而使之往此陽而使之來乎就其為和為一而為往為來即在其中矣焉有有意區别分隂陽為二而能以聖學致王業哉所以用人行政亦是明道立德無不和乎隂陽一乎體用而後久安而得常泰此理甚微讀易者猶當細心體認焉何以為和為一何以為往為來無心有心之間和隂濟陽在是扶陽抑隂亦即在是佛家尚言不二法門况聖學乎今之言泰否者不言氣化則言治功矣失其隂陽合一之體而言泰否是不知乾坤後隔十卦而序此二卦乃於純陽純隂中見調濟中和之㫖也彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也彖傳釋卦名義標出一交字變往來為交正是以交為往來而非往而不來來而不往方為保泰蓋能交而後小往大來為泰無有隂陽不交之往來也天時人事不致離散泮渙而壞亂潰敝者賴乎交也惟恐人謂小往大來純是扶陽抑隂之說孔聖釋其義為交交而往來所以常往來而安泰也推之天地以交而萬物方通天地之氣化交於上下萬物之生死始終往來不窮於中此所謂通也通者通乎晝夜之道也為生為始為死為終死終又為生始何嘗非天地之一氣相交可謂小往大來為二氣乎推之而上下不止於君臣前後左右俱包於內而君臣上下為首蓋君臣上下交而其餘皆交矣上下往來氣也交者志也志同者上下一心如天地之一氣君臣以一心治萬事萬民如天地之一氣通萬事萬物也志同者志不同而心同心不同而理同故云不止君臣上下而左右前後潔矩之道無非以心潔心內忠外恕之道也此所以往來即是交交以為往來而成泰也然交者以分為合也而合之中又有分隂陽平和者交也合也而內外體用者合中之分也天地之道人事之宜人心之主必內陽而外隂也內健而外順也天包地外而陽實貫乎地之中天大地小而地實懸於天之氣天地之體用可知矣此以氣化言也健者剛健中正也順者柔順中正也二德本於天地而備於人心內則常健自强不息以成已也外則常順厚德載物以成物也而隂陽之體用又可知矣此以人心言也若夫調元贊化之體用則內陽而外隂矣修已治人之體用則外健而內順矣推之用人內君子而親之外小人而逺之即諸葛武侯之論而非君子小人並用調停兩傷之說也故君子之道陽道也日以長小人之道隂道也日以消而為久安常泰之世也雖然陽道日長隂道日消長至於乾而姤生矣豈久安常泰之道乎此蓋為內君子外小人言其效也非謂天地隂陽之道使之日長而必不消日消而必不長也天地隂陽之消長即往來也聖人但能使天地交而萬物通而已矣即長交長通何曾不消長而何害其交通乎上下君臣之以交為往來其義亦如此為君如親近君子疏逺小人而能變消長之道何以天地生人不能有君子無小人耶聖人治世亦不能盡使無小人而獨存君子耶惟有親近之疏逺之則賞罰黜陟權操自己運用惟心又何妨長者日長消者日消且能使小人革面革心盡化為君子有何害於隂陽往來氣化消長哉此所以為消長者即扶抑也而扶抑者即和平也即大𧰼傳所謂財成輔相者以此左右民者亦以此也然卦辭明治世氣𧰼君子小人之道消長如此是就現成已然者說𧰼傳財成輔相左右乎民又是成泰之後言保守之道貴於和平無過不及以為久安常泰計耳未成之泰彖言者交泰也已成之泰𧰼言者保泰也保泰則與為無盡而已矣但氣化無盡君子之氣化有盡三代之聖不保衰世泰否原相反類隂陽原相消長君子創業垂統為可繼也創業之君子致泰不易守成之君子保泰為難易之開物成務冒天下之道兼成泰保泰而言其至矣乎𧰼曰天地交泰后以財成天地之道輔相天地之宜以左右民𧰼傳曰天地交泰后以財成天地之道輔相天地之宜以左右民以隂陽往來為交也於彖傳中已明其義至於后之財成輔相本義分釋制過補不及亦是但細玩之似渾講更通蓋天地之道氣化也天地之宜則人事也於氣化之過不及則財之制過也成之補不及也於人事則補之相之雖有政刑禮樂不過則天之道合時之宜非自主也雖貴為天子亦如子秉父命又如臣奉君令輔相之而已制過補不及皆輔相天道以為得宜且人事得宜合乎天則即天地之宜也左右即佐佑然左之右之即制過補不及亦猶財成乎天地之道也左之右之而得其宜民者方合乎天地之宜也天為民而立之君君之宜民而左右之如佐之佑之也然後保佑命之自天申之天地又佐佑其君也天人上下聨為一體天時人事方合為一則泰之所以為泰也道之所以為道也宜者道中至善之處至善固無定處而能止於至善則宜也以此法天以此臨民皆惟后之一身一心以為變化因應故以天地交之𧰼義歸之於后所以著其成能也非聖人而為天子焉能取於交而致泰以保泰乎故上天下地民生其間得聖人而參天地育萬物道常有統也初九拔茅茹以其彚征吉𧰼曰拔茅征吉志在外也初九變升之初六在升初隂變為陽為泰以巽進而變為剛健之德則信可升也正以變升為泰君子得朋時勢德行俱當升也故大吉在本爻變陽為隂為升健體而變巽連二陽而共進所以拔茅連茹而以彚征獲吉也𧰼傳言志在外外即與本卦二陽同進也守身為已為內用世同人即外也志在外者三陽合志同進見用於世所以成泰之義𧰼也九二包荒用馮河不遐遺朋亡得尚于中行𧰼曰包荒得尚于中行以光大也九二變明夷之二在明夷二爻以隂變陽成泰本離明而變乾雖當昏主夷於左股然得壯馬用拯焉凶可免而且吉矣在本爻以陽變隂為明夷本是乾健之體量大而兼同德之二陽且外括三隂包荒之象也其包者衆必用馮河之力也然變明夷若以中隂存私自黨於內卦之二陽而不能兼濟於外卦之三隂則但同陽黨且共伐隂異豈足以致泰保泰乎有此包荒之量馮河之力必外不遺三隂之遐而內不黨二陽之朋此方為尚于中行隂陽和濟往來交泰而合於天道也天道者中和之極也凡朋黨之起固小人之偏私然亦責君子包荒之量狹或馮河之力不足以化小人為君子耳為善之量小則化惡之力薄於是遐皆遺而朋近成隂陽不能交遂大小各分類矣如能學易於此尚中行焉中行即天地之道也天地之道無所不交也天地交而後泰也君子內而道長小人外而道消非君子自內而外小人也非自長其道而消小人也一有成心為夬而非泰矣泰者君子安內而小人亦安於外君子道長小人道消亦化為君子之道也是包荒之善量足以容之馮河化善之力足以制之也革心者即引為用革面者亦使有自新之路易之為朋黨論勝於歐蘇逺矣𧰼傳明包荒得尚於中行更不尚力而専言德量矣兼力言猶有分别彰疸之事専以德量言則使小人遷善改過者一心無二念也此取善於同人而化惡於敗類也誠為中行之道是尚也是非有健德而復具離明之識以離之光明辨賢奸以健之德量包隂陽大小何能無不交而成泰乎非光明則包荒者含糊模稜而已矣非健德則必過於偏執而不尚中行矣此二之光而且大為泰內卦三陽之主爻誠為致泰保泰之良臣也欲為君子者觀是爻之經傳可以明陽交於隂以和濟為扶抑之道矣㫖哉交之一字為天地世道言其通也乎九三無平不陂無往不復艱貞無咎勿恤其孚于食有福𧰼曰無往不復天地際也九三變臨之六三在臨三以隂變陽為泰繫以甘臨無攸利者以悅為臨甘臨也私恩小惠掠美市恩之道也故憂而改之則無咎本爻以陽變隂為臨值乾卦之終接坤卦之始正為泰否相際繫之以無平不陂無往不復明天地之氣化泰否常相反也艱貞無咎則盡人事以維持氣化矣又云勿恤其孚於食有福孚者交也交之為道不貴有心不恤而自孚則上下交而其志同矣非謀食也而於食有福矣𧰼傳但言天地氣化無往不復明其為隂陽來往之交際更宜慎持篤守能艱貞則無咎也於保泰之人事既協而能孚有福可知矣際者當內外卦之間正天地交際之位也以上內卦三爻乾體泰之內君子也初變升為拔茅彚征得吉二居中而包荒以不遐遺朋亡為合於中道不唯包君子亦且容小人所以為內卦之主而佐君成泰也三鄰外卦已有反類之虞所以深保泰於隂陽之交際也初三兩爻附於二以成卦初即同二以彚征也三象傳明其天地際正欲使之堅附於二陽中之道以保泰耳六四翩翩不富以其鄰不戒以孚𧰼曰翩翩不富皆失實也不戒以孚中心願也六四變大壯之九四在大壯之九四以陽變隂為泰繫以貞吉正用罔之本也故藩决而不贏震變為坤故為大輿三四在卦之中故曰輹然唯其變隂成泰所以不致用壯矣在本爻以隂變陽為大壯繫以翩翩不富以其鄰不戒以孚本義翩翩謂三隂也三隂衆𧰼富也而不以之以於其鄰外卦三隂必交內卦三陽方合交泰之道也又云不戒以孚與三爻勿恤其孚同義蓋內外隂陽取象於彼此上下必不期其孚而自交泰方為誠心感應耳象傳謂三隂失實翩翩者三隂也謂失實者失其恃也與朋亡同義耳必不戒以孚出於中心相悅願合志同方與泰道深契乎中心願者又取三四在卦之中為隂陽內外交泰之際也此貞悔二爻雖各明本卦之義而於卦變兼言其象義亦相通焉二貴包荒朋亡乃尚中行以交隂四貴不富以鄰失實中願以交陽乃成泰也六五帝乙歸妹以祉元吉𧰼曰以祉元吉中以行願也六五變需之九五在需五以陽變隂為泰繫以飲食貞吉以其變泰仍未泰而徐俟其時不可强致者勿取乎粉飾太平也在本爻以隂變陽為需既已成泰則福祉自然元吉也泰之為泰所重在謹慎保持而爻辭全不涉本義謂以帝乙歸妹時占得此占者如是則有祉而元吉愚謂如髙宗伐鬼方引古事繫爻辭豈髙宗伐鬼方時亦占得是爻乎抑或藉其爻𧰼擬議乎古事而繫之乎蓋帝乙尊位歸妹者下嫁賢人也如堯之妻舜以二女為天下得人也雖帝乙果否有妹不𫝊矣然以天子之尊尚賢而歸帝妹之貴則正合保泰之主以柔順中正之坤德下交於陽剛中正之賢人誠上下交而志同合尊賢親親而一之者也以是為祉元吉奚疑哉故𧰼傳曰以祉元吉中以行願也不言髙宗矣中者固以位言而德為其本矣以中正之德行其交泰之願所以保泰也如此則占者義亦即在內矣上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也上六變大畜之上九在大畜之上爻以陽變隂為泰畜之大而久則通取𧰼於此何天之衢以言其亨也在本爻以隂變陽為大畜泰之極正與畜之極相反畜之極則通泰之極則否矣相反正相通也繫之以城復于隍三之無平不陂上乃無陂不平也三在內卦之終泰將成也故云平將陂上在外卦之極泰已成矣故云陂復平氣化萬古如斯而人事旦夕有變保泰者可不知所戒乎勿用師者泰非可力保也富國强兵開疆展土正是陂者必平之先聲耳又云自邑告命邑者國也國之本在家家之本在身告命於國非齊家修身何以為帥乎一家仁讓為一國興仁讓之基一身盡孝慈為天下老老幼幼之本以此告命其令方從不然其所令反其所好而民弗從矣又繫之以貞而吝者貞而正保泰之道吝者以為泰而保之則吝也恭儉之賢君何嘗以為世已泰民已安化已行治已隆乎况惟吝也所以得為保也如以為亨以為吉則貞亦必久而渝矣聖人繫辭一字之微垂戒如此猶有為豐亨豫大之說誤國如蔡京者惟魏徵十漸之疏或於貞吝庶幾乎象傳専釋其命重其命之本也已治而將亂必治之以治命治與亂在毫釐之間而成敗千里於此決焉治命告於國邑非治亂之道思患豫防謹身修德何以為端型飭教乎泰卦以內外卦相交取象是以內外二卦相為應不必拘初四二五三六為應之說矣泰卦以內卦為泰將成已著其戒於有心致泰以外卦為泰已成更著其戒於有心恃泰故泰未成惟艱貞而已泰既成惟貞而雖致於吝可也吝又似老子所謂寶嗇之道也即大禹之謹小慎微也不可以為羞吝之吝吝之義言於用財施惠則慳吝而可羞也言於慮漸防微則謹飭而不敢侈肆耳此泰之終始者也以上外卦三爻坤體泰之外小人也然在泰之時羣隂亦皆君子爻所取之𧰼義典卦同而異四爻不富以其鄰以翩翩三隂而附三陽成美也五則以柔順中正主乎外卦下應陽剛中正之臣所以為保泰之主故有帝乙歸妹尚賢任人之吉上則泰極將反類矣示之以戒所以永保乎泰也四上二爻皆以附隂中成卦其附隂則以共交於下卦為正義𧰼蓋泰原以天地交為泰耳內外卦之爻亦有應義二五則正應二以包荒得尚於中行事君所以五以歸妹尚賢上下交而志同同以保泰也二五為二卦之主爻爻應仍是以卦相應若三則與四以相際相孚為應也三與上正應而三與上分泰之將成已成其垂戒之辭故亦相應仍為爻應而亦卦應也初與四一拔茅而彚進一翩翩而富以其鄰亦有上下交泰之義則爻應亦為卦應矣此俱不可為典要者而自有不易交泰之理存焉坤下乾上本義謂否卦變自漸來不知何據不敢置說否否與泰綜天地不交與泰反類隂在內方長根坤之卦也主隂而必反泰主隂者天時也反泰者君道也天時反類無疾君道人事則必以傾否轉泰為宜矣否泰反其類即序卦傳云物不可以終泰故受之以否也猶是泰也綜則為否否泰有反復之𧰼有承接之義其實氣化之自然即理之必然者聖人於泰卦為保泰者示之詳矣終不能不有否者聖人亦無如世運何也聖人處泰自不今復否聖人處否自能令復泰然聖人之身有盡氣化之行無窮聖人創業垂統為可繼也後之泰必為否聖人固早知之未嘗不預圗焉以期為可大可久然泰否既為隂陽消長之機則亦難挽叔季之世風末流之昏暴聖人明知之而無可如何者是以衍卦陳疇無不以人事天道呼吸相通旦夕易渝者著說垂訓何以保泰而防否也何以傾否而復泰也無非令有世道人心之責者加之意耳否之匪人不利君子貞大往小來否彖辭曰否之匪人言否之所以成否而泰不終泰者否之於匪人而已似非衍文蓋文王甚惡乎反泰為否之根原故以匪人昭示也不利君子貞非君子於否之世不利於貞也乃致否之匪人自失其貞故不利君子之貞以形容其短也如訓為君子於否世不利於貞豈君子而有時可不貞乎此處有關世道人心不小然君子終以明道守分為貴不以爭是辨非黨同伐異為賢故又明示以否之世匪人得行其志亦氣化定數使然必隂長陽消有當變之定數故大往小來有應變之化機君子知此時之匪人亦隨化而生奉天而行如徐神翁言蔡京等皆天生魔君使亂世界者雖異流之語荒唐不足信而亦於易有微妙相通者矣於是君子見機而作明哲保身不與匪人爭以自取龍戰之禍矣漢唐宋明黨錮諸子早學易而寡過庶或不致决裂而莫可收拾以致人之云亡邦國殄瘁也此繫卦辭明得否由於匪人而以否之天道詔君子惟匪人不利君子之貞君子亦無論世之汚隆道之行否無不守貞之理也但君子自有君子在否之貞小人未嘗不利君子自守其貞若不以已之貞貞匪人斯全身逺害處否之道得矣非君子忘棄君國而唯一身獨善是圗也否既成於匪人已難挽回君子之貞又為匪人之不利禍及身亡亦無補於君國且賢良戮辱重君國之羞而刑獄繁興剷邦家之祚君子見乎此而全身全名即以同君之聖明全國之體統且以全祖宗靈長之福澤也何也以否之時為大往小來之時也君子以隨時為合義也豈世治而髙尚其志者哉卦辭為君子謀者正為世道謀以匡救造化之消長存亡也然俱自人之一心操之何其重大歟彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也彖傳釋卦名義曰否之匪人不利君子貞大往小來不分釋者正以卦辭三句貫下難於分截其非衍文甚明矣且否泰反類否之時人事天道即泰之反也亦惟以釋泰者反其類以釋之而已就二卦現成體𧰼厯舉其交不交以明天道人事為否為泰蓋重在於交也交則有隂有柔有小人而無妨於泰不交則有陽有剛有君子而無救於否此孔聖傳易釋卦辭而又獨出手眼指出泰否反類呼吸轉變機關也泰言交否言不交於大小往來似無足異而獨於交不交立言者天地之化人世之事俱本心中一㸃至誠主持之也其發明卦辭更深切著明矣內外剛柔正藉泰卦反觀自明不須更贅獨上下交則志同上下不交不言志而言天下無邦者愈見邦家以身為本而身以志為帥矣故愚謂泰否之機全在一心泰卦六爻皆言志同乎否卦初四兩爻為內外卦之始亦必言志槩可見矣卦辭三句連貫而下首句致否由匪人末句成否自造化而中句不利君子貞幾無以為處否之君子立身之地矣孔聖於是以𧰼傳申言之彖傳釋正義者則象傳或别明一義彖傳釋未盡義者則𧰼傳亦多補示之焉聖人開物成務使天下後世明其理耳𧰼曰天地不交否君子以儉德辟難不可榮以祿𧰼傳曰天地丕交否其示君子以儉德避難不可榮以祿者未嘗言君子不可以貞為利也但德本豐而必示之儉難未至而必早知避雖君子之德為榮祿之必及而又必不可不逺自决絶此正君子之處否之貞也貞者中而正也中而正者豈有一定者乎君子處否之貞如此此亦匪人所可容而不致於必為中傷者矣如漢唐宋明之黨禍亦儘有全身逺害之君子豈必以君子自居而以貞自名乎是諒也非貞也小人焉能容哉此非愚敢過責君子也觀於孔聖之傳曰儉德則自以為君子自以為守貞皆非處否之術耳初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也初六變無妄之初九在無妄之初以陽變隂為否惟在初必行之多阻然唯無妄以往則吉在本爻以隂變陽為無妄雖同羣隂而彚征能得貞正而自吉且亨也君子小人在乎誠與妄耳世有未誠之君子未有無妄之小人初六雖隂柔然無妄則坤之德柔順中正合地道臣道之宜者也故𧰼傳言其志在君合同類似近於結黨矣惟志在君則勇於公義而怯於苟合矣此初之所以繫吉也若仍目初六為小人此正黨錮諸君子待人過刻之病焉世豈有志在君之小人乎倘志在君而與衆君子不合則亦君子中之周而不比羣而不黨者矣六二包承小人吉大人否亨𧰼曰大人否亨不亂羣也六二變訟之九二在訟之二以陽變隂為否有不克訟歸而逋其邑人無眚之辭險變順乃不克訟逋邑人無眚散其隂黨而以中陽為主也在本爻以隂變陽為同人坤順變為離明矣坤離二卦皆以二爻為主故足以包承本卦三爻而為立黨之魁也然結黨在小人為失計在君子為非義如小人包承在羣小之中能使同心而志在於君未嘗不吉也若君子特立獨行長民輔主何須包承乎即當泰世合志同方不妨衆正盈朝而終以不遐遺朋亡為得尚於中行也况當否世大往小來寧可包承同心君子與匪人力爭以取禍患乎惟有安於否而儉德避難不榮以祿謝交遊而自守損名譽以全身耳此乃處否而得亨之道否不通也堅守其塞而亨自至亨則通而漸反於泰矣君子小人聖人俱為之謀於此見之𧰼傳言大人否亨又申明一義言不亂羣也羣似非小人之羣君子豈能亂小人之羣者如異乎小人何嘗亂羣如同於小人是同羣矣𫝊所謂羣者正指衆君子言之君子處否並君子之羣亦弗比和惟知獨善全身而已若當否之世彰明較著使人皆知君子有羣此大亂乎羣之道也必致君子之羣盡罹朋黨之禍矣惟其並君子之羣亦不入焉豈有後人恥為非黨人之見乎然則君子之不亂羣自全以並全乎君子之羣者多矣哉愚謂象傳之不亂羣為君子謀聖人之前民用惟知擇義貴精處仁貴熟寧必樂附君子以成名乎語云君子去仁惡乎成名未聞去羣惡乎成名也當否而儉德避難正是不去仁而且不樂於成名也六三包羞𧰼曰包羞位不當也六三變遁之九三在遁之三以陽變隂為否止而變順在內卦處隂之極故係而不能遁然既能畜隂為臣妾不使害正可也在本卦三爻以隂變陽為遁自當儉德避難矣然變隂柔不能不與羣小為伍故包羞焉𧰼傳名其位不當亦就否三內卦之終言位耳既鄰於外三陽欲進附君子不能退安於小人又未嘗不自愧所以有位不當也之釋也包羞不言吉凶進附君子不能退安小人而自恥則中立之人亦無吉凶之可繫矣以上內卦三爻順體否之內小人也然爻義俱不目為小人但欲其附陽以傾否成泰耳初以變震而亦繫以拔茅彚征然必貞為得吉二變訟而令其包承羣隂以從陽三云包羞為之示戒亦貴於附近於外卦從陽而已二雖主內卦但初三兩隂同以附陽為𧰼義則二爻以從中為主也九四有命無咎疇離祉𧰼曰有命無咎志行也九四變觀之六四在觀以隂變陽為否何取觀光用賔乎正以四爻在內外二卦間否又將泰之機也故有觀光用賔之象在本爻以陽變隂又何云有命無咎乎亦因否泰將反其類健體巽用漸近於休否傾否故先有命得無咎也命本義曰天命四固處否而知命者不知命無以為君子矣况否泰反復大化自然可不知之乎但否泰之有命似與大君有命相近四乃近君之位輔佐休否之君而有命者也故三陽之疇皆離福祉且可以和內卦三隂而離祉焉泰四之翩翩不富以其鄰否四之疇離祉莫不合內外卦而言也不然自安天命與疇類何與而離祉哉四之有命平日儉德避難不可榮祿固然矣及其否將為泰又必輔國匡君明良合德共反否以成泰此又疇離祉之所以然也二說並行而不相悖朱子固謂後天之學不妨人持一說矣象傳釋以志行正謂反否為泰上下交而志同同則行耳四五君位相位亦為上下交豈必二與五乎觀於𧰼傳有命無咎釋以志行則承君命而志行布德教以休否必在安命避難之後另有一番得時行道之義非徒以知命樂天為志行矣知命樂天得遂其心亦可謂志行但𨼆居求志徒志為已行義達道方可言志行也愚說一證之𧰼傳再𠫭之以變卦對爻觀光賔王有命為君命可以無疑耳九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也九五變晉之六五在晉五以隂變陽為否五為尊位明體健用可以休否晉德故悔可以亡但失得勿恤往而皆利也在本爻變陽為隂為晉健體明用用以休否無難矣健為明之本未有不健而能明者也故明體健用猶恐朋從健體明用則進而有功耳聖人繫辭就卦爻體𧰼言而卦德為之本亦是體用本末之理也休否則大人之吉可知矣休否即成泰矣成泰遽敢以為泰乎其亡其亡繫於苞桑猶之泰卦常有慎保敬持也𧰼傳但釋其位正當有德必有位乃能休否然非有德足當其位位亦虛置矣位正當者蓋兼德位而言又以德為居位之本也上九傾否先否後喜𧰼曰否終則傾何可長也上九變為萃之上六萃上以隂變陽為否當萃世而不願舍此萃彼故齎咨涕洟即否上之先憂也無咎者後喜也在本卦上九變陽為隂為萃健體變為悅體體健而用悅否至此而傾矣否如心下之痞傾而吐之則消矣繫之以先憂後喜蓋否之極而傾則將泰故先憂而後喜也是處萃而憂則不渙與否極而泰先憂後喜何嘗有二義乎正變卦二爻𠫭看理明辭著如此以上外卦三爻健體否之外君子也然未嘗不合卦之內外隂陽以共成休否四之疇離祉以合三隂如泰四之富以其鄰也五為外卦主休否成於大人而仍有其亡之危正所以成泰永保也上則否已傾又反為泰與泰之上爻可以𠫭觀而明隂陽往復之理數也外三爻俱以五爻主休否之𧰼義五得中休否之主也四承五命而附五也上助乎五以傾否也故五主外卦又以變文明而能休否主通卦焉泰之上貞吝吝是保泰之道也否之上傾否傾是反泰之道也未泰則欲致泰已泰則欲保泰既否則又欲傾否而復泰聖人扶抑之心也然泰而必否否而仍必泰天地氣化之衡也天地何嘗貴陽而賤隂易之所言何非隂陽消長不偏不倚之理若董子繁露則以人心有知之小妄𠫭天地無心成化之大矣所貴乎聖人裁成輔相者惟在未泰致泰既泰保泰已否復泰而已聖人不能使有泰無否常泰不否也果用陽置隂則聖人言泰而不言否矣是言乾不言坤也言陽不言隂也一隂一陽之謂何乎祇將雜卦否泰反其類細思便知天地之氣化聖人之德業世運之治亂君子小人之時命萬物之生死萬事之困亨一以貫之矣大易通解卷三
