body:
  text: 大易通解易類提要臣等謹案大易通解十五卷國朝魏荔彤撰荔彤字念庭柏鄉人大學士裔介之子官至江常鎮道是編乃其罷官後所作其論畫卦謂與河圖洛書祇可謂其理相通不必穿鑿傅㑹又以為乾一兑二離三震四巽五坎六艮七坤八非生卦之次序其論爻則兼變爻言之謂占法二爻變者以上爻為主五爻變者占不變爻四爻變者占二不變爻仍以下爻為主餘占本爻與象辭至論上經首乾坤中間變之以泰否下經首咸恆中間變之以損益尤得二篇之樞紐皆頗有所見惟不信先儒扶陽抑隂之說反覆辨論大意謂隂陽之中皆有過不及皆有中正平和德皆有美凶品皆有邪正非陽定為君子隂定為小人隂陽中皆有君子小人陽之美德剛健其凶德則暴戾也隂之美德柔順其凶德則奸佞也隂陽之君子俱當扶小人俱當抑隂陽二者一理一氣調濟剛柔損益過不及務期如天地運化均平之時此四聖人前民之用贊化之心而易所以作也則未免有意立異然其他探索微至於易理亦多所發明者焉乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀大易通解原序易通者求通乎易理也未有易理寓天地氣化中既有易理寓易𧰼數中未有辭傳理寓於𧰼數既有辭傳理著於辭傳求通易理非由傳求辭由辭求卦爻𧰼數無從得津梁焉古今來著書釋易得傳者己不啻數十百家自有程子傳朱子本義餘俱置之置之者果皆無足取乎遵之者果皆深合於四聖人而無可議乎期於心得之士方有味於此言耳食者何論乎科舉家且經文不全誦省矣余家傳此經固為開闢後第一部書又髙曽祖父手澤是存故自入家孰以來垂五十年未敢少離几上且愚鈍不明常事筮揲知開物成務前民利用萬變不測而一定不移大哉易乎上下千古一理所貫一氣所統烏有隆替乎因是多方探索幼曽遍閲時解率為依樣葫蘆所釋易理不能與心相融㑹而得其通者十之七八乃專意讀宋儒邵周程朱諸子之書發揮易理未嘗不明奈不能使宋儒所言與四聖垂示相融㑹而心得其通者仍十有四五則余之愚鈍洵至矣然終不能去懷抱適值解組憂患莫釋自念放廢之人言不足傳何妨就心之所明求易理之未明而專録其自以為得明者於是悉屏羣書獨就四聖卦爻辭傳表其𧰼數疏其義理務期義理根於𧰼數辭傳本乎卦爻先求前後四聖人同揆之道後求六十四卦本於八八本於四四本於二二本於一之理於錯綜之數求卦於參伍之變求爻然後於卦爻之變動求其貞悔參玩於辭傳之言意求其順逆從違久似恍然全易之理若通於一也乃知向所不能心得者乃余心不通乎易理非時解之駁雜而宋儒諸說之離合也易之理原在天地天地之理原在吾心及萬事萬物之中以吾心之理通乎天地事物之理得其至一者則易之為理與吾心必有相通之故矣卦爻辭傳者四聖人以天下事物之理著之於易原使學者以心之理旁通曲喻盡得天下事物之理而通之於易方能遷善改過知惠迪必吉從逆必凶也不於心求有得奚從學易乎然則余自名所著曰易通通乎自得其心之所通而已矣非敢問世存諸家孰令子孫守為傳經可也雖然易中理數必應求其所謂通者無方無體中亦有則也試歷明之河圗洛書之理數有相通者一也先天畫卦定位與河圖之理有相通者二也後天立卦定位與河洛之理數有相通者三也先後天之卦位其理數有相通者四也易有太極是生兩儀兩生四四生八八生六十四固矣六十四歸根於八八歸根於四四歸於二二歸於太極自分剛分柔至歸根乾坤其理數有相通者五也卦有錯如乾坤等卦是也有綜如屯蒙需訟等卦是也有內外卦交變如咸恆為損益等卦是也其理數有相通者六也每卦有六爻備三才之道每一才每一爻俱與卦為體用其理數有相通者七也卦因爻變而有貞悔爻亦因變動而有貞悔無論一爻動至六爻全動其貞悔卦爻之理數俱有相通者八也彖辭與𧰼辭有合明一義者有另申一義者理數皆有相通者九也彖傳大小𧰼傳與彖辭爻辭有合明一義者有另申一義者其理數有相通者十也上下繫傳雖若孔聖觀玩有得隨時記載然其中原自貫徹為一其言其意與卦爻彖𧰼有釋明者有神明者理數皆有相通者十有一也書不盡言言不盡意言意不能盡求之於𧰼數𧰼數不能盡求之於神明聖人極深研幾君子知至至之可與幾也知終終之可與存義也學易者居則觀𧰼玩辭動則觀變玩占易中理數自有相通於心志若四聖人恍然來告者十二也至於神而明之之為通則存乎其人矣次則引伸觸類亦相通於無窮又何可盡為臚列也乎誠能於此十二則中求其未通者而得其通焉亦可謂用心於學易者矣惟彼世儒志在干祿則固不必盡通乎吾所謂通也子子孫孫善藏此書並勿忘斯言雍正二年甲辰嘉平月鄗南魏荔彤念庭氏謹題於京口寓中欽定四庫全書大易通解卷首江常鎮道魏荔彤撰易經總論三代皆有易世譜等書神農一曰連山氏黃帝一曰歸藏氏夏易連山商易歸藏或前代有此書耶然周禮未載羣書所紀不足據矣自有周易而夏商之易廢如今有宋賢程傳朱子本義而漢儒注疏俱廢也本義本於程傳傳已明者多不復釋各卦小𧰼傳本義率不置一語以程傳己明耳今且並程傳亦將廢大槩世學固陋經文且不遍讀況其他乎至於𧰼數原非朱子所禁道不過令勿執泥之而穿鑿傅㑹耳如乾馬坤牛之類固不必專執如乾天坤地亦𧰼數也豈朱子所不言今則專言義理不道𧰼數易之義理本自𧰼數生出未有繫辭以前為無文字之易則義理體也𧰼數用也既有繫辭以後𧰼數反為體義理因辭而著又為用矣今之學者全求義理於文字非有用無體之學乎故朱子曰未有繫辭之時占者即於卦爻內能知吉凶此論義理乎論𧰼數乎非從𧰼數中求義理占者何自而知吉凶哉且文王周公兩聖人未繫辭以前若非𧰼數又何依據而繫辭耶可見𧰼數之學必不可廢者也聖人作易以前民用原為占者通志定業斷疑耳卦之體𧰼有定爻之動變不測因爻之動變方成卦之體𧰼故爻有九六而無七八七八不動則無是爻而不繫以辭矣即六爻全不動當摩蕩之初亦皆因爻以定卦也但既定卦以後則以卦為體以爻為用故啓䝉云凡占者得卦必觀卦之全𧰼由體以推用也於是今之占者稍知遵守凡三爻動變則兼觀貞悔二卦至於一二爻動應占貞卦之爻者或四五爻動應占悔卦之爻者俱置卦𧰼於不論矣卦為體而爻為用焉得無體有用乎此能遵啓䝉之說者乎因是論之勿論貞悔二卦卦𧰼皆宜參玩即一爻動而貞悔二卦之本爻亦俱宜參玩何也蓋凡有動變固自貞之悔既有貞悔即出入往來也其理氣豈不相通乎上繫傳云居則觀其𧰼而玩其辭動則觀其變而玩其占夫動者本爻也而變者之卦之爻也則貞悔二爻參玩亦聖人所垂訓矣推之自兩爻動以至六爻俱動皆不出此道理也此不止為啓䝉先賢之說繫辭傳云擬議以成其變化蓋貞爻為變悔爻為化必兼變化㑹通其𧰼義始明耳惟六爻全不動則占本卦彖辭乃繫傳所云觀其彖辭思過半矣爻之動變參觀貞悔二卦之本爻其中亦有各成義𧰼不可通㑹者然多為一卦之主爻或其卦有合六爻方成𧰼義者是以偶有不能相合也如中孚以三四兩爻為全卦之中大過以初上兩爻為本末皆自成象義不與别卦通但必亦有相通之義𧰼細玩貞悔二卦自得不能盡列宜參觀者自不可因此而廢彼也況參觀原是觸類引伸不妨至於無窮盡無方體無害正義象也豈可謂為穿鑿傅㑹乎伏羲畫卦是否本於河圖朱子亦未有確論繫辭傳聖人則之一語亦孔聖所推論未嘗專指畫卦其云仰觀俯察近取逺取不盡指言河圖也故河圖與八卦方位祗可謂其理相通即是則之之義矣夫神物聖人所興非羲帝有聖德興神物河圖雖出亦不能知其神也學易者宜就先後天聖人卦畫𧰼數求河洛之相通不必定謂伏羲文王之畫卦定位確遵河圖洛書也學者於有文字之易本於象數者偏不求明𧰼數乃各任其意於無文字之圖書百般穿鑿傅㑹以為能神明於易不知果有功於四聖否耶學者莫不言遵朱專言義理不言𧰼數朱子未嘗有此論遂流為章句俗學意在科舉並義理亦未嘗求明矣此所謂半途而廢也至於究心河洛私意安排有分為數十圖者却於卦爻之𧰼數義理毫無發明即索隱行怪者也此二種皆非真學易者無益於身世者也卦之定位不外剛柔相摩八卦相蕩其𧰼數天地水火風雷山澤昭然者足以盡天下之至賾也爻則剛柔相推而生變化變化固不可測其𧰼數所取亦動而不可窮矣故其稱名也至雜然亦未嘗越乎天地水火風雷山澤之大𧰼數也更未嘗越乎剛柔之本於一也言𧰼數者於此求其義理故不必拘為馬牛為首腹而亦盡在其中矣如此言之𧰼數廢而義理何從以生乎是以有動則有變有變則德性為體變化為用俱在𧰼數矣周公之繫爻辭較文王之繫卦辭文王處其逸而周公任其勞也故卦辭易而爻辭或險也惟相參以貞悔二卦之爻皆明其㑹通之道所謂變而通之也則雖辭有險易皆可以通而盡變焉孔聖𧰼傳往往另申一義即彖傳亦不盡專釋彖辭朱子云不可謂孔子之言即文王之言也此誠深有㑹於易也又云後天之學任人各明其意見更見本義之未盡者後儒不妨各求其至是也知此者乃真能遵朱乃可謂通儒易者變易交易也然實不易也變易者變動為爻交易者摩蕩為卦然變易中亦有交易交易中亦有變易卦爻原不可分卦即爻之體也爻即卦之用也故交而變變而交交變無窮而天地水火風雷山澤祗八箇也八箇祗剛柔隂陽兩箇也兩箇祗一箇也就一成一就萬亦各成一也所以謂之不易也由不易求變易交易一本萬殊也由變易交易以求不易萬殊而一本也此全易之大體用也自有天地以來皆用也自有易以來皆言天地之用也故求易必於卦求卦必於爻求爻必於變動皆是由用以逆求其體故云易逆數也然則體不可求乎非也求明其用正所以求合於其體也天下無無體而有用者也求於體而不可知見求於用而得其體矣故易必先窮理於至精然後盡性於至變至命於至神也卦大𧰼傳皆是君子學易切要處最實著於身心言動吾望學易者必先由明傳以明經焉上下繫辭傳所以明全易之理數也每卦爻彖𧰼傳所以明卦爻之理數也不先熟悉上下繫辭傳則難於得經易簡之理數不先研究卦爻之傳則難明卦爻變化之𧰼數義理不體㑹卦大𧰼傳則學易無下手功夫故三聖之作全賴孔聖之述以集大成也且與後世學者日近所以身心言動之間體之循循可入若為耳目記誦之學及科舉之業則亦無從與之言易矣本義於卦爻多言乘承比應此不過取𧰼數之一端耳若專論此亦猶固執為馬為牛為首為腹之類也至於當位不當位三奇三偶之爻值三隂三陽之位以論當否亦不過取𧰼數之一端亦不可固執其中言當位不當位往往另有𧰼數義理也即言得中亦不可固執必為二五言君臣之位亦不可固執為二五各另有𧰼數義理則另有位另有中另有臣另有君矣故曰易不可為典要惟變所適也乾健也坤順也之類乃八卦之德德即性也情在性內故謂之八卦之性情八卦無知識何有性情然八卦者天地水火風雷山澤之𧰼數也八卦無性情而天地水火風雷山澤皆氣也氣在天則成𧰼在地則成形有𧰼有形斯有性情所謂氣成而理賦焉寧止人物乎自生人物者言之本是如此天地六子之性情亦在𧰼數內萬事萬物之理亦在卦爻𧰼數之內故舍𧰼數則無從知義理也先天卦位乾南坤北離東坎西兊在東南震在東北巽在西南艮在西北說卦傳天地定位一章言之詳矣後天八卦乾西北坎正北艮東北震正東巽東南離正南坤西南兊正西說卦傳帝出乎震一章言之詳矣先天對待中有流行於數往者順一節明之後天流行中有對待於神也者妙萬物而為言者也一節明之傳之釋經本昭然也參以邵子一二三四五六七八言卦生之次序遂令傳不明則經不得明再參以朱子左右分數順逆之說邵子生卦之次序亦不明矣後之君子儒者不於聖傳中求經乃從宋賢諸說中求經是驅䇿聖傳以俯就宋賢之說耳吾願天下學者以宋賢之說求經豈若求經於傳為確不必以聖傳傅㑹宋賢之說也蓋邵子之說乃引傳以明其橫圖也非以橫圖解天地定位一章聖傳也朱子引橫圖以解此章故邵子生卦之序與伏羲定卦之位必不能合今御纂周易折中謂朱子另有意又謂其言左旋右旋與厯家說相反又謂已生未生之卦是言氣化皆用微辭耳嘗讀本義不明求之啓蒙啓蒙亦不明亦無人敢言不明者御纂折中獨有見焉謹録讀啓䝉謬說於卷末三代以後聖人之精意當求於醫卜之書似有激之言實至言也醫卜所言多在隂陽變化能於𧰼數中求義理聖人之精意可得矣今之讀易者乃不知求聖人之精意可謂醫卜為小道乎余幼嘗究心於二小道確知其道與易相通非小道也故敢積數十年之心思而釋易能以易卜卜如神能以易醫醫亦如神矣易固無事無物之理不備而醫卜猶其用之最切當者耳朱子注論語謂小道為醫卜然啓䝉之言卜也詳矣可見二者非小道也三代皆有易周禮云其經卦皆八其别皆六十四謂夏連山首艮殷歸藏首坤周易首乾各就三統建正以定卦首此亦漢儒之言且二代之易其名亦未有確論也卦名則自漢宋以來以為定於伏羲伏羲時己有書契代結繩或有卦名於此時然三代首卦既不同則序卦亦必大異俱不可考矣既有周易孔聖從之夏殷之易己廢此等皆無關學易得益身世者闕疑乃闕不必疑者也履同人等卦卦辭連上成文朱子答或問以為或有遺字或連上成文既自伏羲已有卦名則為連上成文非有遺字矣此稍有關於彖辭者故必宗朱子一說以定之因知未有繫辭以前古人可以因卦爻𧰼數而知吉凶非槩言人人能之也古者大卜世守其官必有相傳之家學占者就而謀之大卜為之決斷但未能詳盡確當如聖人之繫辭耳然則文王周公之繫辭亦是述而非作也自有聖人繫辭天下後世始人人可以用易聖人之功𢎞哉易以日月二字成文天地既分水火斯判日月者天地隂陽輕清之形俱是至變易交易而至不易此一字三代共之想亦伏羲所命名耳此却自來無人說到邵子八卦橫圖所以明生卦之次序想伏羲畫卦時的是如此畫起程傳之說不同者程傳所言八卦相蕩為六十四卦之𧰼義也邵子所言剛柔相摩為八卦之𧰼義也二賢固不必相商不妨各立一說究不外繫辭傳二語而已如此言之朱子所說二賢不同之處亦自相同耳然繫辭傳己有兩說如太極生兩儀兩儀生四𧰼四𧰼生八卦此邵子之說所本也如兼三才而兩之故六六者非他也三才之道也此程子之說所本也故兩說可以並行不悖邵子之學畢竟在數一邊程子之學畢竟在理一邊繫辭傳云乾坤其易之緼邪又云乾坤其易之門邪二語易之體用盡矣緼是一箇屋門是兩扇門從一箇裡出來為二四八為六十四每一箇亦莫不有兩箇兩箇亦祗是一箇也故論卦必明其根乾根坤此論其一箇分為兩箇兩箇又各成一箇繫辭下傳第四章甚明人自不能體㑹耳四聖人作易於隂陽二者未嘗有毫髮偏重偏輕之意如天地然天地之氣化自古及今隂陽均平即有一時之過不及通㑹算來仍是均平何也隂陽雖分為二聖人有心以分之天地無心何嘗有隂陽祗是一氣運行於不息而已其間往來出入亦祗是一氣屈伸開闔並無二氣如何不均平以此較彼是兩箇或有偏倚一氣相貫焉有偏倚即以人之德性言隂陽均平者正性也成之為中德也如有偏倚則過猶不及也是兼乎氣質矣其美者乃高明沉潛之類也其不盡美者則剛而猛柔而懦者也其惡者則剛而暴虐柔而險刻者也均平則為中正之德性偏倚則為過不及之德性太甚則為惡德性矣孟子言性皆善奚有惡乎不知言性善本於繼之者善也言性氣質有惡參乎成之者性以言性也兼氣質以言性孔聖所謂上智下愚不移也是在德性亦以無所偏倚得乎中正為全美之德性參以氣質隂陽俱有過不及之嫌也再以人品論君子小人分矣君子有陽德有隂德得其中正者皆君子也小人有陽惡有隂惡成其偏倚者皆小人也人品在外德性在內外之成由於內之立也由是論之隂陽皆有善惡何為獨立扶陽抑隂之說而言復即喜言姤即怒乎試觀乾坤泰否剝夬復姤八卦隂陽均平聖人有互為調和之意無專尚扶抑之心也余已詳論於各卦復統論之於首序卦傳所序專言承接之氣承接者授受也故序卦傳云受之以某卦至於錯綜則於雜卦傳明之余因思後天聖人位置各卦原本於先天其序卦亦自本於先天孔聖於說卦傳內天地定位一章明之矣上經首乾坤天地定位也中間交之以泰否以水火結上經言有天地之後首生水火也下經方叙山澤風雷下經首咸恆者山澤通氣雷風相薄也中間交之以損益然後下經之尾以水火相交為既未濟水火不相射也以是統結上下經俱是以兩卦錯綜終始復行與序卦傳所言單行承接另一義也此亦本於繫辭傳云乾坤其易之緼邪門邪耳以兩為體以兩為用故可以相錯相綜為根為繼也中間亦有承接序卦傳己明之有未盡則申明之否則不必妄贅焉蓋十翼傳皆另申一義不止序卦不言錯綜而已後之學者祗知序卦傳不知錯綜之㫖於雜卦傳內研究所以不知復行而以序卦傳為盡義豈不失聖人說卦傳之㫖乎上下經確宜兩編非因竹策之繁重也宋賢多論之矣合上下編俱以乾坤純卦首之其中三隂三陽之卦四隂二陽四陽二隂之卦五隂一陽五陽一隂之卦各分所繼俱是復行分根乾坤以明體用此立卦本然之𧰼義也卦之𧰼義既明然後變動之爻各隨其卦以為𧰼義又兼乎貞悔二卦之爻各成𧰼義雖云占易者貴於由爻求卦然為錯為綜分根乾坤陽用陽貴隂用隂貴卦之𧰼義明而後爻之象義可以次第觀玩而得也因爻以求卦者由用以求體也因卦以明爻者因體以推用也亦從乾坤其易之緼邪門邪二句中究心而得此法也雖名之曰繼亦似有穿鑿傅㑹之說然分根乾坤則皆至當不可移易者也學者亦在明卦體之象義耳曰繼者本於說卦傳之錯綜猶之乎序卦傳之非正義也作另有此一義觀玩可耳蓋序卦傳在十翼中說卦傳亦在十翼中俱孔聖所作豈可以序卦為是而說卦為非乎故其說不妨並存之矣八經卦之名說卦傳有專訓矣乾為天坤為地是其體象也乾健也坤順也是其性也又何必多贊一辭學者釋其象義天即乾之象也健即乾之性也聖人作易以象天學者釋易則以天象乾可也聖人以健為天之性情學者以健為乾之性情可也聖人心明其理著之卦以定名取義學者由聖人之卦象繫辭求明其理可也皆就其可明者求其不可明者也乾之名不可明也觀於天可明矣乾之取義不可明也觀於天氣運行至健不己者可明矣聖人將天畫之為卦繫之以辭以示天下後世學者亦惟觀天合諸聖人之卦之辭以求其為象為義雖未可遽言極深研幾然觀玩思索自然有得矣無取乎引喻之多方擬議於聖人定名取義之外也言乾而諸卦俱可例矣八卦之定名取義有聖人之卦之辭可以求之得明矣然此八物何以成也亦必由先天聖人卦畫求之後天聖人文王周公未嘗明言之惟十翼傳中孔聖之訓有明此八物之理氣者大㫖在釋先後天卦位天地定位及帝出乎震兩章今統論於此乾天也此氣以成象也其性情健也此理亦賦焉也其統天而資始萬物者功能也與坤合德而生六子且包坤在內以成此一大物皆一氣之運而理宰乎氣之中也分而為二有乾即有坤合坤為一坤即在乾之內也此乾一大圓象即太極之一大圎圗也地與萬物皆包於內矣問其何自而有周子所謂無極而太極也然太極之外無無極無極即寓於太極之中也無極主乎理以宰氣太極主乎氣以寓理也故易言太極亦可以不言無極矣有乾一層又有本之於太極一層儘足以明天地之體用耳此乾之所以象天為易之首卦以統天者統易也何以三陽為乾因而重之仍名為乾耶伏羲畫卦時由太極之一分動靜隂陽為一奇一偶此乾坤之根柢也各加一奇一偶而少隂少陽四象得矣此即水火之根柢也再各加一奇一偶而三畫之卦備風雷山澤俱成矣邵子生卦次序作為橫圖程子謂之加一倍法乃八卦之根柢也故八卦者天地氣化之始終自剛柔相摩而成也因而重之為六十四乃萬物氣化之始終自八卦相蕩而有也有萬物自有萬事生焉此乾坤所以為易之緼又為易之門上經首此二卦其理也氣也為體為用不大明乎坤地也此氣之成形者也其性情順也亦理之賦焉者也其順承乎天資生萬物者功能也與乾合德而生六子包於天內在天之下獨成一物乃天之下第一大物懸於天中者也皆天之氣四面充周又以天氣中貫而成地之氣其至順之理亦即寓於氣之中也分言之成形配天合言之仍是天氣所結天氣所舉耳此坤之象地配乎乾以生六子六子生萬物萬物生萬事為六子及事物之根柢也三畫之坤重為六畫之坤與乾同為遞生同為摩蕩雖皆天之理氣而有坤之形之性又自成一理氣故與天錯配而次乾焉有天地後二分為四二少之氣其輕清者結為日月成象於天其重濁者結為水火成形於地聖人作易取象定名為坎為離坎險也離明也其性情也象與形皆氣而險明之理亦寓於氣中也成天地後首生此二物其相對錯亦如天地故月非日不明而水非火不溫然日非月無以繼明火非水無以潤燥此水火不相射而以錯為交之理氣也聖人取象以畫卦以二隂夾一陽為坎坎之陽體藏於隂用之內也以二陽夾一隂為離離之隂體藏於陽用之內也坎之德曰險然不盈既平至險者隂而本於至平之陽也離之德曰明然柔麗乎剛至明者陽而主於至暗之隂也推之火炎上本乎天陽用也隂為體水潤下本乎地隂用也陽為體故坎離雖為乾坤之中其實乃天地之氣化最輕清先生者也是以在天成象之日月必麗乎天在地成形之水火亦必附乎物以成物此易有乾坤次有坎離之理氣也山澤二物澤本乎天山本乎地也地隂之極生陽山所以起於地以地之二隂戴天之一陽而止乎隂者也所以取象為山而定名曰艮天陽之極生隂澤所以降於天以天之二陽戴地之一隂而說乎陽者也所以取象為澤而定名曰兌止之者定之也說之者和之也定之而隂不僭以凌陽和之而陽不亢而侮隂此山澤所以通氣即以艮之下隂通乎上陽而成泉澤即以兊之下陽通乎上隂而成雨澤皆山澤通氣之象義也至於艮以止為德凡氣皆以止屬艮止所以為節其行也止陽體而隂用也兊以說為德凡氣皆以說屬兊說所以為保乎成也說隂體而陽用也此艮兑之理氣也風雷二物風本乎天也雷本乎地也地隂之極生陽陽自地中起而為雷天陽之極生隂隂結於陽中而生風也此所以伏羲畫卦以二隂伏一陽下而成震以二陽壓一隂而成巽以明其義象然雷透地隂而出風散天陽而起俱隂陽相薄也惟雷透陽所以行隂惟風破隂所以和陽故薄而未嘗不相濟也至於震以動為德凡氣之動皆震即隂氣亦附於震以為動矣巽以進為德凡氣之進皆巽即陽氣亦附於巽以為進矣震陽體而用以透隂即隂用也巽隂體而用以行陽即陽用也此震巽之理氣也有天地水火四象成後以四生八遂有山澤風雷四物皆隂陽遞生如橫圖所明之次第實有見於天地有此理氣故取其象義而立卦定名云爾八卦不言五行恐未為通論河洛俱表列五行之數易既通於河洛則未可謂之不言五行矣即以乾論姤初六變巽為乾爻辭云繫于金柅鼎六五變離為乾爻辭云鼎黃耳金鉉噬嗑六五變離為乾爻辭曰得黃金說卦傳又云乾為金何嘗不言五行乎即兊之為金困之九四爻辭云困于金車亦象兊也況文王置兊於圖書之金位說卦傳云說言乎兊雖云說屬澤而各正性命未可謂澤澤四時皆有獨言說萬物於兊者非秋令之肅燥何以正性命而成說乎故傳又曰兊正秋也此時雷收於澤澤亦不時降矣說非雨澤可專言也明矣朱子疑金生水之說但雨澤出於天泉澤出於山天固金也艮山之寶藏興焉非金乎兊又為剛鹵剛鹵在地為隂中之陽如山之生金銀為陽中之隂故山澤通氣亦兼此言通不止山出雲而降雨也是艮土生金於山中金氣生泉澤於山外合剛鹵金銀觀山澤通氣合雨澤泉澤觀金生水則兊為金亦大明矣震巽為木有風雷益卦彖傳曰木道乃行合震巽以言木也為土為水為火又不待言是八卦未可謂非五行明矣八卦之五行水火各一相為隂陽剛柔震巽二木分木之隂陽剛柔乾金統兊金坤土統艮土雖亦分隂陽剛柔而兑艮統於乾坤蓋艮即地之顯者兊即乾之藏者也八卦成乎五行五行衍為八卦故易與圖書理氣相通也山中有兊因有天金之氣所以生雲為雨澤而通泉為水澤故曰兊即乾之藏也嘗畫一大圓圖天包地外地懸天中水火金木各居一方是名為六合其實一天包之而已五行皆一氣所生分為五行合之一天如此象耳即太極圖而另一義太極圖是言其生處此圖是言其成處五行生雖各有次第然生則俱生有天地斯分隂陽分隂陽即是水火生矣於是合水土而生木合火土而生金金是土內柔中之剛乃地二生火所鍊而成者先生者最輕清故水必附土火必附木方成形也後生者稍重濁故金木能自成形而亦不離乎土木又先金雖自成形而去水則枯去土則朽金又後木去上自成形得火方有用是木輕清而金重濁矣於是二五之精妙合而凝以生萬物自然是生則俱生而次第亦不可不論也易必言象數者以道理即在象數中也繫辭傳云一隂一陽之謂道又云隂陽不測之謂神隂陽象數也道神道理也所謂不離而不雜於隂陽者也天地氣化如此人之性形亦無二矣形上形下之道器亦無二矣道即理也以體言則理以用言則道也易者言天地萬物之用也故每言道而罕言理理即天命之性也道即率性之道也天地之氣化流行人世事物之所由皆道也而主之者理也是一隂一陽之謂道仍兼理氣言而隂陽不測之謂神似專於言乎理一邊矣器所以載道象因器而生也而象所以形道道又自理生也至義者道之宜也義又何以與仁配耶仁即性之理也程子曰仁如百果中有仁生意存焉種之又生性之理為仁亦猶是也物有終始生意無終始人有生死性理無生死是本性之理謂之仁而行而宜之之謂義也告子以為義外祗是就事物言義不知事物之理皆備於吾性理之中非吾性有理何因而得事物之理故義亦合仁為義以吾心之理推於應事接物皆得其宜者義也仁義合而道可由德可成也佛氏亦有見於性無生死但以知覺運動為性即告子曰生之謂性也不知知覺中有理在知覺虛而理以實之非但以靈明之虛寂者為性也故流為空虛寂滅而不可用於天下後世也試思佛氏之說此心即性性本來一無所有何以應事接物乎何以齊家治國平天下乎故不過自了生死程子謂其以一身之小妄測天地不易之論也老莊之學亦有見於性無生死然又不同於佛氏謂心即是性性本來無一物也亦謂性為應世之本但謂仁義皆造作有為之為非無為之為也較佛氏稍覺可以應事接物故老子之術尚可用之以治天下然聖人用之率性可以為道凡庸不能用無仁義則無修道之教矣天下後世焉能盡率性為道者乎此所以亦不可以成己成物為聖賢凡庸共可知行之道也至於陸王之學在吾儒中立異祗是矯正俗學從事口耳不用心思之弊耳聖賢之學未嘗不棄道聽塗說也未嘗不輕多學而識重以一貫萬也特不可為不博而約者言一貫也不可為未嘗格物窮理者驟語性言天也試思陸王主是說也學而知之乎不學而知之乎彼如未嘗從事於學生而能言尊德性致良知也亦不過一二人秉賦獨異者而名物象數亦不能得其理何以㑹吾心之理而得其通乎乃彼亦從學問入門而入室操戈矯枉過正何能使天下後世皆不學而能知能行乎此佛老陸王皆不可行於久大也易之為書至於廣大配天地變通配四時隂陽之義配日月易簡之善配至德然語靜則必誠必慎語動則必敬必信皆下學切實工夫由此求之皆可上達而言道言神也試觀聖傳所引擬議以成變化前後十九爻及乾坤反覆申明六爻之象義何等確切詳明無一語非學易者所可知可行是即易簡之善配至德也聖人之書至於易極其神化而切實中正宜於下學如此為異說者無乃皆以為俗學乎易因至賾而有卦極天下之至精也因至動而有爻極天下之至變也至精至變之極至於至神可謂至矣然極深研幾乃下手切實工夫也故聖人作易崇德廣業至於崇效卑法至矣然亦不過成性存存為道義之門也切實中正易知易從此所以可大可久也此所以謂之易簡而天下之理得可以成位於天地之中也易之為書天地之氣化性命事物之道理悉備矣學易者須分三層看天地自然之氣化是一層人性及事物本然之道理是一層占者應事接物當然之知從是一層無卦無爻不然也此是學易者最切實下手工夫雖上智之人一以貫之然下學工夫先求入門此亦極深研幾自是始也學易者極深研幾與穿鑿近引伸觸類與傅㑹近何以辨之惟順乎至易至簡之理則極研非穿鑿引伸非傅㑹憑意見之私是以有二者之弊此不可不知也會通之說即聖人序卦傳尚不可固執以求一貫況學者之言乎能以易簡之理㑹通方為一貫易簡本於健順健順本於奇偶奇偶本於一元為氣為理俱一貫矣故愚根乾根坤之說即以易簡貫全易也相繼之義各以隂陽奇偶數同者為繼亦是以剛歸剛以柔歸柔類聚羣分總歸於奇偶而已然亦未可固執以為㑹通無外於此也何也㑹通之道非下學入手工夫不妨待其人以成神而明之之能先從易簡求易思過半矣易平易也簡簡約也此下學切實求易之門也居心以此制行以此吾知㑹通於廣大精微亦必由此而漸得耳乾生三男震坎艮坤生三女巽離兊六子之中皆有父母之元所寄之爻震巽在初坎離在中艮兑在上可知六十四卦本於八八本於二分根乾坤之說有自來矣至於乾坤則以中爻為元化起於中也今之易經漢儒費直所授於鄭康成者漢初易有六家無費氏易自康成注六經始列於學官合孔傳於文王周公辭下自康成始也費氏易十二篇文王繫卦辭謂之彖孔子傅謂之彖傳周公繫爻辭謂之象孔子傳謂之象傳合孔子繫辭上下傳文言並序說雜卦傳共十二篇大象傳即在小象傳內宋呂汲公刋於蜀朝氏景迂鈔存於家朱子因表出呂東萊音訓謂自朝氏始實元豐時已有呂汲公定本也然三聖人之言讀者皆能分别彚於一以便尋省如淳于俊之說未嘗不可明經傳之象義況乾卦編次十二篇之數己昭然即照今本編次可也嘗聞五行之理惟水為陽之清火為隂之清乃自隂陽二儀首化為有形無質之物所以不能自成其物必藉物相合而成木則為陽之半清半濁矣金則為隂之半清半濁矣亦隂陽二儀所生以半清半濁者成形復成質而自成一物然亦必藉物而生以自成其物至於土則隂陽二儀至清之氣成天至濁之氣所凝聚成形而成質者矣惟其原濁所以生物不測也夫水不能自成合之土而成物附於所尅者以陽清合隂濁而成形惟合濁故成形惟本清故無質也火亦不能自成合之木而成物附於所生者以隂清合陽之半清半濁而成形惟合陽之半清濁故成形惟本清故亦無質也木則兼附水土以為形質矣惟其半清而附於水半濁而附於土故不離水土以為生金則單附於土以土成形質矣惟其半濁而又附於濁可以離土以自成蓋木之清多濁少故雖有形質而不離所生之水土金則濁多清少故自成為形質可以離土得火方成至土則自成而生物也非物之所能生也故其形質凝然至厚配天資生焉水必附於所尅之土成物者陽附於隂也火必附於所生之木成物者隂附於陽也一陽一隂而成物獨陽不生獨隂不成也金則附於所生之隂矣兩隂何以成物乎有火而金方成三隂聚而陽在於中仍是隂陽配合而成也木則附於所生陽水所尅之隂土矣一隂二陽參其間仍是隂陽配合而生也木所以不能離水土金所以雖能離土而究不能離火一以三隂聚而陽在中一以一隂二陽參其間生陽也成隂也此五行之所以生成也原其始也有天地之陽即有水有水即有木此天地水木之次第而生成也有天地之隂即有火有火因有土有金此又天地火金之次第而生成也雖一生無不生一有無不有而原其次第相生之義如此未可為常言五行相生者同日而論焉常言五行相生後天之流行也前論五行之生成先天之對待也天與地對待水與火對待金與木對待地即土也合於天而生乎四行也既有先天五行必流行焉所以有後天之五行也先天之五行木必兼附水土水多則朽土多則枯矣金何以單附土而兼資火非土不生形非火不成質也水何以附乎土無土無所範矣火何以附乎木無木無所離矣必以對待言方是五行之始也至於後天流行之五行固人人知之而亦有不盡之義焉金之生水甚難言也山澤通氣水出高源山者水之源也而山為艮澤為兑山之氣上為澤土生金金生水也此金生於水之說也再者乾天也而為金為澤之所自施也孰謂八卦不言五行乎困外卦九四其辭曰來徐徐困于金車困外卦兊體故曰金車也不言五行兊何言金車哉若鎔金以為水為水幾何而可以言天下之水乎天地水火木金共六數天上地下水北火南木東金西是造始之大六合也自有先後天八卦方位而六合之圖形知之者少矣此之謂對待至於天運於外地峙於中春夏秋冬四時行焉此之謂流行月令增出長夏以寄土位五運各分七十二日以土居中運而不動寄於四運之中無時無土如無時無地以載天以覆也其於流行之理氣更著明矣再者五運之中亦無時無五行如十干十二支為周輪以六十時成五日五日成一候以三候為一氣以二十四氣成一歲以六十歲為一元皆五行遞生於不已也與邵子元㑹運世之說亦相參焉於是萬物之生死萬事之順逆際其㑹而成隨其變而化可勝言乎此之謂命此之謂道知之者謂之知命達之者謂之達道上天下地東木西金南火北水六合大圓圖與太極圖另一立象取義者也伏羲八卦方位亦為圓圗變上天下地為乾南坤北以南為天之極低處北為地之極高處定其方正其位焉仍是上天下地之象然後變四行為六卦以兊離震起東南而止東北以巽坎艮起西南而止西北自南而北為起於天而止於地之象兊居東南澤坼於東南也艮居西北山高於西北也離居東日初升於東也坎居西月初起於西也月三日哉生明於西震居東北雷發於寅卯也巽居西南風息於申酉也不離乎天與地及四行對待之象也所以變而為八卦已就體以衍用矣至於文王八卦方位亦為圓圖更變天地等於六卦蓋以為天地亦萬物中之一物耳於是以坎水居北以艮土維之水土必相附而成物亦此理氣也此冬之令也以震雷巽風二木居東及東南為時之春令也以離火居南以坤承之火必附乎木而後歸於土亦三行相承而後成物之理氣也而火土又為夏及長夏之令也兊澤乾天二金居西及西北為時之秋令也坎艮之間厯元所起貞下之元冬又始春此八卦之變對待為流行也復就先天為體以言用體用遞生於天時人事愈益明切矣故六合圓圗天地自成之圗也伏羲卦圗就六合圓圗之體以言用也文王卦圗又就先天圎圗之用以為之體而復明其用也知此三層體用可以言五行八卦矣就人物論之五行之對待一生俱生者則周子所謂二五之精妙合而凝氣以成形而理亦賦焉者也五行之流行者則以呼吸初通於天地之氣為始氣化為水水生腎也腎水生肝木肝木生心火心火生脾土脾土生肺金肺金又通天地之氣以生矣人得其全物得其偏能養者壽不能養者夭此莊生大年之論孟子養氣之學孔子仁者壽之說也五臟主五志備五德修之者賢不修者愚此莊生大知之論孟子踐形以盡性之學孔子命與仁罕言之㫖也先天五行前似未簡明今再約之有天地之陽生水即月也水土合而生木有天地之隂生火即日也火土合而生金此天地五行土寄於四行而配乎天共成六合大圓圗之理氣也有此對待方有遞生之五行以流行此耳伏羲八卦之對待實六合之圓圗為之體文王八卦之流行固伏羲八卦為之體而不知實六合圎圗為其體中之體焉此言更為簡要蓋後天五行遞生原以六合圎圗對待之五行為體而流行其用也是六合圎圗乃天地之始易之元也乎六子卦之初爻皆主動震巽是也中爻皆以靜主動坎離是也上爻皆主靜而不動艮兊是也而靜而不動者又動之本也所以六子之隂陽動靜即循環無端乾坤不用而用六子用六子而乾坤以無用為用也於此附明之隂陽扶抑論陽與隂在太極中本是一氣既判兩儀後以陽統隂然陽未嘗不根於隂一根一統原是均平無須扶抑矣至互根互生往來出入亦至均平其間有太過不及者氣化運行之變失其中和然不過其暫變離常若㑹通計之仍適均平耳聖人雖有裁成之能調燮之事亦是天地氣化隂陽偏勝之極當復均平故生聖人成其位育之效不然聖人且不生故位之有無道能行否皆可謂之天運一治觀孟子論治亂可知矣或著其道如羲文或明其道如周孔皆是天運值乎中和聖人適生而立德成業是以四聖人前後同揆共著一易令人明隂陽消長遞相盛衰俾進德修業常得中和也蓋隂陽二者一理一氣調濟剛柔損益過不及務期常如天地運化均平之時此四聖人前民之用贊化之心而易所以作耳後儒不知謂必當扶陽抑隂余於易通中論辨之或誨之曰扶陽抑隂之說朱子於坤之初爻下論之甚詳似不可廢否泰剝復固天運之自然聖人作易實有扶陽抑隂之意猶夫古今治亂雖亦由於氣數聖人則欲撥亂而反治再如吉凶亦有定數聖人則欲人趨吉而避凶故見復則喜見剝則憂此即聖人之情也如只取其均平易亦可不作矣余聞而唯唯否否是蓋未深思隂陽內各有善幾惡幾美德凶德耳在天運之自然隂陽固各有過不及既謂之無須扶抑則人世治亂原隨天運即謂聖人撥亂反治非扶陽為成治抑隂為撥亂也如堯之水聖人撥亂反治使禹平之可謂扶陽如湯之旱聖人撥亂反治湯親禱之則不可謂之扶陽祗可謂之扶隂矣再如堯之代摯禹之代鯀可謂扶陽湯之放桀武之誅紂以仁除暴亦只可謂之扶隂而已即以吉凶趨避言之扶陽抑隂更非定論陽之不及也宜扶其太過亦宜扶乎隂之過也宜抑其不及也亦宜抑乎何以卦爻之中象數辭傳不論隂陽皆以當位得中為貴而不必喜陽忌隂耶故坤初固戒堅氷而乾上亦防有悔復固見天地之心姤亦表剛柔相遇他卦他爻不可勝舉無不類然矣惟世皆以陽為君子隂為小人所以扶陽抑隂之見牢不可破不知坤之黃中何以謂之君子大壯之用壯何以謂之小人泰二主三陽何以美其朋亡方得尚于中行萃二主三隂何以反云引吉孚乃利用禴其不專以陽為成德而欲其黨同隂為敗行而願其孤立已甚著矣然豈君子不當親小人不當逺哉非也隂陽之中皆有過不及皆有中正和平德皆有美凶品皆有邪正非陽定為君子隂定為小人也謂君子當與而親之小人當嚴而逺之則是然不可謂陽當扶隂當抑也是隂陽中皆有君子小人尤當辨也陽之美德剛健其凶德則暴戾也隂之美德柔順其凶德則奸佞也隂陽之君子俱當扶小人俱當抑也如乾坤之二爻俱為君子當扶乾坤之上爻俱為小人當抑餘卦餘爻可類推焉如必扶在陽抑在隂也何以同人五陽一隂辭無全美謙卦五隂一陽辭反咸吉乎試以人德性行誼論之為人君有陽美德如堯舜有隂美德如禹湯為人臣有陽美德如稷契有隂美德如蘧伯玉寧武子皆為君子耳為人君有陽凶德如桀紂有隂凶德如周赧魯哀為人臣有陽凶德如羿奡有隂凶德如費無極伯噽皆小人耳于此辨之能精方可言好惡得正若不論善惡分君子小人專論隂陽是以二氣相合相得造立天地生成萬物者於中存偏倚之見傷均平之化失中和之理此歷來黨祻造惡者自小人激成者本君子易因有作為君子謀而後儒為此扶陽抑隂之說豈不有負哉故余有見於大易聖人均平中和之道而妄不以為然耳或曰易傳云陽一君二民君子之道隂二君一民小人之道何嘗不以陽為君子隂為小人而子謂子說本於大易豈不謬甚余復唯唯否否此下繫傳第四章之辭孔子自明首二句陽卦多隂隂卦多陽之義也上古德位不離故尊德即以貴位稱之曰君子中古德位不稱遂分君子小人之名一則論德一則論位此陽卦多隂以陽為貴重在陽是有位在上者之道也至隂卦多陽則以隂為貴重隂矣是無位在下者之道也此君子小人乃貴賤之稱非賢奸之名也夫隂陽君臣乃一定之綱如夫婦然而未嘗不相配者是以君臣之稱不得不以隂陽而分而賢奸之名則不可槩因隂陽渾擬矣况上古不惟君臣一德而且君民一心所以孔子繫此亦不外隂陽互為輕重而已故有君貴民賤之常義未嘗不有民貴君輕之變義也然則大易無非均平中和自秦漢以後君驕臣諂上亢下替無怪此議難申矣試就全經中隂陽通復對觀天地剛柔之氣化象辭吉凶詳求人事同異之行藏則知貴均平而陋扶抑於六十四卦三百八十四爻至一無二矣姑因友人摘示而敘及焉大易通解卷首
