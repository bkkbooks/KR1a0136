body:
  text: 大易通解卷四江常鎮道魏荔彤撰離下乾上同人同人與大有相綜陰少貴陰主陰根坤之卦也言卦錯象有自師比之説然實繼小畜履而為卦也同人繼履履者禮也先王之道也大小由之有一人可以不由禮者乎先王制禮賢者俯就愚者企及皆使之無過不及而得中正之道以由禮也故履之非禮弗履乃為同人之𩔖族辨物立體也分等威明貴賤洵皆禮之用矣此同人所以繼乎履也主陰根坤六二一爻主乎卦用離明柔順中正之道以主同人固然也然天有東西南北上下六合以成天日祗一日也天不同而日同用離則為主陰根坤矣且日固麗天而得明者有日而天亦用日為明在同人重離明天不得尚之在乾則重天在同人則重日也故主陰根坤無疑焉序卦傳物不可以終否受之以同人由上卦而序之愚謂必錯自五陰一陽之師而同人之名卦其義象乃明盖師者衆也衆率以正無思不服所以共人世而人皆同此消兵御衆之極則也師五陰以一陽帥之師之用陽也同人以一陰而五陽同之同人之用陰也陽用以興功陰用以通志皆不易之理也故易有貴陽賤陽亦有貴陰賤隂有以陽統陰有以陰統陽扶抑之説必絀於此也濟陰和陽歸於無過不及和平陰陽相濟剛柔聖人之成能也於小畜履二卦已詳説之於泰否三陽三陰三卦之後序同人大有皆五陽一陰以陰為貴彌師之釁化比之私者在是則保泰傾否雖云陽當常内常長陰當常外常消然陽果能常長不消陰果能常消不長乎聖人惟思均平隂陽調劑剛柔於無過不及故於泰否三陽三陰而後序此二卦也師比皆五陰一陽陽為主錯為五陽一陰隂為主同人錯自師能同人而師之衆即大同之人也大有錯自比能有大有則自來比何有私比之念乎象義出于自然非臆度之所生也同人于野亨利渉大川利君子貞彖辭曰同人于野亨師之衆寓於農野乃農之所處言野之農而無人不同矣所謂逺者同而近者可知也此亨而通所以承接於否也利渉大川人心同則渉險大有功矣師卦坎陽為主故錯同人亦有渉險之義利君子貞則能以衆正可以王矣猶恐其流於私㤙小惠邀結民心而為雜伯之業欲速之功耳本卦之德剛健文明固矣而其象則日懸于天也天日在上人之所同無人非天所覆非日所照極人之𩔖仰而觀焉皆見天日乃人之大同也故野之逺川之險皆無人不同君子之貞亦以天日為心則亦無人不同其感孚矣此又本卦正象正義也彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志彖傳釋卦名義則以同人歸之於柔得位得中可證愚説貴陰主陰之理矣師之九二為同人之六二皆以二爻為主而統乎一卦之餘五爻也云應乎乾者乾天也君也師之九二在師中王三錫命亦為應乎君也故同人之二為一卦之主而以應乎乾取象義二卦主爻皆居臣位臣非君無以為主且二卦之二一坤軆一離軆皆陰卦地道也臣道也故雖主一卦而皆以應君為尚聖人所繫何一不出於自然之德象者乎同人曰同人於野亨利渉大川者不歸之離之二而歸之乾之五以君主臣臣方能行乾五化行即離二道行也其所以致化道之行者文明在二剛健在五又皆中正以為正應君健臣明俱合於君子之正道而非出於功利富強之籌國迎君苟悦以得遇也此五此二雖在同人即泰之天地交而萬物通也上下交而其志同也君臣志同斯天下之志通矣君子何以一心通天下之志哉一誠為通復而已通者君子之心感天下之志復者天下之志應君子之心也中庸所謂誠則明著動變而化也大學所謂明德以新民歸於止至善也泰之所謂通同人所謂同者皆此道也象曰天與火同人君子以𩔖族辨物象傳就天日之義象申明之天與火火即日也火乃天地之陰也而用陽天覆日照無人不同此同人名卦之本義也君子既通天下之志而大同矣同而無别非所以善大同也䙝狎凟亂必不能終同矣故必𩔖其族之親踈厚薄辨其物之賢愚貴賤而於大同之中有至不同者焉親親有殺也尊賢有等也親親而仁民也仁民而愛物也以一本之仁推為無窮之義義之盡仁之至義之精仁之熟乃合乎以一誠為通復以一心通羣志也葢不同之中又有至同者聖人先得人心之同然以此通之無不通可知矣在師之帥衆貴於容民畜衆合不同以為同化師之衆争也在同人之通志又貴於𩔖族辨物於大同中别不同盡其不同之分而得其大同之合方可通同人而合志也同人錯師如泰否之反𩔖焉細繹經傳知愚非無據之談初九同人于門无咎象曰出門同人又誰咎也初九變為遯之初六在遯初變陰為陽為同人故繋以遯尾之厲尾同人而遯可也又云勿用攸往者固遯也而更不必攸往也若必不遯將何所用攸往乎在本爻變陽為陰為遯繋之以同人于門无咎同人于門東西南北不知所之姑觀望焉以定同人之從違此詳審於攸往而不輕用同於遯也象傳曰出門而能同於人誰來咎之乎盖誰咎有二義有自任之辭有無人相咎之辭此無人相咎之義也當辨之六二同人于宗吝象曰同人于宗吝道也六二變乾之九二在乾二以陽變陰為同人繋以見龍在田利見大人以其為内乾卦主爻故象之龍德而名之曰大人為下乾卦三爻之宗也在本爻以陰變陽為乾有同人于宗而吝之辭正以變陽失其虛中所主而明不足惟隨乎同陽之宗無大同之心以通天下之志矣故繋之以吝見所存者小而不足以通志也于此爻之繋愈可見扶抑之説非為貴陰主陰之卦爻言也乾之二變同人已為大人人之利見之也君為大人已利見之也皆通志焉在同人之二變乾反不明而黨於同宗致吝君子小人同一責而責偹君子尤甚焉甚勿謂易但貴陽賤陰有偏有倚而悖於聖人和濟均平之道也象傳曰同宗吝道也道者中正無過不及之謂若出於偏倚以為道道所道非聖人所謂道矣君子黨同伐異而自以為道者於此能無警其吝而致其悔哉九三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也九三變无妄之三在无妄之三以陰變陽為同人宜其吉何災乎不知震變離則明過而疑疑生則不明矣故或繋之牛行人得而邑人災是過於明内疑生致灾同人且將致悔於有妄矣乃用无妄之過而非无妄之過也在本爻以陽變陰為无妄當陰貴之卦變陰以濟不言凶災矣故雖同于人而未嘗不慮險防危焉伏戎于莽而自處于髙陵同人之中有自守之道然終三嵗之乆而戎未嘗興不過修文德者不廢武偹通天下之定志未嘗不慮天下之變心此正是明體變動體以明為動雖同人通志善保自全而不為詐不信所愚者也古來君子信人失已墮入黨禍名德俱䘮者豈少哉李贊皇桞桞州不足道矣此爻又與師三爻之輕進輿尸致戒相貫通不止於變爻貞悔恭㸔矣且與錯卦之師相恭也象傳曰伏戎于莽非黨剛敵柔也乃濟柔以敵剛也正慮黨同羣陽於陰貴之世必戒其自防剛𩔖之過中失正既思有以防之且思有以尅之也髙明則用柔克伏戎于莽隱而不見陰道也非尅剛以為敵而不以為黨之義乎伏兵乃陰中之陰取象最深妙矣至於雖伏戎而三嵗不興不過安乎常行苟無黨同于人之心自無強來結黨之敵專守以誠自能通志小人固不敢犯君子而有私心者亦必觀于言論丰采知其存心制行而廢然反矣安行二字為誠身之君子消不同為同化黨同為大同標本原之㫖也傳之言同人通志既無取於結黨為同亦無取於伐異為同貴在誠已之心以恃源而往耳無論同不同皆大同而大通也傳言同人之理誠為妙乎以上内卦三爻明體必文明足以濟乾健乃為同人正義初以變止而同人于門得止道即得陰道也二則變明失虛中文明之德所以吝三變動而伏戎升陵以剛在外卦思以敵之然不興之用用陰也不立伏戎為陰道矣不言吉者安行即吉也内卦主二爻初三兩爻附之成卦戒其同宗正明主卦之象義在陰也初變止三變動止附隂而動安行亦附陰而已九四乗其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也九四變為家人之六四在家人之四以隂變陽為同人巽體變乾進而以同人為其家之富豈聚財自豐以富家乎正是以通志為富家也故大吉在本爻以陽變隂為家人又貴乎容不同以為同矣故乗墉弗攻而吉天下之志非強通也不通者聼之誠至而自通豈攻可用乎亦猶家人以不獨富為富合外卦以富家亦有家有國者藏富於衆即以自豐之義也此爻錯師之四爻左次无咎義亦貫通在本卦則重不必期於盡同而強為同也象傳曰乘墉弗攻義弗尚乎攻也可見貴通志而非強奪其志也匹夫不可奪志三軍可以奪帥若用弗義而奪志以為同則名同而志不同克攻猶弗克耳言其吉者人有未同吾誠未至故彼不能化亦藏身之恕不能喻人而已必俟彼困而不通焉君子于成物之量騐成已之學仍敦吾誠愈久愈篤及彼困而志通則反乎則而大同於吾心矣此不奪其志不攻其墉而使之自化自孚之道也所以無不通而大同也大同則亨而吉矣九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也九五變離之六五在離以陰變陽為同人繋以出涕沱若戚嗟若吉者乾變離明明大過而健不足也明足以憂之而健未足以格之故如此然能行由于能明明本於誠誠之者之道雖次於誠者之誠而因明亦得吉焉在本爻以陽變陰為離健而兼明乃誠而明者也能以誠為明者故能以己心通人心也此同人之君所以助以二爻之臣以通天下之志者也然人心不一豈能盡同不同者固不必強其同矣倘有頑梗不率為君於同人之世豈宜優柔不斷純用禮樂而全廢兵刑乎先號咷者憂天下之志難通而思積誠以喻之也後笑者誠之至而化之速天下之志不同者皆通於以騐君子誠已之功也然或有終不能同大師之克何疑夫克而用大師似強為同矣但期於相遇而不期於相違則仍是欲通志而非欲奪志也與四之弗克亦相合無違也四非君位容有不同者五為君位故不同而至於大師以克君臣天地之道不同也然一使困而反則一使相遇則四五位不同而心則同同於通志而非強奪其志明矣三四五三爻皆言戎言攻言大師非錯於師而取義乎此又愚説之一證也象傳釋九五之同人但言先者先以中之直德帥天下之志相通也斯民也三代以直道而行也夫子之無毁譽不敢違三代之行直道原本乎已心之直道也同人之君先得乎人心之同然欲以一心之直直乎天下此所以必難必慎而號咷也至於後笑一心之誠推之天下皆感應也有不自信其誠孚乎至終用大師乃言相遇者相遇既同矣非克也非必攻城攻地殺人盈野盈城以為克也歸於相遇以言克正以釋爻辭使天下後世言用大師以克者宜法同人之先得同然以為大同不得借口用大師以克人強食弱肉乃謂有合於聖經也於師於同人皆致其戒深矣上九同人于郊无悔象曰同人于郊志未得也上九變革之上六在革之上爻以陰變陽為同人人盡同而當革矣君子豹變革也小人革面猶有未革心者此不可用革矣漸以仁摩以義使化而自革心耳故征凶而居貞吉在本爻變陽為陰為革同人之極可謂同人于野而得亨矣然不敢自以為已能通天下之志也其心終以為同人于郊而已矣必存此不盡之心天下之志無不通猶以為未盡通天下之人無不同猶以為未盡同方見一心之量虛斯受益天下之志滿必多違也故繋之曰无悔功大而德虛何悔乎正是繼泰反否為同人而申明持盈保泰之辭也象傳言志未得也其志何敢自以為得乎自以為得失即隨之此又否泰反𩔖來往於一間者也如必謂郊狹小於野務求同人于野以為得志吾知聖人無此取盈之念必無此貪得之辭焉上九變革武王觀師孟津之時也退而仍望紂之改過遷善豈必同人于郊其志方自得乎恭㸔變爻而得此義且與師之為錯卦亦相貫通開國承家小人勿用正戒貪得無厭之小人啟君心之侈肆耳魏徴在唐太宗未必征高䴡非此義乎同人始于門終于郊皆未足乎卦言同人于野之量然人固當盡同又豈能盡同四海之大内有逸民外有逺夷不同者自在也四之弗攻不待言矣五之用師期於相遇而止焉此外則同不同聼之不妨以不同為同堯容巢由武容夷齊之道也此所以終於郊而不復言野也卦辭必言野者同人之量本如是以為大也聖人之心不敢侈然必極其大同之量惟矢之以翼翼之小心也而其功業所暨則莫限矣卦各有其義宜叅觀而聖學之謹王道之𢎞俱可識矣上九如武王孟津返師倘紂果爾革心俯從則武王惟期同人於西郊不求同人於朝歌之野明矣武王歸安臣道亦乘墉弗攻𫉬吉之義也雖當日無此事未嘗無此理易言理也可以貫通者鮮矣以上外卦三爻健體亦必陽體而陰用乃能同人四乘墉而弗攻用陰用也五以君德陽剛中正然先號後笑先者陽用陽不濟後者陰用陰必從也有不從者大師克之期於相遇而已師陰道也兵刑佐教化之陽陰道非但柔懦而已亦非以武斷為尚也上爻當同人之極而不自得於志亦陰道之虛而不盈所以能終始同人也五為外卦主爻先號後笑用師而期遇皆得乎陰以濟陽之道故且主通卦焉四附五為乗墉弗攻𫉬吉上附五而同郊无悔不致自以為得志皆附五用陰剛柔得其均平之道也乾下離上大有與同人綜陰少貴陰也主陰根坤同於同人也雖錯卦為比然繼乎小畜而為卦也小畜以一陰畜五陽富之極而大有未有有不自畜始大有不自小畜始也天時以小畜而成大有陰陽皆然至此大盛而彼又小畜矣人事大有小畜亦相消長盈虚皆自然之象義也所以謂小畜繼大有也至於主陰根坤之義象日照乎天上則天之下無不照天覆萬物萬物皆天所有則莫非日之所有矣大有主日者以日火代天之陽用也天覆物必日以晅之有日乃成象於天成形於地為衆陽之主也故大有主之日所以寄天之用於日而天不用如邵子之論也是謂主陽矣非也日者陰體而陽用也言主者主乎日之體也故離為陰卦主之以卦之六五此所以用陰根坤也五陽一陰之卦至同人大有極其同而大矣然主陰根坤以重離也故歸於上經終之離卦以為㑹歸者也序卦傳謂與人同者物必歸焉受之以大有不湏另明矣然愚謂大有根坤卦而來為比之錯卦也比五陰一陽以陽為主為用錯而為五陽一陰以陰為主為用其義於同人已言之同人錯師大有錯比同人則師之衆皆大同矣大有則更冺乎比輔之名迹而無所不為其有矣同人之陰中正在二大有之陰中正在五二臣道也必應乎乾五之君五君道也則自為大有主而無非所有故上下應之正是大有而無所不比附矣二卦皆以離之中爻為主坤之元寄於離之中爻也根于坤而錯乎師比無所疑也叙之於泰否之後者同人大有正是極泰之象而即反否之機也叙于泰否之後亦聖人垂戒之深也大有元亨卦辭大有元亨謂所有者大故亨之大也以一陰統五陽亦以元為亨之義也坤之元順承乎天即大有之為亨者也然順承乎天之元亦乾之元而已矣葢乾之元統天者也彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨彖傳釋卦名義曰大有者柔得尊位大中而上下應之即卦五以一陰得位有大中之徳為五陽所歸而成其大有也故曰大有二卦皆言中而未言正有正而不中未有中而不正者也此就卦體申名卦名次言卦徳剛健文明猶之乎同人之卦徳文明以健也應乎天而時行同人言中正以應乎君也大有言應乎天又見二卦雖以陰為主而必言臣應乎君君應乎天也君道天道仍陽道也此正是聖人尊陽之義而又非强尊乎陽卑乎陰也陰原附于陽臣原附于君地原附于天此全易之通義也然在一卦一爻則有陰主陽附之義又必明其陰為君主附於天陽而行乎陰之用易之精微深逺何在不可見全易哉象曰火在天上大有君子以遏惡揚善順天休命象傳曰火在天上大有火在天上較天與火有異天與火就人之仰觀于天日而言之也在同人卦言同人之心如一也本卦火在天上仍是此天日也人仰觀之則日在天下火在天上者日之光上騰其實論形象天在日上然日之上人不能知見也若夫日在天下則人人見之矣是日上之天亦日所照也豈止日之下照乎上而天下而地中而萬物無非日所照即無非君所有也大有以離五為主故取象于日照臨天地上下同人以離二為主故取象于人人無不仰觀天日天日雖同而二卦取象不同聖人之以象數明義理蓋如此之不苟也若但言天火火天何以得明乎故離陰在下卦觀天日而得同人之心離陰在上卦照天地萬物而得大有之勢聖人之徳居大君之位雖同人大有俱為泰之極致而大有尤覺氣象恢𢎞民物富有矣故王者法此象亦不同於同人之𩔖族辨物矣遏惡揚善又有一番設施禮樂刑政必並用賞罰黜陟必兼資矣然非大君之作威作福也順天之休命而已順天休命即應乎天而時行也順乎天應乎天皆以君道之陽而行乎臣道之陰蓋君之於天亦猶臣之於君行於天下臣民則為陽道而應乎天順休命則為陰道矣此仍是坤元順承乎乾元之義也於象傳更申明之尤為顯切同人之𩔖族辨物豈無是非好惡行乎其間但其義有别同人但不為䙝狎凟亂之苟同耳云𩔖云辨即有是非好惡意在親疎厚薄尊卑逺近大同中分等威隆殺之不同而已雖有兵刑而重在禮教至於大有人無不同物無不有矣則勸懲之令必行激揚之教必施矣較之同人言兵刑皆有異義也凡此非君之私意安排也應乎天而時行也以遏惡揚善順天休命也休美也遏惡正所以揚善使咸歸于善故謂之順天休美之命也且保泰防否法天承乾俱於大有發之無剰義矣若就卦論卦尚覺滯執而難通也初九无交害匪咎艱則无咎象曰大有初九无交害也初九變為鼎之初六在鼎之初以陰變陽為大有故雖顛趾而利于出否欲使鼎實更新而為大有也得妄之賤而以子貴者因陰在下變陽而取象陽為子也在本爻以陽變陰為鼎繫之以无交害者風火相交為鼎之利而飲食之道亦有害伏焉况大有之世無所不有則害因交而得者多矣初以陽變陰在下在初無交害之象故曰匪咎也若以無交為嫌而妄交則非艱貞之義故必艱貞而後可以无咎耳象傳專言初无交害亦明在下在初用陰之義也本卦陰少貴陰故變陰无凶吝之占於此又見一斑健體變巽以健為體以巽為用漸進於大有之義欲漸進者必先守已艱貞无咎之義也不必言變卦對爻亦自有義九二大車以載有攸往无咎象曰大車以載積中不敗也九二變離之六二在離二以陰變陽為大有繫之以黄離元吉有剛健兼濟以文明之徳與五同孚何弗元吉黄者中也以地徳為離徳故曰黄離此所以坤元即大有之元也在本爻變陽為陰為離正為大有之良臣濟陽於君而成大有大車以載有攸往既大有矣又有無窮之有在前可往而有之矣何咎乎象傳則恐其有而不能保也故示之以積中不敗善乎玩易者斯得聖人之㫖焉載者載能有大有之徳以往則無不為所有其實一不為已有然後能有之也積中者亦積此已有之徳而不敗則既有而不致于復亡矣如以為致富之占畜財之吝也斯逕庭矣易凢言富皆隂用也鼎初之得妾以子從貴者變陽也本卦二爻云大車以載者變陰也如此之𩔖甚多九三公用亨于天子小人弗克象曰公用亨于天子小人害也九三變睽之六三在睽三以陰變陽為大有明體變動故見輿曵牛掣之象即二爻言大車以載也然以陰柔故不克載往又與上睽天且劓之象也無初有終者以變大有而能用亨於天子矣在本爻以陽變陰為睽内卦之大臣當大有之世多藏厚亡非積中不敗之道也况變睽乎非以所有亨於天子何以明人臣事君之義乎辭厚禄讓腴封皆亨於天子之道也非聚歛以益君之謂也又言小人弗克者正以陽變陰恐其流為小人自豐於利而弗克盡亨於天子之義則凶咎可知亨於天子而不言吉凶盡其當為而無希寵邀恩之念也戒小人弗克亦弗言吉凶象傳言小人害正補辭言凶咎也三以兑體上缺故有劓之象而在本卦又恐其悦君以財故繫以小人弗克聖人預防後世以言利逄君如此内卦三爻皆以二為主同為大有之臣初不交害守分無為之士道也二則大有之良臣三則卿大夫之高位者官貴家富致戒於盈滿貽害尚義而勿重利為卿大夫言之切矣小人弗克且有君即相忘而小人多怨之者亦足成害是又一義亦不可不知所謂弗信乎朋友弗𫉬乎上矣况君側有䜛乎以上内卦三爻健體亦必體陽用陰以成大有之元亨焉初變巽進陰也惟戒以艱貞二主内卦變文明能積中方不敗其所有三變兊悦以其所有亨君悦以正也故小人不克皆以陰用濟陽為象義也然二為卦主初三兩爻皆附之也故二之中積當為初元害三用亨之本於誠也九四匪其彭无咎象曰匪其彭无咎明辨晳也九四變大畜之六四大畜之四爻以陰變陽為大有象以童牛之牿以近君而防觸也亦為位尊家富者申驕僭之戒童牛自犢時已牿之陰性養成故元吉也古之卿大夫皆世禄也况有王公之族乎襲寵居豐左傳云驕奢淫佚所自邪也四者之來寵禄過也故貴於童牿使明臣道之宜也在本爻則繫以匪其彭程傳彭盛貎極得之貎驕滿而動蕩可知矣匪其彭即一命而僂再命而傴三命循墻而走也咎何從致乎此亦與三同戒近君更危厲矣象傳曰明辨晳也為離體文明言之必明晳孰為中而當執誰為亢而當戒然後能保世承家也以四附五成離故云用明焉六五厥孚交如威如吉象曰厥孚交如信以𤼵志也威如之吉易而无備也六五變乾之九五在乾五以陽變陰為大有乃主乾卦者雖不必言變然文明之徳固兼之矣故繫之飛龍在天利見大人聖人徳位兼隆亦不必言有而亦無不有所謂首出庶物萬國咸寧也在本爻變陰為陽為乾以陰為體以陽為用文明而剛健以居尊而有乎大有群陽之孚於一陰一陰之孚於群陽以交孚為孚其孚也至矣此所以能主乎大有而有乎大有者也又言威如者五之離明惟恐健之徳不足不患明之察不足也威如者以陽之剛健為離之文明如乾之五内外皆健方吉也五之變乾五雖亦同乾五之剛健中正猶必戒之者終以陰體故耳且在大有主陰之卦也此聖人於貴陰用陰之中必以尊陽用陽為義也象傳推本於信以𤼵志自信以𤼵群陽之志志在已為忠在人為信合而言之交孚於誠而已泰之為泰上下交而志同大有之五言信言志與愚説為泰之極致亦合未泰以致泰既泰以保泰保泰即保其所有之大有也以誠建極以信㑹極以比為歸極也以此觀之大有根於坤錯乎比繼乎小畜以致大有一以貫之矣象傳曰威如之吉易而無備何也蓋謂信以𤼵志之中自有威如之象非作威也人君之尊多有示人以威以為難測則臣下不敢犯此正非信以𤼵志之道也惟上下交孚忠以存已信以𤼵臣民之志則其親也實親尊也至尊何非至平易之中有至尊嚴無備之中有不可欺玩者乎此象又補爻辭之未及所以戒後世君日驕臣日諛君我詐臣爾虞之陋習也爻象之義葢互明焉安有上下交而志同不為泰於永永者乎反此則否威如而不平易設險阻立城府以為有備者正健之不足自以為明察而實汶汶者也惟一本於誠焉不求其威而有威可畏有儀可象所謂穆穆文王之容本於緝熈敬止也即一衛武公詩咏其盛徳之容如彼一本於切磋琢磨之學盛徳至善之止也後世之威如暴虐而已其言有備則逆詐億不信任權術施智巧言駕御言籠絡而已矣與易所言相去何止逕庭乎此純王之政非純王之心不足以成也上九自天祐之吉无不利象曰大有上吉自天祐也上九變為大壯之上六在大壯上爻以陰變陽為大有恐其恃有而壯往不知以危亡為戒故有羝羊觸藩不能退遂无攸利之占然艱則吉守其有而勿壯往是戒也本爻以陽變陰為大壯大有之極無戒辭者何也離明變為震動已得體剛用柔之象義矣此所以繫以何天之衢天祐之而吉無不利也天之衢者陰陽均平為道也上能由乎此則天自祐之所以吉而無不利象傳言大有之上所以吉者天祐之耳天豈無故而祐之乎由於應乎天而時行合乎天之道也卦以五爻之陰為用為君而上爻以一陽又言君道則五之厥孚交如威如言體用也上之天祐吉利言功效也此乃合二爻以言大有之君也五陰道離體本乎坤地道也上陽爻乾體本乎乾天道也大有之君陽體陰用合乎離而其功能同乎天乾坤陰陽交際而為泰者也卦本以五一陰為用為主而必兼上爻明君道者以天道陽體示君天下者也此又離元即坤元坤元即乾元之義者也見君行乎天道天祐之者天自祐其道也所以大有至極而不言戒葢因天之道為道耳安有君道同天而不永泰常有者乎在聖人而體天為道巍巍乎惟天為大惟堯則之尚何戒之可言哉學易者於此必知聖人法天自有戒懼之心無庸示戒在賢人君子希聖以希天尤當於無戒之中存其凛戒之心也况謙卦即繼之矣非一示戒之義乎一部易經作一篇讀方善也以上外卦三爻明體陰用也然聖人言陰用必主乎陽四之匪其彭陰道也而明辨晳則明之麗天陰陽均平焉五為一卦之主厥孚交如陰道也而威如之吉非陽體乎上爻何天之衢衢即道也君道在上爻明之五爻乃其徳儀也此大有貴陰主陰而又必體乎陽與内卦健體合而陰陽均平矣外卦三爻主離離二即大有之五也四上兩爻附之四之匪彭同徳附於五厥孚交如威如也上則言五爻厥孚之故同於天故為天所祐耳故五又主乎通卦焉艮下坤上謙豫二卦相綜五陰一陽陽少貴陽根乾繼師比謙繼比豫繼師皆以陽為用之卦也謙謙序卦云有大者不可以盈故受之以謙所以承接大有而示戒補大有上九無戒辭也然實根於乾陽而錯乎履者也乾之三乾乾夕惕變陰為履三之履虎尾咥人乾三以其能體乾陽而无咎履三以不能體兑陰而凶再錯為謙三又以能體乾而為謙卦之主爻合於卦辭之君子有終也以五陰一陽之卦故以陽為貴為主又與履錯成三爻之陰主以濟陽者今復錯為陽以主衆陰然則履禮行謙也又以恭而有禮為貴不以足恭為尚也是三爻之陽為一卦之主也終以陽而體乎陰者也以陽為體以明行禮者必内有剛健之徳而後用和非知和而和也此謙卦之確有根抵者也至於謙之繼比請以卦爻之變論之卦體山高於地而山伏地下髙而能卑謙之本義也然地勢坤厚德載物何非地之所載乎載華岳而不重振河海而不洩水載於地為比山亦載於地而山反藏於地山雖高而終小地雖卑而自大卑而不可踰地道也是以變水之在地上者為山之在地下水之險山之高皆以至卑者維持之謙之義也謙光反求於地中勞而不伐有功而不徳厚之至也是坤順而兼乎坎險俱化為謙其義象則在卦之三爻此謙之所以名卦歟謙之卦陽少貴陽一陽統衆陰徳位兼隆可不謙以繼之乎故以此一陽伏於三陰坤卦之下三陰之象臣民也君徳君位下於臣民所以謂之地中有山也謙以卑牧似法坤也然謙尊而光卑而不可踰陽之升也三乃艮之上爻得乾元而為艮者所以主乎一卦以此為貴而用之根乾何疑乎謙亨君子有終彖辭曰謙亨君子有終亨者順也順則亨而止亦亨乎以順為止所以必大行時止則止時行則行所以止亦亨焉君子即地道無成而代有終也謙不自以為成然有終之成大矣逺矣久矣俱從順止取其象義也如此似用陰何以言用陽不知君子之有終正以體陽而用陰耳其言貴陽者以陽為止也陽為體以止陰即為貴陽之卦也順而止順乎陽也順陽而止非止於艮上一陽乎因能止而得謙之義象矣况本卦五陰一陽惟三爻之爻辭與卦同則以陽為體而以陰為用又奚疑乎蓋謙從履錯用謙即是行禮行禮貴于用和用和又非知和而和體嚴而後用和未有無體有用之禮自無無體有用之謙矣無體則偽矣偽亦可以行禮致謙然難乎其有終必矣王莽謙恭何終之有然則根於乾而錯於履繼乎比也何顯切哉彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也彖傳釋卦名義曰謙亨者天道下濟而光明地道卑而上行以艮為天道以坤為地道也艮以上爻之陽為乾元寄艮艮原以上爻為主今伏於地下下濟也何謂光明在艮時止時行原有其道光明之象義也水有潤而山有輝水有色而山有光凡山逺望乎烟嵐近接乎翠微所謂光明也艮伏而下濟光明則上升矣此天道陽氣之篤實光輝也地道本卑今在山上山在地中地大山小山雖高於地地實藏乎山是山之為山地之陽氣積而成也故山亦不過地氣之上行者耳其體𧰼本乎地卑而上行為山此所以至順有必亨之義也君子以天道立體謙之有終者光明而盛徳光輝𤼵著於外君子不自知者也以地道主乎用卑以自牧其實德日盛而道日尊上行而莫能踰亦君子自然之功能非有心於必能上行而為之也此君子合乎謙之體用以合乎天地之道者也然後以天地神人之道暢言謙道天道虧盈益謙地道變盈流謙自然之氣化也天地無心而若有心也鬼神害盈而福謙亦一定之理數也鬼神有知而無形雖不可度而實可騐也人道惡盈而好謙則證之往古合之當前無論親踈逺近人情如一矣人心者鬼神所鑒明天地所托附也人道之好惡天地鬼神之取舍也此謙之為徳所以貫三才歴古今遍宇宙立極而永亨者也何也謙則尊矣卑則不可踰矣謙尊者得乎天道之體也卑而不可踰者得乎地道之用也立體制用皆合乎天地謙之時君子之有終蓋若斯之難也此君子終身以之為終者也變即消也流即長也言變流者地道静幽更難見見其好惡於氣化之微云爾象曰地中有山謙君子以裒多益寡稱物平施象傳曰地中有山謙正謂山雖高而地則大山不外於地雖髙而不可踰卑也主乎地道言謙之用明謙卦之象也不言體者以前民用開物成務皆言用也君子用之以裒多益寡裒山之髙而多者益地之卑而寡者也多寡祗就高卑取象非言地寡於山也此天道下濟也象山在地下也此君子用艮也然裒多益寡亦有節以制之非無禮以為節之和也君子又有稱物平施之學各審其分之當然以盡乎謙之應得不過稱于物之分量平乎施之合宜而已此地道之卑而上行也𧰼地在山上也君子用坤也是象雖言用而體已立乎其中矣天道下濟光明之陽實主乎地道卑而上行之陰蓋卑者地道而上行者原天道也坤之道皆順承乎天道者也卦以九三一爻為主以陽道主體者在是所以為君子用謙之主以成乎謙徳行乎謙道也初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也初六變明夷之初九在明夷之初以陽變陰為謙初離所䴡之爻傷而垂翼君子之行三日不食當明夷之世在下位堅於守義故象以有攸往也本爻變陰為陽為明夷則謙徳之始行謙而又謙君子之謙無已也雖涉大川亦利而吉焉見謙徳自始要終皆吉之道也象傳曰卑以自牧也牧養也以卑為養所以涵藴優柔内敬外謹無所不用其謙也正釋謙謙之義耳六二鳴謙貞吉象曰鳴謙貞吉中心得也六二變升之九二在升以陽變陰為謙當升而謙故有孚而用禴之吉孚者誠也本乎二之中而非偽也本爻以陰變陽故為鳴謙非自鳴其謙謙徳既裕令聞自彰也然聲聞過情君子恥之因有貞吉之戒亦因變升戒之也象傳言中心得者自得於心非求聞於人方合貞吉之辭耳二居中以中心象之心孚之義聖賢學術貴在誠孚中心自得自慊不自欺也九三勞謙君子有終吉象曰勞謙君子萬民服也九三變坤之六三在坤三以陰變陽為謙含章可貞所以從王事而無成有終含章地道也即謙徳也含章美於内所以宜貞也從王事而以無成為有終大順之中有至健之徳因其變順為止所以以艮止為順之體也本爻為卦之主爻原以艮上爻之陽根於乾健為一卦之主立乾體以致謙用者故繫之以勞謙君子有終爻與卦同辭亦見卦主於此爻也然卦不言勞而爻言勞者卦言其理爻則着乎事矣卦爻同為君子有終則彖傳已明其有終之所以然矣此爻又與坤三同繫有終者無成之有終即君子勞謙之有終也象傳釋以萬民服者一陽主乎五陰有君之象不必定以五為君也為一卦之主者即君象也三以君言者不為君亦有君之徳也履三辭云武人為於大君原指上九也履以五陽夾一陰亦為履卦主爻不以為君者所繫之辭云履虎尾咥人非君象義乃事君者之象義也周公不以為君所以不敢從之以為君謙則象傳明言萬民服矣即不為君位亦有君徳也以為君亦遵傳而已以上内卦三爻止體謙以為止止又為謙所宜止也故三爻皆吉初變離以明為謙卑牧而不可踰也二變升鳴謙雖實至名彰然必貞而吉也三主乎内卦且主通卦以一陽率五陰而處於臣民之下所以成卦也不惟下卦二陰附之得吉即外卦三爻亦無不附陽而得吉此謙之六爻皆吉也六四无不利撝謙象曰无不利撝謙不違則也六四變小過之九四在小過之四以陽變陰為謙乃小過之中二陽爻主乎内卦艮之上爻也陽居中以制過故無咎有陽為主以制外陰故弗過而且能有遇往厲必戒者艮體止性戒其動也勿用永貞又因變順恐其固執於不動又貴隨時偕宜也在本爻以陰變陽為小過謙而能過小過象傳所言禮過乎恭故曰撝謙无不利也且在外卦是謙徳已發著於外而可以施行其謙於有為矣本義釋撝謙為發揮其謙以示不敢自安之意然非有意以示人也觀於象傳之釋无不利撝謙明其不違則惟恐謙徳𤼵揚表著之過耳不違乎則固是恭而有禮矣亦仍是謹慎收歛無一毫侈張炫耀之意方无不利本義亦湏善於體㑹本義之釋撝謙終不如傳之釋撝謙為明切矣撝即為也謙而誠於中形於外立乎徳著之儀無在非謙也故无不利言動存𤼵之間无非謙方見不違則謙即敬也無不敬而安所止五常百行無不得宜所謂不違則也以此言撝何不可乎將𤼵揮即作表見意㸔又合傳註為一矣六五不富以其隣利用侵伐無不利象曰利用侵伐征不服也六五變蹇之九五在蹇五以陽變陰為謙繫以大蹇者陰體也險變坤坤順徳以順化蹇為平矣此朋之所以來濟蹇也在本爻以陰變陽為謙繫以不獨富以其隣乃謙盡在我順徳已乎與之者衆也以其隣為富者即蹇之朋來也坤體多言朋三陰合徳以中爻為主也隣亦朋耳以上下二爻言隣更切變蹇有險謙已極而險阻在前不得不思克之矣謙以得道而多助人道惡盈而好謙之理也富以其隣而侵伐險阻將无不利矣或疑謙卦何以有侵伐乎蓋五陰用陽體在五君位雖非謙卦主爻而是本卦尊位雖本陰柔坤徳變陽已兼剛健為體所以剛柔相濟能用謙而無不利也至於用侵伐而亦為用謙方合乎體乾用坤體陽用陰之謙道豈一味隱忍退縮如周之下堂而見諸侯乎微而至於襄王不許晉文請隧王孫滿不許楚人問鼎以其辭命謙而得體強晉暴楚不能得志亦可見謙之無不利矣况禮樂征伐自天子出天下有道之時乎利用侵伐制強暴不服者何足以損謙徳而隘謙量哉剛柔兼濟為謙非過柔無剛為謙也象傳明其征不服也正是此意至於蹇五朋來濟蹇則險阻亦在所必克矣此義固可㑹於言外上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上六變為艮之上九在艮以陽變陰為謙繫之以敦艮敦厚而安止於所止乃艮之終止於應止之至善也在本爻以陰變陽為艮謙之極而止於是必聲聞於極逺然亦非自鳴其謙於在上也二之鳴謙鳴於國邑之中上之鳴謙鳴於國邑之外矣亦云利用行師征邑國又何也謙徳已著禮盡於我懐柔之道無缺而後聲罪致討之義可行也邑國本義謂自征其邑國愚謂邑者食邑也自公侯至卿大夫皆有之自諸侯言則邑乃其國自卿大夫言乃采邑也若自天子言之則邑又為王畿千里之地矣然易言邑國不必詳分何為邑何為國所言皆虛理非春秋之紀事必考其實也邑國者亦就不服之人言之何必分人已之邑國乎象傳則釋之甚明矣曰鳴謙者志未得也非以有不服為志未得乃以謙之徳成乎已而未能盡成乎物有一民不被其澤者若已推而納諸溝中伊尹之任固如此矣葛伯不祀於湯何與而必征之則其志大思濟天下以道東西南北無不征者非如秦之兼併也除昏誅昧以盡其成物之量正以極其成已之徳也然猶恐後人輕於用師故又繫之以可用行師以征邑國可者可以用可以不必用之意也徳教以化之為主不得已則可用行師毫無立威好武之見存也有一動念於此謙之極而驕泰隨之君子豈以是為有終哉審於君子有終卦辭則終於謙而已矣不得已而利用侵伐行師征國明謙非優柔巽懦之為其間亦有剛斷乾行之事耳非謂謙徳已成謙譽已著必用征伐以示叵測也觀象傳釋五爻以征不服釋上爻以可行師其垂戒深逺矣以上外卦三爻坤體順乎至順者為謙之則也四爻坤變巽巽進有為以不違則為義五上兩爻言征伐用師者五爻以坤變坎有合乎水山蹇也故用征伐平蹇上爻變艮何以言行師艮之綜為震震動於艮静之極位所以濟艮之止謙終行師所以慎謙輕於終也師征義象振謙恪恭之文徳於武備也以五爻主外卦本坤元也四上兩爻附之四之不違則附於五中以為則也上之行師亦附五而征不服耳雜卦傳言謙輕而豫怠也艮之上爻變謙繫之以敦艮本卦上爻變艮繫之以利用行師征邑國似與謙輕二字有至切之義湏熟思細玩自得之蓋敦艮之象傳云以厚終也因其變謙以君子有終之道終之也正是以厚終砭謙之輕輕則不能久矣為主謙用艮者示成已之道也至於本卦上爻言行師征邑國無乃亦是制謙之輕乎謙之極則恐有玩狎故明威武以征不服又為用謙者申用乾陽剛健之體以盡成物之道也合之成已成物俱要慮謙之輕於是厚終以持久振作以有為君子之謙所以能終非一於柔道為自得也朱子語𩔖引老子大國下小國則取小國小國下大國則取大國以明謙五上二爻言兵之義又云大抵謙自是用兵之道只退處一歩耳所引老子不知與聖人之言有異同否謂用兵退歩合於謙則深於言兵者也愚於雜卦傳言謙輕有取焉亦不知果有合否至於退一歩豈止用兵之道為然乎富哉言矣坤下震上與謙相綜陽少貴陽根乾而繼乎師豫豫序卦傳兼大有謙而序豫於单序傳中少變矣愚謂豫亦五陰一陽之卦綜乎謙而錯乎小畜之卦也亦自乾來主陽為體者也小畜以一陰畜五陽畜之久而豫豫預也小畜漸積而致者也畜之極而變豫則因預畜而得悦豫矣謙綜為豫序卦兼言大有豫錯小畜焉得不言小畜乎同人大有二卦根於坤錯於師比謙豫二卦根於乾錯於小畜履皆體象自然而非安排所得焉其卦之為主在陽乃震卦之初爻為本卦之四爻也以一陽振動五陰也小畜之錯錯亦變也且變而盡變是畜之預而為豫之基也故小畜之宻雲不雨至豫而建侯行師矣合二卦恭㸔陰微而宻雲不雨畜而陰盛又主乎陽而建侯行師得民心奉天討文王之自我西郊變為武王之陳師牧野矣天時人事二卦確相照應豈可謂為無據而言乎然豫者和悦之義仍言建侯行師何取乎葢必人心天命皆和悦而建侯行師乃利也利建侯行師卦辭以一利字該四徳矣所以不另繁一辭豫之繼於師何義乎豫所以繼師功成而作樂也人心不和則争争而有師師之功成人心太和王者作樂以師和天下之争者以樂合天下之同所以豫繼乎師也根乾者何師陰用而陽徳以仁為勇之本以不殺為撻伐之宗以徳化為兵征之本也皆陰用而陽體也樂之作也以衆音之陰宣逹陽氣即以和暢陽徳也必太和為豫而又戒陰私之豫豈非以陽為體徳而陰為器用乎所以豫繼師以和消争以樂弭兵人心太和無思不服矣豫利建侯行師彖辭曰利建侯行師似無弔民伐罪之義何謂與周文武之事有合乎然觀於𧰼傳之作樂崇徳薦帝配祖則有天下之義也功成而後作樂是不必言誅其君弔其民自在聖人以順為動之中矣彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉彖傳釋卦名義曰豫剛應而志行以陽剛之四爻為主上下五陰皆應之為同志是以得行其志也至能使上下應而志行者則體順以動之卦徳於已也順者坤徳動者震徳而震初之陽即乾元之陽也乾元之陽動而順循乎坤之道亦以剛健為體以柔順為用者也以是為動已之志先順而豫則天下皆大順以應其動豫之所以為豫也乎再推豫之順動則天地亦如之不違况建侯行師何弗利哉如之者亦是應之之義也再推言天地亦不過順動而已天地以順動故日月不過四時不忒其或過或忒焉動必非順矣聖人以順動故刑罰清而民服其或不清不服者則動亦非順矣是順乃動之則也動本於静之理也然本卦主陽何以順為動本乎不知此正是主陽也以陰為用故主順也其體則本乎陽之健也蓋就陰陽之體用論則以陰静為體以陽動為用就順動之徳言體用則陰道大順之用又以陽剛内主為體矣陰陽體用變化莫測神而明之存乎其人無膠固之體用陰陽自不得以執一之説盡之矣故以一陽為體以動必大順為用正申言順以動也在本卦五陰一陽終以陽為貴是為體為用俱可以陽言也至於樂之為徳也以陽為用以陰為體與禮相反者也何以主陰於履履謙相錯又何以亦主陽於謙乎在履主陰不致於禮勝則離也在謙主陽不致於恭而無禮不知以禮節之也小畜何以主陰錯豫何以主陽乎小畜主陰所以畜陰致和也豫主陽不致於樂勝則流也反覆正變體用互根盡乎陰陽之義矣不可以為典要亦在此所謂陰陽不測之謂神也禮樂乃表著陰陽體用之大者也於謙豫二卦貴深體而心㑹之勿徒隨聲附和便謂學古通經也象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考象傳就雷地二卦象言豫雷出地則𤼵聲矣先王因雷之聲為凡有聲之宗且𤼵於春以鼓動天下和氣所以作樂合衆聲之不同以為大同猶之雷之大小震隱不同而其聲無不同所謂雷同也樂之聲亦各有不同而繩之五音六律無不合為一同所以象雷以作樂先王之觀於天聞於雷成其能立其極也然其作樂之故豈無取乎有取於崇徳也禮以觀徳樂以象功功者徳之用徳者功之本所以雖功成作樂而實崇其徳也徳如未至雖功已極而樂必有未盡善者夫子嘗論之矣則作樂崇徳非止謂因徳以作樂兼謂因樂以考徳也樂未盡善則徳尚未極其崇也先王必仍修徳徳極其至則樂不求其盡美盡善而自極其盛矣先王未必有重修樂之事而實有此崇徳於無盡之心也迨極其盛而薦於上帝以配祖考則徳無不孚誠無不格矣言上帝即天地也言天地祖考而鬼神在其内矣天地神人無不悦豫乃豫之極和之至也自小畜懿文徳始至於豫之薦帝配祖是陰用畜之至盛乃陽體立之至極也和也即中也無中無以致和也無中和無以位天地育萬物也此聖人功用之極致也而何非一乾元之剛健中正純粹以精之徳主之乎此豫之所以主乎乾元也乾卦之陽在震初故在豫為此一卦之主也崇尊也作樂以尊其徳重徳以帥成功也因而考徳更思所以崇之則徳更崇而不可量矣亦不妨兼此二義言崇也初六鳴豫凶象曰初六鳴豫志窮凶也初六變震之初九在震初以陽變陰為豫因震而為豫所以先震來虩虩而後笑言啞啞陽氣𤼵暢無不吉焉本爻陰變陽為震豫成於震其豫也以鳴為豫也坤順變為震動失其順動而鳴乎豫樂凶之道也當初豫之時如此豫不能乆矣何也豫未極而志已滿矣故象傳言其志窮斯凶也窮者時事未窮而志窮則俱窮志乃本而時事末也甚矣聖人示戒重在一心也六二介于石不終日貞吉𧰼曰不終日貞吉以中正也六二變解之九二在解以陽變陰為豫取田𫉬三狐以陽為陰所附益也得黄矢亦以陽為中變坤體則黄色加焉貞吉者在坎之陽變坤之陰貴乎貞而中正也本爻以陰變陽為觧變順為險坤土也變坎則土中有石石陽而土陰也二變陽在二陰之間介於石之象也不終日欲其順動以濟險也又必貞吉與解貞悔二爻皆貴貞以本乎中正為義象傳亦不外中正為貞示戒貴於速濟出險而已六三盱豫悔遲有悔象曰盱豫有悔位不當也六三變小過之九三在小過之三以陽變陰為豫本以三陽防過變陰乃隨下二陰以動故有弗過防之從或戕之之辭言弗過防則戕者至矣本爻以陰變陽為小過順變為止猶豫不决盱豫者猶豫也豫而盱焉悔之易生也然不悔則躭於豫遲雖欲悔不能不如早悔而改圖也豫以陽為主而陰變陽又多悔何也順而動豫也艮止與震動止與動不相為謀故盱而觀望也此三爻處於止動之際所以無定見也象傳言其位不當正是此義以上内卦三爻坤順體徳在豫則以順為豫也初變巽進而鳴豫示之凶二雖中正然在豫變坎故雖中正而必以貞吉為戒三則變艮盱豫遲悔見豫之時不可有因循沉溺之義象也仍以二爻中而貞吉為内卦之主初三兩爻附之九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也九四變為坤之六四在坤四以陰變陽為豫繫以括囊无咎坤純陰而四變陽為豫近君多懼豈宜豫乎故括囊者豫不可鳴也在初巳然况四位高上逼哉括囊正切緘口之象耳本爻陽變為陰為坤則震陽在下爻為一卦之主所謂雷出地奮振作有聲以為羣陰之主而主豫者也蓋豫雷已𤼵聲春仲時令也萬物生𤼵和氣已布所以一卦之豫皆由之矣繫之以大有得合天地萬物以為豫其得有之大為何如也又云勿疑朋盍簪者何也順而動則無可疑稍有不順未免心疑心疑於不順而外應之豫即有不能得者矣何以謂之由豫乎惟審於至順則動自無疑非有心於動乃無心而順乎理以為動也理明行順此無疑之本也無疑者自然順動勿疑者勉其無疑也於是群陰俱来附合如簪之聚髪矣髮至散而簪以聚之朋至衆而豫以和之惟其順於吾心之理以動則人同此心心同此理又以理為簪而以人心為髪也此朋盍簪之義象也盖四以一陽之體立誠於中制行於外順動以為豫一卦之陰皆應也豫之所以成豫也所以辭繫之由豫而為一卦之主爻也象傳言其志大行行即動也動而大行順以為動也言其大行之效而由豫之理明矣以志為帥以徳為本是豫之成豫本乎志矣蓋聖人示人以一心為成豫之主天地鬼神祖考不能不應况於人乎六五貞疾恒不死象曰六五貞疾乗剛也恒不死中未亡也六五變萃之九五在萃五以陽變陰為豫五原有位可无咎也變陰為豫不能孚矣期於永貞以亡悔而已何也豫萃俱以四為主萃五在萃空有位也而變豫豈能孚於衆而得其和乎元永貞者安於萃之位不可輕變躭豫也或可以收人心而反天命也在本爻以陰變陽為萃四既為由豫之主矣五方貞於豫即貞於疾也所以貞疾而不致於死四能率盍簪之朋以事上為豫者中位在五也存由豫之志即可附於四而得豫矣卦以四為主爻故五爻之尊亦為附四之爻而不為由豫之爻孰謂易重位乎位本於徳則位重不本於德則位輕矣此太甲因伊尹之放而遷善改過凡中主得賢相而世治也象傳言五之貞疾者乘四爻之剛不能應之也以陰變陽不安於陰分所謂既不能令又不受命則疾生而貞固不可解矣然恒不死者中位未亡可以因位而修德所以不死也四爻為卦主五乘之而居尊不能合乎以順為動之義故有此辭然有中位當備中德能以四為由豫而一中濟之並貞疾亦可免矣上六冥豫成有渝无咎象曰𡨕豫在上何可長也上六變晉之上九在晉以陽變陰為豫離體變震不能安静故有晉其角惟用伐邑之象本爻以陰變陽居豫之極冥乎豫者也然震體而變離離明也明則自審可知應因應革矣且以陰變陽亦不能安静所以成而復渝豫之為道不可極也冥豫近於沉湎於豫矣能成而渝无咎之道也豫雖和氣但不宜終豫於此渝焉善於遷善改過矣象傳戒之曰冥豫在上何可長也必成而渝方无咎也貞悔俱以不能安静為義晉則進而伐邑以變震為動也本爻則豫而知渝以變離得明也冥豫者不明也變離為明所以不至冥豫而終渝也以上外卦三爻震動之體徳在豫則以震動為不溺於豫四爻為外卦震之初陽且主乎一卦故曰由豫五陰皆附此一陽所以大有得而朋集也五雖君位而四方主豫貞疾不死以變兊而悦豫不返也上六冥豫成渝无咎變離明則能渝冥豫之成矣此豫外三爻惟四主豫而仍戒以無疑其五上二爻則皆不得吉占故知豫之不可玩也四既主通卦五上兩爻不容不附之違則有凶重徳而輕位也謙卦六爻皆吉豫卦惟二四兩爻得吉而二則戒以貞四則朂以勿疑甚矣豫樂之難躭而敬謹之當務也雜卦傳云謙輕而豫怠也謙豫二卦又互有敬勝怠怠勝敬之義焉故謙則慮其輕輕者或出於縁飾之私則不能敦重矣動容周旋中禮視乎履考其旋足容自重也君子不重則不威學則不固矣故謙者禮為内主而恭重之容體又謙之外見者也能敬則謙内冲虛而外嚴飭矣再以敬勝怠論之凡和樂之容色威儀無一不自敬謹莊嚴中流出此内外交修之道也謙豫二卦君子居心正容之莫外者也愚謂其根於乾陽以乾三之乾惕為權輿亦甚確切哉履之為謙易明小畜為豫何以言修身之學乎試思懿文徳以為畜畜久而理明行順豫樂為何如乎學而時習之且悦矣况道成徳立隨遇而安孔顔樂處未嘗不在日用行習之中以此言豫之和樂本於小畜之懿文徳如謙之根於履履之行乎禮也禮樂大原頭原在聖人心内於二卦應詳玩焉震下兑上隨與蠱綜隨者隨乎泰也隨泰即繼乎泰根乾繼泰主陽保泰以承天地之交也隨三陽三陰之卦乾坤後有泰否泰否後有隨蠱隨者隨乎泰蠱者蠱於否也序卦傳云豫必有隨但為承接上卦而言也愚説則論其根柢矣故隨以震卦初爻為主蠱以巽卦初爻為主在震以初爻為乾父之陽在巽以初爻為坤母之陰皆一定之理也泰否為反𩔖之乾坤隨蠱為繼進之泰否泰否以反復為義重在中二爻隨蠱以動而漸進為義重在初爻也細玩四卦自知至本義卦變之説自泰否始無闗象数者可以是否聽之今於隨卦則不得不辨盖剛來而下柔之卦變不辨則彖傳之説不明矣剛來而下柔者正謂根於泰也泰三陰在外卦三陽在内卦今外卦之二剛下於一柔為兑内卦之一剛下於二柔為震澤雷之所以為隨也本義乃謂自困與噬嗑來困與噬嗑何所干渉於隨乎如不論根柢而言之則澤山咸三爻之九不可來居初乎風雷益五上兩爻之九不可來居四五乎象数生於理者也隨與困噬嗑二卦無相渉之理自無相渉之象数矣泰三陰三陽隨亦三陰三陽泰之外三陰祗一陰仍居上而二陰下交於陽内三陽祗一陽仍居下而二陽上交於陰正是交泰之理数所以名隨者隨乎泰而為交也又在震則初陽為乾元即乾之三陽也在兑則上陰為坤元即坤之三陰也震雖有二陰皆統於初陽而成震兊雖有二陽皆統於上陰而成兊兊震二卦所以成隨在此二爻故隨卦之初陽上陰所以隨乎泰之天地定位而中四爻二陰二陽皆相交亦隨乎泰之天地交也此隨之名卦而彖傳首釋之曰剛來而下柔正言乾三陽以二剛來進坤三陰以二柔下行以成動而説之體象又以動為主以悦為用猶之乎泰以乾為主而坤為用也葢序卦之根源明則如此等義自有真知確據非可以私意安排也明矣隨元亨利貞无咎卦辭與乾同乾以後屯隨再見也正以乾元主泰由泰而為隨故辭與乾同隨乎泰而即隨乎乾也此為根於乾隨乎泰之確切可證者何以又云无咎隨乎泰終不可謂泰而侈也必利貞而後无咎隨之為義有公有私貞則乾泰不貞非乾非泰隨渉於私矣故卦中三陰爻皆不得全美之占亦此理也然何以竟同乾之元亨乎隨之初陽即乾之元也有乾元在即得元亨也泰何以不言元亨而但云吉亨泰三陰外而三陽内雖運㑹之偶值也亦人事之斡旋非盡自然也故曰吉亨隨則隨泰可以自然而致亨如乾之有元自亨也然隨乎泰為元亨即泰之元亨也聖人之辭一字不可易與春秋有同揆焉雜卦傳云隨无故也但隨乎泰以為隨則保泰之道也何庸多事耶故隨云無故以無為為義也無為而天下治篤恭而天下平也本義謂隨前無故意極精妙而簡當此又隨繫元亨泰不必另繫之説也雜卦明謂隨無故而可言不根於泰乎至泰之根乾則上經固以泰否為中先儒已論之矣彖曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉彖傳釋卦名義曰剛來下柔動而説為隨前已明之矣其言大亨貞无咎而天下隨時大亨者陽為元而得亨也貞而无咎无咎即無故也以無事為隨泰天下自皆隨乎泰之時也王肅謂隨時為隨之葢亦未詳乎隨泰之時為義耳隨時之義大隨乎泰時即泰也泰原為大也隨泰時之大則隨義亦大矣後之守成者勿自作聪明謂隨時為易而好事喜功削剥元氣如唐之德宗宋之神宗則深明乎隨時之義大矣上能隨泰大亨而貞方无咎天下自安然隨泰之時親賢樂利矣其義洵大哉象曰澤中有雷隨君子以嚮晦入宴息象傳曰澤中有雷隨此另明剛來下柔一義也雷震陽剛也澤兊陰柔也澤之中有雷雷未出乎地者也雷一奮動而萬物皆震今藏於澤中應下柔而隨時至應動之時一動而衆皆悦必矣君子體隨時之大義向晦則入宴息宴閒於未寢之先安息於既寢之後所以養陽剛於陰柔以待乎奮動有為也且隨之時義原為無故無所用其陽剛也以藏修㳺息為朝乾夕惕者也向晦入宴息豈宴安佚樂乎静者動之本静而存養之功既裕則動而振作之氣日新此君子以静宰動之學也於隨更為安静優㳺布政立教皆不過守前人之制度無輕易於紛擾雖明作弗遑亦向晦入宴息之意也乃合乎隨時之大義也君子之動静亦隨乎時而已應静而静静非躭於宴安則動必應動而動動非樂於多事此隨時之道皆然况當隨泰之時則主乎静而不主乎動主乎動亦静而不欲其妄動也象傳以内外卦全體合言震剛來下兊柔與彖傳另一義而其象兼兩義看愈明初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也初九變萃之初六在萃初以陰變陽為隨繫以有孚不終乃亂乃萃凢萃者萃於孚也不終而變則亂然變隨仍可以得萃為隨有道之孚也若號者先號咷因亂也一握為笑後笑因得萃也亦兼隨而有此亂彼萃之象故朂以勿恤但往而无咎變動正所以進萃也在本爻陽變陰為萃亦以變為渝官者守也震初為一卦之主變而渝矣則不克隨時隨泰矣故必貞吉不宜輕變惟當隨時也隨時出門而交其有功必矣隨時而交即隨乎泰時之上下交也震以初為主爻主乎内卦二陰以交乎外卦二陽一陰也且以初陽與上陰交而為泰也言出門者交乎外卦可明矣象傳言官有渝必貞吉則不渝矣正者貞也必以貞正為隨從也出門交有功不渝乎泰之時由於不變失泰之交也六二係小子失丈夫象曰係小子弗兼與也六二變為兑之九二在兊二以陽變陰為隨悦體變震動於陽為有孚故繫以孚兌吉悔亡悦出於誠誠孚於人則吉而已之悔亦亡矣本爻變陰為陽為兊繫以係小子失丈夫者因變兊為悦而失震體係乎初而失乎五初在下為小子五在上為丈夫也象明其不兼與則當隨丈夫失小子不應係小子以失丈夫矣二陰爻隨初為隨以交可也乃近初而係於初失外卦大夫之隨矣夫子不能兼從陰道也有夫豈可從子乎言弗兼與宜知所擇於三從之道夫在從夫為正也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也六三變為革之九三在革以陽變陰為隨離變為震以明而動何征凶乎正以變隨而不能革也故征凶貞亦厲也至革言三就乃孚合乎隨人而動之義矣在本爻以陰變陽為革震體變離明以從為義者也故隨初陽交於外卦之陽係丈夫而失小子也小子指初似非主卦之義然三爻從夫於外不妨取象初為小子卦有一卦大象爻有一爻小象各自取而不相妨也所以隨有求而皆得但戒以利於居貞恐其渉於私隨則為淫奔矣此内卦二陰俱以隨初上交外卦為義甚明象傳言志舎下也明指初矣舎非舎也係大夫而從陽小子亦隨母而從父矣何舎之有而志則以丈夫為主故云志舎下也聖傳精微哉以上内卦三爻震體初為震之初爻變則官有渝也必貞吉而出門隨外卦為悦則有功矣二三兩爻皆以隨初交外然俱宜舎子從夫者隨夫而子亦從之矣動而悦為隨故内卦皆以隨外為宜焉九四隨有𫉬貞凶有孚在道以明何咎象曰隨有𫉬其義凶也有孚在道明功也九四變為屯之六四在屯以陰變陽為隨隨乎屯之五也故有乘馬班如匪冦婚媾之義坎為馬婚媾則以交為隨以開屯也故往吉无不利亦以婚媾為交為利也本爻以陽變陰為屯兑變為坎險而不悦難信則不能交矣故隨有𫉬雖貞亦凶𫉬者自足而固執之如係小子係丈夫之係也有此心焉貞固而凶必矣惟有孚焉在乎隨之道而以明為交斯無咎矣明其為隨則必下交於内卦之陰矣斯合乎隨上下交之道矣隨道即泰道也可不載之而棄之耶此其所以无咎也象傳釋有𫉬之凶歸於義葢有𫉬矣何凶而失隨之義所以凶必歸之有孚在道焉以有明而得功也𧰼言功所以應初之有功正見上下交而有功之義也有獲之義隨乎五以為𫉬寵於君而存固執之見更不下交賢才以集益也故凶九五孚于嘉吉象曰孚于嘉吉位正中也九五變震之六五在震以陰變陽為隨變動為悦悦以隨人陰隨陽震故往來皆厲也外卦三陰在天不同内卦三陰在地震來不厲摶陰不甚故億之大者無䘮而自有震動之事本乎柔中以應不至苟悦自亦不致過震也在本爻以陽變陰為震變悦為動正合乎隨之悦而動也故繫之以孚于嘉嘉者禮也孚于嘉合乎禮也禮者體中而用和者也合乎此則能隨而下交可知矣五君位能孚嘉所謂君使臣以禮此其所以吉也象傳明其正中正中所以能孚於嘉也四言在道五言孚嘉皆以交為道為禮也不止五與二交以隨泰交也况彖剛來下柔為外卦二陽下交於内卦二陰其義亦甚明上六拘係之乃從維之王用亨于西山象曰拘係之上窮也上六變无妄之上九在无妄之上爻變陽為陰為隨葢陽為无妄變陰則妄矣况變為隨則隨乎人而不克自立其无妄矣故有行有眚无攸利之占在本爻變陰為陽為无妄繫以拘係之者恐其拘繫於本卦之二陽而不能下交於初以成隨泰之交也乃從維之者維持之於隨之終必交於初以成泰且維之正所以保泰也王用亨於西山亦在道也亦孚嘉也誠之至也西山者國内名山也以悦體變乾所以享山以昭其誠敬於天也此終於隨泰之心也本卦綜之為蠱震初之陽為艮上之陽矣艮上之陽即山之所以為山也繫以亨於西山明言交於初陽而成隨泰以妨其綜蠱而反否也此義非熟玩不能得者初之上交出門有功易知上之下交亨山存誠不易知也觀於綜卦之蠱承接最近可以知其義矣而象傳已明告之云拘繫之上窮也拘繫於二陽則上不交於下而窮矣必也乃從而維之以交於下所以盡王亨西山之誠以固交而保泰也即以成隨而防蠱也隨初之震陽綜而為蠱上之艮陽一移易之間而隨泰變為蠱否矣仍是否泰反其類之戒明於泰否二卦之終者也學者細心觀象玩辭庶幾得之以上外卦三爻兑説為體悦而交於下卦之動如泰之上下交所以成隨以保泰四近五尊位如不下交即有𫉬於君而正亦凶大臣之道應進賢也必有孚在道以明何咎又恐其苟且隨君而無誠信交於上下也五得中而孚於嘉乃能下交成隨者上爻拘係於外卦以其陰必附陽也然不如從而維上下之交使王之誠足以亨西山神格人信而隨之交定矣泰之交亦誠矣本卦在震初為内卦之主所以交外也兑上為外之主所以交内也故有維之亨山之辭隨无故也終於亨山盡誠仍無事以隨泰保交而已初之出門有功仍是隨之初𧰼至隨之終安静無事亨山如虞書之時廵祀岳有事之中無非無為也猶見無故之義矣巽下艮上蠱綜隨斯繼否根坤主陰然幹蠱則以陽幹陰方能寔蠱之虛也隨之綜蠱亦反類之象義耳蠱澤雷隨山風蠱相綜者也隨則隨交泰而言隨蠱則蠱於否言幹也然則隨隨乎泰而根於乾蠱蠱於否而根於坤也隨之言隨泰仍以交為義蠱之象何如蠱之為卦山在上風在下艮之一陽在上㢲之一陰在下仍泰之反𩔖而為否陽在外而陰在内也艮卦之二陰在外卦巽卦之二陽在内卦似乎交矣而仍不為交者艮卦之二陰合上一陽為止體巽卦之二陽合初一陰為散體上止而不交乎下下散而不交乎上否者泰之不交者也蠱者否之不交乆而為蠱者也隨蠱兩卦仍承泰否之反𩔖以交不交名之而分根於乾坤皆一定之𧰼數而理寓於其中矣雜卦傳隨無故也蠱則飭也本義謂壞極而有事甚合但謂卦變自賁井既濟而來似與彖傳所言剛上而柔下未恊焉在隨之彖傳言剛來而下柔正言交也本卦彖傳言剛上而柔下正言不交也隨初陽在下二陰在上陽本在上而下陰本在下而上即為交况上兑而下震兑澤必下降震雷必上升亦交也兑之二陽上交居乎泰之外卦二陰之位震之二陰下交居乎泰之内卦二陽之位俱交之義隨而成泰昭然易見本卦上爻陽本在上仍在上不交於下初爻陰本在下仍在下不交於上不交之數也山止於上風散於下不交之象也艮卦一陽仍在否外卦一陽之位巽卦一陰仍在否内卦一陰之位不交於位也蠱而極乎否亦昭然易見也特人不細心玩索耳蠱元亨利渉大川先甲三日後甲三日蠱卦辭何以繫元亨乎蠱之極而有事以飭之乃元亨焉不言利貞貞而固則終蠱矣利渉大川正以乾元而飭蠱也然則凡元皆乾之元也皆剛健之乾徳也先甲三日後甲三日其説正難詳矣再四玩索乃就本卦之上艮下巽得之葢甲即震也先甲三日者艮也後甲三日者巽也蠱之元亨者用乾元而乾元之用在震初也故隨之隨乎泰以初為交之始出門有功矣蠱之飭蠱無資乎是焉能飭蠱哉先甲三日艮止而不動後甲三日巽散而不聚中惟震陽是用震動者有事於飭蠱之始也然卦下巽上艮何從而用震乎不知否泰反其𩔖也隨蠱亦反其𩔖而已矣隨綜為蠱蠱不可綜隨乎蠱仍反而綜隨則為隨猶否之反為泰而即泰矣仍以隨之震陽隨泰得泰者飭蠱而綜隨何須外求乎玩易必如是始能明乎陰陽消長之氣化調劑中和之功能如執一而求易象易理則未有能通者矣此先甲後甲中隱用震之本義也或謂如子之説文王之辭何其曖昧哉不思本義謂更新丁寧亦未嘗謂文王明言辛丁也猶本卦艮上巽下而言震似𨼆而甚眀愚就卦辭眀其𨼆而非𨼆也至六五變巽體言先庚後庚另有說在本爻下且彖傳眀言先甲後甲終則有始天行也不於艮兑終始潔齊震之帝出乎此者求之何從而得卦辭正義乎愚説不足據彖傳可不信乎彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也彖傳眀卦名義剛上而柔下巽而止彖辭象傳下眀之其釋元亨而示天下治者以元為亨則變蠱否而成隨泰也利涉大川正有事於飭蠱飭者修也謹嚴其心而篤實其力之謂也先甲三日後甲三日眀乎終則有始之天行即艮以成終為成始自戰乾勞坎而成終於艮即成始於艮帝然後出於震也帝出於震而三陽開泰矣謂先甲後甲用震者洵確哉邵子謂先天八卦坎離在寅申沈氏謂在夘酉愚謂先天八卦坎離即後天八卦震兑也不在寅申亦不在夘酉在寅夘之間申酉之際耳十二辰中𠫭以八卦其方位乃定故寅之後夘之前為震雷之𤼵聲在雨水後驚蟄前正月之中氣也寅月今謂三陽其實是於雨水中氣後為震之正方位於此𤼵聲而百果草木皆甲坼矣此泰之正時聖人欲飭蠱反否而成泰在用震之陽以振作陽氣雷動而升於上澤應而降於下此隨之所以隨泰之上下交以變蠱為隨也於此㑹心則知乾坤繼以泰否泰否繼以隨蠱皆以相對錯而成自然之象以相反而成治亂之理數也有一待人安排乎天行如此人事應之而人事有事於飭蠱天行又應之而成隨矣否泰之反𩔖皆合天行人事而言也聖人言天行於天下治往有事之後其勉人用陽之元以飭蠱也切矣象曰山下有風蠱君子以振民育徳象傳曰山下有風山土也風木也木居土下易於朽而生蠱也山實土也木虚風也虚風行於實土之下土亦易於墮壊亦蠱也此正謂陽實止於上隂虚動於下下不上升風反行於山下上不下濟土反居於木上蠱之成蠱以不交之故如此君子體之將何以飭之乎振民育徳所以飭蠱也振民新民也育徳眀徳也振民之道必宣徳布和申命行事育徳之義必立徳建極敦仁處義是以巽徳振民以艮徳育徳也巽以振民風行於逺艮以育徳止至善而不遷則巽上行而艮下止矣亦交之義也此所以以交飭蠱變隨反否為泰也乎徳欲其崇崇必自近卑始所謂艮下止為育徳也風欲其行行必及髙逺終所謂巽上行為振民也聖徳象山王化象風天下之所以治元亨之所以以元為亨也本義謂治己治人之道亦此義初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也初六變為大畜之初九在大畜之初以陽變隂為蠱畜而變蠱不宜變也故有厲而利於己巳則守陽之徳以為大畜不致於蠱矣在本爻以隂變陽為大畜且巽體變乾乃飭蠱之始也繫之以幹父之蠱有子考無咎夫蠱之繼否也否在先世而蠱貽後人也於幹蠱之初以隂變陽大畜其力以幹蠱也乾之初爻即震之初爻長子也長子幹蠱考必頼以克家復業而無咎也雖危厲而終吉矣象傳眀其意承考似初之考非致蠱者乎卦下動上止止能致蠱動不能致蠱所謂流水不腐戸樞不蠱也巽合艮而成蠱巽非致蠱之罪魁也象眀其承考之意以幹蠱謂巽之隂動而生風變乾之陽健而飭蠱父雖值蠱之世而成蠱子能承考之意而幹之无咎之義也孔聖於蠱之成蠱歸罪於上艮而分過於下巽蓋為隨為蠱為泰為否未有不成於上也下不過相合而成耳所以見治亂之世君人者責有所歸焉其辭微矣九二幹母之蠱不可貞象曰幹母之蠱得中道也九二變艮之六二在艮二以隂變陽為蠱故繫以艮其腓不拯其隨腓下體之止而不動者變蠱則不能拯濟而任成蠱其心焉能快乎蓋艮二止體變而失其靜止故不快耳本爻以陽變隂為艮下動上止為蠱者上止下亦止又不為蠱矣所以亦有幹蠱之象不言父言母者變隂也變隂即幹乎隂所以幹母之蠱也不可貞貞而固也非貞而中也貞而固不可以幹隂柔之母蠱必貞而中方足幹隂柔之蠱也象傳言得中道正是貞而中也中道者不詭不隨不緩不急正合乎幹隂蠱之道也且巽體進也艮體止也以巽變艮進而止止而為進此深合乎幹隂蠱之義也九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也九三變為蒙之六三在蒙三以隂變陽為蠱巽變險而冒進故戒以見金夫不有躬之女勿用取也蒙而蠱何利之有無攸利者不能開蒙即不足幹蠱矣在本爻以隂變陽為蒙巽風變坎水風變水在於山下則亦不能成蠱矣虚則成蠱水亦實陽所以不能蠱而為幹蠱也然水雖實陽不足以幹蠱小有悔不能幹也无大咎究為幹蠱何咎象傳明之曰終无咎不成蠱而終亦必幹之矣以上内卦三爻巽體以風虚為蠱之源初爻變乾體大畜其陽實所以主卦而幹蠱也二三兩爻隨乎初爻為幹蠱者也故初主爻所以能幹而有子二三附和以為幹而已二變艮而幹母勿貞三變坎而幹蠱无大咎在内巽體皆主幹也巽之初即坤順之體也故主内卦焉六四裕父之蠱往見吝象曰裕父之蠱往未得也六四變鼎之九四在鼎四變陽為隂為蠱所以有折足覆餗形渥之凶鼎器也蠱則損器而鼎實亦不能存矣本爻隂變陽為鼎繫以裕父之蠱往見吝何也蠱而變鼎飲食之人也裕父之蠱而已何以幹為哉蓋艮止體所以成蠱也變離體中益虚矣土之蠱以下虚也中虚益虚蠱更甚矣所以往必見吝此取象之最眀者象傳言往未得何也艮止而蠱求動以幹蠱耳今變離而中虚欲往動以幹之亦不能矣適以裕蠱耳故云往未得也六五幹父之蠱用譽象曰幹父用譽承以徳也六五變巽之九五在巽變陽為隂為蠱繫以貞吉悔亡无不利者上卦以艮止為蠱變巽而動則不蠱矣故有吉占其言先庚三日後庚三日正因變蠱而仍言蠱義也詳巽卦五爻下在本爻則以隂變陽為巽巽進而艮因止成蠱者可變矣幹父之蠱所以繫之用譽者巽為風譽之由近而逺由微而顯如風之行也譽行者揚先世之美名以幹乎壊敝之惡跡也非自彰其諛聞以動衆也故象傳言其幹父用譽承以徳也徳為譽之本實大而聲𢎞徳立而名彰非為虚聲延譽也如虚聲延譽而不本於徳則裕蠱而已何足以幹蠱何謂之承徳乎知此者必重立徳以幹蠱而不以聲聞為急矣巽進徳之義也止變進進於徳而徳日崇之義也以此幹蠱何弗濟焉且徳乃陽實而動所以幹乎隂虚而止也上九不事王侯髙尚其事象曰不事王侯志可則也上九變升之上六在升之上爻變隂為陽為蠱故繫以冥升方蠱而升之極冥乎其升矣惟利於不息之貞即自强不息也在本爻變陽為隂為升宜於幹蠱矣然處蠱之終止體變順順雖美徳非幹蠱之道也幹蠱用震動即乾元之陽也坤順之道豈足幹之此所以有不事王侯髙尚其事以不幹為幹所以風乎裕蠱者也象傳但嘉其志可則蠱有事而徒尚其志不過以志勵乎世之有事者其人則逺矣其才力則柔懦不振也以上外卦三爻止體宜主上爻然變坤順何能幹蠱髙尚其事以不幹為幹耳五以用譽幹蠱變止為巽進也四則裕蠱以變離為鼎也以上一陽爻為主而各就變體以辨其從違耳蠱六爻初幹蠱為巽之主爻上爻艮止所以成蠱也變升以應即為幹蠱而主之二三兩爻隨乎巽初為幹非卦主也四則變離火虚而裕蠱矣五則變巽進而幹蠱矣雖君位亦必附於上爻焉幹蠱所重者震也陽主之矣陽動風方進陽動者震也故巽之進也本乎震而震之動也用乎乾也此卦辭先甲三日後甲三日言艮止所以成蠱言巽進所以幹蠱而中頼震陽出乎震齊乎巽也震至巽而不齊者皆齊陽之盛地也過此又隂生矣則巽之進非即震之帝出者為進哉此巽進而幹蠱即震動而幹蠱也且由三陽之泰進於巽而為純陽之乾蠱之反隨為泰為乾莫非巽之進有漸以洊至焉所以下巽以初爻為主外卦上止而成蠱者五變巽進附於上而幹之矣所以上不必幹髙尚其事以示端型即為幹矣故卦上初兩爻分主隂陽以為本卦之正用而其實本乎震陽之本體也大易通解卷四
