body:
  text: 大易通解卷二江常鎮道魏荔彤撰震下坎上屯四隂二陽陽少貴陽固根乾矣然有乾坤父母遂生長男次男男隨父也根乾主陽之卦也屯乾坤之後父母之位定隂陽對錯而相交陽必先交乎隂以一陽入二隂之下而成震說卦𫝊所謂震一索而得男謂之長男也向訓索為求專以揲蓍言抑知揲蓍之法固因易之理數而生者因有形質之𧰼數而求無形質之理氣耳愚謂索者交也梭之上聲音鎖索之字義大繩合小繩而切撚之令緊乃成大繩為索是交之義𧰼也以乾之陽交於隂一陽伏於二隂之義則陽不終伏伏者必升升不遽升為隂所抑陽盛動於下隂開破於上而雷動於春帝出乎震三陽之氣足出地之𧰼著此震之所以為雷因陽動而有聲有光實無形質可求者也陽一交隂得名為震陽再交隂何以擬議之一陽伏於二隂之下必升而震動一陽夾於二隂之中乃隨之流行行亦動也為陽斯動特升而震動倐忽不測隨而流行則安順有常矣擬之以水附於地而趨乎下陽隨隂以為流行之理氣也說卦𫝊所謂坎再索而得男謂之中男所以繼乾坤父母隂陽相交一交再交一生再生如人家父母配合生育男女其事顯而理微事庸常而理極神竒者也此就先後天八卦言父母生六子以為序卦之次以長男中男繼乾坤總見隂陽相交夫婦倡隨子女續生成家造業人事日用造物化機皆寓於是易所謂易簡而天下之理得焉矣是以長次二男合體成卦而取象擬德名之為屯屯者草木萌芽初發者也雷動春生於下雲行雨施於上而百果草木皆甲拆屯之所以取象立名也長男中男繼父母後有如人家初造諸事草創必得丁男繼生次第經營代父母之勞而興作述之事故以屯次乾坤焉試思天地之間一氣而已清者成天濁者成地天氣上升之極必下降而入地地氣下降之極必升而上天此雷起於地而雨沛於天昭然其可知可見者也何以不言水而言雲水者附於地而不離乎地之濁氣雲者升於天而已得乎天之清氣也水也雲也一物也故伏於地下之陽氣亦因不離地氣之濁而成雷升於雲中之陽氣亦因得乎天之清氣而成雨雨也雷也亦一物也此雲雷為屯言雲而在天為雨在地為水也此屯之繼乎乾坤隂陽相交陽施隂生之道俱就天地初建隂陽升降開始之氣象言也此屯卦以雲雷相交而成之義屯元亨利貞勿用有攸往利建侯彖辭曰屯元亨屯之為道有曲直體象焉屯者曲所以為直之本也故元亨天地之木氣曲者必直而人事之占則尺蠖之屈以求伸龍蛇之蟄以存身精義入神以致用利用安身以崇德皆以曲為直利貞之義也既許以元亨而又戒以利貞勿用有攸往何也蓋動而險非利貞則無以濟險開屯何庸輕動而往以入險乎惟利在建侯堯以不得舜為己憂舜以不得禹臯陶為己憂任己則勞勿用有攸往也任人則逸利建侯也此為占者體屯之德而利其用也本義謂筮立君者遇之則吉愚謂筮使臣者遇之亦吉內動外險動而往則動而動矣心役於事非無為恭已之義矣動根於靜則動亦靜也動根於靜內動者究未嘗動而外險所陷之陽必能出險獲濟矣此即利貞之義也况又為任人不任己之道故不曰不利有攸往而曰勿用有攸往彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧凡彖傳皆叶韻此傳滿盈當自為句言其氣之充塞兩間也本義合天造草昧為一句解誤也彖傳明屯名義曰剛柔始交則一索得震陽來交隂之義本於彖傳非臆說也難生者亦即再索得坎陽再交隂之義而又别有說坎之為雲在天之𧰼坎之為險在地之形各取一義而無非坎中自具之義象傳言難生必根於剛柔始交者原天地之始二儀初分五行肇起天一地六之數先生成乎水所以謂之剛柔始交而難生正見屯之繼乾坤而立卦之義合之雷而成卦者震之陽待時而發為雷坎之陽不舍晝夜而形乎水二卦皆以陽而伏藏附麗於隂有必動之理氣乃合為屯卦故云動乎險中以應人事體天道協卦德也大亨者水之下有雷水流雷發天地之氣化日新即乾元亨也然所以大亨者必本於利貞耳既貞而亨矣又謂勿用有攸往者仍是剛柔始交而難生之義以其陽升雷動於下雲行雨施於上盈天地之間皆雷雨之氣天地之為天地方當初造天未清於上地未寧於下下則雷陽動而雲常浮於上上則雲隂凝而雨常泄於下隂陽之體初分而剛柔之用互交在地則草木暢茂禽獸居之在天則渾沌不明嵗時無紀雜亂昏昧之世也此豈一耳目手足之烈所可理哉故必衆建諸侯分任平地成天治厯明時明農教稼烈山焚澤諸事而後可開創草昧生民育物以告成功也故必本以無逸之心而後能成無為之治不然豈躬自倦勤而事權下逮哉夫屯之不寧即乾之自强不息也乾以純陽之體君子體之為自强不息屯以陽伏麗於隂為體其不寧也尤為震動恪恭而不敢一刻之稍安也𧰼曰雲雷屯君子以經綸𧰼傳曰雲雷屯君子以經綸經綸正是不寧之心外著見於事業之處雲滿於上隂氣也即震陽之升而為雲者也雷動於下陽氣也即坎隂之抑而為雷者也雲雷二物其中互有隂陽又各有隂陽有交相為隂陽有上下往來屈伸變化以為隂陽君子觀此𧰼乃用經綸之事以體之經者絲之經也綸者絲之緯也雲雷之氣上下往來橫矗交互如其𧰼焉君子惟經之使如其常綸之使合其變俾上無涸隂下無伏陽陽氣宣暢隂氣固謐陽以動感時至則發育萬物生機得振隂以靜應氣和則保合萬物各成性命即乾之品物流形各正性命也非體屯之君子著經綸之業成輔相之功何以動乎險中而能濟能亨乎按經綸者治絲之事以喻乎屯如虞廷諸臣禹稷益契分任教養各效艱難之事也此屯所以繼乾坤也二帝以前固宜存而不論矣然九年之水非無因而生必雲雷瀰漫霪雨淋㵼而後成懷山襄陵之勢屯之經綸足以擬議之初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也初九變為比之初六在比初以隂變陽為屯繫以有孚比之無咎有孚盈缶終來有他吉以隂在下而比陽可無咎也然必盈缶誠存於中方能比於外五而不可知之吉終來也本爻以陽變隂為比初為震之主爻動而變悅知有險焉進而不輕進磐桓者待時而動動則震發而升騰無致阻滯矣此即居貞也此即所以為利也建侯同於卦辭者以屯之初九為一卦之主爻耳卦之建侯為天子建諸侯言初之建侯初即侯而宜建者也𧰼傳曰雖磐桓志行正也正即居貞也志在居貞而行磐桓非遲也陽貴隂賤以陽居隂下故謂之以貴下賤所以得民也𫝊似另取義然利建侯而不自用以君而任臣正是以貴下賤堯既得舜舜既得五臣而水土平稼穡興五倫叙府修事和平章百姓黎民於變時雍得民為如何乎初九在下而擬以得民與臨以二陽居下而上臨四隂一義也以上臨下一義也以下臨上即以近臨逺又一義也易不可為典要者類此蓋初為內卦之主故可擬議之為君建侯亦君𧰼也公侯之類也非天子之位也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也六二變為節之九二在節二以陽變隂為屯有不出户庭之凶節卦為冬令之氣化變屯必當動而進以出險乃不出户庭所以凶也在本爻變隂為陽為節以女子之事擬之者震動體而變為柔悅之德爻雖為隂變陽而其卦化陽剛為隂柔矣故其取象進不能進屯如邅如焉震為馬故象乘馬坎亦為馬卦凡三爻皆象以乘馬此班如之義也馬者戎事之御今以隂柔乘馬而羣進則匪寇而婚媾為宜矣二與九五正應宜其速字乃因近初陽維繫之難字二貞而不肯字者雖性柔悅而有中正之德所以不肯輕字也但柔順中正以為貞焉有終不字者乎十年乃字雖遲久而不失其婚媾之正何傷乎故不繫以凶悔咎吝之辭占者得此必利居貞以為出險致亨之道也明矣𧰼傳言六二之難去聲讀可作平聲讀亦可以其乘剛所以欲字正應而又為初陽所繫能不輕動而居貞以待字女之正道也如此之女宜其速字而至於十年乃字則似反乎經常之道矣不知變易者時也而不易者貞也雖反乎常而十年亦必字焉常之所以不可易哉屯之為卦原以震陽上升得出險為濟屯之義今二復以不急進為貞何哉以其隂柔而具悅體恐所以為動者不出於貞則雖出險能濟何取乎故又以女貞不字以明其理為後世妄以柔悅之道取媚濟險以為功者示戒也十年乃字既戒之復勸之也果能久貞何險不出何必失守妄字或反不能出險者多矣六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也六三變為既濟之九三在既濟之三以陽變隂為屯震變離以火之陽進濟坎隂即以火之剛明以克坎之柔險也因三鄰於外卦故有髙宗伐鬼方三年克之之𧰼在本爻以隂變陽為既濟亦鄰於外卦不言進克出險乃言知幾遂舍者何也屯之為義以震陽之升升於坎中而後引坎中之陽下濟則雷動於下雨施於上之𧰼也斯能成品物咸亨之功今三爻之隂雖隨震陽上升乃入於險中隂盛而陽不能流充祗助雲氣之凝塞不能成雨澤之和暢故𧰼以即鹿而無虞也鹿陽物也有虞則能獲今無以為具鹿自入於林中隂幽之域矣故戒占者當見幾而舍另圗得虞方可即鹿而致獲耳必震陽充盛而坎陽斯能流通震陽衰弱坎陽閉陷險必不能出舍而不即免其悔吝莫此為宜矣舍非終舍也培此元陽以元致亨而已𧰼傳言即鹿無虞豈可名為從禽乎君子舍之者非怯也以知往窮之義故必思六月之息以養圖南之翼所謂培萬里之風也以上內卦三爻震體以初陽為主震之爻盤桓居貞則陽足而出震建侯辭同卦者正見主卦經綸必自初初必陽足而後可開屯也二以隂乘陽必隨初陽方可動故陽起薄隂似寇而為婚媾又必守正為從雖遲無咎也三則鄰外卦有外慕之𧰼義不如守同於二隨初陽而開屯故有見機而舍之辭總以初陽充裕為屯開險平之義象焉六四乘馬班如求婚媾往吉無不利𧰼曰求而往明也六四變隨之九四在隨之四變陽為屯繫以有獲貞凶隨而執固所以雖有獲而貞亦凶也必有孚而在道以明乃無咎有孚且明合乎道矣何咎乎兼屯義四必附五有孚方合道也在本爻以隂變陽為隨繫以乘馬班如坎亦為馬兩隂夾陽隨之而流行故亦為乘馬班如之𧰼隨陽而動不同於二之應陽而來二乃震體故動而不可知其情遂有匪冦之辭四則直許以求婚媾為吉而已二所疑為冦者惟恐其比於初之陽而婚媾之情不專四則隨陽居險不必更言冦惟求婚媾而已四附五之爻以隂與為婚媾往而吉無不利自足相為濟險無難矣𧰼傳恐人認爻辭之求為四往求五失女之貞故明示之以求而可往謂必待陽之求而四隂方可往而得吉見婚媾之事和而有别方為夫婦正理待求而往與不求而往或反求彼而往焉其明晦何如乎在險中者必以明為本明而後能貞此又戒占者婚媾之失貞同於六二者也臣妾之道舍此安從乎貞悔二爻辭傳皆言明以坎險必暗然一陽在二隂中為明乃暗中存明也九五屯其膏小貞吉大貞凶𧰼曰屯其膏施未光也九五變為復之六五復五以隂變陽為比坤體故曰敦復以其變屯故欲陽之在隂中者充足隆厚而後能流行不息也所以無悔在本爻以陽變隂為復中陽變隂而不能流行閉塞凝固則雨澤之膏屯而不能下逮矣更繫之小貞吉大貞凶者何也小者隂也屯之利貞為卦之隂爻言也隂無不從陽而在屯卦之隂爻更主於從陽在震則從初陽而上升在坎則從五陽而下降故婚媾為主而守貞不字待求而往無不吉焉此小貞吉也至於大者陽也陽主施者也帥乎隂者也如亦貞固而不流行則屯膏之凶在雨澤尤顯著者天下何事陽不流行而不凶乎此大貞凶也凡元亨之德陽也利貞之德隂也四德在乾首卦如此六十四卦三百八十四爻皆如此也此大小之義也本卦之陽爻惟初與五在初不震動則陽不升起而伏於隂下在五不流動則陽不充周而陷於隂中故初雖磐桓而必朂其進五戒屯膏而以貞為凶二爻皆陽也大也在屯貴於發動流行也此大貞凶之義也上六乘馬班如泣血漣如𧰼曰泣血漣如何可長也上六變為益之上九在益之上爻以陽變隂為屯有莫益或擊之戒正變屯而澤不下益當損上益下之時惟思益已必反致人擊矣在本爻以隂變陽為益繫以乘馬班如泣血漣如者乘馬合諸爻為象血隂類也上隂居五陽之上正賴此隂以從順者為衛護使陽行隂中鼓蕩周流而成雲行雨施之化今上變隂為陽是變坎為巽五陽之上復加一陽陽無所屯但上升而不復下濟矣雲散風行雨從何施占者得此泣血漣如以隂傷也蓋人心為至隂心傷而泣血亦隂類故曰泣血漣如誰謂聖人繫爻不取於𧰼數哉特人不能窺測其涯際而已𧰼傳曰何可長也隂傷則陽亦無所附麗隂陽離散豈能久乎外卦三爻坎體以下震卦之陽升而入雲則坎體之中陽足復降為雨澤水雷轉為雷水解以開屯也四爻近五故𧰼以婚媾隨陽行化亦必遇合以正五爻則主外卦者陽不足而屯膏則施不光矣小貞以畜陽則吉大貞而陽亢則不能雨而凶矣上爻居極無濟陽行化之能亦得凶焉總見坎陽在中貴足而以二隂濟之行化方吉又必震陽振起而坎陽方流動也此五之主外卦為外卦之主爻而初爻又為通卦之主爻也屯之為卦雖欲陽動而升升而出險然其經綸之功能則貴於使之升降往來也故經綸者皆使之連絡交互而成物利用非謂解散開破雲雷之勢方出險而濟屯也於下卦之震陽必期之進而上升於上卦之坎陽又必期之俯而下降二陽爻既交四隂爻亦必期乎隨陽以為升降正與大象傳經綸之義象相符也再雲雷之起止聚散何非隂陽之氣相上下然為屯為解不同矣得其和而萬物以生失其和而萬物以死則聖人以肅乂哲謀為雨暘寒燠之調劑者何非經綸之功用耶坎下艮上蒙與屯綜亦四隂二陽之卦陽少貴陽根乾固然有長男次男遂有中男少男男俱隨父根乾主陽之卦也蒙長男中男相協而理則家業開創其始矣中男之繼艮三索而得男是謂之少男少男中男續起庶而且富逸居而無教則近於禽獸此蒙之所以序屯後也一家者天下之本也經綸草昧之後興修德教洵急務哉艮之為卦一陽居二隂之上隂培積而厚盛之氣也厚者隂而盛則陽艮上一陽亦隂之培積所生耳以髙山崇土取𧰼最確合乎水而成蒙者山在上而水在下山之髙可見水之深難測且山愈髙而水必愈深水愈深則險愈極山之髙雖可見亦不可即矣蒙者草木暢茂之義原以山髙水深成其幽暗蒙昧此山水為蒙之象義也然蒙豈任其蒙乎蒙必思亨亨不自亨必有亨之者方得顯微闡幽發智啓慮而蒙不終蒙亦猶山水險阻茅塞弗通必開間披罅刋木導泉始而豁然久斯大通矣此亦蒙之因𧰼以取義之㫖也蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖辭曰蒙亨蒙必求發蒙致亨也彖辭不為蒙者立言乃為啓蒙者示訓何也孟子曰天之生斯民也使先知覺後知先覺覺後覺也啓蒙者之教立而蒙者之率謹矣既為啓蒙者立訓何不令其求童蒙而必童蒙求我乎不憤不啓不悱不發之義也有來學無往教師嚴道尊惟自成已而後能成物耳又以易理明之聖人作易開物成務猶必待占者至誠專一之心來求斯一筮而即告如再三瀆瀆則弗告非有所靳也大凡占者必先定志志一則誠有筮必應若二三其心志中無所主徒瀆擾乎鬼神何以為告乎夫易之筮也未有筮而不告者也筮之再三亦必再三告之然其間吉凶禍福進退存亡必不一其辭矣辭不一而無所適從雖告猶弗告也故終戒占者利貞貞即正而中也先就其時審其事明其理定其志而後徵之於筮以合乎數方能㑹微妙之辭獲中正之則而協其動靜明其趨避焉亦如童蒙之質疑問難必先審於情事晰其義理或得其至當而就正有道或未盡於兩端而深究其用中俾教者言不多指而學者受益實𢎞也如徒日事於耳目之粗迹是惟求乎言語紛紜耳老莊墨釋且言無言為教雖俱非所宗而聖人天何言哉之訓不更深切著明乎彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也彖傳釋卦名義曰山下有險就二卦之體言之也又兼以險而止者合二卦之德以言蒙也然險而止則愈險矣愈險則愈難測故兼體德以言蒙蒙之義更切平地之水流多緩山下之水流多急山下流水或多淺山下止水則常深矣兼二義為蒙可想見焉蒙所以亨者必以亨道而行其時中之教方可啓蒙為亨非時則非中也不中則無當於時也既時而無躐等之施且中而無偏辟之理以此啓蒙不必有意圗亨而亨自致矣匪求童蒙必童蒙求我者童蒙之志先誠一為感方以誠一應之然後時中之教可以行不然奚望教之入而道之行乎初筮之剛中志一於誠再三之瀆問志分而不誠欲告之豈惟瀆於啓蒙者乎恐以雜亂塞蒙之心思志慮使之狐疑猶豫將失其誠以漓於僞耳故不告非靳也正以慎處乎蒙求也何也童而蒙焉赤子之心渾然中存未有不正者也惟恐瀆之使本正者無以養育而成全之耳倘能順蒙初心之至正者而以專一至誠之道養之則全乎物與無妄之體合天道矣存乎天命為性之理盡人道矣天道合人道盡聖人之誠德也而所以養之不失其正者則聖人所以為聖之功也孟子曰大人者不失其赤子之心者也童以養正而為聖功以成聖德又何疑乎𧰼曰山下出泉蒙君子以果行育德𧰼傳曰山下出泉君子以果行育德果行者泉之所以達其源也育德者山之所以登其極也四字蓋山水並取𧰼而非專言出之有漸而已泉以愈出而愈𢎞江河之始不過濫觴也山以漸培而愈髙泰山之登小乎天下也此皆童蒙養正用聖功以成聖德之優悠漸漬者初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也初六變為損之初九在損初陽變為隂為蒙恐其昧於急公之義故令其遄往而復戒以酌損也皆令安乎愚賤之分也在本爻以隂變陽為損涉險初步蒙晦專固非嚴竣之教戒如刑人之迫篤無以啓誘之所謂明刑以弼教正此道也如童蒙之幼頑劣已甚必有懲創方能悔艾太甲之遷桐伯禽之被撻皆此爻之義也如寬緩其事說桎梏而無所防範則任情以動流於匪僻其吝可知矣此說似與本義異然觀象傳正法之辭似無說桎梏而縱之使往之解遵本義何如遵𫝊耶又如亂世用重典所以開發頑民服馴新政耳殷盤庚之遷周東京之立皆尚嚴而不尚寬正是蒙初之𧰼雖太上以寬服民然必在乎重熙纍洽之世非去染作新之令也漢以寬大除秦之弊然漢法何嘗寬大哉勿為耳食者所悮九二包蒙吉納婦吉子克家𧰼曰子克家剛柔接也九二變為剝之六二在剝二以隂變陽為蒙繫以剝床以辨蔑貞凶變順為險剝牀雖未有與而蔑貞則不能出險以凶矣本爻以陽變隂為剝何所取乎以隂剝陽未嘗無配陽之𧰼義如剝五以宫人寵也男子生而願為之有室然必有刑于之德故首曰包蒙吉者率衆隂不齊之德而無不包於九二陽體隂用剛柔相濟此家之所以齊也故先有包蒙之德而後能納婦得吉也且包蒙亦有和衆兄弟以友恭之𧰼宜於兄弟也此中男之所以克家而順其父母也九二陽剛中正之德而能濟以隂處天下國家何不宜而用之於蒙晦之時更為至善此舜之德服帝女仁愛傲弟而底豫頑嚚之𧰼也傳言剛柔接正以陽爻濟變於隂言必指為二五正應亦可然五之童蒙之吉似無下應九二之義易既不可為典要就納婦之爻辭言象傳似指本爻為有據六三勿用取女見金夫不有躬無攸利𧰼曰勿用取女行不順也六三變為蠱之九三在蠱三以陽變隂為蒙巽變坎進而阻於險矣故幹蠱用進而遇險則小有悔不致大咎也在本爻以隂變陽為蠱則以取女為戒坎變巽忘險而思進如女之失貞靜故戒以勿取也見金夫不有躬冒險而不知進遇應止之位含九二內卦包蒙之克家而應上九擊蒙之為冦故戒占者以無攸利象傳曰行不順變巽而進為順然在險終而冒進不知自止則大有不順不可以巽進為論也以上內卦三爻皆言中男初教宜嚴包蒙納婦則吉而克家如取女得見金夫不有躬之人則勿攸利皆家教之興始於夫婦之義於外卦艮三爻言蒙則成教於外之道與家教不同故無婦女之𧰼參於其間蓋內卦之教教子婦也外卦之教教子弟也內教何以言刑人乎刑人者以嚴訓為喻耳然初爻又有初教之義不妨兼家國而言教况外卦之禦冦言教且兼兵矣兵刑皆教化所以匡其不逮者也內卦三爻坎險之體德以中爻主卦初三兩爻附之初發蒙於初宜敬二包蒙克家而吉三宜內附而外應不順故以包蒙為主爻焉外卦三爻六五中行之士顔曾也六四商之不及求之退也上九師之過由之兼人也凡童蒙之求者有此三種故列於外卦以為啓蒙者致辨焉六四困蒙吝𧰼曰困蒙之吝獨逺實也六四變為未濟之九四在未濟之四以陽變隂為蒙未濟至外卦既濟矣離體明德變而為艮體止德故利於貞斯悔亡正而持久三年克敵有賞文明以止久而有功也在本爻以隂變陽為未濟以艮體止德變離體明德似蒙而可亨矣而反為困蒙者蒙不自以為蒙而自以為明虛浮誇大之學術為人而不為已尚名而不務實此所以為吝也且學以實為貴必止而不見異思遷方久而有得若方蒙而恃其明不能止善而又妄動以為明吝何疑乎象傳曰獨逺實也本義謂獨逺於陽亦確但逺於賢知不親近以求亨蒙則實求諸己之道固己自昧矣其義亦相通焉六五童蒙吉𧰼曰童蒙之吉順以巽也六五變為渙之九五在渙五以陽變隂為蒙渙變蒙散變止則非渙也渙其大號而天下之蒙俱發矣渙王居而天下之養皆正養矣故無咎在本爻以隂變陽為渙繫以童蒙吉者變艮止為巽進止不自止必求進益乃開蒙致亨之義也故𧰼傳言順以巽也正言變艮為巽原存者已成之止德而又變為巽順之德故為蒙卦之主位而合於童蒙養正之吉也養正之聖功何非巽進而順致者乎𧰼傳明言巽順不言卦體非解矣六五本有柔順中正之德此已成之止德也而又為巽進正合童蒙自不滿假就正求益之道吉何疑乎上九擊蒙不利為冦利禦冦𧰼曰利用禦冦上下順也上九變師之上六在師上以隂變陽為蒙師者用兵之道與教化輔相而行以大君之命開國成家而兼弱攻昧如湯之伐葛文之伐崇是也戒以小人勿用恐其近於兼併功利之謀耳在本爻以陽變隂為師有擊蒙禦冦之𧰼不利為冦亦戒强凌弱衆侮寡也必有蒙昧犯道傷義擊之以開發其蒙使之服教畏神革心向化可矣非為利其土地人民而為冦盜之行也與師戒小人一義而互相發明焉𧰼傳言上下順以變坤而得順之德耳禦冦亦不過啓其蒙何非順德乎如為冦則非利牝馬之貞無論上下皆非順也以上外卦三爻以艮為體四之困蒙困而不學方吝上之擊蒙是非爭辨至如聚訟甚且各秉師承以相排詬結為仇讐成乎朋黨後世如朱陸程蘇之門人正為冦耳與此爻之𧰼正相近而著戒切矣惟五隂柔中正乃童蒙而可教以正養作聖之功者故得吉焉蒙卦內卦三爻所言皆教家之事而初以刑人言近則易玩故以刑弼教之始外卦三爻所言皆教國之事而上以禦冦言逺則易泄故以兵振教之終然刑與兵聖人不得而用之究之內教家以率妻子宜兄弟為先外教人以勉困知求巽進為務耳且初之刑人以朴作教刑言也上之禦冦以搜以講武言也即二三之閨門內則何非關雎鵲巢二南之風行乎四五之崇實勵志何非忠信進德立誠居業之切功乎再大𧰼以果行育德取義於山水者水必達其源於初爻見之山必登其極於上爻有焉而中四爻則山之登髙必自卑水之行逺必自邇也皆漸致無躐等也以此主蒙上與二兩爻分主內外卦明矣然蒙之教無思不服而教化乃行於至逺是艮止一爻又通卦之主爻也屯蒙二卦四陽二隂以陽為貴為用然其體亦陽何也根於乾也何謂根於乾合中男長男為屯合少男中男為蒙俱陽也故曰根於乾即坤亦附於乾如母之隨父也乾下坎上需與訟相綜四陽二隂之卦隂少貴隂根坤之卦無繼也其承接者屯蒙由主陽二卦後叙主隂二卦分根於乾坤以為易之門也需屯蒙無所繼根於乾長男次男成屯次男少男成蒙所以根乾從父也需訟無所繼而根坤有說乎需以水天合而成卦水者天地初生之五行也天一生水地六成之天地始生之物仍是剛柔始交難生之義故列之於乾坤之後也然何以根坤天水皆陽物也陽必以隂為根所以以需持其躁而歸於久寧止以隂少主隂根隂乎此需之所以無所繼而直根坤焉觀於卦之辭傳可知主隂必根坤矣以人事言屯蒙後序需養則明農教稼耕九餘三教則漸仁摩義必世後仁非需則近功小效豈王道可大可久之圖乎此需之所以為君子親賢小人樂利將以合天下後世而為明新之極也然易之為書廣大悉備凡事之應需者俱可觀𧰼取德於斯水天相值而為需天之髙也水之逺也盈科而進放乎四海需者順水之性也過顙在山則逆水之性而不能需所當需未有不躁妄而失其據矣再如雲漢之生嗟時雨之待澤雖聖有桑林之禱禮有雩祭之文然升中告䖍致敬盡禮究俟誠意之徐感隂陽之自和而後雲行雨施潤澤萬物豈容迫而致之如暴尫之虐戮巫之謬哉需有孚光亨貞吉利涉大川彖辭曰需有孚需歸一於有孚凡需非逸居肆志之謂正是兢業小心守靜御動誠一之衷既孚於有素天人之應必協於當機需之正義也不言元亨而言光亨元亨者自然之道光者積久方至之𧰼篤實之久乃有光輝在上之聖人非一日之積德而能光被四表在下之君子非一日之修身發潛德之幽光需有孚而後能光亨占者叶此孚德乃致光亨耳此無他義利貞而已貞即孚也利乎貞者守乎正以為需不期乎光亨自得由中形外之功用矣居於夷者既得一以為守涉於險者自獲攸往之利利涉大川何疑乎蓋有孚者乾元剛健之德也以陽德為守之體以主乎乾即以陽德為行之用以濟乎坎坎中之陽即乾陽也其濟險之德亦即自强不息之德也卦雖異而陽同陽至一無二者也有此陽德而能需久所以用隂者在是矣彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以中正也利涉大川往有功也彖傳釋卦名義首以險在前為言於彖辭已微有異同矣蓋為占者申明當需之理數也需而名之曰須須待也待以為用也待而似勿用正所以為用也凡事之遽難得理者正為艱難險阻在目前急遽苟且斷不能幸成見小欲速反致於不達故須必待其時以觀其變審其機而後履險如夷守靜御動險不成險無困窮之道而得光亨之效矣何也以剛健而不陷也人見需而遲滯似陷溺而不振作不知剛則不以私意僥幸而冒險健則不以疑慮猶豫而失機不動則已動則出險而有功此剛健不陷之道即有孚而利貞之義也明乎需之為需主乎乾之德濟乎坎之用則卦義既得而彖辭之有孚光亨貞吉俱歸之於九五以尊位而備聖德所以能有孚能光亨能利於貞為一卦之主爻矣剛健不陷於險似言乾體而乃重五爻何也乾體者陽德之備乎內者坎用者陽德之應乎外者也且言天位則五方足以當之德不可見乾之內也位乃作覩坎之外也二卦雖分內外而陽德則合而為一者以此德為體此位濟用涉大川而往有功其利為何如乎彖傳申明險在前固為凡應需者立辭以盡其意但屯之水雷也蒙之山水也莫不以水為險故經綸草昧以開屯果行育德以啓蒙猶必相需之久而後能成成則永永而無弊矣是需之次於屯蒙需之久而開天闢地遂生復性猶為生民之大事非旦夕可致之效也𧰼曰雲上於天需君子以飲食宴樂𧰼傳曰雲上於天大旱望澤必瞻雲霓雲上於天雨將至矣為需者慰其懸懸正見不必更有所為惟飲食宴樂以需之而已飲食宴樂者非逸佚縱恣也以達而在上言虞之喜起周之宴鎬也以窮而在下言則簞瓢陋巷疏食飲水也樂不以窮達有異而道則以時中為凖時而需也需所以時止而止也將必有時行而行也時靜而靜也將必有時動而動也動靜不失其時其道光明光明之道非光亨乎在艮之止體言之正與需之得宜為止為靜其理相協也以此言飲食宴樂其無終食之間違仁須臾不離道之義乎故曰君子無入而不自得焉又曰君子有終身之憂憂即是樂也需之靜止無非待動而行程子謂動亦靜也愚謂何妨言靜亦動也乎動靜異而有孚則一至誠之純也純亦不已何嘗有一息之間哉需之為需可識矣即就常占之人言利貞以需時守靜而待動亦與夫君子居易俟命近而去小人行險以僥幸逺矣初九需於郊利用恆無咎𧰼曰需於郊不犯難行也利用恆無咎未失常也初九變為井之初六在井初以隂變陽為需繫以井泥不食禽所弗居正須急淘汰其泥以滋其養何也井變需需以養物宜速勤其功也在本爻以陽變隂為井繫以需郊用恆無咎以乾變巽巽進以為用陽體隂用也宜郊逺以為用恆心以期孚方無妄動躁進之咎焉且需而變井郊乃宜井之地也井田之經界必自郊遂始又利用恆亦三代分田制祿之法耳𧰼傳曰需於郊不犯難行也初以陽德乾體不肯輕進合於剛健不陷之卦德矣不犯難即不行險也又曰利用恆無咎未失常也居易俟命不失日用常行之道即需也奚咎哉九二需于沙小有言終吉𧰼曰需于沙衍在中也雖小有言以吉終也九二變為既濟之六二在既濟之二以隂變陽為需繫以動而喪茀已有輕動之羞矣勿逐七日得反乎隂柔中正則得茀必濟矣正為變需不應急動也在本爻以陽變隂為既濟乾體變離不能剛健而有憂懼之心幸其離明遂有商𣙜之言然能以隂柔之退濟其陽剛之進則需於沙而中立於不夷不險之間不陷之義曉然洞悉亦必能仍全其陽剛健不陷出險能濟不致困窮也終吉者亦七日得之義也變爻彼此參看其理數方備筮之久方得之九三需于泥致冦至𧰼曰需于泥灾在外也自我致冦敬慎不敗也九三變為節之六三在節三以隂變陽為需兑變乾柔金變剛金澤竭之𧰼故應節不節則有嗟若之占無咎者無所咎也在本爻以陽變隂為節乾體變兑隂柔而具悅德又鄰於險失其爽塏之據次於下濕之險需於泥之𧰼也需泥泥未入而陷於險然兑體上缺傍乎潤澤自決其隄防則犯難矣決口受水開門揖盜也致盜之至必矣不言凶咎者不自喪其防維但需亨於險阻猶可免凶咎也所以𧰼傳曰雖需於泥矣災外震鄰而不切膚果能敬慎以守有孚之戒徐待光亨之吉則仍不致於覆敗凶咎耳以上內卦三爻陽剛之體德初變巽以巽順為不犯難利用恆常初需之時正宜從容暇豫以退為進也二變離以明為健雖無勇者之不懼而有知者之不惑惟守乎貞孚而仁全則知勇俱優矣三變兑以健為悅有以悅為進之𧰼兑為口或以言語爭勝而思濟險者尚口乃窮所以冦至必敬慎為守仍以剛健貞孚為不陷也故不言凶咎以改悔而免之也內卦乾之三爻以中爻為主卦二需於不險不夷之間得中道也故終吉初三兩爻附之成卦初附而三不附分言見中為主也六四需于血出自穴𧰼曰需于血順以聽也六四變為夬之九四在夬四以陽變隂為需需於險中隂柔不決次且而疑阻牽羊而難進夬不當用壯夬悔反亡者以需為夬得夬之正也在本爻以隂變陽為夬剛健不陷之德既有孚矣雖需於血雜乎隂險之中而自出穴已入羣陽之類終歸於不陷出谷遷喬之義也亦不言凶咎需得宜耳𧰼傳言以順聽也順者隂德聽乎五陽之命以為不陷而出險也在夬四臀無膚亦血之𧰼血乃隂之盛臀而無膚膚者陽也臀者隂體在上之下也夬四聞言不信陽變隂無所信從需四順聽隂而從陽聽之義也二爻參看其義愈明九五需于酒食貞吉𧰼曰酒食貞吉以中正也九五變泰之六五在泰以隂變陽為需為歸妹元吉隂變陽以從陽而濟陽故元吉也本爻以陽變隂為泰能持盈保泰於既泰之後由於能有孚利貞於致泰之前也未泰而求泰既泰而終不敢自以為泰飲食以需即大𧰼傳之飲食宴樂守貞以為吉也即彖辭之貞吉也此所以位乎天位以正中之德立剛健之體為本卦之主爻焉𧰼傳曰飲食貞吉以正中也一終食之間貞吉不違仁也非得正中之心無以存仁德而居君位也上六入于穴有不速之客三人來敬之終吉𧰼曰不速之客來敬之終吉雖不當位未大失也上六變而為小畜之上九小畜之上以陽變隂為需隂盛陽衰既雨既處隂德已能載矣若更濟隂婦厲月望隂盛則陽德之君子征斯必凶矣在本爻以隂變陽為小畜隂雖盛極險極入於穴中然變陽則陽必應不速之客三人來思濟險以拯隂於穴耳敬之與陽合德何弗吉乎九三之陽上正應也然乾體以二為主初三附之來則陽類俱來君子之所與也敬之何所失哉位不當指來客內卦三爻言非謂上六也本義疑之以為未詳指三則無可疑試再玩小畜之上九尚德載正合於需上六云敬終也小畜以一隂畜五陽上變隂而附隂則險終於險矣故戒女隂盛而尚德至需之敬則與三陽以敬慎往來主客相與久要之道也正以變小畜羣陽畜於隂不可不相交以敬信敬信乃陽德之中主者也尚德主孚俱一義也在三雖視外為冦而必敬慎以自持在上雖入於穴中而必以敬為出險敬慎之交洵處終之道乎需卦以敬之義為內外之終正與大𧰼飲食晏樂無不敬而安所止之義相照小畜為密雲不雨至上九而既雨既處則自密雲以致既雨皆隂德之厚尚之而足以載物也合之需𧰼雲上於天需其自雨是二卦皆以雨喻隂勉小畜之隂敦其厚德戒需之隂失於敬慎無非為隂謀即無非為陽謀也二𧰼傳言需於沙衍在中也來易謂衍為水朝宗按衍之為義水之行於中者也又水之衍乎中而溢於外亦謂之衍如衍文之衍是其義也此二爻之衍則行於中耳需於沙非郊非泥故謂之中小有言而能需以出險以明濟剛終吉可知以上外坎三爻以五之陽剛中正主乎通卦所以辭同大𧰼以安貞為需道所以待德成業者乃無為而天下平之義𧰼也四以順聽於五而出穴上以助得於陽而終吉皆主隂以從陽為吉焉卦四上二爻隂也以從陽為義何主隂根坤乎需者隂道也五爻主卦陽也而需必貞焉則陽貴以隂濟故論卦體德必主隂根坤耳坎下乾上訟與需綜隂少貴隂主隂根坤無所繼也序乎需後與屯蒙二根乾之卦分根乾坤隂陽之卦皆自乾坤緼焉耳訟養與教雖繼起而養厚者必爭教衰者訟起所以綜需者飲食宴樂之間敬慎不存而釁隙已肇矣需以水逺天髙而安居靜守訟以天髙水逺而欺公競私需以險在前而剛健不陷以處事言也訟以險居中而剛强思逞以存心言也雜卦𫝊需不進以不進為進訟不親不親而貴使之親也訟亦無所繼而根坤何說乎訟者隂險之事自天水陽德中生出人生有性性理也隂也轉生出情陽也遂有公私其私者為隂公者為陽又自一太極中生出兩儀也故訟之中有是非聽斷之者有明暗皆以情求情之義𧰼也聖人無訟之原在無情者不得盡其辭是情而虛僞如無情也情雖有公私以私情為無情究之情亦有公無私孟子云乃若其情則可以為善矣論其與性合一之情也人之性情不能皆公故於聽訟可明其是非審其公私是以訟首四陽二隂之卦列於乾坤之後而根於坤就人之性情明其行詣之邪正亦為主隂之𧰼義也與需相綜根坤亦有飬與教之義象需所以待養之甚久訟所以彰教之不逮也天水本皆陽由繼善而成性性命於天情發於性本為中和也變為訟而隂邪參之曲直是非明則仍復乎陽之本體此大學所言大畏民志謂之知本也然情也志也皆隂也故主隂根坤無疑不外陽多隂少貴隂之義天髙聽卑監臨微暗然日月離明不照深險無情者掩不善以著其善藏其隱曲而表其公直於是是非淆惑刑賞倒置訟之所以不能無也聖人憂之立訟卦以明其象剛健中正陽德也而的然日亡之道未嘗不假托焉外則正大光明內實城府機械聽訟而不明此象何以使無訟乎故取𧰼繫辭而訟之為訟可觀玩而得其動靜變化矣訟有孚窒惕中吉終凶利見大人不利涉大川訟之繫辭亦言有孚剛在外險在內何有孚乎然有剛而不能柔其用於外險而不能平其情於中見人之惡而不見已之惡見己之長而不見人之長執固乖戾而不自知且妄為己心至誠秉公人皆設僞營私者則其有孚非孚也窒塞不通而已矣孚者誠中形外身世相信之謂今訟者之有孚自以為孚不能感信乎人以致憤激躁妄以訐為直豈有孚之謂乎曷亦時惕於中而自省否乎誠惕然自察所謂孚者理之大通於世者乎抑意之自窒於己者乎於斯盡克己之力屏自是之心開誠布公舍己從人焉有訟乎且罔不吉矣如此而橫逆之來强暴之侮仍不息焉利見大人者使民無訟之君子可以相質也斯時有聖人而在位秉剛健中正之德以臨民聽訟利見之而何訟不正哉然以息爭也非以長訟也欲濟險而不為人所陷也非冒險而欲陷人也故云不利涉川焉此川在人心方寸之間君子惕中則坦坦如也小人終訟嶮巇莫測矣明哲保身君子以退避而自全者有矣傾側竒邪小人未有不肆害善類一網打盡者也終凶之戒蓋為君子小人兩示也彼小人不足謀矣為君子者存有孚而去窒常惕中而自克何有終訟之凶乎已為聽訟之大人則秉公持正以斷訟且修德化民以無訟矣若有訟而聽於大人有大人聽訟君子小人是非曲直一見而定亦無終訟之虞倘無大人可以利見君子固有髙飛逺舉遁世無悶之學矣何必與小人終訟耶此所以不利涉川濟世惟宜括囊以逺咎耳彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也彖傳釋卦名義曰上剛下險險而健訟上下該內外人已言剛則思凌物險則欲陷人往來侮害而訟成矣此就二人言之然亦可就興訟者一人言也險以居心剛以應事亦必致訟此義亦為占者自審果已剛而彼險抑己險而彼剛或剛險俱在己耶此惕中之吉也訟之有孚而窒所以必貴惕中以克己而後能審己審己而後能度物也惕中者豈舍剛以用柔乎用柔而近於險反不如剛之易見此又是觀過知仁之論惟以外剛歸內以得中為道如坎之體德方能惕中獲吉而釋訟於有訟且消訟於無訟也乾陽之剛本是剛健中正純粹以精者羣龍無首用九之道也今顯露於外是亢龍矣惟內存於中如坎中之陽夾於二隂以陽為體以隂為用此剛來而得中之義也人能體陽而用隂老氏之學得之稍近於權術聖人之學得之自成於忠恕陽者忠也隂者恕也焉往而不臧哉然必戒以終凶者為占者無能叶此體德而言之也終在上九著其不足貴勝猶不足貴况不勝乎陽剛終亢訟成而知進不知退知存不知亡知得不知喪亢龍之戒即終之凶耳利見大人乾五之陽剛健中正聖德而居尊位利見之而何訟之有為乾之體德言也不利涉川者或有不用剛之終而用險以為終者以為川者可陷人不知適以自陷而入於淵焉又為隂柔傾邪一種小人而言其終凶將更甚於剛之外逞者矣易為君子謀必兼為小人謀此等甚多非定剛為君子險為小人蓋强暴之惡易見而奸僞之忒難測明其終凶而兩示之且為辨流品之陽惡隂惡明心術之易識難防無不前民用於至微也𧰼曰天與水違行訟君子以作事謀始象傳曰天與水違行又從訟之源頭說見天運左旋水流東注違行顯然似訟之𧰼然孰知其始之本一氣以運化於無息乎天水本一物而自有私者視之則言天者必左言水者必東矣其間仍有執固之見似無私而較嗜欲之私更甚天水何與於己且天水何嘗不一左旋與東注者又何嘗相違而就天言天就水言水不相貫通遂成執一此等意見君子學者謬戾於心爭辨於口更甚於庸夫俗士觀乎謀始之辭而可以恍然開悟矣訟之本私者作事謀始為凡人私心己見謀也訟之本公者作事謀始為君子學者察事中之理一本而萬殊同條而共貫謀之也必得其性始之一而歸於理之至是不執乎末物之萬而出乎意之各成然後或舍己而從人而不為同或因心以制物而不為異此乃知事之不一而理一理之末不一而理之本無不一也於此謀之方為善也何也一者元也元者始也易簡之善配至德易簡之理得而天地事物無不開成於聖人之一心焉烏有訟之可論哉初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初六變為履之初九在履初以陽變隂為訟履之始進而素履無文初入險而不成險故無咎本爻變隂為陽為履以險變說忘險故不永訟事也兌為口故有言初有言故言小不恃險德而能悅之以理此所以終吉也悅或近於以悅為險則所謂笑者不可測矣然以險變悅動而附乎陽爻雖不得中正而所尚亦可嘉矣此所以不永所事無訟終之凶而有無訟之終吉也𧰼傳以為小有言者辨明其理而非訟人以口求勝也亦從悅之體德而言也不永所事知不可長而不終訟因初六之變隂險而成陽剛所以能得吉占焉九二不克訟歸而逋其邑人三百户無眚𧰼曰不克訟歸逋竄也自下訟上患至掇也九二變否之六二在否二以隂變陽為訟以一隂變陽而包二隂以承外卦之陽小人用以附君子則吉若君子則自修在己何輕承人之顔色乎故寧甘守否而終亨此隂變陽故能包承也在本爻以陽變隂為否坎變坤順則失其坎險之據矣變為柔順之坤體所以不克訟非不願訟欲訟而不能也更逋喪其邑衆至三百户者散其黨同之衆也似有咎而實無眚焉象傳以為不克訟而歸逋竄正見否之時力弱不足以維持衆心與包承二字相反陽變隂則食邑斯逋隂變陽而同類可包也不克訟無眚散其黨正所以示公正無私耳大約險雖隂惡亦必有陽在內方心力足而成險如中無陽而但有隂柔則為靡靡不振之人諸事頽墮人心不附不為所用何能訟乎此爻為主內卦歸而逋户宜就散其黨說如朋亡渙羣之義為是六三食舊德貞厲終吉或從王事無成𧰼曰食舊德從上吉也六三變姤之九三在姤三以陽變隂為訟姤而為訟巽順變險陽動隂傷臀無膚其行次且之𧰼然在姤變隂雖厲而無大咎也本爻變隂為陽為姤訟而為姤舊德可食守正雖厲亦終吉也三在險體處極位外與乾鄰以隂變陽而附於陽從王事之象也然宜終安其隂體守地道無成之義則無成而大有成正為坎險變巽順雖進而不自居其功為可尚也象傳以為食舊德從王事臣道也貴於從一以終也言從上吉者三陽在外五為聽訟之大人而上九又為三之正應也姤以初隂取義三之變姤以婚媾言乃臣妾共之者故以地道無成以示之從君從夫一義也何可新舊移易哉舊德足食即從一而終之義耳以上內卦三爻險體初變履而忘險安於素履故吉二變坤順順亦平險而不克訟且能散私存公有逋其邑人之𧰼所以主內卦也三變巽巽進以出險貞以濟險雖厲終吉也在訟以險而有訟故三爻因變而皆得吉占也九四不克訟復即命渝安貞吉𧰼曰復即命渝安貞不失也九四變渙之六四在渙四以隂變陽為訟變陽與陽合體羣也然必亡朋化黨方得元吉所以渙羣而為聚丘者隂之柔巽而進原欲渙羣而反以聚丘豈思所及解散同黨私謀以安服反側之義也則此聚者公而普矣在本爻以陽變隂為渙健之剛外者濟以巽之順進隂之柔和矣所以亦不克訟觀其復而即命渝變其所安之貞固此所謂尚有孚而去窒惕乎中而得吉者也復即命即惕中也本義言復就正理理即性也性即命也命者性之原本求正於理之原本復而即之復性之義也渝者變化其氣質之功也安貞者平日安於貞固執一而不可化者也能濟乎此吉何如之訟雖剛險兼成必竟以剛起訟故以陽變隂爻訟皆不克成訟焉𧰼傳釋復即命渝安貞但就不失言之不失者克全其性命變化其氣質以不失其本心而已究之渝氣質正以復性命且復即命於性無加也亦不過復其原命於天者全而畀之全而守之蓋以即其性命之理為復也不失二字深曉學者終身惕中才能不失其性命一刻怠斁失之逺矣操存舍亡慎之哉此爻安貞就執固言斯當渝矣九五訟元吉象曰訟元吉以中正也九五變為未濟之六五在未濟六五以隂變陽為訟離明而得乾健所以為貞吉也得正獲吉何悔乎必且德成為君子而有外著之光暉矣然君子之有光由於有孚誠中形外斯獲吉也此與訟之九五以中正為有孚相通也在本爻以陽變隂為未濟繫以元吉者陽剛在外而成訟陽剛渝柔而訟無終矣且剛健變為文明文明而健居於尊位以理乎訟有訟聽之皆得平允必漸致於使民無訟元吉可知矣象傳歸於中正過剛則不中明而不剛則不正剛健文明所以為訟卦之主爻而為聽訟之大人合天下而利見之也上九或錫之鞶帶終朝三禠之𧰼曰以訟受服亦不足敬也上九變為困之上六在困之上爻以隂變陽為訟困而訟斯更加葛藤危殆故有困於葛藟於臲卼之象然曰動悔有悔則征吉也在本爻以陽變隂為困居訟終健變兑外說而內健善於訟者也善訟必終訟而膺賞然訟已成不可復悔即勝而受賞猶不免焉况敗負而不可測乎或錫之鞶帶絶無而僅有之事終朝三禠之乃一定不可移者也𧰼傳言受服之貴因訟而致不足敬也總見不可終訟之義而已再者初在下變兑口在三爻上爻變兑口在本爻似有訟而尚口之象故能以喋喋受賞而終被禠不存馬援云一資半級雖或得之衆怒羣猜鮮有存者雖不以訟言亦可想見世情矣以上外卦三爻健體以之成訟則剛惡也惟九五變離為剛健文明主乎訟卦為大人之德位四近五能即命存理渝貞化氣亦吉上則終訟得賞亦凶歸於無訟聖人本意也孔子言聽訟猶人使無訟為難無情者不得盡其辭由於大畏乎民之志謂之為知本本者何在事物為道道率於性性命於天由天命人性之原求所謂本者而一以貫之民吾胞也物吾與也何不歸於一元又焉有彼此物我爭奪是非之私乎兹於訟之象傳亦曰天水違行作事謀始亦知本之說也但就一事言慎始者一事一物之始非萬事萬物之始也聖人於萬事萬物之始其謀之也豫故一事一物之始知之無不明處之無不當至於賢哲以下不能一貫則必求得忠恕之道忠以成已恕以通物一心為始而事物之始俱由此推暨此忠恕之所謀者久之亦一貫之道也再下此而初學之人能一事一物必謀始焉亦可以謹小慎微而免成訟莫悔之患矣象之謀始一言聖凡舉莫外矣復即命渝安貞之理不繫之五而繫之四者五乃中正成德為訟之主爻聽訟之大人在上位者也四在下卦之上上卦之下修德為學之君子也况四多懼懼則德修而學懋矣蓋以乾剛變巽順剛柔濟以存志健巽協而用功修德為學之本也坎下坤上師師乾坤後五隂一陽之卦與比相綜而成根於乾之卦貴陽也在師以二爻主之在比以五爻主之師比二卦根於乾固陽少貴陽矣乾坤之後先叙四隂二陽之卦二次叙四陽二隂之卦二方叙五隂一陽之卦二為師為比相綜成卦俱自乾坤藴之出於其門亦無所繼也叙卦之次第亦有另義兼明之以申序卦聖傳之未盡者耳在三陽三隂四陽四隂之卦後叙以五隂一陽之師比師固衆也比亦因衆而比蓋乾坤之後生人為萬物之靈秀其性一而其質不同清濁厚薄各得於天地不同也質不同則情異為同則黨為異必爭同則為比爭則為師此師比相反映而見象義也人為三才之主人中有君又為人之主師比皆以一君主衆隂師二師中之君也比五人中之君也此二卦又各成之𧰼義也蓋師之君在下卦方伯也比之君在上卦天子也又各有𧰼義焉訟之後受以師者師即訟之大者然於卦𧰼求之則天水訟而地水師有應標出者焉天水訟本一而末殊地水師體分而用合何也坤土坎水始終相附無土則水無所麗矣故天一生水地六成之此理數也然則水之為水本天之清氣所化所以成為水者正因比附於地之濁故此一物竟不可離地而自成形質焉此地水體分用合之道也何以取象為師哉乃從奠安水土隨山導河而肇啓其端禹平治水土分疆畫界因山川之形勢别原隰為九州即用水之源流以正地之區域此水行地中後第一位天地育萬物之功能也其後井田封建無不因地水分合而興制立事建侯則五等授地分田則八家同井其間立國之廣狹以里計而里之多寡以井計井以溝遂洫澮計民於是飬賦於是出賦從貝者任土作貢也從武者按田出甲也衆庶之所以聚軍國之所以資何非以水土為基乎所以師之為師不過言衆而已非必定謂為興戎也惟衆聚必爭所爭者小在婚媾飲食斯訟耳所爭者大致於兵連禍結大抵多因水土之故是以師衆而爭則為行師矣師之為義平居教民於黨序學校之中戎興教民於行陳進止之際蓋五隂從一陽衆也二居坎中流行之𧰼帥衆行師也此所以取象立卦也師貞丈人吉無咎彖辭言貞不言利師貴於貞而不尚乎利一尚利則非貞與他卦不同其戒天下後世深矣故湯武猶有慚德况爭地一戰殺人盈野爭城一戰殺人盈城乎丈人吉者年德俱茂者也其貞可知然所謂吉者不過無咎而已兵凶戰危無咎即吉也卦德外順內險為師師與訟俱重在內險險者造訟師之本外健在仇則險以應之而成訟外順在敵則險以毒之而為師外順何必毒之毒夫人之不順也斯民從而師得其正以義不以利也若己心不順而毒之師不得其正以利動也民亦從之而終有咎秦之兼併二世而亡吳之破越旋踵而沼可知師之尚貞不尚利矣且水行地中乃民所以得粒食之𧰼治則師寓於農亂乃農悮於師地靜水動地能鎮安乎水治世之農盡衆力於耕鑿地不能鎮安乎水水必妄行亂世之兵疲衆力於疆場其𧰼自昭然耳兵農雖分不過此衆地之統既異而衆之生死分順之範圍乎險建德以撫衆洵為要哉順之為德載物之厚德也為生民托命者惟此厚德使衆常靜而不動常安而不危非安貞之吉應地無疆者何以盡貞之道乎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣彖傳釋卦名義曰師衆也貞正也能以衆正不為用師言也治衆於未亂保民於常安方為能以衆正刑以是措兵以是消此所以為王天下之本也不得已而成師亦以順乎人心合乎天理者用衆而已仍是以順化險而全無機械權謀如後世談兵者流利己損人詐僞百出方自以為神竒莫測也如此方為王道治民王道行師故傳之釋內卦險德必歸之於剛中而應九二在坎中所以主乎險者未嘗不知深勇沈絶非我詐爾虞以剛中為德而衆之應之者盛矣得道者多助豈必専言二五相應乎一卦五隂無不心悅誠服矣亦不必専言用師有時而聲罪致討仍以此剛中之德誅其不應者雖云行險其實大順之道也所謂險者乃師之道本險凶危難知必自立於不敗之地而不求僥幸之功是師為行險之事非謂當存險於心也惟其內順乎天理之正外順乎人心之公而以師為至險臨事而懼好謀而成天下視之以為至順也行師者慮之以為至險也皆其剛中之德主於內故天命人心無不順應於內外上下也此師之所以為貞也然聖人之心終以為兵之征有罪不如德之化不服王者之師有征無戰征而不服亦不戰也退修文德以來之舞干羽以格之而已矣若至用師乃所以毒天下之事也夫以剛中為德而天下響應慮險至切而仁人無敵民無不從如此而猶謂之毒天下况乎窮兵瀆武好大喜功以人命為草菅專以闢土地充府庫為志者毒天下而終以自毒其不得貞正之道有凶無吉不能免咎何待筮而後明哉蓋自揖讓以後兵事日勝春秋已無義戰矣然猶論曲直壯老以决勝負戰國以降弱肉强食屠則連城坑則數十百萬毒之烈何如聖人之仁及於百世於師致警深切著明殘民為心者一讀易而庶幾可以稍寡其過矣象曰地中有水師君子以容民畜衆象傳曰地中有水師君子以容民畜衆見地水之相成而濟物也非以毒天下也故在師不言師而但言容民畜衆孟子所謂樂天者保天下之義也即畏天者保其國亦此義也君子素位而行樂天畏天總以善保為義無事之日厚其生正其德養其欲給其求可以容畜之者內無不盡其心外無不備其政本以安綏而鎮定此民此衆也非欲其國富兵强為克敵制勝之具也殆仰事俯育之計既足親上死長之義自明善人教民七年而民可即戎况王天下者以剛中之德建其極而人皆為應以慮險之思守其國而理得其順不用師斯已用師而一怒以安天下之民豈誇乎孔子云我戰必克祭必受福亦此義耳孔孟所言乃真兵法奈後世誤求之於孫武穰苴彼皆竊取聖賢緒論之餘而出之以詭譎不正究之能用亦未必濟况不能用乎談兵者非止趙括不可信矣容畜二字包盡治民即戎之道其𧰼原取於地水其德原取於厚載然必能制乎水而後可以容畜乎水以大事小如文王以小事大如太王孟子固有論矣後世如漢髙聽劉敬之和親亦大事小之善䇿也不然則唐太宗之爭髙麗矣如錢鏐之歸宋亦小事大之善計也不然則燕丹之刺秦矣至如宋之於金元以為事大唐之待藩鎮以為事小則靡弱傾頺不能立國堤防弗固河渠壞裂豈可自託於容畜乎故云民猶水也可以載舟可以覆舟衆之𧰼也土所以統水也地中則安瀾地上則橫決容畜之𧰼也故𧰼不言師而但言容畜就其本源明其義而已容畜之道在乎厚德而坤之厚德在乎資生然則厚民之生為容畜第一義也明矣况土厚則水深必不橫流土弱而水橫流其涸也亦可立而待蓋土弱水亦不能𢎞長矣上失其道至於民亂亂民何能久乎必有神禹經綸草昧另為平成一番而水方復歸渠行乎地中然社稷已墟而民已殘矣初六師出以律否臧凶𧰼曰師出以律失律凶也初六變臨之初九在臨陽變隂為師初陽臨隂取義咸臨同九二以治四隂故曰咸亦兼變師臨衆之𧰼在本爻以隂變陽為臨初隂隨陽以其始進故以律示初出而以律與否正弗正之大關也不正則否臧凶可知矣初隨陽而往陽即剛中剛中即律也又恐其否臧者險體變兑內險而詐外以苟且取悅為隨於貞之道失矣貞失即否臧矣所以凶焉故𧰼亦以失律言凶也九二在師中吉無咎王三錫命𧰼曰在師中吉承天寵也王三錫命懷萬邦也九二變坤之二在坤二以隂變陽為師繫以直方大者有柔順中正之德故其體直其用方合體用以言大也不習無不利德性成不待習有體以制用何不利之有在本爻以陽變隂為坤以剛中之德而又濟之柔順為一卦之主爻故繫之以在師之中中者正也中而正所以貞貞所成吉而無咎王指五言為二正應在二臣道也五君道也在卦體則以一陽統率五隂上下皆應五雖君而亦應帥師之臣矣三錫命者申命重叠也𧰼傳曰在師中吉承天寵也言寵來自君而剛中之道秉之自已者也承君寵即承天寵其實天德自貞耳王三錫命豈有君營功利臣竊勳名之私計哉所以令其懷保萬邦容畜民衆也懷之為懷即容畜也不必用師以毒天下𢎞宣德意化服荒逺亦樂天者保天下也二在師中以一陽御衆隂有衆而不恃衆居險而不忘險吉而無咎王因錫命皆無用師之辭師期無師之義云耳六三師或輿尸凶𧰼曰師或輿尸大無功也六三變升之九三在升三以陽變隂為師巽變為險而冒進貪功故有升虛邑不得其所之𧰼如宋之從元滅金僅得空城漢之求大宛之馬而師老財匱即此爻之戒也在本爻坎變巽為升在師以變升忘險而進亦此𧰼也爻言輿尸之凶𧰼傳必大無功理有必然矣二爻參看於此猶的以上內卦三爻險體在師中以二為陽剛中正主乎一卦以帥羣隂故吉初變臨戒以律三變升進而凶皆致謹於冒進貪功師期無師之道也必皆附於二爻之中初得律而三有功矣六四次左次無咎𧰼曰左次無咎未失常也六四變解之九四在解四以陽變隂為師坤變震以一陽主二隂故有拇𧰼朋至即二隂也二隂相從而孚不言吉凶而孚即吉也在本爻以隂變陽為解兵以解釋為吉交結為凶故為左次之繫而以無咎明之凡隂變陽應進而退者惟其能進而不進如晉之避舍於楚齊之歸田於魯皆以弱為强以柔為剛師之善道用老氏而不逺於聖賢者也所以𧰼傳以為未失常也常者師以隂道為常道即正道也亦得乎貞之義者也無咎即吉也在師為然六五田有禽利執言無咎長子帥師弟子輿尸貞凶𧰼曰長子帥師以中行也弟子輿尸使不當也執言古本作執之六五變為坎之九五在坎五以陽變隂為師取水不盈滿期於祇平而已亦以無咎為吉水之性至平以盈滿則溢如恃衆驕亢則危矣在本爻以隂變陽為坎內外俱險以𧰼至險中又值重險為師主者不可不加謹也於此而有貪得之念則必忘險而失順凶咎立至矣故繫以田雖有禽而不可輕身從禽以貪利惟利執言命將錫命以懷萬邦焉執本義謂摶執而言義置之無釋愚謂執言即三錫命如吉誓誥之屬反復告誡之詞命也所以二爻繫以三錫命也再釋執之為義又有堅固不遷之說出師在乎命將命將在乎専任如樂羊之伐中山執言而成功樂毅之伐齊不執其言而敗績執言洵任人之善計豈止用師閫以外原將主之耳無咎亦即吉也復繫之長子帥師而貞則吉弟子輿尸雖貞亦凶老成謀國必不輕啓兵釁少年好事多有躁動貽戚似執言又兼慎簡將帥知之明方可任之専唐以任裴度而平蔡宋以任童貫而亡國専任之義實兼凶吉既云執言無咎復分其途以示戒用人惟専専任惟賢決審在一心而禍福在一國可不慎乎帥師不重在貪功獲利而重在修德弭兵至於輿尸即喪敗在彼仁人且恤之君子且危焉若自我而覆軍辱國或竟爾喪亡凶何如乎皆兵凶事而易言之為之權輿矣聖人之意師期無師於君於帥何其愷切哉𧰼傳曰長子帥師以中行也如二之剛中可以任之也若弟子之使必至輿尸何當於使乎上六大君有命開國承家小人勿用𧰼曰大君有命以正功也小人勿用必亂邦也上六變蒙之上九在蒙上以陽變隂為師辭申禦冦不為冦之戒兵刑皆教化之副俱不可専任也在本爻以隂變陽順而能正亦師不窮瀆之義也且師而至上放馬歸牛示天下以不復用武之時惟有封建諸侯分理民衆以擴容畜之心以𢎞厚德之載耳大君於此命彼萬邦羣后方今征誅之事已息治安之謀肇行公族之國於是開卿大夫之家將繼承焉丈人長子則必任弟子小人則勿用為君者選擇賢良而宣德布惠為臣者保守寵命而輔世長民務為勝殘去殺久安長治之計險雖設而不恃衆惟保以永懷斯能弭亂消兵德盛化神而師常寓於農矣此方為水行地中地能容畜乎水聖人修文德而不廢武備所以雖言師而不尚師也於上之一爻不尤深明其訓哉用小人必首及於除君子以污朝廷次及於致亂亡以危社稷禍終及小人之身小人之被用必先言利次言刑次言兵言利則財聚民散人心不服故言刑以督責之而民愈無所措手足再有開疆展界之計搆禍啓釁之為而內離外叛不可復救覆轍固前後相繼也𧰼傳曰大君有命以正功謂功成而善守則功得正矣小人勿用必亂邦恐功已成邦已定而小人復亂也故以必亂決言之以示戒於師之終焉以上外卦三爻坤體以五爻柔順中正主之變坎知險故知人善任歸成功於修德凝道也四之左次行師隂道之常上則功成業就而天命人心胥和矣以此開國承家可以終師而太平矣但勿輕用小人因師之外卦隂體為師創業垂統計者深矣然合觀六爻何非師期無師之㫖乎大易通解卷二
