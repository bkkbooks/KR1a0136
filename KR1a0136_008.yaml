body:
  text: 大易通解卷八江常鎮道魏荔彤撰離下巽上家人家人睽二卦相綜四陽二隂之卦隂少貴隂根于坤也家人繼大壯其象義若何大壯用隂則不用壯而用罔罔之為道似直之反其實所以善行直道者用罔也于國與天下且無不宜况家人乎家人以仁勝義以情勝理而又必用直道然非用罔以為直道則義勝于仁理勝于情非宜其家人之道矣此家人所以繼大壯之用罔主乎隂以濟乎陽必言有物行有恆皆用罔也觀于彖辭利女貞三字思過半矣不止謂內外卦皆二女為隂已也論卦變推睽卦之例謂變自大畜來則此卦變自無妄來以無妄外卦四爻之陽下行于三以內卦三爻之隂上行于四則無妄變家人洵得變卦之義象也無妄之茂對時育萬物何非自言有物行有恆始乎言有物行有恆修身也而天地時物莫能外矣本諸身而教于家乃聖人功能之權輿也家人為卦以上巽下離相合亦二女同居也長女在上中女在下與睽之中女在上少女在下似無異家人則合睽則違焉何也雜卦言之矣家人內也睽外也家人之離明在內卦暌之離明在外卦三女隂卦以離為中女又以離之中爻為坤之元所以順承乎天者也以坤元而得中為明乃地道妻道之正也所以在內為主則合為家人在外而不得為主則睽矣均二女同居而家人不言志不同行者家人之二女有一志可同行者則不相睽而合矣此家人所以根乎坤蓋得乎坤元而貴隂有自來焉卦象自無妄來有據乎此乃以四隂二陽之卦相序而明其變也彖傳未言卦雙亦不敢強為之傅會然無妄之象傳與本卦象傳有相應之義即據此言變亦可况本卦三四二爻亦有合于變象詳本爻下亦似有可據也家人利女貞彖辭云家人利女貞因內外卦皆隂女之體象也女順乎男者也故女貞為家人之利尤切焉且女之所以能宜家者必觀型于男正身以為齊家之本不言而可喻矣彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣彖傳釋卦名象曰家人言利女貞女止位于內也言位未有不本于德者德足以立乎其位豈止于朝廷乎即閨幃亦然長幼尊卑各有其位各有其分義德足以立之而位正矣此家人之利貞貞即正也得其正合乎利貞之辭矣然非男之德足以正位于外男之貞足以正乎其德女亦何由能正乎故必男正位乎外而女之位方正男陽也本乎天女隂也本乎地男女德立位正而天地之大義俱正矣夫身修而妻知所隨妻德賢而夫獲其助如天之統天而資始坤之順承乎天而資生其餘三男三女無有不本于乾坤大正之義以各盡其義者此男女一正而無不正之道也其義既本于天地即可通于君臣矣家人亦有嚴君焉父母之謂也能孝能敬又如男女六子根于乾坤各效其能于天地以共成大化者也推之于日用倫常凡一家之男女由父子而夫婦而兄弟各盡其為父為子為兄為弟為夫為婦之道家之道遂各正矣既各正其道又各為一家之道無不正家正而國與天下亦各得其道而大定矣不言正而言定由于正身者正家身家得正以此正者定之也國與天下之人不能自正君子以其正者定之使各正也故變正而言定焉天下定而位天地育萬物皆自此極其功能不外聖人之一心一身耳似與物與旡妄之原一盡性而人物之性無不盡極之於為時為物亦不外乎有物有則秉彝攸同而已合之象傳變自旡妄不為臆説矣火為風之本也家之教嚴明如火而風行于國天下矣象曰風自火出家人君子以言有物而行有恆象傳曰風自火出家人重家人之離卦在內也上之所行謂之風下之所習謂之俗渾而言之為風俗風俗之善惡行乎外教化之本原由于內國與天下之風非自家出奚本乎聖人明其所自出而家為國與天下之本身心為天下國家之本昭然矣君子體此知言行為正心誠意以修身所見端也言必有物根于天命之性有物有則者也行必有恆根于率性之道須臾不離者也此君子自修之實學耳而家正于是國與天下定于是甚矣言行為君子之樞機所以動天地者也所以君子觀于天地之大義于言行不敢苟焉已也言有物行有恆立誠之道全乎無妄之本然者也君子蓋從物與無妄本原處勘明故誠以成已兼成物皆本一誠之理以通天地也四時萬物不過一誠之所統即乾元之統天也故聖人之體乾至誠不息必自君子之自強不息始此君子言行之極致也至于風自火出之義家教嚴明猶火之用也火之體則正家之一心耳心為君火如日之照物正是離卦本象此火為風之由生也初九間有家悔亡象曰間有家志未變也初九變漸之初六在漸初以隂變陽為家人初漸于干未能習而安焉故厲有言以教之者無咎兼家人間家之義也在本爻以陽變隂為漸繫之以間有家亦初習于家教而能慎于防間者也故悔亡象傳曰志未變也就初言幼而受教得成則長亦不能變貴于初教亦有漸進之象焉六二無攸遂在中饋貞吉象曰六二之吉順以巽也六二變為大畜之九二在大畜之二以陽變隂為家人繫以輿説輹大以為畜則不可輕進也陽變隂而中虛不能畜故如輿之説輹矣然二居中得乎中道中虛所以為畜𢎞量也故傳言無尤焉在本爻以隂變陽為大畜繫以無攸遂在中饋貞吉者此爻主乎本卦離在內而得中以坤元為離明合一家之正道為家人者也變大畜以隂變陽恐其主乎一家則牝雞之戒宜明也所以示之無所往而可以自遂惟在中饋以主內政合乎卦辭之利女貞吉斯得矣卦未繫吉者利貞方得吉于主爻補示之象傳曰六二之吉順以巽也順者指離二之中爻本于坤也順乎巽即順乎外也合風火為卦以巽為外象即以巽為男陽也巽隂而在家人為外卦象以主外焉易不可為典要惟變所適也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也九三變為益之六三在益之三以隂變陽為家人繫以益用凶事使之從戎克敵亦皆益也貴于重大其事內必以中行在心為有孚外必告先公用圭以昭敬則民受益亦嚴慎為本之義也在本爻以陽變隂為益家人之心以教為切家人嗃嗃多言之象雖悔而厲然吉道也倘不樂于嗃嗃而全無教訓以致于婦子嘻嘻則家道未為正而終吝矣象曰嗃嗃雖多言以嚴則未失正也婦子嘻嘻失家教之節謂不得正矣家為教化之始尚嚴不尚寬至和之中必有節焉禮也不然知和而和不以禮節之何和乎象言節即以禮節和耳本爻自無妄來外卦乾下爻之陽下于三位變離而剛明故嚴厲而多言即以下爻論貞悔震動而明亦嚴厲之象義也以上內卦三爻離明之體德以二爻主內卦在中饋婦人主內之正也初附二成離所以間有家變艮而知止為間也三附二而以嚴治家變震而為嚴厲也此皆家教之所以成也六四富家大吉象曰富家大吉順在位也六四變為同人之九四在同人之四以陽變隂為家人推家人之義于同人雖未同而乘墉弗攻以太和為化于同人也故吉在本爻以隂變陽為同人兼同人義以同人為富不獨以家為富此所以有富家大吉之辭也象傳曰富家大吉順在位也明本卦巽順之德能以同人之富上順乎五誠格神人之君以順應誠順亦誠也此所以忘其家而成富家之大吉者也本爻自無妄來內卦震上爻之隂上于四位變巽所以云順在位也本動而變巽為順于五剛健中正之君位也九五王假有家勿恤吉象曰王假有家交相愛也九五變為賁之六五在賁之五以隂變陽為家人以止變進有束帛賁于丘園之象巽于賢以止于善者正其位也在本爻以隂變隂為賁以進變止得誠之至善而止之也故能假乎有家之臣視一國如一家也勿恤者戒之以勿恤于王之家即以一國天下臣民之家為家吉之道也亦就推一心之誠以正一國定天下言即無妄之合人已以為盡性也象傳曰交相愛正謂四以順在位為富家五以假有家之卿大夫而勿自恤其家則上以假臣為心下以富君為心交相愛即泰交之道所謂其志同也交泰之道寧止于君臣交愛其家乎然言家者就家人卦名其義也愛其家正是愛各齊其家之身也正是交愛其正家之心也仍是其志相同其德相孚而後恩與義相維也家人言及此合國與天下以言正家其義愈明矣上九有孚威如終吉象曰威如之吉反身之謂也上九變為既濟之上六在既濟上爻以隂變陽為家人有濡首之厲方出險而變巽乃既濟而侈然更思進此濡首之自來也本爻以陽變隂為既濟亦恐巽進而變險阻仍以巽進則懦弱不克正家于終矣故戒之以有孚威如終吉有孚者誠身也正家之本也威如者威儀之見于外為刑于寡妻宜于兄弟之本也翕兄弟宜室家樂妻孥順父母無不本于此有誠而共孚者家人所以終吉也象傳謂反身大哉聖言于大學首章曰自天子以至于庶人一是皆以修身為本此家人之終聖人垂戒凡有身家者也可不凛凛以上外卦三爻巽體以四為主爻富家大吉之辭為一隂主一陽以成家順五之在位而成富也五則附四王假于臣交相為愛上則正家之終有孚威如孚者陽也亦附于四隂以相乎也是外卦主巽合離明以成卦之象義也再內外卦以二四兩爻分主成卦無通主一卦之爻上九之終吉歸之反身修身正家言家人于卦終明其道也是以主卦不妨二四分主以明男女內外交修其身之義象焉由睽之象傳火動而上澤動而下推言家人則睽之上下不交以相疑也家人之風動而下火動而上上下之交以相益也相疑為睽是以相益由于相孚則自君子之言有物行有恆為之主也以至于家人之終吉亦不外于有孚此誠身之學為正家定天下之本也卦辭云利女貞女之正道順也家人之女以明為體而自坤順來順以巽二爻之象言之矣順乎外卦之巽即所謂貞也此家人之女貞即家人之男所以正乎家定乎天下之道也至于二女同居志亦同行則以離中女之賢明主乎內縱有他女在外亦聽此中女為政而巽順以從之矣此又二女相交相益以誠之象義也與睽有間矣兑下離上睽家人繼大壯睽則繼遁矣遁必全身逺害早離小人睽而不合不樂于合乎不正也君子小人不和如二女同居其志不同行焉得不遁而睽之以為守正之道乎所以用隂主隂者遁固不觸世忌以不自居德取名也故睽在君子必與小人有外同而內異之志存焉此睽必主隂也即久睽終合亦以隂道轉陽方得合耳是雖主隂而待陽以和又為根坤而統于乾之象義矣睽綜家人同四陽二隂隂主貴隂根于坤也以卦變言則來自大畜也大畜外卦艮之下爻一隂與內卦乾之上爻一陽相易而成睽如家人之卦變自無妄來三四兩爻居中相易也其大畜之象傳與睽之象傳亦類于家人與無妄有合焉大畜之象傳曰多識前言往行以畜其德睽之象傳曰以同而異蓋多識則異而畜德則同二女同居其志不同行志不同者私心也其性則一而理則同也以此異而睽者可以同而合亦在于各敦其德而已此畜德之所以合睽也雜卦傳云睽外也何謂乎蓋家人睽二卦以離主之而離以中隂主之所以為明也明在內則隂道也明在外則陽道也明在外多見人之非而不見已之非明在內則見已之非而方知人之是也家人所以合者嚴治于已而寬待乎人也躬自厚而薄責于人也皆用明于內之象義也明在外反乎是而成睽家國天下無不出于此也此家人與睽離合之本同異也苟能知其同而致異之故則必能主乎以同化異異而歸于大同之道矣非畜德何以能使異者皆同非多識前言往行何以明其理而畜其德乎由此言之睽之變自大畜確矣至于睽之象傳有二女同居志不同行之訓者睽之二女明者在外不與家政少女苟以為悅者在內主政也同于泰否之君子在外小人在內相反而成之象也女德亦有貞淫邪正家人睽寧不同于泰否乎君子于此亦必有和家人而合睽之道矣其主乎坤者用離中爻之明德以坤為元也睽小事吉彖辭曰睽小事吉既睽矣何事可言吉哉此象傳同而異之所本也蓋睽雖不合而分中可以見合不分則無以見合天下事理皆如此如倫常至大者五不五無以見一即一倫之中宜分者正不知凡幾不知其分何以能安其分而得合乎况萬事萬物來相嘗焉我以一心應之百行成敗皆在是矣必以分見合方于所謂一者知明處當理得而心安心安而睽者無不合也睽之小事吉言其分也睽既離異而不能得其合則姑就其分之一端以盡其一身之宜為或一事之當理以此推之自一身而外人各盡其分之宜為事各求其理之得當則合分以為一合小以成大矣小事吉者為萬殊言也大事亦必吉矣為一本言也萬殊之異不得不異也人情也一本之同也未嘗不同也天理也得其一本而民胞物與之量𢎞矣盡倫盡物之道大矣一篇西銘説不盡者小事吉一言蔽之矣由此而位天地育萬物亦自此一言推廣之所謂其次致曲曲能有誠則明著動變而幾于化矣惟天下至誠為能化與家人之君子言物行恆皆一心一身一事一物以為造端其功能遂不可限量也聖人之學一言之微關乎聖德王功天地萬物豈可以尋常為測識乎是睽之君子以同而異謹小慎微至嚴密之心學也彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉象傳釋卦名義曰睽之為卦合火澤而成火則炎上也澤則潤下也上下各自為動而不相合此觀氣化于天地見睽之象義也然火愈炎而澤竭矣澤愈潤而火滅矣火澤互相侵害其義象更難得合如二女同居其志不相得也此睽之成于人事本于人心近起于家而逺行于國天下者也且女禍之烈比宦寺僉壬更甚者以易于狎玩難于除改者也然卦辭何云小事吉乎則有德以為合睽之故也女之説者若以麗乎明是受保姆之教刑聖善之儀者也俾柔之自大畜來者內卦三爻之隂進而上行歸于四位則四爻之陽仍歸于下卦之三位而為大畜使離明之體所謂中爻之隂本乎坤元者得乎卦之中正以應于下卦乾二之剛則大畜變為睽以大畜成疑而致睽者睽之疑釋而大畜之德日新矣是以云小事吉也小隂也隂安其位而得中以應陽隂小之道吉女貞之利得也亦同于家人女正乎其內男正乎其外也家人先言女而後言男此則先言小事而陽男之大事無不吉從家人正家而天下定推之其義自見矣然後知小事之睽大事未嘗不同也事有睽而理則一也志不同而性則一也如天地之分為睽然隂陽相交生成萬物是資始資生雖分而坤元統于乾元同之至也男女分為二而相交以生人啓家道正天下亦因其志相通為一而無不同也言志不同者二女隂不交隂言志同者以下卦上爻之隂與上卦下爻之陽相交而得同也推而至于萬物雖無不分而為睽然類聚羣分二者無不合而為一也是睽之為義似分似小然言事必有理以主之言物必有則以主之何嘗不一而大哉隂陽二者睽也在天成象在地成形本天親上本地親下乾道成男坤道成女此萬事萬物之二大類也然陽無隂不生隂無陽不成一隂一陽之謂道二大類皆歸于一而已矣然則天地今古萬事萬物何一不為睽之時用乎睽一時之義如此而亘古如斯也是睽之時用誠合髙深廣逺以為大也乎聖人之心無一時不一而萬事萬物無不自聖心化裁焉古今道理無不自聖心立凖焉此聖心以合為睽以睽歸合之象義也學者須從忠恕求一貫亦各盡其忠各行其恕之謂也即學者之忠恕也卦辭小事吉各盡忠恕小事也至于合異為同一以貫之矣象曰上火下澤睽君子以同而異象傳曰上火下澤睽君子以同而異同而異者以其至同而知其至異也知其至異所以睽卦繫以小事吉之辭也知其異本于同所以彖傳云天地睽而事同男女睽而志通萬事睽而事類也此孔聖釋文王小事吉也異者小事而以同而知異則異之小乃本于同之大也象傳又有一義在于同中辨異如父慈子孝兄友弟恭夫和婦順皆同中之異也即一孝慈友恭和順也無不同也而其中隨時隨人隨遇又各有不同焉非以同而異者為同則異而不能同矣惟知其異而各盡其時措之宜斯能合乎大中至正天命率性之大同也然則異者皆小事也得其宜則吉也至于合異為同之大事無不合宜非聖人之時中不能也家人之自無妄來以無妄之誠為合也睽之自大畜來以大畜生疑而睽也故家人爻辭言誠言交而睽爻辭多言疑言不能交交則合疑則睽耳再詳家人睽之分合更有妙理存卦象中家人下卦初陽與二隂相交易而離成巽以上卦之四隂爻與五陽爻交易而巽成離矣上下卦各以隂陽二爻相易則內外風火二卦亦交易矣所以家人以交而合也本卦若以九二與六三交易則兊成離以六五與上九交易則離成兊內外卦之隂陽爻交易亦各成一火澤睽也此所以為睽而不合乎至于畜之日久或生疑焉在人在己皆有之疑者不合之本也釋其疑而暌者合此又為尋常用易者立訓也初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也初九變為未濟之初六在未濟之初以隂變陽為睽險之初而悅以忘險濡尾之吝宜矣本爻以陽變隂為未濟悅變險似有悔心矣然能慮則悔可亡也雖有喪馬然勿逐自復不必外求也外求睽而不得內守則自復來矣如此自守雖見惡人無咎蓋睽之不合者皆人與我相惡也既睽而姑不與合焉何咎乎象曰見惡人以辟咎也見矣何以辟咎見而逺之不與親近則咎可辟矣此以睽為守而不必苟悅求和之義象也九二遇主于巷無咎象曰遇主于巷未失道也九二變隨之六二在隨二以隂變陽為睽以睽而不知所隨如係小子則失丈夫當于睽隨之間知所擇也在本爻以陽變隂為隨亦必知所遇合矣遇主于巷巷狹路也至此則不容辟而不得不遇也是睽之時亦有不容不遇之主也外合于五求合乎睽無咎之道也象傳以為未失道蓋守道以待遇道也然遇主于巷趨而避之泄栁申詳之行聖人不取也惟遇之以合睽道在是矣此爻以合睽為義象也六三見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也六三變大有之九三在大有三爻以陽變隂為睽有亨于天子之象云小人弗克者大有之有不自有以所有亨于天子君子能為小人不能也蓋君子以至誠求合小人則參以私意何能合睽乎在本爻以隂變陽為大有繫以輿曳牛掣者有之多而載之重也然隂柔不能求合外陽又睽而不與之合則其人天且劓之矣雖然隂陽有交遇之理無初有終終或遲遲而得合不致終睽亦可免獲咎焉以其變兑為乾有陽剛之德故誠能合暌得中吉也象傳曰位不當也位在內卦之終與外切近故其輿之重載人得而見之所以生人之疑而遭禍也然無初有終恱變為健自當有初睽終合之道以免咎此所以終合乎睽也此爻以誠為合睽之道不專言貨利誠敬之心乃合睽之要者也所以釋疑者此耳以上內卦三爻兊恱之體德以三爻為主爻主內卦之悅以合離明也初不求外合而自守乃不苟悅合睽之本也二以隂柔中正附于三即恱于遇主也三則以一隂臨二陽陽實取象輿曳牛掣以致天劓能有終者兊以隂變陽于內卦之終以合外卦之離成大有也是三主內卦以初二兩爻附之也九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也九四變為損之六四在損四以陽變隂為睽離明變艮止矣止則將合故不惟損疾而且有喜是損若以損疾似睽于五然無欺而犯之志可嘉喜也何咎乎在本爻以陽變隂為損繫以睽孤者上五下三二隂夾之俱不能交故為孤也然亦必有一遇為正遇元夫而交孚焉元夫者五爻也交孚者四五二爻相交易斯得中孚之卦也厲而無咎者恐上九之見疑也象傳曰交孚無咎志行也志即不同行之志至四而交孚則志可同行可見志縱不同惟心之誠足以同之也四為五隂所麗之陽藉以成離體得明者也交于隂而共明其志足以釋人之疑所以志同行矣志在誠已行則信于人矣此爻以交孚為合睽者也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也六五變為履之九五在履五以陽變隂為睽睽于履而致其夬無調劑隂陽之術恃剛強以為動故雖貞而厲也履睽必從容以求合非致夬可以遂非也在本爻以隂變陽為睽行禮以合睽者也隂柔文明更能剛健中正以合睽悔所以亡也雖有多疑之人近在厥宗然有噬膚至切痛癢相關立意以往合焉何咎之有乎自足以交合之而共信也象傳曰厥宗噬膚往有慶也言具此胞與之心往而交物焉必有合睽之慶矣上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上九變為歸妹上六歸妹上六隂變陽為睽婚媾之終而變睽睽而未可合故士女兩失宜而虛情必難信也何攸利乎本爻以陽變隂為歸妹睽之極失明之體成悅之用離合亦不能自決且生疑于下矣故曰睽孤孤立于上之象疑心所見以虛為實豕負塗而車載鬼何一非生于睽孤之心乎於是先張弧後説弧訖無定主矣主見者不定行之進退遂莫知所從焉然疑之生也以不誠也誠則自無疑矣有恃明而以孤亢之心待下則下以驚懼而不交矣若以明而恱乎下則匪為冦也為婚媾也必交孚而疑釋如天之亢陽而得雨也所以遇雨則吉何所取于雨乎上卦火變為雷與下卦之澤合為一矣故為雨而和氣布于內外也惟其變震所以有此義象誰謂不參看貞悔卦爻而可得解乎象傳曰遇雨之吉羣疑亡也炎上者潤下矣其交合不終睽矣于是以釋疑該盡通卦焉以上外卦三爻離體也以五爻主卦能以文明中正者變乾元之以仁長人厥宗皆有毛裏痛切之愛往以合睽有慶必矣四則附五以交孚上則附五而婚媾皆合睽之象義也四以變艮故以止存貞女而遇元夫上以變震故始疑而張弧終信而遇雨隂陽和而水火成既濟矣何睽不合哉內外卦雖以三五二爻分主然五之筮膚仁能及物所以合睽且明以為止有各明其分以為合合不致瀆之道又為通卦之主爻也艮下坎上蹇蹇解二卦主陽根乾乃繼明夷而為蹇也明夷之明傷而入地則水山之間皆增其蹇君子行道更難得濟矣然明夷貴以天陽助日陽返類為晉蹇則貴以陽開隂乎蹇亦如晉明夷之反類而可以成解也此蹇所以繼明夷也蹇解二卦相綜四隂二陽陽少貴陽根于乾也乃自上經四隂二陽屯蒙二卦變來蒙變蹇蹇不從卦之爻變來而從卦之內外卦變蒙之內水外山變為外水內山是以謂之自蒙變來于象傳有所據焉蒙之象傳曰山下出泉蒙君子以果行育德蹇之象傳曰山上有水蹇君子以反身修德山下出泉則利于疏導其智慧而兼教育乎英才山上有險阻在外非可遽化反身修德自為感孚蒙以教言蹇以化言蒙以教近蹇以化逺蒙以人已兼修教學相長為義蹇以篤修于已推行有漸為義有德有位有德無位及凡占者俱以反身修德為叶蹇之體德也險在外止于內望險而止蹇也即欲不止冒險以濟無以濟險開阻仍蹇而不能行也必有陽健之德內足以奮發有為以勵苟止之私外足以開濟艱虞以善平險之計此卦所以重艮上一陽爻而尤以坎中一陽爻為一卦之主爻也卦既與蒙上下卦相交易而成蒙之九二包蒙納婦子能克家一卦之主也變易為蹇仍以九五為主爻是蹇之變自蒙也于象傳猶隱于卦體甚顯切矣玩之自得且蹇解二彖傳俱不言剛柔進退上下是不以爻變為變而以卦交易為變亦可推而知焉况五之為利見之大人往而濟蹇有功當位貞吉以正邦國固為蹇立剛健中正之則以為開成之道矣奚再疑乎蹇利西南不利東北利見大人貞吉彖辭曰蹇利西南不利東此東北艮之本位山也西南坤之本位土也卦無坤體何以利西南山上之水必歸于地水由地中險阻自消此天地之險阻也若乎人事則西南坤卦之德順也東北艮卦之德止也求其無蹇于行惟有順乎柔順中正之德而利牝馬之貞則行地無疆矣若止而不行則終蹇矣所以有利西南不利東北之辭也此蹇之同於坤卦辭也利見大人又何謂也凡蹇而不能行者德固不足而或亦有有德無位所謂在下位雖善弗尊弗尊弗信弗信民弗從也利見有德有位之大人陳謨就烈則可以通行無阻矣然欲利見大人非有自反克修之德何以格君心成大業以平險阻利攸往乎又必貞吉者有其德而有其位以此利蹇有其德而無其位亦以此利見大人以利蹇即占者一身一家之事亦槩恃乎此貞以利蹇而吉可推矣所謂貞者不外于順地之道順水之性以行所無事耳是內卦之止德亦暫止而不輕進非畫然以為止矣彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉彖傳釋卦名義先言不可輕進以明止德蓋卦辭但云利于行而未言利于止故孔聖于傳明之蹇者水山相值山外又有水艱難之時事也險在前不可測既見險不可不止見險能止非知者何能乎是處蹇固貴于能止乎此知者之事也然豈苟安于止聽斯時斯事之終蹇哉又非仁者之心矣故必利于順西南之坤德能以靜為知而能止者即能動為仁以往濟何也往而得中雖蹇不能阻矣所謂靜有常者西南坤方有主利之往而動不括者非得乎中道烏能隨時制宜以合于仁乎中何所指指外坎之九五以陽剛中正之德得尊位也以此中道雖如牝馬之行地無疆實為乾之乘龍御天而雲行雨施天下和平也如不以西南為利而以東北之止德為尚則其道以自止而窮矣西南坤地土也東北艮山亦土也土之剛而髙者非順道也土之柔而卑者大順之道也蹇之時事內以中為體外以柔順而卑牧者為用何時何事不大通乎至于利見大人不過借其遇合以行吾德教原期有功于社稷民生非為一身一家之謀此又濟世利物所推亦仁量之所暨也况蹇之九五有當位中正之德位而得以貞處蹇之道以此正邦凡蹇而難者皆平順通達矣蹇之時雖艱難而用以化蹇為平開塞為通之道則甚大也以剛健之乾為體以柔順之坤為用是蹇之體已通于天地矣可不謂之大乎象曰山上有水蹇君子以反身修德象傳曰山上有水蹇君子以反身修德是象傳又補一義也謂蹇有至難平者雖欲通之終不易有功而得正也則非知之可計力之可用也反身修德德既純于內蹇自消于外由近以及逺由易以及難由小以及大以一心之易簡為健順天地萬物無不位者位而育者育矣無論有知之民物無不感化即無知之山川草木亦未有不暢遂奠安于聖人之世也此君子反身修德守約而博也初六往蹇來譽象曰往蹇來譽宜待也初六變為既濟之初九在既濟之初以陽變隂為蹇有曳其輪濡其尾以明為止不肯輕進之象義也故無咎在本爻以隂變陽為既濟在蹇之初變明知險故往蹇而反得譽亦以不輕往得譽也不輕往者正思化蹇之方耳象傳曰宜待也修身者居易以俟命之謂也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也六二變井之九二在井二爻以陽變隂為蹇巽變艮木不能入實土而上水井為谷矣然猶泥中有水故有鮒可射偶有汲者其甕敝漏升乎甕中仍漏水歸井古之汲者以瓶即甕也皆不能得井養為利之象義也兼蹇故如此艱難耳在本爻以隂變陽為井何以繫之以王臣蹇蹇二當臣位非不知險在前難于濟然蹇而又蹇進而不肯自止者王事靡盬不遑寧處也豈以一身之故而畏難苟安乎初可以暫止而徐圖以在下也二則必忘身以殉蹇應九五而位臣位也時位不同故其象義亦有各盡之道焉象傳曰終無尤也赴公而忘私事君以致身雖蹇未必即平其忠誠亦可嘉矣何尤乎象又為人臣託言時事艱難以自便者立訓也王臣蹇蹇豈成敗利鈍必算無遺策乎歸于鞠躬盡瘁而已武侯六出祁山無功蜀卒以亡今古何人不嘉許之哉此無尤之昭然者也九三往蹇來反象曰往蹇來反內喜之也九三變為比之六三在比之三以隂變陽為蹇憚于艱難為進不利見九五之大人而苟安以比匪人所以占凶在本爻以陽變隂為比亦有止于進而戀戀二隂顧私忘公之意繫以往蹇而忽來反是雖知險為止而心不可問矣三臨外卦蹇險切矣不思進以圖功反以退為得計象傳名之曰內喜之也如見其肺肝矣世有一種善于觀望時事之人內謀有定外反作欲往之狀及少遇蹇險即退避矣乃曰余固願往而蹇不可進也反而自便臣力竭矣抑知聖人早已懸照于千古之上用誅心之筆以傳易即作春秋之正義也則凡遇時事艱虞內喜乎反外飾于往以欺人者可以觀此爻傳而膽寒矣外卦三爻在艮原有止而不進之義象初以暫止而許其有待三以蹇蹇為進而嘉其無尤三以臨蹇畏避而誅其心此蹇之開平用順以為往非用止以為反也明矣再繹三爻艮止之體德當蹇則必進而濟蹇九三一爻為內卦主爻往蹇不能濟來反者欲邀二隂同進以平蹇也故傳言內喜之也喜內多同志進以濟蹇耳初在下不能濟蹇然往蹇不如修身俟命之得譽二則蹇蹇而盡王臣之事固應九五然從三爻以進亦從本艮主爻也此為正義象前假之説姑存為另一義可耳六四往蹇來連象曰往蹇來連當位實也六四變為咸之九四在咸四以陽變隂為蹇兊恱化坎險慮險而有憧憧之念必貞吉而後可感人自不致于衆念紛至如朋之相從則爾之思或可正已而喻人耳所以能貞吉方悔亡也在本爻以隂變陽為咸是當蹇世而開誠布公聚合羣力以平濟艱阻者險變兊之象也于是下卦之三爻皆從而來合心同力以有為於蹇之時事矣繫之以往蹇來連一念至誠往以通蹇而來者連接向上共成五爻大蹇朋來之象矣象傳曰當位實也正指九五陽剛中正具陽實之德而當位為宜利見之大人一卦之爻皆宜依附之上下合心力則功成邦正焉觀此爻象則一卦之爻象皆相貫通也若止言乘承比應亦尚未盡九五大蹇朋來象曰大蹇朋來以中節也九五變為謙之六五在謙五以隂變陽為蹇有不富以其鄰之辭以鄰為富即大蹇之朋來也至于利用侵伐無不利謙而仍有蹇焉則不得不反乎謙之輕而尚威德也亦合變卦以明謙也在本爻以陽變隂為謙繫之以大蹇朋來合全卦之爻衆策羣力以協乎中正之德為開艱難平險阻之計功以此成邦以此正何非本于五之陽剛中正以乾元為體變謙以坤元為用者濟之乎此所以主乎蹇而為利見之大人也取象五之變坤則利西南之卦辭亦有切合之義矣上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也上六變為漸之上九在漸上以陽變隂為蹇處蹇之終以其毛羽用于宗廟朝廷之大事明德稱乎髙位而儀型于百寮之上也故吉在本爻以隂變陽為漸處蹇之極其身雖不在其位也其德則裕乎其極也往以蹇而阻者來以碩而𢎞大繫之吉由于上之貞而正也以此德利見當位之大人輔其君長其民成其功止其邦此乃聖賢在師傅之位如伊尹太公其人也然亦必賴乎有德有位之九五方可共濟時艱而開立大業也觀此爻知全卦歸于九五之陽剛中正以平蹇矣象傳曰往蹇來碩志在內也身雖不在君臣之位而心則依中正之君也利見大人以從貴也貴貴在上而尊賢在五此貴貴尊賢為同一義之道也孟子曰大有為之君必有不召之臣上爻之謂也有師傳之德以匡扶之有羣材之力以贊襄之九五又自有陽剛中正之德足以大行無阻矣况以君而用臣之德為德用臣之才為才君道天道也以臣道地道為用亦即利西南之坤順也亦即不利東北之崇髙剛亢之氣象也彖辭無不統貫之矣碩實也大也陽也即碩德也碩果不食中有仁焉以為復之本此仁即乾元也在人心則仁也程子曰果核中有仁生氣之所存也天地之大德曰生孰有大于此誠于此者乎以上外卦三爻坎體坎險遇山而蹇山盡水平則無蹇矣四在外卦之初連內卦三爻附九五之陽剛中正以此平蹇何不濟乎上則以碩德為師傅亦附五平蹇者也四上夾五為坎五為一卦主爻賴以平蹇有德有位者也不止主外卦而已坎下震上解解根乾而繼晉之卦也晉日懸地上以日之火加地則地中之陽氣上升為雷又必携地中之隂氣上升者復下降而為雨矣雷水解卦成而陽氣上下往來開通暢遂之象義也且晉之人事明君在上萬事開濟既無艱難險阻矣君子賢人竭忠盡智又得人君推誠置腹上下之間無詐無虞即有艱難無不平即有險阻無不通也是皆繼乎解以用陽主陽之象義也解蹇相綜四隂二陽陽少貴陽根于乾而變自屯也屯以水雷成卦上下卦變易而成雷水解亦以卦變為變也且亦有所取于象傳屯象曰雲雷屯君子以經綸解象曰雷雨作解君子以赦過宥罪雲雷者雷之自地起者為雲雲之自天降者為雨當屯時君子之經綸正使天地之氣以相通而得和自致雲行雨施品物咸亨之效耳于屯已詳言之謂經綸之者俾隂陽相交于上下得其條理也至解而雷起于地雲行于天雨已作矣天地之氣氤氲渾沌者至此而解矣是隂陽既和雨澤既降之候君子以赦過宥罪因天地之和氣布寬大之新恩所以應天道于人事也聖人于氣之屯塞者則通之而非使其渙散也經綸者各致其條理以交際為通也于氣之開解者則畜之而必使其隆厚也赦宥者廣達其生意以養育為畜也是王道本乎聖德而聖德合乎天道皆出于自然無假私意安排者此解之所以變自屯乎蒙教之始也變而為蹇教化之不行則反身修德以敦教之本屯飬之開也變而為解下民居食初遂則赦過宥罪以廣裕養之方是四卦確有源流非憑臆説也至于根乾在蒙固以內坎之九二為卦主及變易上下卦而成蹇仍以外坎之九五為卦主也在屯固以內震之初九為卦主及變上下卦而成解仍以外震之九四為卦主也二卦彖傳皆不言變而于爻辭繫之甚明矣蒙之二曰子克家蒙而成教于家者也蹇之五曰大蹇朋來蹇而克濟其難者也屯之初曰磐桓利居貞利建侯同于卦辭屯所以始開也解之九四解而拇朋至斯孚四在上卦而曰拇震之下爻為陽之初即彖辭之其來復也亦有合于卦辭四卦互變以此四爻辭觀之曉然矣解利西南無所往其來復吉有攸往夙吉彖辭曰解利西南無所往其來復吉有攸往夙吉蹇之利西南取坤之順以平蹇之難也解亦云利西南何也亦利坤之順以濟坎之險也蹇之為難在水解之為險亦在水得坤土以維之水由地中不成險矣險消而蹇以是平解亦以是得解上聲也然蹇險在外山在內利于止而不可安于止故通卦用陽之剛健為體以坤之柔順為用然後可出險也解之險在內動在外險已出而不可亂動故通卦亦用陽之剛健為體亦以坤之靜順為用然後可成解也此二卦根乾俱以西南為利為用實以乾元為體而已所以蹇繫以利見大人不安所止也解繫以無所往不急于動也其來復吉俟震陽之足而自動則解矣遂有攸往矣不必先有欲速之心助長之力也又戒以夙吉陽非可以遽期于充暢亦惟培養之久盛滿之極自然流動非優悠涵藴保合太和則地下之雷聲不易發而春光之彌于宇宙不能驟致也復卦之震陽在初曰七日來復易知解卦之震陽在四曰其來復吉難知試思在內卦在外卦同一震同一下爻之陽即乾元統天者出于震為帝出乎震者也程子所謂于天言天于主之者言帝愚謂在天言元在震以元之發見者為帝也雖若不同而大有相合者矣故本卦四爻繫辭曰拇拇之名義亦可想見為在下之初陽矣以是立卦此解之所以為解矣在震卦之四爻亦以在上卦之初陽取雷之象義當參觀之自明彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉彖傳釋卦名義曰解者險而動內險而外動因外之震陽動免于內之坎險故曰解是陽已出于險動而有聲有光布散春和于天下矣震起于東北此乃先天之卦位也震出于東方後天之卦位也何以利西南反為往得衆乎此就説卦傳帝出乎震一節釋之最明震出巽齊至西南致役乎神萬物于此已盡得長養矣傳曰坤也者地也萬物皆致養焉何衆如之是震之陽天下雷行物與無妄者至坤而歸其責于地此後各正性命保合太和又于貞下起元七日來復成終成始于艮帝又將更出于震以至無終始也故于震之來復即知此陽在內在外在初在四皆為得中不必定在二在五而後言得中也蓋初四二五皆位也而陽之元則中也位無定而中有定于四初皆中也位有定而中又無定于二于五雖為中位亦有中不寄于是者則以中之中為中不以位之中為中也故四之象傳曰位不當也位不當而得中象傳已自釋彖傳矣此彖傳得中之義明之于此以見復之初解之四乃乾元之中寄于不中之位者亦可以得中論也譬之人事忠孝節義有正位而得中者有不正之位亦得中者統以中兼正而正未必盡合乎中中庸所以難能時中所以歸之聖人也以事參理以理會道自知人心之理世事之宜天地之化矣以此中者為往自有攸往矣夙吉者卦辭之所謂無所往也及來復之期至矣得中之道裕矣以此為攸往之本本于夙夜養育而成吉于未往之先則往而有功也必矣甚矣君子之行必有所本本立而道生此君子務本之學也再觀之天地當戰乾勞坎之時成終始于艮之候天地之氣靜存于無朕之中萬物以各正其性命保全乎太和之體覺天地萬物皆無聲無臭寂然不動也及子半之陽既足來復之機已兆于是由一陽之滋長至三陽而充盛奮然出地天地之氣向之閉塞藴窿者至此而泮渙開解矣雷動而上地之陽上升雨作而下天之隂下降百果草木向為屯者至此皆甲拆矣此解之時也雖解之時不過一瞬而萬古之時皆于此一瞬見其全體大用焉天地之化機萬物之生氣聖人之仁政學者之仁心無不于此發露開示矣其時洵大矣哉非聖人何能知之明切如是哉屯之字義如草木之萌牙屯于土中至解而百果草木皆甲拆解屯之變不愈確當哉蹇卦辭曰利西南不利東北就坤之隂方得乎順道以平蹇也解象辭惟言利西南解于東北養于西南故不言不利東北焉象曰雷雨作解君子以赦過宥罪象傳曰雷雨作解君子以赦過宥罪蓋體天道當春令本仁德以行王政也月令孟春之月命相布德和令行慶施惠下及兆民仲春之月命有司省囹圄去桎梏毋肆掠止獄訟季春之月田獵置罘羅網畢翳餧獸之藥毋出于九門皆隨陽令以達生意於民物以此為養陽于既盛之後必由于此夙吉者養陽于未出地之前聖人貴陽惟其體立所以用行蓋如此之靜順安和也靜為動本陽自隂生畜隂正所以培陽耳象傳所言于解與經綸有合見于中庸矣惟天下至誠為能經綸天下之大經又云肫肫其仁則經綸之仁推及于赦宥其一端耳向在屯為天下經綸養欲給求安居粒食矣仁何大且久哉至于親賢樂利君子小人當日聖德孰能忘乎萬世而遐永弗諼矣初六無咎象曰剛柔之際義無咎也初六變歸妹之初九在歸妹之初以陽變隂為解繫以歸妹以娣跛能履征吉者恱而在下如娣當解之春令可以婚媾為征吉隂貴之時賤可代貴跛亦能履之象也在本爻以隂變陽為歸妹居險之初安靜不動陽未足而養晦如處女無咎之道象傳曰剛柔之際義無咎也際者隂陽之間也泰之三爻象傳曰天地際也與此同義然泰三之際易明解初之際難明初在內卦下爻與何為際而分剛柔乎蓋從屯來謂二卦內外水雷雷水相交易初雖在解下卦初爻本無交接然在屯卦為四爻于內震卦正剛柔相際之位也雷之在下剛為柔所伏剛柔恰相際宜于隨陽雷動今在解雷已出地不與柔相際矣于是靜而為隂者宜安于下而不動矣正位與德相合時與義胥協者也所以象傳明為義無咎焉九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也九二變為豫之六二在豫二以隂變陽為解應解而豫不可終日雖在樂地無忘石之險阻也故以貞而得吉貞者不貪豫而求解也在本爻以陽變隂為豫以豫為解解陽之在坎中者向為飲食宴樂于需者也故可以從容暇豫待時而動有田獲三狐之象田之象見于二爻者屢矣乾之見龍在田無妄之不耕穫不災畬本爻之田獲三狐皆以二位為田而各取象義焉三狐即內卦之二隂不必定三隂方謂三狐得黃矢剛健而中正之德也二為內卦坎中之陽乾元也即勞乎坎而在坎中者也來復之正位一陽之初生也于此養之充盛至艮方漸以成終者為成始至震出于地而春滿三才矣故繫之以貞吉亦夙吉之義也細思乾元之陽勞乎坎者息于坎也故在坎之中已成終成始于艮者已成終而又將成始也故陽在艮之上至震陽反在下乃就震將出地象之也震出乎地故上有二隂爻此二隂爻即地也亦即艮下之二隂爻也在艮一陽已浮于上矣在震象之則仍伏于隂下也聖人畫卦之神妙出于自然之象槩如斯矣象傳曰九二貞吉以得中道陽得中于坎應動而動動而不可遏所以終始天地生育萬物者此氣也此理也即天地之理氣聖人則之以成聖德王功者也中之時義大矣哉彖傳言中愚謂就九四一陽言之觀二爻之彖傳言得中愚説不亦悖乎抑知正以遵彖傳而釋彖傳也九四之中非即九二之中乎坎中之陽非即震下之陽乎坎中之陽冬至之一陽生也震下之陽春分之三陽盛也四不當位傳言之矣言不中也而陽在則為中也况本坎中之陽至四而成發雷得解之陽為本卦之主爻是二象傳言中四象傳言位不當正言四之位雖不當而二之中道未嘗不在四也所謂中無定而位亦與為無定中有定而位亦與為有定貴中而不貴位天地古今來時位有定而道則無不寓有至不易者存也知此可與言中矣六三負且乘致冦至貞吝象曰負且乘亦可醜也自我致戎又誰咎也六三變為井之九三在井三以陽變隂為解有井泄不食之象清而不食仁者測然用汲享以王明而並受福為有其德而必有其遇者勸也亦見養陽于下久必自升而上也水陽氣也在井為養于下汲于王明受福則升而上矣在本爻以隂變陽為井繫以負且乘致冦至者三爻在本卦為內坎卦之上爻也乘于二爻之陽也抑知雷動陽升于上卦四爻之陽反乘之矣爻以隂為賤陽為貴今三本為負陽者反乘陽致陽起而反乘之如冦之至也貞而固焉必吝也豈能使負者久乘乎此亦無平不陂無往不復之義也因卦有來復之辭乃于三上下隂陽交際之間以明之也但貞吝所該者大矣負乘乘負亦如泰否之反類而已凡貞而固皆吝又寧止于解三爻之隂乎君子知此所以無入而不自得也象傳不過就六三之爻辭言其義負而乘可醜也負之者且乘之亦三自忘其隂賤而妄逞耳又誰咎乎爻辭不繫凶咎愚所以釋負乘就彖辭之來復言之也來復者泰否之反類乃隂陽氣化出入無疾也朋來無咎也天地無心何得何失乎即致冦亦作朋至反面觀不貞則不吝耳九四解而拇朋至斯孚象曰解而拇未當位也九四變為師之六四在師四以隂變陽為解變順靜為震動動而以順左次之象以順為師之柔道而用之也左次能退更得隂道可以解其兵禍矣在本爻為一卦之主爻變陽為隂為師動變為順是陽動于地其氣應之者如師之衆也故有解其拇朋至斯孚之辭陽震于始拇之象也一聲雷奮龍蛇蟄起草木甲坼朋至者盛矣于解拇尚不見陽氣感動天地萬物于天地萬物之陽俱動然後知此一拇之動雖微而所發者廣矣大矣此所以為孚也羣陽應震如人心之感無不孚也故出地之震得解而開泰也象傳曰未當位也言四之位雷在水上雷本在地中今在水上非其本位矣非其本位者出也出而漸至西南萬物得養至九月三隂漸盛又收聲息焰以入于地至坎方返而復其本位矣然則象傳言位不當者以先後天卦位言震出入反復之化機也即彖傳之其來復吉乃得中也之説也故論于卦爻陽在復之初者即在屯之初位者也今動而上升于四不當于復之位屯之位矣然主于本卦原為屯之初在下者升動而即在解四之上也位雖不當而陽之元在是中亦在是矣坎中之陽盛則震下之陽足震下之陽足則布化之陽行如人身少隂腎中陽盛則少陽膽木陽足而百􅎃舒暢矣少陽膽木之陽舒暢則四肢百骸五臟六腑之陽氣無不周流充滿而春溢于三十六宫矣人身之小即天地也以此卜四時之行順逆百物之生榮瘁焉故陽之統天以氣言之則天地人物之命也以理言之則天地人物之性也道于是乎神而誠于是乎存也觀易盡可自得已師之二即解之二解之二即解之四解之四即屯之初屯之初即復之初也如必以二五為中益之四何云中行乎六五君子維有解吉有孚于小人象曰君子有解小人退也六五變為困之九五在困五以陽變隂為解悅變為動困而求解至于劓刖而仍困于赤紱剛變柔而不能用陽解困也變動失悅者徐俟及乎柔必徐有記利用祭事者用誠意以格神徐得説亦非苟説也誠者陽也言當以陽剛為出困也本爻以隂變陽為困繫以君子維有解吉君子者四也相維于四而得動以得解則吉也四為解卦主爻六五原在震體為應附四之爻故必以君子之道相維而後有得解之吉也小人困君子者如隂之阻陽以為隂也以中之德行中之事小人皆化而相孚矣任君子之時行無不咸宜何能致困乎故以維于君子以求解也象曰君子有解君子有得解之中也小人退者小人孚而自退如雷之發聲春令大行而隂氣自然消斂也此爻為人事吉而天地之化愈明矣上六公用射隼于髙墉之上獲之無不利象曰公用射隼以解悖也上六變為未濟之上九在未濟之上以陽變隂為解處未濟之極有五之君子光暉得吉必將濟而得解矣故有孚于飲酒亦可無咎然沉湎至濡其首仍云有孚則失有孚之義矣當既濟而戒之恐其終于亂而不能續終耳在本爻以隂變陽為未濟繫以公用射隼于髙墉之上獲之無不利者處解之極變動為明射于髙墉而能得隼之象也所以能獲者以明為動之本也精明強固心手器用之靈明利便也有其體有其用雖六藝之微如是也因而推之以陽中為體則隂陽之用無不獲而無往之利即卦辭之有攸往夙吉之義也言射者中也中者得中之道也象傳曰以解悖也悖者不順也得中則順矣卦辭利西南之義也爻言體陽而傳又言用隂以為解悖之方也且悖不言中中則不悖一得中而順在其中一體乾而坤順承乎天矣豈止在解言解悖已哉隼鷙隂鳥射而獲之祛隂以振陽也故無不利震方出而為解故貴振陽至坤陽飬于隂亦以裕為振也故夙吉解卦六爻初則安于解陽方升之時處于下位者也二為外卦四爻震動得解之根本在坎中者得乾元以為中養之于夙發之應時斯能動而開解也乃主于內卦之爻也三爻以向之隂柔阻陽而乘者今且陽起而薄之矣隂本負而乘乘而致冦亦可羞也然亦天地氣化之正而無可以為咎也亦出入無疾之義也在人事則小人當之可知戒矣爻辭象傳為人事言也四爻主乎本卦位不得當而中則得中以為震動得解之主陽也五乃從四陽為動得吉者也小人之隂天地之隂至此俱化為陽矣六五以隂爻云維陽者原從陽而成震也上亦附四以成二隂附一陽之象義故終震而射隼得獲無不利雖得解而仍震動恪恭自強不息焉君子之學聖人之誠俱以無息為貴也况貞悔相參一則飲酒濡首一則射隼攸利敬勝怠者吉怠勝敬者凶也此解六爻之象義無不合乎卦之德象也兑下艮上損下經咸恆二卦後凡十卦三隂三陽之卦有損益如上經乾坤卦後凡十卦有泰否否泰雜卦傳云反其類也損益雜卦傳云盛衰之始也聖人序卦皆有確乎不易之義象而出于自然之道者也請先以卦象明之澤山咸變為山澤損雷風恆變為風雷益咸恆相綜而損益亦相綜此損之繼咸益之繼恆之定象也澤山通氣以為感雷風相薄以厯久彖傳皆釋之曰相與澤山雷風各以其氣相交雖主天地之氣化言而人心之感應人道之恆久在其中矣損之山澤益之風雷亦有相與之義主人事損益言而天地氣化亦在其中天人之道無二無一時無一事不相合應于此四卦更為言之明切矣至于損益之名義本于二卦相綜以為損益無所取于他卦損損下卦之初爻益乎上卦之上爻則為損也益損上卦之上爻益乎下卦之初爻則為益也是損者損下益上而益者損上益下也損下益上益也反名之曰損損上益下損也反名之曰益非聖人謂下之于上有維正之常供上之于下有非時之加惠乎且損下益上上以受益招損財聚則民散矣損上益下上以自損而益民有人有上斯有財也千古之人君知此二卦之義則無暴斂橫征之虐而有恭儉寬惠之仁矣以身發財以財發身大學言之與易若合符節也即天地之氣化亦以損天之陽益地隂為貴天大地小天動地靜天之氣運于地外地之形懸于天之氣中以天之氣貫乎地以為地之氣地之氣即天之氣也損天之陽即為天之益乎地而貫于其中又包于其外仍是天之一氣貫通而已如君之藏富于民民之富皆其富也此天地之損益也至于隂陽之損益以無所損益為損益無日無時不互為損益而萬古終無損益自五帝三王以後以至百世聖人復起禮樂刑政無一代無損益而五常之倫萬物之性明德之體新民之用毫無所損益也天道人事合一如是非咸之感通乎非恆之常久乎感于人心者通人已久于王道者盡性倫則損者損己之欲以感乎人益者益己之德以久于其道此又二卦分言之以各繼咸恆者也澤山咸以澤之在山有山之氣通于澤也澤之氣不仍下降于地乎此相與也變而為山澤損損乎下卦初畫以益上卦之上畫則為損下以與上也然或亦有損上之上畫以益下卦之下畫之時矣則損上以與下也仍是相與也上下之相與者在貢賦在補助然相感則以君民之至誠咸之虛受人亦受人益已也而以懲忿窒欲為心者其撙節愛養卑宫室惡衣服菲飲食以為民養欲給求者何可量也則是君子之心無忿無欲方己益而人無損由于虛受善益于無家之臣也此損下以益上實損上以益下也此君德與治道日盛之始也反此則損在民生而君德與王化並損矣非衰之始乎雜卦傳言盛衰之始見于損卦者如此而于益亦可推矣本義謂損下卦上畫之陽益上卦上畫之隂反覆而求茫然不知所謂兊之上畫非陽艮之上畫非隂奈何損有孚元吉無咎可貞利有攸往曷之用二簋可用享彖辭曰損有孚元吉可貞利有攸往損下以益上必君心之誠能孚于下方得享萬方之奉而元吉也既云元吉又云無咎無感下之德而有君公之富咎易集焉所以不元吉則有咎元吉斯無咎見為人上者非同臣庶崇髙富貴吉咎之間間不容髮不可不時為凛凛惕惕于一心以為迪吉免咎之源本也不曰利貞而曰可貞損下益上不宜更言利矣可貞乃必宜于貞正而非因利始貞也以義為利孟子為時王言耳若夫聖君賢后則惟知義所在措之咸宜而已何必曰利然又言利有攸往何也攸往者受下之益仍以施惠布德于民井田學校禮樂征伐自上出者皆以為民經畫遂生復性之謀以此為利利乎下非利于上也君天象也如乾始之以美利利天下而不言所利也此所以無往不利乎如此則損下益上又曷之用乎然如國之大事事天敬祖禮賓享賢經費亦有必需者矣但誠敬為心恭儉為則雖二簋可用享也禮與其奢寧儉之道也是上雖受下之益既不侈然肆其嗜好自必約而槩從撙節彼聚斂為事者色荒禽荒甘酒嗜音峻宇雕牆耳今既無濫于用財自能厚以待下曰曷之用二簋可用享無所用以節其流不須多取無厭以裕民財源也本義損下卦上畫之陽益上卦上畫之隂未曽説出自何卦變來詳益卦後彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行彖傳釋卦名義曰損上益下其道上行損下卦初爻之陽益上卦上爻而成卦是益卦也却取其義象而名卦曰損損下益上上損德下損財故謂之損然亦道應如是也道應小人養君子勞心者食于人則天生下民作之君即應奉乎君而無所憾也然必為上者有孚則元吉無咎可貞利有攸往如卦辭所言者不以奉上為義而以恤下為仁取于民者還以用于國于民而一身之制節謹度欿然不敢肆也此所以無所濫用其財而二簋可以享聖享賢以敦誠盡禮也况年歲之豐歉無常祀享之豐約宜酌二簋之用有與時為隆殺者當飢饉之候省賓祭之儀固禮之定制也且賢君之長願逺慮亦至矣今日之損兊內卦之下爻以益艮外卦之上爻為損下益上者時之常也但水旱洊臻凍餒有告則發倉廪蠲租賦省補耕斂不足不給損上剛以益下柔者亦何嘗不預籌有時而為變乎合國計民生天時人事以理財節用無非為民室家婦子謀耳何嘗有利之之心乎况此損上益下損下益上隨乎運氣之乖和物力之饒絀亦盈虛消長自然之理數也聖王之損益于此者不過與時偕行順天之運盡已之心厚民之生協時之宜而已是以損之世在下財用無虧而急公事上之道得在上惠愛既洽而勞民自養之譏亦免也上無損于德而下無損于財也此損之所以示天下後世乎損剛益柔傳所言剛柔乃指內外就卦為貞為悔論貞為下一卦悔為上一卦也貞卦柔變為剛悔卦剛變為柔就此論祇是損內益外耳蓋損卦原係損內卦之柔以益外卦之剛至益卦方是損外卦之剛益內卦之柔也所以彖傳云損剛益柔有時也今必將損益二卦俱説是損剛益柔除非照內外貞悔而論之但有時二字終不圓通耳詳益卦後象曰山下有澤損君子以懲忿窒欲象傳曰山下有澤損君子以懲忿窒欲此又為損之上受下益自損乎己明根柢也忿不懲欲不窒何以能充損于己乎何以不致多取于人乎即為學之君子亦惟此二者為損德之大者耳能損乎損德之忿欲則德之本日固而德之量日充矣况為人上而受益于下忿欲是損仁愛愈隆卦雖名損實上益乎德而下益乎恩也皆自一念之克己始也一日克己復禮天下歸仁受益也大矣損原為受益之本象傳明之見能損己正是能受益亦先難後獲之道乎欲似宜損以益理忿何亦宜懲哉不知忿欲二者常交互為用因欲不遂而忿忿以縱欲拒諫遂非而人己受損實甚矣懲忿而後可以窒欲又見欲者人心不免苟不以忿佐之則欲雖起可以漸消惟以忿助其虐則不可復制懲忿豈不與窒欲相表裡乎理財節用其一耳初九已事遄往無咎酌損之象曰已事遄往尚合志也初九變為蒙之初六在蒙初以隂變陽為損損其蒙而發之用刑人之法如桎梏然損之正所以益之也在本爻以陽變隂為蒙取蒙刑人之義心必懷刑方為君子也本卦與益相損益初爻乃損以益上成卦者故專言損益而懷德畏威之義在內矣初在下當損以益上以成益者也而在本卦言則損也初在下損己以奉上事之不容不盡分之不得不行者也遄往以盡急公親上之義自無咎矣然亦須在上者酌損其應損之供如用其一緩其二是也象傳曰已事遄往尚合志也小民子來之情何以致之乎尚上也上之好惡同民心周民隱者至矣民之心自必忘身殉義先公後私如大田所咏雨我公田靈臺所云不日成之也且在上酌損而在下遄往合志于此可見矣九二利貞征凶弗損益之象曰九二利貞中以為志也九二變頥之六二在頥二以隂變陽為損損乎頥即顛頥拂經也于丘墟之地而求頥無人空野何以為養乎故征凶也在本爻變陽為隂為頥亦取頥養之義言損利乎貞而已矣在初之上初己損以益上矣是不可再損矣故征凶損之不已所關于為損之上者甚大也財聚則民散民散而國墟矣故必弗損而且益之方合乎損下益上及有時亦損上益下之義也利貞者固守常制常分乃為損益無過不及之則也二為人臣之位勿為聚斂之事且弗損于上而能益于下利貞之有經權者也象傳曰九二利貞中以為志也九二在卦之中故言中以為貞然弗損益之又有義也人臣在君民之間上以承流宣化下以布德施仁能弗損于上而有益于下方為得人臣之中道耳若言弗損于下而有益于上則後世言利之人藉口以營私邀寵也司馬溫公曰天下財利有數不在上則在下未有不損民而有益于國也故弗損益之爻辭祇作弗損于上言恐謀利之巧宦藉口耳六三三人行則損一人一人行則得其友象曰一人行三則疑也六三變為大畜之九三在大畜之三以陽變隂為損兼損為大畜所以雖有良馬可以馳逐必利艱貞不輕動以失畜也曰間輿衛方利有攸往惟修備以為畜畜之大也至矣在本爻以隂變陽為大畜兼大畜之義以畜為損三人行必損一人者損其多以專一也一人行則得其友者損乎己而專心取善于友也論語云三人行必有我師焉似讀易有得之言也三人行必有我師善不善皆師也從易中又生一義也易則言損一人者損一不善之人而師乎一善也三人者甲乙與我共之也損一人則惟我與甲矣即甲乙二人皆善必擇盡善者以師之矣于是專師乎盡善之一個而我得其友且將並損乎我以歸于盡善而已矣損至于並我亦損焉受善之𢎞取德之益何如乎象傳曰一人行三則疑也謂是非固宜擇盡善未盡善又宜損一以專于一損己以專于友專一者主一無適之敬也即誠也誠則何疑乎三爻獨言學問德業之損益亦以損為益也蓋止在外恱在內如有德者止于至善而恱慕之以思齊也艮為山有取于髙山仰止景行行止如詩所云乎以上內卦三爻兊體卦之體象以損初一畫益上成損無取乎恱德然下悅于損以奉上則民心亦可思矣以三爻為主所繫之辭言治心取友之道者所以立出身加民之本也然即專言為學亦可以主內卦之悅于取善矣初二兩陽爻附于一隂初象損下故遄往無咎二則臨民弗損益之方不為繭絲而稱保障也六四損其疾使遄有喜無咎象曰損其疾亦可喜也六四變為睽之九四在暌四以陽變隂為損取損上下卦交際之義有暌孤之象必從一以見元夫能交孚斯無咎焉本爻以隂變陽為暌兼暌義立乎上下損益之際為臣而當損之時能損乎上之疾而益乎下之喜者也此為臣之忠藎自矢者也何咎乎象傳曰損其疾亦可喜也害民之政去而愛民之政生矣且此心不阿順以取容惟濟民以輔國誠為君為民者皆以為可喜也四處內外損益之間故爻傳之辭如此蓋重在損上以益下也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也六五變為中孚之九五在中孚之五以陽變隂為損繫以有孚攣如攣如者拳拳服膺弗矢也故無咎非損而懲忿窒欲焉能乎本爻隂變陽為中孚繫以或益之十朋之龜弗克違元吉何也卦名有孚變中孚而孚存于五矣此所謂十朋之龜也有此靈龜以卜攸往弗違焉必大吉也蓋上下之間所重者君心之仁周及下民耳心既能損己忿欲以為德益民以為事龜蓍之靈特藉以質諸鬼神耳書謂謀及于心先定志乃稽疑之本務也象傳曰六五元吉自上祐也上者凡君之上天地祖宗實式憑之正取龜之象義而實五之有孚以自求多福也然後上錫爾景福焉上下之感應與神人之昭格一心一理而外諒無他端矣此爻全兼中孚言元吉上九弗損益之元咎貞吉利有攸往得臣無家象曰弗損益之大得志也上九變為臨之上六在臨之上爻以隂變陽為損兼損義而敦臨惟恐于臨之終臨下之道漸損也敦之者敦于立德𢎞業而已在本爻以陽變隂為臨兼臨義于損下益上之時弗令損下而且益下見此爻乃本卦受下益之主也弗損益之為心即有孚于下矣無咎貞吉有攸往所以同于卦辭也又云得臣無家者上雖有弗損益之之心尤賴二三大臣相與共察民隱恤其疾苦寬其賦役布其德音也惟四之損其疾以繩愆紏謬惟五之龜弗克違以將美輔仁何公而忘私國而忘家如是耶然非上之弗損益之為心何以集無家之臣嘉謨善言而受其益乎象傳曰大得志也有孚之誠存于中而無家之臣為之佐則當世之民名為損下益上其實身家皆君之養育倫理皆君之經綸生以遂而性以復受益于上𢎞多矣蓋必如仁之分量至于無一物不得其所無一人不全其善損上之志方慰快也大得志者合天地萬物以為心而自全其仁也此損之所以重有孚乎以上外卦三爻艮止之體德損下益上貴于上知止也取艮上一陽為上九主外卦且主乎通卦焉惟其知止故弗損于下而且益之以此得攸往而臣下俱不自有其家其奉上誠矣六四附上陽損疾骨鯁之直臣也六五附上陽益龜無違嘉謀之智臣也有此二臣附上弗損益之大得志為何如乎本卦以損下益上取義定名初則下而當損者上乃上而受益者故于初則言已事遄往于上則言弗損益之上下各盡之義也二在內卦近于下而弗損益之為心為政臨民之臣宜如此也三在內卦近于外卦而損三得一言學術即為政之本也益乎德亦在于損乎疑焉四爻則在外卦而近于君矣損疾者爭臣也五則在君位而本卦乃以大臣處之明德如龜蓍社稷之臣也同二四皆為上所得無家之臣而以匡君裕民者也上則居受益之即君位也損以上爻為君如明夷焉就其卦之象以君之也震下巽上益損益二卦與他卦相綜又不同損益俱以一爻上下為損益是二卦原為一義蓋損之損下益上究為下受上之益益之損上益下而上亦未嘗不大有益也有道之世上下受益而無損反此則上下皆損而無益知此可以言損益之道矣損卦言繼乎咸益卦自繼乎恆損下益上乃常道也何以損上益下反繼恆乎蓋損下益上必由于人心之歸斯天命是畀然後能合天下以奉一人之養故重在感以為應彖辭所以首繫以有孚焉至損下益上乃人君之受天命凛民岩當盡之責任惟其恆損上以益下斯能天命凝固而不移國祚綿長于百世天祿永綏于主德也此所以益繼乎恆意謂此為上者經常恆久之道孝經曰髙而不危所以常守貴也滿而不溢所以常守富也即恆之久道化成也觀彖辭並無吉凶之示亦無亨貞之兆惟云利有攸往利涉大川較之損更至易至簡一損己益人而有吉無凶即此得貞而必致于亨可知也其卦變彖傳亦未言蓋損彖傳已明之矣損之損下益上損柔益剛也然亦有損上益下之時故曰損剛益柔有時益之為卦乃損外卦陽剛而益內卦隂柔者也故可以不復另言卦變也請申言其與恆交易內外卦以盡變象之義恆之為卦上雷下風益之為卦上風下雷雷風以相薄者相與為恆在恆己明之風雷之為益何如巽在外風自天來也震在內雷從地起也風行于上雷動于下如上之施德意發仁政而下民無不身受而家被也正如春時風起于上雷動于下萬物無不暢茂條達各遂生意也是恆之雷風旋運于天地恆久不已者至益而聖王之風雷鼓蕩乎太和亦益下無窮焉恆之雷風與益之風雷無二物也在氣化為天道在政教為王道乃以天之道為道者也益利有攸往利涉大川彖辭曰利有攸往謂損上益下以此為利而往無不可往也即涉大川以濟險亦無不利况安常處順乎不言吉利往吉莫大焉不言亨涉川亨莫阻焉蓋益之時上能損己益人損身益世自必于上有大益故不須更示勸戒矣彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行彖傳釋卦名義曰益之為卦損上以益下也乃損外卦上畫以益內卦下畫取象立義以明之也損上益下宜名之曰損而反名之曰益重益下也猶損下益上宜名之曰益而反名之曰損亦重損上也重損上以益下則下之益即上之益是以民恱無疆也下原有奉上之誼上原有濟下之道自上下下先自損焉以為施也下之受益而為報者寧可量乎是上以道下下其道正大而光明者也利有攸往者以九五之君秉中正之德有孚惠心而大有慶君民胥綏福荷祿也利涉大川者巽震皆木德存為仁心發為仁政正合乎木之為道而大行焉如風之無逺不屆雷之無物不振也天之生意首在于春故天之木道主乎生長人君體此以仁心仁政覆乎天下洵合天人于至一也至于卦德雷動而行者風巽而進則陽氣充周流遍也此陽氣之出震齊巽者乃自勞坎成終始于艮而來為天之元陽也天之元統天以資始是日進于無疆乾元之施者不息坤元順承乎天地之生者亦無盡也于是萬物受資始資生之益至無方也然則益之世凡為益下之事存益下之心皆以天道是則天時是宜焉與時偕行仁心仁政無不與天同其覆育與時同其生養也益之為益于民如天然大矣哉象曰風雷益君子以見善則遷有過則改象傳另申一義為修身立德言如損之言懲忿窒欲以為經國裕民之本也風雷益風之來無常雷之起必震君子體之見善則遷如風之速于行也有過則改如雷之警于心也遷善改過修身之要而實敷政臨民之本也有此遷改為志方能如風雷之震動巽行日進于無疆也因之推此仁德于民物自如天施地生其益無方矣非此篤慎好修者為之根柢何以能與時偕行乎且遷善改過俱非可一時少自怠斁以悖乎偕行也時者修內治外無一刻有違者也即至聖人先天弗違後天奉若亦不過偕時而已矣時哉時哉初九利用為大作元吉無咎象曰元吉無咎下不厚事也初九變為觀之初六在觀初以隂變陽為益以下觀上無知如童子小人庶民之宜也故無咎君子當具與上相為流通之誠矣亦童觀焉故吝在本爻以陽變隂為觀在益之時下受上益觀乎上之德意欲為急公親上之事利用為大作大工大役不敢憚勞也竭忠竭志不敢辭瘁也乃元吉之道皆下之奉上所宜盡者也無咎者分盡而其咎方可自寬也象傳曰元吉無咎下不厚事也下之事私也上之政公也益之下受益圖效皆不厚其私事而厚致財致力于公政上既損上以益下下必薄私以厚公矣大作皆就仕進之君子説本義亦未專指然在觀之初兼君子小人説本爻亦必兼士民説為大作者四民各盡其應作之心之力大有為于益之世也此爻乃受上益之民也而士亦在其中矣六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也六二變為中孚之九二在中孚之二以陽變隂為益變兊為震震雷也不出門庭豈能相孚而説乎故凶在本爻以隂變陽為中孚乃士之處己得中有孚而可以見用于時報效于君者也其孚之在心者誠也誠則必明明莫如龜如或益之十朋之龜也弗克違而從之為用且利永貞以無渝其誠則無蔽其明矣豈止為王之藎臣乎且可以為王薦之上帝以告得人之慶矣王用享于帝吉王之享帝亦不過此心之誠耳臣以是格王王以是享帝無二道也即無二吉也象傳曰或益之自外來也言自損上之君有此誠以感下故下之仕進者賢人君子皆坦白其衷以與君合心同德也誠雖自己心而具然有推誠置腹以召之者則自上也所以云自外來也重上之損上以益下也即忠臣義士之心亦與小民之財力相同必有以誠相孚者而後不自靳惜耳爻兼中孚義故專以誠孚言此爻乃受上益下之士也而其中賢人君子逈異于衆矣六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也六三變為家人之九三在家人之三以陽變隂為益明變震而有多言嗃嗃之象此家教宜嚴也故以嘻嘻致戒于寬弛焉在本爻以隂變陽為家人當益之下卦亦受上之益者益之以用凶事兵事也初為民二為士三則戎伍也益于農益于士皆益矣即不得已而用兵非樂于損之也亦求所以益之耳惟其益之所以無咎無咎在師之衆由于帥之正而君之仁也蓋內本于有孚之君德外尚中行之正道以此用凶事可以守可以戰且不戰屈人矣當國之大事初興必告先公用其命圭者敬其凶事不敢輕用民命也必誠昭于天祖孚洽于國民而後可以伐罪討亂兼弱攻昧以征不服是上之用凶事而益下損上之心即寓于修文德飭武備不貪功利不縱忿欲之中矣象傳曰益用凶事固有之也兵者聖人不得已而用之故有不得不用之時謙之終而用侵伐蒙之極而利禦冦修德已至教化己隆則頑梗不率不得不用凶事矣行間之人有不共諒其有孚而盡其當盡之分者乎傳言固有謂上之用凶事有天下者固有之事也用于凶事之衆各盡親上死長之誼又為分之所固有耳以此凶事使之而民以為固有所謂以生道殺民雖死不怨殺者也如初之大作乃以佚道使民勞而不怨也內卦三爻皆受上之益者分言之該括盡矣此爻乃從戎之民受益于凶事而大工大役該之矣老氏云吉事尚左凶事尚右是以偏將軍處左上將軍處右此兵以凶事為名古必有此言矣且古者出師必鑿凶門亦可據焉以上內卦三爻震動之體德下所以震動者因受上之益也以初爻為內卦主爻利用大作以酬上益即所以益上也二三兩爻隨初而動二為忠志之士三為從戎之衆文謀武略俱以益上上雖益下下之益上亦多矣六四中行告公從利用為依遷國象曰告公從以益志也六四變為無妄之九四在無妄之四以陽變隂為益乾變巽恐其淪而妄也故繫以可貞斯無咎蓋無咎者無可加益可貞即全乎無妄矣在本爻以隂變陽為無妄無妄即中道也當損上益下之時遇有孚惠心之人君以無妄中道之行告于公焉有不從乎又云利用為依遷國者四之位乃著夾輔之勳寄社稷之臣也遷國依之于繼世守成之時均有益焉益之君臣所謀者損上益下之事而社稷朝廷遂受益于子孫百世其損益盈虛之道不大可明乎象傳曰告公從以益志也以益民為志者上之心以君民均益為志者臣之責也嘉謨嘉猷入告乃后所以益君之志而下之受益逾𢎞矣無妄之四變巽隂爻有戒辭本爻變乾陽爻為益志可見誠之為用無往不宜矣此爻乃佐上益下者本義謂周之東遷晉鄭焉依然東京之經營非周召乎恐彼晉鄭尚無此中行告公之德謨足以當之也三四兩爻非中而言中則在兩卦之中亦可謂中可見中無定所合道而己矣九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也九五變為頥之六五在頥之五以隂變陽為益繫以拂經居貞吉不可涉大川艮止變巽巽以求頥拂乎上止下動之經矣祇可居貞不能如益之涉大川也益下之道可以涉川求頥之道豈可涉川乎何也以公私有别耳在本爻以陽變隂為頥損上以益下正以頥養天下為心也有此誠孚之惠心則勿問而可知其元吉蓋仁政所及者猶有限而惠心所及者無窮也上之益下如此以為損上乎不知有孚之惠心所感天下之人無不有心心無不有誠誠為感者誠應之因上有孚惠心而下之臣民各以有孚惠君上之德也何可量乎上之益下在身家衣食之計下之益上在建中立極之德是上以心惠下而下以德惠上也德自在君心何人能惠乎然下之人共孚信其德則成德方成成己之德至于成物斯實而可驗是以謂之自下惠德究為君之惠心自成耳論惠心原自君德中推暨而出兹云惠心及民自民惠德不過因上下損益之間重在心與心孚故明其交相為益之義也象傳曰有孚惠心何須問其吉而元吉自致也惠我德由于惠心惠心既廣及于天下而其志即大得矣民之惠德也非在上所可必也庸敢望天下之歸仁哉然仁心存仁政著德既內外交修矣此上之自信者也即共信于下而上志克慰也反若自上操其惠德之柄矣此爻乃損上益下之賢君也上九莫益之或繫之立心勿恆凶象曰莫益之偏辭也或擊之自外來也上九變為屯之上六在屯之上以隂變陽為益處屯之極變巽為風不能成雨澤以及物所以有乘馬班如泣血漣如之象乘馬者求進也乘馬而進隂散風行雖有泣血亦無雨矣兼益上莫益或擊之義也在本爻以陽變隂為屯兼屯不能施澤于下之義有莫益或擊之辭上爻乃益卦之損上以益下之爻也變則莫益或擊此益之仁君必以損上益下為心為政而有鑑于載舟覆舟之喻也蓋上雖受天下之供以天下奉一人其實以一人之心養天下有孚惠心之所以可大可久也如有自奉之心則失濟下之道是無恆心矣恆心者仁心也立心無恆仁不存乎中惠不及于下凶可立至矣夫恆心者無人不宜存而不失况君公之貴心之得失國之存亡係焉惟以益下為經常之道守此惠心為恆則久道化成之恆漸成于損上益下之日而無難矣象傳曰莫益之偏辭也周公之辭何偏乎傳謂其若偏于下也損下益上之損宜使下受益損上益下之益亦宜使下受益是偏于益下之辭也偏于益下乃得恆久之道豈上不宜益乎上之所宜益者德也有德而有人有上有財有用一有而無不有受益多矣是以聖帝明王必先自居于損不求益于下惟無求益之心而終得大益之實也反其道而自益損人人必擊之亡其身喪其國所損何如乎傳云自外來也損上畫以益下則下為我之子民若不損而益下則近如舟中之人皆敵國矣自外而來未嘗不由咫尺切近起也所以戒之者深矣觀于上爻之益下為恆心則益之繼恆確乎其不可易也上爻為損此以益下之主爻故痛切言之外卦三爻巽體四為佐益之臣主乎外卦五為益下之主以德位主乎通卦上爻則反言之歸于必益下乃能恆居上耳損象傳云損益盈虛四字該盡聖主庸君治亂興亡之理而數即根于理矣損下益上上似受益而損者在德業在祚命損上益下上似受損而益者在仁心在仁澤仁心常存在身可成聖賢仁澤常綿子孫永荷福祿此盈彼虛彼盈此虛天道人事終古如斯昧者忽焉奈之何哉故雜卦傳曰損益盛衰之始也興亡且基于此矣豈止盛衰乎凡居民上者求久安長治之道于斯一言以蔽之矣故曰繼乎恆而為益繼乎咸而為損也咸恆分根于乾坤損益亦分根于乾坤損之道重在止根于陽益之道重在進根于坤能止乎損下益上必損上益下矣能進求損上益下必不肯損下益上矣止為仁心説為仁政損之所以繼咸而為感重在心也發為仁政藏為仁心益之所以繼恆而為常重在政也心政相為體用損益必合中行究仁心為仁政之本也此二卦之象義最明切者也損言損澤之深以益山之髙損下益上也然無平不陂即無陂不平不有損山之髙以益澤之深乎此即損益盈虛之義亦即否泰之義也泰否之反類損益之盛衰惟心能誠感而政得恆常者能明之損重在上止而下悅下悅言民恱固矣然上能知止乎損下益上以制私其悅方能止而不濫也此懲忿窒欲為損乎益重在上散而下動下動言民大作固矣然上能巽進乎損上益下以為利民惟動乃以有為而愈進也此遷善改過為益乎易理無盡故繹之無盡焉附損益二卦卦變説損益二卦本義雖有釋卦變之説却未指明自何卦變來閩漳詹氏提要中補出損自泰來損下卦乾之上爻益上卦坤之上爻為損益自否來損上卦乾之下爻益下卦坤之下爻為益也與損彖傳損剛益柔合益彖傳自上下下亦合但自泰變來反為損自否變來反為益與四卦象義大不合矣不如就損益二卦上下自為損益為直捷了當耳蓋上經三陽三隂之卦首乾坤而中交以泰否即以泰否二卦反類泰可為否否可為泰只在上下反復而已不言變動自别卦來也今于下經三陽三隂之卦首咸恆而中交以損益亦可即以損益二卦相與損可為益益可為損亦只在上下增減而已又何必言變動自别卦來乎故愚釋損益二卦彖傳惟就損益自為上下增減立説乃有取于上下經隂陽分二而中交合一之象義也愚説與益彖傳自上下下極合但與損彖傳損剛益柔未得盡當前以內卦為貞為剛外卦為悔為柔亦不確今細繹損彖傳乃知孔聖以損剛益柔一句該損益二卦上下增減也在損之時損乎兊益乎艮兊變為震為剛艮變為巽為柔固損剛益柔也然有損下益上不可為常之道在益之時又將損乎巽益乎震巽變為艮為剛震變為兊為柔亦損剛益柔也故不惟在損當損二簋用有時即損益互變亦有時也然則愚説與損彖傳亦大合耳厯觀古今損下益上之久以身發財則必變為損上益下之世以財發身是以下文云損益盈虛與時偕行也然則損益所該廣大寧止君民相與之一義乎萬事萬物損益盈虛皆是用易者所當與時偕行也亦無所不見盛衰之始故程傳全而本義專余循朱子説經然程傳究為深逺耳大易通解卷八
