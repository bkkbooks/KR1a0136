body:
  text: 大易通解卷十江常鎮道魏荔彤撰離下兊上革革與鼎相綜皆四陽二隂之卦繼乎家人睽隂少貴隂根於坤也先言革革繼睽睽分也分者原期於合然有以分而得合為合者亦有以分而不得合終亦必歸於合者此革之所以繼睽分而亦必至於合也所以大分大合方有革焉非强合也久之分者自合也睽而為二必有一勝一負負者俱合於勝者此亦自然之理數也勝必有革分必有合其道非一朝一夕之故大而天下國家小而一事一物皆有此義象焉以卦象言之火在上澤在下為睽火上炎而澤下降所以為睽然火與澤有不兩立之勢非火耗澤而枯則澤滅火而熄矣然久睽必合而歸於一彼此相戰有一尅者其不勝者革而從之所以金為從革正言與火相敵而又相成如水土之相尅而相成同一理氣也以卦變言之睽之火上澤下可以分而不相犯也變而為澤上火下相對而相尅有不容不革之象義矣此革之不得不革即繼睽之確義也以天之氣化言如夏秋之交火勝金而金伏氣候大熱漸火微而金不伏矣然火猶與金爭勝涼熱每有進退及兊金大旺一番雨澤降一番炎熱减一番涼爽至火遂革於金矣推之涼之於寒寒之於溫溫之於熱以漸而革皆已去者從方來者為革也特火與金猶為易見故舉一隅而可以三隅反矣况冬春則水木相生者也春夏之木火及秋冬之金水皆然無尅而以涼生寒寒生溫溫生熱焉故不同火與金也若論五行四時相生之序仍有長夏亦火生土土生金但易論革從睽來原論尅制亦明睽分革合象義耳蓋土氣分寄於四時不專論於夏秋之交也是以於澤火相值土雖居中不能間之惟任其革耳謂之根坤何居二卦皆女卦也重在二隂爻也四陽爻不過附隂以成卦而已故主隂而根坤也然此卦何以隂爻為主乎主於二也二乃革而從澤者也前在睽者離在澤上可以任其上炎今離在澤下不得不革於澤此從澤為革之主爻也至於上卦之兌大施其澤以革下火者也秋令到而火自滅在天時言之雖革火而火無恙也火亦出入無疾也兌如復姤之陰陽又如剝夬之隂陽朋來無咎也即聖人之順天應人亦如天地之氣化應革則革故革亦無咎也况彼將革者已衆叛親離睽而二者今皆從革而一矣又何疾之有乎即一事一物推言不能盡者亦不過此理而已二乃從革之主乎內卦者上乃革至上爻方為革之盡也然猶革面未嘗盡革焉革之難也如此此湯武之有慚德而不及堯舜禹也明矣因思夏秋之交天地之氣雜合暑濕熱三氣又為秋涼雨露所逼涼熱交戰此候民病最多比三時特甚則睽革之際天地之氣亦多乖戾以此論之湯武亦適值其時是聖人所造之純駁亦有命焉耳因又繹得西南坤位之義象火地明夷也澤地萃也二卦火澤分而附於地故火入地而此火昏澤上地而彼澤渥火澤不致相息而革也惟坤在西南間乎火澤之中也今澤與火相逼迫而爭勝無地在其間矣六七月之時土氣已旺過而卸令矣火猶未肯全降其炎威澤已大得乎時令霖雨作而凉風至故火終革於澤矣以此觀之坤雖位在火金之間不能終始其令既卸則不能阻隔其爭鬬矣所以然者土分旺於四季不專在西南本位也萬物致養以後交令於致悅之兊則畢其事也於革之象更為明確或曰坤地也焉有卸令之時不知乾天坤地父母也既有六子已卸其用於六子而乾坤不用事矣在坤之分於四季者乃地氣之流行於四時者也而乾統天資始坤順承乎天資生者固不隨六子以為流行矣雖天地無二氣然言其體用則乾坤有體氣主乎生成者也有用氣亦隨六子而周運如後天卦圖是也地則分旺於四時天則無時非其氣在何時則為何時之氣俱不可以為乾坤之體也此處最精細宜靜思自得革已日乃孚元亨利貞悔亡彖辭曰革已日乃孚元亨利貞悔亡革之前漸積者久因而勢成必革革豈不孚而能革乎然孚於革前者已革之人心也其未革者心猶未孚有一夫未孚則一夫未革故必已革之日而後得孚孚非借威驅勢迫明矣孚通於心雖在征誅之世依然尚德而不尚力也惟有孚所以元亨而仍利於貞雖孚者已革而終始於正仍是本一心之誠意以為推行而已如此則悔可以亡矣已日乃孚以孚為革之本革不革聽之於人而孚則操之於已逮我之孚可革於彼彼自然革其心而俱孚矣既已元亨又必利貞者人心孚後我心之孚不厭不斁此元亨後必利貞而後言悔亡焉諸卦非根於乾不得元亨利貞全見於辭乃得於革主隂之卦何也革以兵戎者用隂孚以心德者體陽也孚即乾元也所以元亨利貞全見於革已日即已于此一日就革盡之一日言也如論語言一日克己復禮以克盡復盡為此一日天下歸仁矣彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉彖傳釋卦名義曰革水火相息若依文解義亦甚易明然中有疑處不為疏明終有阻格兊為澤何以至此曰水水火不射何以相息學易者試於此等細思能得方是心得不藉講章為生活也試論之兊乃悅萬物者也悅萬物者莫悅乎澤就各正性命言其能成萬物非指雨澤言也雨澤方可言水耳今孔聖以水言為革火也革火者亦不必專為水秋風秋露無非革火之氣所化大勢主乎雨澤之水以革炎暑則水之滅火就人之易知者論耳至於水火不相射先天之日月坎離也與此澤火非一義象今於兊言水但取雨澤之水之義不及於天一之所生水也兊澤也又屬金故火為澤滅而金亦曾伏於火此乃彼此之相息者以人事論之殷周皆為桀紂所虐豈非金伏於火乎及至革命而夏商革為殷周亦澤能滅火之象也此傳所以言水火相息也二女同居其志不同行見於睽矣睽綜家人彼二女志不同行小有不合為睽對家人言也此二女志不相得大有不合為革繼睽言也大不合則並小不合而分者將合為一故彼曰不同行猶可各行其行今曰不相得則不能不革而從一矣卦名曰革以二女之微嫌可窺人世之大隙也已日內孚未孚者既革亦無不共信之矣然未革之前必共信其孚矣此一二人不足為有無如初爻者豈能行乎蓋由於成革者內具文明之德能悅於逺近中外是以大亨而終始以正也何以知其正蓋當革則革為得理道之當也所以悔亡焉悔不在事之成敗如不得當事成革成亦豈能無悔於心惟其得當無悔亦不在跡而在中心矣此聖人體天地之氣化以為革也天地氣化不革故不能更新如四時然遞相遷革無有終極蓋非革則無由得成依序而革依序而成凡革皆為成也故湯武伐罪弔民至於上革天命矣天命在天而聖人能革之由於彼昏暴者自睽於天天命湯武革以成新耳究非聖人之自革也順乎天也如四時之代成必因革而後可為成亦不過順乎天耳順天於上如四時之行於天應人於下亦如四時之宜於民至革而天意合民情安非革之主有文明之德以仰觀於天俯察於民行此順應之事大悅於天人何以與天之時行人之時宜胥協乎是革之為革亦主於合時而已革之由睽分而漸革以合其時所關洵大矣乎即一事一物之小應革而成亦必有時得其時而革無往不成矣然莫不由睽而分然後漸至於革而合其間為時歷歷皆當以文明之德體察于其中應之則人已胥悅矣寧止湯武之大事已乎象曰澤中有火革君子以治厯明時象傳曰澤中有火革火既入於澤中火已微矣向雖水火相息今將火不能敵而入於澤中漢軍四面皆楚歌垓下之圍成矣焉能不革楚為漢亦由於始睽分而終革也此可知火之入澤中非旦夕之故由來有漸自三隂盛於七月即可知其將革焉君子體之首先治歷以明時時有一定敬歷授時使民得協時宜以為養欲給求之本固然而君子於此觀寒暑之遞嬗識隂陽之消長所以濟陽和隂調元贊化者寧無修德凝命之實心實學乎豈必待睽待革而後順天應人乎其所以與時偕行者無刻不有奉天道合人事之時宜也由明夷而蹇而萃而革一貫之事莫不各有其時惟作易之聖人能明之而伏羲之卦無字無文已括盡焉豈不更神乎治歷明時與睽之同而異義亦相通天道至同亘古如此而其時刻刻不同治歷必明時則其同中之異皆明矣初九鞏用黃牛之革象曰鞏用黃牛不可以有為也初九變為咸之初六在咸初以隂變陽為革能感足之拇而動志於外者也惟其止變明而動於明也所以不言吉凶動在初未可知也在本爻以陽變隂為咸明變止則失於明安於止鞏用黃牛之革執固而不肯革者也在初革之時自有此等人實故君之忠臣義士也故雖不合革之時而無咎可以繫也象傳曰鞏用黃牛不可以有為也革時已届而初獨不革何能為乎亦終於必革而已然匹夫不可奪志初雖志不革亦聽之不能為而徒存此志亦天地間嗜古厭新者也此爻乃不從革者可知已日乃孚之義即當日之時事人情亦可識焉六二已日乃革之征吉無咎象曰已日革之行有嘉也六二變為大過之九二在大過二爻以陽變隂為革陽變隂而濟初隂有老夫得其女妻之象貴於濟隂和陽於陽過之時也故無不利本爻以隂變陽為大過火變風巽進而從革矣辭云已日乃革革之日至方革也革之時能革而新焉所以征吉又云無咎者革至而遽從亦不過免於咎焉非可為功也象傳曰已日乃革之行有嘉也嘉其明主乎中能知革時之義也嘉之以勸來者耳此爻乃從革之主乎內卦者也革義象水火相息而終以澤革火為革故內卦三爻俱就被革於外卦以言其義二為離中爻故主之二革而從澤凡內者皆革矣故於此爻曰已日乃革之同於彖辭也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三變為隨之六三在隨三以隂變陽為革應隨而隨雖失小子而隨丈夫為求而有得然利在居貞則得乎隨之正矣此於隨兼革從之義也在本爻以陽變隂為隨亦兼隨言革首繫以征凶貞厲者不肯革從澤而欲與澤相息也已失時矣何免於凶雖貞亦厲焉然能革言至再至三乃成就其革焉亦可見革者之孚與被革者之心相通矣言者心之聲心之有孚先賴言通然不終賴焉必心與心孚始雖不服終自從革矣三與外卦相鄰故始欲相息終乃革從亦必然之義象也象傳曰革言三就革之時義已明革之時事已成且革之心事已孚矣又何之乎革已大成矣三不得不從革二如微子三如箕子初則比干乎以上內卦三爻離火被澤革而為從者三爻各有一義象當革時不過此三等人故於三爻括盡之焉既為離體內卦以中爻為主已日乃革之征吉無咎得從革之中道也故主內卦焉初則執固不肯革以變止也三則革言三就方孚以其變動故鄰外卦而與爭始欲相息後乃不得已為革也九四悔亡有孚改命吉象曰改命之吉信志也九四變為既濟之六四在既濟之四以陰變陽為革處外卦之下爻方得濟而備衣袽以防患終日戒焉終既濟而不敢斁也在本爻以陽變陰為既濟亦處外卦之下爻已得革而悔庶可亡然必仍以孚為終始至於改命革已成而孚如初斯可以終於吉也象傳曰改命之吉信志也志至此方得伸也志非伸於革伸於孚之能合人己彼此共信也亦合天下之心而為一之要者也九五大人虎變未占有孚象曰大人虎變其文炳也九五變為豐之六五在豐五以陰變陽為革繫以來章有慶譽吉六五乃隂體即坤之柔順中正也含章者誠孚內畜也今含章變為來章孚存於中發於外而章服之榮自來也是以人皆慶之譽之而得吉也兼革之義甚明在本爻以陽變隂為豐繫以大人虎變未占有孚大人者九五飛龍在天乾之九五也以武功受命則虎變而為龍飛者也不必占矣亦如卦辭之元亨利貞而已此乾之彖辭所以同於九五也此孚非孚於占之時也先孚於一心之文明以悅使天下無思之不服也所以吉不待占惟其孚預成志先定耳象傳曰大人虎變其文炳也澤革乎火文明之象並著於澤故在兊體而能得九二之文明以五能使二革火從澤也傳之言革洵微妙乎五乃革火之主為革卦之主位而非主爻主爻在上六上乃兊卦之主爻也一卦之主位一卦之主爻有辨不可混混則一卦之義象俱不明矣唐李問對載李靖曰太公佐武王至牧野遇雷雨旗鼓毁折散宜生欲卜吉後行太公以為腐草枯骨無足問此所謂未占有孚乎上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也缺外卦三爻四為佐革主以革火者五為革火之主位上為革之卦終言其成也用革之後槩從寬大矣五既主乎革卦之君位上又為兊之主爻將何從乎惟以革之象義論之則五為革之主位也湯武是也上乃佐君成革能任革命之道如太公伊尹其人也是以仍以上爻為外卦之主爻也內卦六二為從革之主外卦上六為成革之主也俱主陰而根坤何疑然終以主革之本歸於五之陽剛中正之德者以陽統陰也革天下用武而所以使人革心則仁德耳巽下離上鼎鼎綜革繼家人亦根坤其繼家人之義聖人謂男女飲食人生大欲男女得其正飲食得乎中則嗜好之私情皆義理之正性矣享帝養賢皆得矣故家人風上火下以離之中爻主中饋以貞為吉變而為鼎火上風下五居外卦為鼎主爻二卦皆四陽二陰以陰為貴必用陰爻離為主巽附之以成卦也彖傳曰巽而耳目聰明言巽之德也柔進而上行何謂乎蓋指離之在家人內卦者今進而上行於外卦矣是以得中而居五位以應乎下巽二爻之剛焉且巽之耳目形也其聰明必兼離之德然後耳目之官各得矣非自家人變來乎睽之為革因分而變革為合家人之為鼎因養一家之小而推其養於上帝聖賢也賓祭之大典敬也誠也室家之內外亦敬也誠也聖人誠敬為本自暗室屋漏以至假廟對賓無非一心一德也家人之繼以鼎此其義象也至於主坤無論二卦皆隂即以九五一爻論主乎鼎卦甚易知見矣鼎之黃耳即坤五之黃裳裳就地道在下言耳就鼎象之上言也得乎中位既本於地斯耳與裳同黃其色矣鼎元吉亨彖辭曰鼎元吉亨鼎者飲食之重器重在鼎實尤重在用鼎之人食鼎之實得其中道也古之君公卿大夫多自鑄鼎以飲食宴享且自銘之以志警惕聖人立鼎卦則盤盂几杖之間無非修德謹身之藉矣繫之元吉非以飲食宴享為吉有主乎鼎之用者在心孟子所謂養其大體非養其口腹也人能不以口腹之害為心害則以進德修業無難焉此所以元吉也亨者通也以此養一身者可以祭鬼神樂賓客禮聖賢誠與敬存於一心因祭享而通人神民物於無間亨何如乎彖辭三字亦可謂廣大矣彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨彖傳釋卦名義曰鼎象也形而下者器也形而上者道也道與器原非二然可以象者器也有形者也其無形之道不可象也亦寓於器象之中而已木在下卦巽進以生火則烹飪之象也烹飪之事最小聖人用之最大亨上帝以是達其奉事之誠亨聖賢以是盡其賓禮之敬大賓大祭誠敬如此則一事不敢忽一人不敢慢皆由此心以推之矣鼎之所係顧不重哉此作易之聖人因象制器以載道也遂以此名卦繫以元亨者巽為風如耳目之觀聽乎事物也離為火如聰明之主乎耳目也惟明在心耳目方聰明事物無蔽塞矣蓋因家人之二爻有明德在內進而上居九五得位行志以自得之中下應乎巽二之陽剛是以陰為德體而濟以陽剛之用則亨上帝亨聖賢皆以明德為本而以周旋之禮玉帛之儀將其意焉何事不大亨乎大吉至此元亨在一人受福於天者無事不通達順利矣由耳目聰明內求乎誠敬之主以明德為本外致乎神人之用內得中而柔順中正外應剛而剛健文明此備道於身而假器以表德焉者也鼎之所以重於宗廟朝廷豈止饘粥朝夕謹小慎微足以盡其器之用哉蓋莫不自一飲食之間不敢違仁造端也鼎之為鼎主德載道以為器也其取象名卦不亦重乎然陰德為體應乃陽用則根於坤也明切矣象曰木上有火鼎君子以正位凝命象傳言鼎更重大矣綜於革而兼革之義象言鼎也革命之後既主宗廟社稷則定鼎為有天下者所首務矣非致飾於器也以此重器載膺受天命積德纍仁之盛垂示於子孫志於無窮耳故於木上於火之卦取其象義名之曰鼎君子體此正天子之位凝上帝之命所以稱此位命而無負保此位命於勿替者為正為凝非恃祭亨之具文制器尚象以飾觀也必以柔順中正為德以剛健文明為用正心以正朝廷正百官正萬民為正位也凝德以盡性盡倫盡物為凝命也斯克全乎正位凝命者乃有聖人之德也德為聖人尊為天子福祿命之自天申之卜年卜世於永終矣然觀鼎象之君子可不知位命之靡常而守之匪易乎初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也初六變為大有之初九在大有之初以陽變陰為鼎繫以無交害匪咎艱則無咎大有之初引誘者衆然無交則無咎况知艱有守矣何咎乎在本爻以陰變陽為大有鼎初在下大有則難任乃顛其趾矣然利於出否以傾其盈盛且否腐敗之物也故利於傾耳再者以陰在下有妾之象妾本賤而以子貴因變乾陽而有子象也妾賤而子貴亦可以免咎焉象傳曰鼎顛趾未悖也鼎所傾者為否則傾其可棄者也利出否以從貴也出否而另實鼎以鮮潔如妾而得子從貴之義象也此爻變乾顛其趾傾其否乾陽實也有意於去故取新也乃綜革而從新於初者至於妾從子貴乾之下爻即震之初爻長子也巽為長女變乾從子甚明切焉九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也九二變為旅之六二在旅之二以陰變陽為鼎繫以旅即次懷其資得童僕貞者二止體為即次變巽為鼎而懷資得僕矣蓋巽為利市也貴懷資者合乎二中正之道也在本爻以陽變陰為旅陽剛得中有實之象我仇有疾本義謂指初然未見有仇之象愚謂在三四兩爻為是二應五而三四間之仇之象也有疾謂三不得食鼎而四折足覆餗也是以不能阻二故曰不我能即而獲與正應矣故吉象傳曰鼎有實慎所之也言必待可與食者方享之也因巽進故言所之雖有忌者然其人有疾自救不暇焉能阻人所以終無尤也蓋抱道之人必待有禮之君求而後出其所學以應之即有為之閉塞者久必自敝世無正應以道而有能尤而終間之者也此爻是實其鼎以德故能致鼎之用者九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也九三變為未濟之六三在未濟三爻以隂變陽為鼎繫以未濟征凶三正當內卦坎險之極故未濟而征凶然變陰成巽則未濟必進而求濟故又云利涉大川在本爻以陽變陰為未濟繫以鼎耳革其行塞本火風為鼎火變水火為水息矣故曰耳革不能行則塞矣鼎而無火不能烹矣故曰塞也雖有鼎實如雉膏之美參以坎水如雨而虧敝矣可悔孰甚焉然鼎無無火之義象火必終來遇雨虧者悔而雨晴火發矣自終吉亦兼變未濟必有濟時之義也象傳曰鼎耳革失其義也彖傳曰鼎象也今火變為水失其象即失其義也三在下卦之上故亦象以耳焉以上內卦三爻巽體初為主內卦之爻兩陽爻附之二變止故暫止而後進三變坎故虧悔而終吉鼎以火成巽以進火必附初成巽乃合於鼎故初爻顛趾傾否妾從子貴亦因變乾另為義象必巽進乎火乃合鼎之正義象也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也九四變為蠱之六四在蠱之四以陰變陽為鼎繫以裕父之蠱豫變鼎耽於飲食宴樂豈幹蠱者乎在本爻以陽變陰為蠱折足之象非但顛趾也覆公之餗非傾否也其形渥有汚於重器之象義矣故凶象傳曰覆公餗信如何也忽言信者何意風火為鼎皆虛象也鼎虛於上火虛於下原以鼎實於中為貴也鼎實者所以享上帝聖賢之誠敬也如覆公餗之鼎實則誠敬皆無矣誠敬者人心之實理也失此實理自信何如人之信之也何如不言而可共喻矣傳必歸鼎實於誠共孚所以專言信焉鼎之制器本於主德信乃德之基蠱此誠實之信鼎足焉得不折鼎實焉得不覆乎且公餗非私食也尤貴於公信而後可共享焉不然即不折不覆人亦不食其餘况上帝乎况聖賢乎甚矣信為誠敬實理實心乃綏福荷祿之本也乎此爻乃有鼎有實但無其德不能享神人以安其養者也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也六五變為姤之九五在姤五以陽變陰為鼎能養隂而以杞包瓜含章於內能拒有隕自天之陰寒唯能養陰故能制陰也在本爻以陰變陽為姤以柔順文明之體變為剛健俱得中正主乎鼎器鼎位兼為主乎鼎卦之爻也象以黃耳得中色以為鼎也而且金鉉變乾而得剛健之德也有此德以居此位守此重器以享天盡誠享賢盡敬其得亨之豐厚而且久逺也可知矣仍戒以利貞者心德能歸貞正則名位福祿無不隨之矣象傳曰鼎黃耳以中象其色也然中豈止為外著之色乎實乎鼎者亦此中也有此中德以實乎鼎享天人而自享君奉並以其餘享天下之臣民及奕世之子孫俱蒙其休也此制鼎之君所以作覩者也所以貽謀者也俱從綜革而來故有此辭傳也此爻乃鼎卦之主自家人之二變而為五彖傳所謂柔進而上行兼家人鼎二卦之二爻言也得中而應乎剛則專言鼎之六五應卦之九二為佐命定鼎之臣也五亦言耳古鼎之耳皆在鼎之中稍上極上則鉉也上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也上九變為恆之上六在恆上以陰變陽為鼎有振恆之凶恆久之道不可振搖妄動也就恆上處動體之極言也在本爻以陽變陰為恆繫以鼎玉鉉大吉無不利處鼎之極位在五上乃鼎養之聖賢也其德比玉故有玉鉉之象受人君禮養以輔世長民大吉之道也故無往而不利焉象傳曰玉鉉在上剛柔節也以玉鉉之德在九五之上以陽爻之剛與五陰爻之柔相濟則節其過不及而歸於中君能允執其中則天地無陰陽乖戾之運而民物有生性兩成之效矣在五雖已得中然有此聖賢備師傅之德以啓迪王心奬順匡救中自始終不渝矣此爻乃卦內聖賢為鼎主平日所尊養以輔其德保其位守其鼎之宰衡也以上外卦三爻離體四為不足任重之大臣五為鼎內外卦主爻且德位兼隆之君也上乃德足輔主保鼎之聖賢也卦從革綜所論兼革以言鼎而自家人變來繼乎明夷而萃而鼎皆有恰合之象義俱當逐一體㑹勿徒守時說以自囿斯為善學易也卦既以五爻為主根坤不待言矣然五用柔而必節以上剛則何隂不統於陽乎以此知本卦體隂用陽也震下震上震震為經卦因重成卦者無所繼根於乾也乾坤父母所生長子為震一陽伏於二陰之下先天位之東北後天位之正東然先後天震位皆春令之方也地氣隨天氣當春而動冬至一陽已復歷艮至震三陽養裕帝出致奮天下雷行矣帝者乾元也復於冬至震於春分萬物屯者得解龍蛇蟄起草木甲坼而天地之生意大著矣其聲為雷其光為電開陰氣於密雲散雨澤之陽和代天地而膺生長萬物之任其為長子洵克家而主器者乎自八月秋分兌澤革火四陰盛長雷入澤為歸妹雷聲收電焰斂兌以一陰掩於二陽之上諸陽漸以入地歷七日至震春分出地一陽直透二陰且振陰氣並起為雲為雨諸陽皆盡出也震為諸陽之首有聲有光可見可聞其出也諸陽俱出其入也諸陽俱入故兌與震對列東西為陰陽出入之道路也若論革後序震其以此為義象乎下經所序山澤風雷已首咸恆矣咸恆後十八卦方序震艮又六卦方序巽兌又六卦水火交既濟未濟終焉咸恆後震艮前十八卦三六之數後十二卦二六之數共三十卦而以咸恆為首以震艮巽兌為腰腹以既濟未濟為尾不止結下經且結上經坎離八經卦因而重之為六十四者其綱領俱在八經卦焉震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖辭曰震亨動屬陽陽動必亨陽即元也震亨即乾之元亨也天下之動皆屬陽而震為有聲光可見聞者且此陽一動而無陽不動矣故震之來也虩虩然可驚可懼焉自勞乎坎終始乎艮而來其伏也久其發也速萬物震動皆統於是矣然雖可驚可懼其實可欣可樂春開陽動萬物和暢故笑言啞啞如兌之悅萬物也悅者悅其成笑者喜其生也萬物皆然而人為物靈猶切驚懼一聲雷動百里之內皆為震懼若安處善樂循禮之君子則雖聞雷修省必不致於張皇失措而喪匕鬯也遇動而能靜必其平日能靜以立體而制用也今逢震動必益為恪恭恪在心恭在儀皆靜也靜以御動天地之動氣亦不能擾其靜矣蓋震卦與艮卦相綜而成動靜互為體用不相離也能靜而後能動動亦靜也然能動不離靜則靜之時動之機已不括及動而莫能禦靜亦可謂之動也宋儒言艮為聖賢心學震獨非心學乎陽元之統天統乎三才之道者也故動靜皆天地化機皆聖賢心學而陰陽亦互為體用推及萬事萬物至平易粗淺皆至高深精微也易之為道如是耳彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也彖傳釋卦名義曰震亨震即亨也無陽不亨震陽出地有不亨乎震來虩虩惟恐懼可以致福也笑言啞啞因恐懼則必遵循法則矣此乃就人聞震以釋其義也然就天地之氣化言所以震動萬物者乃物與無妄所謂有物有則者是也君子因聞震而恐懼非以邀福也原為言物行恆求得其則以全乎無妄也及無妄金而福祿隨之所謂自求多福耳震驚百里者氣動聲發故凡逺邇悉聆於耳而惕於心焉莫不驚懼以為天怒抑知乃天之至仁所以鼓動萬物之生氣乎故帝之出每當仲春之令正施仁布惠之時以天行啓人道也人君體乎震之德立子以嫡立嫡以長以代君承祚守乎宗廟社稷之重以為祭祀之主所以昭誠敬於天祖即以綿靈長於子孫者為治國平天下之大道也傳言出者立子以代父也立宗廟社稷之祭主必歸嫡長以體乎震代乾坤出於東方為一嵗布化行運之始氣也說卦傳言帝出乎震亦言長子代父蓋帝指氣化言體用無二以主宰乎氣者言則帝為父母以流行於春令者言則震又長子也人事擬議天地氣化有如此象義故分言之在天地則一氣以為終始而已象曰洊雷震君子以恐懼修省象傳曰洊雷震君子以恐懼修省愚謂震亦心學本於象傳言也靜而存養動而省察凡動靜皆恐懼修省於洊雷之震加惕耳君子有終身之憂無一朝之患此所以不喪匕鬯也故靜存動察之中臨時又更凛然加謹此君子之慎獨也中庸云喜怒哀樂之未發謂之中發而皆中節謂之和君子之靜大中既立將動又必期於至和蓋以此致中和之極也故曰動靜皆心學易於震艮示之矣初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也比彖辭多一後字而無二義初九變為豫之初六在豫初以隂變陽為震豫變為震宜恐懼修省矣乃鳴乎豫故繫以凶焉本爻以陽變隂為豫為本卦主爻辭即用彖辭震來虩虩陽動而震雷發笑言啞啞春行而生機透也以是為豫所以吉也象傳亦彖傳之辭無須再繹是初陽為震之主爻即乾之元寓於震以為長子者也卦有上下二震四爻之陽不可以為卦主者震起於下也上卦之震則在雲中矣如艮之以上卦主艮而下卦之艮不可主卦下卦之艮在山地之間也艮之敦艮在上爻並此卦初爻參玩可見六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也六二變為歸妹之九二在歸妹二爻以陽變隂為震繫以眇能視利幽人之貞兌體變動隂體而能陽用故雖眇亦能視然必存貞性如幽人方不妄動也歸妹為雷收入地此爻更宜恭看在本爻以隂變陽為歸妹陰氣蔽陽陽必起而開之故有震來厲之辭億喪貝者陰開而陽透陰有傷喪之象義也躋於九陵者陰亦隨陽上升於天而為雲雨於春時也勿逐七日得者既雨既處而陰返於地此陰陽升降之有定者也何從而逐乎勿論一嵗之久及時日之暫陰陽升降往來反復悉是如此七日者自生至盛至息為數不過六合往來計之七數耳七月亦七日七日亦七日七時亦七日也一日作一畫看為是象傳曰震來厲乘剛也陽在下而欲起陰在其上而掩陽焉能不厲以開破然出入無疾也故無凶咎可言不過七日來復陰陽一定之反復耳二爻近初故厲在天道言之非厲若在人事言之則亦知厲無厲矣六三震蘇蘇震行無眚象曰震蘇蘇位不當也六三變為豐之九三在豐三以陽變陰為震以明變動內外皆震豐其沛而雷雨交作矣天地隂晦故日中見沫大雨之間又有細雨也折其右肱隂盛而為陽所震故折右肱右陰也無咎者亦出入無疾之義也既言折肱何云無咎天地自然之氣化陽伏而起必開陰而上升何傷於陰乎以人事言則蔽陽有傷宜知戒矣然克己復禮仍無咎也此乃兼震義象而立辭也在本爻以陰變陽為豐繫以震蘇蘇陰逺於初陽已漸伏故震來蘇蘇然陽來雖緩必陰已開透隨震而行上升為雲為雨無眚之道也象傳曰震蘇蘇位不當也不比二之切近於陽為震之厲也陰既在上爻亦淺薄矣隨震行而不復阻陽義象俱明此爻在震之上爻陰浮而陽易透故無眚占人事亦以此義叶之斯無眚矣以上內震卦三爻初為主陽主通卦二三爻附之二乘剛則厲三逺陽以位不當而無眚全卦之象義昭然九四震遂泥象曰震遂泥未光也九四變為復之六四在復四以陰變陽為震兼震意繫以中行獨復於四亦言復者正為變震四爻以一陽在二陰下即復也在卦之中故曰中行獨復本爻以陽變陰為復變坤則雷又在地下矣然震之初地下之陽已出此外震之陽變陰而弱滯泥於陰氣之中為雲雨所掩不能大發聲光之象故曰震遂泥滯泥之義然陽已出地雷不必盡迅烈矣故不言凶咎象傳曰未光也指陽變陰而為上下四陰所掩電且不能發雷自隱隱而不能轟轟矣此爻乃外卦之主陽雖同初陽所以四不能主通卦者雷起於下也六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也六五變為隨之九五在隨五以陽變陰為震變悅為動能隨乎泰故繫以孚於嘉吉在本爻以陰變陽為隨隨乎四陽以動亦同於三之隨初動而行斯無眚矣故雖往來震厲上下兩雷往來却億無喪不比二之乘剛掩剛多有喪其陰也有事者動之義象也動則有事有事而後動也然雖有事而隨陽動以應事亦理數之自然也故亦不繫凶咎焉象傳曰震往來厲危行也五如二之乘剛近陽焉得不危然隨震而行隨陽行行不危矣其事在中謂得中之位非也四爻陽在陰中上下陰爻夾之動而有事亦無所喪陽行而陰隨之以行為雲為雨且有利矣何喪之有不比二近初陽陽盛而起為陽所摧破震撼也此爻雖在五位全無主卦之義象可見卦五亦不足以槩主卦君位也再繹陰主富之說往往言財貨二四兩爻又繫以億喪有無可以明陰陽義象此其一也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也上六變為噬嗑之上九在噬嗑上爻以陽變陰為震離明變震過明變動何校滅耳之凶繫焉在噬嗑有斷獄之象義故上處極而凶甚於初焉在本爻以陰變陽為噬嗑震變離明日出陰散震索索然終矣視矍矍然大明也無陰畜陽陽亦無所薄矣無雲則無雷而有日矣此震陽升之極而不能成雲雨之施所以征而凶陽不可過亢也於是震不在此而在鄰指下卦之震言此無雲無雷陰陽開散有有雲雷處陰陽結聚而成雲雨彼處陰陽相動如婚媾然陽雖為陰伏而開破之以出仍挾陰氣升於高陵為雲雨以施利物之仁此雷雨作而為解也故雖開陰而實和隂何咎乎唯不能和隂至於陽亢必不于躬于其鄰别成婚媾則為不得解之象義於是震為空雷不雨矣又云有言者婚媾有言婚媾之先聲也如雷為雲雨之先聲陽初開陰而為雷後方和陰而成雨無咎者空雷亦無咎將為别處雲雨之婚媾此處雷聲象有言為鄰家婚媾媒妁耳聖人繫辭有如此爻最難繹所謂辭有險易各指其所之非細心玩之不得象傳曰震索索中未得也陽在陰中亢不和陰故未得有雲雨及物之功而即索索歇聲矣雖凶無咎畏鄰戒也足以因鄰致戒亦先聲之義也婚媾者天和也鄰戒者天威也各有義象辭傳不妨各指其所之也此爻乃震極陽出而過亢者以上外卦三爻雷之洊至者非初起也凡雷之發聲以初動為陽出之機後皆洊至之雷矣故外卦三爻四陽爻為遂泥五近陽亦不致喪上則陽極陰散矣合內外卦觀之形容雷之始終何其詳明乎外卦仍以四爻之陽主之五六附之成卦震雖遂泥亦震也但不如初之始出奮發耳且雷至發聲之後亦無取於擊搏矣五附四而陰積不厚上則亢陽不能畜陰成雨矣卦辭彖傳言震之終始於四時流行也爻辭象傳言震之終始於一時聚散也震之象義盡矣然多就天道言不言人事不過借天道以明人事占者何妨以天道推求人事乎為初陽為四陽孰強孰弱何以强而不使失和弱而不使之沈溺為二陰為三陰為五陰為上陰孰厲孰無眚孰有喪孰無喪何以妄乘之而致於喪貝何以知厲而不使之喪何以隨行而免於灾眚何以和之而能成婚媾此皆人事之體天道以前其用者也學易者每卦每爻必求自得於心勿隨俗附和一無自立方稍能寡過也艮下艮上艮艮亦八經卦因重成卦者無所繼根於乾蓋綜乎震而皆男也以一陽止於二陰之上為少男少男何反止而靜長男何反震而動乾之陽至艮而止如人老年生子陽將止於是矣故靜也以下二陰墜之無能升矣陽性皆動伏於陰下必出而震然升之極必反而降陰即不墜亦降也陰又墜之使降此天地之氣化自然之理數故有此自然之義象焉先天位之於西北後天位之於東北較震俱在東方有難解其相通者先天位之西北重在山澤通氣山地屬而附近於坤之北也後天重在成終成始艮陽升而降降者必復升升而震矣先天言對待後天言流行也對待中言通氣亦流行也流行中亦有對待乾坤不用而用六子三陽俱在東北隨乎乾三陰俱在西南隨乎坤亦明其對待也至後天方位置坤艮正對坤在西南艮在東北坤致養萬物以成兌悅艮終始萬物以發震動震兌之出入乃坤艮成之者也故乾為陽為動之體震為動之用坤為陰為靜之用而艮為靜之體也其根於乾而一陽止於上即所以體乎坤之二陰者在乾為統天在坤則順承乎天艮之一陽二陰亦可見統順也此天地之氣化也若就人論艮則人心之性耳一陰一陽之謂道繼道者善也陽之動也善所存者性也陰之靜也道中一陽動而生萬物由靜而動也萬物形質具而性畀焉由動而靜也然成性為陰而由繼善以成性非陰統於陽乎陰既成性而又發動為情陽又以陰為體矣故艮之體乾言性之命於天也未言及情之根於性也總不外動靜互根相為體用而必層層辨之則體用動靜三才之間俱曉然矣聖人作易乾坤之後叙水火以結上經次叙山澤風雷相交以為下經之首次叙震艮於中為陰陽動靜天道之化機人心之本性存乎中者言也震言其發而為和艮言其未發為中此象義又在本義所謂止於此當止之前矣即此未發之中而止焉即是至善何也繼之者善也成之者性也性本是善之所成無一毫後起外鑠相雜渾然無欲粹然至善此乃天下事物至善之本而天下事物之至善又散見於萬殊者也止於一本則萬殊不能越矣故聖人心通一貫原有一理該萬理者在心所以萬殊歸於一本皆得相合也得此為止焉易學也是養聖於童蒙而不失為大人者也天下後世言學者無論正學異端皆本於此本同而異端故曰異端端不必就見於言行方異即此未發之中處端即異矣告子之以知覺運動為性不知有至善在心矣後之釋氏宗告子者也老氏之學則知以心性為本似是率性以為道然廢修道以為教矣究之不修道而率性者是道與否未可知也言無欲觀妙有欲觀徼俱從心觀然徼有公私邪正徼不得公正妙者不妙矣非聖人修教學者遵之格物窮理以辨於始正心誠意以要於終何以治此心全此性乎此二氏雖似以心性為同然同而異即在心性中各見其異焉唯聖人命性道教一以貫之為可以成已可以成物至正至全之儒學耳故聖人示人既貴於識一本為體以主乎萬殊尤必通貫乎萬殊以全此一本知艮之為性尤必知盡性由於學焉性與道原是內外本末交相培養率性修道曾不可廢其一也特不可玩物喪志徒恃口耳以為博洽此固非艮之止於至善以為本性且非聖人傳乾卦爻忠信進德修辭立誠廣業之學矣故本性原為至善知而止之其本也學於事物各得其至善而合之於性以止於至善萬殊而一本也究是歸於性之至善而止之耳非原有此至善之當止在心何以為止之一乎故得止必先知止大學所謂知止後有定定後能靜能安能慮方能得也而知止又必格物致知各於事物之至善求合於性之至善方能知止方能得止矣務期存之為中者發之為和發而和乃不失其中則由艮而震矣艮者靜之中震者動之和也此所謂得止於至善而不遷也乃釋氏於此言無知無得全與聖學相反無知無慮也無得無至善可止也是釋氏言止但能定靜安而不能慮故無所得也何所用乎老氏之言無為亦知以靜為止但率性而合道非上知不能不知修道成教仁義外有何性乎此所以雖為異端而所見於本處亦未同也大槩釋老二異端其學雖俱本於艮然並其本已非矣其餘尚多更不足言體用動靜不合於震艮即不合於乾坤即不合於易矣不合於易則非道非學矣烏知性乎學易者能於此二卦細心靜玩有得方可言性言道言教言學也艮其背不獲其身行其庭不見其人無咎彖辭云艮其背不獲其身行其庭不見其人無咎本義謂人身惟背不動以象艮止愚謂震人情也艮人性也震是心之發動艮是性之本體言背者人之一身面為陽背為陰背在陰中陰靜而得中之處即性也以可見者形容不可見者耳能止於性之固有而一身衆體皆統於是不獲其身者求於身而不獲求於心而自得矣蓋謂全性之學當以主靜於心為要非於口耳聞見有所泛騖也主靜成性之學既能自得則出而應天下事接天下物雖動而不離乎靜以靜御動事物雖有若無矣故行其庭不見其人如無人也此以靜宰動由於全性於心在己不以身之耳目聰明是恃在外不以事物應感為擾此聖賢治心成性之學也如此而後體全於內自能用當於外動靜行止皆無咎也本卦言心學以性為靜體以事物為動用由艮其背不獲其身性立靜體說到行其庭不見其人動本於靜以致用也因思震卦彖辭震來虩虩笑言啞啞震驚百里終歸於不喪匕鬯乃由動而反乎靜也如震雷之動而主靜者且不喪匕鬯可知平日艮背之止堅定莫移矣二卦相綜一動一靜分任存發互為體用艮為心學震何嘗非心學乎且不合觀二卦則艮之心學多為異端假借合觀震艮動靜聖人之成己成物率性修道俱有全功矣如後世陸王之學亦本於艮但能知艮之體為震用之主而不知震之陽動生萬物者散著於事物之間各與無妄廢乎學則不能悉明乎萬殊何以合為一本乎恐靜止為體亦因震動之用不明而未能悉當則失和究為失中矣此異端之弊也彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也彖傳釋卦名義曰艮止也一陽止於上二陰奠於下為止之象而萬物成終於此雖云成終復以成始必竟止於是以成終然後成始所以謂之止而又不可謂之常止時止則止也時行則行也止所以為行之體也行所以行止之用也止為靜體行為動用動靜二者在氣化亦不能自主隨乎時以為動靜而已時者天道也即乾元也乾元至此止而成終復行而成始乃統天之陽隨時為流行者也天道乃陽道也光明何如乎藏之則至祕發之則至顯聖人之止靜行動以德性退藏於密者發為事業光大昭明亦如是而已矣唯其性命於天道率乎性故能與天地之氣化同其止行而不失其時此時中之聖德也若夫學者因聖人修道為教遵焉循焉必靜止動行為體為用知明處當不違於時則亦得天道之光明聖德之光明矣彖傳所謂時止時行動靜不失其時者正釋彖辭分靜體動用言性學也則動用必由靜體更明矣再詳卦象艮以止為德止於其所不遷之象義也在心則成性存存以為道義之門在事物則有物有則必得其至善為止性也事物也內外各得其所止則性之理與事物之理合而為一矣雖分內外而至善唯一止其所亦無二焉是以學者本忠恕以求止聖人一貫能得所止焉學者與聖人亦無二止也故艮之內外卦上下六爻陽與陽對陰與陰對無相應者是無感無應如性定於內喜怒哀樂未發之時所謂中也心與事物尚未相與寂然不動之候唯有存養之於冲穆無朕之內耳存其心養其性專意於內治並不獲有己之身矣能止於靜如是及事物之來感而通焉紛應悉當時措咸宜行其庭而不見其人動根於靜雖動亦靜之義象卦辭言之昭然矣無咎者以全乎心性之固有以合乎事物之定則庶免於咎而非有所加損為也故不曰吉亨焉象曰兼山艮君子以思不出其位象傳曰兼山艮二山兼叠止於所止下艮為知止上艮為得止其所而不遷也大學亦是此兩層意君子體之素位而止固然然必先明理而後能精於思思審而後能處當是能得止必由於能慮乃知至善之所在而止之也惟用思焉思不出於位位必先明所當止如兼山之止先求知止而得止後方安於應止而能不遷也夫思出於心至善之理亦具於性君子之思不出位無泛思亦非虛想也以吾性至善之理與天下事物至善之理相遇而求其相合以此為知止以此為得止始則思之專繼則守之固久之自殊途同歸百慮一致矣究不外於以心之知求性之理以性之理酌處天下事物期當於理而已矣得止而聖人安之君子勉焉學者所宜知從也初六艮其趾無咎利永貞象曰艮其趾未失正也初六變賁之初九在賁初以陽變陰為賁繫以賁其趾趾初飾也舍車而徒棄貴就賤安於所止之義以不飾為飾也合於義即止於賁矣在本爻以陰變陽繫以艮其趾而曰無咎利永貞下卦止初不輕於動即無咎以其變明體為賁飾故戒以利永貞必先求知止而後得所止之處也必永貞而後止於至善不遷也象傳曰艮其趾未失正也初能永貞則能安於正也安於正即安止耳六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也六二變為蠱之九二在蠱二以陽變陰為艮明體變止不可以幹父蠱惟可以幹母蠱然又不可貞固也巽變止易於膠執之義也本爻以陰變陽為蠱二在下卦腓也腓不自動股動而不得不動不能拯救於隨股之動也欲其止而不能止故其心不快蠱以動為能幹變止則戒以不可貞艮動則失所止故以不拯而隨乎動為不快也象傳曰不拯其隨未退聽也不能退而聽命於三以成艮止之體德也不繫凶咎隨股為凶咎非其所主耳九三艮其限列其夤厲熏心象曰艮其限危熏心也九三變為剝之六三在剝之三以陰變陽為艮繫以剝之無咎坤順體變艮止雖隨衆陰為剝然止於三以限之矣故無咎在本爻以陽變陰為下卦之主爻亦知求止而安也然所據之止則有定限不知至善無定而止亦無定如艮以限則反不能得至善之止而止之矣取象於列其夤夤者身所止之下體也列者定位也執有一定之位而居之不移恐以非至善為至善而止之則必危而不安矣熏心者焦心也止不能止而又執固於限其憂心而不能自得無從容安止之樂明矣象傳曰艮其限危熏心明不得其止其身不能安而心神亦不寧矣以上內卦三爻艮體雖以三爻主內卦然俱不能得至善應止之所也初求止者方知止也二不拯其隨者能知止而不能安止也三能安止而所止又非至善之應止也故皆有不美之辭是以以上卦之止為止之終故上主通卦焉六四艮其身無咎象曰艮其身止諸躬也六四變為旅之九四在旅四以陽變陰為艮繫以旅於處得其資斧我心不快止體變明得止矣能暫而不能久故為旅處雖得資斧而其心終不快蓋旅非可以久安之止也在本爻以陰變陽為旅四附上卦止體知止而能得止矣故有艮其身之象得止則無咎然身之止雖得至善果能安於止而不遷乎恐未知久處何如也彖傳曰止諸躬也身雖得止而心之安勉尚須再驗耳六五艮其輔言有序悔亡象曰艮其輔以中正也六五變為漸之九五在漸五以陽變陰為艮繫以鴻漸于陵者艮山之象也婦三嵗不孕者陽變陰為婦止而不能進有不能生育得孕之象終莫之勝者雖變止德然終為巽體如風之暫止必動動則漸進矣故吉在本爻以陰變陽為漸繫以艮其輔者漸能安止在面惟輔誠中形外也言有序悔亡者輔近於口理得心安辭必有序也由勉及安學之序治心全性必有漸也聖人自然得止賢人君子由知而得由勉而安由安於止至善久而不遷終始於止無躐等而漸進悔斯亡矣非同尚口之窮也象傳曰以中正也五得文明柔順之中正以此能知能得所以漸久於安止也五變巽有漸進之象義故云言有序序者由知而得而安之序亦兼漸義也上九敦艮吉象曰敦艮之吉以厚終也上九變為謙之上六在謙上以陰變陽為艮繫以鳴謙謙之極而有聞於人也利用行師征邑國變止則謙於己恐見輕於人振威德以飾謙之終輕也本爻以陽變陰為謙乃本卦上卦之主爻亦即全卦之主爻陽為止主變陰則成順德順以安止又在艮極敦固於艮乃得至善為止而安止以終者也吉可知矣象傳曰敦艮之吉以厚終也坤德至厚艮變坤以厚德為止即以止為艮之終其無不敬而安所止者乎知止得止安止久止至上爻方極其止能安於心於身而性命於是全道教由是而出矣以上外卦三爻均貴於知至善應止即當得所止而安焉也四得止也未能久而安也五得止也漸能安而未要於終也上爻則主乎內外卦為止之極知而能得得而久安於止者也故艮卦以上爻為主極於靜以立體也及發為震初爻必能致用時措咸宜矣艮震相為存發一體一用即天地氣化一陰一陽之道也所以艮位東北而震位正東相從而定位也再就心學之簡明者言三教同原於艮聖人之學以天命為性以率性為道道內即兼成己成物又復修道為教以治乎天下並傳於後世此聖學也老氏之學天命為性率性為道以成乎已人人皆有性可以各率為道即無為之德無為之政也我不為修教人亦不知悖道此老氏之學也釋氏之學天生人有心心有靈明靈明即是性見此性便了悟既了悟此性生死平等無道無教無率無修己物俱無何所用成此釋氏之學也俱從靜體上立根而端大異矣艮下巽上漸漸歸妹相綜成卦三陽三陰分根乾坤而漸則繼困主陽根於乾也困之極而漸以出困矣困之為卦澤不下降水不上達所以為困漸以上風下山為卦風行於山何以解困乎蓋澤之所以不下降者陽不能墜陰使降也風行而陽氣鼓蕩則澤必降水之所以不上達者陽不能流動於隂中也山止而陽氣充裕則水可達此漸之所以繼困也且澤無水為困就天時言似交冬以後雨澤稀少水泉涸竭之候蓋冬令者陰盛陽微藏於陰中養陽者陰也而閉陽者亦陰澤水皆陽所化也陽氣微故雨澤水泉俱不能盈溢自然之理氣也必陽氣既足勞乎坎而一陽生漸至二陽生而為艮成終於丑而成始於寅陽氣始能漸上於陰也艮之卦一陽在二陰之上位於東北丑寅之間亦一定之象義也陽氣既漸上矣風先動於雷動之前陽未能透陰而出地風先欲開陰而上升是以風山為漸繼困者冬盡而漸啓乎春令矣無澤無水為困風山無澤無水何以濟困不知此正所謂漸也陽氣既行風為澤之先聲陽氣布散於上一得兌陰而澤降為春澤山為水之高源陽氣流動於下一得震陽而水發為春水春澤春水解冬令之涸寒暢春令之和暖其象義何嘗非共見共聞者哉當春何以得兌陰乎兌陰即通於艮山中陽氣行而山中之兌能與艮通氣山作雲而澤降雨矣此兌之陰也所以漸卦主陽賴漸以蘇困而生意勃然矣再繹本卦象義長女歸於少男巽艮相遇而成婚媾然則主婚者長子震陽也以長女配少男何取女歸之象蓋陰至春已卸事陽至春方行令故取象女歸焉陽氣之動以震陽出地為動則俱動風上升於山乃震陽將出地之機故謂之長男主婚居中合巽艮之交俾成終於艮者漸齊乎巽皆賴震帝之出而居中且以次第流行者為配偶矣此先甲三日後甲三日蠱彖辭用震動以幹蠱之說故復明於漸以蘇困用陽也其明切如此非自然之象義何能不待安排而悉具乎漸女歸吉利貞彖辭云漸女歸吉利貞有天地有男女有男女有夫婦夫婦之成自少始至於老而又為父母又生男女又為夫婦生生不窮與天地同此漸之義象也於兌艮相遇成卦明之者巽長女艮少男女已過時男方將壯如春令將布冬令已卸也陽氣漸盛漸之始也天地之大德曰生既合乎天地之德何弗吉乎又云利貞者男女居室人之大倫初結婚媾以至終身五常百行於是肇端治國平天下於此起化非貞而正何以致修身之驗彰刑于教哉始正則無不正由一心一身一家正而國與天下無不正漸之終也其間先後而施之本末而暨之漸之次也彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也彖傳釋卦名義曰漸之進也漸而之焉斯進矣風行山上陽漸以升立德建業漸以髙明光大如風之上山漸進之象也陽氣升無所見觀於風而可見矣德之升不可知觀於事業而可知矣此漸之義也女歸所以合此義而吉者女長而歸由幼稚而及笄方嫁亦成於漸所以為婚媾之正而得吉也以婚媾推之女之從夫臣之事君一義也夫人幼學壯行道成德立年四十方强仕進而得位則往而有功位非苟得進非幸遇以漸而致所存者裕矣然學至則君求非枉道以干世初進以正則邦國咸賴以正矣上至君公下而黎庶無不待正於得位以正之君子焉故得位也有漸而正邦也亦有漸本漸而道成德立且漸而君可致民可澤也此俱有取於漸之義象也更為明其卦體其位乎卦之君位者則有剛中之德者也更為明其卦德以巽進而又不皆輕進必本艮止靜正之道以為進是志在止而有不得不進之時勢以此動而上升所以無致窮困而通達可卜也本止以為進漸可知矣即耕莘釣渭之賢亦非遇主於巷其所以際㑹而登陟者亦有漸也立德有漸則得位雖驟亦不為不漸矣言不窮則不困更可知矣漸以長女配少男似非歸妹之正此外卦下爻六四主巽而有漸於木之象然女以歸人為安得桷可安則安女之相夫男之宜家在德不在年之老少也此義象亦細玩方得象曰山上有木漸君子以居賢德善俗象傳曰山上有木漸木之生於山自萌蘖以至成材漸之進也君子體此以居賢德居德即敦崇其德也藉賢人之德為他山之石以居自我之德與賢思齊也亦髙山仰止之義也德既成於己必能成於物因以善乎居里之俗俗之本善者漸至盡善俗之不善者亦漸善也此君子以居德之善善乎居之俗也此時天下之風行猶未廣也如風在初春雷未出地風上升行於山而止也及進得位而正邪則一國與天下之風俗皆君子善之矣如雷出地而物得無妄寧止善一鄉里之俗乎此亦漸由近以及逺之象義也初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也初六變為家人之初九在家人初爻以陽變陰為漸繫以間有家悔亡初有家而能間漸可以無悔矣在本爻以陰變陽為家人漸之初取象於鴻之漸干鴻陽鳥也隨陽往來漸卦主陽故象以鴻凡鳥俱屬陽鴻尤易知其性屬陽故以取象干水之涯初進之象小子厲者在下則為小子初進則危厲也有言無咎者漸也有言通其誠漸進必有功矣何咎乎象傳曰小子之厲義無咎也小子在下而進故厲然士之求仕也義也故不可以厲為咎也象少男而得長女婚媾之禮先通其誠於言得禮即合義矣六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也六二變為巽之九二在巽之二以陽變陰為漸繫以巽在床下用史巫紛若吉無咎巽變止止而不進故象在床下不進者疑也陽變陰也惟史以考古巫以質神紛紛並用而釋疑可進矣故吉且無咎在本爻以陰變陽為巽兼巽義繫以鴻漸于磐飲食衎衎磐者水中之石安止於得止之所也衎衎之樂與坦蕩蕩同曰吉不在進不進得位不得而皆樂在飲食磐澗之中也象傳曰飲食衎衎不素飽也君子家食而衎衎自得如此則進得位而正邦豈素飽之人乎不干祿之心即不素飽之心耳此爻乃漸進得止而無所疑者正與巽二爻以相反者相通也九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也九三變為觀之六三在觀三以隂變陽為漸繫以觀我生進退兼漸義而不輕進退必審明勉進以自慰也不言吉凶進退未可知耳在本爻以陽變陰為觀繫以鴻漸於陸夫征不復婦孕不育凶何以哉漸之為卦以止為進三變艮止為坤順觀望於進失乎以止為巽動不窮之義矣夫征則不復妄進也婦孕則不育無女歸利貞之道也凶可知矣然君子不輕進惟有冦至則可以急義赴難利禦之也雖進而失漸亦深合於事君之臣道也象傳曰夫征不復離羣醜也變坤則三陰並處不能以一陽止二陰矣婦孕不育失其道也謂失乎女歸貞吉之道乃妄思奔從之類也所以孕子不敢生而育之失夫婦之道則失母子之道矣利用禦冦者變坤合乎臣道至順之德為義勇以保邦國即躁進亦不為過也以上內卦三爻艮止之體德以止而主乎進初許其進不仕無義也二不干進止以為進之正也二得中故能如此三爻一陽止二陰變坤順失其正矣故惟從急難斯為可尚焉三爻言夫婦本於卦辭之女歸吉見婦道臣道相通在艮以三爻主內卦變陰則不能止陰且失夫婦之義象矣惟利禦冦仍以陽止陰方合卦體德也離即麗也變坤三陰比附故為離於羣醜陽不能正陰也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也六四變為遁之九四在遁四以陽變陰為漸繫以好遁君子吉小人否兼漸義而為遁君子知漸而遁小人不能得漸之道何能遁哉在本爻以陰變陽為遁繫以鴻漸於木或得其桷無咎四位近五在外卦為風之主爻不得不進於木非所止而得桷亦可安焉如仕而不得正位者然事君之義不可避難就易避危求安况得桷焉何咎之有象傳曰或得其桷順以巽也乃順乎巽進之道者也故無咎耳四何以言順哉六四在巽之初即坤元之象位也故曰順以巽也九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也九五變為艮之六五在艮五以陰變陽為漸繫以艮其輔言有序悔亡兼漸之義艮而漸艮於輔誠中形外盎背而粹面也然非尚口也其言有序故悔可亡德主於內而言皆當理非尚口給之佞也在本爻變陽為陰為艮繫以鴻漸于陵婦三嵗不孕終莫之勝吉巽風日升而漸髙故曰漸陵婦三嵗不孕陽日盛而陰日衰矣惟其變艮止故如此然終莫之勝必有陰生之時則孕矣故吉巽進於離則陰生三陰足而孕於坤矣巽純陽之位坤三陰之位也象傳曰終莫之勝吉得所願也男取女歸原為孕育自艮而巽而離而坤萬物皆致養焉斯孕矣且說言乎兌至兌各正性命皆漸之象義也萬物皆說矣故曰得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也上九變為蹇之上六在蹇上以陰變陽為漸繫以往蹇來碩吉利見大人同漸義以上爻位在君上來為碩德之人輔君濟蹇利見大人五與上以德以位言皆大人而彼此可以利見為交益也在本爻以陽變陰為蹇亦同蹇義繫以鴻漸于陸其羽可用為儀蓋髙尚其志不在仕進為臣之列而有德有謀可以匡君濟世者也如鳯之儀於天際其羽可用為儀而不可以凡鳥畜之矣此其吉莫大焉象傳曰其羽可用為儀吉不可亂也儀者儀刑也其羽為儀備禮樂之用也禮樂國之大事聲德而奏功者也君子之身不可羈以名爵而其德謀可以資禮樂功德之成豈可紊亂其儀既用而不能從乎傳蓋言用賢之儀者多而能用其所以為儀之德者恆寡用其文而不用其實悖乎其德即亂乎其儀矣言之於上爻見雖知用儀而不可亂亂則德不能師其儀何能獨益於國乎此聖人見行可之仕終有憾而悲天憫人故言之也其所以戒後世虛文繁禮用賢者深矣外卦三爻巽體皆取進以漸為正乃是止以為進之義也四進不避難隨位而安外卦之主爻也五陽升正位陰氣漸微有君自以為賢不足用之象誠能用賢如二陰柔中正者則終勝而孕如得好逑之妃后也上則陽升於極髙風可仰儀型君國者不可終亂為時君言亦為立德而名彰道髙而望重者示戒也亂於終果何德之可成哉此皆漸義也立德立位進必有漸而德既立位既升尤不可亂焉必勤於始以戒於終何嘗非漸之次乎巽體自以四爻主外卦五與上兩爻皆附之成卦者然四變乾剛則危故傳以順巽明之巽木於順斯能得桷可安也故主外卦見女必歸男為安之象義五變艮止而以反巽為吉雖云與二正應亦是附四之陰為陰卦終吉也上以變坎為蹇仕路蹇而道自流行於飄然長往中自有沛然莫禦之象故世之用之祇可得其羽為儀耳亦吉者羽者乘風方行如道必賴位以行亦以附四為象義也是以四爻為外卦主爻也合之內卦之三爻各主內卦外卦而成漸焉大易通解卷十
