body:
  text: 大易通解附録讀啓蒙雜説朱子答袁樞曰大抵聖人制作所由初非一端然其法象之規模必有最親切處如鴻荒之世天地之間隂陽之氣雖各有象初未嘗有數也至於河圖之出然後五十有五之數奇偶生成粲然可見此其所以深發聖人之獨知又非泛然氣象所得而擬也雖繫辭所論聖人作易之由者非一而不害其得此而後決也他日又曰河圖洛書於八卦九章不相著未知如何也朱子既以為聖人作易之由者非一而歸主於河圖又以為不相著則後之學者正不必指定伏羲耑主河圖畫卦矣不妨照朱子之歸本於圖以見其理數通㑹更不妨存朱子不相著不知如何之意而不過為傅㑹求合也天地定位章本義作二節邵子作一節邵子曰此一節明伏羲之八卦也八卦相錯者明交錯而成六十四卦也數徃者順若順天而行是左旋也皆已生之卦也故云數徃也知來者逆若逆天而行是右行也皆未生之卦故云知來也夫易之數由逆而成矣此一節直解圖義若逆知四時之謂也又云自震至乾為順自巽至坤為逆邵子兩説即有不同前一説左旋右行是通圖左右旋行後一説為順為逆似是分為左右然自震至乾自巽至坤未嘗不皆是左旋順數甚易惟將知來者逆一句亦作為言象數則順數逆數俱不通矣倘分數徃者順一句言象數知來者逆一句言義理也則不必俱以數言而必數其一二三四五六七八之數矣邵子本以傳語證其八卦横圖六十四卦方位圖以見其説有本耳斷不可謂伏羲卦圖當日有一二三四五六七八之數亦斷不可謂孔聖作傳時順逆皆以數言將知來一句亦謂之逆數其數也故邵子横圖有一二三四五六七八之數祗可在横圖中明生卦之次序斷不可以其數數伏羲卦位若依其數數卦位無論左旋右行俱不能通祗得中分為二非自震至乾逆數一半自巽至坤順數一半即自乾至震順數一半自坤至巽逆數一半矣易簡之謂易聖人無此扭揑之辭安排之智也愚寜得罪於世之學者不敢得罪於孔聖是以妄繹數徃順者自震至乾自巽至坤由一陽至純陽一隂至純隂隂復生陽與後天卦位自震帝出至艮成終成始而復帝出其象數道理俱同孔聖確見先後天原有同揆故立傳以明之若邵子自引傳以證其横圖朱子自引横圖生卦次序以證其有四畫五畫之卦非聖傳專釋羲帝卦圖之正義象俱作另一義觀可耳學易者於兼象數處專言義理乃於此二句分言象數義理者却專言象數愚故不敢廢全而遵偏也至知來者逆一句愚謂即在數徃者順一句中數可以用手指目視而計之知必用心神黙契以通之因數已徃至順之象數即可知未來至逆之義理而禨祥禍福不必論自有無過無不及之準矣得之者吉失之者凶故又云易逆數也其數至順而可前知非逆來之義理即在於順徃之象數内哉不曰理而曰數者易原兼象數以言義理以可見求不可見故曰逆數耳此愚確遵聖傳立論也説卦傳第三四章本是一章以明先天八卦之象義天地定位山澤通氣雷風相薄水火不相射是置八卦之方位相錯是交錯而生六十四卦本義引邵子之説以釋之甚正本義如此則啟䝉内四畫五畫層層加至無窮盡之卦是推衍之另一義其與聖傳無涉可知矣聖傳數徃者順知來者逆是故易逆數也三句本義謂起震厯離兑以至扵乾數已生之卦也自巽厯坎艮以至於坤推未生之卦也本於邵子邵子以傳證其圖者本義乃引之以釋傳矣然孔聖作傳乃就先天卦位立言不就横圖生卦次序立言謂横圖為初生卦之次序則可謂一二三四五六七八為置卦之方位則斷不可也雖其象數理義亦有相通而八卦方位圖未嘗照横圖次序置卦二圖必不可執而一之明矣如河圖者與伏羲畫卦朱子尚謂之不着况横圖乎河圖横圖卦方位圖各圖各論為正易逆數也一句且合象數義理為一矣象數是現成可見得故可以順數義理是在象數中不可見者於順數象數之中方可推測故順數逆知也然象數之設原欲天下後世學易者知其義理明其吉凶預為遷改以成趨避數雖順數而重在逆知故曰易乃逆數聖人曰辭逹而已如此釋傳至明至順聖人必不為順數四卦逆數四卦左右旋行安排造作以示惑也邵子朱子之説謂之各就所見另成一義則可謂之釋傳正義則執矣大易折中聖祖御案内亦謂朱子之説是另有所見可見聖天子聰明睿智無不洞徹蓋聖人之傳至易簡也天地定位一節是八卦方位之體雷以動之風以散之是相薄之用雨以潤之日以晅之是不相射之用艮以止之兑以説之是通氣之用乾以君之坤以藏之是定位之用論八卦之體卦位也而定位氣通相薄不射即為用矣論其氣化生成萬物則定位通氣相薄不射又是體而動散潤晅止説君藏又是用故三四二章是一章明先天八卦方位中有此體用中間數往者順三句説到因方位而得其象數因象數而得其義理因義理而有吉凶因吉凶而求趨避所以見氣化在天地無心在聖人作易以前民用有心而合於天地之無心也故項氏亦有合雷以動之為一節立説者亦不害其各成一義雷以動之一章言用如神也者妙萬物而為言者也一章言用也傳釋先天卦位兼體用釋後天卦位亦兼體用俱先明其體後明其用先天父母六子同言用而乾君坤藏未嘗不是用根於體可知釋後天卦用言六子而不言乾坤乾坤體用即在神也者句中而末句復統父母六子以變化成物言用何其與君藏之義深合乎即照邵子所言申明亦不相悖但萬不可拘一二三四五六七八横圖之次序如一牽混便再不得明矣祗就本圖隂陽竒偶之已生未生以為左右順逆便曉然矣其左順右逆案謂向天左旋即是右行向天右行即是左旋更為明白折中内御纂案語伏羲畫卦時並無横圖所以不必拘一至八之數但就隂陽竒偶以為順逆為是邵子所謂順天左旋皆已生之卦即章氏所謂自乾純陽歴兊離至震自坤純隂歴艮坎至巽也已生之卦謂生震一竒而後生離兊二竒以逓生三竒之乾故謂之皆已生之卦其所謂左旋却是右行邵子所謂逆天右行皆未生之卦即章氏所謂自震一陽以歴離兌以至乾純陽自巽一隂以歴坎艮以至坤純隂也未生之卦謂離兊二竒後于震一竒乾三竒後于離兌二竒也坎艮二耦後于巽一耦坤三耦後于坎艮一耦也故謂之皆未生之卦其所謂右行却是左旋故案中謂已生未生為指隂陽言蓋卦者因隂陽竒耦而有已未生耳案又謂邵子左旋右行與歴家所言義正相反所以章氏説與邵子合而朱子之説案亦謂之自為一説也易逆數也一句照愚説亦大合蓋自震至乾自巽至坤四時之序隂陽消長之顯見者故曰順乃數而可明于往者也自乾純陽生隂坤純隂生陽皆隂陽相生之機妙正是交易變易之謂易逆而求之方可知來者之大過不及天時人事舉兆于斯所以謂之逆數也案云左旋右行邵子所言與歴家相反愚照邵子所言釋左旋右行已生未生指隂陽竒耦而論另有一説似亦可謂之與歴家相合自震一竒歴離兊二竒至乾三竒左旋順天也有一竒而後有二竒以至三竒是因一生二二生三非已生之卦乎自巽至坤如之數往者順也自乾三竒之陽生兊離之一隂兊離之一隂生震二隂生坤之三隂坤三隂生艮坎之一陽艮坎之一陽生巽之二陽巽之二陽生乾之三陽三陽復生一隂非未生之卦乎知來者逆也右行逆天也似與邵子説無悖易逆數也一句亦可就逆推而知順數立説往者無窮然皆氣化之可見來者亦無窮然皆氣化之可知就可見之順以推可知之逆易之所以以變易交易而成不易也專就隂陽氣化以明象數亦未嘗不可以因象數而求義理即如邵朱二賢專釋聖傳以象數俱可通㑹焉此愚因世遵宋儒已久故遷就而申明之俾宋儒説合聖傳羲圖也然究以前説為正義象耳邵子又曰太極既分兩儀定矣陽上交隂隂下交陽四象生矣陽交于隂隂交于陽而生天之四象剛交于柔柔交于剛而生地之四象八卦相錯而後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大則愈小愈細則愈繁此説亦是自解其横圖啟䝉亦引之以明大傳天地定位章愚謂横圖是説畫卦之始不是説定卦之位似難以彼釋此蓋横圖是未有八卦之先生爻生卦次序先天卦位圖是有八卦後位置之以明隂陽消長之次序理有相通而義則各别耳邵子又曰陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中則皆順行此真至之理按圖可知之矣此説正是釋大傳所言先天卦位圖中順逆也故曰按圖可見然必須論以明之圖中自乾至震其卦畫皆陽在下隂在上故曰陽在隂中自坤至巽其卦畫皆隂在下陽在上故曰隂在陽中所以其卦皆逆行反是則陽在陽方者與隂在隂方者皆陽在陽中隂在隂中為順行可明矣震至乾陽在陽方也巽至坤隂在隂方也所謂陽在陽中隂在隂中也以此證之愚之前説亦大與邵子相合又云真至之理可知象數中理義為之主末句云易逆數也言象數而理義在是矣帝出乎震八句聖傳釋後天八卦方位萬物出乎震八叚即前章釋先天八卦相錯一句之義釋先天八卦方位重對待八叚釋後天八卦方位重流行神也者一節不必自為一章所以釋後天卦之用也不言乾坤而以神也者妙萬物而為言渾之神者隂陽不測之謂乾陽坤隂一動一静六子生而萬物俱生者非不測乎惟不測故神在乾坤妙在萬物非乾坤之大用不見其用乎下方言六子之用乃乾坤之用寄之六子以可見者之用明不可見之大用也末叚仍是發明六子之用更明其本於先天以水火相逮明不射以雷風不相悖明相薄於山澤通氣同其辭以明之歸用於變化成萬物在六子而乾坤之用不必更明亦在定位之中矣蓋乾坤定位不止定乾坤之位天地之位定而水火風雷山澤之位俱定矣即於六子卦位中亦可明天地定位其體如是其用外於體乎故聖傳分釋先後天卦位體用如一也此二章本義無多𤼵明啟䝉中乃申明之不用之説始於邵子朱子又推為半用半不用亦如釋先天卦位半順半逆左旋右行之説縂為前賢引伸之另一義均非聖傳釋經之正義也聖傳明云致役乎坤戰乎乾父母未嘗不列於六子之中見氣化之運行有必厯之方位未有卦體既平列於六子之中而無用者至於半用全不用之説更傳無此辭不敢不謂之另一義矣孔聖説卦傳其明後天八卦以帝出乎震八句言卦位而氣化之流行即在焉萬物出乎震八叚正是釋帝出乎震八句至神也者一節乃言後天八卦本於先天八卦位置雖不同而氣化流行生育萬物體用如一也雖邵子謂文王作易得天地之用用中何嘗無體本於先天八卦即以先天八卦為體固然矣而神也者妙萬物而為言一句即後天八卦之體即前傳天地定位一句也後叙六子仍用前𫝊而稍異同其辭結以能變化成萬物一句見天地定位在神妙不測以立體而六子分寄父母之用合之以為能變化成萬物之大用也言用而體存合為大用而體愈著矣邵子有長子用事長女代母之説此言乾坤以不用為用也朱子有四正用而四隅不用或半用之説父尊母親坤猶半用而乾全不用少男進之後長女退之先亦皆不用然男未就傅女將有行巽稍用而艮全未用並艮巽亦言不用半用則與邵説亦未合再揆之大傳先後天俱言體言用朱子之説不知何據祗得謂之另成一義可矣先天畫卦時祗有河圖後天位卦時兼有洛書故後天八卦另有聖人成能處不必定與先天八卦牽合然先天八卦天地氣化之初體以對錯交生為用後天八卦天地氣化之行用而以父母六子分位立體是體用雖各立一義而經緯表裡未嘗不如圖書之共一理氣也以此言合洵大合哉乾坤生六子而寄其用於六子乾坤不同另有大用六子之用又無非乾坤之用所以大傳前段言流行之氣化則自震至艮乾坤亦列於八卦之後後段仍以水火相逮風雷不相悖山澤通氣釋後天六子卦位本於先天更將乾坤定位之義渾在首末句中見先後天卦位雖異理氣同揆也是乾坤之大用原該於内矣雖邵子乾坤有退置西北西南之説然就傳言致役乎坤戰乎乾言之似未嘗退置而不用也故邵子又曰震兑横六卦縱易之用然則後天八卦方位俱言用之義甚明矣况乾坤之隨六子為用者流行之氣也六子皆乾坤之氣所生所行之氣亦即天地之氣即坤之地氣亦統於乾天之氣有一時不用乎至於資始資生之氣正是大傳後叚首末二句所言其大用不可見故言不用耳其邵子乾統三陽居西北坤統三隂居西南正是大傳言六子不言乾坤之義邵子言不用已為大傳所無猶可代為𤼵明至於朱子半用全不用更費唇舌矣總不如照大傳説先後天卦位至易簡無此許多葛藤也故愚謂邵子横圖不可以釋先天卦位邵子乾坤退置之釋後天亦可不必也先天流行左旋起震至乾起㢲至坤自東而西而南而北後天流行帝出乎震至相見乎離致役乎坤以至成乎艮亦自東而南而西而北也先天右行自乾至震自坤至巽是因畫之奇耦三陽生一隂以至二隂三隂由三隂生一陽以至二陽三陽左旋者四時之序右行者隂陽互根也後天一陽之卦俱從乎乾一隂之卦俱從乎坤亦是隂陽互根之義然則先後天八卦雖各有位置而隂陽流行之用互根之體俱如一也如此言合洵無間然至於先天八卦固言體而大傳所謂天地定位體用兼明其義也後天八卦邵子謂其入於用而大傳後段言乾坤該於首末句中何嘗離於體乎此又先後天體用俱備於卦畫位置之中者也以此言合亦無不合邵子言先天卦位曰乾坤縱而六子横易之本也言後天卦位曰震兑横而六卦縱易之用也是明以先天卦位為體後天卦位為用矣言乾坤不用不過因大傳後段末説天地定位耳然神也者句能變化句即天地定位也所言寄大用於穴子六子之用皆其用亦是推原之説乾坤焉有不用耶言不用更為另一義矣何也邵子自己已有兩説矣何必定言不用乎朱子半用半不用之説尊先賢不敢廢之故謂之另一義其實聖傳所無即置之不論亦可先天本也即體也後天用也以先天立體而行用也然先天有先天體用天地定位四句體也數徃者順三句釋之以示占者自明其用也雷以動之一節天地定位四句之用也後天有後天體用帝出乎震一節用也震東方也一節釋之以示學者自明其用也神也者一節體也以體乎前兩節之用者在首末二句渾天地定位一句也中叙水火相逮三句即前傳中水火不相射三句也一如先天以天地定位四句體乎數徃者順二節之用也聖傳分釋先後天卦圖體用明切如此遵之立説以釋傳可也傳外推衍義象自無窮盡然祗成另義而非傳義有無不足擬議矣此愚之謹於尊聖訓亦非敢悖前賢也太極説聖傳云易有太極是生兩儀兩儀生四象四象生八卦未有兩儀先有太極兩儀者天地也太極者生天地者也天地有象有形太極無象無形然已有生天地之氣在矣不但虚具其理也若但有理無氣何以生天地乎聖人立訓從未有天地前推原天地所自生亦極精深矣至宋儒周子又推原之曰無極而太極凡有生於無傳云易有太極自可言無極而太極矣但未有天地以前聖人名生天地者曰太極推原天地所自出也又復推原太極所自出似亦可以不必矣如以無極而太極為二也太極之上不容又有一物也如以無極而太極為一也太極之中又何必多此一名乎若當言太極本於無極聖人豈不知而不言哉抑知之而不言哉推原天地所自生立名取義曰太極既言之矣無極何靳而不言蓋為理為氣至天地至矣推原所自出至於太極已極矣更為推原曰無極而太極若滯於有則反粗淺如淪於無似近虚寂總不如易有太極四字為至易簡而至神妙也况太極者為易言也天地所自生可以不知易所由作不可不明固是以易明天地終為在易言易故云易有太極使人知乾坤始於竒偶竒偶始於太極易所由生即所由作至太極極矣更於太極進推亦祗成另一義而不可以釋傳也聖傳云一隂一陽之謂道乃有兩儀後隂陽既分往來屈伸盈虚消長天地自然之氣化也用之於人隨氣化之順逆得動静之咸宜亦謂之道所以本乎天地之道為民用之道也若夫太極乃未有天地之前理氣渾淪為一者也謂道為太極亦覺有未安然則太極生天地道隨天地而俱生也道隨天地俱生者道之用也如天地生於太極天地乃太極之用也是太極即道之體也邵子之説申明之為甚合兩儀在太極中祗是一氣動而生陽動本於静動極返隂即是生隂静又本於動隂陽動静互為其根故兩儀祗為一氣之往來屈伸耳然屈伸往來即交也交必生矣在太極中一氣迴環以為交而生兩儀既有兩儀又交而生四象四象交而又生八卦天地水火風雷山澤在天地之氣化次第而生本是如此聖人因之作易取象立卦亦照氣化様子畫將出來示人易知所以三代皆以八卦為經卦聖傳即以八卦為萬物生成之終始也因而重之為六十四卦者以盡萬物萬事變化之無窮然祗以卦與卦相盪一畫二畫不成卦仍名曰爻故曰八卦小成必三畫既立始名之曰卦必卦與卦盪以八盪八方名之曰盪不越因而重之四字之義象何有四畫五畫之卦况復有七畫八畫之卦乎聖傳祗言八卦相盪因而重之即邵子横圖生卦次序亦止於八則朱子推衍之説亦為另義矣至焦氏易林衍為四千零九十六卦雖似支蔓然是八卦相盪中所有者何也卦象有定爻變不測故一卦可變為六十四卦六十四各變六十四自有此數亦不過在三畫卦内變動未嘗有四畫卦五畫卦及叠增無已之説也是縱極爻變以定卦焦氏所衍之數易之所有也外此則為易之所無矣一畫二畫不成卦四畫五畫豈能成卦乎不成卦何以傳曰八卦相盪耶可見不成三爻六爻非卦之義矣邵子曰無極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為𣸪父生長女而為姤是為陽起於復隂起於姤也或問於朱子曰無極為何説前答曰邵子就圖上説循環之意自姤至坤是隂含陽自復至乾是陽分隂坤復之間乃無極問無極之前既有前後須有有無答曰本無間斷問先天圖隂陽自兩邉生若將坤為太極與太極不同如何答曰姑自據他意思説却不曽契勘濓溪底若論他太極中間虚者便是他亦自説圖從中起他兩邉生即是隂根陽陽根隂這箇有對從中出者無對按無極而太極較之聖傳亦多一進推乃無極更有前豈不誕哉但其所謂前非前也乃太極中間坤復交際處耳子半之陽所起之位易之坎中也此自在太極中言前者另一義也或人因問既有前後須有有無仍以前後為前朱子曰本無間斷却以隂陽交際處為前矣答問參差亦各成另義而已及問到先天圖隂陽自兩邉生若謂坤為太極與太極不同如何朱子方答明所謂先天圖自兩邉者仍是以横圖一二三四五六七八作先天卦位圖也以坤為太極乃就圖上説循環非太極正體象也太極中間虚者便是引邵子自説圖從中起又謂兩邉生是隂陽互根這箇有對從中出者無對此乃太極正義象也所謂從中出者無對無對即一理一氣也一故無對分隂陽後即為互根已有對矣此説太極甚明則無極即太極中間虚者便是周子所以云無極而太極然既在太極中不言無極如聖傳焉亦未嘗不明也邵子將六十四卦方位圓圖言太極圖故朱子就圖上説循環之意邵子以生卦横圖説先天八卦方位圖以六十四卦方位圓圖説太極圖俱是以自己之意説他人之圖故同異在所不免釋經者須知此則正義不淆於另一義矣勿以為前賢之説不可不信從也然則前聖之説反可移易乎以聖經傳為正義以前賢説合義者亦為正義其餘則置為另一義可矣無悖於前賢也大道為公前賢無容有成心學者無容有成見也朱子本義所遵者程子故多言理義及著啟䝉所遵者邵子故多言象數合觀而叅用之則得朱子之全如分觀焉祗見朱子之偏此讀易者不可不知之論也書範論附録河圖出而伏羲畫卦衍于文王洛書出而神禹叙疇陳於箕子尚書大禹謨曰於帝念哉德惟善政政在養民水火金木土榖惟脩正德利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壞按此乃𤣥圭告成九州攸同之後本洛書以言德政及民由德及政先養後教自古無二道也六府者養之事三事者養而兼教之心也事必有政以正之心必有政以行之其本固在德而用則在政此善政立于地平天成之始神禹則洛書之法而開洪範之基者也今將六府三事按洛書定數分屬于左徳者心也政者事也心本政末六府三事皆政故分屬四正四隅德惟善政政之所以善者乃以徳善之也故徳居中而善著九功焉厚生本五而寄于二厚生者地之道也故寄于土所謂中宫寄二後世術家亦本乎此尚書洪範曰初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰又用三徳次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極今將洪範九疇所陳與九功惟叙之數分屬於左九功所叙乃言書之實數故五寄於二而虚其中以二曰五事七曰稽疑居其徳徳不可以數名之六曰三徳所以主數者也洪範所陳乃言疇之虚理故中曰建九曰五福六極五曰建皇皇極極不可以實形之所極一曰五行以形形者也故九功以徳惟善政居中前後聖賢其四曰五紀三曰八政揆一也八曰庶徴初一曰五行五行者氣也氣者五行之始水數一故統於一餘曰用此不言用者天地之元氣自然而成無待人為焉次二曰五事五事者質也質者五行之始而二乃五所寄萬物由氣而生天也由土而成地也氣者天數質者地數承天地隂陽之氣以生成萬物物有質而五事具焉人得其全物得其偏人得其靈物得其惷此貌言視聽思五官宰乎身心耳目口五形而必敬用之心事又為宰中之主也惟兼踐形方可言盡性惟各正徳方可為厚生耳次三曰八政八政者木氣也有天地水火而木生焉故數三天一生水地二生火天三生木非聖人之言也自有天地分兩儀隂陽而水火即隂陽之聚結者也有水火附於土而生木矣故數居三木者天地中之生氣故數在東而雷動於春百果草木皆甲坼此神禹衍三之數而置之為木箕子陳之為八政而繫之以農焉次四曰五紀天與日㑹為嵗月與日㑹為月雖俱以日計而日之為日則次於嵗月也星也辰也附於天而以日為綱領也歴也數也測於人而以日為凖也此治厯明時所以利民用也天道運於上人事合於下故曰協焉次五曰皇極皇建其有極以徳為守以福為受以皇為建以民人為錫此徳為善政神禹所以明徳者治民箕子以建極者錫福以建言用者立體以致用也中者土也然土乃塊然一物不足言中中無定則故以徳主之次六曰三徳正直人民之各建其極也剛克柔克民以皇建其極者為極神禹之正徳就新言明箕子陳三徳以人民之過不及又於皇極之建中也乂者義也治也故曰克也次七曰稽疑五卜二占五不離二二不離一疑乃岐也稽者齊其岐而為一也惟一故明而不疑矣神禹置金於四金之為義在於決斷故箕子陳疇之七曰稽疑焉再龜長蓍短何以言五不離二非謂龜不離蓍乃謂卜之五亦不離數之二也五二兼而成七除五存二為占除二存五為卜皆不離二兩在故不測而必歸於一二者疑歸於信信孚於誠也此金之所以居西乎愚按五卜蒙者萌也故屬木驛者傳也故屬金克者成也故屬土傳即從革之義以從為革漸而革故言傳焉次八曰庶徴雨𤾉燠寒即寒熱温涼四氣而風行四氣之中猶土在金木水火之中也神禹以榖置之八而箕子陳之以庶徴者庶草蕃蕪乃榖之所以茂盛也言念者啟下文五徴本於五事五事本於五行見視聽言動闗於天無可苟焉次九曰五福六極福言五皇建其極而民與人所㑹極歸極者也極言六三徳之罔能受克者也雖作新在上而自新仍在下此福極所以各至也嚮者休之背者威之此九疇之用也按神禹叙九功所以對帝於平成之後重德惟善政以明徳為新民之本也箕子之衍九疇答武王彛倫攸叙以協下民厥居也故始自五行終於福極而主以皇建其極所以明為新本而又以新為明騐耳九功天人理數兼言九疇亦天人理數兼言九功不言效而功即效也九疇終以福極言效正所以充足皇極之分量焉先天伏羲則河圖畫卦後天文王移置卦位而繫之以辭周公又繫爻辭孔子作十翼源流甚明神禹則洛書叙九功箕子衍之為九疇自言本於神禹授受之真想有的𫝊然自古及今未嘗有顯然以九功分屬洛書九數復以九疇根柢於九功而配合之者是洛書為聖人所則未知終始也余幼聞於先訓如此柰時已遲暮又在憂患恐失其説故乘暇録出以質之通經好古者大易通解附録
