body:
  text: 大易通解卷十四江常鎮道魏荔彤撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義下傳首章仍是申明卦爻繫辭其理數至簡易但歸之于貞則易簡一貞而已示學易者知守貞為用易之本也象至賾也然玩八卦成列知大象盡在卦中矣象又至雜也然玩卦之因而重之則羣象盡在爻中矣爻之變莫測也然統以剛柔二者相推則爻之變盡在二者之中矣至于動而應事接物至難咸得其宜也然有繫辭以命之則凡動而應接之道亦皆在其中矣即吉凶悔吝至不齊也然不過生于人心之動苟玩象觀辭則動皆吉矣易之易簡如此學易者之用易易簡亦宜如此也是易簡非他也即乾陽坤隂之分剛柔者也此乃立天地萬事萬物之本即以立易之本也動而變變而通仍不過剛柔相推而各因其時以明其宜示人知所趨向者也既知時則知隨時有中正之則中正之則者貞也吉凶悔吝不一而貞則無二也吉而貞愈吉凶而貞亦吉也吉而失貞則凶凶而失貞愈凶也吉凶無定以貞為勝故貞勝而吉凶君子有不屑計者矣再觀之天地以貞之道為顯著示人以觀察者也日月亦以貞之道為明照臨萬物者也天下之動何可究極然以貞之道貫之皆以得乎中正為得至善之止而安焉則亦貞夫一而已矣貞夫一者一貞之外無他道也此易以一元統天聖人以一誠立體也由此觀之一本而萬殊者以貞為一太極而兩儀者以易簡分二究無二道也一元不得不分為動靜剛柔故一貞之道亦以易簡分論耳然則貞也元也亦至一無二者也夫乾陽儀也固確然靜専動直示人以至易矣専直者存發也其氣與理皆至實者也故謂之確然夫坤隂儀也固隤然靜翕動闢示人以至簡矣翕闢者開闔也其氣與理皆至虛者也故謂之隤然分論兩儀皆至平易至簡約也貞夫一可知矣作易之聖人列卦重爻雖為六十四卦為三百八十四爻不過以爻效此易簡之理數而已不過以象象此理數而已然則易之為爻為象雖該盡天下之動變亦不過歸于一何多求乎是故爻象動于內吉凶見於外內指剛柔相推不可見者外指爻象繫辭可觀玩者于是用易以立功建業即至于動而巍巍成功煥乎文章亦不過易中變通之理數耳況動作云為之小者乎然則天下之功業皆見于卦爻之變也因而知聖人開成之情俱隨其變動以觀其會通行其典禮繫辭以命之凡辭之所著何非情之所見聖情之所見何非易應有之理數乎中敘此一段者令人玩辭以觀變因爻象以求理數以知吉凶以成功業且層次推原無非乾坤易簡之二而一者也大段又就聖人天地明之天地之大德曰生一元以統天即以一元以資始坤元不過順承乎天以資生天地二雖分而為德則一也總歸之化生萬物于生生不已耳聖人于此其德自立其體其用藉位以行故大寶為位有位方能以天地之大德曰生者為德以行其生生不已之心也然位非可以無本守位有仁仁者元善之良即天之所以統天者也聖人以之守位者以此蓋位虛位也德虛理也有仁則所推者在在皆實心實政矣仁之為道首在愛人愛人則人聚人聚則必各給其財給財則先理財理財則不専用仁而仁中又制以義親踈貴賤厚薄隆嗇各得其宜故仁必兼義而仁始裕也于是天下皆家給人足矣然養而不教等于禽獸于是正其辭則天下無邪言于是禁其非則天下無詖行皆義也其實皆聖人之仁也聖人在位禮樂刑政多端而一仁足以守位乃合乎天地大德生生不息之元也聖人之仁足以該衆理統萬事五常百行咸備于仁是聖心之元善也天地無心而成化為元聖人有心盡性為仁皆貞夫一者也此章原明萬事萬物歸于天地易簡易簡為二而本于一故以天地之德聖人之仁結之見貞一之道天地聖人所同學易者多求乎哉繫辭上傳末章言道不在言辭此章明道不在多也右第二章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情古者包犧氏之王天下也一章即備物制用立成器以為天下利莫大乎聖人之意也略舉端倪槩取諸易即聖人道四以制器者尚其象也繫辭傳率皆反復申明之論此章則又引據列陳更示人推廣于無盡耳蓋取諸某卦亦約略取其象義無事乎過為傅會焉首敘羲聖畫卦之始明其為畫之奇偶取其象于天地則凡天下事物無不有象可取俱于易之內緼之矣仰觀象於天得乾俯觀法於地得坤法乃象之有形者詩云伐柯伐柯其則不逺則即法也故謂法為象之有形者仰觀俯察而得形象何以形容則鳥之親上獸之親下皆天地之類也獸蹄鳥迹天地之大文也而數之事起畫之文得矣不止鳥獸也凡地上之萬物宜于人用者無不取其形象以成爻成卦不言取天之宜者天施地生凡物皆地生天寄其用于地地之宜即天之宜也人立于中一身而備天地萬物近取諸身亦可以成爻成卦身之氣理與天地萬物通能近取身則身外之物無不可取以擬議之矣謂之逺者較身有逺近內外也天地人物之形象理氣無不會極于聖人之心而八卦始作矣八卦既成衍為六十四卦幽則能通神明之德隂之象也明則能類萬物之情陽之形也然神明之德即萬物之情也神明隂也而德則乾元之陽立神明之體者也萬物陽也而情則發于性之隂生萬物之用者也究之隂陽互根且合一者也聖人明體達用故能取天地萬物以為聖人神化之用此易之所以始作因以昭示天下後世也下文遂厯敘取用于易者以申論之見易本取用於天地萬物而作易既成後天地萬物無不取用於易可知易之廣大天地萬物無不備耳作結繩而為罔罟以佃以漁蓋取諸離結繩為罔為罟陸則佃而澤則漁蓋取諸離本義謂兩目相承取象甚確可見紫陽非不言象數不詳盡者恐為穿鑿傅會也包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益包犧氏沒神農氏作方教民稼穡斫木揉木為耜為耒此制器也立成器以利天下則以耒耨之利教天下取風雷二木為體蓋取諸益本義云上入下動取象亦確但損上益下謂之益本義云天下之益莫益于此分田授井任土作貢本益上也抑知原欲上之損上益下乎此又象數中不可不言之義理也然亦不外損上益下之象數耳日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑日中為市上明下動取諸噬嗑本義取象亦確但尚當發明噬嗑與豐上下卦交易而成致天下之民聚天下之貨豐也故豐之彖辭云宜日中正合傳辭日中為市而取萬物豐盛之象也及交易而退各得其所則取象于噬嗑噬嗑者噬而嗑之嗑如日中為市噬之如交易而退各得其所如頥之自求口實以各得其養也噬為市以音取義恐無此義必從豐與噬嗑相交易以明其取象方得神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤神農氏沒黃帝堯舜氏作草昧方大啓文明方日興此三古帝能觀玩包犧氏之卦爻通其變化之道自體之以立德使乎民以致用無非以易為養為教也無非用易以使民也民亦不知用易也遵聖帝之使即為用易而不自知也故其時之民遂生復性終身不倦上不知何以用易使民下不知何以用易事上民心相通于聖人之神明而無不化也遷善改過而不能自已也然所以使天下之民無一人不安其生無一物不得其所萬民無不各宜其親賢樂利者則誠為三古帝用易以使民也蓋易之為道窮則變變則通通則久也天地渾沌以來窮也窮極則聖人出而經綸之啓發之如屯蒙之教養始于有乾坤之後也如是則通矣通者使民宜之也民各得其宜自然能久矣此黃帝堯舜厯用包犧氏之易使民久逺而上無陵下無替也如是則如大有上九之繇自天祐之吉無不利也然三古帝豈用易之賾易之動乎乃用易之至易至簡也惟用易之神為天下之至神者以通志成務故不疾不速不行而至得易之神以為聖人之神也所以無為而無不為也垂衣裳而臨民天下遂無不治此蓋取象于易之乾坤也乾至易而坤至簡所以易知易從有親有功可久可大成德成業也所謂聖人能得易簡而天下之理無不得故乾覆坤載而三古帝成位乎其中也此章傳文足以盡乎聖人用易立德化民之體用矣刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙刳剡木以為舟楫其利足以濟不通不通皆通則利之所及者逺矣蓋取諸渙本義云木行水上取象亦確但渙象傳云風行水上木非風不行于水風在天成象者木在地成形者尤宜以合風木行於水上為確義也服牛乘馬引重致逺以利天下蓋取諸隨服牛乘馬引重致逺在陸能濟不通為通故利足以及天下之廣大焉本義云下動上説猶待發明隨者隨乎泰以中四爻上下交易也泰之內卦二三兩陽爻上隨乎隂外卦四五兩隂爻下隨乎陽亦交易之義也上下交易故動之而得利于逺下動者自近而動上説者得利於逺也如此似與噬嗑復矣然噬嗑重在交易各得其所隨重在引重致逺以得利也自不同義重門擊柝以待暴客蓋取諸豫重門擊柝以待暴客蓋取諸豫外動而內靜外防而內守外攘而內安皆豫之象皆本義豫備之説也斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過斷木為杵掘地為臼以利萬民濟天下取諸小過本義云上動下止取象亦確但上木下土艮之土剛也因而用石亦上動下止之象也弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽弦木為弧剡木為矢其利在威義正以為仁育也蓋取諸睽本義木取象數愚謂弦木者用火也剡木者用金也火澤所以為睽也火又象其迅疾澤又象其剛鋭兌柔金而言剛鋭者金得火而成矢也即論義理睽而分者弧矢以威之無睽不合文德修而干羽格苗與一戎衣而有天下皆所以合睽也非有二道也顧其時常變何如耳上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯上古穴居野處聖人出而教之易以宫室上棟下宇以待風雨取象大壯本義亦未言象數愚按大壯之象震上乾下震為棟而乾為宇震如以噬為市叶韻論之則動為棟矣然不敢引棟蓋象震之上二隂爻如梁上短柱二隂爻在一陽爻之上其象甚確若下宇取乾者象天在人上主覆也大壯固有棟橈之辭豈盡壯固乎古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過古之葬者衣薪葬野不封不樹喪期無數如孟子所言也聖人出而以孝教天下易以棺槨取諸大過本義謂送死宜過于厚亦未言象數按大過之象上下二隂爻中四陽爻以象棺槨三四兩爻棺也二五兩爻槨也初上兩爻坤土也雖似傅會然于過厚之義何妨乎且大過之象傳曰澤滅木取諸葬事乃孝子之事親勿使土親膚之義也巽以入之深葬也中四陽爻互為乾剛硬而乾潔之物也深入土中不使親膚之象義俱昭然矣上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬上古結繩而天下治事簡也後世事日繁而結繩不足以紀之聖人出而易之以書契書者文字也契者符驗也百官以治萬民以察此二事皆以防詐偽稽姦宄也蓋取諸夬本義亦未言象數愚謂夬之為卦上兑下乾本義云明決乾健也明何謂哉明在兑也此明如説卦傳云説萬物者莫説乎澤萬物成于兑外有光澤是謂明也文契既易官治民察官宜其職民安其分如萬物至秋而各正性命也于是官政民事各有成功成功之內即宣著為文章巍巍煥乎其光澤何如故書贊堯曰光被四表可知此兑之發用本乾之立體聖人之心德乾也健也聖人之成功文章兑也説也以此言決為明而夬則象數義理俱昭然也傳舉此十二則以明天地萬物之象義無不于易緼之發于其門作易聖人之成性存存出為道義之門也何人何時何事不可取易為用而盡善盡美乎廣矣大矣未可盡焉矣右第二章是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也是故易者象也章亦係申明前章諸説而直接上文蓋取諸各卦卦原有象有象則可以像之矣如天地水火象也像之則為馬為牛為豕為雉矣彖者材也本義謂一卦之材人多不明蓋材乃木之有用處也聖人繫辭于卦謂之彖原欲前民之用故將卦之理數所宜俱著明焉如大匠將木之有用處標示于人使知所用也此之謂材爻者效天下之動凡事物皆動者也有爻之變以效事物之動所以吉凶生于動悔吝亦著于動無不于爻備之耳右第三章陽卦多隂隂卦多陽其故何也陽卦奇隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也陽卦多隂章即愚謂卦之隂多貴陽陽多貴隂之説也謂之陽卦隂卦者即根乾根坤之説也聖傳自為問答曰陽卦奇隂卦耦本義謂陽卦皆五畫隂卦皆四畫固甚明愚謂聖傳謂陽卦奇隂卦耦答合前説指陽卦隂卦中之主爻言也蓋陽卦多隂必主奇爻陽少貴陽以陽為主是以陽卦之奇爻為一卦之主也奇爻為卦主則屬陽卦根於乾隂卦多陽必主耦爻隂少貴隂以隂為主亦以隂卦之耦爻為一卦之主耦爻為卦主則屬隂卦根于坤愚之敢于將六十四卦分根乾坤而定以為陽卦為隂卦蓋有會於聖傳此章之説耳至聖傳所言德行則指六子之卦言震坎艮陽卦必二耦一奇是一君二民也巽離兑隂卦必二奇一耦是二君一民也又指陽為君子隂為小人小人乃愚賤之謂非姦佞之小人也其意蓋謂二君一民則君亦民耳世無君多於民之情理不過謂隂卦之奇畫不能主卦必耦畫方能主卦而奇畫反附於耦以成其卦非以君而聽令于民乃隂為君焉而陽反為民之象義也是以謂之曰小人之道見隂道主卦隂為貴陽附離之也陽卦一君二民亦是如此故謂之曰君子之道道即德行也道是象數德行是其理勿作人之造詣論正見隂陽各為主臣也有此理乃有此卦象雖分隂陽而隂陽貴賤盈虛消長毫無偏倚也既有三男之卦不可無三女之卦有乾父不可無坤母則知聖傳此章即反復其道出入無疾隂陽互根動靜無間之理數也主陽陽君子隂小人主隂隂君子陽小人隂陽各有君子小人論已詳矣故傳君子之道小人之道全就隂陽卦竒耦言其貴賤勿混入扶陽抑隂之偏説也主卦爻已各明於本卦如藥方內之君臣在四君子湯人參陽君在四物湯當歸隂君右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也易曰困於石據於蒺藜入於其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶上繫傳第七章引中孚九二等七爻申明擬議以成變化之道所引雖祗七爻引伸觸類貴于神明于無盡也後第十一章又引大有上九一爻本義謂錯簡宜遵之入于七爻之下下繫傳復引咸九四等十一爻愚謂皆宜推本義之意敘于前八爻後蓋聖人當日玩易凡有所得形于言論門弟子隨時記載原無次序亦不過申明爻辭象傳所未盡者令人極研亦無盡耳故愚欲將上下繫傳十九爻共敘一章要在釋明傳意其章句本非聖人所定分合亦不可為典要也何非擬議以成其變化聖人之本意乎上繫傳中孚九二同人九五大過初六謙九三乾上九節初九解六三大有上九凡八爻下繫傳咸九四困六三解上六噬嗑上九否九五鼎九四豫六二復初九損六三益上九凡十一爻無六四六五兩爻上下繫傳共十九爻中孚九二爻君子修身之道首重言行示人知學修之要也以鳴鶴之音擬議君子之言以好爵之靡擬議君子之行先言後行者言尤易知一言而善不善著矣居其室出其言千里之外有從違焉邇又為逺之所自推也況出身之行原在邇而加民之政則見于逺行亦無難考驗不過稍後于言耳是以體此之君子于言于行將同于樞機視之矣樞機者開闔之要出入之關言行發而榮辱隨之非人之樞機專主乎榮辱者乎且言行不止於身世之交接也存誠以立體主敬以致用崇效卑法之道也故君子以為應乎天地者言行也焉得不謹言飭行以致慎哉同人九五爻君子成已之道既修必求取友之道示人知取友以心德求孚為要也號咷與笑喜怒之情發必中節乃由中以推和可以存忠可以行恕矣故或出或處隱見不同或默或語動靜不同而應事接物之道貴于中和一也故二人同心共力尚可斷金同心者之言其臭且如蘭况同心同理同道同德一心推于天下而悉合者乎以此為同人乃操約施博耳大過初六爻君子終身主敬遇事用慎敬為體慎以全敬之用也此制心持身之要也措地得安可矣必藉以茅安不忘危故謂之慎之至也然慎不在大茅之至薄得其慎道則任重而獲安推斯慎之術往而求安自無危矣乃君子謹小慎微之學自至切近始也謙九三爻君子飭身所主在恭恭為修已應世之要也一慎一恭主敬之學全矣勞而不伐謙之心內裕之極也勞而有功功也不伐者不自有其功由于立謙體之德足以承載其功且並德亦不居也此厚之至即下之至也故伐者必見于言貌而下者亦必見於言貌誠中未有不形外者若能語功而不驕亦難得矣況更下人君子之有終于無終之道也蓋有德之言必盛盛于厚德非侈張盛大也有禮之言必恭且言行相顧而慎言謹度矣內有德至盛外有儀至恭皆謙者自致于道而欲保存其位者也老子云惟其不居是以不去孝經云髙而不危所以常守貴也皆與易通焉乾上九爻不謙之咎也咎在亢於行詳注在乾卦節初九爻不慎之戒也戒在忽於言言雖至微出好者即能興戎亂生莫測因言語而階厲故不出户庭行未出而言尤先訒矣君不密其言則直臣不能保其位臣不密其言則禍及且莫保其身凡有機事未動而言泄之疏漏其機人得為計其事必無成也故觀于節初而知君子于行固謹而不輕動即言亦必慎密而不敢輕出也解六三爻小人不知慎恭而以怠勝敬驕滿自恣所以致寇之本也作易知盜者知盜所由起之理也負而忽乘乞兒暴富無德無功而遭時得意棄小人之事取君子之器盜焉得不奪之如司馬懿之取魏劉裕之取晉皆盜奪之類耳然又有致盜之由亦不必負且乘矣即素乘者若慢不自保其乘下之負者生暴橫之心亦思伐而奪其乘此如慢藏其賄以誨人使盜妖冶其容以誨人使淫也此又為乘者戒也此二者皆足致盜故易以為盜之招也大有上九爻君子慎恭之至主敬之久即為存誠誠之昭格天且祐之況于人乎天祐髙逺難測必明其所自則知祐之為助助必有由蓋天之氣運流行不息所助者亦在奉行至順之道也天助順者在氣化命也人助何哉人助者立心之誠也立誠于己人皆信之則必助之然則人助信在心德性也君子能履乎禮即人心之理外著也是以各與人心之理相孚而信則為履信也此制用也若其立體必凝思于至順順天之道協物之宜此為履信思順也不惟成己且兼成物又以此尚賢人即以此勉庸衆耳天焉得不祐行自致無不利矣非天祐也天理祐之君子之心思自祐之也咸九四爻聖人正心之學也修身由於正心故示正心之要在于思慮知同歸殊途一致百慮則吾心一理可以通萬事萬物事物至紛一心湛然肆應皆能時措咸宜庶可以無思無慮矣蓋正心由於誠意誠意在於存誠誠意者用吾心好惡之真誠存誠者守吾性至善之實理而已所以全成性于存存且為道義之門矣日月寒暑往來相推隂陽也而有主乎隂陽者本自無二也以至屈信相感利生無窮亦未嘗不以一元以統天為天地之氣化以一往而𢎞道修教為聖人之功能也尺蠖龍蛇大小不同而屈伸同固屈以為伸伸亦為屈也屈伸者往來相推於無盡而本於一以為兩一曲一伸仍是一也即聖人之精義入神屈也而外以之致用則伸乎利用安身伸也而內以之崇德則仍屈也故屈伸有往來而實至一而無間者也固已難知矣然猶有德業可名可見斯可知矣若夫由崇德建業而更有進焉則有不可知者何也聖人精義審乎義于至精極乎用矣聖人崇德敦其德於至崇極乎體矣過此以往雖聖人勤修不倦亦不能自必其所造也精義崇德可學而至窮神知化非可學而至也惟精義已入神而仍不敢忽崇德已至峻而仍不敢斁馴至精于義之原則神可窮矣義者制事之當然神則制義于無方者也馴至崇極乎德之本然則化亦可知矣德者人性之本然化則原性於天命也至於窮義之原知德之本自知性之由命心之合天人物之始終造化之推嬗俱可昭然矣此又非聞見之知已也乃聖人之極至成德于極盛者也又豈可以期必者乎聖人一立誠而德極其盛至此可見正心誠意為造德之基也傳引此爻明君子學修之道必推其極致者示人無半途可廢之功亦無造次可及之盛德也此爻正切繫辭上傳所言修身之本困九三爻見不能精義則不能致用不能致用則不能利用安身以崇德必至如困三之凶厲矣困非君子所避非所困困於非道也則如困于石蒺藜也據非君子所辭非所據據于不義也則入宫無妻不安于其宫也非道之困名必辱非義之據身必危名辱則德不立身危則命不全故曰死期將至身不可保妻何可得見宛其死矣他人入室戒之哉隼一物足喻天下之物弓矢亦一器而足喻天下之器射一技而足以觀君子應事接物之道君子必求有其道無其遇也不甘無其道而虛聲致誚也所以平日藏器于身用藏于體中也待時而動用必協宜合乎道也故有往而無不利也君子之道利其器以動而應天下之物動而無所阻以其在道也在道之動動必有獲惟其成器在平日而利用在一時且全器備于一身乃肆應而無不合也此動之用根於靜之立體者純乎理矣內存理而外合道如公之射隼必獲且無往而不利也豈君子見利而動乎非也利者義之和也和乎義則義之利有不必謀而自得也噬嗑初九上九兩爻以明小人行惡有大小多寡取禍有輕重以示戒耳小人不知存仁故不仁不以為恥不知行義故不義不以為畏無恥故見利方動無所畏忌故威而後懲然知懲而誡所懲者小所誡者大仍為遷善改過之人也此小人之有福者乃能小不善而即得懲知誡而不致于大不善也校但滅趾仍謂之無咎亦幸矣名者善之應然善不積名不成禍者不善之應然惡不積身未必滅積者漸也非一朝一夕之故其所由來者漸矣小人之所以積惡者在於初起之一念以小善為無益不足為而勿為也故善不能積以小惡為無傷而不足去也故惡日積及其惡積何可掩乎惡積則罪大不可赦宥而得解此無福之小人所以不遇小懲竟成積惡以致何校滅耳之凶性命且不可保彼豈知積惡在小而不在大乎否九五爻示君子安身保國家之道亦由一心知危知亡知亂然後身安而國家可保也安與危相反而知危則位安存與亡治與亂皆相反而保存圖治乃在知亡知亂此君子安不忘危而久安存不忘亡而久存治不忘亂而久治也是以身安于知危而國家治保於知亡亂也其亡其亡繫于苞桑苞桑豈足喻其鞏固乎鼎九四爻明德不勝尊位之戒鼎而折足必無知危知亡知亂之心者也與否九五正相參否可以休否而有苞桑之固者知危知亡知亂也鼎可以折而有覆餗之凶不勝任是但知安知存知治者也傳所謂內外使知懼者指內貞外悔言之此類是也位以尊德德薄則不足附尊位矣知以成謀知小則不足以定大謀矣力以肩重力小則不足以肩大任矣君子必度德揆知量力以免咎者貴于自知也如鼎之折足而覆公餗且渥而汚辱其形不勝之凶何可免乎無學寡識之人猶可恕有心干冒貽誤天下者古今來不乏矣洵可深惡而痛絶也豫六二爻明應事接物之道在于知幾知幾在於窮理窮理則在心德為微在事業為彰能用簡為柔能用易為剛此聖人之立德建業皆以知幾為要者也故曰萬夫之望見為人所觀望也幾之神乃天下之至神者方能與也蓋通乎易之至精至變而方體會此至神神而明之於不測也此方謂之知幾此聖人之大知也若夫君子必敬必慎不能得幾之神亦不致失幾之宜也何也聖人言通權達變君子言審幾觀變也其應天下也上交不諂下交不瀆總由人情推測幾發無端惟守理潔道不妄動以從人則心之理得而事物之幾可知矣故于動方見微吉凶之先兆已早得由于君子靜虛之體守己不隨人故靜足揆動方動之始即知其吉凶之終也所以君子見幾之善則遷見幾之惡即改見吉之合道則趨見凶之違道則避其作不俟終日言其至神速也究為君子自決於己之理欲而非因人為逆從也易云介于石不終日貞吉貞則吉之幾也靜存為動發之本也故介而如石不可動移理至而事必起氣數亦隨之而已寧用終日稽遲疑惑乎理明義精決斷於其間可識其無猶豫也此君子之知不同于衆也知幾也知微知彰本末明也知柔知剛體用得也豈非萬夫之望且可以訓世勵俗何難自全其身名而無難耶復初九爻引顔子之改過遷善是為能知幾者蓋得夫君子知微知彰知柔知剛之道者也故亦去聖人不逺矣顔子稱庶幾者庶幾於道也道者至善之止也不能止於至善而不遷者氣拘物蔽為過也過則為不善不善貴于即能自知自知尤貴即能不復行皆省察之勤戒飭之密此即論語所論克己復禮天下且歸仁道何不可幾乎于易云不逺復無祗悔元吉人心之仁德氣化之元陽原本一氣一理耳損九三爻明取友必專之道天地男女之道分為二如朋友然氤緼搆精則合二為一矣故專一然後有化育生長之功此君子修身必交友也交友必取友樂善不誠則不一矣惟誠以立己善取於人斯為能致一也蓋善即人心之性也誠乃存性中之理也在己則云誠實求諸已而有此理也在人則稱善彼能得其理而著之為善道也究之人已一理以相流通而已此之謂致一天上地下而氣相交故其氣絪緼綿亘周密之象于是既言交復言絪緼祗是一氣而已萬物生化醇凝於此中矣萬物之所以生生不已者化也化之本乃此醇凝之氣所謂絪緼者也乃一動而為陽為男一靜而為隂為女男女隂陽互為動靜一往一來一升一降此以其精相交媾也化萬物之化遂能生萬物之生凝者自一本散於萬殊既生萬殊各又凝為一本以生生於無終始焉惟其化之醇所以媾之篤惟其媾之篤所以生而不窮一隂一陽靜專動直靜翕動闢至純無間生意不息矣若有參雜其理不一其氣不醇無物可生矣故易曰三人行則必損一人一善一不善損其不善也二人皆善損其善之不盡善者也如是則獨存一人為己之對相感相應至專至篤得至善為友何難哉此聖人因取友而取象於天地隂陽相交生物之氣化聖人擬議易之象義如此方可謂神而明之矣益上九爻言君子修身以交世之道也交友取善為君子同類言耳出身加民則該之者衆矣君子亦惟於身之為行求安於心之為語求易於交之有求先定而已然定交亦在言行也是言行為修身應世之要也故修此三者德方能全也君子之崇德以安其身非為民與也然身安之動動而世為天下法民焉得不與乎和易以平其心非為民應也然心平之語言而世為天下則民焉得不應乎慎擇取友以定其交非為人與也然定交之求求非違道干譽祗為同聲相應同氣相求人又焉得不與乎君子終身慎修而不敢忽者內在言行外在朋友之切磋琢磨也若身危之動動無與徒懼以語民不應無交之求求不與理有必然事有必致也無與者則傷之者至此人情本如此也易曰莫益之或擊之由於立心無恆耳凶可知也在中孚傳曰言行君子之樞機君子所以動天地也恆傳曰聖人久於其道天下化成即從君子內存恆心外立不易方於言行交友善終始來也此復擬議之正與中孚九二相應也以上十九爻然乾之上爻復見祗為十八爻取十八變成爻之義乎右第五章子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報聖傳再申明乾坤為隂陽之統易立於乾坤聖人畫卦繫辭皆不外乾坤兩合成一而已不惟一本之一係兩合成即萬殊各成其一亦由兩合成是無一無二無二非一之理數也明乎此則知易一也然乾坤之兩合成易之一俾易中之一本發為萬殊者一皆由乾坤之兩而出也是可謂乾坤為易之門矣何也易之一合隂陽而成乾則陽之統也坤則隂之統也一隂一陽出入往來即乾坤闔闢之道也于是易之理數雖廣大悉備天地萬物無不為易所蓄然不過隂陽二者合以成一以為易耳是隂陽雖分而自有主乎隂陽者以合之則隂陽之德也德雖為合但既分隂陽則各有其德何以謂之合乎蓋隂陽雖分實一氣之出入往來屈伸變化分之則兩合之原一故隂陽各有一德而合之仍一德也在氣如此在理亦如此兼理氣言則易之道亦如此仍無二非一也然無一非二既有此氣此理此理此氣必分為二分二則必各有體用以靜為體者隂也而動以為用已屬陽以動為用者陽也而動本于靜又屬隂隂陽互根成一而必分屬為二也是隂之體柔而必用剛以濟之陽之體剛而必用柔以和之遂為老少之四象遂相摩為八相蕩為六十四無卦不有剛柔無卦非以剛濟柔以柔和剛期於得乎中正無所偏倚所謂貞夫一者也學易者玩卦之剛柔雖分實互相和濟以成乎一則知剛柔各有體者二也隂陽原有合德以為剛柔立體者則一也此無一無二仍是無二非一也易之為易兼理數以備道如此天地之撰雖廣大易之隂陽合德之一皆足以體之也天地有形故撰無窮聖人用易以合德為道是以道體乎撰也神明之德雖幽晦易之隂陽合德之一皆足以通之也神明本無迹故德莫測聖人用易剛柔分應是以心通乎神明也體天地之撰用合德以一其二也撰為事為陽則體之通神明之德用剛柔以此一分彼一為二也德為理為隂則通之易之體天地通神明如此功業然不過分隂陽為乾坤之二以合其德成易之一至易至簡易簡而易之道備矣此就畫卦言易之用萬其體歸二為乾坤二復歸一為合德乃易之所以為體而乾坤又為用矣再明繫辭辭必先正其名理數之所存象之所著名之所稱也易之理數言其用一本而萬殊就萬殊中各有理數則各有二以成一易即就其一以明之雜至萬而不越原一也因而考稽其辭所以引伸觸類無窮無盡稱名之雜至矣有上古之世無此事此物而易之稱名皆備焉者世道衰微隂陽乖戾無情不啓無事不有故不能如上古之事物理數純而不駁易之稱名遂不得不因其純以名純駁以名駁矣然世雖分盛衰運雖有隆替無不具在隂陽中也有此隂陽方有此理數有此理數即有此名以稱之是以易之稱名合世盛衰氣純駁以稱名究不外無一無二無二非一之道也稱名愈雜而理數亦終不越乎道也此易之所以盛世畫卦足以盡其象必至於衰世繫辭而後能備稱其名盡達其意也謂為衰世之意者謂當衰世則聖人繫辭之意不得不如此之雜而實先後天一揆期於不越乎以萬歸二以二歸一之意而已矣究皆先天聖人卦爻象數中所有也又何越乎先天之聖人畫卦以合德立體以乾坤致用後天之聖人以不越於理數者立體以稱名之雜致用于是易之一分著于卦爻之間繫辭之內各得一以成一而易之一推暨于不可窮盡可謂備乎萬物萬事矣何也夫易之一而為二二而歸一由此極深而研幾焉殆無往不彰而無來不察也且無顯不微而無幽不闡也觀於二知本于一往者盡彰矣觀于一知必有二來者盡可察矣顯至極為萬者有一以微之也幽至極為一者有萬以闡之也俱主于合德為體以分剛柔生四生八生六十四以至于萬有不齊為用則往來出入屈伸變化皆一氣所為一理即寓于一氣之中耳何往不彰何來不察乎往者已過之氣化也即為來者之機兆易於往者為理為數無不彰著其象義因此以推測則未來者為理為數無不可察知其象義矣顯者當前之事物也即為幽者之發著易於顯者為變為化無不微妙其體用因此而探索則幽深者為體為化無不可闡明其體用矣是形下者顯而形上者有以微之如易之理數微乎卦爻之顯也性情者幽也而美利足以闡之如易之元亨闡乎利貞之幽也此就先天卦爻已足以見易之備況後天聖人推開而繫之以辭于卦爻中觀象知數稽數知理體會乎理數而知道以道之一廣暨之萬事萬物即各得成一之理數矣以是繫辭有本也故稱名必當也辨物必明也言必主乎貞而正也辭必尚乎斷而無疑也既有卦爻復有繫辭學易者能居則觀象玩辭以為居而安動則觀變玩占以為動以正易之道無不備者學易者皆可備之于一心體之于一身推之於家國天下萬事萬物無不得其宜也備於一心則一之體立矣時措咸宜則各得其萬之各一矣終能彚歸乎心之一此學易者自具於心之易也再繹繫辭稱名雖小取類則大也小謂寡也近也大謂廣也衆也稱名謂因義以定名取類謂因象以推義也名此義不過一端之小推其象有無窮之義此小大之謂也名象之中有義理之所在聖人繫辭之旨所在也以聖人之旨寓於聖人之辭辭不過期達乎義而義之引伸觸類神明其旨無方體矣雖無意於文而自然之文非勝質之文也故旨逺而辭文也是以其言至曲折委婉而能中乎事物之正也其所著吉凶悔吝之事至宏博開大而肆然明通也究皆深奧精微而隱然莫測也肆者其事物而隱者其理數也易之言曲中事肆隱又如此學易者就卦爻既明其象而知因象取義有聖人陳其辭更知因辭得旨似亦可以無疑矣猶有疑而未決者則二也若能占易而求得事物之宜遂能前用而各明得失之報報者事物因感而應得吉失凶毫不爽也是人已感應得失吉凶皆二惟以一理主之則二者歸于一疑者無不明矣然何非隂陽分剛柔而各致其用之二皆歸于合德以立體之一乎故乾坤二也而合德為一易也者逮合萬為一以立體而以乾坤為二以致其用也乎右第六章易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權易之興也一章自是指文王下引九卦稱九德似有尚書九德備而可以正位凝命之意也所引九卦乃為處濟憂患之道前一節是體後二節是用後二節之前一節知之開于始也後一節行之著於成也各就其卦之象義形容聖德之體用又為凡處憂患者前其用也亦如雜引十九爻明修身正心存誠主敬矢慎向學盡乎在己方可以推之交友取善應事接物無不得宜也踐履篤實以為立德之基始形踐一分性盡一分矣謙和下人操持應世無往不利其用是為德柄復之元陽即人之仁心成性存存道義之門是為德本立德貴𢎞信道貴篤守理必一制行有常是為恆德堅久無替其德方固損欲必盡謀理斯純絶羣情之紛雜且能損滿假于無盡故損為德之修德又貴寬其量量又貴養之優量包天地養積終身故益為德之裕困德之辨即困心衡慮之義孟子所謂勞其筋骨餓其體膚空乏其身行拂亂其所為動心忍性增益其所不能此是德之辨義井德之地養而不窮以喻德主于靜用之不窮如井之在地體靜而用順也巽德之制巽進也德期於進而又不容躐等為進必也馴順漸積以為進雖德之量無盡而進德之途以是為制耳制而有節方進于不已如水之盈科後進而放乎四海也此一節是九德之體履者禮也履必當禮禮雖嚴而用貴和得其和而中可得中和非德用之至乎謙者卑自牧也然依禮合道之謙愈下而愈尊愈自晦而愈光明不止接物以謙而已自不居德為本也復小而辨于物陽微之際能察其來復之機則理之固有可存而凡物之本然可以一心之理通於無間矣恆雜而不厭恆乃日用常行之道雖各有綱領然條目頗繁雜又無新奇可喜所以人多久而生厭五常百行所以不能始終如一惟不厭則自見綱維井井服習無斁然後可久而有成德可循也損先難後易從德之修來也乃懲忿窒欲之事也益長裕不設不設祗是不譸張鋪排底意思俗言常曰設處因其素裕故臨時無急遽苟且如耕九所餘家給人足即有兵凶有備無害也困若能辨雖極窮而通必生于窮矣井居其所而遷井不遷者也遷者井之用養之及物也德立于不遷如地之靜而不動然後可以德化民而風教自逺矣巽稱而隱亦從德之制來德之巽進實之所在名必附焉故聲譽騰聞如風之無逺不屆然君子修德暗然而隱潛德之光亦必久而方發君子所以不可及乃人之所不見也第二節雖言德之用然俱就立德者身心上形容其卦之象義第三節方説到應事接物由中達外之道此章三節首節敘明九德德之本然在我者也二節明九德在於知其當盡而後能備於在我也三節則德成可以推行於無暨莫不得其當然矣履以和行非和則禮為煩苦之具豈能行乎謙以制禮非禮則失正之謙本於無制也復之幾微先在慎獨故必自知恆之道久終始如一方無斁渝損己必利人故害自逺益人即是益己故以興利仍是二卦相為損益之義困以寡怨困以能辨而得通則一本於致命遂志之心通否俱無怨尤也惟內無怨尤世亦何怨乎井以辨義井養不窮仁也然親親仁民愛物有義以為辨别差等仁方推而各給故仁義如隂陽雖分二而其合德則一不可偏廢者焉結之以巽以行權學能巽進至於行權不失乎經則可幾於神而明之矣聖而不可知之謂神者方能與于斯乎此節專言用矣可見聖賢立體致用及學者學聖賢之立體致用無不在易也右第七章易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行易之為書也不可逺一章聖傳專為用易者勉其進德而後可成業也先後天聖人開務成物之道寓於易矣凡人日用恆常其理俱備于易乃不可須臾離之書也故曰不可逺然其道雖在切近身心之間而又不可執一以求道是其為道也至有定而至無定者是道也蓋屢遷之道也故就其卦爻觀之變動不可居也周流不能息也六爻之位雖實而變動不測則六爻俱為虛體全玩變動以成其用矣是以上下無常言卦之錯綜也剛柔相易言爻之貞悔也卦爻雖有成象成義而變動無方何能執定以求其典要乎然則易亦不能自主也亦惟順乎數之自然循乎理之當然以聽卦爻變動之所適而已蓋凡占者來求乎易易亦不能自主仍以占者之德主之占者德立於心神明鑒於神所得卦爻隨其意之善惡以示其事之吉凶豈易所能操其變之所適乎雖然不可測者變也所可定者度也變適無方無方非度為出為入隂陽屈伸變動難窮而祗此一氣中寓一理以散見於萬事萬物聖人取而著於卦爻之間繫之以辭何卦何爻何辭無度乎度者規矩尺寸有法有制者也占者無論念存於內事形於外凡有所求受命如響能不凜然知懼乎不但占得凶厲悔吝宜懼即得元亨大吉無咎皆宜知懼何也占凶厲悔吝者以省愆補過而懼占元亨大吉無咎以德不叶則占不驗為懼也此即後章易之興也一段其道甚大百物不廢懼以終始其要無咎之義似無脫誤占者能以內外知懼之心以求其象義於出入斯求易而或可有得耳何謂內外則兼變動貞悔而言內外也卦爻俱有內外貞悔甚明矣蓋易之為書成於聖人憂患中也是以明於憂患為甚確切天下萬事萬物無不在憂患中惟不知其故則不能懼求於易既知憂患之故雖欲不懼亦不能矣是以每占易而無有師保易即其師保為之啓迪也無有父母易即其父母為之訓誨也方能以常憂患者免憂患也不然易雖出入以度而占者內外不知懼何免憂患哉或謂內外以存心制行言亦通故善用易之君子凡有占問初得其卦爻必遵率其所繫之辭以揆度其向往之方言揆方則兼玩卦爻之象在內矣既能率辭揆方則不可為典要者至此皆確有典常可守可循以是用為趨避兾免憂患想無難也但易之為書不在卦爻繫辭粗求其象器言語之迹也必知易之道體易之德可以立於聖賢之途而為謹身寡過之人則易之道斯實有所附託而可以推行於無窮若不知易之道即知而不能體易之德心存私欲行蹈匪僻乃欲占易以利其私心私事則雖有易如無易有占如無占也故曰苟非其人道不虛行言必其人有易之道而後能用易之道也言道不虛行者道原虛寄於天地之間必待有其人備其德道方能實見諸日用倫常動作云為之際也雖千古無人未嘗一時無道有聖人道即行於聖人有賢人君子道即行於賢人君子即善人端士一言一行之合於道道亦俱行於一言一行焉道至虛德至實德有大小道亦有偏全德備其純道充其量非聖人不能也學者能謹身修德用易以為寡過之學初不過一言一行之合道漸至於德全而道備方為學易有得也此章專為占易者立教却是學者省心修身切要工夫豈可忽乎哉右第八章易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪易之為書也原始要終一章聖傳明卦象六爻之位置以卦象及彖辭為綱領以六爻為條目也首舉易之為書原始要終者自乾坤父母而有六子經卦八立焉因而重之六十四卦備矣其言質者體也即原始也於是每卦各成一體由太極一體而分著用於諸卦諸卦又各立一體以分著其用於六爻也此要終也至于其用六爻變通無盡無終則六爻之相雜唯象其時物而已時行在天物生在地中立人事俱無終者唯於六爻擬議以窮其變化則天地時令事物理數足以備之此以明易之要終于無終焉耳言相雜者謂剛柔推生變化也然變化無定而爻位有定卦體立而寄用於六爻六爻列位又各有體如初如上以本末為體如二如五以得中為體如三如四以居內交外為體則又一定不移者矣是故凡卦有初上兩爻初則難知上則易知亦因卦體之本末在是兩爻耳不惟玩易者為然聖人繫辭於初亦以辭擬議未盡顯明於上之卒方示之以成其終皆因卦體寄於爻位不得不因卦之本為方進之機末為已成之勢聖人亦不過因其初卒以擬議焉此初上兩爻之體用也若夫卦中二三四五四爻皆謂之中爻中爻所該者愈多矣象物則甚雜也比德則各撰也曽晳云異乎三子之撰撰德猶云具德具德猶言立德也卦有德爻亦有德德皆卦爻中固有之理數聖人繫辭以明之則其德立於是卦是爻中故曰撰德也合物與德言之象數義理俱在爻中為是為非即吉凶悔吝之所以分也烏可無辨乎辨是非以分吉凶繫之辭以示人誠非二三四五中爻不能盡其象義也此中爻所以偹一卦之體用也觀於本末及中爻則存亡吉凶之道不亦大明乎聖傳復嘆之曰噫亦以此要存亡吉凶則亦坐而可知來所謂坐照之知也言要者約略之辭蓋中爻乃一卦之中道也卦有始以初為始卦有終以上為終中四爻為中合上下卦以言其體也得其中道則於本末兩爻更明切矣是以學易而有知者先觀其象後觀其辭於卦之立體已明且觀於彖辭則是卦六爻之用俱可以思得其過半矣蓋本末中爻俱不越卦象彖辭乃因卦之象義為繫者故傳以易簡之旨示之不外原始要終以為質之意耳再論中爻二與四同功二四皆隂數之爻然位不同位不同其善亦不同功能也言其用也善德也言其體也隂之用雖同然異位遂各有各用各用斯各致其功况德之善不同乎此亦言其質也之義二多譽四多懼俱以近言四近於五多懼二近於初多譽也何以近於初多譽譽起於下也何以近於五多懼懼凛於上也且言四多懼有謹言慎行之戒二多譽為進德修業之勸也非但言譽懼而已也若以隂柔值此隂位以隂處隂不利於逺者四尚可以近君而用柔道濟君二則逺君不能以柔道見功矣但原始如此要終亦無咎何也用柔得中二能起譽於下亦可逺致於上也此論四二兩中爻之體用也再論三五兩爻三與五同功異位三五陽數之爻各有各用亦猶二四也其體亦在位中可見三多凶五多功貴賤之位不等故體用俱不等也三體不中位不正功難凶易五當位體尊位重則易致乎功能專就位論豈德因位為輕重乎不知此乃就卦爻體象言其理數本如是又非較量德位之説也此德從位字生出言其體也亦非行道有得之謂也即其位之體用以衡其位之德功亦自然之理數不待聖人安排方得者若以隂柔值此陽位可危之道言不勝任也若以陽剛值此陽位則克勝矣但亦是原始如此若要終為危為勝又各具象義不可以為定則焉此又傳所未言而可為引伸者也此論三五兩中爻之體用也人能於中四爻明其體用初上兩爻知其本末於條目已詳矣再就卦象彖辭觀玩得其綱領何卦何爻聖人之情不可見乎然總不外原始要終知其質者為學易啓觀玩之門也右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之為書也廣大悉備章專就六爻以明卦象所以為繫辭之本也易之為書廣如天無不覆大如地無不載萬事萬物之理數俱備於易中矣此可於卦之內外兩卦卦各三爻合而觀之得其象義蓋易有天道焉卦之上兩爻足以擬議之也有人道焉卦之中兩爻足以擬議之也有地道焉卦之下兩爻足以擬議之也是卦之有六爻乃兼三才之道而各用兩爻以象之也所以爻有六六者非他三才之道耳兼三才而兩之易之象數也三才之道則象數中之理也兼理數言謂之道也分言之三才各有道合言之一易道也分言之三才兩之各有剛柔兩儀以二成一合言之三才共一剛柔剛柔共一太極以成一易也才同前章原始要終之説此更兼象數道理分三成二合一以言體用焉於是知天地事物之所在即道之所在亦即爻之所在也道不能有靜無動動必見諸事物之間易以載道亦不能有靜而無動動則見諸變動之爻此易因變而有爻也爻有六位貴賤不等此剛柔之相雜也萬事萬物相雜不外剛柔二物相交於是自然之文亦即著於其中矣文之相值乘承比應有當不當象著而義彰焉吉凶之繫辭於此定矣是全易之體用寄於卦而卦之體用分寄於六爻於卦爻之用窮其變因而求全易以會其通終始體用不較然大明乎易之為書三才之道備廣大如是固有此卦爻為之端倪矣不責學易者求諸馳騖也何可不知所從事也耶右第十章易之興也其當殷之末世周之盛德耶當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也易之興也章聖傳專明文王周公繫辭開成之道也易雖作於伏羲傳於三代然至周之初始興謂之興者卦爻象義著為文字占者可以觀玩而盡其智力也夏商二代不知有辭否即有辭亦未必如周能得卦爻之理數傳以盛德歸周亦是由其功業興易繫辭而命之得成乎易孚於伏羲之先聖也不惟因功業而思盛德而且因盛德而審時事文王德之盛也紂忌之有羑里之危周公德之盛也武庚忌之有東征之危是文王周公皆因憂患而玩易繫辭耳故其辭常示人以危道也然知危而謹身修德則危可反平如以為易而忽之頑率奢傲則平者反傾矣易之辭槩如是也是以易之為道甚大百物之理數咸備必占者自能玩聖人之危辭生戒懼之危心以持危言危行於終始焉乃要歸於無咎也此易之道也天生人之道剛健為體柔順為用者也以凖於易兼三才而著其體用分剛柔而明其變通期以實踐之於人事而已故易之道即人生終始之道有體有用知危知懼槩以防憂慮患之心慮之焉往不臧乎故傳復以聖人因憂患繫辭以示學易者貴知所宗也此上三章雖分愚謂可作一章聨貫而觀之也右第十一章夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈下繫傳末章聖人以易之情辭示人因情可以得其性因辭可以逹其理全易之道備於乾坤乾坤者易之情所著也乾之情固確然示人以易矣然其性則至健也是剛健者乾之性發而見之於情則至平易也又非平易而無以濟艱難及率其性情成為德行至平易而足濟天下之艱難是於恆易之中有知險之道也乾之性情在體德行在用如此凡易之陽剛皆屬乎乾其性情德行可明矣坤之情固隤然示人以簡矣然其性則至順也是柔順者坤之性發而見之於情則至簡約也又非簡約而無以通蹇塞及率其性情成為德性至簡約而足以通天下之蹇塞是於恆簡之中有知阻之道也坤之性情在體德行在用如此凡易之隂柔皆屬乎坤其性情德行可明矣傳兼德行言德就成為功能者言也觀知險知阻則不但知之且足以濟之通之使無險阻矣蓋乾坤之體象以氣化言也有性情有德行則理寓於氣性情德行斯具焉既有性情德行可以崇效卑法是在學易之君子以其性情體會乾坤之性情以其德行效法乾坤之德行所謂非其人則道不虛行正見道虛而賴人以實之此傳示人乾坤性情德行之本旨也學易者誠能知隂陽不外於乾坤乾坤各有其體用以其心之性情會乾坤之性情使體與體相洽自悅諸心而深有得矣以其慮可以知險阻者求乾坤之知險阻使用與用相合惟研諸慮則大有功矣於以定天下之吉凶知之事也於以成天下之亹亹者仁之事也皆乾坤自然之功能本乎健順以立體易簡以致用者也學易者亦立體以健順致用以易簡亦自能定天下之吉凶成天下之亹亹者矣且易者聖人本仁知而作也學易者能以易之體用為體用則聖人之仁知悉備於心思矣自能體會乎易也易之難釋也緣有四層道理在內天地現成道理是一層易中有自然道理合乎天地是二層作易之聖人因此道理作易而其心中之道理即著於易是三層學易者能體會於易使其心之道理相融洽貫通是四層如此章首二節四層道理俱在內聖傳却不過統言之然非作四層看其道理終不明看明時幾層道理總是一箇道理特不可不於分中求合如不分看何因得知合一之道理乎易之性情功能既明斯可以漸通會其變化矣變化不測也剛柔相推盡之矣天地間萬事萬物不外剛柔以二成一及其相推以成變化仍是一分為二者往來屈伸祗成其一天地亦總為一而已矣但一物一事又各為一變化之不測亦如人之一言一動不可窮也能知隂陽變化如人之云為也可以體會於易而事物之性情功能亦無不可觀察而得識矣是以吉慶事則知其有祥也如中庸所言善必先知之也不言凶事者該於吉事內也是以尚象之事則知其合器也此為以制器者尚其象言也是以占卜之事則知未來也此為以卜筮者尚其占言也人之用易雖不同而易之以健順為體易簡為用無不同也學易者亦不外悅心研慮以求之本知以明之本仁以成之耳何也天地也易也聖人也其為體為用皆自然而成者也是以其性情功能亦皆自然相合為一者也是故天地設位有天地之體用自然之理氣也聖人生於天地之間以天地之體用為體用亦自然而合天地者也因而仰觀俯察得其自然之性情明其自然之功能於是聖人自立其性情自成其功能與天地為一矣惟無以示天下後世也遂作易焉天地聖人之性情功能俱備於易人可謀也鬼亦可謀也聖人可成能也百姓亦可與於聖人之成能也人謀者考諸三王不謬也鬼謀者質諸鬼神無疑也天地設位聖人成能者建諸天地不悖也百姓與能者聖人有所不知能者匹夫匹婦可以知行也總是此一氣一理合而為一道也故合人鬼聖愚而無不相會通融洽耳傳言至此易之性情功能不可於學易者一心一慮而體會有得哉然則易之有辭豈能外於易之情乎先天之八卦全以象告易之情也後天之爻彖兼以辭言乎聖人之情也聖人無情以易之情為情以告乎天下後世則又以天下後世之人情通乎聖人之情也繫辭之聖人何能知易之情而修辭立教乎蓋亦有會於先天卦爻剛柔雜居相推變化而知其吉凶故能繫之以辭以吉凶垂示於占者也此聖人之悅心研慮定吉凶成亹亹者也而學易者可不知所從事乎再以萬物萬事之情明易之情易之卦爻有變動數也然數理不相離義利亦不相離也知數之應變動為理之當然義在是利亦即在是矣以義為利利則得吉不合義之利利反得凶利有定而吉凶無定乃因人情而遷變也此言趨避向背得失順逆變動人情又至不常也所以吉凶亦至不常而遷變莫測矣即凡占易者之情雖至易遷究亦無不可明矣愛惡相攻即類聚羣分也故吉凶生於異同焉逺近相取即來往比附也故悔吝生於順逆焉情偽相感即公私參錯也故利害生於交戰焉此萬事萬物中之人情也皆易之所備也亦可以凡易之情原要矣人情與易情也大槩以相合則吉相違則凶逺而不相合尚可無虞近而不相得則凶必矣即免於凶而有致害之情在焉悔且吝終不免也此専言人情從違於易之情也易有情而因有辭人有情亦當有辭由情而求明乎辭即就人之辭以明情人之辭將叛者其辭慙也悖於理未嘗悖於知也中心疑者其辭枝志不定則語多蔓也吉人之辭寡慎於言以敏於行也躁人之辭多躬行不逮而尚口乃窮也誣善之人其辭遊無定見於至善之所止故遊蕩不知所歸也失其守者其辭屈不能止於善而不遷故為外物交誘屈抑而喪其自得之致也此就人之辭以明其情言者心之聲辭亦歸於情而已矣末二假推人之情辭何也欲學易者因乾坤體用健順易簡之本求易必兼明人情人辭之末以深其心思以𢎞其知慮然後能悅能研足以用易以定吉凶成亹亹也庶幾學易者之性情功能與天地聖人相孚即與易相合一也蓋合天人物我而一之者也此聖傳終篇明易之性情義理並及於人之情辭以望天下後世學者合三才以求易也右第十二章大易通解卷十四
