body:
  text: 大易通解卷十五江常鎮道魏荔彤撰說卦傳說卦傳孔子說先後天聖人作易之體本於天地之道道不可見故聖人作易以著明之然易所著明者究為道之用道之體雖存於易固不可見也於是聖人更就易之畫卦繫辭揲蓍三事中成象可見成法可遵者申說其體用易之體未嘗不寄於用內因其可見者求其不可見者而已此說卦之所以另為一𫝊之義也昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章昔者聖人之作易也兩段首一段是就初作易時發論繫辭傳言聖人是興神物以前民用似龜蓍之物所以神者皆作易之聖人興之也說卦傳復專言蓍又似神物乃天生之以助聖人之功能也故曰幽贊於神明而生蓍其實神明於幽中贊其功能不越聖人於明中孚其道德也聖人之道與天道相合由於德與天之德相孚故能因神物而興之統天下後世之民用而前之神物原為聖人而生之固天地之幽贊也然非聖人不能用則仍歸其功於聖人耳功能之用仍歸於聖人之道德耳於是參天之數以為竒數之始兩地之數以為偶數之始竒偶之始數既立又為數之體而生用矣千變萬化不出隂陽之相摩蕩卦於此立矣隂陽發揮萬物萬事生焉起焉亦不出於剛柔之相推易往來上下而爻亦於此生矣論至此卦又為體爻又為用矣然隂陽剛柔皆數也皆數則皆用也有體焉天地之道聖人之德寓於易者是也天地之道聖人之德本至和至順也但無易則人不能知從其和順也聖人作易而後天地之道聖人之德其至和至順者著明於卦爻繫辭之中以示人於揲蓍占卜之間此聖人以易之體示人也是以萬事萬物各有其道物得其所事得其宜之謂也亦因卦爻繫辭揲蓍占卜而可知從乃有條有理焉此有條理者在萬事萬物乃萬殊而一本者也小德之川流也㑹而通之一以貫之即是至和至順之道德也一本而萬殊者也大德之敦化也易之為體為用皆備於此矣學易之君子用此以窮理可也極深以求其至精也所以通天下之志也以盡性可也研幾以通其至變也所以成天下之務也極深研幾之久神而明之以契乎至神遂能知天地之化育得事物之本然至命之學亦在於是也學至於至命聖人之德天地之道皆備於一心矣此又由用而㑹歸於體之學也此章先言聖人作易因用以明體後言易之用生於易之體末言學易者可以因用以得其體此說卦傳第一章之義也第二段又從易之體說到立體以制用昔者聖人之作易也因生人有性性命於天天以其氣生人成形即以其理賦人成性此天以其體著為用而在人得之又各立為體者也然為性為命亦不可見也凡此下民何由無違於天命無悖於人性而順其理以全性全命乎有聖人作易而後性命之理於畫卦繫辭揲蓍可以順之不致於違悖焉此易之功能所以永垂於天下後世也於何順之順之於卦爻而已卦為體而爻為用亦順之於爻而已爻也者萬事萬物之各成一體各行一用者也一本之體不於萬殊之用明之烏能晰乎是故由一而二而四而八而六十四而三百八十四皆一本所生之用也亦皆一本之全體所分寄也無卦無爻不有易之全體在焉烏可見為萬殊而忽其一本乎何也三才之道理皆在於爻也天之道不過隂陽而爻有隂陽立天之道也地之道不過剛柔而爻有剛柔立地之道也人性之中不過以陽剛為仁以隂柔為義而爻有隂陽剛柔仁義之道理存焉立人之道也是六爻乃兼三才而為道也六爻乃兼三才而兩爻為一才以兩爻象天有隂陽以兩爻象地有剛柔以兩爻象性有仁義是以六爻方成卦三才之體用備於六爻矣蓋分隂分陽者卦爻之體也用柔用剛者卦爻之用也卦象雖有隂陽定體而爻變則有不測之用遂於易之用中又成體用君子學易期於全性以全命者亦不過於用中求體自能立體以制用也是易之用全寄於六爻之位剛柔迭用交錯成章令學易者可知可從卦體已具三才之道六爻復寄萬殊之一由此求之聖人以立體而制用者學者可以因用而推體矣此章又明萬物萬事之理寄於卦爻欲人由萬事萬物之理以求明性命之理也與上章正為反復申明其義而已上章由作易說到道德上此章由性命說到卦爻上無過示人知體知用見易雖至精至變至神其間皆有實在用易下學上達之功也此說卦傳首二章於繫辭傳後統言之也右第一章二章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也雷以動之風以散之雨以潤之日以烜之艮以止之兑以說之乾以君之坤以藏之天地定位章說先天八卦方位明氣化原有自然之對待伏羲因之畫卦定位也乃易卦方位之體也然八卦相錯一句從對待中亦可見氣化流行之用矣數往者順知來者逆二句從八卦相錯句來必除去邵子橫圖一二三四五六七八數目方能明聖傳之義邵子當日引聖傳以明橫圖也非以橫圖釋聖傳也學者知此方可與言順逆朱子之本義尤為難明與其以宋賢之說釋傳不如以傳釋傳矣况以傳釋宋賢之說豈不倒行逆施乎傳謂乾坤山澤風雷水火相錯定位之中一氣相通故有往來順逆之說往者氣化之既往也由震而離而兑而乾而巽而坎而艮而坤皆順數也可以順數而明其氣化之自然也來者變動之未來也為過為不及為得中雖貴逆知也然非順數其氣化何由逆知事物之當然者乎蓋氣化之自然者為體易雖以之立體而體不可見也事物之當然為用易乃明天地事物之用也故云夫易逆數也因氣行理寓為數之至順數變而理不變故於順知逆也本自明白即以先天圓圖數之隂陽終始亦甚明晰必驅䇿伏羲之圖孔子之傳就邵子一八之數朱子順逆之說未見宋儒以後有能曉然者雖强為傅㑹究不通徹何其尊邵朱而悖羲孔乎如必尊本義分數左右以為順逆無論邵子一至八之數必不能左旋右旋一氣相貫且與𫝊數往知來之說未合何也聖傳但言數往未言數來也言數往知來非因數往以知來乎乃必釋為數往數來知字置之何地數往者順數字上聲末句易逆數也數字去聲因順數而可逆知全部易經皆因卦爻之順定求變通而使逆知不測也所以謂之逆數易簡如此而不知從難矣雷以動之一章就先天八卦定位對待申言相錯中即有生育萬物之功能也定位體也相錯者流行由體以生用也於是功能及於萬物則推言用之極致耳以上三假明先天八卦以上傳釋先天卦圖原為後天八卦之體但先天有先天體用此章首節天地定位四句先天卦之立體也中以數往者順三句示人由體以行其用末節方明先天卦圖之用也後章釋後天卦圖與此俱合先天由體說到用後天由用說到體中俱參以人用天地之體用為體用聖人成能占者前用萬物利器致用傳于此二章備言之矣雷動風散雨潤日烜艮止兑說即六男女也傳先言之見天地之全氣禀於此六者雷風雨日親乎上以生長萬物者也山澤親乎下以收藏萬物者也此澤為水之發源及滙聚之處與山相對而錯親上者其氣化能自為體用親下者必附於地不能自立其體但能自致其用何也親上之卦本於天之動也親下之卦本於地之靜也故坎原象水在此章言之則為雨此易之所以不可以為典要也末方言乾坤乾以君之統天之義也然帝出乎震生長皆天也坤以藏之致養之義氣化歷秋之收為冬之藏皆坤所司也所以既云致養又云藏之也然坤與艮又為體用艮為體坤為用隂也地之靜止在至髙之處地之動用在原隰之間方能成物養物艮則靜止於氣化終始之交所以制氣化之終始方能無終始也再乾與兑亦為體用乾為體兑為用陽也故澤必降於天物說於兑者必歸戰於乾澤降者自體推為用說而戰者自用收於體方能始物生物兑以各悅為氣化收斂之初所以作氣化之往來方往來不已也乾兑即天也五行俱屬金艮坤即地也五行俱屬土也故先天卦位乾之次即兑艮之次即坤也是以此章聖傳首言先天卦之對待既云相錯知流行之理亦即著於其中無文無字而包全易之用又申明此八句仍是言對待以為流行之本而位置之義亦曉然矣首四句已於上下經各經卦首注明並有圖右第三章四章帝出乎震齊乎巽相見乎離致役乎坤說言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所說也故曰說言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮右第五章神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也帝出乎震明後天八卦方位由先天八卦立體者移易之以成其變化之用所以言氣化之流行至明切矣第二假𫝊固釋第一假之義也然亦如前章示人以天地氣化之體用為體用也祀典上帝之外又有五帝究無二帝乾元統天上帝也分為五五行之帝也河圖以一始以十終五位相得而各有合即五行也今云帝出乎震東方木行之青帝為上帝之長子也在易言之則乾元寄於震初陽氣至春發於東方以振發生意者是也本是氣化而理寓於中故以帝尊之出震之後陽氣日升然在天地圓形之內觀之則自南為隨天左旋也陽氣由東而東南六陽大盛萬物無不齊生蓋自春初至夏春初三月之間物之生類方俱生也由東南更至正南陽盛已極隂自陽中生矣陽氣於此與隂相見而萬物之生齊者皆遂其長旺之性形矣又三月而秋初長氣已極天生之權付之於地使地成之坤之大用遂能致役萬物各使形全性具致役者養也役使之即所以養之也何以役之如雷以動之風以薄之雨以潤之日以烜之之屬此四子獨明之於坤者六子之用皆坤役使之也豈無乾乎乾寄用於坤坤之用皆乾用也至坤而由南轉西萬物說於兑矣何以言說於兑耶兑者秋時之氣化也萬物之氣生長至此已極發者不容不收矣氣收而物之性形俱足則內充精實而外發光華不可形容故以人之喜悅擬議之如人心喜而色悅以取喻於物之內精發為外華也再由西而轉西北又已三月之久物之收氣已極陽氣盡入隂隂氣大盛生意全斂生長於春夏者皆毁傷於秋如逢戰鬬其實出入無疾何戰鬬之有乎不過隂陽之氣至此交易而已乃以乾天屬之何也不但謂乾位西北也天氣主生天氣即主殺陽生隂殺皆天之用至此方知地但能養之使成為生為殺地俱不能主之也然天非殺萬物也殺而後生生不已殺之正所以生之故天終始主生也乾元之所以統天者統其全體周行俱歸於一氣之盤旋耳戰於乾而轉正北則天地之藏化也陽氣盡藏於下所以休息之也勞動為勞而靜以蘇其勞亦謂之曰勞如治天下而天下治皆以治為義也雖音不同而可通也地既養之天何以又曰休息之養者在形休息者在氣也自此又轉東北休息又三月之久其氣已成氣成而後復出於震陽氣又出生意又透終而復始如環無端皆氣化之行而上帝為之宰也所以後天八卦象此而定位以明天地氣化之流行無間也再釋後天位置之義帝出乎震何以見之帝即陽氣即生萬物之氣也故帝出震即萬物出於震也帝出東方故文王象此置震卦也齊乎巽而置巽於東南者言萬物至東南生氣皆發其生至齊言潔者齊而無雜亂參錯之義也置離何義明地也火氣最明天之日氣最明也萬物皆相見惟隂陽相見則萬物之隂氣皆各與其陽氣相見而有隂濟陽其氣長之極也此惟夏時能然故置離於南方為南方之卦也聖人用陽而體隂故南面以聽理天下之事物位反在北立體於隂為守元致用於陽故嚮明也治天下者聖人之用也蓋取諸此義也何以置坤西南以坤象地萬物所以成者地也成非養何以能成故坤於萬物皆能以其氣化致養之使成焉所以謂之致役乎坤也兑何以置之正西正秋之氣化也萬物之所以成其悅也物成極而其色澤光潤乃革火收雷之時陽收而未深藏故精彩外露試於秋時觀山川草木可得此象兑之為澤為說此義也其雨澤之澤山澤之澤亦歸於陽陽入隂而得泉澤為山澤通氣陽墜隂而成雨澤為麗澤兑也八卦惟兑澤為不易釋故朱子以為兑不屬金俱未細繹此等卦象耳何以置乾於西北而云戰戰不過言隂陽相薄也不同於隂上六之龍戰而其義亦相通在天地氣化相薄則出入無疾在人事邪正相攻則成傷害矣置坎於正北因為水卦也水生於至隂之地故坎為北方之卦何以又謂之勞卦天地周流之氣至此隂之極而陽生陽藏於隂未嘗不動而可以謂之靜息於坎何也天地無二氣也藏之極而靜之至即為隂氣隂靜之久又必動焉則為陽復生豈二物乎如人之呼吸呼之極而吸隂即生於呼吸之極而呼陽即生於吸如環無端渾為一氣如此可知勞於坎之義矣在離相見之時氣亦如是此云勞而彼云相見者陽動而隂方生以陽為主故曰相見隂靜而陽方生以隂為主故曰勞也蓋萬物之氣皆歸藏於此也所以謂之勞如人之日勞役而夜休息所以為次日勞役之本也故孟子曰夜氣理與氣又豈有二物乎何以置艮於東北萬物至坎休息已久其氣充足氣已成終矣及轉東北隂靜中陽動已伏所以成氣之始也始終何以俱謂之成不過言氣之足耳言氣必言數如一至九而十則數已成其數又歸一矣所以曰成必言之於艮也妙哉文王之置卦也西南東北二土對峙養中於坤而成終始於艮天之下惟地為一大物其氣順承乎天以成萬物故萬物之始中終皆歸其責於地所以六子之用皆地之用地之用皆天之用也此後天置卦全言用也而自有立體者在出震之帝言之則其父也不必以先天之卦為體亦自有後天卦體在矣神也者一段申言後天八卦本於先天雖言流行之用實根於對待之體也以神也者一句言易易之所以生於太極也太極以神名者不雜於隂陽不離乎隂陽者也言太極已有天地之象形在其中矣然一氣渾淪一理寓於其中隂陽尚未分判隂中有陽陽中有隂故謂之神也此易之自無此易有此道以至於有易而有萬事萬物之理數也此天地之未有天地有此道以至於有天地而萬物所以生成者也既不離萬物又不可以萬物名之故曰妙萬物而為言蓋謂神也妙者生成萬物於自然萬物各得其生成以為物不見天地生成之迹也下叙六子其叙仍是先天方位然以水火相逮風雷不相悖山澤通氣結之者正謂流行之用本於對待之體也末句然後能變化既成萬物也且統六子於父母而歸六子功能於乾坤矣不言父母六子代父母之功能歸功能於乾坤者三陽三隂之功能皆乾坤之一竒一耦為六子之體也此段序父母合六子則照後天八卦方位申明六子相錯則照先天八卦方位結以乾坤統變化成萬物先後天兩圖合一之義象俱明矣此孔聖說卦明伏羲文王之同揆耳水火不相射即相逮也逮及也助也雷風不相悖即相薄也薄斯合矣故不相悖也助也合也與通同一氣而分位相錯也錯即交而已矣乾坤錯交而生六子六子錯交而生萬物乾坤為神之用也六子又乾坤之用也至變化行萬物成其推言用之極致又與先天之體用無異矣先後天卦圖及此二章詳于朱子啓蒙愚亦另有詳注附録於後傳釋後天卦圖根於先天之體以行用也然後天自有後天之體用此章亦以首節明用中之體次節示人以天地之用為體而萬物各自得其用也末方言天地行用之體即寄於六子用中亦如上章釋先天體用咸備也互觀自明右第六章乾健也坤順也震動也㢲入也坎陷也離麗也艮止也兑說也純陽故健剛也純隂故順柔也震少陽在隂下必動㢲少隂在陽下必入動求出入求進也坎陽在隂中故陷陷包也離隂在陽中故麗麗彰也即明也艮陽在上止於其止而寧靜兑隂在上說見於外而和樂也乾健坤順一節明八卦之性情即所謂卦德也亦須發明蓋此性情不論有知識無知識皆有性情也有氣成形即有理成性即無知識亦有理亦有性有情內辨其氣味外辨其形質斯得之矣右第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊右第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女右第十章乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑震為雷為龍為𤣥黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上槁艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兑為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊乾天稱父坤地稱母欲為六子明長幼之序皆由乾坤之竒偶索而得之所以立六十四卦之主爻也索本義言求揲蓍求爻也須發明愚謂自伏羲初畫卦時正是如此索求而立六子之卦故揲蓍之法亦自此立若但言揲蓍是言用而未及言體矣且神也者妙萬物為言辭云所以能行變化而成萬物亦須此章申明六子為乾父坤母所生故不言父母而專言六子寧止為揲蓍言哉以上各章就八卦申言其性情也屬身也屬物也父母交而生男女即以其理定揲蓍之數也又就萬物而比屬之不可盡也引身觸類與為無盡焉耳聖傳已明無庸贅釋自乾為馬以下似聖人殁後其弟子授易於諸家參錯叙入之文故本義所引荀九家易與此文有異同多寡萬物豈能盡擬議乎人云朱子不言象數而注經不刪此何也可見此等象數非易所重存而不論足以見本義之意矣右第十一章序卦傳有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兑兑者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉序卦傳似孔門弟子所纂述但因承乘以明授受而易之象義無窮者也序卦傳祗謂言其一義可矣雜卦傳乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也兑見而巽伏也隨無故也蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恆久也渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也雜卦傳明卦之相綜也相錯既明必明相綜矣傳頗有精義於本卦或明正義或另申明一義皆精確深切非羣弟子所能及者乾剛坤柔剛柔為隂陽之大用首見於上繫明其相摩乃成八卦八卦相蕩成六十四莫不自剛柔中出也比樂師憂比相親附師相爭奪憂樂判矣臨觀之義或與或求乃臨觀二卦每卦皆有與求非臨為與觀為求也臨為與而受臨者將有求於臨者也觀為求而被觀者將有以與之以成其觀也不出上下感應之理而已屯見而不失其居屯見險而經綸之以交際為經綸非使泮散也故曰不失其居居者水雷各得其所則四峙令行萬物生遂養之事也蒙雜而著蒙昧則龎雜開發之斯昭著矣教之事也震陽自下起艮陽在上止於二卦明陽貴也損益盛衰之始兼天德王道而言且兼後世治亂而言也泰否是終損益是始大畜時也時愈久而畜愈大無妄災也無妄非災妄則災矣若無妄得災則災亦不為災矣且災貴於立誠以修救時者貴於乘時而豫計也萃聚而升不來也萃聚有所驅升不來有所往也聚者此有所慕而自聚升而不來必彼有德惠以為之召也士君子升庸之義也然澤在地上聚之象也風行地上散之象也故曰不來也謙不本於誠則僞而輕豫不主於敬則樂而怠勝矣噬嗑取象於食物賁則本無色斯為文所自起也兑見而巽伏也兑悅德之容外見者也巽進德之序惟自知者也隨泰不必多事故曰無故蠱則必飭所以繼賁賁無色而能飭蠱以誠而已剝者陽盡如物之壞爛復者陽反如物之反來也晉明在天上故曰晝明而夷於地必有傷其明者矣夷平也誅傷也井通而困相遇也井所以為養八家通用其利均平故曰通困以隂柔掩剛為困如不掩剛而與剛相遇如婚媾然弗困而通矣咸速也恆久也感以心感感應必速恆以道行其行必久矣渙離也節止也渙必散而合渙為要節必吝而知止為通也解緩也蹇難也解足以開故凡急皆緩蹇行於險故舉步多艱也睽外也家人內也以離卦二爻分內外離明隂德也貴於內明而外若不明也外明則內必晦也晦明者睽合之由也泰否反其類天地交不交而已矣大壯則止遁則退也陽大而壯不止則亢隂起宜退不退則凶矣大有衆也同人親也大有無非所有乃合衆人之有以為有也同人無不來同乃合世人之心而相同也革去故也鼎取新也革以金從火而火革於金金足以去火之故故凉至而熱消鼎以風從火而火巽於鼎鼎足以養人以新故火改而鼎實乃曰新也小過過也中孚信也小過隂在外必不可過必陽居中以立體中孚隂在內必虛中存誠以立信也豐多故陽盛而繁也親寡旅隂盛而孤也離火必炎上坎水必潤下所以明二卦離主上卦之五坎主下卦之二也小畜寡隂弱故不能靜也履不處陽强故易動也弱必畜之强必安之用隂以和陽不重扶抑之偏論也需應待時故以不進為宜訟乃爭辨故以不親開釁也大過顛也四陽之實居中隂不能任必顛而傾也姤以一隂與陽相遇是為婚媾而以遇剛為宜也二卦隂雖同一微弱而取義不同一相遇一不足任也漸風行山止其進有漸女雖長而待少男後行方合夫婦之正道也頥之口實求陽正非求飽也既濟貴於初吉而終不亂方謂之有定如止至善而不遷也歸妹女之終將為婦也為婦而代姑子取妻而代父故取婦不賀未濟男之窮也陽不振無以續終也故既濟胥如未濟方不致既濟而終亂也終之以夬謂君子道長小人道憂不言消者消不長也合觀剝爛也可以知小人道長君子道憂亦消不長矣再合觀復反也姤遇也天地之道易之道盡矣此傳不言消之餘意可以類推以為十翼傳之結語也傳之有雜卦專明卦之相綜也相錯也非有此傳則六十四卦錯綜不備所謂錯綜其數者何謂乎是象數中取義理變卦之貞悔雜卦之錯綜必各詳其義象而後可謂通於全易也大易通解卷十五
