body:
  text: 大易通解卷十二江常鎮道魏荔彤撰坎下巽上渙渙節二卦相綜三陽三隂之卦渙繼乎豐而根於乾也雷火相值陽氣盛大則易於渙散且風水相遇風行於上水流於下亦陽氣渙散之象義也人事論之豐盛之乆人情佚樂成怠緩之習教化懈弛無聨屬之意如風水然風水本同為陽氣然本天之風親上本地之水親下且風尤為宣散之物水亦佚蕩之性合豐與渙以言渙其理氣不大明乎但渙則不欲其渙必有以凝聚乎渙立徳建業此聖人之成能也氣化渙者以合人心渙者以聚天地民物無不托命卦辭首言假廟以一心之誠合天人之渙洵守約而施博乎故風之為物可以開鬱散氣亦可以聚雲成雨水之為物可宣幽導滯亦可以團風聚氣王者以一心合渙而天地之化為風為水無不效靈亦不外誠立於中而天祖昭格萬物得所之理而已人心至小包乎天地萬物而有餘矣渙亨王假有廟利涉大川利貞彖辭曰渙亨渙因亨而後渙也未有通而不渙者王者觀渙之亨而有憂勤惕厲之心矣首假於廟以盡敬盡孝謹身法祖無敢怠斁乃得乎歛聚精神之道先以誠意昭告於天祖鑒臨之際也推之而誠敬以事鬼神徳禮以主刑政天地感民人宜無往而不通逹和順矣雖涉川濟險亦必進而有功焉此皆合渙之正道也然必利在於貞貞正則得中得中者誠裕於一心以合萬國臣民之心孝經所謂合萬國之歡心以事其先王利貞其合渙之本乎彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也彖傳釋卦名義曰渙亨渙之時固無不亨乃人心多因亨而更渙矣可聴其渙而莫聚乎又曰剛來而不窮柔得位乎外而上同本義謂自漸卦變三為二變二為三固然但何以謂之不窮何以謂之柔得位於外乎如三變為二則剛來而得中矣何以不云得中而云不窮如二變為三則柔雖在外而非隂位何以謂之得位俱不得明也今就本卦卦體玩之所謂剛來者非言卦變乃言内卦坎之中爻也坎以一陽入二隂中流動故曰來有此一陽主乎二隂而水之源逺流長不舎晝夜所謂不窮也所謂柔得位乎外而上同者亦非言卦變乃言外卦巽之初爻也巽以一隂居下而負二陽在外卦四為隂位而柔居之何其得位乎以此一隂主乎巽卦二陽皆隨乎一隂以成卦風之為物原是陽來隨隂陽在外隂在内而成風巽卦明之矣巽上二陽皆附於隂所謂上同也葢坎以中爻為乾元巽以下爻為坤元本卦以巽坎二卦相值而成故就卦體言之明上下内外卦為主之兩爻耳似與卦變無涉至於名渙之義全在不窮上同水之不窮中陽主之風之上陽來同下隂下隂主之陽之性入水而動隂之性得陽而散一動於下一散於上渙之所以為渙也如就卦變論即云三變居二二變居三與渙之為渙奚切哉兩爻交易且交而不渙矣天地之風水其性如是故名卦以是而占者觀象制義各有體象以立徳行政而成能矣王假有廟者體坎之陽在中而立誠於中以為合渙之本也利涉大川者體巽之隂在下陽同之乃乗木以濟川而有功也在中為立誠乗木為何義巽進之義也誠立於中以陽為體巽進而修身齊家治國平天下之道巽進為用也究之坎中即乾元君子之自强不息也巽柔得位即坤元君子之厚徳載物也况乗木以行於水上更合卦之體象王者合水木為用則木水相得為用不使之渙散於上下也此王者合渙之道崇效天卑法地而於坎於巽取為體用也所以先明内外卦體而後就卦辭以釋王者假廟渉川之徳業也𫝊不釋利貞此即至正之道也何復釋乎象曰風行水上渙先王以享于帝立廟彖傳曰風行水上渙先王以享於帝立廟似仍是彖辭之説而另申一義彖辭言渙風自上行水自下行在假廟而誠其中乘木而巽為進亦分體二卦内假廟存誠外濟險主敬耳然於乘木有功彖傳已聨水木為一見王者用之必使其上行下行者相合矣至象傳乃象之曰風行水上此二物遂成至相合之用矣風水二物如此象之何嘗一時相離乎先王體之享於帝者盡其敬也立廟以享祖考而配乎天者盡其孝也孝盡於親敬盡於天天與親似一神一鬼為陽為隂親上親下渙之極矣而先王之敬天即孝之至也先王之孝親即敬之至也而且享帝以親配天是以一心之孝敬合天親鬼神隂陽上下於無間也於風水分而本合之象中體㑹出一心合天地萬物之義何渙不復聚乎故王者之一身一心天地萬物無不恃此聨合為一也此即聖人所言知禘之説其於天下如示諸掌之義也乎渙卦繼豐如陽盛之時令風大行於水上江海多暴風也即平陸亦多風雨隂生五月後雲行雨施品物咸亨此乾之亨徳也萬物至此豐極然其氣亦渙極矣其象義俱可想見焉初六用拯馬壯吉象曰初六之吉順也初六變中孚之初九在中孚之初以陽變隂為渙繫以虞吉有他不燕中孚之初變渙中孚欲渙矣如既葬為三虞祭之時恐哀敬之漸渝也中間尚有無名之祭為他亦不敢自燕安而燕賔更不宜矣中孚庶不渙也葢哀敬之至無暇他及耳在外爻以隂變陽為中孚中孚以合渙如急難而為拯救必得馬壯行疾方致吉也象傳曰初六之吉順也順乎二之在中以合渙也初隂爻隨坎中陽爻為主順之至也故𫝊明之所以主中爻之陽與彖傳剛來而不窮同義虞吉有他不燕本儀禮士虞禮詳中孚卦本爻下九二渙奔其机悔亡象曰渙奔其机得願也九二變觀之六二在觀二以隂變陽為渙繫以闚觀因渙而上下有疑故用闚而觀窺上所為亦不妨擇主而仕也但如女之必以正道則利矣本爻以陽變隂為觀以陽主坎中乃内卦之主爻也變隂為觀恐其遲疑則危厲而多悔矣故繫以渙奔其机渙奔也而二則如机倚之以為安也如水之奔流有二陽主之奔者其用而不奔如机者其體也此机即在奔中非同中流之砥柱也葢合渙之徳用陽而有所以長流不息亦以陽為體子在川上嘆逝者如斯心通造化矣有所以主乎逝者逝者方能不舎晝夜不息如斯也此二爻在渙奔中有其机之理氣也惟有静體以制動動皆本於静動未嘗非静也不致動或有悔動皆静也悔自亡矣象傳曰渙奔其机得願也内有所主以體制用静有常而動不括矣豈不得其願乎所謂知止而即得止者乃聖賢求止至善之願也水不流則失其用故必奔奔而無机則無本之水可立待其涸奔而有机不舍晝夜矣故曰不窮悔亡則願得願者在心以人事言奔者應事不窮机者願得於中剛也六三渙其躬无悔象曰渙其躬志在外也六三變為巽之九三在巽三以陽變隂為渙繫以頻巽吝巽變坎而不能巽進故頻巽而致吝本爻以隂變陽為巽繫以渙其躬无悔者三處内卦上爻風行水上三切近之故曰渙其躬非剥之剥膚也葢剥膚有害其膚渙躬不自有私與世如風水相遭風自行而水亦自行順逆兩無心焉何悔乎以人事言之則我守於約聴人之自為離合也三爻能如此乃以二爻中陽為主而附之成體也三外用隂以御事應物而中有陽體所以不隨風為順逆而自行其正道耳象傳曰渙其躬志在外也志在應外卦之風也風來不常而志有常三之志在外豈因外動於中乎中既有定志矣事物之來固貴於利貞如卦辭之守已尤貴於變通以拯渙為合宜也是以志在外而審慎經營以求其咸宜悉當無非欲合物情之所同以孚一心之所安而已三之志外如推己及人之恕道而立於二之中者則忠也所謂體忠而行恕之用也内卦三爻俱為合渙立辭傳初乃順陽急合渙者二之中乃合渙之體立於此也為坎中得位乃乾元之寄位也所以主乎内卦三隣外卦風來水上成渙志外以行恕推心而置腹以此合渙亦本於坎之陽為體也六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也六四變為訟之九四在訟四以陽變隂為渙訟而渙不克訟明矣復而即於命之正渝乎所安之貞固不囘者此吉道也安貞而渝焉則吉可見貞而固者非貞而中者矣本爻以隂變陽為訟訟因爭而黨各聚渙訟則渙其羣矣不黨可知焉天下事之渙也以各有黨也君子不黨而渙自一身以及天下黨同伐異者息矣所以元吉四之所以繫此者以一隂主二陽而上同之已有羣之象焉再變乾三陽同體羣何如乎故渙求合也先渙其羣則天下之人乃大合也所以因渙而所聚反有丘陵之多匪夷所思此非平常之人所能思及者人皆以合為合君子以渙為合人皆欲合渙君子渙渙正所以合渙此君子之不可及也象傳曰渙其羣元吉光大也何指乎光大光明者在中心之誠無人己之私則廣大者其量在取善於無方矣以此合渙洵光大之道乎四爻為外巽卦三爻之主故能用隂合渙惟下隂上陽故𤼵而光大焉彖傳曰柔在外而上同正謂四爻能渙上同之羣合下水為一則風與水大合無在内在外之可分矣九五渙汗其大號渙王居无咎象曰王居无咎正位也九五變為蒙之六五在蒙五以隂變陽為渙繫以童蒙吉童蒙得渙而開啟其性善何吉如之蒙開而真性湛然無理不具足以應事物於無窮矣本爻以陽變隂居渙之五位繫以渙汗其大號布徳行仁所以得天下人心之歸也人心歸天命永皆合渙之大者也然大號汗𤼵其條教法令之用也所布之徳所行之仁何一不本於王心乎仍是以一心合天下人之心以為合渙耳故雖當渙之世有王者居天位主心徳以渙為合必无咎也王居兼徳位而言位王身之居也徳王心之居也徳與位皆王所居乃合渙之體用也象傳曰王能居徳居位自然无咎由於徳能正位也當渙之尊位有徳以立之所以謂之正位耳正位傳釋爻辭也原以位言而所以正位者徳也若渙王居作散財𤼵粟言傳所謂王居无咎不成文矣且渙汗大號一切用人行政發恵施仁俱在内何必又言渙王居為散畜儲乎陸宣公之散小儲得大儲之言為中主勸也非聖人無所為而為也且象傳明謂正位也可謂居為小儲哉渙王居以渙為合也王居者位也位豈可渙渙其心徳仁民愛物合之為一也徳乃居位之本故傳云渙王居正位也明徳乃所以正其位者渙王居主渙王心之仁徳極合傳意老子畏威章云無狹其所居無厭其所生不狹其居即富而不驕貴而不亢孝經云髙而不危所以長守貴也滿而不溢所以長守富也皆渙王居之義也散財發粟不過渙汗大號中一事耳上九渙其血去逖出无咎象曰渙其血逺害也上九變為坎之上六坎上以隂變陽為渙繫以係用徽纆寘於叢棘三嵗不得凶坎終變渙不能出險矣坎中陽也賴此主卦出險變風則中陽亦從隂矣上隂安能獨出險乎取象於係之寘之為不得出也本爻以中變陽為坎渙極而變險亦不能合渙外卦巽之三爻以下隂為主上二陽爻下附而同之今變坎更以五陽為主上因處於險而不能成渙矣繫以渙其血身之精神不聚也去而逖出可无咎渙之終不能合則以逺出為免咎無復能合乎渙矣不言㐫吝者象傳明之象傳曰渙其血逺害也又為終不能合渙者另申一義合渙之情用心已甚至於出血誠以示人而人不能合則惟有逺害一著離此渙局亦渙羣之一義或者反渙其丘而匪夷所思亦未可知此知其不可為而去之而仍有為之之心者也所以无咎也此爻㣲子以之外卦三爻亦以合渙為義然巽體主散乃以散為合如四之主外卦散羣而得渙其丘也五以渙汗大號而王居無咎渙能合也至上爻雖不能合渙於終究之附隂合渙之義存焉雖逺害全身正欲另圗合渙渙亦必終合矣五之合渙變艮得止也上之逖出變坎水各分流也故有能合不能合之分焉而附於四隂則一也本卦内卦用坎中爻之陽外卦用巽下爻之隂隂陽分用何以根乾此乃就二卦合體而論據彖傳也彖傳剛來不窮水之所以為水也柔得位乎外而上同下爻之隂得四隂位而上二陽爻同之所以成風也故巽雖隂卦而合乎水則附於陽卦方能合渙葢風無形水有質風歸於水自合矣且二卦渙為二而合為一在人事則一心之中陽合萬物之風散也象傳明之矣故根乾也再繹五爻爻辭王者之渙大號如汗之出體不可返取於坎水如言之出口不可收取於巽風不難於渙而貴於立誠達信以為渙在渙號者文王之與國人交止於信也至渙王居非渙王位乃渙尊位之勢耳即王徳亦不可居而當渙如居徳則忌之義且可渙徳而仁必及天下聖不曰予聖矣如此為渙何咎乎而何非正位之王者所當體之者哉兊下坎上節節綜於渙繼乎旅根於坤三陽三隂之卦至渙節而終下經之咸恒有所歸矣澤山咸雷風恒分根乾坤恒至渙終下經三陽之卦咸至節終下經三隂之卦由咸而損而困而漸而豐而渙由恒而益而井而歸妹而旅而節其次第相繼之義象各明於本卦之首兹言旅繼以節之義象在天地氣化秋冬收藏之時令也陽氣潜藏将以成終於艮也勞於坎者成終始於艮必節焉而後養陽充裕足以為來春生𤼵暢達之本也旅以火在山上成卦陽氣已止於下而火猶浮㳺於上如十月時令未大寒而先温暖諺云十月小春天是也于此時純隂中之陽寜可不節乎至日閉闗商旅不行后不省方非至日之事也乃十月中氣以後以至至日之事也十月純隂而一陽已生至十一月中氣後一陽始滿足耳旅至此而商旅不行所以養息其勞役将此利攸往於開春之後也節以繼旅有取於斯焉即就人身而論保合太和於冬更宜謹身寡慾撙節愛養以培次年終嵗之生氣也老子言寳嗇有合於斯所以善孚養之道也是萬物之生意俱養於冬俱以節為養培植者厚則生育者盛天地人物胥如是耳此旅節二卦相繼之義象也本卦之義象水澤相值為節水至冬而歸於澤澤在天為雨在地為水所􅚈也言歸者無漲溢之患矣葢澤者兊也兊乃秋令陽入於隂下水陽物也亦必歸於積水之澤凡春夏之泛濫者皆消矣孟浩然詩云八月湖水平亦可証秋後冬令之水矣所以水在澤上為節無非歸養即無非用節以為歸養而已矣此澤水相值成節之象義也試再繹咸恒至渙節終三隂陽卦之象義澤山為咸風水為渙山澤通氣相感也風水各行則渙矣故欲合乎渙必風水合為一氣如山澤之氣相通矣雷風為恒水澤為節風雷相薄恒道也水歸澤中須節矣然欲酌其節必水澤出入得中道如風雷之氣相和矣再者以一心感天下渙也而天下應之合渙以為感也乆道化成天下有節也而節以制度不傷財不害民用節乃有恒也此始咸恒而終渙節之義三隂三陽即存中道於爻畫之間咸者中心為感恒者中道為乆也渙者合天下於中道節者用中道於一心也似為傅㑹然何非四卦象義所有乎水歸於澤水至冬而無用天地自然之節也聖人體之節用而愛人三時之隙大工大役使民既以時無輕用民力皆節之理氣也况水之利在天地大矣三時所用皆冬月所節也治橋梁修河渠通溝洫築隄防為水謀者考工月令所載詳矣試一體㑹而節之有闗王政者水澤其要務乎推之食貨之所聚財賦之所生開其源而節其流者何一不可取象於水之流澤之滙哉節之在易卦殆與洪範八政相表裏者乎節亨苦節不可貞彖辭曰節亨節所以為亨也節則其用嗇矣用嗇者體必裕未有體裕而不亨者但節之過則苦矣一切簡陋促狹處己己難堪待人必近刻此不可以為貞而多執固少流通也葢節之為道中道也不奢不儉隨時遇事斟酌於中道而節之方為節之至善也彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民彖傳釋卦名義曰節所以亨者象卦之三隂三陽中和均平無過不及也然柔之為道原順乎剛故節之為卦二五剛皆得中得中於澤所以節其源也得中於水所以節其流也食貨財用皆天地之隂以養萬物者也惟其隂物故主乎陽以節之以陽節隂剛柔均平矣以陽節陽則失於濫而無節以隂節隂必致於苦節不能當於節皆非經乆之道也惟其苦節不可貞其道必窮所以聖人取象立卦體乎卦徳而行節之正道焉正道者何以悦行險乃體兩卦之徳也何謂悦以行險險者水也財貨皆水象至險者也所聚之地皆足以興戎起禍故謂之險必得人己各悦之義以行此險不聚於上而藏富於民不靳於施而必酌其當以一心之理與天下事物衡厚薄量輕重以為與受則己心安而人心悦矣此悦以行險也是在於當位者體節以為節用中正之道以己心通達乎物情以物理節制乎嗜欲斯中正之道得於心而於天下事物皆節得其宜矣即論天地之氣化隂陽升降徃來出入皆有次第必有倫有序而後各得其中正和平焉葢有所以主之者為之節其過不及也所以四時之成亦成於節也惟其有主乎時行者故四時之氣化無忒也王者法天地之節以立食貨財用之準其立法制度各有節焉如五禮之用百工之需養老尊賢有費授田詔禄有典四民無告則有施春秋補助則有給何一非理財裕民之計何一不本於中正為道者以節之乎於是上不傷財益下而未嘗損上下不害民合天下以奉一人而其實以一人養天下也此節之天道也即節之王政也以一心中正為體通於天下之用者聖人之徳也徳陽也而用以制節則用隂也故根於坤焉象曰澤上有水節君子以制數度議徳行象傳曰澤上有水節君子以制數度議徳行澤雨澤降於天也水江河行於地也雨澤必有節故無乾溢之患江河必有節以資啓閉之功二者在天地所當節者皆賴人節之矣何以節之乎以中正者通之而已既言節何以言通不知非通無以為節惟通乃能中正也君子體之以制數度議徳行數度如禮樂刑政之類數以多寡言度以長短言君子節以制之不濫不刻賞當其功廩稱其事所與合於義矣徳行如三徳六徳之類徳以所存言行以所著言君子節以議之攷徳衡業師事友事尊賢崇徳有其等也皆體天地自然之氣化而為王心立中正之宜何一不本於執中守正者以通之乎通之所以時措咸宜焉孟子曰尊賢之等即議徳行之謂也若頒爵制禄一章則制數度之大者其餘宫室車馬冠服器物無不有多寡長短焉周禮備矣皆王政所重也既有闗於財用之宜節且有闗於徳行之應議古人量徳而授官頒爵以制禄是二事亦一事而已至於量才授職量能備用該於徳也臨時因事制宜亦不外此二事耳愚謂制數度如水不盈既平議徳行如澤及時合宜象傳無不就上下卦而分言之細玩自得如澤水困之致命遂志致命體澤之不下降而委命於天遂志體水之不可禦而順行於地也初九不出户庭无咎象曰不出戸庭知通塞也初九變為坎之初六在坎初以隂變陽為節繫以習坎入於坎窞在坎下變悦忘險不能隨二爻之陽流動矣故㐫在本爻以陽變隂為坎悦而變險在節則守險即守節也故繫以不出户庭无咎象傳曰不出戸庭知通塞也守險則塞然節塞於下漏巵杜矣通即中正之通知險而守節自得中正之道而為通矣九二不出門庭㐫象曰不出門庭㐫失時極也九二變為屯之六二在屯二以隂變陽為節繫以屯如邅如乘馬班如匪冦婚媾者動變悦進則遲疑矣然不進者守貞待字匪冦而婚媾也故十年乃字見屯之難難於開通也而守節之義兼焉本爻以陽變隂為屯繫以不出門庭㐫者恱變震震動而恱不能節可知矣况節者節於今而通於後也節於今冬為來春宣陽布和也變震乃帝出之時而不出門庭焉必養失道矣雷當春必出地乃不出焉其㐫在時令人事皆可知矣象傳曰不出門庭失時極也可見震之出也固宜應時以為諸陽倡然非養之裕何以出以時乎此節之所以必節於内卦所謂作法必先於儉也六三不節若則嗟若无咎象曰不節之嗟又誰咎也六三變為需之九三在需三以陽變隂為節三隣外卦之險開兊口以受水所以有需泥致冦之辭本爻以隂變陽為需恱變徤恱動而徤於有為難於守節矣故戒以不節若則嗟若然嗟若必知節可以免咎矣象傳曰不節之嗟自致於嗟又誰咎乎无咎者無所怨尤也𫝊雖歸咎於三然節則不嗟可以免咎亦在言外矣爻辭象傳皆在可吉可㐫之間示之也𫝊又申戒如此三爻為内兊卦主爻故更詳慎以致警焉以上内卦三爻初知險以守節得无咎二以節養不裕及應用之候不能及時故㐫三則必節而後免嗟内卦節之始也尤當加謹况兊體恱徳宴樂佚樂不節之源也故戒之以出入吉㐫之間所以示主内卦之爻也且澤上有水水歸於澤不節則如水之注海有尾閭沃焦而耗歸烏有可不慎歟亦取於兊口如需三致冦之象義也六四安節亨象曰安節之亨承上道也六四變為兊之九四在兊四以陽變隂為節變險知難不苟恱而商兊未寜故能介其疾而有喜在本爻以隂變陽為兊險而變恱恱於節者也繫以安節自然安於節矣故亨此附於五而得中正以通之道也象傳曰安節之亨承上道也四近於五坎二隂原附於中陽承五之甘節以為安節君臣合心而成節也所以得亨也九五甘節吉徃有尚象曰甘節之吉居位中也九五變為臨之六五在臨五以隂變陽為節繫以知臨大君之宜吉君位臨民而得中正以通之道則以知臨天下所謂聪明睿知足以有臨也在本爻以陽變隂為臨既當節五之君位有陽剛中正之徳矣復變臨以柔順睿聖之知通之故能以中正為節得甘節也甘味屬土中道也無不及節且反乎能苦節之過也節合於中道必吉一心之中正者至此必大通於天下矣故徃有尚言可以乆逺行之於邦國也象傳曰甘節之吉居位中也五在坎中為坎卦之中矣且當位以節中正以通彖辭言之正指五有其徳位水之為利用於無窮也是節卦之主爻也不止為外卦主爻矣且甘者反乎卦辭苦節而以甘得中道也上六苦節貞㐫悔亡象曰苦節貞㐫其道窮也上六變為中孚之上九在中孚上爻以陽變隂為節繫以翰音登于天貞凶中孚之極何㐫乎惟其變巽為坎本可進而有險以阻之如翰音欲登天豈不難乎貞者無㐫欲進而忘險則貞固於進矣故㐫在本爻以隂變陽為中孚隂變為巽以險為節之極而猶欲進於節則苦節也貞固自不可通而㐫見矣又云悔亡者當節之世而過節雖或有㐫亦必得利故悔可以亡也象傳曰苦節貞㐫其道窮也至節之極猶巽進於節非中正以通之道也故曰窮也窮即㐫也非有他咎也與爻言悔亡相符矣以上外卦三爻節於終也四以隂附陽而安節得亨五以主外卦且主節卦中正以通故徃而有尚也上爻則過於節而苦矣不可通而道窮非節之中正也然云悔亡則本義謂禮奢寜儉之義乎亦附于中爻之五為象義也節卦以三五兩爻分主上下卦一隂一陽仍是剛柔均均者中正之道所以通也其主乎隂者財用隂物也根於坤者萬物無不生於坤其源也非節於流何以裕其源乎節於冬而生於春藏用所以為顯仁也且坤之氣化至於至日陽復陽又司令隂卸政矣所以以節要其終也說卦傳曰勞於坎坎水也節水歸於澤以養之正節水於澤也勞乎坎即養於節耳兊下巽上中孚中孚與小過相錯中孚結下經四陽二隂之卦為遯為大壮為家人為睽為革為鼎皆歸於中孚中孚者誠立於中而孚於外也誠者陽也立誠於中則隂静之體也是以中孚結下經四陽二隂之卦以隂少貴隂而主隂根坤焉玩中孚之為卦上風下澤乃巽兊二卦交孚成卦是以凡主隂根坤之卦皆孚於中心之誠為隂徳在心足以宰制羣動而立體耳外巽者陽行於外内兊者隂恱於内虚其中以存誠上下左右前後絜之以矩而無非實信之道矣此又中孚之卦象也然則中孚亦繼巽兊而為卦焉再繹卦義風行於外逺皆孚也澤恱於内誠本裕也内誠則不自欺而自慊恱諸心也至矣然後可以好惡得其正行已應世本身加民無非至誠所謂言忠信行篤敬蠻貊可行矣此中孚之義不外於象者君子體之自天子以至於庶人壹是皆以脩身為本脩身之本必正心誠意為先務矣是得乎坤之黄中而含章於内也坤文言所謂至静而徳方也此坤之元也所以順承乎乾元以為元者也中孚豚魚吉利涉大川利貞彖辭曰中孚豚魚吉中心既孚盡已之性以盡人之性盡物之性皆一貫之誠也至誠之誠經綸天下之大經盡性以盡倫也知天地之化育盡倫以盡物也而自立其誠以盡性則立天下之大本也立於此即通於彼天地萬物無二理氣即無二性均為氣以成形理亦賦焉故存於一人之心可以通乎天地萬物之情也豚魚乃物之至㣲至惷者誠之所感無不各遂其生各得其所而獲吉焉親親仁民無不廸吉更可知矣以是而乎大難濟大險如大川然涉之無不利矣又戒以利貞者誠者難存而易渝也利於貞而終始如一焉則所存至純而所顯為明著動變以及於化者何可量乎彖辭數語中庸言天道諸章根柢在是矣彖曰中孚柔在内而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虚也中孚以利貞乃應乎天也彖傳釋卦名義曰中孚者柔在内而剛得中柔在内隂虚故私慾祛除湛然無慾粹然至善者存於内剛得中陽實故剛徤篤實本乎固有行而悉達者暨乎外此聖人立體制用出於自然而君子為學修身以希聖於勉然者也徳立於一身化行於邦國以内悦而外巽者孚信於人焉此邦之所以化也君子之所守篤恭而天下平矣内恱者誠裕於心無所疑惑則恱矣外巽者信昭於世無所扞格則進矣一心之理得而天下之情通此聖賢守約而施博一定之理也豚魚物㣲何有吉㐫中孚之信無間靈惷而人類可知矣大川險地何用虚舟中孚之誠足以濟難夷險而物虚理實可通矣言信及豚魚就恱之徳言也言利涉大川就巽之徳言也何以謂之乘木舟虚乎乘木者巽也以巽為進進之為道由已及人由民及物由近及逺也然非虚舟其量則所載者有盡乘之所及亦有窮矣惟此舟常虚有天下而不與也美利及天下而不知也天下歸仁而不敢自以為已己克禮已復也聖徳建極合人物之性情以為㑹極歸極而聖不敢自任也王猷允塞服教畏神合凡有血氣者以為尊親而功能不自居也此中孚中虚之象就恱而巽之中形容乎徳為虚衷無不容道為虚量無不包也是聖徳王功皆本於虚静之體也又必云利貞者天地之道無終始也中孚之利貞亦必無終始則應乎天行之徤矣葢中孚必如天之運於不息而後坤之體徳立於至方而不渝也即敬以接物亦存誠之藉乎外以敦其内者也故根坤仍以乾元統之乃本於𫝊應天之義也如是則存為天徳行合天運聖徳亦同於天矣象曰澤上有風中孚君子以議獄緩死象傳曰澤上有風中孚君子以議獄緩死𫝊另申一義於卦象也澤主悦而在下下恱也風主散而在上上施也上施木道仁道也下恱於澤能成萬物於兊也取二卦相值之義議獄以明刑弼教也如兊之霜露降肅令行也又必緩其死者刑期無刑也如巽之風和暢生意於至齊也傳曰澤上有風合風澤為一矣不同彖傳分言説巽矣貴於嚴中寓寛行義正之事存仁育之心也是為另申一義而亦不外於體象焉初九虞吉有他不燕象曰初九虞吉志未變也初九變為渙之初六在渙初以隂變陽為中孚繫以用拯馬壮吉拯渙能合貴於用陽陽在坎二坎為馬也故傳曰順也順乎陽以為壮馬也亦兼中孚義而以孚為陽以二居中也本爻以陽變隂為渙中孚烏可渙乎繫以虞吉有他不燕者如人子之既葬其親哀思恐少渝矣然三虞之祭既畢卒哭之吉未即中間有祭而無名者他也此時子心不可以少懈故惟嚮尸而不燕賔所以存此哀痛之心不敢忘也象傳曰初九於虞吉之間有他不燕以存哀痛思慕之志未敢遽變耳初在中孚之初厲其志所以以始要終耳附録儀禮士虞禮於後儀禮士虞禮云始虞用柔日註葬之日日中虞欲安之柔日静隂取其静又云再虞皆如初註丁日塟則己日再虞又云三虞卒哭他用剛日亦如初註當祔於祖廟為神安於此後虞改用剛日剛日陽也陽取其動也士則庚日三虞壬日卒哭他謂不及時塟者喪服小記曰報塟者報虞三月而後卒哭然則虞卒哭之間有祭事者亦用剛日其祭無名謂之他者假設言之文不在卒哭上者以其非常也檀弓曰𦵏日中而虞弗忍一日離也是日也以虞易奠卒哭日成事以吉祭易喪祭明日祔於祖父如是虞為喪祭卒哭為吉祭詳在賈疏繁不悉録此說與本義不合故録儀禮原經文及鄭註以明之九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也九二變為益之六二在益二以隂變陽為中孚繫以或益之十朋之龜弗克違永貞吉二變隂為陽得中則龜之靈明在於心而如或益之矣弗違永貞焉得不吉且可享於帝帝亦獲吉兼中孚言也在本爻以陽變隂為益亦以得中之陽爻取象以鶴鶴陽物中孚之誠在心取象於鳴鶴在隂也已心既誠人孚於外如子之和父也有此中誠外孚之徳所謂天爵修而人爵從之矣我有好爵吾與爾靡之中孚者固不可以好爵見誘而靡也而學至君求成已成物亦君子所必應也象傳曰其子和之中心願也孚者在人實信其誠方誠服而願和焉上下左右前後凡見從而來和者皆孚於中也故於二爻著其義象明感應之道焉六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六三變為小畜之九三在小畜三爻以陽變隂為中孚三與四比内外五隂皆為四所畜而三獨處徤極即亢陽也不屑受畜所以有輿說輻夫妻反目之象也在本爻亦因三四兩隂虚中成卦三變隂為陽為小畜畜隂於内虚中之己私也變陽則己私必克如得敵然必勝方休至於或鼓或罷如行軍之起止以為進止也或泣或歌未能克則憂之而泣既克則奏凱而旋矣象傳曰或鼓或罷位不當也三處内卦兊澤上爻虚中成象為中孚之爻也隂柔居三陽位故曰位不當且以隂居中恐其畜為慾念存於中則更無當於中孚之象矣惟能得敵而鼓其力以至既克方罷虚中之體仍湛然矣位雖不當而隂私既克則虚中之象自成矣六四月㡬望馬匹亡无咎象曰馬匹亡絶類上也六四變為履之九四在履四以隂變陽為中孚孚於五君位也故履虎尾而愬愬然終歸於吉在本爻以隂變陽為履履者禮也四亦虚中成卦之爻中有私者在三爻象其克已矣四爻又以復禮象之繫以月㡬朢者隂不可極㡬朢不盛也馬匹亡者馬屬午隂物也既克私而復禮隂私自祛矣禮復於中私已克亡則虚中之體所以誠於内而孚於外者全其本然矣故无咎无咎即无私有私未有无咎也象傳曰馬匹亡絶類上也絶乎隂私之類而能變巽為乾三陽盛長有日上之象矣此卦以兊上爻巽下爻為虚中之體象之以虚舟以載道也道者率性之謂虚中之體即性也虚舟載道而行耳存為虚中者𤼵為逺道也然虚中中有已有禮已則必克禮則必復三四兩爻一象克己一象復禮為中孚之所以致中孚者明其學也乃中孚下手功夫學易可不明之乎九五有孚攣如无咎象曰有孚攣如位正當也九五變損之六五在損五以隂變陽為中孚損本中孚則人必益之矣益之十朋之龜明理於心也弗克違則元吉名為損下益上其實上以徳惠益下多矣在本爻以陽變隂為損損於中之私而得虚則陽剛中正之誠實篤於心矣象以有孚攣如拳拳服膺也誠孚如是何咎乎象傳曰有孚攣如位正當也言位正當正言其剛徤中正能修勉中孚之徳以正其位也上九翰音登于天貞㐫象曰翰音登于天何可長也上九變節之上六在節之上六以隂變陽為中孚居節之極仍思巽進於節苦節不可貞是以㐫又言悔亡者節終較奢為免悔也本爻以陽變隂為節繫以翰音登於天貞㐫翰音雞也豈能登天此中孚之中不誠妄思孚於髙逺者也貞固於此則㐫道也象傳曰何可長也雞飛焉能至天中不誠而孚自不能行也中孚六爻初爻乃由静存而動發之時雖已誠裕於内猶必致慎於将動之時如塟親者固哀慕終身不忘當卒哭即吉而不敢變志也此爻正是中庸所謂慎獨二爻得中中即誠也中既誠而孚者自孚矣三四兩爻居中成象虚静之體具衆理而應萬事大學之明徳也有私必克於三有禮必復於四而明徳明矣此是存誠𦂳要工夫故兩爻為本卦主爻兊原主上爻巽原主下爻也九五有孚攣如體立而用行矣上九有要致人孚之意即中誠果裕亦不長也君子之學内治於心不騖於外但有外馳中誠已漓矣中而孚者本然之體自立自然之應在人耳觀二爻象傳曰中心願也則人之孚我之誠亦孚於人心之誠而已矣中孚二隂在内四陽在外四陽爻皆附於二隂爻巽兊二卦原以坤元寄于初上兩爻以此成虚中之體名卦曰中孚故仍以兩爻分主内外卦焉中孚結下經四陽二隂之卦歸于中誠以隂爻在卦中取其象義隂之虚也實其虚者陽也誠者乾元也所以資始者也出乎震則天下雷行物與無妄者是也有物有則悉有恒性命于天者繼之者善也成于人者成之者性也自善之陽成性之隂自性之隂立誠之陽自誠之陽𤼵而應事接物人皆孚焉又合于人心物情恱孚之隂也隂陽互為體用者如此四爻辭云月㡬望如月十二三日上弦後之月隂已盛矣何謂復禮不知隂盛無碍于復禮隂非已也隂過于陽方為己則應克如隂不過陽雖盛祗為性體之隂耳且陽盛而過獨非已乎故惡有隂惡有陽惡皆以過不及論不以盛論也况月之㡬望得日之陽所照已多隂皆中正之隂矣豈可以為己私而謂必克之耶虚中之性亦隂體也豈可謂之隂私乎試思之自明禮為隂故體嚴而用和則陽也中孚者巽兊二卦相交成卦則中孚居中二隂乃諸隂之㑹歸也故總下經諸主隂之卦俱歸于既濟主内離之隂而結下經且結上下經諸隂卦總歸根于坤焉艮下震上小過小過與中孚相錯小過結下經四隂二陽之卦為晉為明夷為蹇為解為萃為升皆歸于小過小過隂過于外而陽居于中也中者體也體立于中則隂過者皆制于陽以得中是以小過結下經四隂二陽之卦以陽少貴陽而主陽根乾焉卦内陽外隂則小者過也葢小過之為卦上雷下山乃震艮二卦比而成卦是以凡主陽根乾之卦皆比于陽陽乃心之仁也凡事物應接皆化裁神明于義之隂矣震者用動于外艮者體止于内内實其體以主乾之元凡天地萬物無不以乾元統之如聖人以一心成性而四徳萬善皆由此出自然𤼵皆中節而得其和矣中陽也和隂也此小過之卦象也然則小過亦繼震艮而立卦焉再繹卦義雷動于天用之𤼵也山止于地體之存也體在則用之𤼵者皆有體以維繫之而不致動有躁妄矣然後見此止徳非執固膠滯之止隨時隨物隨事皆有咸宜之措而動静胥有存養省察之學也此小過主陽之象也然小過何以不言克制乎葢過者多也隂多至萬殊而陽徳以一本貫之也隂爻之象義豈皆目之為隂私小人乎此後儒之見論非聖人當日立卦繫辭取象之義也小過之隂多而過指事務言故在外非私慾亦非小人但能以一貫萬則視萬皆如一如以為多則究未能得乎一矣此所以名卦曰小過示學者多學而識之學君子不貴也有聖人一貫之道存于中則小之在外者皆一之用也故中孚小過二卦不與諸卦論内外同獨以中為内以上下四爻為外兼上下四方以言外以中為中也須明此義方可觀玩卦象而明其理焉是以以乾元統天者主中陽為諸主陽根乾之卦會其歸焉小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖辭曰小過亨隂多於陽何亨乎隂乃萬事萬物也凡有一事成一物皆隂也而吾静體之發而為動者以紛應之是以陽應隂也一事一物皆有隂陽隂陽偕和則毎事每物皆具一亨之道也得其道斯亨矣惟利於貞以正而中者應之則事物雖多而吾心之中正者自一也又云可小事不可大事與睽之彖辭同義小事者就一事一物論也一事一物各得其中正之道就小過隂多取象義故吉也若聖賢之處事應物一事物有一事物中正之道即處萬事應萬物無非此一中正之道合小事而為大事矣合物則而本於恒性矣大事何嘗不吉乎辭云不可大事者未格乎物理之多不能遽得乎心徳之一早為陸王之說嚴其戒矣不格物窮理而遽思以一心應萬事萬物祗為無忌憚而已故必先於事物各得其當然而後於吾心求其所本然以本然者合當然所以然之故必能㑹矣於是以不得不然者處之應之身世人已俱合乎自然之道矣此就小過之義以明聖賢之學也至於卦象以四隂夾二陽如鳥之張雙翼故象之以飛鳥鳥飛於上音遺於下象卦之震動故有聲於上隨時知止則象艮止於下也鳥飛而動雖屬震陽而知止於静則屬艮隂也占者得此不宜動於妄而上也惟宜静而安於下也能安於静於下不患不能動而上矣斯合於卦之象義而大吉也静則誠而一動則妄而雜亦以一制萬之道也彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也彖傳釋卦名義曰小過小者過而亨也觀傳此訓知小不為隂私之事隂邪之人矣小過隂雖多而自可以得亨也如係私慾佞人何以亨乎葢衆物庶事每患於過多壅滯困蔽不能得其通也如能知其各有當然俱合於吾心之本然則應之以不得不然皆有自然能亨之道也何患於小者過乎又必利貞者小者雖過多吾心之貞至一以主乎利貞者應之則事物雖不同莫不因時而與我酬酢吾以一貞隨時制宜則是與時偕行也乃一本以達萬殊之道也何以謂之小事乎以卦之象柔得中位耳夫柔者隂也小事也柔得中者各小事之内皆有中道也吾心之貞正而中者則大事也以吾心之中制小事之中體陽用隂此所以言小事吉就中之散見於事物者論也不可以大事者剛失位而不中也吾心之剛如失乎主内制外之位則不可以濟大事矣故卦之三四兩陽在中另取於剛正當中之象所以以陽主隂以中制道合小事之吉以成大事之無不可行也此大事非謂大政大務即大政大務亦是小事大事者性之本體也命於天而率之為道者也如就外事分大小則非聖人謹小慎㣲之學矣惟心與事分大小則一事得當無徃不臧矣卦有飛鳥之象上下四隂如張兩翼也飛鳥髙而遺音不宜上宜下震動於上則妄而逆艮止於下則安而順也應接事物貴於主静以御動不貴於逐事物以為動動逐動必不得其宜故曰逆静御動方能其用故曰順也順者率乎性順乎道也此所以得大吉也鳥之飛而上逆也用力必多而成功必少下飛順也用力必少而成功必多君子觀於鳥而得遵道以行之宜所以大順而大吉也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉象傳曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉𫝊取象另申一義雷自地起騰而上山山亦地也但為地之隂盛而過髙者耳雷起於地其常而起於山者似變亦常也山為地之過者雷亦在過即起於過而已為山為地一也君子體之當小過之時於守經行已之中存範世匡俗之意行過乎恭而不為恭而無禮也喪過乎哀而不為毁傷滅性也用過乎儉而不為苦節之貞也於過之中仍無過無不及也此君子之在小過體小過也小過小者過則吉過恭過哀過儉小事也而自有至正大中之道小事可過大事率性循道則無過不及而得中也大者在心得中小者在事雖過亦中也初六飛鳥以㐫象曰飛鳥以㐫不可如何也初六變豐之初九在豐初以陽變隂為小過繫以遇其配主雖旬无咎陽當盛大而變隂得其配主應四爻之陽以損之也故雖旬亦无咎可以徃有尚也變小過言旬也象傳言過旬亦有取於小過也本爻以隂變陽繫以飛鳥以㐫初在下止體而變離火隨雷上飛無隂静以維陽矣故㐫象傳曰飛鳥以㐫不可如何也變雷火必隨雷飛不能得止恃明則妄動矣誰能如何乎六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也六二變恒之九二在恒二以陽變隂為小過繫以悔亡九二得中恒乆之道雖小過如象傳所言亦不為過故悔亡在本爻以隂變陽為恒止體變巽則思進而過乎三三是本卦主爻非過其祖乎然二與五正應隂與隂不應變陽則應故遇其妣妣五隂爻也已小過矣然變陽必附本卦之陽究不過也既與五應何以謂之不及然則君非五也易無定以五爻為君之義象君三四也陽一君而二民三四陽君二五隂臣民也不及其君未過陽爻也幸遇其臣得應五爻也五與二雖分居上下卦中位然在中孚以三四為中二五兩爻皆以附陽成小過中陽之體象也艮變巽似過仍未過而得遇所以无咎也象傳曰不及其君臣不可過也君指三中陽主艮卦二附之不及即不過矣隂在小過原以中陽主之豈可過乎過則不成小過以陽制隂之正義象矣此就内外兩卦通體取象言義與别卦上下二卦分論體象不同九三弗過防之從或戕之㐫象曰從或戕之㐫如何也九三變豫之六三在豫三以隂變陽為小過繫以盱豫悔遲有悔豫順體變止體止於豫而必悔悔若遲則更有悔矣盱上視也猶有觀望之意故示以遲則成悔矣本爻以陽變隂為豫乃主内卦之爻而又為小過卦之中爻變坤順恐其隨諸隂而過也故繫以弗過防之陽以别隂者防隂又變坤屬土有隄防之象也不能防則從隂或有戕之者矣㐫可必也象傳曰從隂者變隂而惟隂是從也或戕之者失剛中之體無以制隂則紛華靡麗俱足以淆惑之矣其㐫何如言不知将何所底也九四无咎弗過遇之徃厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也九四變為謙之六四在謙四以隂變陽為小過繫以无不利撝謙順體變動發揮其謙於事務言動之間而無不利乃謙徳内積乆而宣達非有意以張大其謙也亦兼小過剛中𤼵外之象矣本爻以陽變隂為謙繫以无咎動體變順能安於静以静制動也故无咎且能使隂弗過而無不遇之葢二陽居中而制羣隂於外弗過則無不處之得宜故無不遇之也遇者各得其事物之宜以遇乎一心之中也然必終始宜於守乎剛中而一者若往而逐事物以為應則危厲不安矣此君子所必戒也又云勿用永貞者於自守之中又貴有隨時皆宜之道若執守一而無權則子莫之執中矣故勿用永貞再玩爻變異同三四兩爻主乎本卦三變坤順而或戕之者艮變順失止乎中之道恐其隨外震為動也四變坤順而弗過得遇者以震變順得乎中有主而順應之道合於順乎内卦為止也以陽居中易動故以静止為徳以動變為失然陽豈終不動乎動根於静震動於外艮止於内陽主於内隂用於外不動則已動必得宜所以又有勿用永貞之辭也六五宻雲不雨自我西郊公弋取彼在穴象曰宻雲不雨已上也六五變為咸之九五在咸五以陽變隂為小過繫以咸其脢无悔恱變止不輕於應感而能静以待感故无悔焉本爻以隂變陽為咸繫以宻雲不雨自我西郊雷變澤雷澤交有宻雲之象然剛中為制所以防隂之過故不能雨仍有雲行自我西郊就兊隂方以結聚也公者剛中之陽也弋而取之收雷於澤也取彼雷於西郊收之於穴小過剛中之時隂宜在外陽宜在内弋而取乎髙外之陽於隂中使之入於穴而藏於中焉正所以制外也此本卦之正義象也象傳曰宻雲不雨已上也雷澤已結為宻雲雖不雨而陽氣已外越而上升矣豈可不返之於穴以為體中制外之主乎此爻象所言俱難知所謂辭有險易也因五近於四陽爻易於引而上升戒之如是再繹五爻全無君象繫以宻雲不雨自我西郊與小畜彖辭同似亦是周公耳目聞見之事如伐崇戡黎之類也宻雲不雨隂固結而陽不能舒暢也自我西郊崇黎皆與西岐隣近也公弋取彼自穴伐戡以破其積隂而所用者剛中之陽也象傳曰宻雲不雨已上也隂已結於上小者得過於陽矣故必制之不使過焉乃本卦自然之象義公以時事繫之孔聖以卦義傳之耳再玩上爻之辭則二陽居中五上兩爻以過陽而得㐫又奚疑乎𫝊於五曰已上也於上曰已亢也更大明矣隂過則當用陽制其已上後說勝上六弗遇過之飛鳥離之㐫是謂災眚象曰弗遇過之已亢也上六變為旅之上九在旅上以陽變隂為小過繫以鳥焚其巢旅人先笑後號咷喪牛於易㐫變小過則象鳥火在上則焚巢變震而動則先笑失旅以明為止之義則號咷喪牛者失順静之性變震妄動而得㐫矣本爻以隂變陽則為旅過之極動而變離離何能遇故曰弗遇而過之矣小過有飛鳥之象至上而飛鳥折翼離羣矣是謂災眚飛鳥兩翼變離則折豈非災眚乎象傳曰弗遇而過之已亢也隂極思動亦謂之亢亢乃過義也陽過隂過俱亢亢龍陽亢亢鳥隂亢耳上爻因變離明動而不安静止故象義有㐫小過六爻以中兩剛爻為主以震艮二卦比而成在震主初爻在艮主上爻故三四兩爻主卦於三四兩爻下已繹之矣初爻止體而變雷火相遇不能安静㐫也二爻止而變巽巽進亦不安静止但變陽附三又且遇五隂陽相維而不過故无咎是内卦二隂爻皆附於三爻之陽以主乎静止之體宜静一為守而不宜動也所以維外卦之震也五爻近於四易於引陽雷變澤而陽為隂所凝塞矣猶宻雲結而不成雨也公弋取陽氣之上聚於隂者返於中而入於穴如求放心者然而實自人弋取之使至也我欲仁斯仁至矣况此陽入隂不過如子夏之出見紛華靡麗而說之耳以其變恱故有務外之念偶動即收彼在穴程子所謂心常在腔子裏也此爻大有闗於求仁學易者勿忽焉五爻辭取陽氣越於外者如求放心此說雖是聖學切實工夫然終是卦象中另一義也就象數求正義以周公時事玩其辭似是因隂上過陽而制之故弋取彼在穴傳曰已上曰已亢皆隂過陽之義另取陽越於外之義存此兩說以質髙明上爻則動而變明如初爻又在震動體復居小過之極是以離而亢得災眚也本卦以剛中居内故以立體於静為主以羣隂在外故以致用於動為義乃就心性之陽主事物之隂也心性在内屬隂又主乎乾元之陽立誠本乎仁以合天也事物在外屬陽萬物萬事成乎衆庶之隂而時措咸宜比義以附地也小過隂多陽貴以剛居中御四隂於外而立卦所以統諸四隂二陽之卦而歸於小過者此義象也夫小過以三四兩陽爻居中傳謂之剛中主通卦然震之下爻艮之上爻原為震艮主卦之爻即乾元所寄之位也小過者震艮二卦相比成卦則小過居中二陽乃諸陽之㑹歸也故總下經諸主陽之卦俱歸於未濟主内坎之陽以結下經且結上下經諸陽卦而歸根於乾焉至未濟根乾終上下經乃以乾統坤而統全易也中孚之虚中隂也小過之剛中陽也論性則虚中也所謂具衆理而應萬事者也論誠則剛中也所謂立天下之大本而能經綸大經知天地之化育者也有虚中為誠所居誠即虚中所具之理也聖賢主之成性存存以為道義之門也有剛中為性之元性即物與无妄之徳也聖賢成之非自成已而已也所以成物也此二卦互為虚實隂陽體用内聖外王之道之學盡在二卦矣以之㑹歸隂陽卦豈止但言象數乎義理原在象數中非静玩之無由自得耳離下坎上既濟既未濟為水火交即水火相逮也為上下經諸隂陽卦所歸而分統于乾坤焉且以交成既未濟互為體用如一卦然所以合乾坤而為一合隂陽而歸太極也為四為八為六十四胥一之矣男主外女主内為既濟既濟主火主隂繼離而根坤所以為下經諸主隂之卦所歸也且以歸上下經主隂之卦而總根于坤焉既未濟二卦相綜復相錯水火本相為用也乾坤首上經而交于㤗否是為上經之中至水火坎離二卦結上經四正之卦備澤山雷風首下經内外卦交而為損益為下經之中至下經将終風澤交而為中孚雷山交而為小過以水火交為既未濟四隅之卦亦備于是下經終而經亦終焉水在上火在下為既濟陽上而隂下也險在前而明在後也謂之曰既濟坎險在前離明在後以明涉險可濟乎險故謂之既濟水在外險未濟而曰既濟明以察險雖未濟已有可濟之道矣此聖人濟險之心就卦之象義以示之天下萬事之險不在水本在人心如心得乎視險如夷之理則未濟亦濟也故名之曰既濟方士取之以言丹醫家取之以治病小道亦俱在道中也小道尚可濟用况君子之濟險乎惟以離之一隂虚而在内為本用陽以輔之于外而離體成矣是本于體隂用陽者以濟險耳乾坤分剛柔有坎離而乾坤之隂陽寄于中男中女有男女必相交交而成既未濟以男主外女主内為既濟以女主外男主内為未濟男主外女主内隂陽之正位也女主外男主内隂陽之交孚也故既濟者有可濟之正道然既濟則始終不可亂也未濟者未得濟也未得濟則敬慎不敢敗也以是言之既濟未濟均不可有慢忽之心必憂勤惕勵于易之終焉葢易者終始于自强不息也既濟亨小利貞初吉終亂彖辭曰既濟亨小利貞初吉終亂凡事既濟固亨也而亨者小也坎險在前以離明察之而濟濟非甚難濟亦亨之小者耳烏足恃乎尤貴於利貞既濟未濟不必計俱以貞終始焉方得險在世而明在心之象義也所謂亨小者何哉既濟在初可言吉也濟而失貞終必亂矣雖濟亦如未濟也况險之來也寜有方哉濟一險而以為吉則忘乎未濟之險險之在前相阻者多矣終亂何以濟乎惟不以既濟為濟乃濟而常如未濟以文明之體制涉險之用終必不至於亂耳慎之哉彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也彖辭釋卦名義曰既濟亨小小者亨也似主離中爻之隂言葢卦之險外明内濟險惟明離明以中爻為主故傳言小者亨也小指隂也因隂而得亨也必利貞者剛柔正而位當也利貞在四徳亦隂也亦小者亨之義也卦爻一陽一隂相間初三五陽位皆陽爻二四上隂位皆隂爻隂陽之爻皆當於隂陽之位惟既濟卦為然隂陽正位正道也利於貞而水火相交隂陽相濟之象義也初吉者柔得中也指二爻言即小者亨也彖辭云終亂傳云終止則亂離明於内内明於知險何亂乎惟坎中之陽不能振二隂流水忽止則有壅塞濫溢之患矣陽氣閉而隂氣凝則運行之道窮矣小亨者賴隂之明為初吉至於終不致亂必陽氣暢達隂氣隨其宣通而後險不成亂也即終以明濟亦不亂若自恃離明足以察險思濟恐險之艱深有非明可測者則明之道亦窮也聖人於濟險存已之明於内為主而必先舒導陽氣使之振動足以在險中而開幽通滯險必先自平矣而後用吾明以濟濟則險反有限而濟險之道反無窮也此彖傳釋彖辭而又為終亂補申一義也君子體之以明徳具於一心者為主猶必隨事隨時知乎險阻艱難何由而成何方為之開除平治未得其所以然不能即行必求明其故既知之復慎敬以待其時既得其有為之機則奮毅以趨其㑹心有主道無窮任世之險難重叠而沛然濟之莫禦矣此初吉不足為大亨而終不亂乃大亨也乎象曰水在火上既濟君子以思患而預防之象傳曰水在火上既濟君子以思患而預防之傳又申一義以濟險在乎豫也水在火上水必滅火與彖辭所言水火異矣彖辭所言者交也象傳所言者交中有剋也水本乎地親下今在上火本乎天親上今在下交則言其下濟上行尅則言其以水制火矣故言交則既濟以得交而吉特不可忘險而終亂耳言尅則不設閑防必有災眚矣君子體之知水之為害也甚大而防之之道亦必豫圗水在外象外患之來火在内象坐照之知以明理之心發無私之慮其思必正必中可以知患之伏於何所發於何時豫防之者必周宻謹固焉如築隄防以防水故曰防此不待患至而有以濟之患以有備無害亦險中用明之先務也且豫防之者已有宣導疏達之義象在内蚤為經營區畫更為用力少成功多耳此象傳補申之義亦從終亂示戒不惟既濟小亨已豫成萬全大亨之計於熟思審處之中矣再繹濟險之思必先明其於何濟之然後可以就險濟險也有明在内不可恃矣隨險為防明無定見方可謂之明也此亦思患而預防之道也象傳所言豫防已在險中者推此用以防險則終亦不致於亂矣何也其道不窮故也若専恃已明不就險思險則險無窮明有盡明窮而終亂是以初吉之小亨不足為亨必道不窮而亨斯無不通矣初九曳其輪濡其尾无咎象曰曳其輪義无咎也初九變為蹇之初六在蹇初以隂變陽為既濟繫以往蹇來譽初在下而不可輕進於蹇故往則遇蹇止則有譽止而飬其徳養其力以平蹇所以有譽非止而不進也本爻以陽變隂為蹇初亦在下離明之體知險在前不輕冐進曳其輪不行也即險之至而相侵不過濡其尾耳故无咎象傳曰曳其輪義无咎也初在下位有險可以用明哲保身之道所以於義得无咎也如不曳輪濡尾尚未可知矣六二婦喪其茀勿逐七日得象曰七日得以中道也六二變需之九二在需二以陽變隂為既濟繫以需於沙小有言終吉健體變離明明乎險在前而需於水所未及亦智足以慮險也小有言者慮險而見於言語商𣙜也不進而冐險則終吉也本爻以隂變陽為需繫以婦喪其茀勿逐七日得明體變健隂動為陽有動進之象矣如婦人出外車失其茀無所掩人耳目可羞孰甚焉離中女也變乾則懸象無不共覩矣故象之如此然勿逐戒妄動也静以俟之七日隂返則陽可復為隂隂以暗為明茀又得矣象傳曰七日得以中道也二之明在二陽之中原屬離中坤元變陽則失此柔得中之象義矣故七日隂復乃能藏隂於二陽得中道也既濟之内卦主乎二爻之中隂烏可變而失静觀之道乎九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也九三變屯之六三在屯三以隂變陽為既濟繫以即鹿無虞鹿入於林不如舎往吝者震體變明雖有可悦之物在前以明察之知其得失而趨舎決矣即鹿無虞而鹿入林中舎之為得往即則吝矣葢舍之以養陽為虞将以復進開屯亦如得鹿也本爻以陽變隂為屯明體變動險在切近必思克之如髙宗之伐鬼方三年之乆方能克焉然震動之功本於文明之徳方能克而不致終亂如小人之喜事好功則必不能濟而成功且功成亦恐終亂也故又戒之曰小人勿用象傳曰三年克之憊也雖有此徳此功力已憊矣葢濟險之道非尚武力修徳為本象震敬勤於朝夕也審機次之象離用明沈思觀變也此爻離明變震動以不伐而克為尚以伐克為下也言憊亦有終亂之象義矣故本卦言濟險明尚不恃况尚力乎以上内卦三爻離明以二之得中主内卦且主通卦以變乾而有喪茀之恥七日復隂斯得明以濟險之道矣初三兩爻附之成卦初曵輪附隂无咎三隣外卦三年克鬼方然已憊矣本欲附隂而又隣外險不得不動以求濟也六四繻有衣袽終日戒象曰終日戒有所疑也六四變為革之九四在革四以陽變隂為既濟繫以悔亡有孚改命吉澤變水而剋火火滅矣故悔亡葢由平日之有孚也至於改命而革成矣吉者中孚有素至此悔可以亡也本爻以隂變陽為革水變澤既革則既濟於事矣然不敢以既濟而忘險也繫以繻有衣袽終日戒既濟而尚防患方可免終亂耳象傳曰終日戒有所疑也初濟而疑畏猶存故不敢一刻忘戒也此即未濟續終之道也九五東隣殺牛不如西隣之禴祭實受其福象曰東隣殺牛不如西隣之時也實受其福吉大來也九五變明夷之六五在明夷之六五以坤順而變坎險繫以箕子之明夷利貞如箕子之在險盡其順道忍辱為奴亦不過以貞為利耳本爻以陽變隂為明夷以坎變坤處險而以順道順其自然斯可濟矣故東隣雖殺牛盛祭反不如西隣春祭之薄禴者約也春祭不備物故言薄然誠意在中可以昭格祭必受福焉豈在儀物豐嗇乎象傳曰東隣殺牛不如西隣之時也時應薄則薄非薄也順於時也實受其福吉大來也神所享者誠意誠意裕而福自綏之矣惟其順險之可濟以濟險隨時而得至順之道斯受福矣葢五以陽剛中正之徳得乎正位雖居於險中體乾而用坤之順以濟之此受福之本也此爻在坎中所謂動乎險中大亨貞者此陽也外卦主此與内卦二爻之隂分剛柔主兩卦以明助健洵出險無難乎上六濡其首厲象曰濡其首厲何可乆也上六變為家人之上九在家人上九以陽變隂為既濟繫以有孚威如終吉巽變坎為家人之終必内有誠心可信外有威儀可畏然後可以自身及家為齊自家及國天下為平治也故終吉在本爻以隂變陽為家人繫以濡其首厲者既濟矣而險變巽險雖濟而其心率易且思冒進矣故既濟必終亂而至濡首之危厲也象傳曰濡其首何可乆也不可乆即終亂矣能不為巽之散斁出險而不忘險則道不窮而終不亂方為濟險之善道也外卦三爻坎體以五爻得中主外卦禴祭受福處險得濟本於誠也四上兩爻附之四終日戒而有可濟之心變兊說於附四陽也上變巽冒進而不附五之中矣故有濡首之㐫焉内外二卦二五分主然非離内隂之虚明無以用陽徤出險故二又主乎通卦焉此卦水火相交剛柔均分各正其位原於諸事可濟然彖象之辭大小象之𫝊示戒不厭其周詳者病加於小愈功敗於垂成惟既濟之心不可居既濟必如未濟敬慎常存也既濟自無亂於終矣在内卦離明不恃也在外卦剛中必正也剛為用振動有為明為體審機濟險雖濟矣而初終之間敬怠之勝必再三致謹焉則雖有未濟亦必濟矣如初爻之知險不進无咎之道也二爻以隂體變陽妄用其明必七日得茀還乎隂而自蔽其明明方有濟也三爻以武力濟險險雖濟而已憊終亂可卜矣四爻已濟如未濟知險而能戒者也九五剛得中位濟險順時得剛健濟險之道者也終可免于亂矣上爻濡首已出險而尤巽進厲而不可乆也此皆至再至三慇勤致戒惟恐既濟而終亂也如上爻能反乎隂而附于五隨陽振動盈科而進放乎四海矣有本者如是本于坎中之陽也何不可乆哉故辭傳所言吉凶亦在乎盡人合天以道造命而已是既濟者必濟險之道不窮而後險不足以阻之也坎下離上未濟既濟未濟二卦相綜錯水火分而結上經水火交而結下經已明于既濟矣未濟者即既濟之反對者也其卦火在上水在下火就燥親上水流濕親下不相交矣其卦畫隂陽雖亦相間而皆不當位且坎險在内離明在外險内則處于險中明外則不能内照是未濟之象義也但聖人序卦以未濟終者寕無説乎天下事物無盡期吾身徳業亦無窮量即易之廣大悉備開務成物足以冒天下之道然亦終無已止也故以未濟終上下經言易于天地準同歸于無息而已矣君子體之進徳修業無敢斁焉應事接物無敢慢焉終其身如未濟之時艱貞危厲慮險防患此用易之學終始無容懈弛也在既濟仍思患預防猶未濟也況未濟險切明㣲能不惕勵以畢世乎故既濟則敬畏如未濟未濟則必審慎以求濟既未濟二卦雖分其實一理循環可以通為一卦以此結上下經焉人生事物之艱難易得濟一心之誠敬難常存有此體則處險如夷無此體則雖跬步之間皆䧟穽也既未濟主乎方寸而髙山大川不足言險阻人情物理不足言叵測占者知此思既濟有終亂之憂方能深虞未濟而求出險之計也然既濟而終亂仍未濟未濟能續終則既濟矣既濟未濟反復無窮如世之險阻無盡也一心以濟之此聖人示人不終亂而續終之道也女主外男主内為未濟主水主陽繼坎而根乾所以為下經諸上陽之卦所歸也且以歸上下經諸陽之卦而悉根于乾焉易首乾坤先乾後坤以既未濟終先既濟後未濟終以乾元為終始以陽統隂也一乾元統全易也云爾未濟正立既濟之本也既濟正飭未濟之末也二卦相為體用如乾坤之交而生水火分隂陽以生四隅卦更生萬物萬事也此以水火交者明不相射而相逮正為乾坤定位後首生水火故以水火交而歸根于乾坤以明八返于四四返于二二返于一也此乾坤首易而既未濟終易之象義也至于未濟又後于既濟天下事物天地氣化以無終者為終故以未濟為濟如天行之健地順承之以不已者為己也無非以乾元統全易之象義耳故以未濟終經焉未濟亨小狐汔濟濡其尾无攸利彖辭曰未濟亨未濟何亨乎未濟為心有可濟之道也小狐汔濟濡其尾小狐隂物故多疑疑而求濟此濡尾也濡尾不同濡首似已濟矣然已濟而濡尾何濟之有所以无攸利葢疑則未明明則不疑未明而疑濟猶未濟明而無疑未濟即同既濟矣何以為明象離之燭照事物而得其當然也何以涉險象坎之中主誠信而存乎固有也誠信在中明哲見逺何險不濟故既濟者仍恃此為要終而未濟者寜不本此以慎始乎彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也彖傳釋卦名義曰未濟亨柔得中也指外離之中言用明而以得中為貴所以察險之機神明於無方也不言下坎九二之得中者離明在上如日之照臨於下也九二在險中亦因五爻有柔順文明之徳應二之陽剛中正方能濟焉言柔而剛之得中可於正應中明之矣此所以不必更言剛中也如小狐則何能濟乎所以汔濟而不得中道終不能出險中也濡其尾無攸利者濡其尾而得濟幸而已矣既無中道濟一險而險之來恐未艾也豈能常徼倖乎必由中道以濟則險阻雖多道亦繼續始終不窮焉方可濟而得所向往耳不然則無以續終小險偶濟沾沾自喜大險忽逢何所恃乎此所以既濟即未濟未濟即既濟兩卦如一卦一義象一中道也以六爻觀之雖不如既濟之各當其隂陽之位然隂應陽陽應隂初二三與四五六俱相應亦是隂能交陽陽能交隂不當位而咸相應如當位之義象也剛柔相應中亦将九二之中申明之矣且剛柔相應調和均平恰是三陽三隂得其中道以是為既濟未濟要終原始之道也况此彖辭柔得中正於前必以剛柔應也明於後柔必順承乎剛剛必感而柔斯應之可見隂統於陽未濟隂而應於陽方濟此終易以乾統天者統易也夫象曰火在水上未濟君子以慎辨物居方象傳曰火在水上未濟君子以慎辨物居方象傳又申一義也火在水上水必滅火豈能濟水見恃明察為機變之巧者非可濟險必為險所濡也君子不然不用明而用慎慎自能生明也慎出於中心之敬也内常主敬遇酬酢事物方能慎焉敬與慎不相離者也然非誠裕於内何以能主敬而守一不遷又何能常慎而旦夕靡忽乎故明者隂也而誠者陽也陽以存體於静而隂以致用於動也此君子主誠主敬致慎之要也何以用慎乎辨物之情之理而隨其情理以為自居之方此用慎之大者能辨物之情理則險中之艱深已悉可使平治之機已得於是各隨其情理以自居於方則濟險中正之道已備縱有叵測之故亦可臨時制宜皆慎以為終始也慎正是主敬存誠之用也試觀二卦象傳所言移置叅玩悉合可見二卦所用惟一中耳既濟卦言終亂未濟𫝊於續終既濟不敬慎忽成未濟未濟敬慎即為既濟因而未濟既濟之間無有己時吾身心之敬慎又何有己時乎惟續終之中道得不致於終亂而道窮則二卦之象義既明矣而全易前民寡過之義象俱明矣辨物居方方即坤文言曰至静而徳方之方也方者中正不易之理著於事物順行之而為道行之有得為徳者也在恒曰立不易方在未濟曰居方葢辨物者離明而居方者明所麗之陽範圍乎隂以成其明者也此乾陽也所以統坤以統天統全易也故大象傳於未濟明之初六濡其尾吝象曰濡其尾亦不知極也初六變為睽之初九在睽初以陽變隂為未濟繫以悔亡喪馬勿逐自復遇惡人无咎澤變水知險不悅而悔亡矣喪馬不逐睽而不妄求合也是以見惡人无咎不妄於合亦不致終睽而生咎矣本爻以隂變陽為睽繫以濡其尾吝變險為恱苟恱非濟險之道故濡尾而有吝初險未深濡尾之吝幸矣象傳曰濡其尾亦不知極也再進於險則不知其極言将見濡首之㐫也九二曳其輪貞吉象曰九二貞吉中以行正也九二變為晉之六二在晉二以隂變陽為未濟繫以晉如愁如貞吉受兹介福於其王母順變險而愁其晉得貞吉不輕晉之象義也以此受大福於王母矣王母指晉五也君子難進惟受知於明主也在本爻以陽變隂為晉險變為順以土制水水平矣然不敢輕乎險也曳其輪而不進守之以貞斯得吉矣二為内卦主爻剛中以應五之柔中共濟險者曳其輪貞吉非不動也待五之君求而應之合乎中道共濟時艱耳象傳曰九二貞吉以中行正也居中位以行正道為臣得君以下應上濟險何難乎六三未濟征㐫利涉大川象曰未濟征㐫位不當也六三變鼎之九三在鼎三以陽變隂為未濟繫以鼎耳革其行塞雉膏不食方雨虧悔終吉巽變險鼎之器象有失故耳革革變壞也其行塞者險難行也雉膏鼎中美物人不食而為雨所虧斯悔矣巽變坎水水入鼎中象雨虧也如此而言終吉者鼎遇雨而虧悔必晴明火𤼵隂陽自有反復之理數也故終吉焉在本爻以隂變陽為鼎繫以未濟征㐫利涉大川三居内卦之終險之極處未濟而征則㐫險極無得濟之道不可遽濟也又云利涉大川者居險不可乆必思涉大川以濟之非附於二爻之陽以流動而涉川奚恃乎象傳曰未濟征凶位不當也位在險極故云不當易言位不當多就其所遇之不偶言然君子居之何陋之有亦貴於附中陽用中徳足以濟遇遇無不合矣以上内卦三爻坎險在内所以名未濟也初在下輕濟而濡尾二曳輪待濟而得貞吉傳言中以行正為主内卦陽爻言濟焉三過中居險進征則㐫必思得道涉川無虞葢未濟則必思求濟於險之極處正可明卦之義象耳九四貞吉悔亡震用伐鬼方三年有賞於大國象曰貞吉悔亡志行也既濟六四能思能慎勿用小人則可有賞而續終本卦九四不思不慎則無賞且終亂卦爻吉㐫皆當活㸔九四變䝉之六四在䝉四以隂變陽為未濟繫以困䝉吝止變明自以為明即止於䝉不能明矣故吝本爻以陽變隂為䝉繫以貞吉悔亡震用伐鬼方三年有賞於大國明變止知險而順以處之也故因守貞得吉而悔亡不輕濟則無致濡首尾何悔乎然非求安於險中也在險必思出險惟震動其用如伐鬼方之大險三年克之而有賞於大國矣在既濟三年克而言憊在未濟三年伐而有賞何也既濟而又有險如未濟也重險非可力圖也未濟險在切已必思震力濟險由於守貞而得吉也明用於逺險切於身不得不用威武非同既濟而復求多故也是既濟之終不亂惟當思再來之險尚徳以消弭之而已未濟而有險在目前不得不震動恪恭以有為也然思患預防之思辨物居方之慎固合既未濟而持之終始矣象傳曰貞吉悔亡志行也不賞其功而許其志必貞吉斯悔亡矣然後其濟險之志可行也貞即中也志行即行正也本爻未濟思濟不外於中以行正而已此所以平日以貞得吉而悔亡臨戰則克也險至用師極矣而可成功焉其他可沛然莫阻矣六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也六五變為訟之九五在訟五以陽變隂為未濟繫以訟元吉剛徤中正以主乎訟而又變明明以察之徤以斷之訟所以元吉也本爻以隂變陽為訟以柔得中得位而變剛徤中正自立乎貞之體以致吉之用本無悔矣所以不可謂之悔亡也此五之柔明為用而本以變乾剛徤之徳立體也所以謂之君子之光以象離明有孚之吉以象乾徤也象傳曰君子之光其暉吉也君子之徳不可見見之於事業功能焉五以剛柔相濟中正之徳居心立體則其睿哲文明形於濟險之功業者如堯之格於四表光被上下矣故云其暉吉也就其能濟險有為而言其象義也五爻為外卦主爻應乎内卦九二剛柔相應而得中正變乾剛柔相濟亦得中正宜其無險不濟未濟至此既濟矣既濟如此亦續終而不亂明矣再繹五爻象傳曰君子之光其暉吉也可以識五應二之象義矣二陽也五隂也隂得陽應方有光暉如月之映日方有明也二雖在下臣位其徳陽剛中正足以應五之文明中正隂徳必藉陽徳不在位之髙卑而在徳之剛柔也是五之光暉皆二之陽剛相映而發其文明也如日月之得天方能乆照也如離言日之柔必麗乎剛而後大明也故未濟卦論徳位皆宜以五爻主通卦必以二主卦歸根於乾者即五爻之辭傳可以知其象義矣二爻辭中以行正雖似平易其實以中居中外行必正即得中之聖人也夷惠不敢望矣何不足以應五而以陽主隂乎上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也上九變為解之上六在解上爻以隂變陽為未濟繫以公用射隼髙墉之上獲之無不利震變離為隼象在卦上爻故曰高墉公射而獲之解之極而震動陽氣暢達於無方也本爻以陽變隂為解繫以有孚於飲酒无咎濡其首有孚失是上得五共濟六五以君子之光有孚暉於上下兩爻無不用五之孚以為有孚也雖飲酒亦可无咎也然飲酒至於濡首既濟而忘險飲食宴樂之間寜無險乎飲酒濡首亦同水之濡首有孚者失是果有孚焉雖既濟矣豈無續終之道乃甘為濡首之上亂於終而致窮乎象傳曰飲酒濡首亦不知節也飲酒以合歡知節則不亂取象於酒以為諸躭宴樂安放斁者戒也既濟之上曰濡首未濟之上亦曰濡首是既濟未濟皆有濡首之虞惟有中正之道續終而不亂於終方能既濟未濟守一中而無不濟故通兩卦為一也外卦三爻未濟而既濟矣以五爻主外卦四上兩爻皆附中陽以圖濟者四則貞吉悔亡以震伐有賞濟險有功也五則貞吉无悔以中正之道為君子之光且孚信於人而得吉也上爻享既濟之成而忘戒則無續終之道必亂終矣故戒之以有孚者失是見有孚者乃終始濟險之道也然四變艮而有功上變震而濡首則未濟期濟亦不尚乎輕動也明矣其與既濟示戒同辭者既濟猶未濟也未濟可既濟也反復相尋險終有窮一心敬慎自無息也此所以結上下經六十四卦之終也以續終者歸於無終始也天地萬物無終始易亦無終始君子敬慎以自强不息亦無終始也此未濟傳言續終乎㤗否為一卦反類損益為一卦増損既未濟為一卦反變於無終始於此見乾坤交後諸卦相綜相錯無非隂陽交而已矣故於既未濟總諸陽諸隂卦歸之根於乾坤之二合而為太極之一也上下經六十四卦以八經卦為首為中為尾六十四歸於一也然後示以八經卦歸於首乾坤尾既未濟八歸於四也再以既未濟歸於乾坤四歸於二也乾坤出為易之門入而即為易之藴二歸於一也以此結易經象數義理共昭然矣大易通解卷十二
