body:
  text: 大易通解卷十一江常鎮道魏荔彤撰兊下震上歸妹歸妹綜漸繼井而根坤也巽乎水而上水以養萬物為井井有水為能養無水則致困同取象義於水困何根乾而井根坤乎水陽物也無水者無陽也故用陽而根乾然用水以養物則隂徳矣根坤不大明乎困井漸歸妹四卦皆有婚媾之象義少女隨中男為困長女隨中男為井長女隨少男為漸少女隨長男為歸妹少女在外中男在内夫妻有反目不和之象長女在外中男在内夫妻有共力勤苦之象長女在外少男在内妻過嫁期而男方受室之象長男在外少女在内男婚三十女嫁二十男長女幼宜婚之象此四卦使之相繼參伍配偶天地之氣化人世之感應盡之矣然漸與歸妹言婚媾困井不言者困井就一世論漸歸妹就一家論其理則相通也為困為養何一不自小民室家匹夫匹婦始乎漸之繼困既以漸蘇困歸妹之繼井豈非飲食足而男女之欲不可不遂哉聖人治天下養欲給求人生之大欲飲食男女二大欲遂則生得育而性亦由此可復先養後教萬古不易之道也若以天時論井繼以歸妹井乃夏令歸妹則秋成之候矣夏月雲行雨施品物咸亨在井為巽乎水而上水在雲雨亦巽乎水而上水也陰氣起於地陽來散之升而為風風陽氣也携陰氣上升而為雲雲陰氣也於是陽氣得雲陰氣為凝聚者凝聚之極陽氣又墜陰氣下降而為雨澤此四時之風雲雨澤皆然夏月獨盛行者夏至以後隂生於下駸長漸盛易於由地升而成風雲雷雨之亨也所以亦同乎井以巽入水升水降澤養物也及三陰已足雨澤既盛將交四陰兌徳司令雨澤反不能多多則為霪雨害稼何也四陰盛而上之二陽不能鼓蕩陰氣矣地氣雖盛天氣不應不能多為雨澤惟有霜露夜降此之故也其間陽氣之鼓蕩一年四時皆藉風雷風性上升陽微則散秋令少風亦有金令制伏之義象至於雷之為物自春時巽風引之於前春半動地而出雷動而諸陽無不動直到陰盛於兌陽氣减退上升之極必返於下入於地而雷無聲此雷澤遇而成卦名之曰歸妹也風仍時行者地上之陽氣也雷無聲者地下之陽氣也純陰之時亦有陽氣雷自入地風自行天也純陽之時亦有陰氣雲自時聚澤亦時施也所以歸妹取於義象雷隨澤而下降入地為秋令之卦也以此繼井由夏而秋之理氣也至於雷隨澤而入地其義見於漢長沙太守之傷寒論矣青龍湯為傷寒證行陽散陰也然陽微者則變為越婢湯歛陰以行陽也青龍神物之夭矯一變而為越婢之柔媚其命名取義何於雷澤歸妹相符耶祇此一理大而天地小而一身即至萬事萬物無不可以推類求盡特患心不細理不明則當前失之故曰百姓日用而不知君子學易可不旁通曲喻而徒事於時解何其陋也再繹根坤之義陰盛何以主坤惟其象陰盛之時立卦故其卦主於坤又非陰少貴陰主陰為義矣雷於此入陽歛於陰主坤則天道人事悉明為自然之理數非陰盛而有意掩剛為害也君子體此遵養時晦以待陽復為君子謀者備矣又不與貴陰而主陰欲於陰微用陰以和陽者同也各有時則各有象義易者時也歸妹征凶无攸利彖辭云歸妹征凶无攸利陽已微陰已盛長男隨少女而成婚有室家可樂之象義矣即論天地之氣化陽之為雷出於震者今將入於兌矣歸妹則宜而征則凶也何也歸妹者少女之嫁得宜征凶者長男之征違時明乎陰陽各有時則知歸妹宜為陰言征凶宜為陽言也此時凡屬陰徳陰務則宜方壯盛而隨陽凡屬陽徳陽務皆當知衰退而守陰歸妹之正道也又言无攸利者此時宜退不宜進之時也果進退動静不失其時又焉往而不利乎彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也无攸利柔乘剛也彖辭釋卦名義曰歸妹天地之大義也長男三十而取少女二十而嫁合乎有天地斯有夫婦之大義也若男不取女不字則如天地不交矣天之陽氣不下濟乎陰地之陰氣不上和乎陽則萬物何從而興乎生之成之皆天地之交也所以不止於言生而言興也萬物生成於天地之交亦且終始於天地之交萬物有興衰生死成敗而天地之氣自交於無終始也然則男女婚媾之道為人之終始如天之交無終始也男女有終有始而男女之生生不窮無始無終與天地同其悠久是男配天女配地其相交而生生不窮共為悠久無疆而已再以卦徳言之說在下卦而動在上卦女說而男動以取男勤動於徳業則女說來歸其義皆歸妹之所以為歸妹也言征凶者位不當也雷動於下為當位今雷在澤上隨乎澤而入地非當位之時矣无攸利者柔乘剛也震以二陰乘一陽兌以一陰乘二陽陽令衰而陰得時故陰足以乘陽是以不利於往動而利於守静以合時也聖人前民用不過令其知時以大義示之言其常男取女字陰陽之和濟也以盛衰示之言其時陰長陽消氣化之往復也知其常以守乎經知其時以通乎變此經權協宜之道也非善學易烏足以明之而寡過乎象曰澤上有雷歸妹君子以永終知敝象傳曰澤上有雷歸妹君子以永終知敝孔聖另申一義終即終始之終敝者故物君子觀於澤上有雷必隨澤而降下入乎地向者春半陽初出乎震始也新也今至兌秋中遂終矣敝矣為時半載非不永也然雖永亦必有終有終則必有敝一定之氣化也人事亦如是焉在氣化之終敝實無終敝而人事之終敝君子寜不慎始以圖終而且善其終以拯其敝乎是人事雖有終敝而君子之心以理制事者亦與天地氣化同於無終敝耳非學易之君子烏足以知之非聖人烏能言之初九歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也初九變為解之初六在解初以陰變陽為歸妹繫以无咎象傳名之曰剛柔之際義无咎也在解之時初陰在下附二爻之陽成坎自處於柔居下而與陽剛之二相交際所以其義无咎且與屯内外卦交易則初居屯之下爻者今居解之四爻亦有剛柔相際之象義屯而為解何咎乎在本爻以陽變隂為解雷收於兌而變解歸妹之初雷尚未全入地也故繫以歸妹以娣娣者陰初盛未如其女君之正盛也跛能履陽雖衰而猶可動也言征吉者陽未盡入地雷尚可興雲致雨凡人事有宜為者尚可為也象傳曰歸妹以娣以恒也陰浸盛而陽伏此恒道也可因歸娣而知歸妹之將至也跛能履吉相承也承奉也陽尚秉令則陰亦奉行是陰承順乎天之道也此爻變解雷雨作故有陽尚可行之義與卦征凶不合者就初爻言耳在初義象如此歸妹之終則無此象義矣或曰相承承乎三爻之陰也初陽爻變陰成坎與三爻陰合徳為雷雨解以宣陽令故陽不盡入陰而得吉不致征凶亦通九二眇能視利幽人之貞象曰利幽人之貞未變常也九二變為震之六二在震二以陰變陽為歸妹繫以震來厲億喪貝躋於九陵勿逐七日得方震之時二乃變歸妹柔以乘剛剛必奮擊陽出之時豈能揜乎所以厲而喪貝勿逐七日得者自震至兌七日自復震兌往來如姤復往來俱七日也不言吉凶出入無疾也在本爻以陽變陰為震歸妹入地而變震故繫以眇能視陽未收全則明仍可照物雷雖微而電仍𤼵也戒以利幽人之貞雖時尚可進用然已不宜干進必如幽人坦坦安於静正方為遵時而養晦也象傳曰利幽人之貞未變常也陰盛矣而雷電尚𤼵未嘗全變乎常也然時已宜静守而不宜動用矣惟如幽人之利貞斯為合時時變而道亦變雖變而未嘗失常道也此爻漸至陰盛雖可為而亦不必為矣六三歸妹以須反歸以娣象曰歸妹以須未當也六三變為大壯之九三在大壯之三以陽變陰為歸妹繫以小人用壯君子用罔變歸妹乃用陰濟陽惟君子方能用罔也不用罔而如小人用壯則如羝羊觸藩之羸角矣此就陽壯之時言變歸妹則能濟陰得和也在本爻以陰變陽為大壯當歸妹之時而大壯其陽陰氣不足不能歛陽矣所以歸妹應須必須陰盛方能收大壯之陽入地也反歸以娣者先歸娣以維陽耳象傳曰歸妹以須未當也亦言變陽為大壯於時令不當耳此爻乃陰當盛而未盛如言運氣至而不至也陽不能歛故應待陰盛而陽自歛先維以娣而後以其君之正隂繼之矣在陰盛之時聖人之爻象辭傳如此可謂陽不宜入地陰不宜乘陽乎時入則入時乘則乘天地何心乎究不外復卦彖辭出入無疾四字盡之矣而人事之宜用陰可推焉以上内卦三爻兌體三乃主歸妹内卦以歛陽者故以初二兩陽爻附陰成卦初則陽尚盛故先歸娣而征吉歸娣亦維陽之義象也二爻陰少進必利幽人之貞以養陽和陰三爻主内卦故正言之陰微則暫維陽陰盛方能斂陽也維也斂也非疾陽也用陰以和陽斂陽以養陽也不然十月之雷豈瑞雷哉九四歸妹愆期遲歸有時象曰愆期之志有待而行也九四變為臨之六四在臨四以陰變陽為歸妹繫以至臨无咎坤變震則初二之陽道臨及於四矣由内達外由近達逺矣陽道臨之既至四即變動以應之焉何咎乎在本爻以陽變陰為臨繫以歸妹愆期遲歸有時者震變坤則宜取女受陰所歛矣或有愆期遲歸亦自有時也見陽至兌有必收之理氣也諺云老健春寒秋後熱俱言不能久耳象傳曰愆期之志有待而行也歸妹必有歸期斂陽和陽亦必待時不可失貞而輕字乃能行盡婦道也此爻在外卦震體之初雷之入地愆期即妹之歸陽愆期男不取女女無自字之理義也故就震以言兌男先乎女婚媾之正也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也六五變為兌之九五在兌五以陽變陰為歸妹繫以孚於剥有厲兌正秋令孚於剥陽之陰日失其悅物之正而從人為悅厲道也蓋兌雖四陰盛長用以說萬物不貴剥陽也故厲在本爻以陰變陽為兌歸妹而成兌得時行令矣故象以帝乙歸妹帝王之歸妹足以為天下歸妹法也又云其君之袂不如其娣之袂良者長男配少女陽之性和於少陰而不和於老陰也少陰如月之幾望老陰則過望矣取女宜少不宜壯在姤已言之矣於此又示以用陰宜和陽不可過盛而乘陽揜陽斯吉矣象傳曰帝乙歸妹不如其娣之袂良也不惟取女者宜知和陽用陰不宜過盛即有女字人者亦宜知之也帝乙歸妹妹亦小女耳所以吉者以五得陰柔中正之道故能和陽而斂陽不致乘揜乎陽而使敝也以帝妹之貴陰下嫁於二陽擇賢徳而和其室家與堯以二女妻舜降於溈汭同義也吉可知矣象傳明娣之袂良其君不如豈不知嫡庶之分乎蓋以少陰和陽為重如天地之少生老變也嫡庶不紊又一義不在此義象中論矣且此爻主乎歸妹之卦為陽男陰女並謀之矣學易者用陽用陰皆知所遵焉帝乙之歸妹堯之嫁女皆用陰也可謂之非至善之道乎陰陽各有至善之道故傳言中陰陽中和之道乃天地交而興萬物之道也歸妹之時五變悅體行秋陰令收陽以養之也非剥之也養之使得中道陽不亢陰不揜陰者從陽貴以為行也此所以為吉也陰陽和順即一陰一陽之謂道而生成不測之謂神者乎上六女承筐无實士刲羊无血无攸利象曰上六无實承虚筐也上六變為睽之上九在睽之上爻以陽變陰為歸妹繫以睽孤見豕負塗載鬼一車先張之弧匪冦婚媾遇雨則吉睽不合也不合之極而疑生諸象皆疑所生也理不明則疑耳變歸妹而知有婚媾之義則知匪為冦矣遇雨則吉者陰陽和同也且變歸妹則兌之澤能制火之亢而成雨矣遇雨陽氣可以受陰和斯合睽而釋疑不致於睽終也在本爻以陰變陽為睽婚媾之歸妹而變睽何以為士女乎故不得為夫婦之正也女承筐送嫁之時即无實物男致禮納幣之時即刲羊而無血不能盡禮於始自不能終而无敝所以无攸利而為陰為陽俱不宜也女筐无實者欲揜陽也刲羊无血者與陰争勝也實陽也血陰也陰中无陽陽中无陰何以成交乎合觀睽上彼匪冦而婚媾此乃匪婚媾且為冦矣所以无攸利見陰陽不和一事不能行一物不能成也象傳曰上六无實承虚筐也不言士者六乃陰爻就女言以終歸妹之宜實當附陽而和之豈貴乎以陰乘揜於陽乎此爻乃陰盛欲凌陽陽不受而争之陰陽不和則陽亦不甘斂於陰陰亦不能和乎陽極言其敝於終以示男女婚媾永終知敝也凡人世夫婦之道知此則闗睢之化大行矣以上外卦三爻震體至秋兌為陰所歸以收之者藏之也四爻雖愆期而有時須待之則可行五爻得中合乎歸妹之正以貴下賤陰徳盛而能從陽和陽凡用陰徳者宜則之焉上爻則陰盛凌陽陽亦不受以致士女皆失其室家之宜而國與天下皆无可行之處矣震體自以四爻主外卦故取陽必入於兌隂之義象為遲歸有時也五則得歸妹之正理為陰宜從陽也上則失其正理陰陽俱敝於終一從一違吉凶判然故外卦兩陰爻皆以附於四陽為從陽得正也且見陽入陰以收藏將為坎為艮為震永終者正以振始而已離下震上豐豐旅二卦相綜三陽三陰之卦亦分根於乾坤豐則繼漸而根乾也漸之陽氣上升先以風而後以雷雷動則諸陽日升而盛大矣故豐之象雷上火下盛陽之時其日必煊赫炎蒸因而雲雨大作雷電交至是五六月之氣候也陽既極盛如日之正午則不患不明而患有以蔽其明且陽盛必衰如日午之必昃此豐卦卦爻俱有憂虞昏昧之象義乎蓋豐為日中更無物可以能揜乎懸天之日矣惟有雲雨雷電足以障之如人君無能高出其上而儘有能蒙蔽於其下者使容光無隙不照之日竟至幽晦昏蒙自宦幸宮妾之狎及勲戚宰輔之奸皆雲雨雷電之類也聖人於陽盛日中著戒如斯况陽微哉日尚可蔽况人君一身孤立不難蠱惑其心也明矣然則宜日中其豐卦之主義乎主陽根乾無疑焉豐亨王假之勿憂宜日中彖辭曰豐亨王假之勿憂宜日中豐盛大之象盛大即亨也又有所以致此盛大為亨者非一朝夕之故其所由來者漸矣此時之王者安享太平之厚福以成富有之大業假之者格之也得此盛大之禄位其心必敬必誠以格於天於祖唯恐天命靡常祖徳有忝則其憂正切矣然而不必憂徒憂無益也惟宜體天作君之意以此日麗於天之象修徳以篤天祜綿祖澤正君位而已如日之中天無物不照且常中而不昃則其道常光明而無息此王者之盛徳大業也故日雖有昃而君心不容不正陽雖有極盛而君心不可稍盈此聖人作易取象立豐垂教天下萬世之人君也即人臣而富貴盛滿者亦可體㑹而自飭矣推之一事一物無不宜中而不宜昃宜盛而不宜盈此所謂易無方體云耳彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而况於人乎况於鬼神乎彖傳釋卦名義曰豐大也盛之至則廣大矣本言天地之氣化而人事該於内焉其卦之體徳震上離下明而兼動所以致豐也明者陽盛而有光明也自震動而陽𤼵以至於極盛而明著遂成盛大之氣化故名其卦曰豐以象其時㑹也王假之者以此盛大為可尚而守之期勿替也既得此盛大為尚必以失此盛大為憂何須憂乎宜常保此日中存為中𤼵為和陽盛而濟以陰日中而防其昃則其光明震動之徳宜於照臨乎天下如日之當天萬物悉仰以生以成於無窮也此王體天日而修德凝道以盡君人之責也然王者必憂勤惕厲而後日中可保者理也而天地之氣陰陽有消長晝夜有往返日月有盈昃蝕復日中則昃月盈則食昭象於古今者也此非日月之自為也天地之氣主之也天地陰陽也陰陽有盛而盈有衰而虚是以四時之行逓運叠乘於無終始也故自頃時以及萬古莫不如斯亦不過一消一息盡之矣在天地之氣化日月之升降如此而况人在天地大化陰陽盛衰之中而况鬼神亦在二氣消息之内有一不與時偕為生死變化者乎王者之敬天祖修徳業亦不能長盛於億萬斯年開國家者創業垂統為可繼耳是以國祚雖卜年卜世不同而日中照臨之道則歴三五而無異也此乃常存常運如天如日而不與時為消息者乎象曰雷電皆至豐君子以折獄致刑象傳曰雷電皆至豐君子以折獄致刑為日中之日有蒙蔽其明者另申一義也日之宜中君道之常而雷電皆至事物之變君徳常明則日常中雖有事物之引誘奸邪之惑亂如雷電皆至令白晝變為昏暮之象君子體此非用離明以折斷其獄非用震動以威懲於刑使引誘之機絶於嗜好惑亂之黨凛於刑罰則白日青天不能作覩矣故傳於豐盛之時預防日昃猶戒蔽揜其光明也唯其明盛而動故能破陰翳開蒙昧如已昃而陰盛則雲雨雷電豈易解散乎所以祛慾惟在存理已克而禮復焉亦貴於主於陽徳而自保其盛耳初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也初九變為小過之初六在小過以陰變陽為豐繫以飛鳥以凶者上動賴下止之斯不過初在止體變動致凶也本爻以陽變陰為小過繫以遇其配主雖旬无咎離體變艮止則不盈而在初尤宜斂止矣是以能遇配主雖旬无咎也配主者配偶也九四陽爻初變陰而得其配為初之主也旬者十日也遲久之義然在豐盛之時遲久乃保日中之道也如此不但无咎且往而有尚矣能保常不昃有尚何如乎象傳曰雖旬无咎過旬災也遲至十日亦無咎過此十日亦必是焉總重在於保中也言旬者不過就日言象義其實每日有昃何待過旬方災乎按旬說文遍也似亦不必指定十日日之一週天乃一巡也巡即旬也自日中而一週天又至日中乃為一旬故云過旬災也此說為正六二豐其蔀日中見斗往得疑疾有孚𤼵若吉象曰有孚𤼵若信以𤼵志也六二變大壯之九二在大壯二爻以陽變陰為豐繫以貞吉大壯之時變陰則守貞濟陰而不壯矣故吉在本爻以陰變陽為大壯於豐盛之際過於壯盛非宜日中之道必致陽盛而日反不明所謂天明則日月不明也故繫以豐其蔀日中見斗日且蔽矣何有於斗虚擬其象白日如深夜也深夜則不明不明則如得疑疾矣何以瘳之惟以有孚守中者以𤼵之於有為則日復其明而吉得矣象傳曰有孚𤼵若信以𤼵志也信者釋疑之本也然必有誠孚之心主之忠者乃信之本也忠立於有孚信𤼵於意志於是無疑於已而見信於人明之至也吉可知矣二能變乾健反不明正天明則日月不明之象義有孚𤼵若孚生於心中陰徳也以陰濟陽得中道也九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也九三變震之六三在震三以陰變陽為豐繫以震蘇蘇震行無眚三陰在震上爻變為離體不致揜陽故陽之震不厲而无眚矣在本爻以陽變陰為震上下皆震雷電皆至之象也故其雨大沛日方中而見沬無日而有細雨之霡霂也又云折其右肱離之所以明者一陰夾於兩陽之間陰麗於陽方能成離而為明也今三在離體上爻右肱也變震則折其右肱矣何以為離乎然又云无咎何也此亦氣化之自然者也離至三爻而盛極陽盛必烝陰為雲雨雷電及既雨既處則陽仍盛而日中仍在也在天地氣化出入無疾虚擬其象為右肱折之何傷乎如人心之私欲不能不起然旋即克己以復禮祛慾以存誠君子之過如日月之食日月之食何嘗不折其肱乎何嘗損日月之明乎此无咎之象義也象傳曰豐其沛不可大事也日中而雨日雖中而不昃亦不可大事為其不明也折其右肱終不可用也終者離之上爻也初九離之始九三離之終也在離終而變震所以不可用矣陰失乎陽無所麗附何能以離為用乎以上内卦三爻離體豐卦之日也初九變止止於日中則吉過旬則灾二爻主乎内卦者離變大壯明太盛必昏故必有孚而後吉有孚者誠也誠即中也三爻為陰之所麗變震適合象傳雷電皆至有折其右肱之象傳曰終不可用離雖陰而用則陽也陽變而明何用哉三爻皆宜日中用陽之㫖同於卦辭焉以二主内卦者火日也象為雷雨所蔽非中有誠意主於性體之陰不足麗於天得大明也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也九四變為明夷之六四在明夷之四以陰變陽為豐繫以入於左腹獲明夷之心於出門庭因四爻為外卦之下爻近五為蔽明之臣左腹者體中之在下者也入腹獲心足以中明夷之慾而甘於為蔽耳于出門庭或有市恩委怨之意或有背主從人之二心也在本爻以陽變陰為明夷鄰於内卦離明雷起雲興足以蔽明是以其繫辭同於二爻亦云豐其蔀日中見斗較三稍逺在外卦也故未甚昏昧耳又云遇其夷主本義謂夷主為初初亦陽爻故謂之等夷之主四為外卦主陽遇夷主合初陽麗日為明者以振陽保日之中則吉也象傳曰豐其蔀位不當也位居外卦震體正近於離而足蔽之故云位不當日中見斗蔽日不明則斗見矣遇其夷主言吉行者吉在於震動以合初陽則雲雨散雷電息矣位不當與解四爻未當位也同義震下一陽今在四爻則位不當處於離上故能蔽日之明也六五來章有慶譽吉象曰六五之吉有慶也六五變革之九五在革五以陽變陰為豐繫以大人虎變兌而變震悅而動俱從革矣大人得五位而虎變為龍以震龍象也故未占而有孚在本爻以陰變陽為革震變兌陰變陽不蔽陽也何也兌為口可以開散之機也陽能容光必照無隙不入故繫以來章有慶譽章者文彩光輝外著者也五變陽而附於四則四之陽光必來著於五也有慶譽者太陽所臨即如恩寵之慶譽矣吉可知矣象傳曰六五之吉有慶也言不蔽陽如承天􅃂矣兼革意有外來章服之榮足以獲慶譽於天下也動而變悅一戎衣而有天下非有慶乎此等象義非貞悔叅看不明上六豐其屋蔀其家闚其戸闃其无人三嵗不覿凶象曰豐其屋天際翔也闚其戸闃其无人自藏也上六變離之上九在離上爻以陽變陰為豐變震於上用明威之道則兵象也既能明以震威則折首而弗獲其醜其仁育義正之徳全矣本爻以陰變陽為離豐以日中為宜今豐之極而變離則日有欲昃之勢矣所以大明反晦繫以豐其屋蔀其家闚其戸闃无人皆曖昧之象耳又云三嵗不覿雖極而反焉亦非旦夕可期故凶象傳曰豐其屋天際翔也言變離升而至極也即初升於天也闚其戸闃无人自藏也即後入於地也明極得晦陽盛而衰日必藏而日昃陽必藏而雷收自然之理氣也三嵗之久日復升陽復出乃為晝乃𤼵雷何其衰墮之易而升盛之難乎然則日中不可昃陽盛不可盈洵盛大之時守中戒盈之要義乎以上外卦三爻震體離日之動陽盛行也四爻鄰於離因變明夷而蔽日然以為動卦之主爻故遇初陽振動而得吉五爻變陽成兌開口透陽不為障碍且附四陽得震卦二陰附陽正義象故因變革來章而慶譽也上六明極則晦動而日將昃陽將藏此所以不可處其極也五六兩爻五附陽則吉上背陽則凶可知震二陰爻附陽之象義矣豐内卦離夏月之日也外卦震夏月之陽氣也日中陽盛日與氣交烈之象在内卦必宜日中而以二之有孚𤼵若為立誠於中也在外卦不宜陰氣結為雷雨以蔽日以五之來章為有慶譽可見陽氣盛則日中而雷雨不作日之中必保常中常盛是謂之主陽也然日昃常也何以必不昃蓋陽與陰互相往返久而寒暑暫而晝夜陽不能必不衰聖人取象義如此者為豐大之時戒盈滿過中者言也不必定謂日不可昃陽不可退也遇其夷主本義謂四與初爻相遇初爻遇其配主本義謂與四相遇愚謂指四為夫為所配之主也至於四之遇夷主者齊也即妻也雖兩陽相遇無婚媾之道然易不可為典要者也陽相遇以振陽乃宜日中陽常盛之象義也故在初云往有尚陽尚也在四云吉象傳曰吉行也言尚言行皆主乎陽而言也初爻之象傳明言過旬災也旬未可繹為均明矣愚謂旬者巡也故說文謂之曰遍也離之位原在南自南起復巡至南故謂之遍然則旬即中而已矣况辭云雖旬无咎是即往有尚吉行之義日中者豈常中乎但常光明照物即由日中而昃而暮而夜而曉而復中亦無咎非謂日必不昃也日雖昃然旬而復中何咎乎所以云往有尚即昃亦往而有尚也如有蔽其明則雖日中而見斗見沬何貴於日中哉在豐初離之下爻言以旬為中甚得日之義象以從此說為合至於象傳言過旬災也亦似以旬為中宜以旬作巡看以日中為遍天一巡言過巡即過中之昃耳然則旬者即一週天之謂也三爻豐其沛改為斾不知何所據若沛作雲雨言則據卦大象傳曰雷電皆至也沬為小星又為水名然沛為雷雨沬不為小星亦確矣未有雷電皆至日不見而見小星者也日中見沬言午時小雨耳諺云飯後雨下不止已時陽盛而雨行至午時陰愈生矣所以不止必待明日陽盛陰衰方止也此亦可以解日中見沬之為陽不振也卦辭王假之假作至王至之似不成文且萃與渙之王假廟猶可言至於廟也豐之王假之至於何所乎若言至於豐之時原文又無時字若作格字訓格亦至也猶有心格於豐之義以啟下文勿憂宜日中與本義意亦未大謬推此則萃渙二卦王假有廟似亦格之訓至不曰於廟而曰有廟假為格至之至似是豐卦雖陽盛日中然辭傳交危之矣於内卦雖主離中之二爻然陰麗之陽必盛而日方明故初以遇四配主用陽以振陽為有尚外卦則主震下之陽爻遇其夷主應乎初而兩陽之盛相應如一方能保内離之日常中而外雷雨之陰氣不蔽日也豐雖陽盛仍主陽根乾正見豐為陰多陽少之卦也故陽貴主陽不容不謹焉艮下離上旅旅卦綜豐根坤而繼歸妹也歸妹雷收於兌八九月之時旅則冬令矣何以言之兌悅萬物各正性命交冬而保合乎太和以為來春生𤼵之本所謂戰乎乾勞乎坎也戰者陰陽相薄雜卦傳明之矣以人事言如行師之客兵來而主兵拒之也則旅之義亦以客而交乎主也勞者萬物之所歸也雜卦傳亦明之以人事言歸以息其勞也則旅之義亦勞於行而息以歸也且天地之氣化以秋冬為夜息勞於冬將以復進於春也亦於旅之象義有合焉故繼歸妹而為旅皆三陰三陽均平之卦一定之理氣也其卦象火在上上炎山在下下止火升於山止矣止則安也如日之自晝而夜暫止於地之北方而萬物皆息勞於夜也旅猶以夜為止而得安其所此取象名卦之義也繹火在山下為日在北方之象大合西洋歴家之論日無升降平行赤道隨天左旋至西北為地形之巔所蔽則無光而夜矣所以月在天上亦行赤道與日相望而藉日明以為明即羣星亦皆藉日而有光於夜以地之巔雖高不能蔽星月耳至於月之由生明至上弦至朢至下弦至晦皆由人自下仰觀或得其側面則為弦或得其正面則為朢或得其側面之少許則為生明或得其反面則為晦矣此在宋時朱子已有此論今則兼就日月相照論尤為明切蓋月之明弦朢晦又因去日逺近相映偏正而論不止於自下仰觀而各見所見也合在天之日光與在人之目光以論月斯無遺義此日月俱不入地平轉於赤道最確者也以是言之火在山上即日在地巔之北面也北方為上地巔即地之高而為山者也日在地巔之北旅之如冬如夜豈愚說敢憑臆乎是以繼雷收於兌之秋冬而受之以旅焉秋冬之令皆陰主之根於坤者以養陽也董子謂天地用陽不用陰冬月置之不用不知冬月之不用乃養陽為一年之大用也讀易便可知繁露之妄矣旅小亨旅貞吉彖辭曰旅小亨旅貞吉旅既為冬令元且藏於貞中何亨乎然元藏者統天之陽也而隨時之陽氣即純陰之時亦未嘗不流行於陰盛之中天地終古無有陰無陽有陽無陰之一日一時一刻也一有一無則天地息於此一日一時一刻矣天地有息於一日一時一刻者乎是以仍繫以小亨為純陰中流行之陽言也旅之人事亦於隨時流行中可得小亨之道也又云旅貞吉則旅之正義象矣冬令之貞所以養元貞養元而元又起於貞下不知者分貞元知者以為貞即元也天地之氣至秋斂至冬藏至春復生至夏漸長亘古至今及億萬斯年無二氣也此所謂統天之乾元也至於四徳之元在冬則言貞在春則言元分論之者為人事與時偕行計耳故在秋冬則為利為貞而占者得之必皆利皆貞所以偕秋收冬藏之時宜也况旅於人事以客投主以勞暫息息而獲安將以復進非貞何以為旅乎故曰小亨者其暫而利貞者其常耳彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉彖傳釋卦名義曰旅小亨旅之時得小亨之道為宜於此求大亨有忘歸之心矣豈劉禪之此處樂不思蜀乎小亨乃大亨求大亨必致困焉蓋得小亨之道非易言也必本乎外離文明之柔道又得合乎中正之則行之於應事接物之間以順乎内艮止徳之陽剛則外柔而内剛處家亦無不利也在旅為客尤貴以之焉是以止為體也以明為用也旅以炎上為進而非止則恃明輕進不可得小亨也即非利貞之義也惟有止徳在内則止於至善之所止而能安矣斯麗乎明凡知止之所即安止之所斯能以止為安安而為進也雖在旅小亨然小亨而進於不息更以不息為息大亨隨之矣此所以旅必言貞而後可得吉也文明中正以修於外剛健安止以主於内正之至也吉何疑乎以是論之旅雖暫時為客而有闗於天地之氣化人事之安危暫乃至常之道客即得主之理也何也偕乎秋冬之時令收藏陽氣於陰中以保合太和者為成終而成始其時義誠大矣象曰山上有火旅君子以明慎用刑而不留獄象傳曰山上有火旅君子以明慎用刑而不留獄孔聖另申一義仍以明旅之時義耳在豐以陰蔽陽則振威徳於嚴肅折獄致刑除揜陽而動也在旅以陰養陽則畜和氣於寛大慎用刑不留獄息微陽於静也其象火在山上不患不明患在不慎明而慎用刑必不過暴自得情當理矣惟有山以止其明其明因慎愈明矣又火在山如囚在獄中留火於山傷物必多留囚於獄傷人必衆不留亦非槩縱之也應刑者刑應釋者釋而與其殺不辜寧失不經之意存於中矣惟恐决獄施刑過於詳慎不明留獄之害與剛暴等所以又取火在山上戒以毋致留獄但有罪疑惟輕之心主之則無可留之獄矣亦不致無此心而云慎或在下牽引待質或在上淆惑莫决為害何窮乎觀此明慎用刑而復不留獄之聖言乃聖人無訟之本㫖也刑獄之事不明而徒慎其為害與酷吏無二哀哉易卦之言刑獄者上經噬嗑與賁相綜噬嗑曰先王以明罰勅法著令也賁曰明庶政無敢折獄修政以期無獄也下經豐旅相綜豐曰折獄致刑謂除佞倖僉壬宦豎女寵足以蔽陽者也旅曰明慎用刑不留獄國有常典獄無疑情為凡訟獄之事存寛大於法令之中也其應嚴而加刑者惟大奸巨憝耳其餘皆不得已而後用刑期於刑措而已學易者其慎於言刑哉其言於旅者與訟同訟不可終獄不可久如旅為時之暫而非常也初六旅𤨏𤨏斯其所取災象曰旅𤨏𤨏志窮災也初六變為離之初九在離初以陽變陰為旅繫以履錯然敬之无咎明變止履雖錯然能止於敬而可无咎也在本爻以陰變陽為離繫以旅𤨏𤨏在旅不安所止變離而恃明𤨏𤨏煩雜以招厭惡故為取災象傳曰旅𤨏𤨏志窮災也不安止而恃明則志念紛紜必致虚想無用窮困失援所以為災焉此爻乃在旅初而不安止者六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也六二變為鼎之九二在鼎二以陽變陰為旅繫以鼎有實巽變止止其實於鼎申則有實矣我仇有疾不我能即指三四兩爻間二五之正應也有寔以應君而無人能忌之豈不吉乎在本爻以陰變陽為鼎繫以旅即次懐其資得童僕二陰止於一陽艮止之所以為徳也旅又以安止得進為義今二變止為巽合於安止而巽進矣故為旅即於次以息勞役且資斧懐之童僕可得又戒以貞正者是乃合乎卦之言貞也象傳曰得童而猶貴止不輕進正所以善進也自不致有尤悔矣此爻以安止為旅進之本者九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九三變為晉之六三在晉三爻以陰變陽為旅繫以衆允悔亡以順變止晉不輕進故衆信其心而悔亡在本爻以陽變陰為晉旅以安止為義乃變為輕進焚其次喪其童僕必矣輕進雖正而亦厲謂不安止以為進也象傳曰旅焚其次亦以傷矣不安則危豈不傷乎蓋在旅之時一陽止二陰原為内卦艮之主爻今變為陰是與下二陰同徳而不能以陽徳止之矣猶之在旅而以童僕與人也其義有喪故爻辭有以象之矣以上内卦三爻以止體止外卦之火上炎也初因變離而恃明故𤨏𤨏致災二乃安於止能得止所以能安止故吉變鼎鼎亦止其所而不輕動之象三變陰失止陰之義喪止即喪得也不能小亨由於失貞故厲且變坤静而順非旅之正義象也以三為主内卦者辭有反正開示義象則一耳體徳固不可易也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也九四變為艮之六四在艮四以陰變陽為旅繫以艮其身无咎外艮變離知止而能得於止也故无咎必心安乎止而後身能安於所止也本爻以陽變陰為艮繫以旅于處得其資斧變艮而安所止也然旅固貴安所止而旅無久處之義仍以止為進也四在離體外卦而仍安止於處旅人思鄉焉得心快乎象傳曰旅于處未得位也旅之處豈可謂之得位乎所以雖得資斧而心仍不快耳外卦漸宜進矣四乃仍止於處者故辭傳皆曰心不快六五射雉一矢亡終以譽命象曰終以譽命上逮也六五變為遯之九五在遯五以陽變陰為旅繫以嘉遯貞吉乾體變明明乎下有賢人欲遯故嘉與之以為弓旌之招也貞吉者得其進賢之正而吉也本爻以陰變陽為遯繫以射雉一矢亡終以譽命亦指在旅中求賢人雖有厚幣乘馬之亡而終得登進人賢必大有譽命也或謂譽者賢人名徳升聞命者大君有命􅃂召之也更通傳曰終以譽命上逮也自上逮下有命召賢皆思進用雖在旅而楚材晉用矣李斯曰客何負於秦哉是由余百里奚之類也以上逮觀之譽命之命為上命無疑下有譽而上有命本義謂聞於上之意亦在内矣此爻乃卦之主爻所謂柔得中乎外而應乎剛止而麗乎明者故有射雉求賢之象剛在下卦故曰順乎剛以安止為進之義也能求賢非以在下安止之徳麗乎五文明之君乎此卦之主爻不止主外卦且主通卦矣卦之主陰根坤俱於是取義矣上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九變為小過之上六在小過上爻以陰變陽為旅繫以弗遇過之飛鳥離之凶是謂災眚小過飛鳥之象上爻變動為明動之極故弗遇而過之矣震兼艮為飛鳥變離則離之矣鳥離羣而拆翼所以謂之災眚也觀此爻兼貞悔取義象甚明在本爻以陽變陰為小過繫以鳥焚其巢亦兼小過言鳥也旅人自恃其明之極故先笑以為變震得動矣抑知動而得號咷乎不惟無所得且喪牛於易車失乎牛無所服行不可以進是以凶焉象傳曰以旅在上其義焚也終於旅而不思返尚動變欲進於義當焚巢也喪牛于易忽然而喪不可復得是以終莫聞其音息也上在旅極變動不能以安止得貞故示戒如此然戒旅以貞即示以小亨之道也外卦三爻離體如日之升於東南而息於西北故在旅雖暫為安止而原有動象旅無不進如日無不運也特不可不以安止為本四爻留滯不進之象故不快五爻取資於賢則能藉安止之徳得其所止而能遷善不倦者也故合乎卦之徳義而主乎外卦者且主乎旅上爻恃明變動失安止於極明必不明矣故凶卦以五為主卦之爻四上二陽爻皆附陰為用之爻也四附陰而遲遲不快因變止也上不附陰而冒進變震也是以辭傳分示之且六五主卦則用陰根坤也明矣繼乎歸妹者歸妹歸女於男以女之静濟男之動也旅歸於次暫為安止隂也將有復進者陽也亦用陰以養陽如冬之藏陽於陰以為春夏之向往也義象固昭然矣巽下巽上巽巽兌相綜皆八經卦因而重之成卦者無所繼而根於坤女隨乎母也下經雷山風澤四隅之卦二男根乾父二女根坤母震艮相綜震先艮後巽兌相綜巽先兌後長少之叙亦無紊焉巽以一陰二陽成巽先天八卦位置之於西南以為陰生之象後天八卦位置之於東南以為陽盛之象不同者何也先天八卦取風雷相薄雷起於東北動則諸陽俱動兼明陽生於震也風息於西南息則諸陽俱息兼明陰生於巽也二者又見陰陽交出乎地者震陽升則親乎天也行乎天者巽陰散則親乎地也親乎地者風而雷以鼓之親乎地者雷而風以盪之於二卦相薄而見陰陽相和在恒卦已明之矣兹再述者以明先天八卦位置之象義也後天八卦置之東南雖根於先天風雷相薄而兼叙其流行震在東而巽次於東南帝出乎震齊乎巽陽行之次第也位雖變易而風雷不對錯則流行此後天八卦位置之象義也異而同至於巽之卦畫以一陰在下二陽在上成象者陰在内而陽在外陰在下而陽在上陽來破陰故風起陰散而風息不則陰盛不散隨陽氣升而成雲雨降陽和而風亦息巽至西南息者萬物致養於坤得地之母氣而風歸於地如女之歸寧也且至坤方得地氣或成雲雨而息或陽動得陰静以維之即不成雲雨亦息皆陰陽相和之象義也如男女在父母之前父母和悅而男女俱歡洽之象也天地氣化原在人耳自之前聖人立象名卦以前民用亦本諸理氣之自然者而已坤濕土也風氣携濕氣上升所以成雲而致雨也濕氣者地之陰氣未有升天之濕氣不下降者故雲行而雨施矣為雲為雨皆陰氣所以升之使上降之使下者則陽氣也此風在雲雨中為必有之物也雲之興以風雨之止亦以風也雷之象義即風之入地沉欝久而猛烈以出者耳一起於地一升於天皆能致雲雨皆能止雲雨風雷為一物分之則相薄合之則相和矣故風雷雲雨四物亦未嘗非一物分之則各成一物彼此交錯以成升降聚散合之則一氣之升降聚散而已是相薄即是相和也即天地亦一物也分之則六子各成男女合之則男女一父母父母一乾元而已巽小亨利有攸往利見大人彖辭曰巽小亨利有攸往利見大人巽乃隨震而行陽氣於天地者元之帝出於震至巽而齊萬物無不齊矣亨之至也何小亨哉蓋至離而與陰相見陽之道方大亨也天地之氣以春為元以夏為亨巽乃夏初故云小亨焉有攸往者乃亨而與陰相遇成姤陽之氣交於陰陰於是乎生矣陽資始者遇陰資生陽方為亨之至也利見大人者指卦之六五言柔順中正合乎巽之徳者也有此徳而居卦之尊位則皆利見之以巽進也以人事言之則小亨乃巽以為進之義有攸往而見大人乃得時行道而大亨矣然天地之氣化獨無所謂大人而利見之乎則純陽之乾也巽在東南五陽盛旺之地有攸往則為純陽之乾矣其大人則乾元也巽為長女根於坤其用也用未嘗有不根於體者乾元統天無物不統故乾元即宰化之大人也况巽為風乃陽來薄陰得成其體用之物乎利見者知其體為乾元之陽也以之薄陰即以之交陰一索而得長女此氣化言利見大人也大人之理氣以相叅觀而愈著焉彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人彖傳釋卦名義曰重巽以申命指天地之氣化言也天地之氣風雲雷雨各成一物雷則半年𤼵半年收雲則四時變其形色雨則雨露霜雪不同惟風則四時皆有而無不同也隨時為寒熱温凉而已是天地之氣化有風而後能敷布宣達故曰重巽以申命申天地命令於四時五運九宮八方者也此就卦體兩巽相重而言其義也其卦徳二五皆剛而得中正言巽乎中正者進於中正也進於中正其志乃得行也卦雖二陰爻為主四陽爻之剛得二陰爻而相和故云剛巽乎中正而志行志者陰也中正為體而巽順斯用行天人一理氣也是以又曰柔皆順乎剛柔之順剛即以和陽陰在内陽來薄陰隨陽為動蕩而風生矣陽和則雨陽盛則息俱順乎陽以為起息也所以辭繫以小亨利有攸往利見大人柔能和剛陰能隨陽天時人事俱得宜也陰得陽而亨而往無不利矣見大人即隨剛也本卦大人在五而二亦有大人之象義皆取陰柔所宜順者示之也巽亨言小者在天地氣化已明之矣在人事耑主巽進言由小亨而巽進有攸往見大人無不利豈不大亨乎巽以二陽附一陰成卦剛如二五皆附於柔方得中正故曰剛巽乎中正初四兩爻柔也又主内外卦體也必得陽而風行故曰柔皆順乎剛也象曰隨風巽君子以申命行事象傳曰隨風巽君子以申命行事就君子體巽隨風申行天令言申命行事於人事矣風行之於四時五運九宫八方天之令也王者之令亦與時偕行隨時得當載在月令者即頒於告朔者也申王者之命即申天之命也王者代天而行命也行王者之事無非民事也王者合國與民以為事亦行其所無事而已初六進退利武人之貞象曰進退志疑也利武人之貞志治也初六變小畜之初九在小畜之初以陽變陰為巽繫以復自道何其咎吉言復者陰生於下亦可謂之復也所以復卦謂反復其道也小畜陰微不足畜陽初變陰而復得道也故曰无咎而吉本爻以陰變陽為小畜巽之所以主卦在初四二爻今初變陽不為巽矣如風之起止無定也故繫以進退之象又示以利武人之貞者武人以勇毅為尚巽主於進而武人恥於言退如武人之進而又守貞焉則得乎巽進之道矣象傳曰進退志疑也疑則不能進矣利武人之貞志治也治者治其疑疑釋而自進不能已矣此爻下卦之主變陽而進退仍示以利武人之貞專謂釋疑而志方行耳蓋為進徳修業者言又為急公趋義者言不為妄動干進者言也九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也九二變漸之六二在漸二以陰變陽為巽漸以巽進象以鴻漸于磐飲食衎衎本於止體為巽進之漸所以漸進而有衎衎之樂也故吉在本爻以陽變陰為漸巽進變艮止止而不進在牀下之象因二在下卦也用史巫紛若而吉者不進多由於疑史巫稽疑於人於神疑釋則吉而无咎矣二變止體又在巽下卦不患於冒進而患於疑遲故爻辭如此象傳曰紛若之吉得中也史巫紛若以釋疑而巽進乃為得中道也二原居中位必用史巫者不明則志不定明則定於志耳史者多知古事巫者多知神事攷古証今以人質神何疑不釋乎史巫宜分言九三頻巽吝象曰頻巽之吝志窮也九三變渙之六三在渙三以隂變陽為巽繫以渙其躬无悔坎險變巽順可以渙其險渙其躬者忘已之私也有險不恃則私念不存以巽進合渙悔何有乎本爻以陽變隂為渙繫以頻巽吝亦因二在下卦有過巽之象猶豫之甚何事可為故曰吝象傳曰頻巽之吝志窮也志窮則不能進故頻巽而致吝也理明則志知所向何頻巽乎志乃行之本也彖傳言剛巽乎中正而志行内卦三爻俱言志志為巽進之本可知矣初則進退而利武人之貞二則巽床下用史巫解疑乃得中道三則頻巽因志窮皆言不能巽以為進由於志不能剛巽乎中正而已如剛能巽乎中正則柔必順剛何難有攸往乎此巽内卦之象義也内巽主初進退乃初巽志疑利武人之貞志治則無疑是以主内卦以志治為巽進之本也二三兩爻附於初二則因史巫而得中三則志窮而不能進亦因附初之决否以定吉凶焉六四悔亡田獲三品象曰田獲三品有功也六四變為姤之九四在姤四以陽變陰為巽四與初陰為應四不能應下陰而濟以養之如不能養魚於水也此凶之所由起也在本爻以陰變陽為姤為外巽卦之主爻繫以悔亡田獲三品者巽變乾陰得陽而足以進也進則九五之大人可見矣故悔亡且田獲三品焉巽近利市三倍故曰三品獲於田者亦寓講武之義象如初所言利武人之貞也初變小畜故武人利貞畜之也四變姤故獲三品遇之也亦各有義象矣初四兩爻為内外卦之主爻在陽必振其剛方能巽乎中正而志行在陰又必得乎陽剛方能順剛剛方能巽於中正俾志得行焉彖傳二句一為陽謀一為陰謀也象曰田獲三品有功也非進而何以有功乎非以柔而順乎剛剛方能巽乎中正而志行何以進乎剛貴巽柔始得中正志行柔又貴順剛方能陰體陽用總見陰陽貴於和平則風為時行之風行為時宜之行也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也九五變蠱之六五在蠱五爻以陰變陽為巽繫以幹父之蠱用譽以艮變巽不止而能進則合幹蠱之道矣用譽者譽亦必巽進而後可揚先世之美也本爻以陽變陰為蠱繫以貞吉悔亡无不利無初有終何哉巽體變止能以止為進凡進皆宜本於止以為進乃得乎貞吉之道不致冒進有悔而悔亡矣既能以止為進故無不利似不進而無初必大亨而進莫能禦矣有終者其進之終不可量也亦兼蠱為無初幹之為有終也又云先後庚三日者何也此與蠱之卦辭相應者也蠱之卦辭曰先甲三日後甲三日愚謂甲即震也先甲艮後甲巽即山風蠱也蠱之幹蠱以動而幹止也且以震下一陽實巽下一陰之虚也下虚者實上止者動則蠱可幹矣今五爻變蠱又云先庚三日後庚三日全易祇此一卦一爻繫辭如是皆於蠱之貞悔正變𤼵之在蠱為蠱言也在巽變蠱亦為蠱言也而巽能致蠱之義象亦在是矣庚者兌卦也先庚三日坤也後庚三日乾也乾坤者陰陽之統六子之父母也震為長男足以幹蠱巽為長女柔不能順剛則致蠱柔能順剛何以致蠱乎故言先庚三日之坤柔也次言後庚三日之乾剛也柔順乎剛剛方能巽乎中正俾志得行即得利貞之道矣所以巽進而无不利也因九五為巽之大人卦辭明之矣乃内外巽卦主爻之陰所附從而順剛者也於此明之凡巽進皆柔道也柔道必以止為進止者止於艮止一陽之剛也以止為進即順乎剛也先三日坤而後三日乾柔進順剛之義象了然矣於是卦之剛爻皆巽乎柔而得中志行矣剛之巽柔進乎柔也柔得剛而始行非剛引之而進乎故柔順剛在止而剛巽柔在進也或問先甲後甲屬之震先庚後庚何不屬之兌乎不知與兌無涉也此仍就變蠱而言柔順乎剛則巽虚得實不能致蠱且可以无不利而行矣故言乾坤以明之凡柔皆宜順乎剛也乾坤乃剛柔之所彚也何以屬之兌乎象傳曰九五之吉位正中也卦以剛巽乎柔中正而志行為巽之本義象也惟五合焉所以為大人為陰柔所利見順乎中正志行而無不利也言位而其徳必足以稱之矣就乾坤言剛柔坤柔順乎乾剛即坤之順承乎天也而剛巽乎柔之義象亦在乾統乎坤之中矣上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上九變井之上六在井上爻以隂變陽為巽繫以井收勿幕在井極而變巽進勿幕之象所以有孚於養下而元吉也在本爻以陽變陰為井巽之極而變險為窞亦巽在牀下之象也巽極入井不能復進喪其資斧無進之具矣貞固於巽不能巽乎中正而志行凶可知矣象傳曰巽在牀下上窮也牀下豈上所宜巽之處乎失其道則失其所處之地故曰窮喪其資斧正乎凶也欲進亦不能正合乎凶之象義矣巽本以止為進變險則止而不進矣故曰上窮巽為利市三倍變則並失之故曰喪其資斧正凶矣外卦三爻以四為陰爻主巽卦柔能順剛者也以五為陽爻為大人剛能巽乎中正而志行者也且為陰柔所宜順從巽進而利見者也上爻居巽極而變坎不能進者正以不能巽乎中正故柔亦無從而順之矣内巽皆言志在内之志為行之本也外巽則言功言位志既立而大行可見者惟功所以成功者為位也上則無志復無位故無功無功則有凶也以卦體象言初四兩爻柔也必順乎剛四剛爻又必巽乎柔方得乎中正而志行皆用巽之陰為體順剛以致用也故主乎陰而根坤焉外巽卦以四爻為主五上兩爻皆附之成卦者四悔亡而田獲三品變乾為姤遇陽有獲以能順乎剛也五附於四无初者變止成蠱有終者以止為進進不可量也且先庚坤後庚乾亦為柔順乎剛之象也五為柔所宜順故能巽乎柔而得中正也上不附四變險而畏進乃窮而不能進矣再内外兩巽初四兩爻分主必以内卦之初爻主通卦者風起於近然後行於逺也内卦初爻因進退而利武人之貞武人主進而其貞則主止以為進如師所言皆以陰道用師此武人之貞也初亦柔也利武人之貞非順剛乎武人又必用貞非剛巽乎中正而志方行乎此爻已將全卦之象義盡示矣故主通卦無疑也至於四爻近五而順剛有獲五亦能巽四之柔而得中正則又為君臣之間剛柔相濟矣在四五爻君臣之位列於外卦者也故以之主外卦初主通卦無事不宜故傳言志志人人自具也四主外卦君臣上下彼此遇合之事以之故傳言位位則非人人可叶者此亦確乎不易之體象不止風之行自下而上自逺而近矣彖傳曰剛巽乎中正而志行柔皆順乎剛本義謂上句指五爻下句指四爻愚謂二三兩爻亦如四五兩爻可以通言也柔順乎剛易解剛巽乎中正而志行謂剛必引柔乃得中正志行似傳無此義不知此亦本於卦之體象也巽之剛爻皆附於柔爻以成卦二五兩剛爻附於初四兩柔爻者以風之為物原是剛來逐柔欲散之也然散陰不得中正則陽為亢矣惟附陰而行則風為不鳴條之風方散陰而不傷陰陰不傷陽不亢方得中正所以剛必巽乎中正而志方行巽乎中正者巽進以引柔濟剛而風方行於逺無物不被其鼓盪而羣生得育也方可謂之中正志行且二五兩剛爻以卦畫之體象求之適在一陽一陰之中正亦可謂巽中正為濟剛柔也卦二五之中正以位言一剛一柔間之中正亦以位言何不可相通乎兌下兌上兌兌與巽相綜皆八經卦因而重之以成者無所繼而根於坤女皆以從母為義象也兌為澤先天位置於東南後天位置於正西先天取澤盛於東南凡地中之水所滙者源泉通氣於山者皆澤不止於雨澤也後天取澤說乎萬物至於秋半而各正性命無不由於雨露之滋潤而各成其物雖耑以雨澤為澤而萬物之色澤亦在内矣物必既成而後色澤明潤也於萃卦已詳言之矣先天與山在西北者相對錯錯者交也山澤通氣後天與震在正東者相出入出入者反復之道天行也對待流行雖分兩圖其實一氣以為通貫而已其卦以一陰在上二陽在下相值成象二陽在下乃漸入之陽也一陰在上乃所以收陽而為秋令也再繹雨澤之降也以一陰升於上地氣也升上而天氣應之二陽墜一陰而下行所以為雨澤霜雪雨露皆天陽氣下行者也霜露雖陰氣乘夜而升然升而復降即為天氣故陰氣為露結則為霜耳皆以陰上升而復下降以成雨露霜雪也此共見聞於耳目之前者也至於萬物之色澤亦是陰氣在外陽氣在内陽在内必外𤼵外陰包之成色澤顯者為光彩暗者為明潤新物古物皆有之其物之體質淳漓視此辨之矣即飛潛動植之物亦莫不有焉亦於此别榮枯分衰壯而醫家尤重之為察病之先望色先於聞問切也由外揣内可以相萬物皆兌澤之陰包乎陽為之也此則人言所罕及者也再言君子之德闇然日章有道之容晬面盎背觀於兌之陰外陽内而可知的然者日亡華然者無實也此又深於言兌澤者矣且聖徳有徳澤王政有王澤垂於久逺存於人心何不取兌悅成義乎即下而君子小人各有澤以及世其氣有厚薄其祚有長短始自人心精神流行著於其子孫形而為事業也陰中藏陽即陰徳也兌澤言及此則收陽以養之歴三冬之久𤼵而為春令之盛者天人同一理氣而已合天時人事陰陽内外以言澤澤之義象備矣兌亨利貞彖辭曰兌亨利貞兌之氣化無亨理也所以為亨者何也利貞兌之氣化也占者得之利貞即所以為亨耳然萬物無不悅於兌兌之所以為亨乎出乎震者至此入於兌言出不言入惟言悅者入不可見聖人不言也言萬物之悅而陽氣之入可知矣非陽入萬物未能得性命之正也陽入而性命各正兌之氣化收之藏之以待再𤼵也然氣化無心者何以言悅悅在色澤耳有心有情悅在面貌無心無情悅在色澤是悅之為悅但言雨澤祇可言所以悅物而物悅之象義終覺含糊必合觀澤之悅物並物悅為澤而後兌之内外陰陽俱明矣震陽出而物震恐兌陽入而物悅澤然震虩虩歸於笑啞啞兌說澤成於肅殺明乎此可知天道人事矣彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉彖傳釋卦名義曰兌說也為兌之氣化說萬物萬物說於兌之時令兼言之也就其卦體觀之則剛中而柔外萬物既成陽入陰中陰包陽外將以養陽為復為震一出一入於無窮也此氣化至兌為乾之四徳之利也占者體之得兌剛中柔外之義必主利而以貞為利焉則可以順乎天時而不違天則應乎人事而静正得說矣天地氣化有出入顯藏人心之理有仁育義正此時體兌之徳義正也所以為仁育也乃體兌以順天而應人也順天清肅之令應人義以為利有時勞之而不以為勞以說之道先之而已即至以犯難之事使之而民急公赴義若忘其死者亦不過以生道說之故民雖死不怨殺之者也所以在秋體兌之政令為刑為兵耳三時之隙大工大役皆在兌令以後民勞不怨民死不避豈好勞樂死乎亦在于悅之者自春夏以來生長之道盡矣於兌而行兌之令將以養之於冬而復之於春聖王之於民如天地之於萬物萬物不怨勞避死於秋冬民豈怨避王者秋冬之政令乎此蓋由於說之大既久且厚成終復始所以民勸於勞於難與萬物之說於秋冬如一無二矣王政同天地之用如此其為體者何非體天行之健以為聖人之時中乎故四時之政偕時而行而民之受澤如物之蒙覆載於天地也此王政本於聖徳之體用也象曰麗澤兌君子以朋友講習象傳曰麗澤兌麗者澤與澤相附麗也有朋友之象義君子以朋友講習象傳取象而另申一義兌為口口者聖人所深不尚也無所用口惟朋友講論所習以互考証其得失可耳然亦貴於悅諸心研諸慮以盡天下之亹亹豈徒道聴而塗說乎初九和兌吉象曰和兌之吉行未疑也初九變為困之初六在困初以陰變陽為兌繫以臀困株木入於幽谷三嵗不覿忘險變悅安於困矣在初為下體故困於初生之木至於臀無膚亦以臀象下體也其入幽谷而久不得覿天日者惟其悅於困故困之甚也在本爻以陽變陰為困繫以和兌者兌變坎内知艱險而外和悅悅亦出於道之正矣故曰和和者𤼵而中節也吉可知矣象傳曰和兌之吉行未疑也惟能和而為悅則在己在人皆可行而無疑矣行本於知和本於中耳此爻乃在悅之初審慎以為得悅於人已者九二孚兌吉悔亡象曰孚兌之吉信志也九二變為隨之六二在隨二以陰變陽為兌繫以係小子失丈夫亦兼悅意非悅何以為隨乎然丈夫小子必知所擇則得其正矣在本爻以陽變陰為隨繫以孚兌吉悔亡以孚為悅悅本於己之誠人之悅之亦必非苟悅以狥也故吉而悔亡彼非道之悅人雖悅於一時久必不說焉能不悔惟悅以正而彼此久要之道得矣象傳曰孚兌之吉信志也志在内而人信之在己必忠也在人方信也傳言志悅之體立而用行矣此爻悅本於孚人信其志悅之得正者六三來兌凶象曰來兌之凶位不當也六三變為夬之九三在夬三以陽變陰為兌繫以壯於頄有凶乾變兌夬之壯見於色矣故曰壯于頄兌色澤也於此可證君子之夬夬貴獨行而不引類且變兌為澤遇雨以和陽夬不為已甚似濡於已愠於人不知乃无咎之道也以困變兌而言夬之象義也在本爻以陰變陽為夬繫以來兌凶兌變乾則健於求悅於人者是來悅者若有以召之矣匪心之孚而以面貌相悅所以凶也象傳曰來兌之凶位不當也三處外卦彼此交際不能以孚必易來苟悅之人是三所居之位不當然究之中無守位之徳耳此爻壯于求悅故有外來以非道相悅者非悅之正也以上内卦三爻初在悅始宜審慎以求得悅之道矣内卦之兌主之以三爻而來悅象凶見悅不在尚口尚貌而必尚心之孚也惟二之在内為得中也初二兩爻宜附於三以成兌初陽附陰故為和兌二陽交陰故為孚兌皆吉三有意於來外兌而不本於内陽以立體斯凶矣三爻主内卦反無吉辭者見說必出於感應之正故重申戒以主之耳九四商兌未寜介疾有喜象曰九四之喜有慶也九四變節之六四在節四以陰變陽為兌繫以安節者變險為悅悅於節而安之也故亨在本爻以陽變陰為節繫以商兌未寜亦因變坎有慮險之心故未寜於苟安之悅必商𣙜以求萬全也又曰介疾有喜能守乎疾則疾不進而必退勿藥而將且有喜焉象傳曰九四之喜有慶也不輕於悅而商𣙜焉必得真悅而有慶矣此爻乃上卦之慎於悅而能實得悅之慶者九五孚于剝有厲象曰孚于剝位正當也九五變為歸妹之六五在歸妹之五以陰變陽為兌繫以帝乙歸妹震變兌而雷收於陰兌收陽入以藏而養之有歸妹之象其君之袂不如其娣之袂良月幾望吉震長男兌少女用少女以和長男如月之未朢方有生育之吉也在歸妹陰盛方能收陽為養故重陰如此且正是姤彖辭女壯勿取之義本爻以陽變陰為歸妹繫以孚于剝有厲者九五陽爻得中變而為陰歸妹則陰太盛而剥陽矣在剥之六五貫魚之象尚有奉陽之義何於兌五變陰為孚剥乎蓋剥之世羣陰剥陽賴五君位率陰奉陽以制陰兌之世九五陽爻君位亦變陰孚剥失陽剛中正之道矣故有厲象傳曰孚于剥位正當也謂五居之位隨變則為剥宜預知而戒慎其為剝也五之位本陽剛中正奈變歸妹而親小人近艶妻逺君子剥正人其徳不稱其位何以當卦五位而無忝乎此爻失其悅之中正雖有位而不足重者乃徒恃其位以狥私害公則其位適足以為君徳之累耳故本義謂之與履五象傳同皆恃君位而藐君徳者也二卦變震同何以辭不同二變隨五變歸妹也隨雷在下卦方升起而合兌澤陽盛之時也歸妹雷在上卦將收入兌澤陽衰之時也孚者陽也一盛一衰故二孚兌吉五孚剥厲剥者陰剥陽又非収陽矣五爻象傳曰位正當也本義但言同於履卦五爻未嘗明其何以相同再玩履五爻知聖傳所謂位指變爻而言也履五變睽五睽則不合於禮恃明夬履貞亦厲也本爻變歸妹陽收於兌陽衰則孚剥故亦有厲二卦五爻皆因變動而失履兌之正義其位正當此變則為睽為歸妹固象數之自然也君子體之必有道理以維持之所謂命也有性焉君子不謂命也本義所謂同者或此義象乎上六引兌象曰上六引兌未光也上六變為履之上九在履上爻以陽變陰為兌繫以視履考祥其旋元吉處履之終而變兌悅於履禮故視履必自考其祥為履之終始焉其周旋也有不元吉乎本爻以陰變陽為履繫以引兌而不言吉凶引兌者引人來說已也不言吉凶引人之道為正與否未可知吉凶亦不可定也能說以先民民忘勞說以犯難民忘死其庶幾乎象傳曰未光也有引人來說之心即為有心於悅而非無心自孚所以謂之未光非彼此上下感應光大之道也上六陰爻為外卦兌主亦因在兌之口有引兌之辭上下兩兌三六兩爻一來兌一引兌三以口召來悅者上以口引致悅己者不能忘悅所以不得悅之道也必二之中正斯能内有孚而外自悅歸於信志也可見志為人悅之本在己篤志為忠久而人信何嘗欲致人之說乎不致悅而得悅悅而不可解矣人已感應在身在世胥是道也外兌主上爻四五兩陽爻皆宜附之四商兌而因疾有喜變節知險也五孚剥有厲變歸妹陽衰也上爻引兌外無可引引内二陽為悅上原為二陽所附引之無害故不言吉凶但所引有公私惟公而匪私則悅其正矣兌卦以上卦之上爻為主通卦者悅起於心而彰於外方為誠中形外之悅也就卦之體象主之辭雖不得全美亦不過申戒之正所以歸重之耳本卦主陰而三與上俱不足以主之何以主陰根坤乎此蓋從卦論其陰體少女根母合全卦之體象而明其義不以爻之陰陽論矣若論爻則巽宜在初兌宜在上巽初利武人之貞勵巽進之始兌上三引兌來兌戒兌苟悅於終也亦可以主乎巽進兌悦之義矣巽兌二卦交則為中孚由中孚交而巽兌二陰卦歸於既濟正合乎主陰歸陰之象義矣大易通解卷十一
