body:
  text: 大易通解卷一江常鎮道魏荔彤撰乾下乾上乾坤二卦相配而相錯以為配以生八卦六十四卦故列於經首坤亦生於乾故乾又先於坤焉乾凡卦自爻始凡爻自剛柔始伏羲畫卦首有一奇次有一偶一偶亦自一奇來雖云剛柔對配其實坤亦乾之所統也伏羲仰觀俯察見天包地外地懸天中原是一箇故畫一奇以象之然一箇中分象分形為天為地既判然矣於是又畫一偶初畫一奇偶即在奇內後畫一偶分象分形而天配以地奇配以偶剛柔始分為二矣不言隂陽而言剛柔者何也其義頗細伏羲畫卦原就現成天地中取其象義先有天地後有聖人聖人却能將未有天地之前為氣為理聰明睿知足以通之於是就天地之用畫成卦爻以明天地之體隂陽者體也剛柔者用也隂陽既分為二何以為體蓋就剛柔言則體也就天地言原是一氣一理則隂陽又為用矣何以言隂陽隂先乎陽言剛柔剛先乎柔乎隂者靜之體也陽者既有天地動之用也此周子靜以生動之説所本也及陽動而剛斯為體矣隂又自陽中生出是以地統於天柔統於剛隂又為用陽又為體矣究之乃一氣也由靜而生動則剛也由動而返靜則柔也氣之所在即理之所在理不離於氣而宰乎氣者也所以言隂陽隂先乎陽言天地動靜最初之體用也言剛柔剛先乎柔言隂陽往返流行之體用也由此體用互根至於因二為四為八則伏羲以剛柔二者相摩而成也就天地之氣化立經卦也又為十六三十二六十四乃伏羲以八卦相蕩而成也就萬物萬事之氣化立别卦也亦莫不由體生用由用又生用體用無窮盡其象義亦無窮盡矣邵子之橫圖以二為八明剛柔相摩也程子之傳以三加三明八卦相蕩也朱子啓蒙推至四千九十四卦更推至於無窮亦不過此氣此理由一而無窮者耳此伏羲聖帝初畫卦爻之象義本於氣以成象本於理以示義也合象義於理氣合理氣而為道故易者載道之書也然言道已為天地之用矣故易者聖人言天地之用示天下後世由用之可象其象可名其義以求天地不可名之理不可象之氣也畫卦既自一奇始配以一偶遂自隂陽中名其象義為剛柔於是一剛一柔必相交而摩矣以其原是一氣不能不屈伸往來既屈伸往來必交而相生伏羲觀乎此於一奇一偶上又各成一奇偶矣由一而二者由二而四矣二者剛柔四者剛柔有老少也以老為體而少為用老者仍是前一奇一偶也少者老之所生也然少不變必老而後變少者剛柔未極故不變老者剛柔已極則必變矣變則剛變為柔柔變為剛名為變其實又於老少中生老少也於是變二為四變四為八即四生為八也剛柔相摩至於八而三畫之經卦成矣此豈虛擬其氣象乎皆有理以取義焉於是以剛奇柔偶之一畫積纍三畫而至純者象隂陽統會之天地次第生四生八積纍三畫剛柔多少者象天地氣化之水火風雷山澤以天地立體以六子致用焉天地之用既分寄於六子其立體於無用者二統六為八也天地之用其同六子以致用於流行之間者二合六為八也此八經卦之為天地水火風雷山澤立名取義本於一氣一理分為二為八之始終也八經卦既成更相蕩焉遂成别卦六十四以盡萬物萬事至賾至動究亦不外乎隂陽剛柔不能不交也卦既由相摩至相蕩立八卦之體行六十四卦之用每一别卦皆以二經卦相蕩而成亦是體用於是以兩經卦之三爻合而成别卦之六爻以該三才之理氣以盡萬物萬事之象義所謂兼三才而兩之故六六者非他也三才之道也繫辭傳言之甚明確也自一畫奇積至三畫皆奇在八經卦即以純陽之理氣象之為天而名其義曰乾因而重之至别卦六畫皆奇仍是純陽之理氣所以仍象之為天名其義曰乾也何以有三復有六三畫之卦祗能盡天地之理氣六畫之卦方足盡萬物萬事之象義於是六畫中各以兩畫為天為人為地乃於此兩畫中分隂分陽迭用柔剛故易以六位而成章也所謂兼三才而兩之以言理義分隂陽用柔剛以言氣象故卦必六爻則理氣義象俱明備矣六畫之卦以乾為首氣為純陽足以統天地萬物之氣為一也地之氣亦統於天氣之中又與地配而先生六子次生萬物皆天之氣也然有氣必有主乎氣者理也理者何天之性也天亦有性乎未生天之前即有此氣方能生天既生天天又以此氣生地以配天以生六子以生萬物皆氣也皆理以主之故謂天之性是以萬物皆有性皆本天之性以為性耳萬物有氣斯有象有形有性斯有情則天之有性有情可以由萬以知一由未以溯本矣故具氣成象名之曰天其理寄於氣象之中本其性情名之曰健健者陽純之極也朱子所謂氣以成形而理亦賦焉者兼天地萬物而言之也有理有氣則必有象有象必有義有義必有名卦名在八經卦定於伏羲重之而為六十四自必亦定於伏羲所以三代皆有易經經卦皆八别卦皆六十四無敢損益焉蓋亦不可損益耳至於夏易連山首艮殷易歸藏首坤以夏建寅故首艮殷建丑故首坤似皆秦漢儒者傅會之説何也易雖云六十四卦其實祗乾坤二卦耳乾坤坤又必先以乾何以舍乾而别立首卦乎如以其受命正朔而敘卦也則一代之書而非萬世之經矣禹湯亦聖人也必不出於此自小其創垂也周文王興因伏羲之八卦立體更其位置以致用復取其卦之象繫之以辭以明其義於氣之中求理於象之中明其義也其首乾者垂訓天下後世不可復易又豈因建子為正以首乾乎天為第一先生之物有天而後地與六子萬事萬物生焉何得不首乾耶如謂因建子而首乾陋矣況文王繫易尚未革命何因而預改正朔建子首乾此不辨而知為秦漢諸儒不經之論矣周正建子在武王受命以後易之首乾在文王作易之時耳至三代之序卦同周與否不可考也周易自文王興且經周公孔子兩聖修成從周自萬世不易亦因無能易之耳雖朱子有卦爻尚可推廣無窮之論又有聖人復起作易必另有所成俱作變易交易觀可耳不易之易乃周之易也所以秦火之烈獨存古今亦天地鬼神所呵護豈止天下後世用之開務成物於不易也乎乾卦首乎易全天地之理氣該於乾全易之象義亦統於乾矣六十二卦皆從乾配坤中出象義也故乾坤為易之緼又為易之門也是諸卦皆根於乾坤而坤又統於乾焉文王作易既就伏羲八卦圖中觀察體用於是另置八卦方位就伏羲八卦言原是明天地隂陽之用就文王八卦言又明伏羲八卦之用矣更於卦之因重為六十四卦者皆繫之以辭以通天下之志以定天下之業以決天下之疑如繫辭傳之所言也夏殷二代之易有無繫辭不可考矣周易卦辭繫於文王又經周公孔子發明足以明卦爻之象義於神明不盡矣繫辭傳所謂觀其彖辭思過半矣至於文王當日因卦有定名而繫辭或經卦之名定於伏羲經别之卦三代各命其名亦不可考然周易既不可易則就周易言其卦爻亦就周易言其繫辭四聖人之精神心思德行功業俱在矣何必逺求其無稽不信者乎即除卦名成文連卦名成文亦無足深索但就辭玩辭儘能藉聖人之立象明義自成其德行功業何必置其有用之心思於無用耶況周易為卦為辭不能知從者多矣學易者從事於易簡而得其理氣明其象義亦至難矣遑他求哉乾元亨利貞彖辭曰乾元亨利貞易者卜筮之書其理至精其數至變其道至神然不過前天下後世民用而已文王繫辭示占得乾者祗有元亨利貞四字有乾純陽之氣象至健之理義則元亨也而又必利乎貞正期於終始叶乾焉方合於乾之立體致用也後之聖人以天地氣化推言此四字於聖賢道德亦推言此四字是後聖孔子明先聖伏羲文王卦爻繫辭中之象義令學易者知進德修業遷善改過之方以為希聖希天之始基也故必分三層看彖辭在天地之氣化自元亨利貞者順乎至正之理氣以為運行出於無心也在聖人之人德業自孚於天叶於乾而元亨利貞亦自然順乎至正之理氣以為應事接物有心而無為也在占者德業即不能如聖人亦必其心至公其氣至剛叶乎純陽至健方得元亨也利貞者必以貞為利不可變遷方終始叶占而得吉也卦之有爻卦以立體爻以致用也然有爻而後有卦非爻之動變何以定卦之象乎故爻有六九無七八者因動變之爻成貞悔之卦也繫辭傳易之為書也原始要終一章盡其説矣文王作易既繫卦辭周公以述為作又繫爻辭卦爻之象俱明而其義亦俱備矣啓蒙謂占得爻動必觀卦辭亦卦體爻用之象義也然爻既有六九無七八不惟三爻動之卦宜參觀貞悔二卦即一爻動至六爻全動皆宜參觀貞悔二卦之卦辭爻辭以明爻有來去卦方有貞悔也故愚推啓蒙之意兼變爻以釋本爻雖未可固執然非參觀其義象未明切也繫辭傳所云居則觀象玩辭動則觀變玩占動者本爻貞也變者之卦之對爻悔也聖傳所示如此可不遵乎初九潛龍勿用初九變為姤之初六以隂變陽為乾繫之以係於金柅即兼變乾明象於乾金也姤隂變陽故必得正乃吉有攸往則見凶者隂初在下不可因變乾而冒進也羸豕本不能蹢躅變乾則欲孚於壯豕所以見凶也在本爻以陽變隂為垢繫以潛龍勿用龍陽物而變隂則宜潛而勿用以養陽也養陽必用隂也勿用正陽潛之善所養於隂也蓋姤之初隂原從陽中生出隂陽往復至均至平於第一卦第一爻聖人早示之矣九二見龍在田利見大人九二變為同人之六二在同人二爻以隂變陽為乾繫以同人於宗吝者變乾內卦三陽為宗也同人本以一隂同五陽同宗不能與隂陽大同惟合衆陽為同則涉於私而有吝矣此與泰二之辭當對看本爻以陽變隂為同人健德而變離明明用健體乃剛健中正又濟以柔順文明者所以為見龍以其有可見之龍德也既有此德雖無位在田亦為人所利見之大人矣且可以上應九五龍飛之大人而利見之矣此爻參觀知陽必以濟隂為中正不以同宗為貴也九三君子終日乾乾夕惕若厲無咎九三變為履之六三在履三以隂變陽為乾繫以履虎尾嘻人凶武人為於大君履三一隂夾於五陽之中復變陽而隂全虧矣履禮也柔履剛也以隂柔為用以和禮體之嚴也今變剛是履虎尾而嘻人矣且值武人為大君之時以剛履剛失乎履之為禮矣凶可免乎在本爻以陽變隂為履陽變隂又恐失乎陽之剛健矣故終日乾乾夕惕若雖厲而無咎就本心德性之體言則欲純陽至健乾三是也就應接事物言則必濟之以柔履三是也是乃體乾用坤之道也參觀二爻隂陽均平和濟之義象昭然矣以上內乾三爻初勿用用隂養陽也二體剛健變用文明所以為利見之大人而又可利見乎大人三因變隂而乾惕克隂以全陽為心德言也兼履卦貞悔二爻參觀始明體用隂陽不可偏倚也然二爻之龍德乃內卦主爻所以為在田之大人初三兩爻皆附之成卦健體必離用柔以濟剛也初潛勿用者用隂附二也三則厲而無咎亦必乾惕不息始得無咎皆附於二之主爻剛柔相濟方中正也九四或躍在淵無咎九四變為小畜之六四在小畜之四以隂變陽為乾繫以有孚血去惕出無咎小畜以一隂畜五陽變陽為乾近五則動疑故血去惕出然以一隂畜衆陽能如是焉用隂柔之道也足以旡咎而所畜日大矣小畜卦辭文王繫之以密雲不雨自我西郊周公於四爻繫之如此為文王當紂之時事取象立義也故與乾四繫辭相合焉本爻以陽變隂為小畜繫以或躍在淵或躍者將躍未躍也故尚在淵四乃外卦近五之位何以在淵就龍言也乾變巽進在淵而將躍躍則飛龍在天矣然文王終不肯躍也所以至於血去惕出亦不過免咎而已此所以為盛德也觀此爻貞悔二卦對爻參觀義象愈明九五飛龍在天利見大人九五變為大有之六五在大有以隂變陽為乾繫以厥孚交如威如吉隂變陽為乾五飛龍之德位何復言孚乎惟其體為離中爻之隂也故必厥孚交如交信乎上下五陽也大有及主隂之卦俱如是也威如者非作威也誠立於中而威儀著乎外也故吉在本爻以陽變隂為大有乾變離剛健文明之德備矣故人皆仰天瞻日如飛龍之在天人皆利見之也所以為天下之大人如日如天之象也蓋以聖人之德而居天子之位辭以昭其象義也上九亢龍有悔上九變為夬之上六在夬上以隂變陽為乾繫以無號終有凶一隂變為純陽五隂已夬獨留上六何所呼號於同類乎在本爻以陽變隂為夬無論隂之被夬有凶即陽之夬隂亦宜有悔也何也以陽盛而至夬隂則陽亢而不能和隂使為陽用也不能和隂即亢陽也亢則有悔必矣以上外乾三爻四以變隂而成或躍之用陽能用隂於淵龍蛇之蟄以安身也五則變大有天日懸中飛龍利見之矣以剛健而變文明也上以夬隂而陽亢所以在純陽之體德必以隂柔為用和乎首乾六爻如此立象取義六十四卦聖人無不欲隂陽和濟得其均平也在天地之氣化不能無夬剝而出入無疾朋來無咎不過反復其道而已在人事君子小人為夬為剝剝固深戒小人夬亦示警於君子故夬剝在人事皆聖人所不願見也於乾之亢龍於坤之龍戰早於二卦極言夬剝之皆不足重也何待否泰反類方為言之切哉於是知姤復自聖人視之至均至平無偏倚之見如後儒為扶抑之論也外卦三爻以五為主且主通卦剛健濟以文明又為全易主爻四附五在淵陽體隂用上不附之亢而悔矣用九見羣龍無首吉用九一爻為六爻皆變乾變為坤示也唯乾坤二卦六爻皆純故有用九六爻辭餘卦即六爻全變亦無辭蓋六爻剛柔不純全變亦另有一卦無用此爻也爻辭云用九見羣龍無首龍之為物至陽無首者陽體而用隂也曰用九即用陽也用陽以隂乃得乎以隂濟陽之象義也故曰用九然凡占得陽爻者六十四卦中皆當存此象義也不愈可知聖人和濟隂陽使之均平之道乎伏羲文王周公三聖作易卦爻繫辭之後孔聖之彖傳次之乾卦次序尚合其餘卦為後世編次所紊矣孔聖諸傳分為十翼彖辭上下傳卦大象爻小象上下傳繫辭上下傳文言説卦序卦雜卦共計十傳以翼乎經也釋易者自應於文王繫卦之彖辭周公繫爻之象辭後敘孔聖彖辭之傳再敘卦爻之象傳再敘文言矣雖漢儒編次取其尋省易了紊亂已久然不可不明四聖人作易之先後次第也於乾卦明之可以該餘卦焉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧彖傳雖釋卦辭然每自申一義也朱子謂不可謂文王之説即孔聖之説是也推之卦象傳爻象傳孔聖亦多有自申一義者俱不可固執以論先後聖人之説也然亦未嘗非一理相貫一氣相通也於不同之中有同揆之道也孔聖釋乾卦名義為彖傳曰大哉乾元萬物資始乃統天原言氣化也而氣化不能自流行有理以主之也乾以一元統天即就資始萬物中見之也不然何以見其統天乎資始萬物先從地始以及六子以及萬物一始而無不資之以為始也此即所以統天也且此元乃天亦資之為始者也豈不至大矣哉有此資始之元資始於地而有坤合乎坤而資始生遂有六子六子隨父母以資始資生乎萬物雲行雨施六子得天地之資始資生者各成一物又以其氣化流行於萬物於是雲行為隂升雨施為陽降而品物流形矣流形者次第形成皆一氣之流行成而又變變而又成兼成變無終以為流行也萬物得之而成形者即隂陽之流行也此乾之元亨見於天地氣化者也聖人體之如何聖人之聰明睿知足以達天地之德故大明乎乾元之資始且以無終始為終始體乎卦有六爻之位因時而乘亦如天之氣化因時而行也於是應事接物之間即因六位各成象義者以時措而咸宜是聖人因六位之時乘六爻之龍與天偕行於無息也此雖擬議其象而聖人以一元之德順應不窮洵如乘龍御天無所格阻也此聖人體乾之元亨以為元亨也大明終始者聖人之元乘龍御天者聖人之亨也然乾冇元亨又有利貞天亦如是乾道之變化即天道之變化也由乾之元子半而資始者至午半而陽盛之極隂己生矣陽道漸變隂道漸成是由陽變而化隂也漸至萬物各正性命當秋令也性命各正於秋乃各保其太和於冬又以為子半生元資始乎萬物也故資始者乃合無終始以為終始也此天地氣化之利貞也聖人體之首出庶物聖德既成自正其性命然後各正人物之性命此首出者作之君作之師成已而兼成物盡性而兼盡倫盡物也所以萬國著咸寧之效無一民一物不得其所即乾道天道之保合太和也聖人以一心之推及於天下生以是遂性以是復各得養以成形各得教以成性皆保合太和之象義也此聖人之利貞也至於君子何如乎象曰天行健君子以自強不息象傳明之曰天行健君子以自強不息內外卦皆乾以象天象天之體在象天之行中見之也天行至健無一時之不行也聖人體乾則天自然其德之純如天之行不已也君子則希天希聖自強焉而已自強其心以立德自強其智力以建業久則如聖人之純德矣斯能希聖之不已矣斯能希天之健行於不已矣天地聖人學易之君子亦分三層方明也潛龍勿用陽在下也此下若皆謂為文言是乾卦竟無象傳矣此七傳乃正釋爻辭也與别卦之象傳同例俱就爻辭發明本可以附列於各爻之下因乾卦各爻之傳分編故亦隨經加注焉龍性飛動而雷收即蟄冬月之雷非瑞雷則方蟄之龍宜勿用非勿用也潛其用於無所以遵養時晦將以伸大用於宜用之時也傳明之為陽在下取象於三冬閉藏坎陽方萌不應動發宣泄之也故乾之初九未嘗不可作復之初九觀焉見龍在田德施普也龍見於田澤必及時德者天地之生化也時雨及田萬物生遂天地之德施普矣不言利而言德因所利而利之即德也君子龍德既成在田而能輔世長民德施之普亦同天地矣所以利見也終日乾乾反復道也終日以該終身乾乾進修無已反焉復焉一息百年俱在於道道也者不可須臾離也戒慎恐懼靜存動察中庸所言本此或躍在淵進無咎也或躍躍也在淵未躍也龍德已成躍不躍如一也有其德而有其位為躍有其德無其位為淵俱在或中不自主也有天命耳然宜躍則躍進亦應天無利位之私心自無損龍德而致咎矣觀傳知作易聖人如文王周公孔子俱在淵也而俱有或躍之疑文王及其子孫進無咎矣周孔終於在淵又何咎哉故進可兼不進言義不然豈聖人於天位以必進而後免咎哉即湯武革命有孚乃能悔亡若未孚而革必有悔矣俱要活看飛龍在天大人造也聖德君位其德可久其功可大故足以成造萬物使之遂生復性也然大人之自造其德以造萬物則成已以成物合天下而共明明德也造之為義即中庸之誠者自成也中庸多自易出易言天道盡在人事中庸言人事盡本天道二書能會其通義則天人之理昭然矣亢龍有悔盈不可久也龍德聖德也奚有盈乎聖不自聖也若以為盈則豫聖矣何能久乎惟視聖仁不敢居所以不厭不倦終身好學自強不息也至於有悔不同凶咎不能久行仍可遷改變而為姤即是不逺復無祇悔矣姤復亦須通看用九天德不可為首也龍德聖德皆天之德也惟九而能用則隂能濟陽陽首不為為隂之尾乃以隂承陽首尾初無終始正合乎天運之不已也是聖傳於乾之首易已明示陽當與隂調和無取乎亢必善其用則夬不厲而壯不用無非推言用九之象義而已老氏全部道德經俱包括於此一傳之中故稱老子為猶龍知其能用九也孔聖於乾之六爻前後凡五次釋之此七傳為正傳下文初九曰潛龍勿用何謂也七傳擬議之以成其變化也潛龍勿用下也七傳明龍德之居位也潛龍勿用陽氣潛藏七傳明龍德之合時也君子以成德為行七傳見凡乾六爻固有因而重之之象以象天地又有兼三才而兩之之象義也故余注此五傳有分列者有彚列者分列者因聖傳意在分疏彚列者因聖傳意在合發也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事文言自穆薑時已引之矣或古有此文言孔聖引之而申明乾之四德此為學易者作切實下學上達功夫也文言曰元者善之長也此善即性善也由於繼之者善故為成之者性也即元也所以為天德之宗主也故謂之長亨者嘉之會也此嘉即禮之用和為貴先王之道斯為美也小大由之故為嘉美之所會也利者義之和也義之和即利也非義之外有利也論語曰見利思義義之所宜即利之所主也故曰和和即發而皆中節之和也貞者事之幹也事非幹不濟幹非貞不能幹者力也氣之屬也貞者理也理足以主乎氣氣方可以幹事孟子曰我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞乎天地之間氣塞天地何事不幹乎然是集義所生者其為氣也配義與道氣主乎理所以幹本於貞也此一段言乾之四德皆於氣化中明有理以主之所以成元亨利貞理氣合一之旨也謂之四德者正以理在氣中賦之於性而謂之德也君子體仁一段則下學上達至切實之訓矣君子體仁之理氣以其心之仁推及於人於物親親仁民仁民愛物故足以君長乎人而生成養育以廣其仁也君子明嘉美之會歸而以至和為則以主三百三千之嚴得其至和之宜則有得乎合禮之宜矣君子利物為心不自私其利利而義也是以去其私利之不和得其利物之太和是制萬物萬事之宜者為義而本於一心以裁制權衡者為和也如此而義和利即普矣君子以貞固為本貞者正也知止也固者止於至善而不遷也天下萬事皆有至善之理君子知之止之復貞固而不遷是止於至善而安於止矣何事不可幹乎此君子明乾之四德而體之以成其元亨利貞之體用所以能自成其四德為一為君子之居心應世也君子行此四德者故曰乾元亨利貞孔聖曰惟君子乃能行此四德也故曰乾元亨利貞四德又冠以乾四德為一德矣君子體乾而行之四德亦祗歸於君子之一心耳此君子之體乾所以漸優入聖域而不自知也此段引文言乃學易者日用飲食之道不可須臾離者也所以孔聖為集大成以其循循善誘人也文言愚謂止此以下皆謂為文言不敢從孔聖之爻象傳别卦皆略於乾坤獨詳所以重剛柔之始以明變通之道於無窮也於乾坤二卦之爻多為擬議以成其變化也與繫辭上下傳所引之各卦十九爻同一義也乾更詳於坤矣以乾統天統易故更反復申言六爻之發揮旁通以為三百八十四爻引伸觸類神而明之於無窮極也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也七傳如繫辭上下傳雜引各卦十九爻擬議以成其變化也先於首卦六爻詳繹而各明其象義乃孔聖觀玩有得垂示天下後世學易者知引伸無盡觸長莫窮且神明存人也公辭聖傳之外廣為擬議則變化於爻象反有限量擬議以成其變化正不測矣初爻擬議之曰龍德值潛時則宜隱易似作治字解不出而治世不隱而釣名遁世無悶世不可為不見是無悶人不見知合於所樂之道則樂違於所樂之道則憂道在是潛德亦在是信之篤守之專故確乎不可拔方合於龍德而因時宜潛矣知易字解作變易之易亦是不出而變易乎亂世之意耳九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閉邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也二爻擬議之曰龍德至正而居中位陽之正而中也正而中則中不外庸庸言庸行必信必謹正中之龍德造成俱於此始終矣言行信謹又由於內致其功間邪克已存誠復禮此龍德正中之體發而為用善世不伐不有功德博而化不居德且自忘其德而化人人亦不知則在田而謂之大人殆為己備君德者乎德何論君師聖德成而如龍在田在天位不同德同孚耳九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣三爻擬議之曰德成於學欲進聖德先勉於學故未修事業必貴內貞聖德盡心曰忠實心曰信此進德之基也謹飭其辭於未發之先豫立其誠於淵默之內言既有本行自有則著之功業足以居之而不致成而或敗矣此居非有而恃之乃保而存之也然進修之事首重在知知必有止止必有至即至善也知至而能至焉斯可與之審事理當然之幾必知明斯處當矣匪知之艱行之維艱至必有終至而不遷斯謂知終而能終方可與守義理之常不致見異紛更耳此君子自幼至老終身不倦於學方能之如此則德亦成龍德矣以應乎世居上位而不驕以功利盛滿為慮不暇驕也在下位而不憂有道德仁義可樂足忘憂也是君子之乾乾因時而惕雖位危殆之位亦無咎也蓋因學成而德立也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎離羣之離亦可讀作上聲其義更長四爻擬議之曰四位近五在下之上進則為君退則為臣臣而忽君揖讓則堯舜征誅則湯武俱不可為邪如後人之假託也有此不為邪之心則進如武而退如文皆得義宜無適無莫義原無恆也有恆則離羣無恆則羣類雖從而非私義之與比而已義在心為理在外合時君子所以貴於進德修業者正謂協義隨時之難耳及時為進退或之心原不惑也躍之時至可躍義也不躍仁也亦上不驕而下不憂也何咎乎不離羣即渙羣如文王三分有二以服事殷只有至公無私而已九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也五爻擬議之曰龍德成而升天不言德而言其德孚可也德孚非無本本天地氣化也同聲相應同氣相求水則流濕火則就燥龍起而雲興虎出而風嘯何也萬物皆隂陽隂陽皆天地也聖人中立於天地之間以司萬物生成之命德協隂陽之正業成無過不及之中聖德至中正之極故孚也聖德復居君位作而必覩者天地萬物皆隂陽之氣數而歸於聖人體仁制義建德立業之一身身本於心心又為隂陽之宰也本天親上者陽之類也本地親下者隂之類也聖人一心立極分為二之氣數者俱不能越也是以各從類而利見大人也未説萬物覩聖人先説萬物必覩之所以然親上親下見萬物皆二氣生成聖人立三才之極故必覩也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也上爻擬議之曰龍德過亢自居其德則無德矣位貴極反無位𫝑高極反無民龍德雖在上位因其過亢則不求不應誰來輔之乎故以亢而動悔必生焉不動則靜能生隂濟亢也此六爻雖各為擬議而實自初至上有一貫之象義且將天下後世人之德位俱包括在內既漸而有敘復貫而能通其所言皆最切學者身心日用之事可為樂行憂違進德修業之方學易者宜詳為觀玩自審其居何體用何爻自得於心慎持其動較之爻象更為詳明易於知從不可徒以為此聖傳擬議卦爻之變化已也潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也潛龍勿用下也七傳言乾六爻之位也六爻各有位故其義象不同公之繫辭亦各因其位以明其象義於辭耳諸卦皆然聖傳獨於首卦更為申明之使學易者知所極研也從一位字釋此七傳傳義自明潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則潛龍勿用陽氣潛藏七傳乃乾六爻之時也每卦六爻為用有體理存而氣行焉於首卦申明之知卦因六爻而發揮其理氣更以旁通乎萬事萬物之情若其時序不明是稱名雜而將越矣惟有卦之理氣以貫之六爻故雜而不越也所以聖傳復明其時自陽氣潛藏始至於與時偕極氣雖漸行理則無二各行其時者氣也各得其時之宜者理也至於用九乃見天則是合乎天之則氣與天偕行理與天合德也聖傳亦甚明不必更釋學者但從每卦理氣一貫處求六爻是由一而萬由本而末極研之道也於是六爻雖變動不測亦可於次第時序中得其用不離體可測者必有所在矣乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉傳又釋乾卦象義曰乾元者以始而得亨者也見亨由於元有元必亨氣化之一定也利貞者乾有此氣化必有性情利貞乃乾之性情也此性情又非乾健者之性情也亦就氣化言元亨者氣化之可見利貞者氣化之不可見者也元亨自子半陽生為春為夏皆生長之氣化故有元即有亨可見也利貞者由午半隂生為秋為冬皆收藏之氣化將以為復為次年之元亨豈可見乎故曰性情言在內也元而亨言在外也此即繫辭傳顯諸仁藏諸用富有之謂大業日新之謂盛德也於此先發其端矣利貞為性情又所以為元之始者也故乾之始能以一元而亨萬物是以美利利天下也天下萬物以其資始之元各成其亨因而各得其性情即各正性命保合太和也遂又為元始為咸亨以至於無終無始皆自乾元始之也然乾元何嘗可見乎萬物何嘗知為乾元始之終之終始之於無盡乎所以傳謂不言所利利大矣哉惟其不言利而利至大利之大者利於貞也貞下起元是四者周流萬物終始皆天不言而能以美利利天下於無窮也乾雖有卦爻繫辭亦未嘗言之如是之詳切也聖傳釋之天道乾道備於聖人所以繼三聖人而集其大成也大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也又明乾卦之體用曰至大矣乾之德乎剛健也中正也剛健而至純也中正而極粹也至純至粹乃至精也此乾之德也剛健中正歸之於純粹純粹極之以至精德至此無以加矣有此體斯有此用矣於是以六爻發揮其體德旁通乎萬物萬事之性情性情無不各得則措置無不咸宜矣此乾卦爻之體用也聖人體乾之體不可見也不能示天下後世使人人知之矣見其用乾之用而已時乘六龍以御天雲行雨施而天下平用天之用即用乾之用也天也乾也其理氣本在天乃自有乾而皆載之於乾矣此易卦爻繫辭之通於天也且自有聖人而易之理氣備於聖人矣其用皆見於作易聖人之德性功用矣此孔聖明乾卦體用之大也即以明聖人之體用也不同前彖辭傳釋乾之氣化也彖傳合大象傳分三層天地聖人學易之君子乾元者一段分兩層言乾之氣化即言天之氣化大哉乾乎一段亦分兩層言乾之體德則由立體以制用言聖人之體乾則由用以知其體也俱各有義並非重復剛健就氣化言中正就德性言剛健陽用而中正隂體也純者陽之純粹者隂之粹精則合隂陽體用而一之矣君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎君子以成德為行七傳孔聖明六爻兼三才之道也初二兩爻地道也君子體地道於初二兩爻一潛一見不同而成德則一有其德矣潛則勿用見則君德地道者臣道也何言君德為臣而德足匡君治民即君德也雍也可使南面孔聖之君德自明於論語為政以德章豈必定居其位乎故修德凝道自成其體以待用焉君子之法地道與坤之順承乎天一義象也三四兩爻人道也君子體人道乾乾因時以主敬釋疑昭信以存誠誠敬之外無人道也蓋惕者敬生於畏也而慎者誠足破疑也惕以主敬自省之學也慎以開誠兼應接而言學矣此人道之定則也乃德修已成位聽於天或之者如周孔不有天下為可疑也然何咎乎聖學重德足副位耳五上兩爻天道也天道何以體之以德合乎天德則道合乎天道矣日月四時鬼神皆天之用也大人體合天德其用合天用焉所以合德者萬古如一所以合用者與時偕行故先天弗違後天奉若大人以天為則法天行健純亦不已者反若天行隨大人而不違也鬼神為幽隂也人為明陽也亦皆天之用也天之行不違其隂陽之用豈能違之故鬼神悉格民人悉宜是為有德有位之大人為天下之利見此大人體天道之極致所以建位首出功能與天地參者也若不能德合天德則體不立而用不行動與天違如亢龍之知進知存知得而不知退與亡喪之必至何以為善體天道乎其惟聖人乎一傳為乾元用九釋也能用九者惟聖人故能知進退存亡而不失其正正者貞也貞即元也守貞以為元元乃統天者聖人體此元以為終始乃守貞以為終始與天行健者共不已也此乾元所以統天統易而聖人所以體天體易也潛龍勿用下也七傳言其位位體也潛龍勿用陽氣潛藏七傳言六爻兼三才而兩之又於每一才中分隂陽體用也初三五陽位為體而其用則宜隂也二四六隂位為體而其用則宜陽也初潛而勿用三之惕若厲五之與天地合德皆用隂也德固陽而靜存於內則隂也二之見君德四之誠釋疑皆陽也六則亢而反成隂不能得陽之用矣故悔悔而以隂濟陽陽乃得用矣用九則進退存亡隂陽調濟之道皆明明以為行體用咸備即聖人亦不過能明隂陽知體用而調濟於均平耳孔聖於首卦明之所以為諸卦例也春秋有例易亦有例例者一定不易之易即在變易交易之中也神而明之存乎其人雖學易者不敢遽期而引伸觸類極深研幾則可以馴漸以求得也或問曰子既以貞悔對繹六爻如二爻變以下何能悉繹乎曰悉乎哉問也余貞悔對繹者竊謂周公當日繫爻辭乃因動變於爻象觀玩有得方有是辭也朱子曰未有繫辭前古人皆於爻象中觀吉凶周公聖人觀吉凶更切故於變動中擬議而吉凶悔吝生焉所以貞悔互繹見公之辭一本於象數非以私意安排耳若夫二爻動以下不繹者二爻動重上爻三爻六爻動則重在卦矣四爻動又重之卦之下爻五爻動或全不動皆重在靜爻靜卦固無貞悔矣乾卦後雜説天用莫如龍地用莫如馬故乾用龍而坤用馬史記之説亦本於易者天下之物惟龍升天究之興雲致雨皆地氣也而自地上升則陽氣也龍能於此乘陽氣升天故為諸陽物中最靈異能變化而近乎天也所以乾卦逺取諸物而用龍也聖人立乾卦以象天天道至虛有乾卦而至虛者歸於至實有象者歸於有理有數者歸於有用故性情功用就乾言即所以言天之性情天之功用也不然天亦穆然高覆於上耳性情功用何從而測識之哉非畫卦繫辭天亦萬古蒼茫矣此所以為聖人位天地而裁成輔相又其餘事焉伏羲畫卦三畫皆奇由邵子橫圖觀之初一奇為少陽加一奇為正陽正陽即太陽也再加一奇為老陽三陽之數足為乾然已該乎震坎艮矣坤卦亦倣此然則巽坎兊已該之矣然必因而重之而其數始備何也三畫固亦三才之道也必重之為三才之道者三才又各有隂陽也六畫皆陽而乾始成始可擬議以象天也天以純陽為統統者貫之也貫者貫乎三才也初二二陽在地之下三四二陽在地之中五上二陽在地之上其卦象層層皆奇正象天之陽氣充周布塞六合皆滿不期其運而自運不期其不息而自不息矣故言天之數不得明者言陽而明言陽不易明者言氣而無不明矣試看六合之內無非氣之所塞即無非天不必高高在上逺望蒼蒼方為天也莊生之説以為非天之正色蓋南北東西上下互相觀望皆如此善哉其言天乎亦不過就其充周布塞之氣言天耳既是氣氣塞則通塞之至必通之極行之所以健故大象傳云云繫辭云在天成象在地成形是在天者有形而無質皆以氣為象而已日月衆星皆天之氣所結而辰則其運行之氣所充周布塞也在地亦無非天之氣也而一著地便有形有質矣象之在天為形之象形之在地為象之形皆氣以成形也在上者有天之道健也在下者有地之道順也道即理也朱子所謂氣以成形而理亦賦焉寧止人之生為然乎天地人之祖也自祖宗以來如此又曰形而上者謂之道形而下者謂之器是上下形道皆可以形言之言形固形也言道非形也故以器言則天地皆一器而自有器乎此器者則道也易所以作者亦以器明乎天地之道也故繫辭又云一隂一陽之謂道隂陽仍器也而一隂一陽不測則道也天以象垂故大象傳曰天行健地以形成故大象傳曰地𫝑坤𫝑則形而有質而高下陵谷險夷廣袤之各異矣若天行則一望清穆何從測其逺近寬狹乎厯家言日月衆星皆有高下且西洋法謂五星之大皆大於地日之大於地十餘倍雖無可考然試於夜間仰觀天星大小高下果非齊而一埒也因思自地之上幾何積高而至於天至於天而又大有高下矣其極高者為何等也自是而轉思乎地之下天必亦如是矣以若大之地而懸於天之中上下四方非大氣以充塞周布下何以舉而不墮四方何以塞而不移則天之為天一氣之為又何疑乎就地以言天是因可見以求不可見之一也再者日月星辰中庸謂之繫焉繫於何所亦不過如地俱為天之氣所充塞周布於日月衆星之上下四旁不致於升墮遊移焉而已矣此又因日月衆星之可見以求不可見者之一也至於日月星辰經緯順逆運行各有進退遲速伏見者天之大氣固率衆星而左旋矣其中日月五星皆氣結之大者也結之既大亦各具一氣矣有氣存而各結自有氣動而各行乃遲疾伏見進退之所以不同也又為因其各行之度次可見以求其不可見之一也以此三説求天則天之為氣以成象似為得矣此乾之六爻皆陽而覆乎地上貫乎地中載乎地下以成三才之數之理也夫再觀天之上有星有氣有河漢聚散大小皆氣也是又因星氣河漢之可見而求天之不可見之一也即有變異如五色之氣如長短之彗如日月衆星之忽方忽尖生耳生芒亦皆氣也其禨祥禍福兆之有數應之有理仍是氣成而理賦焉耳坤下坤上坤與乾錯而配乾生八卦更生六十四卦其實統於乾故以坤次乾為易之藴且為易之門焉坤坤之卦畫自一奇中生一偶與一奇配合以生四生八是以積纍而成三畫之偶純隂之體象以配純陽之體象惟天純陽惟地純隂惟地之純隂足以配天之純陽故以純隂之卦象地名之曰坤雖統於乾而配乾如妻之統於夫而配夫遂生六子成八卦乾坤父母之體象立合六子而天地氣化之體用備矣皆由一奇一偶相摩而成如前乾卦所明合於邵子之圖説也因而重為六十四以備萬物萬事之體象又自八卦相蕩而成於乾卦亦明之如程傳所言也是以乾坤二卦之體象立而易已立其體矣為六子為六十四卦皆在乾坤所緼又皆自乾坤之門中出也此坤之配乾如地之配天次乾而列於經首也或謂殷易首坤然地先於天何象義乎恐未必然即或有據亦不如周易首乾次坤為得天地隂陽理氣之正也其卦積三偶畫為八經卦之坤先天位置於北與天相對而相錯對者配也錯者交也雖云乾南坤北相對錯其實天包地外地懸天中地之上下四方皆天也皆天氣之充塞故地能懸於中而萬古不移也蓋地之氣皆天之氣地之形體之中皆天氣所貫如坤卦六偶爻中之虛處皆天之陽氣也上下四旁無形無象皆天之陽氣包羅也是以言地者皆言地懸天中此其象義也素問黃帝問於岐伯曰地有憑乎答曰天氣舉之朱子注離騷天問曰天周地外非沓乎地之上也皆足以證矣先天八卦位置於北象隂之極以配天之陽位也然隂極之位陽生於此矣對而交則生生則不能不行也後天八卦位置之於西南以坤統三女卦於西南也與乾位置於西北統三陽男卦於是亦相配交錯而更生萬物也對則配錯則交生則行行亦由於對配也此先後天八卦同揆之象義也坤所以位西南致養萬物而居三隂之中位也乾在西北兑隂之盡坎陽之生中隂陽而置其位所以為統天者統隂陽之終始也坎之陽生生於乾之戰也純隂之中有乾陽在隂亦順承乎陽而已雖戰如敵國其實順承如臣妾也亦以配為戰以順承為統均如妻之於夫以統妻為配夫也天地如此理氣聖人作易以立象明義焉坤之為隂之極而柔之至以統諸隂而順承乎天即以配天轉生六子萬物之理氣不大明乎坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖辭曰坤元亨坤順也順乎健也天行健天之氣化運行至健坤即以天之氣化為氣化順之而行故至順而亨此所以同乎天之元亨也此地道也乾言利貞而坤言牝馬之貞何也乾之元亨有剛健中正純粹以精之德資始統天自能元亨也坤則不能統天但順承天不能資始但順承天之資始以資生耳其元亨即乾之元亨也其利貞則為坤之利牝馬之貞矣牝馬能資生者其性隂柔而能順承乎牡馬者也利於如此之貞則元亨亦能同於天也此是説坤順德順承乎乾健以象地之配天也君子觀乎卦辭知攸往之利叶利牝馬之貞則其德亦叶於坤而元亨亦應其占矣乾之德天也惟聖人可則之坤之德地也惟君子能體之而其餘占者德遜君子斯為常人其叶不叶又當别論矣不叶者占此則欲居先而必致迷惑叶者占此則甘處後而乃有得益非甘後也後者地道也必後以合地之順道乃主乎利貞不主乎元亨也元亨天主之以自然為利貞利貞地主之隨乎天以為元亨也不言主利貞而言主利者地以順道主利亦自然得貞不同於人有私也叶者以隂柔之德素位而行居西南之坤位而得朋不叶者以隂柔之德冒進於陽居東北之艮位而喪朋朋者以隂柔之氣行隂柔之方以順為正者也是皆主利之道也乾統天無往不利坤則有利可主必主利有專方矣乾大坤小於此亦可見矣此又為占此卦之常人前用也西南坤也東北艮也坤與艮俱土而分隂陽坤則順也以後為先方能行也艮則止也以行庭不見其人為能止也在坤方欲順承天行之健而與之同不息焉一涉於止則不能順承乎天而息矣蓋坤三畫皆隂故能順艮有一陽在上止隂斯不能順矣所以言喪朋也凡隂陽發聚皆貴中正均平而坤獨勉其得朋者若為抑扶之説則此辭聖人亦不立矣蓋此隂德非僉人私計所可擬議也即坤之厚德也配天資生萬物者也君子體之在下則直方大在上則黃裳以此上下相應得朋以共成厚德載物之功寧可以扶抑之説拘囿之乎故又曰安貞斯吉此方大而黃裳為義象者正是貞德安於此貞德即是安處乎西南柔順之本位以敦乎厚德也故易又曰安土敦乎仁故能愛於厚德載物可互相發明矣西南三隂盛地也故曰得朋至東北艮位二陽已足三陽已盛隂類處非其地遇非其羣故曰喪朋然地道順天運於不息未嘗不返乎西南地之氣化順承天也而人事叶之斯吉矣彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆彖傳釋卦名曰至哉坤元乾無外故曰大坤有極故曰至資生者即以乾之資始者資生也故曰順承乎天順承乎統天者也統天者貫坤地之上下四旁無非此乾元所貫坤元所至皆乾元所貫耳故天地合德而生萬物天覆於上地載於下生物之無疆即天德也坤德之合乾而以為無疆也在坤言之則云合天之德然言無疆正配天之不息矣此地德之元也中庸言不息歸之於誠易言不息歸之於元名異實同也由元言之則天地亦一物而由天言之地又為天中之一物由萬物言之又為天之下地之上之品物天之資始者地以之為資生資始者不可見見其資生者而已資生者地之元德含𢎞者所存者深光大者所發者盛俱歸之厚德而已然此厚德亦不可見惟品物咸亨其含𢎞光大者斯可共覩矣此地德之亨也然皆以乾之元亨為元亨也而已矣至於利貞乾以剛健中正純粹以精之德自然無在不利而皆貞坤則以柔順為貞而利之矣程子謂貞正朱子謂不足以盡貞之義貞而固方盡之然正而固不如正而中也中無定則貞亦無定有貞而固不中者矣必中而正方可謂之貞也故在乾則中無不正在坤則以柔順為中而主利以為貞利者義之和也和者中之發也所以以和順為利貞也此牝馬之性合於地道而與之為類一物性之微而中在是利在是貞亦在是矣行地無疆地道之行利於柔順利牝馬之貞亦利於此則無疆得孚於地矣此坤之利貞也君子體之而攸往又何所不可及乎在乾分言元亨利貞以明聖人體元亨體利貞之道在坤則惟君子有攸往一語蓋言君子體坤主乎利貞而已即坤之元亨亦由於以柔順為貞而利之也君子亦惟柔順其德合於牝馬之貞而利之則與地道同行於無疆何不元亨之有所以不必言元亨惟利貞而無不元亨焉常人占此彖傳亦為分而釋之乃以先後作兩件事令擇而行以明失道得常在占者慎始克終非先迷而失道然後順而得常也惟能順坤道而必後焉此利牝馬之貞也得坤之常道矣如不順坤之道而欲先焉此不以牝馬之貞為利矣失坤之常道矣故必主利以為貞而能先不居後甘處為得攸往常道也得常而安之於西南則得柔順之類而能行地無疆是為得朋失道而不安西南更之東北則失柔順之類而不能行地無疆是為喪朋傳又釋之以乃終有慶者東北為艮西南為坤愈明也終者即艮之成終而成始也萬物戰乎乾勞乎坎成言乎艮由此而帝復出乎震矣地道之終而復始在於東北艮位彖傳與彖辭各為一義亦未嘗非申言一義耳如此言之何必反之西南乎然亦未有不反之西南者也齊乎巽相見乎離又致役乎坤矣則不惟西南為安吉即東北亦安吉也何也惟在柔順利貞由西南而東北更由東北而反西南何非安貞何非吉地地道原是順承天周流運轉無不隨天東西南北隨地有中因時而行則應乎地之道矣應地之道隨地得中乃中正以為貞即主乎利以為貞耳占者能叶亦將成君子之德而攸往與為無疆焉坤之主利即乾之主元也乾陽以元亨為主故主元以得亨坤隂利貞為主而主利者利於貞也然亦順承乎天之利貞以為利貞也乾文言曰利者義之和也義之至和即利也以此為主則仍是以義為利而主之也然乾不言主元而坤獨繫之以主利者何也乾之德資始統天渾淪包括不必言主原有元為主也坤之德資生順承天必言主方有所順承也主之所利即主之以利牝馬之貞也不言主元亨者坤隂即乾之利貞也以順承乎天之元亨為元亨乾主之而坤承之耳惟利貞則乾無所主而自然利貞坤必有主牝馬之貞方不至先迷而東北喪朋然後能後得而西南得朋也此所以坤必言主利以異乎乾也知坤即乾之利貞者鮮矣象曰地𫝑坤君子以厚德載物大象傳於乾言行於坤言𫝑𫝑者雖有形不動而其氣亦隨天為行於不已也君子體之以厚德載物即彖傳云坤厚載物也在坤地道則言𫝑厚君子體之則成自已之厚德坤以地之厚載物者𫝑也君子以德之厚載物者學也德非一日而厚必有以培其基載豈一物不遺而德必以此廣其量此君子法地柔順安貞之道也利貞之義愚謂利即知者利仁貞即仁者安仁者本於論語論語於此未嘗將仁知分高下不過就仁知二種人明其心於仁於知是如此如看成利仁為勉強安仁為自然固有此義然非聖人指點示人之本意故於易云利貞引用之見占者於彖辭元亨利貞四字自應看成兩句説話不必分為四者矣就四德説方利是利貞是貞各有義四德乃孔聖人推廣易之理也然利仁亦歸於安仁即謂有高下淺深也亦可看聖賢道理須大活潑此所以正而中方謂之貞也坤之六爻如諸卦列於彖象傳之後又將爻象傳即附於爻後皆後儒取其尋省易了而為編次也可以按其編次明其義象者不必求異今合古也故亦按諸卦之編而明其動變焉按魏高貴鄉公問於博士淳于俊曰今彖象不連經文而注連之何也對曰鄭康成合彖象於內者欲使學者尋省易了耳初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也初六變為復之初六在復初以陽變隂為坤繫以不逺復無祗悔元吉陽原自純隂中生出坎中之陽雖生於子半而乾陽原立體於純隂中以統天而鎮隂之終發陽之始者也所以謂之不逺復人事言之無可悔者如私欲之起於隂而陽之性理已復而克之所以元吉至天地之氣化則反復其道耳出入無疾亦無悔陽生復隂生姤俱元吉之道也隂陽之終始無盡元吉即元亨耳在本爻以隂變陽為復繫以履霜堅氷至見霜而警氷固有此義但何不言吉凶乎初六隂生於下變復為陽其實就本爻義象則姤也伏羲畫卦時始此一偶非姤乎姤隂始生馴至於三隂過而霜結六隂盛而氷堅皆此一隂為之權輿也又見隂生必漸盛然變復則陽可生因互為根而生於不已所以消長隨化出入無疾朋來無咎也即為剝為夬人事多乖天之氣化原為自然之消長何吉何凶乎知此則隂陽有調濟均平之道無扶陽抑隂之説也聖人於乾坤二卦爻辭明之何弗遵乎象傳曰馴致其道至堅氷也則更將此氣化一隂一陽迭為屈伸往來者歸之於道矣道者一隂一陽之謂也隂生而馴至於霜結氷堅隂之迅長本如是也君子體之人事或有防隂剝陽之義而天地之氣化乃以無心馴至為道也其言隂陽消長純是自然何其明切乎此爻乃明隂陽自然之氣化而人事亦當致謹於姤復矣六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也六二變為師之九二在師二以陽變隂為坤繫以在師中吉無咎王三錫命師以一陽主乎五隂在坎隂中得乎陽剛中正之道故曰在師中吉中之義兼師中而得中道言也必得中道在師中乃旡咎王三錫命六五正應必寵錫嘉命矣此因陽變隂得柔順中正之道以合坤之臣道也故能合於君德之陽道耳在本爻以隂變陽為師繫以直方大不習無不利隂變陽能濟陽剛中正以柔順中正也直者易直也方者貞正也大者至直為體至方為用故至大也方者地德也直者主以天德也大者合天地之德以體之故推其用於剛柔得中正至大而莫京也豈外鑠者哉我固有之也率性而天地之德在焉有體而用行焉何庸習而後利乎象傳曰六二之動直以方也言方本於直也言隂用之方本於陽體之直也惟陽之動也直是以陽之用為隂之體矣不習無不利地道光也本此直而方者以為體用則推用於至大地道發揮其光著於功業矣此地道之利貞而二能主之者也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也六三變為謙之九三在謙三以陽變隂為坤繫以勞謙君子有終吉順變止止而安焉謙之勞而不自以為勞者也故有終吉本爻以隂變陽為謙隂柔在內變陽而成艮體以一陽而包二隂在內所以象之以含章章文章也隂陽剛柔交錯而成文章也含於內以陽主隂也此亦以貞為可而主之者也所以從王事而不受成功之賞自有吉終之道陽以包隂隂仍主利隂陽相濟而成章美於內德立於中故功成於外且不居焉所以終於承順得臣道而能從王事有餘也象傳曰含章可貞以時發也中有主而時措不窮者皆咸宜也或從王事至於無成有終其知豈不光大乎勝於居功立名之小知昏暗多矣何以言光大艮之象義光明也三必含章於內故知明處當能以柔而順剛光大何如乎此爻亦得地道之利貞以為主者然較之二有安勉之分耳以上內卦坤三爻以初言氣化寓人事以二言柔順中正為主而得陽剛中正為體故不習而無不利三則柔順雖不中正以能變陽用陽包隂在內含美無成有終合於地道也內坤三隂以內卦得利貞柔順之正故三爻皆吉占然二爻之隂用陽體得乎中正洵為內卦之主爻乎六四括囊無咎無譽象曰括囊無咎慎不害也六四變為豫之九四在豫四以陽變隂為坤繫以由豫大有得勿疑朋盍簪震變順動而皆順豫之所以合內外人已而咸豫也故曰由豫由之而豫則其得天人之至和多矣人之同類有不盍簪而聚乎豫四以一陽豫羣隂又變順以柔道聚豫故有大有得之慶也在本爻以隂變陽為豫何以括囊期於無咎譽乎文言孔聖言之矣天地變化草木蕃天地閉賢人隱為四之時位言之也四處外卦之初七月以後三隂盛長四隂至而霜結六隂盛而氷堅於初言始於四言變也三隂未足以前隂氣行於陽氣之餘天地方有由變而化之機四隂以後隂氣自行陽氣退避霜結氷堅草木蕃者至此凋落天地將閉閉雖復而自開然賢人當此時知隂長陽消可不避而辭榮却祿以高尚其志乎此四之所以括囊以期無咎譽因氣化以致戒於人事也象傳曰慎不害也以慎其言謹其行即退避之要旨也隂之戾氣豈能及而害陽乎此爻為外卦之初故又言氣化而人事亦存於內焉六五黃裳元吉象曰黃裳元吉文在中也六五變為比之九五在比五以陽變隂為坤繫之以顯比王用三驅失前禽邑人不誡吉以陽變隂以險變順人自來比故示以顯為比無心之孚不必以有心求比出於不光顯之私比也象以狩事王用三驅失前禽而不誡邑人此聽其誠孚自比之最顯然者吉何如之在本爻以隂變陽為比又貴以陽體隂矣黃者中色且有陽之德故有黃中之色外著也用之於裳者合地道也五君位而以地道之中正自處乃深得柔順中正之道順承乎天如臣之順君也君之於天猶臣之於君君以順天者合天德行天道何嘗非天哉故曰元吉此坤之元所以即為之乾元也吉者亨也元吉即乾之元亨也何非主乎坤之利貞而即得乾之元吉乎此爻主乎外卦且主乎坤卦合其體用故體用俱合乾而亦同於飛龍之大人足為羣隂之利見也象傳曰黃裳元吉文在中也文者以柔濟剛剛柔交錯成文在中如地配天相對相錯而成其順天之行也確哉孔聖之言坤德乎上六龍戰于野其血玄黃象曰龍戰于野其道窮也上六變為剝之上九在剝上以陽變隂為坤繫以碩果不食君子得輿小人剝廬一陽居羣隂之上隂方長而剝之亦將變隂然碩果中之陽自存也變隂者與時偕行而碩果不食陽方生於隂中隂何從而剝之乎所以君子處此則得輿隂中之陽能生而復也羣隂方奉之如車輿之載貴者也亦剝卦五爻貫魚以宮人寵之象義也小人處此則與隂戰而剝廬必矣可見在剝中與隂戰者不足有君子之德不能如泰二之朋亡尚於中行豈君子乎在本爻以隂變陽為剝乃於隂中自居陽德者也在夬尚云居德則忌於剝而坤可居陽德之名以受剝乎故與隂戰於野至於兩敗兩傷而元黃之血俱見也乾之上爻亢者純陽而亢隂也坤之上爻戰者一陽而戰隂也為亢為戰皆有自居其德之勢故亢在乾德剛健不過有悔尚可救也坤則以柔順為德也戰者失柔順之道故象傳謂之道窮也道窮多以為陽窮不知正坤柔順之道不能用而自窮所以致於戰而血出也用六利永貞象曰用六永貞以大終也用六為坤卦六爻皆變反為純陽立也然凡隂爻變動皆本乎此象義繫之曰永貞即主利為貞之象義象傳曰用六永貞以大終也隂小而陽大永貞者貞即元也元亨陽而利貞隂永貞而復元亨則坤之利貞得乎乾元亨之道也蓋貞下又起元矣非大終乎以大終合乎乾足以配乎天也天以一陽統天乾以一陽統易坤以順承乎乾元者順承乎天坤之元即乾之元地之氣無非天氣之所貫也必合乎天德所以配天而同天行於不已也以上外卦坤三爻以六五主通卦外卦隂盛而老將變陽矣於四明隂盛之變於五主乎坤明隂用必體乎陽於上則隂極而戰陽必如五之柔順中正而合德於乾方不失隂柔承順之道也至於戰則陽固為亢隂亦為亢亢者不得中正之道過於盛也故乾謂之亢陽坤亦可謂之亢隂耳必用六永貞貞下有元隂中有陽乃合中正之道也內經云亢則害承乃制六氣皆有亢愚説本此文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行乾有文言坤亦有文言為首二卦申明乾坤二卦之元亨利貞也孔聖為作之聖述之明俱不必論矣左氏之文掞藻摛華雜引詩書未必穆薑之語不出於左氏之文飾也既列於聖傳十翼則亦同於聖傳矣文言曰坤至柔而動也剛坤德雖至柔然資生順承之德至柔者其體而至剛者其用故地氣動而萬物莫不生焉天道資始以剛為體而其動反柔坤道反是者何也天地無二氣也資始者靜剛動柔資生者靜柔動剛資始之動柔即地道靜柔之體也其動剛之用乃所以資生者也剛柔不過屈伸往來一氣以無終始而已矣然則至哉坤之元何非大哉乾之元乎乾坤又豈有二元乎既無二元所以亨則俱亨也特分卦言之則各繫一元亨其實一元亨而已矣因其體而明其用又必因其用而明其德至方者剛之所以為剛也德者動之所以善夫動也此言坤之元亨也由於坤之利貞也至於坤之德利牝馬之貞則惟以後為主而已能後而不爭先乃坤之常德也所以謂之有常也主乎利即主乎義也此言坤之利貞也坤之德如此所以含萬物之理於中而發萬化之光於外有此元必有此亨然何非本於牝馬之貞而得其坤道乎於是知坤道無他順而已矣至順所以能承乎天之至健而時行亦同於健行之不已也時行者有止在內不同於乾之行健於無止也以隂德有止之道也然時止時行動靜不失時而行即同於天行之健無時不行也此以不盡合為合不盡順為順如臣之匡君婦之相夫也地之配天亦如是臣道也婦道也無成代終此誠能以順承天者乎坤道其順乎二句是明坤德而兼君子及占者説使之共明此坤德而期於叶占也與乾之君子行此四德者二句同積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所繇來者漸矣繇辨之不早辨也易曰履霜堅氷至蓋言順也積善之家六傳亦孔聖之爻象傳擬議以成變化者也於乾坤之六爻俱詳為擬議所以該六十四卦三百八十四爻之變化令學者各為擬議也故其所取象義與爻辭固不同即與象傳亦多不同也如此則不可就文釋義是在學易者各就其擬議變化以自為擬議自明變化可矣即朱子云後天之學可以各明其意見之説也初爻擬議之曰隂之生也在天地之氣化為出入無疾在人事云善惡則為誠邪存間而慶殃判然積之大而久則慶殃遲而巨積之小而暫則慶殃速而微亦惟於隂陽二氣中明其順逆從違之理而已至於臣弒君子弒父為殃大而積必久豈一朝一夕之故乎由來必漸亦必君臣父子間兩失其道者也何也慶殃之成也顯善惡之生也隱辨之貴精尤貴思患預防之早不能辨則殃及辨不早辨已莫救故易於履霜即言堅氷且至霜為氷之漸積順其𫝑而往焉堅氷已結天地沍寒誰能使春風生於寒谷乎舊注謂順為慎似與馴致其道傳辭未合直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也二爻擬議之曰直者何正是也方者何義是也內正則外直義定則行方然直方又有所本也君子敬以直內則不求正而自正義以方外不求和而得和內主敬外協義所謂直也方也皆至詳慎委曲而流行通貫者也是以敬義立於已而天下祗覺其易知易從自然可久可大德必有鄰逺近親疏無不感應何孤哉故易之云直方有體用非拘謹執固乃甚大而該物我身世以為德業也是以生平所未習者皆推行之而無不利蓋內敬則性之理存外義則事物之理通君子固自不疑其所行天下亦不疑君子之所行內忠外信隂柔中正之至德也然何非一敬以為主以隂元而順承乎乾元者乎隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也三爻擬議之曰隂者柔靜貞順以為美德者也含之於內立其靜體則陽為體而隂為用也論存誠本立體於隂然誠既存則為陽德以隂含陽體立於剛健致乎柔順之用地道而統以天道也以之自治其心身固形踐性盡矣或從王事功可立事可幹而不敢居功首事也功必有歸事必有主我任其勞而成本於上此正地道而合於妻之從夫臣之從君者也蓋地道生成萬物無不順承乎天是無成也然其施自天而資始非地則萬物不能生成於天之下地之上矣萬物雖中處而去天逺去地近無不託根受氣於地是天始萬物而地代天以終萬物也是以含陽之隂德無成而無不成也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也四爻擬議之曰隂之盛而極也則生之極而必殺矣成之極而必毁矣非不仁也義正以成其仁育殺以為生毁以為成也此亦氣化之出入無疾故變化有常也而君子用易合時先萬物而自正其性命草木方蕃生長已極然天地之氣已收而將閉賢人不及世亂即知不可榮祿而隱遁自全惟明隂陽消長之象義知能之也易曰括囊無咎無譽不惟道不行而且言亦不可輕發也此謹之至而合乎收藏秋冬之氣化者也無咎無譽之權俱自君子自操耳君子黃中通理正位居體美在其中而暢於四支發於事業美之至也五爻擬議之曰隂之道地道也黃帝素問曰五行之土生於黅天之氣故其色黃及成五行而土居中以配天故坤道為地為黃中然土塊然一大物耳抑知土至實而至虛上下四方皆天氣固矣地中無處非天氣貫之一大物中大而分為九野小而結乎一撮天氣所出入地氣即應之為出入故實中有虛氣中有理如人心之性立誠為陽則虛者實神發於隂又至虛也君子以此黃中隂德立虛中之體即以此致生成萬物之用無不法坤之德而以為德也故位則正而居中體則貞於至靜黃中之美在中而近著於身則暢於四支逺徵於物則發為事業隂德固地道臣道妻道也而其為德何嘗非君德乎豈聖人之擬議乎隂忽為君忽為臣無定見哉不知黃中之德隂而含陽即河圖之以十配五也十為成數隂也而五為生數陽也地居中而配者天地之中皆天氣也以天氣為體而地氣順承乎天以為用故為美在其中者天德含於地德之中也是隂之德亦為君德何嘗非陽德乎知此則坤元何嘗非乾元也哉故曰美之至也氣之至極者惟天理之至極者亦惟天美德而言至非天德奚足擬議之乎大凡隂陽體用互根互生皆當以此擬議之則不執典要而可與言易矣隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃上爻擬議之曰隂德不可極如陽德不可亢也隂極則不順承乎陽反疑於陽疑者其氣太盛則逆氣逆則氣中之理亦晦晦則生疑疑則生嫌嫌則必爭爭則為戰氣化人事無二理氣也然周公之辭於隂盛之極疑隂與戰仍稱龍者嫌隂盛也天地之氣化雖隂至盛亦無無陽之時即隂極而剝然碩果在上未至剝盡為坤而復已在下故隂有戰陽之日必無無陽之日也所以仍稱龍以存陽陽本在亦不待扶陽者存之也至於隂極終是隂氣親上親下各有其類類聚羣分不外隂陽氣為陽類血為隂類公一稱血而隂之為類疑陽與戰就象以明義昭然矣復言玄黃者隂戰陽陽必應隂陽皆傷則天地之色雜見於血天之玄色本是氣地之黃色方是血但此時隂盛陽微天氣亦雜於地血之內故不言氣而言血之玄黃也然氣雖雜於血中血亦氣之所化天之玄自在氣必不沉沒於血中玄之色自在天必不掩閉於黃中故傳明之曰天玄而地黃上下尊卑定位固昭然而理氣亦正無紊亂矣隂之含陽則美之至隂之戰陽則傷陽而適以自傷聖人作易為君子小人兩謀之也惟欲調之得中和而已按此六爻固有位次然亦有相貫之理氣俱在象中求義方知孔聖擬議首兩卦十二爻以示人隨卦逐爻皆當於隂陽變化中求知能行習之人道也乾卦於擬議外有明爻之位者有明爻之時者又有明爻之兼三才而兩之為六者坤以下皆無以乾統易知乾卦六爻有位有時有兼三才而兩之義象則可推及於六十三卦故坤卦亦不復更立傳焉易者交易變易於無窮者也雖擬議其變化於無窮然實不易之理氣故以一乾統全易而足以備其義象也孔聖之傳雖云釋經然易之大成以集而天下後世開務成物之功能更確切矣學易者必因傳以明經且因傳之切於下學處求聖人之至精至變至神斯可以窮理盡性至命而無難矣文言言坤道之元亨利貞元亨亦由於利貞至於占者則必先言利貞而後可以元亨與乾之文言異義何也體坤之君子氣本隂柔皆是由憤悱勉強而成德者固不同於乾之大人也及至叶於坤之至順承天時行則亦無不同於聖人如六五所言美在其中暢四支發事業美之至者是也聖人可同且合天矣此二卦乃進德修業安勉難易聖人與君子分際合一之理也故於二卦之先明之乾坤立而易之體緼於內易之用自乾坤之門出焉所以為六十二卦之根所以為天地定位之始也大易通解卷一
