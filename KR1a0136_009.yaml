body:
  text: 大易通解卷九江常鎮道魏荔彤撰乾下兑上夬夬姤二卦相綜五陽一隂與剝復二卦相錯剝復陽少貴陽夬姤隂少貴隂然有難立論者宋儒偏於扶陽抑隂為説久矣夬則利于速夬也姤則不欲其姤也于此二卦言貴隂不大悖乎雖然如果夬而純乾不復姤天地之氣化人事之用人行政均如是也則扶抑之説誠莫易也試歷觀古今及詳察天地然乎否乎于此二卦言貴隂或亦有一得者乎天地無夬盡隂氣之時如剝之于陽也剝未盡而陽已復于下如夬未盡而隂已姤于下也非此則無天地矣人世之君子小人亦俱為天地之氣化所生剝之夬之起于人心之私小人固不足罪豈君子亦不明天道乎是故聖人作易于夬姤之隂亦加獲惜其彖辭彖象傳固在焉虛心平氣從陽隂不可偏廢不能偏廢起見細玩之自得夬之為卦錯乎剝然實復之剛反而長至于夬而盛極也此時隂氣甚微存之以維陽也為隂謀者為陽裕養化機也為小人謀者為君子厚培公心也况復之彖辭文王言之矣出入無疾由剝而復雖有出入何疾于陽其為夬姤亦該于是言矣朋來無咎至于五陽朋來雖至盛亦不至于有咎是衰微而無疾充盛亦無咎乃隂陽自然之義也如以衰為疾自必因盛而得咎出于人心之私不可與天地同體用也故夬之陽盛而夬姤之隂生而姤出入亦無疾也朋來至盛為剝為夬亦無咎也特小人逞私害公有咎必矣乃君子至夬亦獲咎焉何必讀書明理學易寡過乎是同于小人之為也烏得為君子乎請試思之勿專責小人之好報復也天道好還何謂哉于夬卦多戒辭知聖人之貴隂也貴隂于夬姤此聖人之允執其中也乎夬姤二卦相綜根坤主隂用隂其所繼者上經五陽一隂成卦之同人大有也夬則繼同人焉同人以五陽聚盛思共夬隂故聖人于夬立卦繫辭貴隂而用隂所以見同人于宗之吝而明泰二之朋亡得尚于中行為美德也此正為君子謀者至矣上經五隂一陽卦六而以剝復結之上經五陽一隂卦四結以下隂之夬姤適配其數故以夬姤繼同人大有小畜履而成隂陽均平乃聖人作易用中之心也夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖辭曰夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬之時五陽盛長衆正盈朝無一事一言不可開誠布公皆在宫府朝廷宣揚也至于至誠相孚遂與志同道合之人相信以心相通以言然周而非比羣而非黨相與號召者誠孚心大公而言至正耳然君子之心內審或致君上之疑或動同列之忌豈不有厲乎此俱謂衆君子自秉其孚自盡其忠未嘗及于夬也而己有可危之機矣若其間有不與君子一心一德者未必即是小人君子固不為黨伐矣再或有忌君子之公忠形小人之姦私傾軋陷害乎君子原屬小人之常也君子亦如蹇之難平反身修德而已其能行于朝廷邦國者盡心竭力以行之不必以少有阻撓為憾如尚未也惟有先于可行之地審慎以施之又坦白而示之告自邑者由自近以及逺也因其職掌所得盡以及于庶務之允釐也小人見君子廓然大公無我且無必攻伐異己之見也能阻君子者必自悔不能阻君子者必自退矣此所不事辨是非成訟獄如敵國相爭兵連禍結龍戰血傷即戎不已也辭示之曰不利即戎惟君子乃能以大事小而樂天也知隂之必不可絶知小人之必不可盡皆天之命也樂天者保天下君子于小人亦同于王者之存心也如是而利有攸往必矣此利往亦自復來復之利有攸往剛長也剛長至夬乃復之往而得利者也更云利有攸往似天道之攸往有盡君子樂天以為攸往者無盡也彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也彖傳釋卦名義曰夬決也夫乾其靜也專其動也直五陽盛而遇事決于行其性也故剛之決柔義象如此但天地之氣化無心而成乾靜專而動直至陽盛之時未見其決于夬也故夬之為卦合兊乾而成乾為體以兊為用也陽至盛而澤愈多四五月之間雲行雨施品物咸亨之時也以澤之隂濟天之陽萬物方能長養不則亢旱大熱在夏令為大過矣所以天地于夬本健也乾元之出震者齊于巽相見于離至盛也而兊澤之悅萬物者先秋令己肇其端矣雖健體而悅為用雖為夬而其實至和欲存隂于不盡以為姤之來復以濟陽配天而資生萬物也天地之夬如此君子學易崇效卑法可不體會于斯乎故彖辭揚于王庭謂柔乘五剛之時或有在位之邪臣久行之敝政須共鳴國是于君所也非尚風節沽直名也君子以至誠相孚如此以相號召公言衆信之中且多疑忌而有厲矣然惟其操心之危慮患之深也所以其心其言愈昭然如青天白日君子固同志小人亦內服也蓋以共信無私者示光明之肺腑也故君子惟告自邑以盡其官守言責而已不與羣小爭勝也其間有得其官守言責合于義焉則留否則可以去矣何敢以利即戎為心以僨國事以取黨祻乎若以為陽盛可尚而尚之也此陽道之所以窮而頓消君子之所以危而不保其身也惟能法天地之盛陽健而悅夬而和者以處陽盛之時希乎聖人之有心無為即能希乎天道之無心成化矣一本於復之順而動者以為攸往焉剛長至于純陽得合于乾陽之終于無終也乾之統天者何有始終乎純陽為乾亦必有姤何以言無終乎不知姤者自姤復者自復而乾之元統姤復以始終豈有終哉惟聖人之道能則之賢人君子不能遽及亦惟存不為己甚之心守告自邑之約而不犯利即戎之戒耳樂則行之憂則違之何至于夬隂必快意夬小人必盡情而致有反復不可測之事乎此聖人之辭在扶陽為君子謀也而為隂柔小人謀者亦在于中且存隂以濟陽容小人以廣君子之量也象曰澤上于天夬君子以施祿及下居德則忌象傳曰澤上于天夬君子以施祿及下居德則忌文王之辭如此孔聖之傳猶宜繹之焉澤上于天不及下之象也試思君子之于物無論善惡偏全欲澤上而不下乎抑欲澤下于天而普遍以生養之乎于此可識天心之仁聖心之公矣君子體之澤必及物然朝廷之祿所以養賢也厚者首及有德而次及有功而次及有勞而次及有才有技至于才技未必盡君子也亦必均其君恩量器為使庶有才技之小人不至絶望于名利甘肆其貪詐與君子爭勝也至于德者君子自治于己之心也我有德而自修即自據之何害乎不知暗修而服膺乎德則是居其名而彰其德則非自以為忠直之君子人誰甘為姦佞之小人自以為吾君子而夬小人也小人寧不自以為君子而肯袖手受夬乎當陽盛時尚如此况陽不常盛隂姤即起司馬公正人也石工能知之而徽宗不知也黨人立碑蔡京未嘗不自以為君子夬小人也此德無定名而君子小人亦無定名居之誠至難也何也成德為小人所忌如道家言仙丹將成為神鬼諸魔所忌必百計以思壞之也德為吾心所固有居之尚為世不容况功名乎况貨利乎居于功名必奪而辱之居于貨利必殺而取之居于德必忌之此千古之人情也所以老子曰惟其不居是以不去也在聖賢之論非為不去而不居也然敦德于虛避人之忌亦隂德也所以夬卦用隂本于坤來彖傳象傳言之切矣初九壯于前趾往不勝為咎象曰不勝而往咎也初九變為大過之初六在大過之初以隂變陽為夬本末弱而本更宜培藉用白茅至柔而可以任重就大過言培隂以濟陽也在本爻以陽變隂為大過初陽己致謹于過矣初即復之初陽也至夬盛而夬隂猶當夬而用和况方壯于前趾而遽往以求勝勝亦為咎况不勝乎象傳曰不勝則不可往往而不勝所以致咎耳爻象之辭在夬貴隂故聖人俱示戒爭勝非謂往必求勝勝斯無咎如世扶抑之論也故此爻貞悔皆以用隂為貴相通九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也九二變革之六二在革二以隂變陽為夬當可革之時猶必已日而革之然後征吉無咎知非可率意迅行以為革也在本爻以陽變隂為革剛健兼文明方能明慎于夬故惕于中形于言如莫夜而有戎者以此謹慎小心防隂之害也惟非欲致夬于隂也然後可進同衆陽于應夬時自勿恤其夬矣如此敬慎于中有過于肆夬而不出于和者乎象傳曰有戎勿恤得中道也言二有中正之德則夬得其和而無過不及之弊也得中而有戎自消故曰勿恤也是象傳之訓有戎無恤原謂自修其德則戎可屏不必恤而與之爭勝也總為不得已而方用夬如用兵刑然皆本于大公至正之中道方可此有戎勿恤即卦辭之不利即戎也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也九三變為兊之六三在兊三以隂變陽為夬繫以來兊處內卦之終來外卦之兑似以私悅邀人致人多以私干求悅者故凶本爻以陽變隂為兑處內健之極壯之色見于面是粗浮淺露以為夬者也故凶然君子之致夬也體乎此爻之象未嘗不當夬而夬也惟獨行其公正之心不必定結三陽以為黨所以成乎君子之夬夬也此泰二之朋亡得尚于中行也以健為夬者變兑而夬以和如遇雨之沾濡而不致于失和壯夬焉可也雖有愠于中若不得快意者乃無咎之道也夬隂之心雖存而不失于和中和而外未有不和者豈有壯于頄之凶乎象傳曰君子夬夬終無咎也蓋獨行而朋亡遇雨而得和若濡而非濡于隂私也有愠乃不為過壯也此君子之夬也彼壯于頄亦未嘗奉教于君子耳愚説與本義相左蓋亦本于爻辭試自壯于頄靜玩之言凶而復言無咎則君子夬夬不同于壯頄之人甚明也遇雨而云若濡其為兑澤無疑矣見于彖傳以為夬而和本義乃謂若濡有愠為君子之必用夬也吾不敢從此爻貞悔其義亦相通兊三爻來兊凶戒其來私黨也本卦三陽爻在內卦進以夬隂而示以獨行則雖公正之黨亦無取于邀結焉明矣以上內卦三爻乾體也以二爻中正為得夬之正初則在下壯趾往咎以其變巽而冒進也三必君子方能朋亡獨行濟陽得遇雨之隂可獲無咎焉以其變兊也二則變離明能以文明濟剛健矣所以為內卦主爻也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九四變需之六四在需之四以隂變陽為夬隂柔變陽剛需于血之隂而出自穴歸于陽之類在需則應需雖需于血亦不繫凶咎焉惟其能需所以能出也在本爻以陽變隂為需需不能隨衆陽壯往故繫之以臀無膚其行次且遲遲其夬也必也如牽羊然則悔亡矣羊之為物牽之不遽前言當慎于夬也聞言不信既不能速決必至人言雖有人言亦不必信自致其夬而和焉斯可矣象傳曰其行次且者位不當也四處上卦之下爻以兊為體更當夬而和矣然變險故遲疑不進惟四之位乾兊交際故不能一其心志所以謂之不當焉又曰聞言不信聰不明也雖聰具于心而明不恃目不尚察察之明以孚為心之聰也或謂四在內卦與上隂親近不能致決故傳言其不明邪正之義但玩牽羊悔亡之辭似必如牽羊乃悔亡欲其用羊之柔不遽進也辭既如此體之則聞言不信聰不明似難以不明立言矣存之以待能解經者九五莧陸夬夬中行無咎象曰中行無咎中未光也九五變為大壯之六五在大壯之五以隂變陽為夬擊以喪羊于易無悔兼夬義不用羊之多觸喪之乃無悔在大壯陽壯貴于喪羊用罔也在本爻以陽變隂為大壯象之以莧之在陸夬之又夬然莧終無不生之理雖五乘陽盛當位行權何難盡夬之但非健而悅決而和之道也惟中行焉可以夬者夬不可夬者不夬無成心也惟得乎大中至正之道以合乎彖傳所言則無咎也象傳曰中行無咎中未光也本義有取于程傳但中未光云五有私比似未合如有私比可謂之中行乎特以隂不能盡夬小人不能盡去不得不酌乎勿過勿不及之中而去其太甚然必又存不為己甚之念所以其心思健以為夬而又多所顧慮既要健為夬又須夬而和未免有詳慎遲回不能為徑情直遂之事矣以此言中未光推五隱衷有不容自己之心不得不出于中行者耳若論陽盛而且當位豈不欲盡夬及觀于天地察于人事然後知意見不可逞隂陽宜調劑也此所以傳言未光大不同于壯頄之淺陋也明矣彖傳曰其危乃光也因夬小人必危危而夬得其道則有光矣今五夬隂如莧陸不能盡夬又不可盡夬故終日危慮難得有光惟君子之心敬慎而中道自持所以慮患防危亦不能免耳五陽夬隂爻象之訓俱以健而説夬而和為主無盡致其夬之辭乃自來解經者好自託為君子持扶陽抑隂之説盡失聖人本意以致後之學易者不明夬理原貴無夬而自化乃于夬必求盡焉夬原不能盡夬若違天求夬先己不能獨行繼又不能得中以致禍黨屢成喪身亡國聖意未達其微有過終不能寡所以必辨正之而無取于依違以為信古也信古當信作易之聖人乃為好古耳上六無號終有凶象曰無號之凶終不可長也上六變為純乾在乾之上爻以陽變隂為夬然已成亢龍矣陽不可過有悔者隂不可盡必將悔而復生為姤也在本爻以隂變陽即為純乾以一隂柔居上位當夬之時寧不朋亡無號而有凶乎知之者審時觀己可以早退矣象傳曰無號之凶終不可長也謂當夬時而一隂獨存于上豈能久長乎雖然姤又不承接而來乎小人知此則宜早退君子知此終不可長者不可謂獨在隂也無何而姤至陽能終盛乎是夬之為夬不如泰之內君子外小人為得天地交而萬物通之道也聖人明隂陽均平之義期于調劑得中屢言尚中行于君子矣願天下後世之為君子者法泰而不必法夬也乃君子之幸也豈為小人謀乎以上外卦三爻兊悅之體德也然在夬則兊上一隂為衆陽所夬似不可謂之主卦但聖人畫卦非此之謂應主隂者隂仍為主如夬之外卦上爻仍外卦之主爻也雖繫辭有凶變純陽則姤後生亦可主外卦以言隂之夬姤如陽之剝復焉四五兩陽爻雖不可謂之附于隂然四則其行次且牽羊悔亡五則中行無咎何嘗非用隂濟陽乎五之中行似可以德位主通卦但上爻一隂乃卦之所以成夬又因之而成姤謂之主外卦可也至于通卦主爻則以二爻得中道者為貴也得中者得健而説夬而和之道如彖傳所言也巽下乾上姤姤與夬綜夬繼同人姤繼大有大有以一隂有衆陽隂富有之義象本乎地也故根坤用隂以繼乎大有而成姤也姤雖一隂始生于下而駸長之勢方興馴致三隂坤令萬物致養五隂兊令萬物告成隂道之富有為何如故傳云富有之謂大業業大于藏用也藏用者隂也而為顯仁之體也此在坤順承天以為資生之始者也于姤明之者坤者隂之終姤者隂之始始終明而隂之成物為用立陽之體俱明矣可謂隂為不用女槩勿取而獨用陽乎姤本繼乎大有却似由姤而大有者蓋大有者隂之盛姤其微也由姤以言大有乃由體以推用也知此者可以大有繼姤亦可以姤繼大有為無終始之象義也即于坤亦然即乾復亦然方為易之通論也夬盡姤生兩卦亦相綜隂少貴隂根于坤焉然夬卦貴隂已難質其説于世儒矣姤卦復貴隂更何可通耶不知天地之氣化盛者已過微者即來雖欲不貴之而不能若必執扶陽抑隂之説便是無交易變易矣故姤之一隂初生聖人養之同于復之一陽生也試觀象傳復則至日閉關后不省方安靜以養微陽至于姤之象傳曰后以施命告四方乃宣恩布惠之命遍告宇內也如此發政施仁有為動作似非養隂之道抑知發揮陽令正所以養隂乎陽為仁主施隂為義主藏施無盡而藏有制仁心仁政發之自上者有無己之心而家給人足受之自下者有各定之分如天之資始一始而無不始而地之生物則自春至夏各有時自南至北各有方此萬物所以于夏至之後一隂初生生長之氣方悉臻其極也后以廣大為施者散乎陽不使亢正所以濟乎隂不致于戰也上之逮下之膏澤大沛則三夏之時必無愆陽伏隂為害農事矣萬物可以致養于坤成説于兊矣聖人以聖德行王政施陽養隂知比乃謂姤不必言貴隂恐非聖人立卦之旨也然則彖辭何為戒以女壯勿用娶女哉請釋文王繫辭之意姤女壯勿用取女彖辭曰女壯勿用取女其意謂女壯而後勿用取也已壯之隂老隂也不宜室家取之不能生育如士夫得其老婦大過五爻是也乘隂未壯之時相遇而為婚姤人倫之首也如初隂即戒槩勿取女關雎之詩可以不詠矣在詩則言好逑在易則言勿取豈太王好色百姓同之之家法乎且女壯之時取之有隂盛剝陽之虞女弱之時取之習于姑嫜之教相乎德業之成皆為陽謀即當愛惜乎隂者至矣不然男女居室人之大倫于婚姤之卦開言即禁止之有此有男無女有陽無隂之天道乎無此天道聖人希天者也即無此聖訓也試觀彖傳愈明老少之義况不在齒隂柔順則貞靜隂乖厲則躁妄以此辨老少耳彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉彖傳釋卦名義曰姤遇也不期而遇為賔主相見言至姤之遇乃有父母之命媒妁之言也即天地氣化亦于剝時必知有復夬時必知有姤何嘗不期隂至而隂至乎男子之生在襁褓中其父母皆為預計婚姤者也至于雖有素期臨時變移莫定不期而遇者間有之耳期而後遇者多矣千古至今婚姤之道如此天地隂陽生生不已之道亦如此故彖傳首言柔遇剛也剛柔相摩一部易經自此出焉是以無往不然也于姤言遇非不期而遇明矣不觀之復卦之彖傳乎反復其道七日來復天行也若獨為陽言何有反復其道之説乎七日來復再過七日又當何如天行可以計日而知陽復可以計日而得反復之道為天行之一定者惟于隂生為不期而至即聖訓不及亦不敢信况復姤二象傳明切言之耶是姤傳柔遇剛與復傳剛長者同一義也何言不可與長貴剛柔相遇耳此聖人用陽以主隂之意坤不過順承乎天女不過克配乎男自其初生以至極盛皆以順承者為氣化克配者為人事故言不可令隂柔獨長也一言柔遇剛而和陽濟陽之道見于天時宜于人事隂陽配偶以成化機不測之妙以立天地萬物無終無始之命而謂隂可不養者吾不知于學易居何等也再觀傳云勿用取女不可與長也則壯不可取而弱可取長而盛不可取幼而柔正宜取也與卦辭曰女壯勿用取女同為宜時取之辭非絶取女義也再觀傳言天地相遇至陽盛而隂生方見雲行雨施品物咸章之大化是陽必得隂生之後資始者方由齊巽而見離又必三隂盛滿然後致役于坤悅言乎兊也天地氣化如此聖人立訓如此皆謂柔宜遇剛剛宜和柔即有違世儒之説不遑恤焉然聖人何以體姤乎以柔遇剛為用以剛主柔為體故必得中正乃能正其閨壼行為風化即至天下大行亦不外剛柔調和均平成教于家之道中正者修身也以此主柔遇剛齊家也天下大行治國平天下也孔聖見文王修身齊家合于姤之義故以周南召南之風行于江漢者為擬議焉姤之為時義豈不至大哉彖傳之釋卦辭如此較之時講一隂生而即欲剷絶之不知身亦有父有母之人非生于空桑之伊尹也而且取妻育女皆不剷絶何也言姤之時義大者正見隂之時不可失宜取則取如詩所詠摽梅禮所載婚禮皆謂取女當以時也及時與否其義所關甚大故曰時義大哉義生于時何事不以時為要也聖人亦不過時中耳如槩不取女遂無人道何大之有又出于何時何義乎象曰天下有風姤后以施命誥四方象傳曰天下有風姤為巽言也帝出于震而雷動齊乎巽而風行四五月之間至今多東南風虞帝所歌解愠阜財之薰風也此時正是陽盛隂生之時故曰天下風行姤也論古人婚姤之期在春氷始泮而傳言于夏至之候者為朝廷施命言也施命以沛恩惠如三夏之天地雲行雨施較三時獨多王者于春時必布德行仁而于此時體天道行王政更為申命而不厭繁重也此所以散乎陽不使之亢也所以養乎隂而俾之漸盛以成厚德于坤而能役養萬物以各正性命也且風者陽之散乎隂也施命誥四方同于雨澤下降正隂之所以濟乎陽而不亢也不觀之夏月風行而雨來雨來而旱蘇矣聖人之于隂陽毫無偏執之見吾願天下後世學易者于此等卦三致思焉初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也初六變為乾之初九在乾初以陽變隂為姤繫以潛龍勿用以變姤而陽微不可用耳在本爻以隂變陽為乾繫以係于金柅乾為金亦因隂初生變乾健故不能通行也貞吉者養微也若有攸往則見凶見凶者非真凶但有其象如羸豕之蹢躅羸豕弱豕弱豕不能動而孚于壯豕之蹢躅所以凶也蓋隂微陽微俱宜靜守貞悔二爻同義也象傳曰繫于金柅柔道牽也柔之為道原多牽滯能養隂于初生之時如係以金柅而不急迫得乎柔正之道攸往庶不致蹢躅矣九二包有魚無咎不利賓象曰包有魚義不及賓也九二變為遁之六二在遁二以隂變陽為姤隂漸盛居中位而得遇剛有執用牛革莫能勝説之象小人之得君者也在本爻以陽變隂為遁巽之陽爻原附于下爻之隂故繫之包有魚魚隂物而在陽水中如初在下而與二魚水不能離也隂微陽覆之以養隂故無咎但此隂方微不可進而干陽故曰不利賓賓如兵家言主客也守則為主進則為賓不可進有干犯但宜包此魚于水養之濟陽為得耳象傳曰包有魚義不及賓祗可自娛樂不堪持贈君之謂也言義者陽爻擕隂干陽非義之正也姤之為卦聖人重養隂以濟陽初爻貞吉是也又不許隂類之牽連以干陽二三兩爻是也亦不許陽之妒隂而失養四爻是也上爻亦是也深嘉陽能包隂和陽五爻是也蓋陽之德原大足以包隂如乾之元統天而無不統如天之包地而無不包特德薄量狹方以為聖人純是扶陽抑隂矣試細玩夬姤兩卦彖辭爻辭大小象傳之訓可以釋然無疑知愚説之有據也九三臀無膚其行次且厲無大咎象曰其行次且行未牽也九三變為訟之六三在訟三以隂變陽為姤因變巽陽以隨下隂不能遽進宜食舊德許其安于隂也雖貞厲而無咎且終吉焉若從王事雖無成而有終則吉合隂地臣道之分義也在本爻以陽變隂為訟變坎為巽在險進不能進故臀無膚其行次且臀者下隂之體無膚者變坎傷其下隂不能成巽體也厲者進退隂陽之間是以危而不安也然又云無大咎者當姤變隂委蛇其行而得姤所以繫之無大咎焉象傳曰其行次且行未牽也言變坎水為流行雖次且亦行矣遲回其行隂之道也內卦三爻以初爻為初生之隂宜靜以為養其二三兩陽爻皆隨乎初爻以成巽者二變為遁不失養隂故包有魚而得魚水共濟三變為訟間于隂陽兩𡵨則遲疑猶豫既不牽于隂亦不致牽隂為黨以犯陽也是姤之微隂聖人固欲養之然不欲其進而干陽故于二三兩爻立辭各見義焉以上內卦三爻巽體以初爻之隂主內卦變乾而係于金柅正示不可攸往養隂于微也二則以附隂為包有魚但不利進而為賓以干陽三則宜附隂而變坎流行故其行次且不快而厲然水盈坎為進附隂遲遲不遽進為正故無大咎可見姤在內卦主初隂且為一卦之主爻矣九四包無魚起凶象曰無魚之凶逺民也九四變為巽之六四在巽四隂變陽為姤繫以悔亡田獲三品者重巽而變姤合于巽卦順剛之義象故得遇而有獲也進原有求求而得悔斯亡矣兼姤為義也在本爻以陽變隂為巽姤而變巽則不遇矣四與初正應變而不應是不能畜在下之微隂為包無魚之象初爻隂柔在下有民之義焉在上者不能包之懷保惠鮮者竭矣言起凶起而升者陽之性與隂泮散不能得姤如民之心日離也故凶象曰無魚之凶逺民也初之逺于四由于四之起而升為亢陽不能撫綏乎隂如上之不能養民而逺棄之也凶何疑乎九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也九五變為鼎之六五在鼎之五以隂變陽為姤有鼎黃耳金鉉之繫乾體變離用中之虛明而得正如鼎之黃耳明而且健如鼎之金鉉也以此鼎烹養臣民何弗濟乎必利貞者離隂柔且變姤恐其隂私而示戒也在本爻以陽變隂為鼎亦兼剛健中正以養下微隂之義也繫以杞包瓜含章有隕自天杞者如松柏之堅硬瓜者如草木之委靡以杞包􅏨內隂而外陽隂體而陽用如坤德之含章因變而得文明柔順用于乾五之爻得乎以柔濟剛之道者也如是雖值隂盛之日有隕自天如霜如雪亦不復能披靡之矣蓋五早已以陽包隂于內故隂盛而不為害也此見聖人養隂之微以濟陽以靜為體以御羣動體用既立雖值艱難叢脞亦能以剛健中正者為用以隂柔中正者為體何難不平何患不濟乎蓋隂微雖欲養之又未嘗不慮其盛未至霜降氷堅久己思患預防也故能有偹無患以杞包􅏨含章內美所以不畏有隕自天之霜雪如松柏之嵗寒不凋也象傳曰九五含章中正也正謂有中而且正之德內含為美也有隕自天雖天行之常命然君子之志操之自己志既立而命雖難測皆以志立于早命亦可立非定謂取志棄命也故曰志不舍命也人定者勝天之説猶是也必能彌災患消兵刑而天且弗違矣又豈氣數之命所能奪其志乎言不舍者以志與命較有舍生取義之道此並命亦不舍焉正見志定于早也是志立而命亦能自我而造矣象傳示人以志與命則盡性者以是至命者亦以是也志能盡性而天之命亦無不可回也可見隂陽之盛衰往返者天行也聖人有調劑隂陽中正和平之道則天地聽聖人成能矣豈為扶抑一偏之説者自小其德量功用乎然亦非為安不慮危存不知亡者得以藉口謂可侈然怠斁無所檢制也志不舍命謂守志而並不棄命命即有不齊以貞之于志而已故有隕自天如霜露之降割亦不畏也但既以杞包􅏨而含章以陽健禦侮以柔順中正居心有如此而天隕災害以傷之者乎故命亦必隨是人之志不致于棄之矣天人同然道亦無不相協耳觀于五爻之陽剛中正能養隂濟陽且用陽包隂如此為一偏之説欲盡乎隂者尚不思返正見居德不𢎞信道不篤耳上九姤其角吝無咎象曰姤其角上窮吝也上九變為大過之上六在大過上爻以隂變陽為姤當大過之極而仍處上欲過焉所以有滅頂之凶又云無咎者陽太過則將變姤隂必復生矣隂陽和而不過何咎乎故象傳曰義無咎也在本爻以陽變隂為大過隂方微而陽極思爭勝所以有姤其角之象以角相姤是鬭也非姤也亦吝之道也然隂雖微而變大過陽有過隂之心乃陽之性也姤之隂自生何咎乎亦出入無疾之象義也繫之以無咎貞悔二爻俱以隂陽終始正義立辭亦相同也象傳曰姤其角上窮吝也陽至盛而隂不能不使之生于下陽窮極而必欲爭勝非吝道乎觀此貞悔二爻陽過隂生雖陽常思過隂但隂自生陽自不能過俱無咎孔聖未嘗有一偏之意亦可見矣以上外卦三陽爻四以不能包隂而凶五以能包隂而志定能造命上以陽盛極而不容隂為吝則姤之為卦貴隂主隂根于坤不待再辨而自明焉三爻皆乾健之體德以五爻主外卦以杞包􅏨含章在內此能以陽根隂所以為外卦主爻以在姤用隂故養隂為貴也九四鄰于內卦與初應而包無魚不能養隂以變巽風能散隂也上則與隂姤角而鬭以其變大過陽大過盛則鬭和平斯不致窮吝矣此姤內外卦皆以初隂為主爻以見隂陽始生皆宜養之于微也再繹解之卦辭所言亦是此義解乃雷雨作之後三四月之氣候乃言利西南已將坤之致養萬物六七月之後説到又云無所往非不可往乃不必往亦不能往也何也陽至于相見乎離隂生而順承乎天便是隂司萬物矣所以云其來復吉謂陽之來復者至此而隂又來復以隂濟陽然後能雲行雨施品物咸章以成夏末秋初之氣化也此後又有攸往矣往而至西南之坤再往至兑而萬物告成矣皆預生于微而馴至于著何非夙吉乎在解之言隂陽亦可觀復姤之來復及震之出而兑之入也出者發也入者斂也日月出入于卯酉故卯酉為震兑乃隂陽之道路也信然下經五陽一隂之卦惟夬姤遂繼乎上經五陽一隂履小畜同人大有四卦與上經五陽一隂之卦均矣用隂根坤亦歸于既濟又歸根于坤以終易焉姤歸根于坤正見隂之始終與上經五隂一陽六卦配合均平又見隂陽之平和也彖辭明于女下加一壯字故聖傳推言之謂不可長長則壯而變陽取之何益故示占者隂壯不可用用隂宜用其柔順貞靜少隂之理氣也乃謂一槩勿用取女此殆知有父而不知有母知有天而不知有地也或謂易為卜筮之書卦辭勿用取女為占者言非舉世不可取女也即為卜筮言亦當體會壯字無槩女不可取之理無此理則聖人無此辭必矣坤下兑上萃萃升相綜皆四隂二陽之卦繼乎蹇解晉明夷而根於乾也萃繼明夷蹇者昏暗之主明入地中初升天後入地其君子賢人仕路蹇塞則天命别有所萃萃於有德人心亦皆順天命而為萃此殷紂之末季周之盛德將興之卦也雖不必指定殷周而凡一代將亡一代將興皆不外天命人心順逆必此亂而彼乃萃也故謂之繼乎四隂二陽之明夷與蹇也至于根乾之義陽少貴陽固然而九四之大吉為一卦之主爻乃天命人心所萃者雖兊為隂德主乎上爻自是凡兊皆然但在萃卦澤上于地以四五陽爻為主四猶近下卦故萃主四爻自明夷火入地中山水之間隂氣涸閉而成蹇矣乃鬱塞之陽久必透隂氣上升為澤故曰澤上於地澤之為澤以隂在上而陽在下也何也凡雨澤必地氣上升而為雲若天氣不降則為密雲不雨固是隂微不能畜陽成雨亦是陽不得隂不能下降但上升將為風矣所以不能墜隂為雨今澤上于地是澤之被物皆四五二陽爻能墜隂為澤以及地也四爻之陽又在下引五爻之陽下降者萃卦以四爻為主此義象也故在三女卦兊為少女則主上爻之隂伏羲取象畫卦名兊為澤原用上隂以畜二陽下降為澤也在萃之四爻則取陽能墜隂施雨及下為義雖各有象義其理亦相通耳萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖辭曰萃亨萃乃必亨之道也天命人心俱去彼而聚此焉有不亨者乎大約亨皆本於元德也有元即有亨矣王假有廟正是王德之純王心之一祭無不誠誠無不格言廟而郊壇可知未有禮祖而不本于敬天者也以此見天命有所萃矣利見大人者自明夷之世賢路蹇而不通矣四方之士于是更思歸於有道利見同于乾之首出物覩也此見人心之順天命來萃矣亨之所以為亨也不作衍文亦可德之昭而業之著已如此復何有利貞之辭乎此明文王自矢乎終身服事之誠以戒天下後世之受天命人心所萃者必利在貞正固守不可不精白乃心以終始于臣節也用大牲吉藉儀物之厚表誠敬之篤以是事天以是祀祖以是奉君之義俱在其中矣自必獲吉可以利有攸往矣攸往者非謂進而有所圖也不過順乎天理之正盡乎人事之宜事上臨民欽命保國無往而不利耳若有所為而為豈利貞之攸往哉觀卦辭而全卦之義已括盡矣所謂觀其彖辭思過半矣再繹彖辭其為凡占者前用則盡其誠以為萃之本見大人以𢎞萃之用又必利貞蓋萃非苟合以為萃也用大牲者誠存于中禮備其儀也所以利有攸往即亨耳彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣彖傳釋卦名義曰萃聚也大學曰財聚則民散孟子曰為湯武驅民者桀紂也欲散而復驅之必有所聚矣由于成萃者之主德合卦德之內順而外悅也即順之一字可知為天命人心所聚祗是大順乎事上臨民之常道並無有意招徠邀結一有私心便有矯強何能順乎順之為德乃坤元之順承乎天以資生萬物者也以此致悅未有不悅者也如萬物之致役于坤而各得其養未有不悅言于兑者矣王者之心德事功原與天地無二論説至此方見順而説不同于後世權術功利私恩小惠之為也况以詐偽威力恭其間者乎蓋內順而外悅本于剛中之德故有大順以為用足以能致乎逺邇心悅誠服之效也剛中自是指九五然玩爻辭象傳似此剛中之德虛言其理而萃卦之五有其位無其德也然則四之象傳曰位不當也乃有此德而尚無此位者也既為天人所萃主乎萃者重德不重位也以德為聚自無不聚若言必九五之位乃萃焉有天人同心萃于匪孚志未光之君位者乎惟有此德稱此位以成萃則天祖式憑不敢一刻怠斁于是假廟之孝享必盡禮矢誠于是聲教之覃敷悉觀風慕德皆思利見大人逺至而邇安矣夫君心之誠上孚於至幽而人心之誠遂通于無間其來利見者亦必各懷公忠共矢報效上以正建極下以正會極而歸極也聚以心之至正方可謂之上下皆以剛中為感應耳是以更用大牲不少懈其升中告虔之意以至攸往皆利不過動順天命以為終始而已順天命之順仍是順而説之順心無二理道無二順事天敬祖奉君臨民一於順而聖德成王業基矣再者順天命亦要體會非是謂天命人心皆萃必王天下若有此心便為候天命非順天命順者有其具可以無其遇如孔子之不有天下亦天命也可見文王當日之心可存為後世積德纍仁不期獲報者法也觀乎此則知萃之為萃非可幸致也內必有是德外斯有是效而偹德之聖人即至于位天地育萬物亦不過自全其生順死安之道耳未嘗有慕于外也然天之所助者順人之多助者得道也得乎大順之道而天地萬物胥托命于聖人焉能不聚乎觀聚而知天地萬物之情情不外于性是聖人以性通天地萬物以為聚耳象曰澤上于地萃君子以除戎器戒不虞象傳又申一義曰澤上于地萃澤已逮下及地而且上于地至深且渥湛恩汪濊矣斯時地固奠定澤復旁流民必安而物必阜德日崇而化日行復何事于即戎乎除戎器者修而偹之寓兵于被澤之農而不用也然地上之澤固宜深而地中之水亦宜制戒不虞者堅堤防通溝洫以慎載舟覆舟惟水之義耳王者之富民即以飭戎守國即以設險非于修已治人之外又有事也于是見萃之天命人心既集亦惟益修文德于不息無藉富強以侈盛大之私心也樂天者保天下保之為義𢎞逺矣大小之間且然况君臣之際乎此湯心之慚德武樂之未盡善也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也初六變為隨之初九在隨初以陽變隂為萃繫以官有渝則失所守矣故必貞吉應正不渝乃得所守也出門交有功將以隨五於外卦以成隨也是兼萃為義矣在本爻以隂變陽為隨繫以有孚不終亦即官有渝之意乃指上下之遇合終暌也乃亂乃萃必此孚不終乃亂乃萃于彼之剛中以為應者焉若號者舍此就彼去國之難一握為笑者棄暴親仁相合之易也勿以此為恤往而無咎亦出門交有功之義也象傳曰乃亂乃萃其志亂也謂初之志始亂而終以正應得萃百里奚在虞而亡在秦而霸管仲輔公子糾而敗相桓公而興有賢不用且無救亡况從亂乎始從亂而能往萃于有德亦王者所不棄故亦與之以無咎焉初之有孚于昏主即明夷之四爻所謂入腹獲心者也于出門庭或者亦往萃于他邦乎六二引吉無咎孚乃利用禴象曰引吉無咎中未變也六二變為困之九二在困二以陽變隂為萃繫以困于酒食朱紱方來利用亨祀征凶無咎二變順不能出險故困於酒食然應五而君命之朱紱方來以濟困出險也利用亨祀者以誠求通也征凶而無咎征凶者必待價沽也無咎者仕為士之義也在本爻以隂變陽為困繫以引吉無咎坤中爻變陽主坎可以引致羣類而萃于剛中也故亦無咎孚乃利用禴者以孚為主于已而後可利用禴于君也以誠為求以禴為用方得出險以往萃矣象傳曰引吉無咎中未變也中者孚也初則從亂矣二中未變乃當昏暴之世未從亂以守中者其出險得順以往萃又何咎乎六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也六三變為咸之九三在咸三以陽變隂為萃繫以咸其股執其隨艮以上爻為卦主引下二隂為感動股動而下體皆動以相隨也隨本由人而執之所以往吝也在本爻以隂變陽為隨變順為止雖將往萃而興嗟不願未出于心悅誠孚也故無攸利然但往則亦無咎不過小吝耳象傳曰往無咎上巽也三處內卦之上爻有順之德因變止所以止而不決于萃然既往必無咎者所往之君尚賢故不以嗟如為嫌耳以上內卦三爻坤體俱以往萃為吉初乃從亂而改過遷善者二乃得中而引類往萃者三乃遲疑觀望然後萃者大約人心方萃有此三等舉該之矣然既往萃則惡者無不豫以自新善者無不更加奬勸矣故以二之得中為內卦之主爻所以引三隂而往萃初則已亂其志于昏主乃不終而往萃三雖嗟如不願無攸利而亦往萃蓋皆為二所引也九四大吉無咎象曰大吉無咎位不當也缺自無甲子之禍矣何悔乎即不專主紂凡為君者知時將為萃即當審勢觀變改絃易轍求天意之徐回人心之轉向也詩云天之方蹶無然泄泄其及也何尤哉象傳曰萃有位志未光也徒有其位而無其德志不光而履帝位何能無咎乎象傳重言志所以固立位之本也辭曰何以守位曰仁何以聚人曰財人君不施仁而聚財兩失之矣苟能固其志于仁則德立于已天人之萃必不他適即已去者且復來矣再觀此爻可見文王當日事紂非是必待武然後行征誅也若紂能體元而永貞武王亦無所用弔伐即行之而已不順豈能得悅而為天人所萃乎武王必亦服事終身以為繼述焉繼述必言弔伐不惟説壞了武王且説壞了文王此學易者不可不知上六齎咨涕洟無咎象曰齎咨涕洟未安上也上六變為否之上九在否上以陽變隂為萃處否極而變萃上雖不在其位亦同傾否而悅萃故有先否後喜之辭在本爻以隂變陽為否處萃之極而變于否是安于否也齎咨者含怨于心也涕洟者形愁于外也然無咎者其為周之頑民乎周之頑民殷之忠臣也何咎之有象傳曰未安上也伯夷叔齊義不食周粟豈安于新君而以為上哉此亦不可不有以存君臣大義于千古者無咎于一時且元亨于千載矣以上外卦三爻兊悅之體德四為萃主有德而成萃之大人體萃之時勢言之也五為有位無德已失天人順悅之心矣上乃感懷新故執固不回未可與權焉者也然究以上爻為外卦主爻者存此大義于千古可耳上兊悅體而不苟悅如此此義已足主全易之兊卦也合觀萃卦繼乎蹇與明夷在天之日此已晦上地之澤彼方滋且火入地而亢旱萬物必枯澤上地為時雨萬物必蘇矣又必以蹇繼明夷以萃繼蹇者人心之萃自君子倡之庶民方和之明夷而君子仕進之途已蹇羣思出險就平必萃于有德之處矣相繼之義甚確至于根乾以四爻一陽為主雖剛而不中爻象傳已明示位不當也然剛健之德可以主卦而根乾矣且九五之爻辭云元永貞元者乾之剛健中正也五有之而匪孚以失之也大學言明明德明德皆有而不明者多故五象傳曰志未光也此剛中而應本在五五不能德稱有位故天命潛移而人心改歸于九四矣設九五怨艾改悔能元永貞則剛中而應何嘗不依然在五乎如此講剛中而應方合聖人作易示天命之靡常人心不易得之義也如指定九五則三代至今存矣不有廢者其何以興不有匪孚何以别萃惟其九五之陽失道而九四之陽所以主萃此乃變易無常交易不測之易即千古帝王有德而受命有人無德而命終人散一定不易之易也夫萃之澤上于地再繹之不同于水上于地澤原在地上水應在地中禹貢所言滙為大澤即所謂震澤大陸諸澤也亦水而已澤乃天之雨積地上在天為澤在地故亦名之為澤水則有發源有去流必入地中方得流通充暢也故澤在地上有蓄水之處不為害水在地上則淤塞潰決必為害矣此雖目前之物亦必知其義象方可學易再繹澤必有光色之義如萬物之光彩皆是隂得陽而顯明者為火若隱若現者為澤如人面上膚間之光潤如古銅磁器上之斑彩俗所謂包漿者大而如天光水色小而如花紅草碧丹黝之漆物朱粉之繪事皆澤也兊以一隂包二陽隂在外陽在內必有光色滋潤于外此皆兊為澤之義象焉術家以兑為金能生水與乾之金分隂陽乾金所生之水雨露也雨自天降也兊金所生之水泉源也泉自山出也亦各有義象然則所謂兊金之澤又生于乾金者矣天之陽氣透于地即兊與艮山澤通氣所以泉澤生于山而歸于兑金生之也至于説卦傳有云説萬物者莫説乎澤物成而至外發光潤內方各正性命亦是隂包陽在內誠中形外之義也所以能存為坎中之復如果中有仁百穀中有實草木中有根荄皆自秋月結實成物所以謂之説言乎兑也植物如此飛潛動者則各以胎卵濕化為生意以不時為利以各得其時為貞各正乎性命各保乎太和遂各生生于不已也知此則知戰乾勞坎成終始于艮至震無不出者皆于兑秋收之成乎説也物成則各説其成人又説物之成所以謂之説言乎兊也有一定之秋者亦有一定之春無一定之秋者亦無一定之春也萬物舉該于此天主生用震以生之地主成用兑以成之天用長男地用少女取剛柔最有用者代父母也然震之生自坎之生陽生之也天之資始于子半之陽也兊之成自離中之生隂成之也地之資生于午半之隂也故隂陽不可偏廢而復姤反復皆為道所必生也于兊震看復姤更為明切巽下坤上升升綜萃繼晉解而根於乾晉晝而明君在上其德盛功髙之臣既已加恩晉爵矣其時險阻既平艱難已濟為陽氣宣通陽道將行之世則凡賢人君子俱相勸勵而思進用所以以升繼之為卦四隂二陽陽少貴陽根乾固然但自晉解而來正因日在地上青天白日雲行雨施萬物生育其為俊乂勸駕者無不為陽道昌明是慶也然巽上坤下俱隂卦何以主陽不知卦之二陽夾于四隂之中以陽氣鼓蕩隂氣則得宣通和暢此乃用陽于隂中主之以舒隂也隂斂而陽舒之乃合屈伸往來天地相交之義象耳且風在地下陽不久伏必升而上卦名殆取象義于斯焉萃乃為明夷繼蹇驅而他往升乃為晉繼解引而競前何以云乎引雷震出水為解所以引巽風齊萬物也四卦確乎為繼奚疑哉升元亨用見大人勿恤南征吉彖辭曰升元亨凡卦言元亨未有不本于乾元者升主陽故首言元亨陽即元也升而自得亨焉用見大人不言利者升而見大人以求行道濟民占者如此戒為利而進也勿恤者勿以不待弓旌自致其身為嫌應仕則仕非枉道干時也南征吉者君方蒞位土中向明而治取象日麗于天故民臣莫不瞻雲就日而獻其誠藎也綜晉火在地上故升者向日而征斯吉而叶其象義也風在地上巽齊于東南必將見乎離矣故見大人而南征也彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也彖傳釋卦名義曰升之為卦巽坤皆柔也然巽為風風陽物也陽處隂中必有升時時至而升所以莫阻其巽進也且巽進本日升之勢而又兼坤之順德以順為體以巽為用其進不可量也由于二爻剛中之德具故感應之道通可以大亨而遂其志行其道也二雖在巽柔卦中而實兼乾元之剛德以為中故能以乾元之健統坤元之順以是而巽進升之所以大亨也愚謂卦辭元亨本于乾蓋有據于彖傳也以此內主剛中出而必應者用見乎大人故勿庸恤乎輕進而重在于遇合也斯有慶于君臣即有濟于國民矣南征而獲吉非為利祿而言吉為其幼學之志至此得行也觀于二之剛中為主卦之爻則卦之根乾大明矣象曰地中生木升君子以順德積小以髙大象傳曰地中生木另取一義不以天之成象象之而以地之成形象之木在地中以巽而升君子以之本乎至順之德謹身勤學進德修業毫無矜張躁妄之念也于是學日益優德日益盛積乎萌芽之小馴致乎髙千尋而大百圍如木之在深山養之千百年然後可以出而膺棟梁之任也君子體木之德惟自盡其培養茂育之心耳至于積小髙大則自然有諸中形諸外者也得其養無不長初不為升計而升在于是矣尤悔寡而祿在人爵修而天爵從亦必至之數根于一定之理者也以順為慎不如體坤言順初六允升大吉象曰允升大吉上合志也初六變為泰之初九在泰初陽變隂為升繫以拔茅茹以彚征得吉者兼升義而升于泰之時三陽運啓而升也在本爻以隂變陽為泰泰而不升失其時矣允升大吉信乎升所宜升乃得卦辭所謂元亨之大吉也象傳曰上合志也巽之所主初隂二陽附之乃成巽體然隂必隨陽以上焉兼泰之義象謂之合志合于在上二陽爻同類共升拔茅彚征之義何明切哉論卦之內外象義風在地下必升而上所以為升上合志就外卦六五為主爻內三爻同升志合于外卦之上此義為正九二孚乃利用禴無咎象曰九二之孚有喜也九二變為謙之六二在謙二以隂變陽為升有鳴謙之辭隂變陽為謙有宣達于外之義矣故戒之以貞吉謙不尚乎謏聞動衆也在本爻以陽變隂為謙繫以孚乃利用禴者震動以為巽外雖進而內有未孚則升近于冒進失利貞之義矣必自審其孚而後可以禴祭將誠以觀其能感格否蓋必下之忠藎既矢而後可望上信用無疑也如此而後升乃無咎象曰九二之孚有喜也孚存于中以自慰見信于上而悅從皆喜義禴祭之薄者以孚為重也九三升虛邑象曰升虛邑無所疑也九三變為師之六三在師三以隂變陽為升有輿尸之凶辭矣蓋險變為巽在師中忘險而輕進者也在本爻以陽變隂為師繫之以升虛邑巽變為險進而得險阻之地虛邑無人之境也不言凶吉而已有不得其所之象義矣象傳曰升虛邑無所疑也其未熟思審處者正因不能疑而得信信而後進也明矣孔子之許漆雕開以其不能自信也今三無所疑則上反不深信甚矣學者求進而得位不患無位也患所以立也慎不可以輕言無疑以致有其遇無其具為人誚儒術之疏也內卦三爻以巽體在坤下得巽而順之道可以升矣然必如初之隂柔志巽行順不輕升而自升為大吉也所以主乎內卦也如二爻者孚未裕而裕其孚乃無咎焉如三爻者無所疑慮而冒進雖升而得虛邑亦可以知戒矣內三爻本宜升且當升之世其難如此同于晉之內卦三爻致戒乎輕晉必謹也此干祿者所宜深知也六四王用亨于岐山吉無咎象曰王用亨于岐山順事也六四變為恆之九四在恆四以陽變隂為升繫以田無禽者四在恆外卦為震之主爻陽變隂而失動德故因循為恆而田有無禽之象蓋于田者怠隋無獲也在本爻以隂變陽為恆順而變動動必先升中告虔表其誠于川嶽之神明格之無疑而後可升且得吉而無咎也象傳曰王用亨于岐山順事也在坤為順德變為震動仍本順德以行事事之至順者也地道也臣道也至于以誠用亨則主乎陽以立體者矣觀此爻象又似文王在西岐未受天命之時矣繫辭傳曰易之興也其當殷之末世周之盛德耶故卦爻之辭象周公多用耳目及見之時事繫之雖未必執一事以言易而即一事以推之所謂引而伸之觸類而長天下之能事畢矣聖人亦未嘗不令人以一事言易也六五貞吉升階象曰貞吉升階大得志也六五變為井之九五在井五以陽變隂為升兼升義而繫以井冽寒泉食井泉可食則人食而且致養如聖賢得升以仁恩及民也在本爻以隂變陽為井如兼井而言升則聖人首出以美利利天下矣如自本卦言則為九二剛中而應之爻隂柔中正而行順道以為巽升者也且為下三爻升而用見之大人也戒以貞吉終以隂柔又變順為險恐其有隂險之計存于內以為升之機械也必貞吉者正而中中以為升如階之升至巽而至順自下漸上從容自至斯合于卦辭之元亨焉象傳曰大得志也升于五之尊位由于有中正順巽之德得位以行其道在君在臣俱本于志之素裕也升五大得志而凡用見大人者其志在輔世長民自無不各得矣上六冥升利于不息之貞象曰冥升在上消不富也上六變為蠱之上九在蠱上爻以陽變隂為升蠱極而升于何往乎不事王侯髙尚其事以是為升可矣在本爻以隂變陽為蠱升之極而成蠱仍思升焉則不明乎升之象義為冥升而已冥以為升何能常哉然能以此冥升之心用之存誠立德則不息之貞也以不息之貞為利德日升于不可量則冥升非冥而大明矣象傳曰冥升在上消不富也在升之上為冥升則陽氣之成風而行于地中者已升于至髙將消矣再升則消不能畜乎隂而成雨如小畜之風行于天上雖密雲而不致雨必隂畜之盛至上爻乃有既雨既處之辭若風之升而上消隂不能和焉能富有其畜藏以為時雨而化育萬物乎此孔聖于升極明陽之為氣升髙散隂不能雲行雨施品物咸章以盡畜隂濟陽之用也故必貴于陽不極升而隂不致散所以畜隂也正為畜隂以和陽也觀于小畜之上爻則知消不富之象義為冥升者戒也蓋不富秪因不畜耳易多于隂取富之義于此又見之凡入仕進之途者冥升而隂消則必陽亢同于乾之上九矣人多不知在冥升之上六升而不止即為亢龍蓋因變陽上六而有上九之辭既變陽而升而不止非知進而知退而何且爻辭明云利于不息之貞即君子之自強不息也若仍謂此升之上六也何以言乾之上九乎此不可與言易者矣以上外卦三爻坤順之體德也四之升誠孚而無咎象言亨山順事不過盡其順巽之道非求升也而升之理數具焉五爻之升貞吉而升階乃晉位矣為君者修其德以居其位升之君如此升之臣必不敢冒進矣德有大小位有尊卑皆以有本者得用為主也中正而後兼巽順所以以此爻主乎外卦而且主通卦焉上之冥升升于德則可升于位則不可即以隂陽氣化言陽亦不可過升過升則亢况人事乎戒升而不知止之義也外卦三爻俱不許無所本而言升且不宜升而致亢則晉繼以升而常升矣當升而不可輕升升又不可無據合晉升觀之占晉占升者可得前用矣乎雜卦傳云萃聚而升不來也萃聚得其所聚矣升極而亢亢而散矣風者以升為性也風之陽由地下升于地上極而升于天隂能畜之則成雨而陽又下降為澤以入地如風大行隂不能畜則不能墜之使降成雨隂即微弱而散矣隂既散而陽又無根以維之于是不雨而風自息此升不來之義象也知風不來之謂則知冥升消不富也之説矣歷觀時解皆未嘗言及也陽貴也隂富也言消不富謂隂消無畜陽之力陽因升極而散不復來也坎下兑上困困井二卦相綜三陽三隂繼乎損益而分根于乾坤困則繼損而主陽根乾也請言其義損上益下貴于能感感不足以致應則無誠信以喻下而徒欲損下以益上必致于困矣再玩之井有水以養人益下之道也困無水而不能自達矣損下所致也是二卦以水為主卦之象義明矣水之為物天一所生本于陽而地六成之乃有天地後萬物首出于天地者有則足養萬物無則不足以自養亦一定之理數也有而足養隂得乎陽而流通也無而致困陽涸于隂而閉塞也觀于彖傳曰剛掩也乃知困之所以得困之大旨焉其卦上兑下坎二卦為澤為水而反為無水何也澤水用隂而體陽者也隂之自天降而為澤賴天之陽氣下降墜隂而成雨露隂之自地出而為水亦賴天陽主內達外而成江河今隂掩陽而澤不下施水不外出則無水矣故卦雖澤水相合而竟無水如暴虐征斂之君神恫人怨雨澤不降飢饉洊臻貢賦無出誅求空急雖日以聚財為心究竟財源在下已竭國用終歸不足于是盜賊內起敵國外侵困之成也皆自損下益上之心肇其端也困之繼損不已大明而為萬世昭鑒乎所以然者要在君心先惑于貨利而逮下之仁已汨沒于嗜好之私矣此是隂掩陽之根柢始謂多財足以快聲色欲利者不知有人方有土有財方有用人心失而失則俱失矣以此言之有德者又得人心之本也君心之德下感天下之人心皆以誠孚為主誠孚者乾元之陽也君心之元陽已蔽于嗜欲民心之陽渙然離散遂成一隂涸陽閉之世道而君民交困矣聖人之言何其深切著明哉即一家一身之小一物一事之微凡致困者皆心之理先有所昧不能預計通達之義而用陽之剛健以推行乎隂之柔順耳久而隂之隂柔無陽以為振動必致于凝固閉滯不能自得其順承于陽之道反能掩陽而愈滋其艱阻在天運之氣化在人世之事務皆此象義也剛掩也誠困之要旨乎或曰世不有無妄之困乎然無妄之困究不足以成困卦辭之言困亨在貞而以大人得其吉不為無妄之困前用乎即有故而致困能以此亨道亨困尚可無咎焉然則無妄之困自無不出困得亨矣困亨貞大人吉無咎有言不信彖辭曰困亨困必思亨乃得亨也至亨之本則歸于貞而已見困非私心小計可亨惟大中至正方得亨也大人獨吉何也大人之遇困知必得吉焉孟子曰故天將降大任於是人也必先勞其筋骨餓其體膚空乏其身行拂亂其所為是以動其正心忍其私性斯能增益所不能亦未嘗不以陽為主而開通乎隂也忍性就嗜欲之性言所謂性也有命焉之性也若義理之性率之成道何用忍之乎此乃無咎之道若以私計隂謀出困困雖得濟恐咎亦未必能免也大人尚德主貞以亨困必主乎內不藉于外者知處困若無實心徒以言語通達人多不信也故大人不尚言而尚德也然豈無心果誠而言不信者乎所謂至誠而不動者有之矣但大人惟有愈篤其誠愈堅其貞而已久之心誠既純則明著動變且能化矣化之為義兼人物而言至誠可格豚魚是也况人類乎是誠未有不能動物者也何患于心誠而言不信乎故大人不以言語為有無而必以貞為貴乎彖曰困剛掩也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也彖傳釋卦名義曰困柔掩剛也剛掩之義已明之其象何取乎兊以一隂掩二陽坎以二隂掩一陽若以此取象何卦之為兊為坎不可言而獨言于困卦耶蓋困之為卦則兊澤坎水俱無水故云剛掩以兊下之陽坎中之陽皆不能振以宣暢流通乎隂而反為隂所掩以致上無降澤下不得水遂成困也困之為困在是則亨困之道非使剛不為柔掩必不得亨矣何以能使剛不為柔掩乎仍以卦德之為説為險者體之可也體説之德易明不過貞正為悅足以亨困矣體險之德難知險在事務為艱難在人心則為慎思而審處也臨事而懼好謀而成聖人之與于行軍者如是師為至險而聖人體之如此則險而悅體是二德以亨乎困亦不外于處險以貞正為防險濟險以悅而出于貞正為通險而已矣非聖人令人內險于心而外悅于人設立城府苟悅取媚以欺世也所以必言利貞則體險體悅皆剛健中正之道也此聖人訓世困而不失其所以亨之義也故又云如此者其惟君子乎如小人之險之悅則雖得亨乎困果何以立則乎蓋貞者剛健中正在內為主而以柔順為用是以兑之二陽足以鎮奠上隂而為澤坎中一陽足以動蕩乎二隂而成水皆以陽為主以隂濟陽之用至正之道也故惟君子能之也大人者又有位足以行其道所以必獲乎吉也非剛中為主之大人君子何以為立體制用之宜乎既主此剛中以立體無事于言而皆信矣深知尚口用言無以通人心之至理至情必至于不得亨困也卦辭象傳俱歸于剛中為主心之理以感通乎人心方能濟困得亨則卦之根于乾而主陽自咸而損繼之以困何其確切也耶卦以九二為主爻坎中之陽即乾元也而兊之二陽亦賴坎陽動于下二陽俱有助以成墜隂降澤之功義象俱在試玩之自得陽在水中透氣以成雲致雨陽在山中透氣以通脈達泉天地之氣化自然者在目前百姓日用而不知凡學易者能不一仰觀俯察而求見乎象曰澤無水困君子以致命遂志象傳又申一義為君子大人守貞而不能亨困者訓也曰澤無水澤不降于天水必涸于地矣此如天命已去而人心自不順也黃河徙而殷遷三川竭而周亡水之關于國家運祚至今為然也故暴虐甚則恆㿩若而大旱聚斂甚則民逃散而川枯此時天災人害雜然並至雖有善者無如之何惟有致命以遂志殺身以成仁而已但所謂致命亦有順命之義在內如此貞固守之而不渝或得亨困命也不能亨而終困亦命也命已致而志遂則生死視之如一矣致命不致命歸于遂志命無定順乎天志有定決于已此君子之貞終始如一者也殆至志遂而命即致亦未嘗不亨于千古耳致命與姤五爻象傳曰志不舍命也兩義而皆重在志志定可以致命亦可以不舍命致命不舍命雖撡自志然其間亦有命焉初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也初六變為兑之初九在兊初以陽變隂為困繫以和兊吉能思險而悅乃和也故吉在本爻以隂變陽為兑在險思悅所以不能亨而致其困矣故辭曰臀困于株木臀下隂之體株木者生于水尚未髙大者皆未能亨通乎陽之象也遂致入于幽谷三年不覿初本隨陽方得流行且待上澤而後有水今自變悅據險為悅故其困之甚如此象曰入于幽谷幽不明也無陽而隂固閉幽冥之極何取明乎此爻乃不思出困而苟悅不得貞者九二困于酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也九二變為萃之六二在萃二以隂變陽為困以隂變陽引乎二隂以為萃故無咎然萃二隂爻所不足者誠也孚而用禴乃得合上志亦重陽以主乎隂也在本爻以陽變隂為萃似亦安處于險而困于酒食矣然待乎上之澤逮下則無水而有水朱紱方來以濟困焉此時之二惟有培養其陽以待時而動利用亨祀者積誠以為通也外兊之澤原因坎中之陽上升而後能下降何二又待乎外卦之澤不知此乃就二之居下位而言必君命至而後能亨困然非誠何以上孚乎二之積誠振在下之陽也上通為澤之降朱紱之來也就卦德言則二為一卦之主就卦位言則下待上命各有義象也然征則凶而辭又無咎何也陽未能動不可妄思進而干上蘇困然在下而藉名位之來以得時行道何咎乎况二既祭則受福矣其誠已足格鬼神豈人主不能感通乎言征凶者必待陽足動誠足感即干上蘇困亦不為咎矣象曰困于酒食非安于困也中有慶則剛健中正之德備乎已斯榮名亨困之遇可必于外矣此爻貞悔俱以誠孚為主其義自相通困于酒食即需于酒食之義六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也六三變為大過之九三在大過之三以陽變隂為困本末弱而變巽為險不能下培乎隂矣故棟橈之卦辭繫于三爻以巽之主爻在初隂而三乘其上也在本爻以隂變陽為大過似乎助陽矣然不能培乎二之中陽則亦不得貞而不能亨困矣困于石據于蒺藜石乃水涸方見蒺藜亢旱乃生皆無水也無水者不附中陽以為流動則水涸矣既不從本卦之陽是入于宫而不見妻也凶何如之三隂以二陽為妻易不可以為典要惟變所適此其一也象傳曰據于蒺藜該石于內矣乘剛也卦以掩剛為困三在二陽之上故以乘為陽正是其象也入宫失妻以為不祥也二有慶者以陽主乎隂也三不祥者以隂掩乎陽也義象俱曉然矣本義謂妻指上六上固隂而三亦隂且非其宫矣不如以彖傳乘剛也三字貫下為明確也且不祥也正是有慶反言可謂妻為六乎如執陽不可為妻寧謂三為妻二入宫而三不能相合如不見然少可彖傳曰掩剛象傳曰乘剛愚不敢舍聖人言别從矣此爻貞悔或以陽不能滋下隂或以隂不能和下陽為義相通以上內卦三爻坎體以二爻得中為主內卦主陽而得亨困且主通卦焉初變悅安困三變巽妄進俱不能隨陽以動故兩爻皆凶惟以二之困酒食待赤紱用亨祀者為得中有慶則內卦言亨困之道不外陽不為隂掩遂能出困矣至于其根柢利用亨祀以誠為通猶為要義也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九四變為節之六四在節四以隂變陽為困安于節則水能濟澤故亨在本爻以陽變隂為節困而安焉有亨困者來濟徐徐而至矣水澤澤水相交易成節困兩卦于四爻之變其義更必相通觀于節四以水濟澤曰安節亨觀于困四待水來濟曰來徐徐可明矣又云困于金車則兊當秋令不可謂非金也在本卦之澤未逮下水固不能速來相濟然在兊必待坎之中陽上升而成澤故待二之來濟方蘇困而得亨也如此何云吝也言不先施而待人來故吝也四爻在上下之際聖人繫辭更詳盡焉吝而又云有終坎陽必有升時兊澤必有降時兩相需而未能亨困者一旦坎陽升上兊應之而降澤困不終困此所以謂之有終焉象傳曰來徐徐志在下也言待下卦坎中之陽升而雲行雨施也雖不當位有與也言二正應為五而四與五相近來應五而四先得與矣象傳申明坎陽上升成澤兊陽下濟為水之象義更顯切矣九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也九五變為解之六五在解五以隂變陽為困繫之以君子維有解指解四為君子也小人亦俱有孚亦以誠意為感通得解即得亨困也在本爻以陽變隂為解用陽以亨困五變隂似不能亨矣故有劓刖之象五乃人君而可劓刖乎劓者失人君之威儀也齊桓公曰天威不違顔咫尺又內經謂鼻為明堂劓正謂有損君顔也刖者不能行而自困賢人君子不能得用如足之則而不能行其象如此非必真有此事也困于赤紱者未嘗無其位徒操用人之名器不能行而得通也乃徐有説五本説體似不必繹説為脫五之以徐而得説者先慮險也有悅之德見悅于人乃自慮險而徐得之此悅以貞正在人必信非徒為口以悅正與卦辭相合矣又必利以祭祀亦主乎誠以為通感于天悅于人則困必亨矣象傳曰劓刖志未得也可見掩於上隂而失其君度且下陽亦掩于隂而不能來濟也志未得亦有誠不足通之義乃徐有説因恃乎二爻得中以直為貞久而上升以濟五也必五先有剛直之德以為來二之本故五與二上下二陽交孚于誠而後彼此感應甚速也卦主爻固在二言感則又重責于君位矣二五俱中陽性俱直以者兩指之也中直既孚則利用祭祀受福必矣祭則受福質鬼神而無疑尚何賢臣不集而困事不通乎此爻明用陽振動乎上下以誠為主貴于不為隂私所掩貞久而困自亨之義也貞悔二爻義亦相通解則維于四困則來乎二也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上六變為訟之上九在訟上爻以陽變隂為困困于訟之終受賞鞶帶亦必褫焉困于訟何可終乎在本爻以隂變陽為訟用訟以亨困非貞矣且隂掩陽而居上隂極也困于葛藟臲卼不安困君者豈可安于髙位乎必曰動而變陽為乾化柔為剛不掩陽而困亨焉此乃知悔者也惟有悔然後從剛亨困則征而得吉必矣象傳曰困于葛藟未當也隂不宜掩陽使澤不下逮也動悔有悔惟有悔而其行自吉不掩陽能成澤澤及于下水無者忽有而困亨于終矣外卦三爻兊悅之體德也四乃待二陽上升與五共墜隂成澤者特困于本體之兊金主隂故陽不能引墜必需二之陽上升成雲而四與五乃能藉助得勢墜隂而雲行雨施也五為二正應亦困于本卦之陽未足也然能以説德慮險以至誠體陽陽足斯能招引內卦二爻之陽上下相濟為澤為水以蘇困也上爻始以隂掩陽阻澤屯膏既而變陽動而有悔悔則不掩陽而且助陽成澤以施澤焉以益水焉困亨于終矣蓋變乾乃生澤雖無內卦陽來亦可成澤其義象又不同于五也所以上爻主外卦為二陽所附可以引陽下降施澤蘇困也再繹通卦重水中之陽上升方引外卦二陽墜上一隂而下降則二爻為通卦主爻再二傳曰中有慶也上爻繫辭云征吉象傳曰吉行又可見兊以上爻為主主外卦以澤濟水而蘇困矣巽下坎上井井與困綜困繼損而井自繼益困根乾而井自根坤矣蓋困困于無水井養于有水也水之為物陽為體而隂為用故無水則貴陽有水則貴隂陽盛而源通又必節其隂用之流而體用兼資矣然則益而繼井亦有取于損上益下而後井養乃不窮也是以井之象義重在因井之水以為養因民之利以為利惠而無費益下究何嘗損上乎故益繼乎恆以益下為恆久之道井又繼乎益以不損上而益下養民民養為上下交益之道也井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖辭曰改邑不改井知為恆久之道不止改邑井不改即至改玉改步而井猶是則益下養民之道亦終古如此而已惟其損上而實未嘗損上也雖為益下而實下之自有益也以是養民無喪于上無得于下上下相養于天地自然之氣化以是生人者即以是養人作之君者不過奉天行政經理調濟所謂無為而天下治矣試觀天下之資養于井者往者往來者來無不取給于井也然各有各井井井之義象也即公共之井先後往來滿志而去亦井井之義象也是井之養人人各自取其利分田制井而後上之責盡惟聼民或各井其井或共井其井以受井之益而自為養矣何庸損上乎但不至于取之非道用之不經幾至未繘而汲井羸其瓶斯可矣羸瓶即羸羊之羸落瓶于井之謂也瓶之落井必由于取井大盈或繘井太深耳慎之勿羸多汲不如少汲急汲不如緩汲善取以養井者即善自養也如此何至于凶乎惟意在多取又急不暇用繘以致瓶之羸也罪不在井明矣必次第勿紊其序如法用綆為汲斯合于井養而且迪吉焉彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也彖傳釋卦名義曰巽乎水而上水井井養而不窮汲之用瓶亦必如法本入水而汲水使上良法也取水合法則致養于無窮不外于節取善取二者而已改邑不改井乃剛健中正之道也剛中亦似指水言水乃陽物天一之所生也故能以陽生物而終始無盡焉作君者以此道養民得君道而制民宜故能益下而不損上以天下之利利天下也又指卦五而言若急於取利至于亦未繘而汲井則無能得水徒羸其瓶求益于下反損于上矣按井之為字有中有一點者古人以瓶甕汲取象為井也然用桶用桔橰皆木也雖不知春秋時若何傳言巽乎水而上水則巽亦木之義象矣象曰木上有水井君子以勞民勸相象傳另申一義亦不出養民而重在經營于上焉木上有水井水何因在木上人用木巽進于水而取之使上也井之象義如是君子知井原為民自有之利民亦能自取然非上有法以制之則水不能自出于井既恐急取而敗物又恐其怠取而棄利焉於是觀于井而于經理井田民各分授之後勞其民而勸相勞其民如三時不違省耕省斂之類勸相如通力合作有無相資之類必使民盡力于畎畝然後能盡地之利室家取給既使民自為養又相助以為養是民之自養皆本于上之養民也胼手胝足有限而良法美意無窮矣此君子觀于井而取象義以養民也益之道也恆之道也共根于厚德載物萬物致養之坤道也放勳曰勞之易曰勞乎坎俱訓為休息勞民謂養民然以君養民不過不違農時耳仍是休息之意若發倉廪散府庫及養老恤孤諸政損上以益下者尚多究不可謂民必待君損上益下以為養損剛益柔有時益道也非恆道也故堯舜猶病于博施濟衆也勞字作休息言為妥初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也初六變為需之初九在需初以陽變隂為井繫以需于郊逺難之義郊為井之所宜需于郊亦需于酒食也利用恆井之道也初在下民象得養則可待矣故無咎在本爻以隂變陽為需繫以井泥不食舊井無禽者需乎修治耳初在井底有泥無害然水深則泥不礙水無水有泥不成井矣禽之居井在水之上舊井而頺禽避不居養人之井至于敝壞如此可安心棄之乎象傳曰井泥不食下也地之下濕斥鹵生焉水味醎苦非但有泥而已舊井無禽為時所舍禽且去矣是非淘其泥甃其井何以滋養乎此意自在言外所以爻傳皆不言吉凶吉凶在人明矣九二井谷射鮒甕敝漏象曰井谷射鮒無與也九二變為蹇之六二在蹇二以隂變陽為井繫以蹇蹇王臣匪躬之故不畏蹇而苟安故忘身以思濟也惟其變陽故能振作有為耳在本爻以陽變隂為蹇任井之傾頺不為井而為谷矣其水微存鮒魚生焉人不取水且來射鮒失其養之利矣有抱甕而來者又敝而漏不能得水之利皆二安于隂柔怠廢失陽振動之象義也象傳曰井谷射鮒無與也變艮為止止而不能巽水以上水故無有與之者也與者來取井水而求利也井既頺矣水既濁矣誰肻與之則慎修美利之意亦在言外勉之然較之初其井修戢已稍易矣九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也九三變為坎之六三在坎三以隂變陽為井坎且變井故云來之坎坎入于坎窞是耽于險矣何用乎在本爻變陽為隂為坎以井變坎水深潔可知然人以為坎也故不食三之心能不惻然于其井乎試先自汲而嘗之以獻于王王之明也必亨其甘潔與王共受利膺福也惟其居險人疑而不食獻誠則人信矣象傳曰井清冽無人食行惻也行者亦惻然憐惜也求王明以亨于王必受王之福也其實自受誠心之福耳三之井不用修治而人不食先自食以亨王矢乎誠盡其力以求義為利焉則王並受福且為王錫之福矣以上內卦三爻巽體巽乎水以上水者不能如坎之井深而水美故初井泥二井敝三井泄而不食然漸近于坎可以亨王王為外卦之五也主乎卦者也三與五同受福于井井之養物上下俱沾矣然在巽則初為主爻井雖有泥井之本也即修井亦必自下始故不可以之主內卦也二三兩爻附初為象二變艮止則無與三變坎水則受福井之貴于進而求美利也明矣六四井甃無咎象曰井甃無咎修井也六四變為大過之九四在大過之四以陽變隂而濟本末故棟隆得吉在本爻以隂變陽為大過變陽不能濟隂故其井亦須甃方無咎矣象傳曰修井也蓋甃井堅固可久不致易傾矣此爻附五坎下之隂爻甃井以養物陽賴其用者也九五井冽寒泉食象曰寒泉之食中正也九五變為升之六五在升五以隂變陽為井繫以貞吉升階者德隆位尊以巽為升有取于井之象義也在本爻變陽為隂為升主乎井卦以一陽居坎中體陽用隂以養民井冽而寒泉可食乃甘潔之泉美利利物者也井冽寒水為太陽也用以食人則隂利之美者象傳曰寒泉之食中正也歸于五之中正以隂為用而究以陽為體坎水非中陽不成井卦非五陽亦不成也此爻主乎本卦是養民之主其井乃合天下之井以為其井井可食萬民矣學者知此而卦象之言偹矣上六井收勿幕有孚元吉象曰元吉在上大成也上六變為巽之上九在巽上以陽變隂為井過于巽而處極巽在牀下居上而巽牀下人必侮之喪其資斧不能行也貞固以巽是為凶也本爻以隂變陽為巽居井之上宜節其用將收井禁汲乎然井不可收也但勿幕聼其渴者自取惟有孚于中焉則陽足而水自不窮仁心足而利亦無費元吉之道也當井上而言有孚孚于五耳五乃君位上居其上代人君施惠心也陽體用隂故令上隂濟陽為用斯用養而不窮也四上兩隂皆貴附陽上又在井口足以屯膏故示以有孚于君以敷惠于下也蓋虞廷之納言後世之相臣也象傳曰元吉在上大成也以隂濟陽養乎萬民君臣道合隂陽道濟天地之氣化人事之政治皆大成矣即一事一物亦不敝不傾成其為自然之美利取用以永終矣外卦三爻以坎水合巽成卦故于上爻言大成統一卦而言成養之道也然在坎則以五爻為主爻非五之寒泉冽而可食上何以言勿幕而普施利澤乎故上雖示井之終義其有孚即五之孚也君有仁心上方能佐君而行仁政且孚本于中非附五何以有孚乎此五所以主外卦且主通卦焉大易通解卷九
