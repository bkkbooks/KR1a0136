body:
  text: 大易通解卷十三江常鎮道魏荔彤撰繫辭上𫝊天地間原有一部現成易經聖人照樣畫出一個圖來伏羲所畫八卦便是當日不知果是因河圗畫底否孔聖不曽說祗說是河出圗洛出書聖人則之繫辭上𫝊首章亦不曽說河圗但說聖人畫卦是因見天地現成氣化於氣化中㑹得道理於道理中生出奇耦於奇耦中生出八卦於八卦生出六十四卦這個天地底氣化道理俱在聖人所作卦畫之內矣若是人人是聖人聖人何必作易若祇聖人一人在天地間聖人亦不用作易聖人作易要將天地底氣化道理曉示天下後世之人所以作易耳伏羲畫卦從一箇天地中看出兩個來又在兩個中看出四個來從此看成八個便將天地萬物根本俱畫在八個裏了再推衍出六十四個來萬物萬事底本末終始盡矣首章孔聖所指之聖人是伏羲禾曽說到有文字祇說底是初畫卦爻有天地便有乾坤有乾坤無六子祗說底是個氣化根本有六子而氣化之終始俱備矣有八卦祇說底個氣化根本終始有六十四卦而萬物萬事之終始俱備矣啓䝉雖言還可再推衍出無數底本來然聖人豈知不及此祇是六十四卦恰好而已天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣天尊地卑便有乾坤然天地中間天之上地之下有若大底所在非六爻不能象之故六爻盡三才之道高卑以陳中列六爻貴賤之位是連三才俱取象也動靜有常是現成天地自然之體剛柔却自聖人看出斷者分成兩個也方以類聚物以羣分俱就人目所共見底物事說方即四正四隅安置卦位之處物即畫爻成卦取象於乾坤六子各成一物但既有二物便有此六物有此六物遂有萬物有此萬物遂有萬事萬事萬物各類各羣類則各向其方而聚羣則各隨其物而分於是隨分聚之順逆各自生吉凶矣未有卦爻以前吉吉凶凶不知若干聖人畫卦時俱推究出本末終始來于是萬事萬物俱包括在六十四個大式樣裡其中又有三百八十四爻每爻一個小式樣大式樣是領綱小式樣是條目吉凶悔吝再不能越得出矣况且神而明之存乎其人引而伸之觸類而長之就這六十四個綱領三百八十四個條目裡而又生出許多吉凶悔吝底象義來未嘗不在天地間萬事萬物中但有聖人之卦爻方有了綱領條目使人知道趨避所以說吉凶生于類聚羣分中也類聚羣分上古之世便如此祇為天地氣化原是如此不但人已也至於飛潜動植有情無情各聚其類各分其羣不必說俱是隨著氣化為聚為分了在人物雖然類聚羣分不知將來吉凶如何聖人之心氣化道理俱了然明白畫爻成卦取象使人人皆得明白此聖人作易之苦心為天下後世開物成務也但天地氣化時行物生本自有常聖人之畫卦作易何以變化不測不知天地至有常而無常者也在天成象者動之常也而成象之大者日月星辰自古及今無一定之度數即如天與日㑹日與月㑹有定期而以嵗差論天差而左嵗差而右何能定乎在地成形者靜之常也更無一物有成無敗有生無死矣亦更無一物死而不生敗而不成矣是天地動靜之間有由動而靜者有由靜而動者由動而靜靜變為動矣由靜而動動化為靜矣聖人畫卦其變化莫測也蓋見天地之動靜有常而變化不可知也是卦畫變化亦可於天地見之也可見伏羲畫卦作易俱就天地現成底氣化道理推衍出來垂示天下後世無一非聖心作成無一非天地所固有也剛柔既斷成兩個然兩個未嘗不交于是相摩為交遂從兩個中摩出六個來是為三男三女因成八個又于八個中交相動蕩蕩成六十四個來皆是聖人見天地事物氣化道理是如此故畫卦亦是如此這六個是氣化最易見底雷霆也風也雨也日也月也不說山者山即該在地內矣雷霆是鼓動萬物底風雨是和潤萬物底日月是運行寒暑昭明萬物底山是界限地上萬物底天地氣化原有此六者聖人以乾坤象天地以六子象此六個氣化之終始乎萬物底俱備於卦畫中矣至於萬物雖盈滿天地之間然不過剛柔兩個相交生出來底有乾之卦畫則有乾之道理凡氣化本乎天之剛者俱可謂乾道所成而為男也有坤之卦畫即有坤之道理凡氣化本乎地之柔也俱可謂之坤道所成而為女也萬物雖衆剛柔盡之剛柔難明男女辨之俱因乾坤之道是現成可以體㑹底故有卦畫而天地萬物之氣化俱在易矣氣化如此其主宰氣化底亦即在卦畫中寓焉乾之卦畫其中道理能主宰乎始物之氣化一始無不始也是乾知大始也坤之卦畫其中道理能興作焉為成物之氣化一成而無不成也是坤作成物也于是天地始成萬物底道理亦俱在聖人卦畫中矣總是聖人之心聰明睿知能體㑹昭然故畫出卦爻來以示天下後世耳但當日伏羲時畫卦尚無文字一竒一耦摩蕩出卦來爻來天下後世之人如何便得知如何便能行却知卦爻中底道理即是天地之道理天之道理甚平易也是以乾之卦爻道理亦甚平易地之道理甚簡約也是以坤之卦爻道理亦甚簡約既是平易有何難知既是簡約有何難能天祇是個生物底氣化道理而已地祇是個成物底氣化道理而已且一生而萬物皆生一成而萬物皆成何等平易簡約乎所以乾坤卦爻中雖無氣化却有主宰氣化底道理知得個生物道理便知學乾矣行得個成物道理便知學坤矣知至易則無紛擾于心行至簡則無繁雜之事所以易則易知簡則易從也聖人示天下後世以所畫卦爻原令人知之從之既是易知易從人豈肯甘于不知不從乎若有知之者則人皆有親如有從之者則出必有功人人俱要知這個道理有知之者豈不來相親近乎人人俱要能這個道理有能之者豈不成事有功乎人人親近自然得久逺安和矣事事有成自然得功業廣大矣可以久逺安和是賢人學易不徒知道理而已自有得於心而為立德之本也可以事業廣大是賢人學易不但將這道理成已且兼成乎物而為建業之用也能知從乎聖人之易便有這般效驗賢人可以漸成聖人矣何非聖人開成之乎原來畫卦爻之聖人乃天生至聖心中道理已有一個天地在內所以將天地易簡底道理先得於心而天下萬事萬物中底道理自然俱得於心矣方能看出天地萬物氣化道理有現成一部易經於是盡在卦爻畫出聖人雖亦是天地所生然天地無此聖人竟成兩個塊然之物必有聖人生於天地之中成聖人中立之位而天不徒覆於上地不空載於下皆賴聖人之心明其道理成其德行而且調和其氣化之過不及也天地尚如此萬事萬物何一不賴有聖人生成之開示之於此全性情於此立性命乎此伏羲畫卦為有天地後必不可無之聖人也右第一章聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利先天之聖人畫卦已有文字其卦名自是伏羲畫成時立底然亦無所考唐虞之世自然尊奉三代以來各就其卦畫編次成書故有夏首艮名連山殷首坤名歸藏之易有卦辭爻辭否亦不可考若無文字或者如朱子所言上古之人就卦爻中可以觀出吉凶然夏曰連山殷曰歸藏即是文字矣或者周易既成而夏殷之辭俱廢如朱子本義立於學官而羣言存亡今皆不論也或者周文王又就二代易中重為刪正編序並先天卦位亦移置一番矣于是每卦繫之以彖辭周公又于每爻繫以象辭因革損益蓋俱不可考也孔子讀易韋編三絶既將伏羲畫卦爻時道理叙明乃叙文王周公繫之以辭底道理殆在周言周從周之義也先天後天之聖人作易之始道理得明方可于易中求明其無窮之道理也伏羲聖人畫成卦爻文王周公兩聖人陳設此卦爻于前詳細觀其剛柔摩蕩成八成六十四底形象就形象中觀出道理來於是繫之以辭以明虛象之實義使人知如此而吉如彼而凶此後天聖人開務成物示天下後世以學易也首章說吉凶生者乃吉凶之所由生此章言明吉凶乃吉凶之所以明也所觀者何象乎亦不過就先天畫卦時則柔既斷更相推移而生變化變化雖無窮盡該于六十四卦三百八十四爻中後天聖人之辭觀于此而心與心相通理與理相㑹氣數與氣數相應所以為吉為凶俱明著焉雖後天之成終亦自先天之經始來也非經始而有卦爻之象何以取象而有吉凶之辭乎是故辭有吉凶者觀于象之得失也辭有悔吝者觀于象之憂虞也此辭之生于象也然先天之象何仿乎先天之取象取象于卦爻也知剛柔之變化無方取進退以象之也知剛柔之進退有定取晝夜以象之也且于三才之間推乎至極莫不有道難于取象乃以六爻之動象之故六爻之動乃該乎天地人三才之極也此先天聖人畫卦爻以明三極之氣化而道理亦兼明于內矣學易之君子當今日有先後天之聖人畫卦繫辭作此易亦幸矣哉故其靜而居也不外于易也安其居于易之序而已矣本義謂序乃卦爻所著事理當然之次第極是曰安于序者靜居原為行動之本也若有所得而樂也必亦深玩而樂乎易也寄其樂于爻之辭而已矣曰樂而玩者得于心而可以措之于事也此俱君子平素靜深學易工夫豈有體無用者哉君子靜居則觀其象而玩其辭所以有事而卜或卦動或爻動則就其變而觀之就其所得之辭而玩之以定向背行止其道理已熟悉于心自從而弗違有吉無凶如易大有所繫之辭自天佑之吉無不利也非天佑也易佑之也非易佑之也道理佑之也先後天之聖人既得萬事萬物道理包括于易中而分著于卦爻之內君子靜得其理動合其道有不大吉而無不利者乎究為學易之君子自求多福耳右第二章彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之再就聖人之繫辭論之文王繫卦辭為彖言乎一卦之全體象也周公所繫一爻之辭為象言乎本爻之變動者也蓋揲蓍之數老變而少不變九六變者也七八不變者也故爻有九六無七八老變而後有九六有九六而後繫以辭以明其變也所以占易不止卦有參玩貞悔之象義更每爻皆有參玩貞悔之象義也于是觀辭之吉凶可知其言人事有得有失矣觀辭之悔吝可以知其言人事有小疵矣觀無咎之辭可知其言人事貴于免咎以補過矣以所占之人事合乎卦爻之象義得其道理則吉失其道理則凶小失則悔吝有疵失後復得則可以改過無咎何一非聖人繫辭之開成然亦貴于學易者之能體㑹而善遵循也蓋繫辭之聖人述而不作一本于卦畫自然之象以申其義也辭有貴賤而列貴賤之不等則存乎爻之位也辭有大小而齊大小之不齊者存乎卦之體也列位如五為君二為臣上為終初為始之類大小如隂多陽少陽多隂少貴隂貴陽之類此先天之卦畫已定之于伏羲明其象數而為吉為凶則存乎後天之辭明其義理也占易者能先觀象而後玩辭得悔吝之辭而憂之則心之幾隨象義而動于內趨善避惡存乎一念取舍之間而已介間也得無咎之辭而震之則事之理隨象義而著于外遷善改過存乎一念修省之悔而已此先後天聖人作易為學易者明體㑹遵循之方也再卦不一而有大小之不同辭不一而有險易之不同如大畜小畜大過小過剝復夬姤等卦皆大小之迥不同也而辭之險深平易又皆因卦因爻而立平易者未嘗不中具精微深險者未嘗不開示明切苟能體㑹卦爻之象義則辭也者不過各指其所之易者固易明而不可忽險者亦無不可明而不可置不外究研而自得耳以上二章雖分亦可作為一章所言皆有卦爻以後文周繫辭以作易前民之故令學易君子觀玩而得用易之道耳右第三章易與天地凖故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之說精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體畫卦既明其本源繫辭復示明其根柢然後可明易中之道理矣易之道即天地之道也先後天聖人原將天地之氣化道理既象之于卦爻又各繫之以辭是易之為易與天地凖也天地之體如是髙明博厚悠久而易之體亦如是天地之用如是資始資生乎萬物至于無終無始而易之用亦如是易一天地也天地一易也無二氣無二理故無二道也且不惟凖其體用而已又更能以易之體用體用乎天地以易之體彌補乎天地之體而充周于無間也以易之用經綸乎天地之用而條理各足也是天地之道備于易者皆易能補天地之憾而代天地之勞也天地有此氣化有此道理無易以為發明天地不能自言百姓日用不知天地之道亦徒存將虛而無所托矣故有聖人作易而天地之道體斯立于平易簡約用斯行于可大可久也是皆易彌綸之也又不止彌綸天地之道也更開示聖人之道使人學易而欲窮理者有易而以之仰觀天文俯察地理皆在易中則知天陽剛而主乎明地隂柔而主乎幽幽明之故不可以天文地理察之乎天文日月星辰之運行也地理山川人物草木之生植也剛柔各分而又交際不離上下各覩而又升降無息知其分才知其合幽明之故既得則原其始反其終死生之說亦皆得知矣由幽而明以生也由明而幽以死也原始于終而萬物有始矣反終于始而萬物有始矣究之物有終始而氣化無終始由于道無終始易既備乎道之體用何不可究研之而大明乎既明乎幽明死生則鬼神之情狀亦可得矣凡天地間飛潜動植之物皆精氣凝聚而生者也但所凝聚有厚薄故所成之物有久暫大槩成形屬隂隂氣盛者成形柔而小陽氣盛者成形剛而大生氣者陽氣也原與隂精凝聚成形如脫離焉則隂之魄入地陽之魂浮遊遂離于形之外是乃謂之變也變即死也不言死者非諱言死也變而將以復生也豈釋氏輪回之說乎非也釋氏輪回之說有考核功過轉生善惡等論失之太鑿易之言遊魂為變是就生人生物之氣原始反終言也至於遊魂之有知無知則未嘗言也究之形既與神離矣魄云入地亦隂氣之初離形與陽離散而隂親下故下降入地耳同于魂陽氣之初離形與隂開散親上而上逰也故言魂魄者皆就物言其隂陽之氣凝聚者至此離形各散而已知此則鬼者遊魂之濁而薄者也神者遊魂之厚而清者也如生人生物之氣資有清濁厚薄不同也知生人生物有不同則人物之變有鬼有神亦不同可知矣既知鬼神同于生人生物鬼中情狀不可並知乎為物者有情為變者亦有狀知有賢愚故情有靈蠢氣有盛衰故狀有巨微皆氣之所凝聚成形既離形而未遽開散者耳然終亦必開散歸之天地天地又另凝聚而生人物矣似與釋氏說同而非如彼執之太實似既淪于無而實滯于有也但其中有可疑者有知之物亦衆矣禽獸亦有生死獨人乃有鬼神乎無知之物更多矣草木亦有生死聞草木有妖或久而成神亦生物耳未嘗聞其死而有鬼神也易之言精氣為物遊魂為變該萬物而立言何以獨就人之生死可知鬼中之情狀乎此如孔聖答子路未知生焉知死之說只就人之靈以該物之蠢凡物有情自有鬼無鬼方無狀所以生有精靈死有鬼神物之理氣亦相通于人矣自必初死未散亦有鬼最靈亦有神也乎鬼神作二氣之良能言宋儒之論也祭祀之鬼神謂之鬼神中之一鬼神分而為二氣矣祭祀之鬼神又謂其中之一然則祭祀之鬼神雖有隂有陽祇為鬼神中偏在隂中一邉者耳愚謂祭祀之鬼神皆鬼也皆遊魂為變所成也就鬼中之靈爽尊貴者則謂之神耳如謂神為陽亦就隂中分隂陽不與人物同其陽也再繹中庸內鬼神之為德其盛矣乎通章似俱是說祭祀之鬼神但就根源說起乃知首二句為二氣之良能言也此章言鬼神情狀本義云隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也兼論神鬼人物矣蓋鬼神情狀易所明言者亦將人物鬼神合論總歸之於隂陽氣化人能以易言情狀與中庸言德盛對論則大合也此段聖傳從仰觀俯察說到幽明又從幽明說二氣之始終以為生死末段方分精氣為物遊魂為變為二尾結說到鬼神之情狀是要將鬼為幽為死神為明為生二者分剖個到底而後將二者歸一氣行理寓使窮理者研求到此方為物無不格而知無不至耳若專言鬼之情狀則似為齊諧之志怪也故姑置之神者來而伸也鬼者往而歸也就二氣說鬼神是鬼神已該隂陽生死矣但人物原與鬼神相對一隂一陽今將鬼神說成兩個神來而伸也人物亦來而伸也鬼神與人物難分矣愚謂鬼神二氣良能即氣化也宋儒名之為鬼神正此章所謂鬼神情狀也若單言乎鬼又在隂中分隂陽須將神謂為隂中之陽鬼謂為隂中之隂方可對待人物也人死為鬼鬼之精潔靈明者為神如人類中賢愚物類中靈蠢耳至于魂遊魄降之說魂陽魄隂亦是在隂中分隂陽魄隂內必仍有微陽魂陽內必仍有微隂耳不然並此魂魄亦無矣惟隂中有微陽陽中有微隂所以尚遊聚而成魂魄徐徐方消散為無如火之已熄烟尚有形少時方散而已然則天地間之有鬼神皆遊魂而已其魄降而入地矣且隂中之隂必更冥晦無知不能自致聲靈故人無所見聞惟遊魂尚在人間為神為鬼各以清濁厚薄分類乘隂盛時能見形能作聲或于無形無聲中昭靈示異惟其隂中之陽氣未盡故尚得浮遊此遊魂為鬼為神不同俱為隂氣無二也既為隂氣則與人物之陽氣方相對待然後可以謂之來而伸者神也往而歸者鬼也兼人物鬼神而言二氣之良能也要之既成一物必有兩在無兩不成一矣及其氣盡則消歸烏有氣未盡者為神為鬼各因其氣之盛衰以為久暫亦如人物之生死然亦終無氣不消散之鬼神也商俗尚鬼原兼鬼神神亦名曰鬼正是與人對言隂陽故愚謂伸而來者人屈而往者鬼鬼神者二氣之良能此語並可與下章一隂一陽之謂道作注往伸神來屈鬼此神乃精氣為物中人物之神耳俗言新鬼長大舊鬼矮小亦似有理蓋久而漸小漸無也又俗言不正命而死者有鬼正命死者無鬼年壯氣盛卒死者有鬼年老氣衰久病死者無鬼皆有理之論也中有為神者必其人生時陽剛强毅之氣居多正直英爽之情素具者也再如忠孝節義持念至堅不得伸志抱痛而歿自是英靈不散而為神矣左傳云神者聰明正直而一者也無此一則不成神有此而純乎淳者尊而久參以駁而漓者卑而暫也鬼有厲鬼神有正神皆其氣一而聚者所成也其中又有不朽之神則必有不朽之德不朽之功垂于世也此又因人心之推奉不忘故其神靈爽不昧如斯之神亦不易多得矣或有疑曰人生于精氣聚矣歿而有為鬼神者矣鳥獸草木無不生于精氣之聚何不聞有鬼神此可以孝經明之孝經云天地之性人為貴天地生人天地精氣最靈最秀者聚之于人而鳥獸草木不能與人相類也人在生時即成位于中而輔相裁成乎天地故死而為神為鬼尚能于天地間作影響昭功用可見可聞若夫餘物生時其知識原自十不及人二三死何能復有靈明為神為鬼乎或又有疑曰如此則人死為神為鬼孑然一物之外無復他物矣何鬼神亦有車輿宫室衣服儀物之屬龍虎蛇龜犬馬牛羊之類乎不知此等多妄誕之傳言耳縱然有之乃其類中之性獨靈而氣稍清者耳其無情無識者則神之靈氣所幻成也亦無足異也若莊子火盡薪𫝊之說釋氏以之言轉生然莊子本意從古謂是帝之懸解來亦不與釋氏同即如所說火者一念之靈明也此薪盡而火𫝊于彼如轉生之遞𫝊也但氣在則靈明方在如氣已散靈明何所附麗乎薪必稍有餘燼則可𫝊于他薪如已為灰尚何𫝊火乎愚謂縱有轉生者亦隂中陽氣浮遊未盡故靈明得以寓于內而復形神歸合耳天槩人死為鬼為神為轉生為消滅不出此論一主乎氣之聚散則莫能外也不觀聖人之論乎禮祭儀載子曰氣者神之盛也魄者鬼之盛也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也聖人之言神鬼至矣其首二句則非宋儒二氣良能之說也其言氣者即遊魂也魂為陽氣未盡故曰盛也魄言鬼者鬼為隂也魄入地者不能為神鬼挾其陽氣發揚于上即遊魂也為昭明焄蒿悽愴者即遊魂之靈明也乃其人物精氣之未盡故曰物之精也能有聲靈使人焄蒿悽愴是其神靈之著見者也此神字是就其靈爽言愚謂魂入地不能有聲見形必遊魂為神為鬼方能有聲形昭靈異也蓋本于此至于鬼神之精而著者原該百物有情之物亦有神鬼可知矣故聖人言神之著也神之著神字是物之精氣變後既為遊魂結而未散者此神乃就鬼中言鬼神也易以窮理至于天地幽明始終生死精氣遊魂為物為變鬼神情狀無不窮焉可謂理無不窮焉矣聖人以易窮理如是然聖人盡性亦以乎易也以易則易簡之知能即天地清寧之理也蓋聖人之性即天地所命也率之為道即與天地相似也何違乎以此性率為道者用聖人之知以周乎萬物用聖人之道以濟天下自有大中至正之則也何過不及之有先言知周後言道濟者先知事物之理後以道濟天下也用此大中至正者經也又有逹權之用旁行而不出于經故不流固能道濟天下也然即道不行有天命之性在全而畀我者全而歸之故無所入而不有自得之樂是樂天也在我性已盡人不我知命之不遇道或不行復何憂乎但又非道不行而成已不能成物也素其位而行安土也崇一心之理廣推暨之量不能行其道以濟天下亦能存其理以敦吾仁吾仁既敦推而致之親親而仁民仁民而愛物皆仁之存心為德及物為愛者也窮達顯晦雖異而性則無不可盡也此窮理之後用易以盡性性盡而倫盡物盡能用易而仁愛乎天下有餘量也聖人以易窮理盡性即天地生成終始萬物之命亦可用易以至之也聖人既能窮理復能盡性知極義之精行極仁之熟矣皆于易中得來仍用易以為矩而範之用易以為方而圍之則天地之化亦不能過矣氣化在天地而聖人用易以為範圍即位天地之說也更能用易以曲成乎萬物而無所遺天地之氣化不過萬物自能曲成矣亦是聖人用易萬物所以能曲成此育萬物之說也此聖人至命之學也然非聰明聖知達天德者烏足以知易而用易乎惟聖人能通乎晝夜之道以為知則理無不窮于知性無不盡于行也且理之本道也道之原天也天道以道為體以命而生成萬物也如學易者由理求性由性求天求命則于命亦可以㑹其體而達其用也此之謂至命也何非深得乎易之道乎以此論之聖人垂教原令人神明易于無方無體者也何也易之道原自廣大悉備變化無窮而不可盡以爻象之變理道之精盡之也有至神者在變化爻象理道之內而不滯于其間者所謂神無方而不可測也不可測者非易盡能擬議故惟示天下後世以至變至精其無方者在人神明也是易雖有一定之書實無一定之爻象道理也亦如神之無方而已易何嘗有定體哉學易者窮理盡性皆學易之有方體者也非極乎至命不能得神無方易無體之體用也學易者可不勉哉李云此章言鬼神得未曽有可謂發明先儒前所未發者矣右第四章一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神聖人用易以窮理盡性至命因易之道本凖乎天地也然易者因神無方而易遂無體也何以求其方體乎仍以天地之道明之天地之道一隂一陽之謂也隂陽是氣化而一隂一陽遞為體用交際無間則道也生天地是此道生萬物者即此道故道之體本于靜也由靜而動將此繼天地之道而生人物也由天地之道立極于靜者動而生人物乃道之至善者也此至善雖兼理氣而言然尚屬天地未著人物偏主在氣氣動而理與俱行也謂之至善者天地之太和元氣無偏駁無乖戾之故也于是人物得之本以為生氣以成形理亦賦焉人得其全物得其偏此天地之動用而又為人物之靜體也此所以各成其性也既莫不有性性發為情又由靜而動矣在天地之道靜以立體者動而生萬物以為用及人物成形成性又得天地之動用以為靜體而各發知能又各行其動用矣動靜互根體用無二之理氣也于是天地之道在人物人為萬物之靈然後獨膺𢎞道之任矣善就氣言難明者兼理以言氣而大明矣専論人之性難明者兼言氣質亦大明矣兼物之氣質難明者專論人之氣質更大明矣人之氣質有過于清而得天之理氣多者則知者也有過于厚而得地之理氣多者則仁者也與上章所言仁屬地知屬天無二義也上章言樂天知命故不憂知命固知也樂天則非仁者不能也安土敦仁能愛固俱為仁矣而愛有差等非知乎且上章所言成德之仁知知不外仁仁不遺知也此章所言人生氣質各有所偏仁知之發端也天地之道本一生人成性亦本一而分知者仁者各兼氣質之性以立論天命之性至一者亦不能不少異所以論語云性相近也亦兼氣質以言性也是故偏于清者知之裕也率其性而多知之道偏于厚者仁之篤也率其性而多仁之道固未嘗自以為此吾知也仁也而立體兼氣質者稍偏自然發而為用亦歸稍偏矣謂之知謂之仁就知者仁者各成其性因而各見其所得于性者也百姓庸愚雖皆有性性亦有仁知但日在天地道中而不知道雖生有性可率為道且不知吾性中即有天地之道又烏從而率之見知見仁乎是以君子中庸之道民皆鮮能而𢎞道之任不得不歸于君子也何不觀之天地之氣化乎言理言道難見言氣化則仁者知者及百姓共見共知矣試觀其發生之顯也似知者之致用也然顯者之動用本于靜體是顯者顯諸仁也仁存乎靜以立體然後顯而為知之用也再觀收斂之藏也似仁者之存體也然藏者之靜體將以動用是藏者藏諸用也知盡乎動之用然後藏而為仁之體也一顯一藏一動一靜明是一隂一陽之謂道也此乃鼓萬物而始之終之終始于無終始者也俱出于天地之無心而不同聖人位天地育萬物有心以立體致用每多憂勤惕厲也所以天地之德極其純盛體之藏也其業極其𢎞大用之顯也盛德大業蓋至矣哉然天地一氣也何謂大業蓋自天之下地之上無非天之所覆地之所載萬物無不生成于天地富有如是業之大為何如皆其仁之顯者主之也又何謂盛德自古昔至今日無一日不生物無一刻不運行萬物無不隨氣化為變化日新如是德之盛為何如皆其用之藏者裕之也此天地之德業即天地靜仁動知之體用即天地一隂一陽之道為存為發者也于是作易之聖人體㑹天地之道于一心盡易之道于卦爻以乾坤象天地以諸卦爻象萬事萬物易之盛德大業顯仁藏用同于天地無盡者同于天地生生不盡耳天地之生生不盡者氣也易之生生不盡者理也天地之氣中無理乎非也有理而不能示之于人也有聖人之易然後天地之理氣俱大明天地之道始昭然矣聖人以易備天地之道故能用易而窮理盡性至命無不如其心之所求而皆可自得也于是乎天之道成象于上者自有易成象之理氣俱屬之乾矣地之道效法于下者自有易而效法者俱屬之坤矣成象乾在天成象也效法坤在地成形也不言成形而言效法效即呈法即形之燦陳者耳故既有乾坤為上下成象成形之根則天高地下萬物散殊無不歸于易矣歸者歸其道理于易也是蓋聖人作之令賢者學之令庸衆占之可以極乎象數之變化而知未來之吉凶也且可因其變化通此于彼焉變彼為此焉天地之間事物無窮而易之卦爻亦通變于無窮是以易應天下事物而有餘也雖然可知者因繫辭以求卦爻因卦爻以究形象因形象以察隂陽因隂陽而思交際極深研幾可謂盡其智力矣而隂中有陽陽中有隂本一個而為二為四為八為六十四已不可盡矣况六十四仍是八八仍是四四仍是二二仍是一是萬事萬物無不一中有二二中有一更何可測乎無乃所謂神無方者此道耶天地之道隂陽可知可名可測然有不雜于隂陽而又不離于隂陽者則不可知不可名不可測也易亦如是所謂神無方而易無體也至此雖聖人猶以為不可測而以易之無體以擬議其無方豈學者于有方體中可求道之至神者乎或于易之無體者漸㑹心焉庶道之無方至神得以漸通耳右第五章夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德天地隂陽之道俱歸于易而不可測如是蓋易之體用俱同乎天地故能德業與天地無二也夫易殆廣矣大矣乎何也其用無逺不届也言其用之逺則無有可以阻禦之者此易之有元而無不亨也是有體乎其體者也然其體又至邇而求之即得也言其體之邇則靜存于內而大中至正焉此易之無不利而永貞者也是以能致乎無窮之用也以此論之易之廣大凡天地之間所有之事物無不備于易之中矣惟其理備于易中故事物不能外也此易之所以為廣大乎易之體用每卦每爻皆有而以乾坤為體用之統㑹乾之體靜而專也動而直也專就統天言專統乎天而已直就資始乎萬物言直一始而無不始也故大無大于乾其實自統天之一元而生乎大也坤之體靜則翕動則闢也翕就順承言無所為而順承乎天而已闢就成物言闢而作成萬物一生而無不生也故廣莫廣于坤其實自順承乎天之元而生乎廣也是以天地之廣大易足以配之也天地有四時而乾坤之體用一動一靜動靜互根變動莫窮足以配四時之錯行也天有隂陽而易中之剛柔交際往來出入足以配日月之代明也此皆易之用也至于易中易簡之理原得自于天地而畫之為卦繫之以辭以盡乎理之極斯盡乎善之至足以配天地之至德焉此易之體也體立而用行故功能廣大于莫量耳此章與下章亦可合之為一右第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門易以易簡之善配天地之至德則易之善其至矣乎功能之廣大由于至善之理俱備于易中者極其至也有此至善者可以立德可以建業又為聖人用易之學也德欲極其高明聖人用易以崇之業欲極其逺大聖人用易以廣之蓋雖聖人用易而實聖人自用其心之知身之行也用知以崇德聖心之知本極其高明用禮以制行聖人于禮本自處卑牧此聖人用易也即用天地也崇效天之高明也卑法地之博厚也故聖人與天地同德業與易同易簡也所以天地設為虛位聖人作易以實之有易行于天地之中而天地之道方可知可行有親有功可久可大也然聖人何以能如是乎聖人不過自成其性而已性命于天聖人得而成其性成性者全而畀之全而成之也而又必時時惺惺存之又存與為終身所以體立于一心而用推于無窮效法天地者此性也措置道義者亦此性也故成性之存存乃道義之門也旁出各當肆應咸宜老氏謂之𤣥牝衆妙之門亦有合于易哉此言易同天地聖人用易其成性亦如天地體用皆無二也右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也再就聖人畫卦繫辭明其已備天下事物之理也聖人見天下事物之至賾也而其中皆各有一理于是以聖心之理擬之象之擬諸其形容似指在天成象言而在地者亦在內象其物宜似指在地成形言而在天者亦在內擬形容必盡得形象之所以然也象物宜必盡得事物之當然也此所以畫卦取其象而明其義于卦也不謂之卦而謂之象者此一卦之象在是義亦在是也取乎事物之立體于靜也及其各體立而用行也則天下之動也賾者各立一體動則交致其用矣聖人見其動而相交雖各有一理無不歸于道之中也于是觀其衆理之㑹合為一理者又觀乎㑹合衆理之中而通貫為一道者聖人于此理此道觀之極其明行之無不盡用之于事物之間以為典則而可守也以為禮制而可法也聖人自用此理為道而又示天下後世斯為教也于何示之示以繫辭以斷吉凶所以有卦之中復有爻就事物之各立靜體交致動用研究其理而㑹通其道以著于辭也辭不言卦者爻卦之用也卦乃爻之體也言爻而彖辭自在故謂之象一句中矣既有象彖復有爻辭天下之至賾至動為理為體為道為用俱備于易也學易之君子明知天下之賾難盡也而不可以繁而生厭惡也明知天下之動難測也而不可以變而有紊亂也能法先後天聖人作易擬形容象物宜以畫卦觀㑹通行典禮以繫辭之心凡得占者將言也擬之而後言也言必得其宜矣將動也議之而後動也動必合于理矣則占者之擬議能奉教于易中變化無窮之理之道聖人作易以始者學易君子能終之以有成矣即謂之學易者成其變化之理之道可也此孔聖將作易先後天聖人開成苦心示天下後世學易得占者各知用易之方也此學易最切要之功夫也前章之成性存存是立體之學此章末節是致用之學既存性以立德更擬議言動以建業學易之理也即學聖人可以得至之道也以下七爻門人引夫子平日之論所謂擬議以成變化之比例也愚謂一爻是一個式樣于此更明聖人間嘗玩習偶有得焉即彰為教門人謹識之又見聖門弟子之善學而聖人循循善教也七爻聖傳釋義今統叙于下繫傳第五章咸四等十爻之前矣右第八章天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒于扐以象閏五嵗再閏故再扐而後掛乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣子曰知變化之道者其知神之所為乎易之為書畫卦本于河圗惟于此章似言之明切一氣渾淪者天也有何數之可言天自以數示人然必聖人能明之聖人既明遂欲以垂教天下萬世而氣之有數可推方自此始數之始起于一由一得二由二得五由五成十此河圗所肇示也然亦與畫卦為八不大相合逮至用之以前民用而有揲蓍之法則畫卦與河圗有源流本末得合一之數蓋原于由氣啓數之理出于太極之一也天地萬物皆由此一而生而天地又為自一生二之始故凡竒耦之數皆以天地貫之天一地二天三地四天五地六天七地八天九地十是也一自成五天生地成不外二生五五中各有二而已五各有二二又相交故天地之數各五成五位五位又各有合合者天中有地地中有天雖分二仍合為一也但河圗之總數五十有五何也五十者天地之相合為數之用也除五十存五以為數之體也此五十為用五為體體用分合之中天地之數盡矣于是自天地至萬物顯者為變化幽者為鬼神變化不測鬼神難知亦莫不該括于此數矣變化成人物屈伸行鬼神不外隂陽之二自不能外體用之五皆本于一氣氣中有理所以以本原該末流而悉盡也大衍之數用用不用體又復置一以為用中之體以四十九數分二象兩儀掛一以象三才揲四象四時再歸竒于扐者置閏也五嵗再閏三變三扐成經卦重之成别卦矣乾策九之餘二百一十有六坤策六之餘百四十有四共合三百六十數以應一期正合一嵗天日之運也又統計凡為乾為坤之餘䇿萬一千五百二十以應萬物之數也凡分二掛一揲四歸扐四營四也成易則五數足矣十八變貞悔之卦皆成遂成六十四卦之一也九變成貞卦謂之小成者內卦體生外卦用也本象天地時物然悉本于河圗之數故謂之聖人則之耳上章明揲蓍之法猶為有定易明者至于畫卦繫辭聖人之心則難于體㑹矣占者雖占得卦爻之象玩所繫之辭但引此喻彼以伸其義觸類旁通以長其智乃至無窮者也必能有得于易方能不拘于占則天下之功能事業有為悉成而畢備矣天下能事皆道之流行燦著然事不成道不見占者能用易則其道昭顯焉雖聖人作易皆德行之表見開示然非典要可拘必占者能用易斯其德行可神明之焉如此則占者之道即易道而聖道也占者之德行即易與聖人之德行也故可以應接天下萬事萬物任其紏紛來往至賾至動皆能時措咸宜如賔主雜遝酬酢不紊也不惟可以接事應物更可引伸觸類而神明其間偶有心思所未及皆若神來告可以為學並可以為教矣且佑助乎鬼神之英爽亦為占者之能事矣合人神以為能事洵備矣乎聖人復于章末明可以佑神之所以然蓋其能事至于知變化之神道則知隂陽反復固不測而皆有定理故吉凶禍福極難知而皆歸有定所以能佑神者以其知神之所為耳神果有為乎不過道理氣數順逆從違之所為即神之為而已即作易之聖人亦惟以此為能事占者何可不企及乎乾六竒爻每爻餘䇿三十六六爻共餘二百一十六坤六偶爻每爻餘策二十四六爻共餘百四十有四也合六十四卦奇偶爻所餘則萬一千五百二十耳右第九章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與于此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與于此夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也聖人示人學易貴得其要故復厯舉易之顯著深微以訓之易蓋有聖人之道四也隨人所欲以用易而無不可尚焉欲用易以為言則尚乎易之辭斯言寡尤矣欲用易以為動則尚乎易之變也斯行寡悔矣此該乎觀象玩辭觀變玩占言動如親承聖人之教誨者也或用易利用制器則尚乎易之象而器斯合道或用易以稽疑問卜則尚乎易之占而卜斯協吉此易中聖人之四道最為顯著者也然易更有聖人深微之道焉亦即寓于此顯著之間是以學易之君子亦不外四道以求易將有為也將有行也問以决疑定志焉必藉言以達其誠而易能悉受之以訓命如響之隨桴無有逺近如面命也無有幽深如示掌也未來之事物皆俾人前知以通孚其心志以利用其進止此易中理在而數存最精者也然非天下之至精孰能與于易之精乎理原至精天下無能與易之至精者有參于理者也易之理一元以統天而無所不統斯其精為獨至焉再就其變化論其卦爻或以隂變陽或以陽變隂或一爻獨變或六爻全變一卦可以變至六十四卦其中參伍其變者在爻則不可測度也且卦與卦相錯而六爻隂陽相反或卦與卦相綜而上下貞悔相易皆經卦别卦之定數也是錯綜其數者在卦又咸無定則也卦以立體靜也而錯綜則無一定爻以致用動也而變化逾見不測若能通貫乎爻之變化則剛柔交際來往上下章采煥然此天地之大文所以成也若能窮參伍極乎變之不一推錯綜盡乎數之無定則日月風雷山澤天地定位昭然此天地之間凡物之象所以定也此易中數行而理寓于至變者也然非天下之至變孰能與于易之變乎數原至變天下無能與于易之至變者有紊于其數者也易之數以一生兩而無所不生斯其變為獨至也易之至精至變如此然猶可以理數求得也更有不可測者易之為道靜則無所思也動亦無所為也常立體于至靜寂然無聲無臭而不動也及乎事物之來感者無窮皆主一為通通乎無盡天下之故至賾至動而易惟一以通之此理與數合為一而感與通協于道也乃易中之至神者也非天下之至神孰能與于易之神乎理數之不可知者原至神天下無能與于易之至神者或執理數為有定而實無定者也或以理數為無定而不知主乎至定者也易之理數以一隂一陽謂之道者為有定而一隂一陽隂陽互根隂中有陽陽中有隂非兩不成非一無物誠有至神者斯其神為獨至而理與數俱不可測也易中之深微者又如此雖寓于四道之中而有不滯于四道之中者也是皆作易古聖人之心以極乎立體之靜深而研乎致用之動幾也惟隂中之靜者立乎體靜則深而不可窮也所謂寂然不動也故感而即動焉是以通天下之志而無憾也何也天下之志皆屬靜隂也仍是以志與志相契者也惟陽之動有致乎用動則幾行莫之遏也所謂動而莫禦也故開務前用足以成天下之物不遺也何也天下之物屬動陽也仍是陽與陽相孚也易之通志成物又如此蓋因易之道至神者也窮乎隂陽不可以隂陽求神也兼乎理數不可以理數執神也惟其至神所以通志不見神之疾而通之至速成物不見神之行而行之皆至也是以聖人必盡其極深之心而殫其研幾之知也此又見惟聖人能作易惟聖人能用易而不可遽望于學易之君子也若夫君子先求聖人之道于四者之顯著以馴致極深研幾之功則至精至變之理數皆能體㑹于神明焉所謂神者聖而不可知者也隂陽不可測者也君子雖不能至心嚮往之可矣右第十章子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其孰能與于此哉古之聰明睿知神武而不殺者夫是以明于天之道而察于民之故是興神物以前民用聖人以此齊戒以神明其德夫是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圗洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也孔聖復舉先後天聖人功德及于天下萬世然其作易皆本于天地以作之聖如述之明也夫聖人作易何為者乎蓋用以開乎天下之萬物也發其䝉以亨其屯也用以成乎天下之萬務也化其蹇以使之解也易何以能如是哉由于天下事物之理數無不在易中故易有以包括乎天下之道也曰冒者即範圍天地曲成萬物也是故易成而聖人用之以其理之精通天下之心志以其數之變定天下之功業以其不可知之神决斷天下之疑也疑者不明也不明故疑明而不能神猶未免于疑焉必也神而明之方能用易而大明無疑也在聖人因誠而明故作易而用易以通志定業斷疑在學易者因明而求誠以神其明焉苟能因易用易自無不可希之聖矣聖人何以為開成乎乃用蓍以揲卦焉蓍百莖一叢用其半為大衍之數其形圓故其德亦圓轉動于至神也蓋象乎天也卦四正四隅其形方而靜故其德亦方正定位而昭然也蓋象乎地也蓍卦象天地如此矣卦有六爻如天地間三才之道上天下地中而萬事萬物無義不備乃變易于隂陽而呈效其理數天地人具而聖人開成之心乃因易而無不顯明如貢物之陳列也于是即用易以清其憧擾之思慮存其極深之敬禮所謂洗心也且極易之深以為心之深安于成性之存研易之幾以為心之幾待發而為道義所謂退藏于密也于是吉凶之理數已大明于聖人之衷用以開務成物與愚賤同其憂患聖人之用知乎乃聖人之行仁也故蓍一草木而其神足以知來卦一畫圗其知足以藏往無非聖人仁知之體用藉蓍卦以貢之者也知來者知未來萬事萬物之數也以理主之而已藏往者藏已往萬事萬物之理也以數推之而已故蓍卦不外理數知來藏往無足異而理數俱備聖心有孰能得與乎此者哉蓋古之畫卦繫辭之聖皆聰明睿知誠而明生而安之聖人也而又神武不殺知而歸仁不以政刑為貴而以德禮為尚不惟一身德禮為尚而且作易以使天下後世各明乎德之自成而孚于易簡各得于禮之自行而合于典禮也此惟伏羲文王足以當之也作易知也使天下後世事得濟而物得所非仁乎言仁而聰明睿知之知神武不殺之勇具備于仁之體量矣此假乃聖人之三達德也聖人具此三達德蓋聖心能明乎天之道也明乎天之命賦于人為性民彛物則莫非天理于是率之為道修之為教凡庶民日用行習之常皆能察其中有命性道教之理也然何以使天下後世知之由之乎為之作易俾其易知易從示之吉凶悔吝以通志定業斷疑乃觀于河圗有四正無四隅之圓形象天而用蓍觀于洛書四正四隅全之方形象地而用龜龜蓍一物也用其用于易而其物神矣神非其物自神聖人興之也興而用其物之靈明以彰著易之理數也此謂之興神物也即以此神物用于卜易以前民用民因隨乎卦爻之吉凶以為向背豈非聖人前為引導之乎此聖人用易以盡倫盡物也而實自盡其性也以此濟事利物之用本于立誠主敬之體齊戒以洗心退藏而待用將以神明其德如易之至精至變至神而已所以聖人一用易而窮理盡性至命之道無不備也明天道察民故非窮理乎齊戒以神明其德非盡性乎至于人已兼明神明可佑非至命乎此假即第四章中仰以觀于天文三假之意更申明之乃以明德立神人之極也聖人觀天察民興神前用以自神明其德如此故作易焉以易簡之理備于內以易知易從示于外則易中皆可知可從可久可大之道也坤非他一闔戶即得所謂坤矣乾非别一闢户即得所謂乾矣乾坤或難知從闔户闢户觀之人孰不易知從乎不明變者觀一闔一闢而隂陽之變化得所謂矣不明通者觀闔闢往來不窮于無終始而交際出入之通得所謂矣不明象者仰觀于天見象矣即知易所謂象也不明器者俯察于地著形矣即知易所謂器也因此象形制為事物之宜而用之即得易之所謂法也至于神乃不可測者然乾坤乃隂陽之體變通乃隂陽之用形象卦爻之體也制而用之卦爻之用也微而隂陽顯而卦爻體用俱明于是本其立體以制用者而用之斯出入無不利故民咸用之亦無不利是神之為神雖不可測其實亦易測也即此利用出入民咸用之無不利者正所謂神也此假言聖人以易之至精至變至神示天下後世無人不可于易中求至易至簡而神即在易簡之中不可于易簡之外别求所謂神矣此中庸所謂至德即在庸行子臣弟友之中也易簡之理固易知從矣即卦爻之數亦無不可明也易之為易肇于無形無色從未有天地以前立始基焉理氣渾然是謂太極也動而生陽成天靜而生隂成地于是天包地外地懸天中有此一個大囫圇物事矣分觀之則為天為地遂有兩儀兩儀者即一動一靜而分隂陽也隂陽中又各有動靜隂陽分為老少是為四象四象中又各因動靜分隂陽而八卦成天地氣化體用備矣因而以八與八相蕩為六十四卦萬事萬物之體用亦備矣吉凶莫不定于是焉不言六十四卦及諸爻者以八卦統之也吉凶既定通志定業斷疑用易于利用出入而大業生矣此假又就卦爻可明以見易簡可得示學易者勿畏難苟安也易之為理至精為數至變極之至神皆易簡而易知易從如此何也聖人作易原就天地間現成理數聖人不過于中神明之耳學易者不明易何不再觀之天地欲法乎為象為形者則莫大乎天地可觀察也不明乎為變為通則莫大乎四時也是玩易可明天地四時者觀天地四時又可明易矣然而竟不能互觀有得者則明不足也何不觀之懸象于天而著明于地普照萬物之日月乎何其明莫大也學易者能觀于日月以求易之水火觀乎水火以求日月之明則易與天地至一無二可以大明矣天地至大窮其明之用于水火水火至明著其大明于萬物萬物中有富貴者崇髙之莫大者也然陽貴于一也隂富于二也故易中以陽為貴以隂為富而萬物得陽多則貴得隂多則富也有萬物則有萬事萬事乃萬物之致用也物之至備用之故無窮也有一物一事即有一器以為天下後世成物濟此事者然有一器即有一道道在而器斯能濟用為利焉非聖人之德不能立之亦不過得于易之理數而有取于天地之形象耳雖莫大乎聖人而亦無難知從也至于聖人用易而興神物前民用鈎理數之至深出之使顯致理數之至逺約之使近以之定天下無窮之吉凶成天下無盡之亹亹可謂神矣亦不過聖人用龜蓍耳惟聖人興神物以著聖德故莫大乎蓍龜然得其理之精數之變神之不可測可以知神所為而反佑神矣易又何不可知從乎此假見易之為易現在天地四時日月萬事萬物中聖人取其象以作易興神物以前用總無難知難行每言莫大者正見莫大于聖人之一心也學易者不可以舍約就博也明矣雖然易果如是之易知從乎何以聖人以下多不能體易于一心用易于一身而讓聖人以獨至乎蓋天生神物惟有聖人之德斯有聖人之心于無知無識之物皆能神明之而成神物以聖人之神明而反寄其神明于物也天地有不測之變化惟有聖人之神明斯能以其變化作易以用其變化是聖人以作之聖自居于述之明而效其變化也天之垂象而示下言天而地之形該之聖人仰觀而見吉凶于是聖人取其象象之以為卦爻言仰觀而俯察該之矣亦惟有聖人之神明斯能以天地之形象作易以象其形象是聖人不以為自作易乃以天地有易而聖人象之也凡此者皆有聖人之德而不自居也故能作易以自用為道而開成天下後世為教也今人多豫聖之心何以希聖人而學易乎又言河出圗洛出書聖人則之即天生神物聖人則之𫝊自注也不必再釋然則聖人之作易自用為道者皆欲修道以為教也從剛柔中摩出八卦又從八卦中蕩出六十四卦更用龜蓍以别隂陽老少方明動靜變化是萬事萬物之吉凶全在隂陽老少之四象也四象者老則動而少則靜易以老而動為用少而靜為體故曰所以示也示者示其象也復繫以辭不但告以象且告以辭矣觀象玩辭吉凶已定又教之以斷也觀象不明可玩辭玩辭不明固有吉凶之斷矣尚有不明者乎總見易雖作于聖人實欲開成天下故最易知易從學易者苟能明此章之義以用易焉庶知聖人之易本至易簡天下之理備于易簡人心之理不外易簡猶以為艱深險阻不可學也則亦自畫而已右第十一章易曰自天祐之一假本義以為錯簡宜在第八章愚更總上下繫𫝊十九爻為一矣列在下繫五章易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行聖人之易原自易簡而學者多以口耳求之故孔聖復示曰凡道之在書者未必盡在于言即有言之著者亦未必盡達其意然則聖人之意于言辭求之其不可盡見乎必也求聖人之意于有言無言之間方知聖人之言明其不盡之意之情也聖人蓋立象以盡意仰觀俯察近取逺取凡天地之象皆聖人意所寄也欲求知聖意亦觀于易之取象而可盡矣意之所發為情而象之所著為卦聖人陳設八卦重之六十四卦無非因世人之情真僞錯雜不可端倪然無不可以聖人之情通天下之情得其曲盡也欲知聖人盡天下之情僞似自達其情亦觀于易之設卦而可盡矣意不可見者象其可見者也情隱而難知者卦顯而易知也言卦則爻在其中卦大象也爻小象也象兼大小而事物之情方備也聖人之意及天下情僞皆于易能體㑹而盡得焉方可求之聖人繫辭以盡言也象卦不明意情弗識徒求之于言末矣况求之于言又非言所可盡必明易中變通之理數因而用易之變通以為變通變指卦爻言通則全易之理數俱可貫通矣如此則易之用以出入咸宜無不利者方可于應事接物之間盡之又非但自盡其利用已也鼓之舞之如奏樂然使天下後世人人皆觀象卦玩繫辭無不歡欣踴躍以趨吉避凶遷善改過為用焉方可謂之盡易之神明于不測也豈徒以言求聖人之意乎蓋聖人之意有所緼也非有意以緼之乃理數之統㑹至精至變皆寓意于至神之中必深有所緼包含蓄積然後發于不窮用之靡盡也如易之有乾坤其易之理數盡緼于兹乎未有易之前先有天地然聖人作易即從未有天地之前立體其致用方及于既有天地以後于是有天地而乾坤成列矣乾如天之覆坤如地之載乾坤成列萬物在其中是聖人觀其象形而作易以乾坤而包涵全易使立于乾坤之中者也乾坤者六子所出萬物所形萬事所生也易之中無事無物無理無數不備其實俱緼于乾坤若乾坤毁則無以見易理數俱無根源何因而有變通又何因而為鼓舞乎于是易不可見乾坤不幾于息乎蓋乾坤即天地之德也又即氣化之源也焉有毁息不過明易之為易緼于乾坤為理數之一始無不始一成無不成以示學易者于象卦求意情于變通鼓舞求利神固不盡求之于言矣尤貴于知要以求其緼耳此又示以易簡至德之義也易之理數既俱緼于乾坤則凡天下之萬事萬物雖賾動無窮俱可以即本以求末即一以㑹萬矣不知何所謂道也萬事萬物之中有理存焉即道也寄于事物之內而超乎事物之表者也事物雖有形而道無形是形而上者道也形而上祇是說無形者在有形之上底意思知道在形而不雜于形則凡事物之形有形可見者皆器而已器如用物該事物為器見天地事物無非人之所用即無非體道者之所敬慎以將之者也惟不忽于器斯能全乎道道器又何嘗為二乎雖然器有定者也謂一器一道恐執器以求道矣謂萬器一道恐體道而淆乎器矣君子于器道之通必化而裁焉一器有一道用之必時措咸宜也而又不執器以求道用之惟義之與比也此所謂化而裁之可以謂之能變也化其執器之迹裁以求道之宜則至變者乃有至不變以權衡之也方可謂既隨道用器又不執器求道而道之神明俱化裁于君子之一心矣由此推行于事理不過此一心一理之流通流通者即道也由此舉而措之于天下之民凡有建立不過此理此道之所成就成就者事業也未嘗非用道之驗也得乎易之所緼知所謂一者道也則化裁推行舉措俱一心為用也此君子學易最易簡之知能也是以聖人作易亦惟備乎易簡之道而畫卦繫辭俱由此為化裁推行舉而措之耳如易之有象也聖人有以見天下之至賾而擬諸其形容象其物宜所以有象是故謂之象也聖人有以見天下之至動而觀其㑹通以行其典禮更為繫辭焉以斷其吉凶于是有爻是故謂之爻也再叙此一假者非復也所以明畫卦繫辭之本也是聖人因易簡之道為作易之本也自有卦而天下之賾者盡存乎卦矣自有辭而天下之動者不越于辭矣在聖人于未有易之時尚能觀天察地即知易立于中于萬事萬物即能得形上之道以御形下之器于是化裁盡變推行盡通舉措于民成其開物成務之事業在學者幸而生聖人之後得以觀易之象玩易之辭又何不可學聖人乎亦必化而裁之以盡變也推而行之以盡通也是善學于聖人者也在聖人修其教在學者懋其學無論化裁推行皆可希聖即神而明之于易之理數至精至變至神者皆可神明之矣固非聖人不能然亦存乎學者之勉以求安漸以求至也是豈于言可求盡乎有識于心默而契焉默契既深遂成其詣不必求意于聖言也亦不必以言示人也誠于已者自信于物此處言信尚非謂人信之也乃自喻其理數之至一者于心不言而能化裁推行舉措是所謂能神而明之也其能用易之用如此必得乎易之易簡之德以為體所以能如聖人之用無不周體無不立也此則存乎其人在心之德及德之表見于行者也言德則自喻也言行則人信亦在其中矣合內外以驗其德也此豈言語可以求盡也哉右第十二章大易通解卷十三
